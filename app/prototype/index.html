    "quote": "然而却没有能够使佛法弘扬起来，于是他们到了康区，在玛龙多吉札绕安穹那炯或者丹迪寺修行安住时，莫色拉巴见状生起信心请求出家，于是由玛尔·释迦牟尼作亲教师，约·格威穹为规范师，给他传出家戒，取名为释迦·格巴绕色，他又请求受比丘戒，当时由于五位比丘不齐全，寻找到住在丹地的拉隆·拜吉多吉，可是他说：“因为我杀了恶君，所以不能补充比丘数目，你们再另行寻觅吧！”他派了汉地的和尚格旺、吉番二人，会聚了五比丘传了近圆戒。",

  {
    "source": "铜色吉祥山",

    "quote": "莲师逐一详详细细恩赐言教与慈悲的教诲，随后从贡塘拉土骑着狮子或骏马而去，伴随着诸位天人无量供养的庄严到达了妙拂洲，在铜色吉祥山顶超度了罗刹王绕卡土创，莲师神识进入他的身体，幻化出不可思议的莲花宫殿，又化现出罗刹八洲，一一都以国王的形象安住而宣讲八大法行等正法。",

    "type": "位于",
    "specialty": "",
    "quote": "依靠《吉祥证道歌》镇压鬼神，并且依靠在空中跳金刚舞来加持地基，在拉线绳的时候，莲师凭借禅定勾召龙子和天子，他们牵着绳端，遵照堪布的言教，以邬丹达波热经堂作为范\n例，举行奠基仪式，大师也役使所有傲慢的鬼神，整个工程白天由人工建造，晚上非人建得更高，以须弥山、四大部洲、八小洲 71 、日月连同铁围山的模式建起的吉祥桑耶无变自成寺宇，加上三位王妃的三洲 72 ，这么大的面积在五年内竣工。",

  {

    "type": "引用",

    "quote": "在其中列居第三的雪域，佛教是从什么时候出现的呢？按照《文殊根本续》中“雪域由湖减，出现娑罗林”的授记，人们一致共称：首先在湖泊逐渐减少形成郁郁葱葱的森林时期，普陀山大悲观音加持的一只猴子来到雪域，他和岩罗刹女交配，由此繁衍藏人。",

// ============================================================

// ============================================================

const typeColors = {
  "人物":   "#7eb8da",   // 雾蓝
  "王室":   "#d4af37",   // 金黄
  "圣众":   "#c9a96e",   // 暗金
  "典籍":   "#9a85a8",   // 雾紫
  "地点":   "#8895a7",   // 灰蓝

  "非人":   "#b05a5a",   // 砖红

function getRelColor(type) {
  return relColors[type] || "#555";
}

// ============================================================
// Compute degree
// ============================================================
const degreeMap = {};
links.forEach(l => {
  degreeMap[l.source] = (degreeMap[l.source] || 0) + 1;
  degreeMap[l.target] = (degreeMap[l.target] || 0) + 1;
});

// ============================================================
// D3 Visualization
// ============================================================

let width = window.innerWidth;
let height = window.innerHeight;

// ============================================================
// Canvas setup (replaces SVG for performance)
// ============================================================
const dpr = window.devicePixelRatio || 1;
const canvas = d3.select("body").append("canvas")
  .attr("width", width * dpr)
  .attr("height", height * dpr)
  .style("width", width + "px")
  .style("height", height + "px");
const ctx = canvas.node().getContext("2d");
ctx.scale(dpr, dpr);

// Current zoom transform
let currentTransform = d3.zoomIdentity;

// Interaction state
let hoveredNode = null;
let selectedNode = null;
let draggedNode = null;
let filteredType = null; // for entity type legend filtering
let filteredRelType = null; // for relation type legend filtering

// Build adjacency index for fast neighbor lookup
const adjacency = new Map();
nodes.forEach(n => adjacency.set(n.id, new Set()));
links.forEach(l => {
  const sid = typeof l.source === 'object' ? l.source.id : l.source;
  const tid = typeof l.target === 'object' ? l.target.id : l.target;
  if (adjacency.has(sid)) adjacency.get(sid).add(tid);
  if (adjacency.has(tid)) adjacency.get(tid).add(sid);
});

function isConnected(nodeId, centerId) {
  return adjacency.get(centerId) && adjacency.get(centerId).has(nodeId);
}

function nodeRadius(d) {
  const deg = degreeMap[d.id] || 1;
  return Math.min(4 + Math.sqrt(deg) * 3, 20);
}

// Simulation
const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d => d.id).distance(80))
  .force("charge", d3.forceManyBody().strength(-200))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("collision", d3.forceCollide().radius(d => nodeRadius(d) + 4))
  .force("x", d3.forceX(width / 2).strength(0.03))
  .force("y", d3.forceY(height / 2).strength(0.03));

// ============================================================
// Canvas draw function
// ============================================================
function draw() {
  ctx.save();
  ctx.clearRect(0, 0, width, height);

  // Background fill (respects light/dark theme)
  const isLight = document.body.classList.contains('light');
  ctx.fillStyle = isLight ? '#f5f3ee' : '#1a1a2e';
  ctx.fillRect(0, 0, width, height);

  ctx.translate(currentTransform.x, currentTransform.y);
  ctx.scale(currentTransform.k, currentTransform.k);

  const zoomLevel = currentTransform.k;
  const activeNode = selectedNode || hoveredNode; // node being highlighted

  // --- Draw links ---
  ctx.lineCap = "round";
  links.forEach(l => {
    const sx = l.source.x, sy = l.source.y;
    const tx = l.target.x, ty = l.target.y;
    if (sx == null || tx == null) return;

    let alpha = 0.18;
    let lw = 1.2;
    if (activeNode) {
      const connected = (l.source.id === activeNode.id || l.target.id === activeNode.id);
      alpha = connected ? 0.9 : 0.06;
      lw = connected ? 2.5 : 0.6;
    }
    if (filteredType) {
      alpha = 0.06;
      lw = 0.6;
    }
    if (filteredRelType) {
      if (l.type === filteredRelType) {
        alpha = 0.7;
        lw = 2;
      } else {
        alpha = 0.03;
        lw = 0.4;
      }
    }

    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(tx, ty);
    ctx.strokeStyle = `rgba(106,174,214,${alpha})`;
    ctx.lineWidth = lw;
    ctx.stroke();
  });

  // --- Draw nodes ---
  nodes.forEach(n => {
    if (n.x == null) return;
    const r = nodeRadius(n);
    const color = typeColors[n.type] || typeColors["unknown"];

    let nodeAlpha = 1;
    if (activeNode) {
      if (n.id === activeNode.id) {
        nodeAlpha = 1;
      } else if (isConnected(n.id, activeNode.id)) {
        nodeAlpha = 1;
      } else {
        nodeAlpha = 0.12;
      }
    }
    if (filteredType) {
      nodeAlpha = (n.type === filteredType) ? 1 : 0.08;
    }
    if (filteredRelType) {
      // Highlight nodes that participate in this relation type
      const inRel = links.some(l => l.type === filteredRelType && (l.source.id === n.id || l.target.id === n.id));
      nodeAlpha = inRel ? 1 : 0.08;
    }

    ctx.globalAlpha = nodeAlpha;

    // Node fill
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    // Node stroke
    ctx.strokeStyle = color;
    ctx.lineWidth = (activeNode && n.id === activeNode.id) ? 2.5 : 1;
    ctx.globalAlpha = (activeNode && n.id === activeNode.id) ? nodeAlpha : nodeAlpha * 0.4;
    ctx.stroke();

    ctx.globalAlpha = 1;
  });

  // --- Draw labels ---
  // Skip all labels when zoomed out too far
  if (zoomLevel > 0.35) {
    const labelColor = isLight ? '#333' : '#ddd';
    ctx.textAlign = "center";
    ctx.textBaseline = "bottom";

    nodes.forEach(n => {
      if (n.x == null) return;
      const deg = degreeMap[n.id] || 0;
      const r = nodeRadius(n);

      let showLabel = false;
      let fontSize = 0;
      let labelAlpha = 0;

      if (activeNode) {
        if (n.id === activeNode.id) {
          showLabel = true; fontSize = 13; labelAlpha = 1;
        } else if (isConnected(n.id, activeNode.id)) {
          showLabel = true; fontSize = 10; labelAlpha = 0.9;
        }
      } else if (filteredType) {
        if (n.type === filteredType && deg >= 2) {
          showLabel = true; fontSize = 10; labelAlpha = 0.9;
        }
      } else {
        // Default: only show labels for degree >= 3
        if (deg >= 8) { showLabel = true; fontSize = 12; labelAlpha = 0.85; }
        else if (deg >= 3) { showLabel = true; fontSize = 10; labelAlpha = 0.85; }
      }

      // Also show label for hovered node (even if low degree)
      if (hoveredNode && n.id === hoveredNode.id && !showLabel) {
        showLabel = true; fontSize = 12; labelAlpha = 1;
      }

      if (showLabel && fontSize > 0) {
        ctx.globalAlpha = labelAlpha;
        ctx.font = `${fontSize}px "PingFang SC", "Microsoft YaHei", system-ui, sans-serif`;
        ctx.fillStyle = labelColor;
        ctx.fillText(n.id, n.x, n.y - r - 4);
        ctx.globalAlpha = 1;
      }
    });
  }

  ctx.restore();
}

// ============================================================
// Simulation tick
// ============================================================
simulation.on("tick", draw);

// ============================================================
// Hit test: convert mouse/pointer coords to simulation space
// ============================================================
function screenToSim(event) {
  const rect = canvas.node().getBoundingClientRect();
  const mx = (event.clientX != null ? event.clientX : event.x) - rect.left;
  const my = (event.clientY != null ? event.clientY : event.y) - rect.top;
  const x = (mx - currentTransform.x) / currentTransform.k;
  const y = (my - currentTransform.y) / currentTransform.k;
  return [x, y];
}

function findNodeAt(sx, sy) {
  let closest = null, minDist = Infinity;
  for (let i = 0; i < nodes.length; i++) {
    const n = nodes[i];
    if (n.x == null) continue;
    const dx = n.x - sx, dy = n.y - sy;
    const d = dx * dx + dy * dy; // squared distance for speed
    const r = nodeRadius(n) + 4; // small tolerance
    if (d < r * r && d < minDist) {
      minDist = d;
      closest = n;
    }
  }
  return closest;
}

// ============================================================
// Zoom
// ============================================================
const zoom = d3.zoom()
  .scaleExtent([0.15, 5])
  .on("zoom", (event) => {
    currentTransform = event.transform;
    draw();
  });

canvas.call(zoom);
canvas.on("dblclick.zoom", null);

// ============================================================
// Drag (applied AFTER zoom so drag takes priority)
// When subject() returns a node, d3.drag consumes the gesture;
// when it returns null the event falls through to zoom (pan).
// ============================================================
function dragsubject(event) {
  const [sx, sy] = screenToSim(event.sourceEvent);
  const found = findNodeAt(sx, sy);
  return found || undefined;
}

canvas.call(d3.drag()
  .subject(dragsubject)
  .on("start", function(event) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    draggedNode = event.subject;
    event.subject.fx = event.subject.x;
    event.subject.fy = event.subject.y;
  })
  .on("drag", function(event) {
    // Convert drag coordinates from screen to simulation space
    event.subject.fx = currentTransform.invertX(event.x);
    event.subject.fy = currentTransform.invertY(event.y);
  })
  .on("end", function(event) {
    if (!event.active) simulation.alphaTarget(0);
    draggedNode = null;
    event.subject.fx = null;
    event.subject.fy = null;
  })
);

// ============================================================
// Mouse interaction: hover + tooltip + click
// ============================================================
const tooltip = d3.select("#tooltip");

canvas.on("mousemove.tooltip", function(event) {
  if (draggedNode) {
    tooltip.style("display", "none");
    return;
  }

  const [sx, sy] = screenToSim(event);
  const found = findNodeAt(sx, sy);

  if (found !== hoveredNode) {
    hoveredNode = found;
    canvas.node().style.cursor = found ? "pointer" : "default";
    draw();
  }

  if (found) {
    const deg = degreeMap[found.id] || 0;
    let html = `<div class="tt-name">${found.id}</div>`;
    html += `<div class="tt-type">${found.type}${found.sub_type ? ' · ' + found.sub_type : ''}</div>`;
    if (found.aliases && found.aliases.length > 0) {
      html += `<div class="tt-aliases">别名: ${found.aliases.join(", ")}</div>`;
    }
    html += `<div class="tt-rel" style="margin-top:4px;color:#999">连接数: ${deg}</div>`;
    tooltip.html(html)
      .style("display", "block")
      .style("left", (event.pageX + 14) + "px")
      .style("top", (event.pageY - 10) + "px");
  } else {
    tooltip.style("display", "none");
  }
});

canvas.on("mouseleave.tooltip", function() {
  hoveredNode = null;
  tooltip.style("display", "none");
  draw();
});

// ============================================================
// Click: select node / deselect (with drag guard)
// ============================================================
let _mouseDownPos = null;
canvas.on("mousedown.clickguard", function(event) { _mouseDownPos = [event.clientX, event.clientY]; });
canvas.on("click.select", function(event) {
  // Ignore if mouse moved significantly (drag gesture, not click)
  if (_mouseDownPos) {
    const dx = event.clientX - _mouseDownPos[0], dy = event.clientY - _mouseDownPos[1];
    if (dx * dx + dy * dy > 25) return;
  }

  const [sx, sy] = screenToSim(event);
  const found = findNodeAt(sx, sy);

  if (found) {
    if (selectedNode && selectedNode.id === found.id) {
      selectedNode = null;
      document.getElementById('info-panel').style.display = 'none';
    } else {
      selectedNode = found;
      showInfoPanel(found);
    }
  } else {
    selectedNode = null;
    document.getElementById('info-panel').style.display = 'none';
  }
  filteredType = null;
  const legendEl2 = document.getElementById("legend");
  if (legendEl2) legendEl2.querySelectorAll('.legend-item[data-type]').forEach(e => { e.classList.remove('dimmed'); e.style.opacity = ''; });
  draw();
});

function showInfoPanel(d) {
  document.getElementById('panel-name').textContent = d.id;
  document.getElementById('panel-type').textContent = d.type + (d.sub_type ? ' \u00b7 ' + d.sub_type : '') + (d.aliases && d.aliases.length ? '\n\u522b\u540d: ' + d.aliases.join(', ') : '');

  // Build connection list
  var connHTML = '';
  links.forEach(function(l) {
    var src = typeof l.source === 'object' ? l.source.id : l.source;
    var tgt = typeof l.target === 'object' ? l.target.id : l.target;
    if (src === d.id) {
      connHTML += '<div>\u2192 <span onclick="clickEntity(\'' + tgt.replace(/'/g, "\\'") + '\')">' + tgt + '</span> <span style="color:#888;font-size:10px">(' + (l.type || '') + ')</span></div>';
    } else if (tgt === d.id) {
      connHTML += '<div>\u2190 <span onclick="clickEntity(\'' + src.replace(/'/g, "\\'") + '\')">' + src + '</span> <span style="color:#888;font-size:10px">(' + (l.type || '') + ')</span></div>';
    }
  });
  document.getElementById('panel-connections').innerHTML = connHTML || '<span style="color:#555">\u65e0</span>';

  // Events
  var evtSection = document.getElementById('events-section');
  var evtDiv = document.getElementById('panel-events');
  var evtCount = document.getElementById('events-count');
  if (typeof entityEventIndex !== 'undefined' && entityEventIndex[d.id]) {
    var indices = entityEventIndex[d.id];
    evtCount.textContent = '(' + indices.length + ')';
    evtDiv.innerHTML = indices.slice(0, 30).map(function(idx) {
      var evt = allEvents[idx];
      if (!evt) return '';
      var q = evt.quote || '';
      return '<div class="event-item" onclick="this.classList.toggle(\'expanded\')">'
        + '<span class="event-type-tag">' + (evt.type || '') + '</span>'
        + '<span class="event-title">' + (evt.title || '') + '</span>'
        + '<div class="event-quote">\u300c' + q + '\u300d<div class="event-chapter">' + (evt.chapter || '') + '</div></div>'
        + '</div>';
    }).join('');
    evtSection.style.display = 'block';
  } else {
    evtSection.style.display = 'none';
  }

  document.getElementById('info-panel').style.display = 'block';
}

function clickEntity(name) {
  var target = nodes.find(function(n) { return n.id === name; });
  if (target) {
    selectedNode = target;
    showInfoPanel(target);
    draw();
  }
}

// ============================================================
// Search — across entities, relations (quotes), events
// ============================================================
var searchInput = document.getElementById("search-input");
var searchResults = document.getElementById("search-results");
var searchTimeout = null;

// Prevent canvas drag from stealing input focus
searchInput.addEventListener("mousedown", function(e) { e.stopPropagation(); });
searchInput.addEventListener("touchstart", function(e) { e.stopPropagation(); });
searchResults.addEventListener("mousedown", function(e) { e.stopPropagation(); });

searchInput.addEventListener("input", function() {
  clearTimeout(searchTimeout);
  var q = this.value.trim();
  console.log("search input:", q);
  if (q.length < 2) { searchResults.style.display = "none"; return; }
  searchTimeout = setTimeout(function() { doSearch(q); }, 200);
});

// Also support Enter key
searchInput.addEventListener("keyup", function(e) {
  if (e.key === "Enter") {
    var q = this.value.trim();
    if (q.length >= 1) doSearch(q);
  }
});

searchInput.addEventListener("keydown", function(e) {
  if (e.key === "Escape") { searchResults.style.display = "none"; this.blur(); }
});

document.addEventListener("click", function(e) {
  if (!e.target.closest("#search-results") && !e.target.closest("#search-input")) {
    searchResults.style.display = "none";
  }
});

function doSearch(q) {
  try {
  var ql = q.toLowerCase();
  var html = "";
  var count = 0;

  // 1. Search entities (by name/alias)
  var matchedNodes = nodes.filter(function(n) {
    return n.id.toLowerCase().indexOf(ql) >= 0 ||
           (n.aliases && n.aliases.some(function(a) { return a.toLowerCase().indexOf(ql) >= 0; }));
  }).slice(0, 10);

  if (matchedNodes.length > 0) {
    html += '<div class="sr-section"><div class="sr-section-title">实体</div>';
    matchedNodes.forEach(function(n) {
      html += '<div class="sr-item" onclick="focusNode(\'' + n.id.replace(/'/g, "\\'") + '\')">'
        + '<span class="sr-entity-name">' + highlight(n.id, q) + '</span>'
        + '<span class="sr-type-tag">' + n.type + '</span></div>';
      count++;
    });
    html += '</div>';
  }

  // 2. Search relations (by quote text)
  // Note: D3 force replaces link.source/target strings with node objects
  function linkSrc(l) { return (typeof l.source === 'object' ? l.source.id : l.source) || ''; }
  function linkTgt(l) { return (typeof l.target === 'object' ? l.target.id : l.target) || ''; }

  var matchedLinks = links.filter(function(l) {
    return (l.quote && l.quote.toLowerCase().indexOf(ql) >= 0) ||
           (linkSrc(l).toLowerCase().indexOf(ql) >= 0) ||
           (linkTgt(l).toLowerCase().indexOf(ql) >= 0);
  }).slice(0, 10);

  if (matchedLinks.length > 0) {
    html += '<div class="sr-section"><div class="sr-section-title">关系 · 原文</div>';
    matchedLinks.forEach(function(l) {
      var src = linkSrc(l), tgt = linkTgt(l);
      var quoteSnippet = l.quote ? excerptAround(l.quote, q, 60) : "";
      html += '<div class="sr-item" onclick="focusNode(\'' + src.replace(/'/g, "\\'") + '\')">'
        + '<span class="sr-relation">' + src + ' → ' + tgt
        + ' <span class="sr-type-tag">' + l.type + '</span></span>'
        + (quoteSnippet ? '<div class="sr-quote">' + quoteSnippet + '</div>' : '')
        + '<div class="sr-chapter">' + (l.chapter || '') + '</div></div>';
      count++;
    });
    html += '</div>';
  }

  // 3. Search events (by title/quote)
  if (typeof allEvents !== "undefined") {
    var matchedEvents = [];
    for (var i = 0; i < allEvents.length && matchedEvents.length < 10; i++) {
      var evt = allEvents[i];
      if ((evt.title && evt.title.toLowerCase().indexOf(ql) >= 0) ||
          (evt.quote && evt.quote.toLowerCase().indexOf(ql) >= 0)) {
        matchedEvents.push(evt);
      }
    }
    if (matchedEvents.length > 0) {
      html += '<div class="sr-section"><div class="sr-section-title">事件</div>';
      matchedEvents.forEach(function(evt) {
        var mainEntity = evt.participants && evt.participants[0] ? evt.participants[0].entity : "";
        var quoteSnippet = evt.quote ? excerptAround(evt.quote, q, 60) : "";
        html += '<div class="sr-item" onclick="' + (mainEntity ? "focusNode('" + mainEntity.replace(/'/g, "\\'") + "')" : "") + '">'
          + '<span class="sr-type-tag">' + evt.type + '</span>'
          + '<span style="color:#ccc">' + highlight(evt.title || "", q) + '</span>'
          + (quoteSnippet ? '<div class="sr-quote">' + quoteSnippet + '</div>' : '')
          + '<div class="sr-chapter">' + (evt.chapter || '') + '</div></div>';
        count++;
      });
      html += '</div>';
    }
  }

  if (count === 0) {
    html = '<div class="sr-empty">未找到「' + q + '」相关内容</div>';
  }

  searchResults.innerHTML = html;
  searchResults.style.display = "block";
  } catch(err) {
    searchResults.innerHTML = '<div class="sr-empty">搜索出错: ' + err.message + '</div>';
    searchResults.style.display = "block";
  }
}

function highlight(text, q) {
  if (!q || !text) return text;
  var idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx < 0) return text;
  return text.substring(0, idx) + '<em>' + text.substring(idx, idx + q.length) + '</em>' + text.substring(idx + q.length);
}

function excerptAround(text, q, radius) {
  var idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx < 0) return "";
  var start = Math.max(0, idx - radius);
  var end = Math.min(text.length, idx + q.length + radius);
  var prefix = start > 0 ? "…" : "";
  var suffix = end < text.length ? "…" : "";
  var excerpt = text.substring(start, end);
  return prefix + highlight(excerpt, q) + suffix;
}

function focusNode(name) {
  searchResults.style.display = "none";
  var target = nodes.find(function(n) { return n.id === name; });
  if (target) {
    selectedNode = target;
    showInfoPanel(target);
    // Pan camera to center on this node
    var scale = 1.5;
    var tx = width / 2 - target.x * scale;
    var ty = height / 2 - target.y * scale;
    var t = d3.zoomIdentity.translate(tx, ty).scale(scale);
    d3.select("canvas").transition().duration(600).call(zoom.transform, t);
  }
}

// ============================================================
// Legend
// ============================================================
const legendEl = document.getElementById("legend");
let legendHTML = `<h3>实体类型</h3>`;
const typeCounts = {};
nodes.forEach(n => { typeCounts[n.type] = (typeCounts[n.type] || 0) + 1; });

const typeOrder = ["人物", "圣众", "非人", "寺院", "地名", "经典", "教法", "教派", "仪轨", "法器", "集合"];
typeOrder.forEach(t => {
  if (typeCounts[t]) {
    legendHTML += `<div class="legend-item" data-type="${t}">
      <div class="legend-dot" style="background:${typeColors[t]};box-shadow:0 0 6px ${typeColors[t]}"></div>
      <span>${t} (${typeCounts[t]})</span>
    </div>`;
  }
});
if (typeCounts["unknown"]) {
  legendHTML += `<div class="legend-item">
    <div class="legend-dot" style="background:${typeColors["unknown"]}"></div>
    <span>unknown (${typeCounts["unknown"]})</span>
  </div>`;
}

legendHTML += `<div class="legend-section">关系类型</div>`;
const relTypeLabels = {
  "teacherOf": "师承",
  "manifestationOf": "化身",
  "formOf": "形态",
  "builtBy": "修建",
  "foundedBy": "创立",
  "subduedBy": "降伏",
  "concealedBy": "埋藏",
  "revealedBy": "开取",
  "fatherOf": "父子",
  "sonOf": "子父",
  "consortOf": "配偶",
  "rulerOf": "统治",
  "ministerOf": "臣属",
  "siblingOf": "兄弟",
  "memberOf": "归属",
  "translatedBy": "译经",
  "revisedBy": "译校",
  "belongsToSect": "宗派归属",
  "locatedIn": "位于",
};
const relTypeCounts = {};
links.forEach(l => { relTypeCounts[l.type] = (relTypeCounts[l.type] || 0) + 1; });
Object.keys(relTypeCounts).sort((a,b) => relTypeCounts[b] - relTypeCounts[a]).forEach(rt => {
  const label = relTypeLabels[rt] || rt;
  legendHTML += `<div class="legend-line" data-reltype="${rt}" style="cursor:pointer">
    <div class="legend-line-sample" style="background:${getRelColor(rt)}"></div>
    <span>${label} (${relTypeCounts[rt]})</span>
  </div>`;
});

legendEl.innerHTML = legendHTML;

// Legend click to filter (canvas-based)
legendEl.querySelectorAll('.legend-item[data-type]').forEach(el => {
  el.addEventListener('click', () => {
    const t = el.dataset.type;
    const allActive = !el.classList.contains('dimmed');
    if (allActive) {
      // Filter to this type
      filteredType = t;
      filteredRelType = null;
      legendEl.querySelectorAll('.legend-line[data-reltype]').forEach(e => { e.style.opacity = ''; });
      selectedNode = null;
      legendEl.querySelectorAll('.legend-item[data-type]').forEach(e => e.classList.add('dimmed'));
      el.classList.remove('dimmed');
      el.style.opacity = 1;
    } else {
      // Reset filter
      filteredType = null;
      legendEl.querySelectorAll('.legend-item[data-type]').forEach(e => {
        e.classList.remove('dimmed');
        e.style.opacity = '';
      });
    }
    draw();
  });
});

// Relation type legend click to filter
legendEl.querySelectorAll('.legend-line[data-reltype]').forEach(el => {
  el.addEventListener('click', () => {
    const rt = el.dataset.reltype;
    if (filteredRelType === rt) {
      // Reset
      filteredRelType = null;
      legendEl.querySelectorAll('.legend-line[data-reltype]').forEach(e => { e.style.opacity = ''; });
    } else {
      filteredRelType = rt;
      filteredType = null;
      legendEl.querySelectorAll('.legend-item[data-type]').forEach(e => { e.classList.remove('dimmed'); e.style.opacity = ''; });
      legendEl.querySelectorAll('.legend-line[data-reltype]').forEach(e => { e.style.opacity = e.dataset.reltype === rt ? '1' : '0.25'; });
    }
    selectedNode = null;
    draw();
  });
});

// ============================================================
// Stats Panel
// ============================================================
const statsEl = document.getElementById("stats");
let statsHTML = `<h3>统计</h3>`;
statsHTML += `<div class="stat-row"><span class="stat-label">实体数</span><span class="stat-value">${nodes.length}</span></div>`;
statsHTML += `<div class="stat-row"><span class="stat-label">关系数</span><span class="stat-value">${links.length}</span></div>`;
statsHTML += `<div class="stat-row"><span class="stat-label">关系类型</span><span class="stat-value">${Object.keys(relTypeCounts).length}</span></div>`;

statsHTML += `<div class="stat-section">实体类型分布</div>`;
const maxTypeCount = Math.max(...Object.values(typeCounts));
typeOrder.forEach(t => {
  if (typeCounts[t]) {
    const pct = (typeCounts[t] / maxTypeCount * 100).toFixed(0);
    statsHTML += `<div class="stat-bar-row">
      <span class="stat-bar-label">${t}</span>
      <div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%;background:${typeColors[t]}"></div></div>
      <span class="stat-bar-count">${typeCounts[t]}</span>
    </div>`;
  }
});

statsHTML += `<div class="stat-section">关系类型分布</div>`;
const maxRelCount = Math.max(...Object.values(relTypeCounts));
Object.keys(relTypeCounts).sort((a,b) => relTypeCounts[b] - relTypeCounts[a]).forEach(rt => {
  const pct = (relTypeCounts[rt] / maxRelCount * 100).toFixed(0);
  const label = relTypeLabels[rt] || rt;
  statsHTML += `<div class="stat-bar-row">
    <span class="stat-bar-label">${label}</span>
    <div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%;background:${getRelColor(rt)}"></div></div>
    <span class="stat-bar-count">${relTypeCounts[rt]}</span>
  </div>`;
});

statsEl.innerHTML = statsHTML;

// Initial zoom — or focus on highlighted entity from URL param
setTimeout(() => {
  var params = new URLSearchParams(window.location.search);
  var highlightName = params.get('highlight');
  if (highlightName) {
    focusNode(highlightName);
  } else {
    canvas.call(zoom.transform, d3.zoomIdentity.translate(width * 0.1, height * 0.1).scale(0.8));
  }
}, 500);

// Handle window resize
window.addEventListener('resize', () => {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.attr("width", width * dpr).attr("height", height * dpr)
    .style("width", width + "px").style("height", height + "px");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
});
</script>
</body>
</html>
