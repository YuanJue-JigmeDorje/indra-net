  { source: "莲花生大士", target: "赤松德赞 (context)", type: "teacherOf", specialty: "灌顶, 密法" },
  { source: "莲花生大士", target: "明妃益西措嘉", type: "teacherOf", specialty: "教授, 密法" },
  { source: "明妃益西措嘉", target: "玖如萨 (context)", type: "teacherOf", specialty: "教授" },
  { source: "赞兰达热巴", target: "黑行尊者", type: "teacherOf", specialty: "教授" },
  { source: "达那达拉", target: "云丹嘉措", type: "teacherOf", specialty: "灌顶, 密法" },
  { source: "哦鸥益西 (噶托巴尊者)", target: "帕思巴 (context)", type: "teacherOf", specialty: "灌顶" },
  { source: "布玛莫札", target: "酿当珍桑波 (part5)", type: "teacherOf", specialty: "教授" },
  { source: "布玛莫札", target: "玛·仁钦秋 (part5)", type: "teacherOf", specialty: "教授" },
  { source: "多敦桑给 (part5)", target: "荣索班智达", type: "teacherOf", specialty: "教授, 密法" },
  { source: "贡巴绕色大师", target: "大宿·释迦炯内 (in lineage context)", type: "teacherOf", specialty: "戒律" },
  { source: "香巴波", target: "噶玛巴哲嘉单巴 (context)", type: "teacherOf", specialty: "戒律" },
  { source: "阿底峡赞言 (assertion context)", target: "荣索班智达", type: "cites" },
];

// ============================================================
// Color schemes
// ============================================================

const typeColors = {
  "人物":   "#7eb8da",   // 雾蓝
  "王室":   "#d4af37",   // 金黄
  "圣众":   "#c9a96e",   // 暗金
  "典籍":   "#9a85a8",   // 雾紫
  "地点":   "#8895a7",   // 灰蓝
  "传承":   "#8a7d68",   // 暖灰
  "教法":   "#c4956a",   // 赭石
  "事件":   "#b05a5a",   // 砖红
  "族群":   "#b5b88a",   // 苔绿
  "非人":   "#b05a5a",   // 砖红
  "寺院":   "#6ba386",   // 青苔
  "仪轨":   "#6a9b9e",   // 青灰
  "unknown": "#555"
};

const relColors = {
  "teacherOf":       "#6aaed6",   // 师承 — 柔蓝，最重要的关系
  "manifestationOf": "#c9a96e",   // 化身 — 暗金
  "formOf":          "#b89a5e",   // 身相 — 暗金偏暗
  "builtBy":         "#6ba386",   // 建寺 — 青苔
  "foundedBy":       "#5e9478",   // 创立 — 青苔偏暗
  "subduedBy":       "#a06060",   // 降伏 — 暗红
  "concealedBy":     "#8878a0",   // 伏藏 — 雾紫
  "revealedBy":      "#9a8ab0",   // 掘藏 — 雾紫偏亮
  "fatherOf":        "#7a7a7a",   // 亲属 — 统一灰
  "sonOf":           "#7a7a7a",
  "consortOf":       "#7a7a7a",
  "rulerOf":         "#7a7a7a",
  "ministerOf":      "#7a7a7a",
  "siblingOf":       "#7a7a7a",
  "memberOf":        "#5a5a6a",   // 归属 — 暗灰
  "translatedBy":    "#6a9b9e",   // 译经 — 青灰
  "revisedBy":       "#5a8b8e",
  "belongsToSect":   "#5a5a6a",
  "locatedIn":       "#5a5a6a",
  "protects":        "#a06060",   // 护佑 — 暗红
  "cites":           "#8878a0",   // 引用 — 雾紫
};

function getRelColor(type) {
  return relColors[type] || "#555";
}

// ============================================================
// Compute degree
// ============================================================
const degreeMap = {};
links.forEach(l => {
  degreeMap[l.source] = (degreeMap[l.source] || 0) + 1;
  degreeMap[l.target] = (degreeMap[l.target] || 0) + 1;
});

// ============================================================
// D3 Visualization
// ============================================================

const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("body").append("svg")
  .attr("width", width)
  .attr("height", height);

// Defs: glow filter
const defs = svg.append("defs");

const glowFilter = defs.append("filter")
  .attr("id", "glow")
  .attr("x", "-50%").attr("y", "-50%")
  .attr("width", "200%").attr("height", "200%");
glowFilter.append("feGaussianBlur")
  .attr("stdDeviation", "2")
  .attr("result", "coloredBlur");
const feMerge = glowFilter.append("feMerge");
feMerge.append("feMergeNode").attr("in", "coloredBlur");
feMerge.append("feMergeNode").attr("in", "SourceGraphic");

// Arrow markers for each relation type
Object.entries(relColors).forEach(([type, color]) => {
  defs.append("marker")
    .attr("id", "arrow-" + type)
    .attr("viewBox", "0 -5 10 10")
    .attr("refX", 20)
    .attr("refY", 0)
    .attr("markerWidth", 6)
    .attr("markerHeight", 6)
    .attr("orient", "auto")
    .append("path")
    .attr("d", "M0,-4L10,0L0,4")
    .attr("fill", color)
    .attr("opacity", 0.6);
});

const g = svg.append("g");

// Zoom
const zoom = d3.zoom()
  .scaleExtent([0.15, 5])
  .on("zoom", (event) => {
    g.attr("transform", event.transform);
  });
svg.call(zoom);

// Simulation
const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d => d.id).distance(80))
  .force("charge", d3.forceManyBody().strength(-200))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("collision", d3.forceCollide().radius(d => nodeRadius(d) + 4))
  .force("x", d3.forceX(width / 2).strength(0.03))
  .force("y", d3.forceY(height / 2).strength(0.03));

function nodeRadius(d) {
  const deg = degreeMap[d.id] || 1;
  return Math.min(4 + Math.sqrt(deg) * 3, 20);
}

// Links
const link = g.append("g")
  .selectAll("line")
  .data(links)
  .join("line")
  .attr("stroke", d => getRelColor(d.type))
  .attr("stroke-opacity", 0.18)
  .attr("stroke-width", 1.2)
  .attr("marker-end", d => `url(#arrow-${d.type})`);

// Nodes
const node = g.append("g")
  .selectAll("circle")
  .data(nodes)
  .join("circle")
  .attr("r", d => nodeRadius(d))
  .attr("fill", d => typeColors[d.type] || typeColors["unknown"])
  .attr("stroke", d => d3.color(typeColors[d.type] || typeColors["unknown"]).brighter(0.8))
  .attr("stroke-width", 1)
  .attr("stroke-opacity", 0.4)
  .attr("filter", "url(#glow)")
  .attr("cursor", "pointer")
  .call(d3.drag()
    .on("start", dragstarted)
    .on("drag", dragged)
    .on("end", dragended));

// Labels (only for high-degree nodes)
const label = g.append("g")
  .selectAll("text")
  .data(nodes)
  .join("text")
  .text(d => d.id)
  .attr("font-size", d => {
    const deg = degreeMap[d.id] || 0;
    if (deg >= 8) return "12px";
    if (deg >= 4) return "10px";
    return "0px";  // hide low-degree labels by default
  })
  .attr("fill", "#ddd")
  .attr("text-anchor", "middle")
  .attr("dy", d => -(nodeRadius(d) + 4))
  .attr("pointer-events", "none")
  .attr("opacity", d => {
    const deg = degreeMap[d.id] || 0;
    return deg >= 4 ? 0.85 : 0;
  });

// Tooltip
const tooltip = d3.select("#tooltip");

node.on("mouseover", function(event, d) {
  const deg = degreeMap[d.id] || 0;
  let html = `<div class="tt-name">${d.id}</div>`;
  html += `<div class="tt-type">${d.type}${d.sub_type ? ' · ' + d.sub_type : ''}</div>`;
  if (d.aliases && d.aliases.length > 0) {
    html += `<div class="tt-aliases">别名: ${d.aliases.join(", ")}</div>`;
  }
  html += `<div class="tt-rel" style="margin-top:4px;color:#999">连接数: ${deg}</div>`;
  tooltip.html(html)
    .style("display", "block")
    .style("left", (event.pageX + 14) + "px")
    .style("top", (event.pageY - 10) + "px");

  // Highlight connected
  d3.select(this).attr("stroke-width", 2.5).attr("stroke-opacity", 1);
  link.attr("stroke-opacity", l =>
    (l.source.id === d.id || l.target.id === d.id) ? 0.9 : 0.08
  ).attr("stroke-width", l =>
    (l.source.id === d.id || l.target.id === d.id) ? 2.5 : 0.8
  );
  node.attr("opacity", n => {
    if (n.id === d.id) return 1;
    const connected = links.some(l =>
      (l.source.id === d.id && l.target.id === n.id) ||
      (l.target.id === d.id && l.source.id === n.id)
    );
    return connected ? 1 : 0.15;
  });
  label.attr("opacity", n => {
    if (n.id === d.id) return 1;
    const connected = links.some(l =>
      (l.source.id === d.id && l.target.id === n.id) ||
      (l.target.id === d.id && l.source.id === n.id)
    );
    return connected ? 0.9 : 0;
  }).attr("font-size", n => {
    if (n.id === d.id) return "13px";
    const connected = links.some(l =>
      (l.source.id === d.id && l.target.id === n.id) ||
      (l.target.id === d.id && l.source.id === n.id)
    );
    return connected ? "10px" : "0px";
  });
})
.on("mousemove", function(event) {
  tooltip
    .style("left", (event.pageX + 14) + "px")
    .style("top", (event.pageY - 10) + "px");
})
.on("mouseout", function() {
  tooltip.style("display", "none");
  node.attr("opacity", 1);
  d3.select(this).attr("stroke-width", 1).attr("stroke-opacity", 0.4);
  link.attr("stroke-opacity", 0.18).attr("stroke-width", 1.2);
  label.attr("opacity", d => (degreeMap[d.id] || 0) >= 4 ? 0.85 : 0)
    .attr("font-size", d => {
      const deg = degreeMap[d.id] || 0;
      if (deg >= 8) return "12px";
      if (deg >= 4) return "10px";
      return "0px";
    });
});

// Link tooltip
link.on("mouseover", function(event, d) {
  let html = `<div class="tt-name" style="font-size:12px">${d.source.id} → ${d.target.id}</div>`;
  html += `<div class="tt-type">关系: ${d.type}</div>`;
  if (d.specialty) html += `<div class="tt-aliases">专长: ${d.specialty}</div>`;
  tooltip.html(html)
    .style("display", "block")
    .style("left", (event.pageX + 14) + "px")
    .style("top", (event.pageY - 10) + "px");
  d3.select(this).attr("stroke-opacity", 0.9).attr("stroke-width", 3);
})
.on("mousemove", function(event) {
  tooltip
    .style("left", (event.pageX + 14) + "px")
    .style("top", (event.pageY - 10) + "px");
})
.on("mouseout", function() {
  tooltip.style("display", "none");
  d3.select(this).attr("stroke-opacity", 0.18).attr("stroke-width", 1.2);
});

// Click to lock highlight
let selectedNode = null;
node.on("click", function(event, d) {
  event.stopPropagation();
  if (selectedNode === d.id) {
    selectedNode = null;
    resetHighlight();
    return;
  }
  selectedNode = d.id;
  highlightNode(d);
});

svg.on("click", () => {
  selectedNode = null;
  resetHighlight();
});

function highlightNode(d) {
  link.attr("stroke-opacity", l =>
    (l.source.id === d.id || l.target.id === d.id) ? 0.9 : 0.06
  ).attr("stroke-width", l =>
    (l.source.id === d.id || l.target.id === d.id) ? 2.5 : 0.6
  );
  node.attr("opacity", n => {
    if (n.id === d.id) return 1;
    const connected = links.some(l =>
      (l.source.id === d.id && l.target.id === n.id) ||
      (l.target.id === d.id && l.source.id === n.id)
    );
    return connected ? 1 : 0.1;
  });
  label.attr("opacity", n => {
    if (n.id === d.id) return 1;
    const connected = links.some(l =>
      (l.source.id === d.id && l.target.id === n.id) ||
      (l.target.id === d.id && l.source.id === n.id)
    );
    return connected ? 0.9 : 0;
  }).attr("font-size", n => {
    if (n.id === d.id) return "13px";
    const connected = links.some(l =>
      (l.source.id === d.id && l.target.id === n.id) ||
      (l.target.id === d.id && l.source.id === n.id)
    );
    return connected ? "10px" : "0px";
  });
}

function resetHighlight() {
  node.attr("opacity", 1);
  link.attr("stroke-opacity", 0.18).attr("stroke-width", 1.2);
  label.attr("opacity", d => (degreeMap[d.id] || 0) >= 4 ? 0.85 : 0)
    .attr("font-size", d => {
      const deg = degreeMap[d.id] || 0;
      if (deg >= 8) return "12px";
      if (deg >= 4) return "10px";
      return "0px";
    });
}

// Tick
simulation.on("tick", () => {
  link
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x)
    .attr("y2", d => d.target.y);

  node
    .attr("cx", d => d.x)
    .attr("cy", d => d.y);

  label
    .attr("x", d => d.x)
    .attr("y", d => d.y - nodeRadius(d) - 4);
});

// Drag handlers
function dragstarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x;
  d.fy = d.y;
}
function dragged(event, d) {
  d.fx = event.x;
  d.fy = event.y;
}
function dragended(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null;
  d.fy = null;
}

// ============================================================
// Legend
// ============================================================
const legendEl = document.getElementById("legend");
let legendHTML = `<h3>实体类型</h3>`;
const typeCounts = {};
nodes.forEach(n => { typeCounts[n.type] = (typeCounts[n.type] || 0) + 1; });

const typeOrder = ["人物", "圣众", "非人", "寺院", "地名", "经典", "教法", "教派", "仪轨", "法器", "集合"];
typeOrder.forEach(t => {
  if (typeCounts[t]) {
    legendHTML += `<div class="legend-item" data-type="${t}">
      <div class="legend-dot" style="background:${typeColors[t]};box-shadow:0 0 6px ${typeColors[t]}"></div>
      <span>${t} (${typeCounts[t]})</span>
    </div>`;
  }
});
if (typeCounts["unknown"]) {
  legendHTML += `<div class="legend-item">
    <div class="legend-dot" style="background:${typeColors["unknown"]}"></div>
    <span>unknown (${typeCounts["unknown"]})</span>
  </div>`;
}

legendHTML += `<div class="legend-section">关系类型</div>`;
const relTypeLabels = {
  "teacherOf": "师承",
  "manifestationOf": "化身",
  "formOf": "形态",
  "builtBy": "修建",
  "foundedBy": "创立",
  "subduedBy": "降伏",
  "concealedBy": "埋藏",
  "revealedBy": "开取",
  "fatherOf": "父子",
  "sonOf": "子父",
  "consortOf": "配偶",
  "rulerOf": "统治",
  "ministerOf": "臣属",
  "siblingOf": "兄弟",
  "memberOf": "归属",
  "translatedBy": "译经",
  "revisedBy": "译校",
  "belongsToSect": "宗派归属",
  "locatedIn": "位于",
};
const relTypeCounts = {};
links.forEach(l => { relTypeCounts[l.type] = (relTypeCounts[l.type] || 0) + 1; });
Object.keys(relTypeCounts).sort((a,b) => relTypeCounts[b] - relTypeCounts[a]).forEach(rt => {
  const label = relTypeLabels[rt] || rt;
  legendHTML += `<div class="legend-line">
    <div class="legend-line-sample" style="background:${getRelColor(rt)}"></div>
    <span>${label} (${relTypeCounts[rt]})</span>
  </div>`;
});

legendEl.innerHTML = legendHTML;

// Legend click to filter
legendEl.querySelectorAll('.legend-item[data-type]').forEach(el => {
  el.addEventListener('click', () => {
    const t = el.dataset.type;
    const allActive = !el.classList.contains('dimmed');
    if (allActive) {
      // Dim all except this type
      node.attr("opacity", d => d.type === t ? 1 : 0.08);
      link.attr("stroke-opacity", 0.06);
      label.attr("opacity", d => d.type === t && (degreeMap[d.id] || 0) >= 2 ? 0.9 : 0)
        .attr("font-size", d => d.type === t && (degreeMap[d.id] || 0) >= 2 ? "10px" : "0px");
      legendEl.querySelectorAll('.legend-item[data-type]').forEach(e => e.classList.add('dimmed'));
      el.classList.remove('dimmed');
      el.style.opacity = 1;
    } else {
      resetHighlight();
      legendEl.querySelectorAll('.legend-item[data-type]').forEach(e => {
        e.classList.remove('dimmed');
        e.style.opacity = '';
      });
    }
  });
});

// ============================================================
// Stats Panel
// ============================================================
const statsEl = document.getElementById("stats");
let statsHTML = `<h3>统计</h3>`;
statsHTML += `<div class="stat-row"><span class="stat-label">实体数</span><span class="stat-value">${nodes.length}</span></div>`;
statsHTML += `<div class="stat-row"><span class="stat-label">关系数</span><span class="stat-value">${links.length}</span></div>`;
statsHTML += `<div class="stat-row"><span class="stat-label">关系类型</span><span class="stat-value">${Object.keys(relTypeCounts).length}</span></div>`;

statsHTML += `<div class="stat-section">实体类型分布</div>`;
const maxTypeCount = Math.max(...Object.values(typeCounts));
typeOrder.forEach(t => {
  if (typeCounts[t]) {
    const pct = (typeCounts[t] / maxTypeCount * 100).toFixed(0);
    statsHTML += `<div class="stat-bar-row">
      <span class="stat-bar-label">${t}</span>
      <div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%;background:${typeColors[t]}"></div></div>
      <span class="stat-bar-count">${typeCounts[t]}</span>
    </div>`;
  }
});

statsHTML += `<div class="stat-section">关系类型分布</div>`;
const maxRelCount = Math.max(...Object.values(relTypeCounts));
Object.keys(relTypeCounts).sort((a,b) => relTypeCounts[b] - relTypeCounts[a]).forEach(rt => {
  const pct = (relTypeCounts[rt] / maxRelCount * 100).toFixed(0);
  const label = relTypeLabels[rt] || rt;
  statsHTML += `<div class="stat-bar-row">
    <span class="stat-bar-label">${label}</span>
    <div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%;background:${getRelColor(rt)}"></div></div>
    <span class="stat-bar-count">${relTypeCounts[rt]}</span>
  </div>`;
});

statsEl.innerHTML = statsHTML;

// Initial zoom to fit
setTimeout(() => {
  svg.call(zoom.transform, d3.zoomIdentity.translate(width * 0.1, height * 0.1).scale(0.8));
}, 200);
</script>
</body>
</html>
