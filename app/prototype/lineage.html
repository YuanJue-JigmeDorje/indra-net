ers": ["史传"], "quote": "在阿阇黎旺泽面前听受了《六加行》、依修、风类等大量法门。在萨迦派上师单巴面前，听受了大发心、道果等萨迦派九种深法。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "龙钦巴嘉玛玖山洞遇妙龄少女得大圆满缘起", "participants": [{"entity": "无垢光尊者", "role": "主体"}], "location": "嘉玛玖山洞", "time_info": "", "layers": ["神变"], "quote": "在嘉玛玖山洞闭黑关五个月期间，有一天，他听到伴随着铙钹奏乐的清脆歌声，举目眺望，遇见一位十六岁的妙龄少女，身著锦缎衣裳、佩带纯金松耳石装饰品，以金璎珞掩面，骑着铃铛装点鞍子的骏马。尊者拽着她的衣襟说：“圣女，请慈悲摄受。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "龙钦巴二十九岁遇革玛燃匝求法", "participants": [{"entity": "无垢光尊者", "role": "受法者"}, {"entity": "持明革玛燃匝", "role": "上师"}], "location": "雅多加深谷", "time_info": "{'text': '二十九岁到桑耶的春天', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "由此，得遇大圆满窍诀法的缘起已经成熟。在二十九岁到桑耶的春天，他遇到了殊胜上师革玛燃匝。上师住在雅多加的深谷。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "授记", "title": "革玛燃匝梦见神鸟授记龙钦巴为传承者", "participants": [{"entity": "持明革玛燃匝", "role": "授记者"}, {"entity": "无垢光尊者", "role": "受授记者"}], "location": "雅多加深谷", "time_info": "", "layers": ["授记"], "quote": "上师说：'昨晚我梦到一只奇特的神鸟，带着成群结队的小鸟而来，将我的所有法本带到了四面八方。看来是来了一位秉持传承者'", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "革玛燃匝以神通知龙钦巴内心免其法税", "participants": [{"entity": "持明革玛燃匝", "role": "主体"}, {"entity": "无垢光尊者", "role": "客体"}], "location": "雅多加深谷", "time_info": "", "layers": ["神变"], "quote": "心里挂记着法税暗想：在上师前，恐怕因交不起法税不得不离开的唯独我一个，白天走实在难为情，明天黎明时要到这个山谷沟头。正在这时，上师以神通发现以后便捎口信给两位僧人说：“他是从内心交法税，所以不要难为他。”尊者喜出望外。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "闭关修行", "title": "革玛燃匝令无垢光尊者连续迁居九次苦修", "participants": [{"entity": "E_P402", "role": "上师"}, {"entity": "E_P401", "role": "弟子"}], "location": "空谷", "time_info": "一年春天", "layers": ["史传"], "quote": "持明革玛燃匝为了激发众弟子心生厌离，而不执著地点，在那一年的春天，从一个空谷搬到另一个空谷，连续迁居九次，每到一处刚刚落脚又需要搬迁，使尊者衣食两空，冬天在极度寒冷的雪山地带，弄得身心疲惫不堪。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "灌顶传法", "title": "无垢光尊者得受大圆满秘密心滴灌顶", "participants": [{"entity": "E_P402", "role": "灌顶师"}, {"entity": "E_P401", "role": "受法者"}], "location": "", "time_info": "苦修那一年", "layers": ["史传"], "quote": "每当下雪时，他就钻进一个牛毛口袋里，这个口袋既作衣服又当坐垫，为了正法历经了诸如此类无法想象的千辛万苦。那一年，他得受了大圆满秘密心滴的灌顶、引导及教授，并加以修行。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "灌顶传法", "title": "革玛燃匝恩赐上灌顶和大圆满三部续教窍诀", "participants": [{"entity": "E_P402", "role": "灌顶师"}, {"entity": "E_P401", "role": "受法者"}], "location": "", "time_info": "第二年", "layers": ["史传"], "quote": "那一年，他得受了大圆满秘密心滴的灌顶、引导及教授，并加以修行。第二年，上师满瓶倾泻恩赐了上灌顶和大圆满三部续教窍诀及护法神修法，并授予他为法太子。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "弘法", "title": "无垢光尊者三十一岁时于尼坡西色弘心滴法", "participants": [{"entity": "E_P401", "role": "subject"}], "location": "E_L401", "time_info": "尊者三十一岁", "layers": ["史传"], "quote": "尊者在六年期间以立誓修行作为供养。三十一岁时，尊者在尼坡西色地方，以心滴法门使众多有缘者得以成熟、解脱。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "灌顶传法", "title": "无垢光尊者三十二岁于青普恩赐心滴教授", "participants": [{"entity": "E_P401", "role": "灌顶师"}], "location": "E_L402", "time_info": "尊者三十二岁", "layers": ["史传"], "quote": "瑜伽行者哦色古恰历经艰辛寻找《空行心滴》的法本给尊者看，与之相应，尊者梦到现巴卓哲玛把经函交给他。第二年也就是尊者三十二岁那一年，他在青普山上修行期间，为八位有缘分的男女瑜伽行者恩赐了心滴教授。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "阿仲玛（一髻佛母）降神到瑜伽母体内", "participants": [{"entity": "E_N401", "role": "subject"}], "location": "E_L402", "time_info": "有戏灌顶迎请时", "layers": ["神变"], "quote": "第二年也就是尊者三十二岁那一年，他在青普山上修行期间，为八位有缘分的男女瑜伽行者恩赐了心滴教授。在进行有戏灌顶迎请时，阿仲玛（即密咒一髻佛母）护法神现量降神到一位瑜伽母体内，她手舞足蹈。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "金刚亥母亲自降临与无垢光尊者对话", "participants": [{"entity": "E_S401", "role": "subject"}, {"entity": "E_P401", "role": "问法者"}], "location": "E_L402", "time_info": "会供之夜", "layers": ["神变"], "quote": "再有，哦得贡嘉、念青唐拉山神、药神七姊妹等也都来取受食子。身色湛蓝佩带宝饰、骨饰的金刚亥母亲自降临。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "授记", "title": "金刚亥母确认无垢光尊者为帮刚巴仁钦多吉转世", "participants": [{"entity": "E_S401", "role": "授记者"}, {"entity": "E_P401", "role": "受记者"}, {"entity": "E_P415", "role": "前世"}, {"entity": "E_P404", "role": "提问者"}], "location": "E_L402", "time_info": "", "layers": ["神变", "授记"], "quote": "”这时，阿阇黎仁多问：“帮刚巴仁钦多吉住在哪里？”空行母手指上师无垢光尊者说：“就住在这儿。”尊者不解地问：“他的下一世不是转生在哦塘地方吗？怎么是我呢？”金刚亥母说：“并不是那样转生的，中间原本必然往生到报身刹土，阿阇黎仁钦多吉开取伏藏以后，本来如果在几年当中秘密修行，则能为自利修炼光明报身的妙力，同时也能为他众带来广大的利益。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "授记", "title": "金刚亥母授记无垢光尊者未来修行路径", "participants": [{"entity": "E_S401", "role": "授记者"}, {"entity": "E_P401", "role": "受记者"}], "location": "E_L402", "time_info": "", "layers": ["授记"], "quote": "”尊者问：“我能成就无余虹身吗？”空行母回答：“如果只身一人修行，现在就能成就。倘若利益他众就在中阴解脱。依靠幻化在哦塘地方受生，利益有情，再前往到西方邬金示现成佛。”尊者又问：“对我饶益众生来说，《布玛心滴》、《空行心滴》二者中哪个更有利？”空行母说：“两者同样有利，《布玛心滴》最多住世一百年，《空行心滴》住世五百年，从现在开始算。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "授记", "title": "金刚亥母预言《空行心滴》住世五百年", "participants": [{"entity": "E_S401", "role": "授记者"}, {"entity": "E_B401", "role": "授记对象"}, {"entity": "E_B402", "role": "参照对比"}], "location": "", "time_info": "", "layers": ["授记"], "quote": "”尊者又问：“对我饶益众生来说，《布玛心滴》、《空行心滴》二者中哪个更有利？”空行母说：“两者同样有利，《布玛心滴》最多住世一百年，《空行心滴》住世五百年，从现在开始算。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "授记", "title": "金刚亥母明确说出哦塘伏藏山谷", "participants": [{"entity": "E_S401", "role": "授记者"}, {"entity": "E_P401", "role": "受记者"}], "location": "E_L403", "time_info": "", "layers": ["授记"], "quote": "”尊者问：“心滴法是否在多吉耶卓玛所在处开启？”空行母说：“那里是空行自然集聚的地方，因此必须在那里开取。”金刚亥母又明确地说出哦塘伏藏的山谷。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "无垢光尊者唱金刚歌，空行景象融入上师", "participants": [{"entity": "E_P401", "role": "subject"}], "location": "E_L402", "time_info": "金刚亥母对话后", "layers": ["神变"], "quote": "”\n上师听到此言不禁心情激动，站起身来，兴奋地高唱金刚歌：“今生安乐后世乐，认识中阴本面乐，现今由乐至安乐，道歌供养三宝尊，愿生欢喜空行众。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "莲花生大士从西南方降临融入无垢光尊者", "participants": [{"entity": "E_S402", "role": "显现者"}, {"entity": "E_P401", "role": "受者"}], "location": "", "time_info": "二十八日", "layers": ["神变"], "quote": "”众人都目睹了空行不可思议的景象，这一切最终都融入上师自己，上师他有时也变成报身……二十八日那一天，无垢光尊者又亲眼看到莲花生大士从西南方降临，只见他身色又明又亮，身披锦缎大氅，头戴鹿耳帽，被无量眷属团团环绕着，融入上师他自己。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "空行母于空中为无垢光尊者作供养并唱偈", "participants": [{"entity": "E_P401", "role": "受供者"}], "location": "", "time_info": "二十八日当晚", "layers": ["神变"], "quote": "当天晚上，身佩骨饰的空行母在空中来来往往，对上师无垢光尊者作供养，三位紫黑色的女人一边翩翩起舞一边说：“我们来自大乐处，探望有缘之弟子，来观誓言清净者，利益有情善男子。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "多吉耶卓玛白母七姐妹降临请尊者到其处所", "participants": [{"entity": "E_N404", "role": "subject"}, {"entity": "E_G406", "role": "subject"}, {"entity": "E_P401", "role": "受请者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "”“住唯一心之禅师，不执一心随意置，心散是空住亦空，显现皆是智游舞……”当时，多吉耶卓玛白母七姐妹降临向无垢光尊者请求说：“请到我的处所。”上师说：“贵处是我平常就想安住的地方。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "金刚亥母与多吉耶卓玛身份辨识", "participants": [{"entity": "E_S401", "role": "subject"}, {"entity": "E_N404", "role": "被混淆者"}, {"entity": "E_P401", "role": "提问者"}], "location": "E_L410", "time_info": "", "layers": ["神变"], "quote": "尊者便问：'那你不是多吉耶卓玛吗？'空行母说：'不是不是，是金刚亥母，你没有认出来吗？'", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "授记", "title": "金刚亥母开示修行要诀", "participants": [{"entity": "E_S401", "role": "开示者"}, {"entity": "E_P401", "role": "受教者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "空行母说：'分别念坚固有什么用？要直指为本解脱广大界。'", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "弘法", "title": "哦色古恰取回《空行心滴》法本途中现瑞相", "participants": [{"entity": "E_P403", "role": "subject"}, {"entity": "E_P401", "role": "派遣者"}], "location": "E_L406 → E_L407", "time_info": "上弦月十一日", "layers": ["史传", "神变"], "quote": "”后来，在某个上弦月的十一日，无垢光尊者派瑜伽士哦色古恰去取法本，在回来的路上，看到一束彩虹射到法本上并一直萦绕盘旋着。尤其是当他到达则卡达多佛塔附近名为富岩地方的晚上，从热姆坚地方一直到此地之间由五色彩虹连接起来，这是众位男女瑜伽行者有目共睹的。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "弘法", "title": "无垢光尊者开启窍诀《空行心滴》法", "participants": [{"entity": "E_P401", "role": "subject"}], "location": "", "time_info": "举行会供酬补之后", "layers": ["史传", "神变"], "quote": "尤其是当他到达则卡达多佛塔附近名为富岩地方的晚上，从热姆坚地方一直到此地之间由五色彩虹连接起来，这是众位男女瑜伽行者有目共睹的。\n尊者在那里举行会供、酬补等仪式以后开启了窍诀《空行心滴》法。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "灌顶传法", "title": "益西措嘉六天中为尊者介绍《空行心滴》句义", "participants": [{"entity": "E_P409", "role": "传法者"}, {"entity": "E_P401", "role": "受法者"}], "location": "", "time_info": "六天", "layers": ["神变"], "quote": "特别是，益西措嘉空行母在六天之中亲自现身于尊者前，对《空行心滴》的句义比喻加以介绍，并作了交付印持，观想、直指方式及讲解的方式实在是殊妙绝伦，前所未闻。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "南哲热玛德护法神降临作伏藏授记", "participants": [{"entity": "E_N405", "role": "subject"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "南哲热玛德护法神亲自到来说：“为什么不给我献食子？造成我长期困难。”说完明确地阐述了自己主尊眷属们的现证，作了伏藏授记，并大显神变。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "灌顶传法", "title": "益西措嘉以净相手持宝瓶赐灌顶", "participants": [{"entity": "E_P409", "role": "灌顶者"}, {"entity": "E_P401", "role": "受法者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "无垢光尊者说道：“开启我内光明伏藏品，岩石缝中伏藏无所需，有伏藏可无有亦可以，具缘者可非具亦可以，法尽心尽瑜伽士之前，你护伏藏无需夸功勋。”尊者在进行密法与珍宝秘密直指之际，众人看到空行母益西措嘉手持宝瓶赐予灌顶，于是纷纷起立顶礼膜拜。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "阿仲玛再次降神跳舞；单坚请尊者光临邬金堡", "participants": [{"entity": "E_N401", "role": "subject"}, {"entity": "E_N402", "role": "subject"}, {"entity": "E_P401", "role": "受请者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "到了晚上阿仲玛护法神（即一髻佛母）降临跳起舞来。上师问：“我如此宣讲心滴法，你们护法和空行高兴吗？”阿仲玛回答说：“只有莲花生大士和益西措嘉能这般宣讲，其他人怎么会知晓这样，真是稀奇！总体来说空行皆大欢喜，特别是在邬金堡的一位虔诚祈祷者更为喜出望外。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "灌顶传法", "title": "《空行心滴》灌顶引导全部圆满结束", "participants": [{"entity": "E_P401", "role": "subject"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "”《空行心滴》的灌顶、引导全部圆满结束的晚上，无垢光尊者对弟子们说：“从昨天开始诸位空行母赐予悉地，看看今天晚上会不会还来，酒里加些水。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "南哲玛降临劝阻尊者前往耶卓玛处", "participants": [{"entity": "E_N405", "role": "subject"}, {"entity": "E_P401", "role": "受劝者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "当尊者满口答应时，她显得非常高兴，说：“我先行一步。”南哲玛降临后说：“上师不要去。”尊者说：“我对你们非人如此讲经说法还不理解，欢不欢喜都是心的幻现，我想到哪里都可以。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "弘法", "title": "尊者在刚日托嘎邬金堡抉择《空行心滴》", "participants": [{"entity": "E_P401", "role": "subject"}, {"entity": "E_P403", "role": "祈请者"}], "location": "E_L404", "time_info": "", "layers": ["史传", "神变"], "quote": "”于是尊者来到刚日托嘎邬金堡光明云乐园，经瑜伽士哦色古恰祈祷而抉择了《空行心滴》，当时，空中布满彩虹，空行景象和神变无穷无尽，这是众人有目共睹的事实。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "授记", "title": "布玛莫札亲现尊颜预言心滴法传承", "participants": [{"entity": "E_P408", "role": "授记者"}, {"entity": "E_P401", "role": "受记者"}, {"entity": "E_P410", "role": "被授记者"}], "location": "", "time_info": "", "layers": ["神变", "授记"], "quote": "达到了光明顿超捷径中觉性如量的境界时，他始终安住在相续瑜伽中，面见无量本尊，特别是阿阇黎布玛莫札亲现尊颜而预言说：“将我的此心滴法汇集成简明易懂的精髓传给革玛燃匝的转世、你的弟子云讷桑吉，以后也会涌现出鼻子上带有阿标帜、名字中有云讷的七位大德，受持弘扬此法。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "灌顶传法", "title": "布玛莫札传授《上师心滴如意宝》", "participants": [{"entity": "E_P408", "role": "传法者"}, {"entity": "E_P401", "role": "受法者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "达到了光明顿超捷径中觉性如量的境界时，他始终安住在相续瑜伽中，面见无量本尊，特别是阿阇黎布玛莫札亲现尊颜而预言说：“将我的此心滴法汇集成简明易懂的精髓传给革玛燃匝的转世、你的弟子云讷桑吉，以后也会涌现出鼻子上带有阿标帜、名字中有云讷的七位大德，受持弘扬此法。”并传授了具三十五法部的《上师心滴如意宝》，接着布玛莫札用契克印指向哦日夏殿堂，而授记说“有朝一日必须修缮它”。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "授记", "title": "布玛莫札授记修缮哦日夏殿堂", "participants": [{"entity": "E_P408", "role": "授记者"}, {"entity": "E_P401", "role": "受记者"}], "location": "E_T402", "time_info": "", "layers": ["授记"], "quote": "达到了光明顿超捷径中觉性如量的境界时，他始终安住在相续瑜伽中，面见无量本尊，特别是阿阇黎布玛莫札亲现尊颜而预言说：“将我的此心滴法汇集成简明易懂的精髓传给革玛燃匝的转世、你的弟子云讷桑吉，以后也会涌现出鼻子上带有阿标帜、名字中有云讷的七位大德，受持弘扬此法。”并传授了具三十五法部的《上师心滴如意宝》，接着布玛莫札用契克印指向哦日夏殿堂，而授记说“有朝一日必须修缮它”。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "建寺", "title": "无垢光尊者修复哦日夏殿堂并降伏鬼神", "participants": [{"entity": "E_P401", "role": "subject"}, {"entity": "E_N402", "role": "助手（化为小孩）"}], "location": "E_T402", "time_info": "", "layers": ["史传", "神变"], "quote": "单坚护法神化现为一个佩带松石耳环的小孩每天帮助修建，当时有两块长形的大石碑倒在地上，人们使尽周身解术也无法把它们立起来，当时尊者给护法神供施食子，念诵谛实语，猛烈抖动法衣，石碑当下就立了起来。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "经堂开光时释迦佛弥勒菩萨十六罗汉显现", "participants": [{"entity": "E_S404", "role": "显现者"}, {"entity": "E_S403", "role": "显现者"}, {"entity": "E_S405", "role": "显现者"}], "location": "E_T402", "time_info": "", "layers": ["神变"], "quote": "最后，所有的天灵盖鬼神又被压在佛塔下。在经堂开光时，显现出许多神奇的身庄严：释迦佛、弥勒菩萨、十六罗汉面带笑容，了然而现。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "授记", "title": "弥勒菩萨授记无垢光尊者最后一世成佛", "participants": [{"entity": "E_S403", "role": "授记者"}, {"entity": "E_P401", "role": "受记者"}], "location": "", "time_info": "", "layers": ["授记"], "quote": "在经堂开光时，显现出许多神奇的身庄严：释迦佛、弥勒菩萨、十六罗汉面带笑容，了然而现。弥勒菩萨举起手指说：“你最后一世在\n莲积刹土成佛，佛号为善逝山王灯幢。”他获得了成佛授记。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "弘法", "title": "无垢光尊者在卫藏多杰吉河两岸传无上密引导", "participants": [{"entity": "E_P401", "role": "subject"}], "location": "E_L411", "time_info": "", "layers": ["史传"], "quote": "”他获得了成佛授记。在卫藏多杰吉河的两岸，尊者为云集于此的信众传授了无上密的引导，与众会一起作了广大会供。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "建寺", "title": "无垢光尊者在不丹哦塘建立解脱洲僧团", "participants": [{"entity": "E_P401", "role": "建立者"}, {"entity": "E_P412", "role": "被任命为住持"}], "location": "E_L403", "time_info": "", "layers": ["史传"], "quote": "于是，尊者来到不丹哦塘地方，在由于缺少佛教的光明而成了顽固不化的此处，调化的范围极广。建立起僧众聚集的僧团，取名为“解脱洲”，任命阿阇黎桑吉根嘎为住持，振兴总的前译派与大圆满的事业。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "无垢光尊者朝觉沃佛像获佛像放光加持", "participants": [{"entity": "E_P401", "role": "朝拜者"}, {"entity": "E_O401", "role": "放光者"}], "location": "E_L416", "time_info": "", "layers": ["神变"], "quote": "为了制止随心所欲恣意行持密宗的人们，尊者在伏藏师的亲传弟子秀嘉哲勒巴面前聆听《空行心滴》的句传。到达拉萨朝拜觉沃佛像时，佛像白毫间放射光芒融入自己的眉间，由此使他回想起曾经在灵鹫山、龟兹国受生为班智达的情景。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "弘法", "title": "无垢光尊者在拉萨大小昭寺之间设法座弘法", "participants": [{"entity": "E_P401", "role": "subject"}], "location": "E_L416", "time_info": "", "layers": ["史传"], "quote": "到达拉萨朝拜觉沃佛像时，佛像白毫间放射光芒融入自己的眉间，由此使他回想起曾经在灵鹫山、龟兹国受生为班智达的情景。在此地，多之又多的僧众列队相迎，在拉萨大昭寺、小昭寺之间设立法座，广转了大发心等法轮。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "降伏非人", "title": "顾巴根仁因伏藏品授记放弃战乱迎请无垢光尊者", "participants": [{"entity": "E_P413", "role": "subject"}, {"entity": "E_P401", "role": "被迎请者"}, {"entity": "E_S409", "role": "授记来源"}], "location": "E_L415", "time_info": "", "layers": ["史传", "授记"], "quote": "哲贡的顾巴根仁为自己的政权骄傲所迷醉，企图发动一场惊天动地的战乱，当他以善习种子看到莲花生大士的伏藏品中授记说“名为哲之地方处，名为根仁魔之子，身上具有兵器纹，死后堕入地狱中，南方文殊菩萨尊，一位化身能调伏”以后，发现自己的身体背部的确有一个形似宝剑的痣，他深知那授记毫无疑问就是指的自己。不禁暗自思量：本来我准备在卫藏、后藏发动一场大战乱，可是如果由此导致堕入地狱，那实在不值得。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "弘法", "title": "无垢光尊者令西藏国君八足狮子恭敬顶戴", "participants": [{"entity": "E_P401", "role": "subject"}, {"entity": "E_P417", "role": "受教者"}, {"entity": "E_P416", "role": "介绍者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "此时，在卫藏傲气十足、从不向别人低头的司徒香切嘉灿对无垢光尊者作为哲贡巴的上师颇为不满。尊者则以无量的大悲事业、智慧与成就的生平事迹，经布达西绕介绍而使西藏的国君八足狮子也毕恭毕敬顶戴。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "弘法", "title": "无垢光尊者五十六岁留下遗嘱《无垢光遗教》", "participants": [{"entity": "E_P401", "role": "subject"}, {"entity": "E_P407", "role": "书记"}], "location": "", "time_info": "水兔年，尊者五十六岁", "layers": ["史传"], "quote": "自然而然见到、听到、接触过他，甚至包括加害他的人都结上了安乐的缘并播下了解脱的种子。水兔年尊者五十六岁时，一次，在为众多有缘弟子赐予能成熟的灌顶与能解脱的教言时，对嘉追作巴说：“拿纸墨来。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "弘法", "title": "无垢光尊者至青普吉祥林间预示圆寂", "participants": [{"entity": "E_P401", "role": "subject"}], "location": "E_L402", "time_info": "", "layers": ["史传"], "quote": "后来，尊者又再度被请到桑耶，在转法轮期间，他经过嘉玛和桑耶来到青普吉祥林间，感慨地说：“这个地方简直与印度的清凉尸林一模一样，在其他地方生存不如在此地死亡，我的这个老朽幻身就留在此处了。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "弘法", "title": "无垢光尊者临终教诫实修直断和顿超", "participants": [{"entity": "E_P401", "role": "subject"}], "location": "", "time_info": "十二月十六日", "layers": ["史传"], "quote": "并且，对众弟子总的传授了一切有为法无有实质，要一心一意修行正法，尤其教诫说：“切要实修直断和顿超，如果有不懂之处，当详细参阅《上师心滴如意宝》，它与满足意愿的宝珠一模一样。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "圆寂", "title": "无垢光尊者于藏历十八日圆寂", "participants": [{"entity": "E_P401", "role": "subject"}], "location": "E_L402", "time_info": "藏历十八日", "layers": ["史传", "神变"], "quote": "尊者说：“那么，我就要扔掉这个衰老的幻身，你们不要吵闹，安静地入定。”说完法体如意宝便以法身坐式安住，专注于本来法界而圆寂。此时也出现大地剧烈震动并且隆隆作响等等无量的奇迹。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "无垢光尊者荼毗时出现舍利等瑞相", "participants": [{"entity": "E_P401", "role": "subject"}], "location": "E_L402", "time_info": "二十五日荼毗", "layers": ["神变"], "quote": "在进行荼毗时，于身语意三金刚本体中证得菩提的象征，尊者的心脏、舌头、眼睛落到有缘者的怀里。由于无余现前所得五身五智而出现了五种金刚舍利及不可胜数的细微舍利。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "授记", "title": "无垢光尊者圆寂后于仁钦彭措前现身授记", "participants": [{"entity": "E_P401", "role": "授记者"}, {"entity": "E_P435", "role": "受记者"}, {"entity": "E_P436", "role": "被授记者"}], "location": "", "time_info": "", "layers": ["神变", "授记"], "quote": "此外，也涌现出桑吉华仁、札巴华、勒堪索南桑给等众多持教善知识。后来，无垢光尊者在法王哲贡巴仁钦彭措前现身并授记：是自子显示头顶马头标帜的化身达瓦的转世灵童。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "弘法", "title": "仁钦彭措受持弘扬无垢光尊者宝典并传给西绕哦色", "participants": [{"entity": "E_P435", "role": "传法者"}, {"entity": "E_P437", "role": "受法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "仁钦彭措对受持、护持、弘扬无垢光尊者的宝典作出了弥足珍贵、不可估量的贡献。他传给莲花补处现达布热巴或者伏藏大师西绕哦色。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "建寺", "title": "仁钦彭措建立吉祥山胜乘洲", "participants": [{"entity": "E_P435", "role": "subject"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他传给莲花补处现达布热巴或者伏藏大师西绕哦色。建立起吉祥山胜乘洲，佛教的施主仲雄吉巴劝请刻《心性休息颂词及注释》，他也教诫说：佛法需要讲修，并亲口承认是受持义传者。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "全知无垢光尊者三次显示智慧身传法给智悲光", "participants": [{"entity": "E_P401", "role": "传法者（智慧身）"}, {"entity": "E_P439", "role": "受法者"}], "location": "E_L402", "time_info": "土兔年", "layers": ["神变"], "quote": "后来，持明者智悲光于土兔年在吉祥密意的青普山洞时，全知无垢光尊者三次显示智慧身，交给他一本经函并且说：“以此来开显《心性休息大车疏》等中隐含的所有窍诀。”赐予所有教授与随教。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "弘法", "title": "第四品终——窍诀心滴历史总结", "participants": [], "location": "", "time_info": "", "layers": ["典据"], "quote": "也可以堪称是最近传承，就像圣天菩萨摄受玛德革巴一样。\n藏密佛教史——天鼓妙音中，藏地内密三续佛法概况，尤其主要阐述窍诀心滴历史第四品终。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "出家受戒", "title": "涅·赞那革玛绕在静命堪布前出家受比丘戒", "participants": [{"entity": "涅·赞那革玛绕", "role": "受戒者"}, {"entity": "静命", "role": "亲教师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他的颈部有一颗形似十字金刚杵的黑痣，为他取名嘉巍罗珠。他长大以后在静命堪布前出家并受了比丘戒。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "译经", "title": "涅·赞那革玛绕翻译大量显密教法", "participants": [{"entity": "涅·赞那革玛绕", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他长大以后在静命堪布前出家并受了比丘戒。翻译了大量显密教法，辩才不可思议。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "涅·赞那革玛绕得受莲花生大士甘露功德坛城灌顶", "participants": [{"entity": "涅·赞那革玛绕", "role": "受者"}, {"entity": "莲花生大士", "role": "灌顶师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "涅·赞那革玛绕得受莲花生大士甘露功德坛城的成熟灌顶，在雅隆西山洞干燥的石头中取出甘泉，由此显然也就有了此法脉传下的《幻化网》。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "涅·赞那革玛绕从干燥石头中取出甘泉", "participants": [{"entity": "涅·赞那革玛绕", "role": "主体"}], "location": "雅隆西巴", "time_info": "", "layers": ["神变"], "quote": "涅·赞那革玛绕得受莲花生大士甘露功德坛城的成熟灌顶，在雅隆西山洞干燥的石头中取出甘泉，由此显然也就有了此法脉传下的《幻化网》。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "涅·赞那革玛绕在住处幻化宝物消除众人怀疑", "participants": [{"entity": "涅·赞那革玛绕", "role": "主体"}], "location": "雅卓", "time_info": "", "layers": ["神变"], "quote": "涅·赞那革玛绕住在雅卓地方时，自己的伯父涅·格敦与他反目成仇，说“这是外道的咒师”，散布流言蜚语，并窃取漆涂抹的托巴里的红色东西给愚笨的人们看，用刀尖挑起托巴里的东西说“这是虚伪的把戏”，进行挑拨离间。为了消除众人的怀疑，涅·赞那革玛绕在住处幻化出宝物。众人知晓他具有神变而不再相信他伯父的话。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "布玛莫札以神变从汉地前来超度天子赞普", "participants": [{"entity": "布玛莫札", "role": "主体"}, {"entity": "天子赞普", "role": "受者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "珠哲穹气急败坏要杀他，涅译师一心专注“逃脱”的意念当中，结果没有被对方发现而脱离困境。当时，国王天子赞普被母后玛坚毒死，在超度他的会众中，布玛莫札大师依靠神变从汉地前来，涅译师上前拜见，献上一袋金粉。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "天子赞普被母后玛坚毒死", "participants": [{"entity": "天子赞普", "role": "受害者"}, {"entity": "玛坚", "role": "施害者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "珠哲穹气急败坏要杀他，涅译师一心专注“逃脱”的意念当中，结果没有被对方发现而脱离困境。当时，国王天子赞普被母后玛坚毒死，在超度他的会众中，布玛莫札大师依靠神变从汉地前来，涅译师上前拜见，献上一袋金粉。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "布玛莫札传授涅译师金刚橛及夏哦降伏法窍诀", "participants": [{"entity": "布玛莫札", "role": "传法者"}, {"entity": "涅·赞那革玛绕", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "”\n布玛莫札大师心想：如果译师遭人轻蔑，那显然对佛法有严重损害，于是他将圆满的金刚橛、夏哦（一种降伏法）这二法的窍诀全盘传授。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "闭关修行", "title": "涅译师和布玛莫札在南岩卡切那山洞修二十一狮子金刚橛法", "participants": [{"entity": "涅·赞那革玛绕", "role": "主体"}, {"entity": "布玛莫札", "role": "主体"}], "location": "南岩卡切那山洞", "time_info": "", "layers": ["史传"], "quote": "在南岩卡切那山洞里，译师-涅·赞那革玛绕和班智达-布玛莫札一起依靠二十一狮子金刚橛法而修行，给果金刚橛相互碰撞发出声响，得以成就。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "降伏非人", "title": "涅译师以金刚橛降伏切夏如及其种族", "participants": [{"entity": "涅·赞那革玛绕", "role": "主体"}, {"entity": "切夏如", "role": "被降伏者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "切夏如的护神化成一头白牦牛来到，涅译师先把它降伏了，接着将切夏如及其上中下三魂狼、奴仆、坐下的马、门前的狗连同母系的亲人，只是以举起金刚橛的威力便降伏而灭了他的种族，随后又要降伏伯父涅·格敦。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "降伏非人", "title": "涅译师以诛法降伏珠哲穹及其护神", "participants": [{"entity": "涅·赞那革玛绕", "role": "主体"}, {"entity": "珠哲穹", "role": "被降伏者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "”总而言之，包括格敦那幻化成鹞鹰的护神、仆人、魂狼、坐下的马、门前的狗连同亲戚在内全部予以降伏，灭绝其种。此外，珠哲穹在草原上放马时，译师将他神识也勾召过来用诛法加以制服，连同他蓝色狼的护神、魂狼、仆人，均一如既往加以降伏。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "涅·赞那革玛绕以明空虹身圆寂", "participants": [{"entity": "涅·赞那革玛绕", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "可以说他的大恩大德令人无法想象。最后，他依靠《耳传金刚桥》及窍诀部证得大成就，以明空虹身而圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "索布·华杰益西以铁匠身份接受涅译师传法后改名为弟子", "participants": [{"entity": "涅·赞那革玛绕", "role": "传法者"}, {"entity": "索布·华杰益西", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他感到万分惊奇，问道：“这样的神变是依靠什么得来的？”涅译师说：“由实修现在传讲的这一法门得来。”他信心百倍，供养了一切工具而作为弟子，改名为拉·华杰益西。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "涅译师吞铁条示现神变", "participants": [{"entity": "涅·赞那革玛绕", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "当讲事部、行部、瑜伽部三部时，他稍稍听了一点儿，并把铁锤敲得钉铛作响。涅译师在讲内三续部的同时，将捻匀的铁条全部吞下去。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "降伏非人", "title": "护法神降伏涅·格敦", "participants": [{"entity": "涅·格敦", "role": "被降伏者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "他将此梦讲给妻子听，妻子竭力劝他取消此事，但他依然不听，骑上马扬长而去，行途中一只大鸟突然飞起，马惊慌而逃，他血肉模糊。就这样，涅·格敦被护法神亲自降伏了。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "赤松德赞圆寂", "participants": [{"entity": "赤松德赞", "role": "主体"}], "location": "", "time_info": "{'text': '涅·赞那革玛绕的上师时期', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "涅大师主要是依靠修金刚橛而证得成就。赤松德赞圆寂以后，王妃才帮匝萨心行刚强难化，使大多数的译师、班智达威望降低。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "索布·华杰益西将传承授予努钦", "participants": [{"entity": "索布·华杰益西", "role": "传法者"}, {"entity": "努·桑吉益西", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "此时，他知道为了上师宁舍生身性命的金刚誓言，于是杀了两名监守，把大师从狱中营救出来，就这样三次制伏大师的冤家，并得到大师三次意摄受。上师亲自幻化金刚橛坛城而摄受，他仅此便获得本义，并将传承授予努钦。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "索布·华杰益西三次杀监守救涅译师出狱", "participants": [{"entity": "索布·华杰益西", "role": "主体"}, {"entity": "涅·赞那革玛绕", "role": "被救者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "此时，他知道为了上师宁舍生身性命的金刚誓言，于是杀了两名监守，把大师从狱中营救出来，就这样三次制伏大师的冤家，并得到大师三次意摄受。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "涅译师幻化金刚橛坛城摄受索布·华杰益西", "participants": [{"entity": "涅·赞那革玛绕", "role": "灌顶师"}, {"entity": "索布·华杰益西", "role": "受者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "此时，他知道为了上师宁舍生身性命的金刚誓言，于是杀了两名监守，把大师从狱中营救出来，就这样三次制伏大师的冤家，并得到大师三次意摄受。上师亲自幻化金刚橛坛城而摄受，他仅此便获得本义，并将传承授予努钦。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "努·桑吉益西在莲花生大士前听受《八大法行》灌顶", "participants": [{"entity": "努·桑吉益西", "role": "受者"}, {"entity": "莲花生大士", "role": "灌顶师"}], "location": "", "time_info": "{'text': '幼年时', 'relative_to': '努·桑吉益西 (E_533)', 'absolute': None}", "layers": ["史传"], "quote": "按照《持明集根本续》中“桑吉益西如意宝，尤其示现身之密”的授记，他在幼年时在莲花生大士前听受《八大法行》的灌顶时，选择本尊的鲜花击上妙吉祥身坛城，他通过修行而明显现前成就相。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "密主金刚手菩萨赐予努·桑吉益西名称灌顶", "participants": [{"entity": "密主金刚手菩萨", "role": "灌顶师"}, {"entity": "努·桑吉益西", "role": "受者"}], "location": "金刚座", "time_info": "", "layers": ["神变"], "quote": "关于努·桑吉益西成就的情况：他在耶杰多吉古哦修行九个月，解脱心相续而抉择了实相；他在金刚座和永仲宝藏地时，密主金刚手菩萨亲自显现尊颜，手中的标帜金刚落到他的手里，赐予名称灌顶；在沃莫玛园，寻香崽赞他为“佛陀”；在刚桑，受到夜叉供养；在九洲湖边受到龙崽三兄弟供养受用；在尸陀林，饿鬼崽顶礼其足；在沃玛园，雅门达嘎（即大威德）显露容颜赐予灌顶和悉地。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "雅门达嘎在沃玛园赐予努·桑吉益西灌顶和悉地", "participants": [{"entity": "雅门达嘎", "role": "灌顶师"}, {"entity": "努·桑吉益西", "role": "受者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "关于努·桑吉益西成就的情况：他在耶杰多吉古哦修行九个月，解脱心相续而抉择了实相；他在金刚座和永仲宝藏地时，密主金刚手菩萨亲自显现尊颜，手中的标帜金刚落到他的手里，赐予名称灌顶；在沃莫玛园，寻香崽赞他为“佛陀”；在刚桑，受到夜叉供养；在九洲湖边受到龙崽三兄弟供养受用；在尸陀林，饿鬼崽顶礼其足；在沃玛园，雅门达嘎（即大威德）显露容颜赐予灌顶和悉地。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "诶嘎匝哲给努·桑吉益西悉地物令其显现法界智慧", "participants": [{"entity": "诶嘎匝哲", "role": "授予者"}, {"entity": "努·桑吉益西", "role": "受者"}], "location": "桑隆那波", "time_info": "", "layers": ["神变"], "quote": "他自在慑服一切鬼神，成为密咒之主，空行自在阎罗女交给他作为护法神。按照文殊授记，在印度桑隆那波尸陀林，诶嘎匝哲（即一髻佛母）给他悉地物，由此显现法界智慧，现前大果位的证悟。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "努·桑吉益西在瓦色达绕面前得受灌顶及教授", "participants": [{"entity": "瓦色达绕", "role": "传法者"}, {"entity": "努·桑吉益西", "role": "受者"}], "location": "", "time_info": "{'text': '五十四岁木蛇年', 'relative_to': '努·桑吉益西 (E_533)', 'absolute': None}", "layers": ["史传"], "quote": "先后七次前往印度尼泊尔地方，翻译了大量的续、窍诀和护法仪轨。尤其在五十四岁木蛇年，到达尼泊尔，在瓦色达绕面前得受了不可计数的灌顶及教授。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "努·桑吉益西在鹿野苑听受婆罗门色瓦坚传法", "participants": [{"entity": "婆罗门色瓦坚", "role": "传法者"}, {"entity": "努·桑吉益西", "role": "受者"}], "location": "鹿野苑", "time_info": "", "layers": ["史传"], "quote": "”按照尊者所说他来到印度，在鹿野苑，见到阿匝雅色瓦坚尊颜，请求了许多法要，尤其是也听受了《经部·集密意续》的圆满灌顶及教言。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "闭关修行", "title": "努·桑吉益西在耶杰多吉古哦修行九个月", "participants": [{"entity": "努·桑吉益西", "role": "主体"}], "location": "耶杰多吉古哦", "time_info": "{'text': '九个月', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "关于努·桑吉益西成就的情况：他在耶杰多吉古哦修行九个月，解脱心相续而抉择了实相；他在金刚座和永仲宝藏地时，密主金刚手菩萨亲自显现尊颜，手中的标帜金刚落到他的手里，赐予名称灌顶；在沃莫玛园，寻香崽赞他为“佛陀”；在刚桑，受到夜叉供养；在九洲湖边受到龙崽三兄弟供养受用；在尸陀林，饿鬼崽顶礼其足；在沃玛园，雅门达嘎（即大威德）显露容颜赐予灌顶和悉地。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "努·桑吉益西在尼莫雪卡以猛咒降伏军兵", "participants": [{"entity": "努·桑吉益西", "role": "主体"}], "location": "尼莫雪卡", "time_info": "", "layers": ["神变"], "quote": "”大师从法衣的吊边处取出降香金刚橛，借助所有护法神的誓言，摇晃金刚橛指向军人所在的山上，结果山上燃起熊熊烈火，将所有军兵烧得片甲不留。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "努·桑吉益西以契克印在朗达玛面前示现黑色铁蝎", "participants": [{"entity": "努·桑吉益西", "role": "主体"}, {"entity": "朗达玛", "role": "观者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "”说完以契克印指向空中。只见在契克印的上面，有一个九层牦牛大的黑色铁蝎。国王吓得心惊胆战，连声说：“绝不危害三宝的咒师，要行持正法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "努·桑吉益西以契克印使霹雳击碎对面山岩", "participants": [{"entity": "努·桑吉益西", "role": "主体"}, {"entity": "朗达玛", "role": "观者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "”大师又说：“再看看这个威力。”说罢用契克印使霹雳巨响，击中对面山岩，石成碎块。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "毁灭佛教", "title": "朗达玛毁灭佛教", "participants": [{"entity": "朗达玛", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他把藏地中部内札杰扬宗作为修行地点的核心，本想一心居于静处修行，可当时正值国法毁灭、部落冲突十分猖獗之际，努钦师徒也饱尝艰辛，尤其是前一世在印度转生为现巴玛热则，利益众生的所化领域剩余的无余在此世圆满。在此藏地，以国王的侄子朗达玛毁坏佛法为主，佛教先后出现了重重损害，大师用猛咒制伏他们，以保护佛法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "拉隆·华杰多吉降伏朗达玛", "participants": [{"entity": "拉隆·华杰多吉", "role": "主体"}, {"entity": "朗达玛", "role": "被降伏者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "对于朗达玛毁灭佛教的恶行，努氏桑杰益西大师感到忍无可忍，他本打算将许多灵验的猛咒准备好来结果他的性命，再以现行大悲超度，但恶行国王已被拉隆·华杰多吉降伏了。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "伏藏埋藏", "title": "努·桑吉益西伏藏猛咒", "participants": [{"entity": "努·桑吉益西", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "大师担心猛咒被乱用，于是将它伏藏起来，撰著了《集密意续大疏·黑暗铠甲》、《说难断之利刃》、《幻化网八十颂现观释》及大圆满窍诀《禅定目灯》等论典，依靠讲修的事业使生起次第、圆满次第和大圆满的教法普遍整个人间。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "努·桑吉益西撰著多部论典", "participants": [{"entity": "努·桑吉益西", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "大师担心猛咒被乱用，于是将它伏藏起来，撰著了《集密意续大疏·黑暗铠甲》、《说难断之利刃》、《幻化网八十颂现观释》及大圆满窍诀《禅定目灯》等论典，依靠讲修的事业使生起次第、圆满次第和大圆满的教法普遍整个人间。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "努·桑吉益西以虹身圆寂", "participants": [{"entity": "努·桑吉益西", "role": "主体"}], "location": "", "time_info": "{'text': '水虎年，住世一百一十三年', 'relative_to': '努·桑吉益西 (E_533)', 'absolute': None}", "layers": ["史传"], "quote": "很显然，他在朗达玛毁灭佛教以后又住世了四十二年。在人间共住了一百一十三年，最终由经自性大圆满道而任运成就虹身，趣入涅槃。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "努·桑吉益西在札地以大威德猛咒摧毁城区", "participants": [{"entity": "努·桑吉益西", "role": "主体"}], "location": "", "time_info": "{'text': '六十一岁时', 'relative_to': '努·桑吉益西 (E_533)', 'absolute': None}", "layers": ["神变"], "quote": "”在他六十一岁时，札地发生叛乱，他用大威德锐利无比的猛咒，摧毁了许多城区，再度逃回努境容地，可是那里也无容身之地，于是他便占领了尼莫雪卡。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "达那达拉修夜叉母神足被送到云丹嘉措面前", "participants": [{"entity": "达那达拉", "role": "主体"}, {"entity": "克隆巴·云丹嘉措", "role": "受者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "云丹嘉措\n前世就与上师（大努·桑吉益西）结为父子关系的云丹嘉措出生在努克隆地方，他前世的兄长印度的达那达拉修行夜叉母之神足，结果虽然成就了，可是由于羽翼断了而没有能力。又再度修行一个神足，结果夜叉母怀里带着达那达拉在一个晚上就送到了克隆巴·云丹嘉措面前。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "达那达拉为云丹嘉措灌顶并传法", "participants": [{"entity": "达那达拉", "role": "传法者"}, {"entity": "克隆巴·云丹嘉措", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "为他灌顶……传给他《红黑阎罗护法》、《阎罗母续》等法要", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "努·桑吉益西摄受云丹嘉措为弟子并传授所有教法", "participants": [{"entity": "努·桑吉益西", "role": "传法者"}, {"entity": "克隆巴·云丹嘉措", "role": "受者"}], "location": "那杰秀", "time_info": "{'text': '云丹嘉措三十岁时', 'relative_to': '克隆巴·云丹嘉措 (E_568)', 'absolute': None}", "layers": ["史传"], "quote": "云丹嘉措到了三十岁时，有一次去打猎，见到住在那杰秀地方的阿阇黎桑吉益西，桑吉益西知晓他与自己有同一母系的缘分，于是摄受他为弟子，完整无缺地恩赐了灌顶、续部、窍诀及零散的护法事业，传授了所有教法的精华与智慧的精髓。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "云丹嘉措大显神变击退百余名刽子手", "participants": [{"entity": "克隆巴·云丹嘉措", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "当时在当地也发生了战乱，云丹嘉措被一百多刽子手团团包围之际，他大显神变，右眼冒火，左眼流水，使敌人目瞪口呆，不敢正视，他们只有丢盔卸甲地逃之夭夭。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "益西嘉措得父亲云丹嘉措满瓶倾注传授所有法门", "participants": [{"entity": "克隆巴·云丹嘉措", "role": "传法者"}, {"entity": "益西嘉措", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "由于智慧、信心、精进的行为超群，而得到上师的智慧密意，上师授予他成为一切经续窍诀之教主的灌顶，所有灌顶藏的精华均已滴\n入他的相续，父亲所拥有的所有法门，以满瓶倾注的方式传授给他。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "班玛旺嘉以降香金刚橛使河水返流", "participants": [{"entity": "班玛旺嘉", "role": "主体"}], "location": "卫藏", "time_info": "", "layers": ["神变"], "quote": "班玛旺嘉益西嘉措的弟弟——班玛旺嘉，修成了大威德，使业阎罗王供养命心（听其吩咐），在卫藏，有一江河暴涨，他把降香金刚橛插入，结果一天当中，一靶子范围内河水一直源源不断返流。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "拉吉吽穹为米拉日巴传授猛咒", "participants": [{"entity": "拉吉吽穹", "role": "传法者"}, {"entity": "米拉日巴", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "诸如此类的诛法事业无碍威力，谁也无法与之相抗衡。\n拉吉吽穹益西嘉措的儿子拉吉吽穹，为至尊米拉日巴传授了猛咒，由此他咒力的大名远远传扬。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "建寺", "title": "酿·西绕秋建造多拉雄经堂", "participants": [{"entity": "酿·西绕秋", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "拉吉吽穹益西嘉措的儿子拉吉吽穹，为至尊米拉日巴传授了猛咒，由此他咒力的大名远远传扬。他的弟子中，独占鳌头的是酿·西绕秋，他对生起次第、圆满次第、大圆满法门无所不通，建起了多拉雄经堂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "酿·西绕秋在哈沃古岩山面见金刚橛坛城", "participants": [{"entity": "酿·西绕秋", "role": "主体"}], "location": "哈沃古岩山", "time_info": "", "layers": ["神变"], "quote": "他的弟子中，独占鳌头的是酿·西绕秋，他对生起次第、圆满次第、大圆满法门无所不通，建起了多拉雄经堂。在哈沃古岩山上修行时，面见金刚橛坛城。把金刚橛击在岩石上就像击在泥中一样完全融入，有诸如此类的众多成就事迹。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "大宿·释迦炯内在贡巴绕色座下受比丘戒", "participants": [{"entity": "大宿·释迦炯内", "role": "受戒者"}, {"entity": "贡巴绕色", "role": "亲教师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他在父亲面前学习读写文字，并得受了《幻化网》及零星的窍诀。在贡巴绕色大师座下，以三白次第授法受了比丘戒。上师说：这\n是一位化身，因此不需要更名。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "大宿在美波仁钦嘉措面前听受显宗三藏及密续", "participants": [{"entity": "美波仁钦嘉措", "role": "传法者"}, {"entity": "大宿·释迦炯内", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他又在美波仁钦嘉措面前听受了显宗三藏、事续、《摧破金刚》、《大日如来》、《幻化网》、《吉祥首胜续》，并且对内密的窍诀方便道等也了如指掌。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "大宿从康区前往达木途中两位天子指路", "participants": [{"entity": "大宿·释迦炯内", "role": "受者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "他说：“骑上风脉的骏马，穿上绝地火的衣裳，带着教言的伴侣，由信心作为向导，越过多康地区临近抵至达木地方。”正如这里所说，当他从康区前往达木的路途中，迷失方向，这时从云隙中出来两位天子给他指路，就这样他平安到达卫藏。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "大宿从秋隆杰酿·益西炯内处得《幻化网》与心部", "participants": [{"entity": "秋隆杰酿·益西炯内", "role": "传法者"}, {"entity": "大宿·释迦炯内", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在给贡的吉夏秋面前听受了《甘露药修法》。一般来说，大宿有多位上师，尤其是，从秋隆杰酿·益西炯内那里得到了宿氏有缘的法《幻化网》与心部。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "大宿从多位上师处得受《经部·集密意续》传承及灌顶", "participants": [{"entity": "南卡德", "role": "传法者"}, {"entity": "耶敦索南释迦", "role": "传法者"}, {"entity": "东擦香切", "role": "传法者"}, {"entity": "嘉敦罗珠", "role": "传法者"}, {"entity": "噶多益西酿波", "role": "传法者"}, {"entity": "大宿·释迦炯内", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "起初，他在南卡德面前得受了《经部·集密意续》及大圆满窍诀，在耶色杰年那旺札和吉释迦嘉灿座下得受了秘密灌顶及方便道。在酿多杰追措穹面前听受了本来清净与任运自成、《幻化道次第》。在青普的如·释迦炯和丹玛西策面前，听闻真实意。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "闭关修行", "title": "大宿在鸱枭谷修行真实意九本尊现量见吉祥黑日嘎", "participants": [{"entity": "大宿·释迦炯内", "role": "主体"}], "location": "鸱枭谷", "time_info": "", "layers": ["神变"], "quote": "此后的一次，诸空行授记：“到萨玛地方广泛利益众生。”于是他来到黑马山谷，在有猫头鹰穴、洞口朝向东方的一个山洞里修行真实意九本尊，结果现量见到了吉祥黑日嘎真颜。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "大宿派遣桑古西绕嘉波去如·释迦炯处求法", "participants": [{"entity": "大宿·释迦炯内", "role": "派遣者"}, {"entity": "桑古西绕嘉波", "role": "使者"}, {"entity": "如·释迦炯", "role": "传法者"}], "location": "青普", "time_info": "", "layers": ["史传"], "quote": "”说完脚不触地面离去。于是大宿派遣桑古西绕嘉波带着一头骡子驮着供品前去求法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "如·释迦炯为桑古赐予六十二坛城灌顶", "participants": [{"entity": "如·释迦炯", "role": "灌顶师"}, {"entity": "桑古西绕嘉波", "role": "受者"}], "location": "青普", "time_info": "", "layers": ["史传"], "quote": "”上师为桑古赐予了《佛陀平等行续》、真实意自他十二坛城连同金刚橛等共有六十二坛城的灌顶，他获得了所有随授的法本与传\n承，回到桑耶之时，发现驮子上面有一个头上披着半月形绫罗披风的童子。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "授记", "title": "空行母授记大宿前往也热香地修行", "participants": [{"entity": "大宿·释迦炯内", "role": "受者"}], "location": "", "time_info": "", "layers": ["授记"], "quote": "有一次，三位空行母来到上师面前授记说：“在也热香地达香河的东面有一个半圆形的山谷，沟头岩石形似心脏，沟尾平坦犹如摩登伽女的皮肤一般，山形宛若大象的鼻子，岩石像狮子的头盖骨。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "闭关修行", "title": "大宿师徒在香地多年修行面见寂忿本尊", "participants": [{"entity": "大宿·释迦炯内", "role": "主体"}, {"entity": "小宿·西绕札巴", "role": "主体"}], "location": "香地", "time_info": "", "layers": ["神变"], "quote": "当地七个部落的民众供养承侍他们，主要施主由札巴温仲巴担当，他把上师看作真佛。就这样，在那里经过多年修行，上师面见四十二位寂静本尊与五十（八）位忿怒本尊。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "建寺", "title": "大宿·释迦炯内建造鸱枭谷寺", "participants": [{"entity": "大宿·释迦炯内", "role": "主体"}, {"entity": "小宿·西绕札巴", "role": "协助者"}], "location": "鸱枭谷", "time_info": "", "layers": ["史传"], "quote": "用上师的名字给寺院起名，于是就叫吉祥鸱枭谷寺。它是在拉吉大宿时期创立、小宿加以开拓、宿·释迦桑给发扬光大，这一法嗣对前译金刚乘法作出了巨大贡献。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "大宿以脚搓修正建寺木料", "participants": [{"entity": "大宿·释迦炯内", "role": "主体"}], "location": "鸱枭谷", "time_info": "", "layers": ["神变"], "quote": "可是，这位菩萨怀着修习布施的心态，而没有被悭吝的分别妄念所动，将财物视为如梦如幻，一根大柱截断得不够长，他示现用脚搓使之长短合适，同样他用脚搓那些弯弯曲曲的柱子，结果都如箭一样笔直。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "珠日神山地神骑黑马前来供养黄金", "participants": [{"entity": "大宿·释迦炯内", "role": "受者"}], "location": "鸱枭谷", "time_info": "", "layers": ["神变"], "quote": "”说完就作垂念，结果在深更半夜时，神山的地神骑着一匹黑马前来，顶礼转绕大宿上师以后说：“如果殿堂顶部全要镀金，我的金子恐怕已用得精光，如果所有佛像镀全金，我可以供养。”于是就这样做了。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "开光", "title": "大宿和小宿在鸱枭谷寺开光时大显神变", "participants": [{"entity": "大宿·释迦炯内", "role": "主体"}, {"entity": "小宿·西绕札巴", "role": "主体"}], "location": "鸱枭谷", "time_info": "", "layers": ["神变"], "quote": "当举行开光仪式时，大宿、小宿二位尊者大显神变，从诸部之主毗卢遮那佛的头顶进去从心间出来，从心间进去从头顶出来等等，显现无尽的变化。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "大宿加持泉眼在七天中出酥油汁", "participants": [{"entity": "大宿·释迦炯内", "role": "主体"}], "location": "扬温色莫", "time_info": "", "layers": ["神变"], "quote": "一次，师徒众人在扬温色莫进行“真实意”本尊法的年修，结果酥油已用完而无法供灯，上师加持泉眼在七天之中出酥油汁，酥油汁取之不尽。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "降伏非人", "title": "大宿降伏觉母那玛", "participants": [{"entity": "大宿·释迦炯内", "role": "主体"}, {"entity": "觉母那玛", "role": "被降伏者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "上师给他传授居士戒，吩咐他保护佛法。在下山的途中，大师也降伏了觉母那玛，随后到了意热塔（也有版本中是意色塔）地方。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "小宿搬运八块大磐石作为练力巨石", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}], "location": "鸱枭谷", "time_info": "", "layers": ["神变"], "quote": "当他们用餐完毕返回时，看见不用说是用力撑起就是动摇也无能为力的八块大磐石已安放在地基的四面八方，上面用白石灰写着“小宿的练力巨石”，诸位僧人的傲气顿时削减，变得公平正直，而生起信解。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "小宿一呼吸中弄直四根弯曲柱子", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}], "location": "鸱枭谷", "time_info": "", "layers": ["神变"], "quote": "到了排列木料的时候，有四根柱子弯弯曲曲，上师说：“这要由小宿来弄直。”小宿在一呼吸中作了前俯后仰的一个缘起后柱子变得像箭一样挺直。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "小宿在扬温色莫修行时见香地禅房上的因黑日嘎", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}], "location": "扬温色莫", "time_info": "", "layers": ["神变"], "quote": "此后，大宿上师一直在鸱枭谷培养弟众，并创办了大规模的讲经院与修行院。小宿尊者在扬温色莫修行真实意本尊时，看见香地的禅房房梁上，清清楚楚地有一尊一面二臂的因黑日嘎。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "大宿入黑日嘎等持显现为真正的黑日嘎", "participants": [{"entity": "大宿·释迦炯内", "role": "主体"}], "location": "鸱枭谷", "time_info": "", "layers": ["神变"], "quote": "他又对侍者说：“我们要搜寻建佛殿的物资，我们要调伏地神。”于是，他们到狮子岩顶上安住，陈设食子，上师入于黑日嘎等持中作其姿态时，具有见佛缘分的人，都看见上师就是真正的黑日嘎。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "大宿变成黑日嘎令工匠失去知觉", "participants": [{"entity": "大宿·释迦炯内", "role": "主体"}], "location": "鸱枭谷", "time_info": "", "layers": ["神变"], "quote": "”在作看式的时刻上师已经变成了真正的黑日嘎，头部了然在云雾间，右脚踏在鸱枭谷的黑日嘎岩顶，左脚踩在赞普波康山巅，一面二臂，獠牙毕露，卷着舌头，金刚翅遍及虚空。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "大宿祈祷黑日嘎后佛像肚脐以上自然呈现", "participants": [{"entity": "大宿·释迦炯内", "role": "主体"}], "location": "鸱枭谷", "time_info": "", "layers": ["神变"], "quote": "当他们沐浴、转绕完毕进入殿内时，发现上师身边无有一人，上师安住在密意中，泥土全然穷尽，而吉祥黑日嘎肚脐以上的身像自然呈现在面前。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "授记", "title": "《持明集根本续》授记桑吉益西", "participants": [{"entity": "努·桑吉益西", "role": "授记对象"}], "location": "", "time_info": "", "layers": ["授记", "典据"], "quote": "按照《持明集根本续》中“桑吉益西如意宝，尤其示现身之密”的授记，他在幼年时在莲花生大士前听受《八大法行》的灌顶时，选择本尊的鲜花击上妙吉祥身坛城，他通过修行而明显现前成就相。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "降伏非人", "title": "大宿降伏地神则热则赞后令其守护", "participants": [{"entity": "大宿·释迦炯内", "role": "主体"}, {"entity": "地神则热则赞", "role": "客体"}], "location": "鸱枭谷", "time_info": "", "layers": ["史传"], "quote": "在那里，修行口粮也是少得可怜，加之空行又再次降临授记，于是他就准备启程迁移到下方（即玛达地方）。结果地神则热则赞现身请求他留住，大宿·释迦炯内说：“我去他境的授记再次出现，而且口粮也一无所有，因此要离开。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "大宿独自塑成吉祥黑日嘎像上半身", "participants": [{"entity": "大宿·释迦炯内", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "当他们沐浴、转绕完毕进入殿内时，发现上师身边无有一人，上师安住在密意中，泥土全然穷尽，而吉祥黑日嘎肚脐以上的身像自然呈现在面前。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "建寺造像", "title": "鸱枭谷寺殿堂壁画绘制", "participants": [{"entity": "大宿·释迦炯内", "role": "主持"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "右方壁画上绘有寂静幻化网，左方是威猛忿怒尊众，前方是《集密意续》的本尊像，上面是三坛城，门房壁上是吉祥怙主玛哈嘎拉威猛大威德以及八位骑虎门神", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "小宿勾召龙魔兄妹为开光酿酒", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}, {"entity": "大宿·释迦炯内", "role": "指挥"}], "location": "雅则札东岩山", "time_info": "", "layers": ["神变"], "quote": "在众人面前，开光的酒量要显得有许许多多，请小宿勾召龙女吧。”其后，住在雅则札东岩山处的龙魔妹妹被小宿用意念勾召过来，结果出现了一条小蛇。小宿作看式，使它变成一个白衣女子。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "大宿以一勺糌粑使所有口袋满满当当", "participants": [{"entity": "大宿·释迦炯内", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "侍者请问上师：“现在酒已足够，糌粑怎么做？”上师说：“去借大量口袋来。”上师作了一个食子说：“在所有口袋里都放一勺糌粑。”他按照这样去做，结果第二天所有的口袋里的糌粑都是满满当当。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "大宿超度牛群", "participants": [{"entity": "大宿·释迦炯内", "role": "主体"}, {"entity": "小宿·西绕札巴", "role": "参与者"}], "location": "札巴温", "time_info": "", "layers": ["神变"], "quote": "上师问小宿：“你是作降伏还是起死回生？”小宿说：“我依师言教奉行。”大宿进入境界中意念，一座间就超度了，结果所有牛顿时倒身亡命。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "小宿令牛起死回生", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "上师说：“也款待他们，小宿向牛的主人作交待吧。”小宿把牛皮套在骨架上，又将所有内脏装进去，盖上法衣，弹一声响指，顷刻间所有的牛开始颤动，慢慢地站立起来。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "吉祥黑日嘎佛像开光时跳舞说话", "participants": [{"entity": "大宿·释迦炯内", "role": "主持"}, {"entity": "吉祥黑日嘎佛像", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "大宿上师也格外欢喜，看着吉祥黑日嘎像说：“令广泛利益众生。”结果佛像跳起九种舞姿，说道：“嘿嘿，那还用说。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "修行", "title": "百名瑜伽行者进行年修", "participants": [{"entity": "大宿·释迦炯内", "role": "主持"}, {"entity": "小宿·西绕札巴", "role": "参与者"}], "location": "", "time_info": "{'text': '为期一年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "”小宿说：“如果酒不足，吩咐龙魔就可以，肉和糌粑也微量，如果没有破瑜伽誓言，生活都由鬼神提供，地神的供养也会滚滚而来，因此进行年修很好。”百名左右的男女瑜伽行者聚集一起。上师说：“所有修行人各分一托巴酒、鹅蛋大的食团，一点誓言肉。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "修行", "title": "四位顶尖较量修行境界、小宿空中安住", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}, {"entity": "大宿四位顶尖弟子", "role": "参与者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "其余三位如如不动的境界犹如高山，不被外缘所扰乱。小宿已达到了无偏大平等的境地，为了表示见解的高超，他还在一马车高的空中安住。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "大宿跳黑日嘎舞脚踝没入岩石", "participants": [{"entity": "大宿·释迦炯内", "role": "主体"}], "location": "珠波", "time_info": "", "layers": ["神变"], "quote": "修行结束以后，师徒众人来到珠波的三岔路口，上师兴致勃勃，在“金刚栓”岩石上，跳起黑日嘎舞。结果脚踝骨以下如踏淤泥般没入岩石。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "小宿顶礼足印留下发髻耳饰印迹", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}], "location": "珠波", "time_info": "", "layers": ["神变"], "quote": "小宿说'我的上师是真佛，所以要以头顶戴其足'……结果他的发髻连同耳饰的印迹都清清楚楚地呈现在岩石上", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "桑古西嘉五指幻化五大力士竖立金刚栓岩石", "participants": [{"entity": "桑古西绕嘉波", "role": "主体"}], "location": "珠波", "time_info": "", "layers": ["神变"], "quote": "桑古西嘉说：“上师叔侄二尊的成就相超群绝伦，如果人畜践踏，就成了非福德。”说完他五指幻化为五大力士将“金刚栓”岩石竖立起来放置。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "扬古穹巴和莫涅穹札以巨石稳固岩石", "participants": [{"entity": "扬古穹", "role": "主体"}], "location": "珠波", "time_info": "", "layers": ["神变"], "quote": "”说罢他们每人取来一块连许多大力士也无法动摇的磐石，分别放在左右作为依靠，这样一来，已经从根本上稳固，如今那块岩石仍然明显存在着。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "小宿腾空至嘉哦岩", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}], "location": "嘉哦岩", "time_info": "", "layers": ["神变"], "quote": "小宿说'跟随上师身后而来'，说完腾空而起到了嘉哦岩", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "大宿脚不沾水过江", "participants": [{"entity": "大宿·释迦炯内", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "我先行一步。”说完上师脚不沾水而去。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "史传", "title": "侍者破坏酒瓮缘起，龙魔兄妹飞走", "participants": [{"entity": "大宿·释迦炯内", "role": "评论者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "由于等待时间过长，他感到口干舌燥，便将凡是过滤的酒都喝光，不由得心起妄念：从酿酒以来已经过了一年零四个月，可是这酒一直源源不断，到底上师在酒瓮里放了什\n么东西？于是他解开酒瓮的印，结果看到木轭大的两条黑白蛇逸然解开了结飞到空中。剩下来的就是蝎子、青蛙、蝌蚪等，它们也伴随着叽叽喳喳的声音而飞到空中，顷刻间，酒糟变腐，梢子酒变酸。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "授记", "title": "大宿授记鸱枭谷寺与札巴禅堂的命运", "participants": [{"entity": "大宿·释迦炯内", "role": "主体"}], "location": "", "time_info": "", "layers": ["授记"], "quote": "上师说：“缘起被破坏了，本来，如果沃东的龙魔兄妹没有出去，那么鸱枭谷寺会成为藏地的最大寺院，札巴禅堂也会方兴未艾，经久不衰。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "建寺造像", "title": "施主召集三位尊者共议建殿", "participants": [{"entity": "玛玛永仲札西", "role": "施主"}, {"entity": "大宿·释迦炯内", "role": "密咒师"}, {"entity": "拉嘎则瓦", "role": "苯波师"}, {"entity": "切墨扬木巴", "role": "僧人"}], "location": "酿热", "time_info": "", "layers": ["史传"], "quote": "”妻子说：“我的资产足够，三位都迎请。”于是就迎请了密咒师鸱枭谷大师、苯波师拉嘎则瓦、切墨扬木巴僧人。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "建寺造像", "title": "大宿在卓普建造佛殿（卓普寺）", "participants": [{"entity": "大宿·释迦炯内", "role": "主持"}, {"entity": "卓敦巴", "role": "施主"}], "location": "卓普", "time_info": "", "layers": ["史传"], "quote": "”大宿·释迦炯内考虑这两种方法都不是一个妥善的措施，于是把那座殿堂给了苯波师。卓敦巴供养了“卓普”地方，于是大宿上师便在那\n里建造了佛殿。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "大宿以黄金换取卓米译师甚深教授", "participants": [{"entity": "大宿·释迦炯内", "role": "求法者"}, {"entity": "卓米译师", "role": "传法者"}], "location": "莫革隆", "time_info": "", "layers": ["史传"], "quote": "嘉瓦大宿，福报处于鼎盛的一段时间里，卓米译师由于供养班智达的黄金不足，于是对大宿说：“你带来大量的黄金，我给你传甚深教授。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "地神供养金矿", "participants": [{"entity": "大宿·释迦炯内", "role": "受供者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "”众僧人立誓说：“那么，我们每人也要供养一个铜盘、一个金刚铃，一根铁索。”如此兴师动众，两位地神也心惊肉跳，各供养羊肝大小的金子作为礼品以后，请求说：“不要作金塔，我们供养金矿。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "修行", "title": "大宿精通三传承分支及金刚帷幕续", "participants": [{"entity": "大宿·释迦炯内", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在莫革隆，大宿上师向译师补了一百两黄金，并在秋季用披风上背着荆棘，以此等行为加以恭敬。当大宿·释迦炯内对三传承分支及《金刚帷幕续》十分精通可以说完全领会时，他说：“依靠大上师的恩德，我的心部成为珍宝。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "涅槃", "title": "大宿·释迦炯内六十一岁涅槃融入黑日嘎像心间", "participants": [{"entity": "大宿·释迦炯内", "role": "主体"}, {"entity": "吉祥黑日嘎佛像", "role": "融入处"}], "location": "札巴禅堂", "time_info": "{'text': '六十一岁', 'relative_to': '大宿·释迦炯内 (E_580)', 'absolute': None}", "layers": ["神变"], "quote": "”当天太阳初升时，侍者来到上师跟前，看到上师正在卧室里披皮袍，于是便问：“现在您穿皮袍要到哪里呀？”上师说：“我将前往极乐国，黑日嘎佛我无别，强烈祈祷此本尊。”说罢在摇晃金刚铃中，身体化光，融入吉祥黑日嘎佛像心间。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "大宿涅槃前将道场交付小宿", "participants": [{"entity": "大宿·释迦炯内", "role": "传法者"}, {"entity": "小宿·西绕札巴", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "当他准备将粗大的身体转依为清净光明身时，命人把小宿从嘉哦岩唤来。当小宿来到以后，上师说：“现在，我的这个道场交付给小宿。你要以正法利益弟众，顺应他们的心意，要像我一样培养他们。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "大宿涅槃后幻化接受康巴人供养", "participants": [{"entity": "大宿·释迦炯内", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "”说罢在摇晃金刚铃中，身体化光，融入吉祥黑日嘎佛像心间。当时，有一个康巴人来供养供品，路上见到上师，上师加持康巴人的心而在幻化的无量殿里也接受了供品并作了回向。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "嘉敦释迦益西化白光融入黑日嘎佛像", "participants": [{"entity": "嘉敦释迦益西", "role": "主体"}, {"entity": "吉祥黑日嘎佛像", "role": "融入处"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "”当进行迎接时，嘉敦骑着一匹白牛，戴着一顶羊绒帽，当他到了吉祥黑日嘎佛像前时，就化成一道白光，右绕三匝而直接融入佛像里，这是僧团管家玛玖敦丹亲眼看见的。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "宿姆哦波融入黑日嘎佛像", "participants": [{"entity": "宿姆哦波", "role": "主体"}, {"entity": "吉祥黑日嘎佛像", "role": "融入处"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "”当进行迎接时，嘉敦骑着一匹白牛，戴着一顶羊绒帽，当他到了吉祥黑日嘎佛像前时，就化成一道白光，右绕三匝而直接融入佛像里，这是僧团管家玛玖敦丹亲眼看见的。同样，具相宿姆哦波也融入了那尊黑日嘎佛像中。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "史传", "title": "小宿出生及早年", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}, {"entity": "塔巴卓钦", "role": "父"}, {"entity": "西绕杰", "role": "母"}], "location": "", "time_info": "{'text': '虎年', 'relative_to': '小宿·西绕札巴 (E_581)', 'absolute': None}", "layers": ["史传"], "quote": "小宿·西绕札巴大宿上师四大顶尖弟子中犹如牛群中牛王一般首屈一指的善逝嘉哦巴或者小宿·西绕札巴，是密咒师鸱枭谷的后裔，父亲塔巴卓钦是游\n方僧形象，母亲是后藏地方的西绕杰，在虎年伴随着稀奇的瑞相生下了他。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "修行", "title": "小宿七岁读写、九岁掌握寂猛事业吟诵法", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}], "location": "", "time_info": "{'text': '七岁、九岁', 'relative_to': '小宿·西绕札巴 (E_581)', 'absolute': None}", "layers": ["史传"], "quote": "小宿·西绕札巴大宿上师四大顶尖弟子中犹如牛群中牛王一般首屈一指的善逝嘉哦巴或者小宿·西绕札巴，是密咒师鸱枭谷的后裔，父亲塔巴卓钦是游\n方僧形象，母亲是后藏地方的西绕杰，在虎年伴随着稀奇的瑞相生下了他。小宿在七岁时便能读写文字，九岁就掌握了寂猛事业吟诵法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "史传", "title": "小宿与妻子离异、生起厌离心", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}], "location": "", "time_info": "{'text': '十三岁', 'relative_to': '小宿·西绕札巴 (E_581)', 'absolute': None}", "layers": ["史传"], "quote": "”说完就逃向自己的故乡。小宿对轮回生起了强烈的厌离心，从东空捎口信给她：把你的财产带走。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "小宿投师大宿、得名\"小宿\"", "participants": [{"entity": "小宿·西绕札巴", "role": "弟子"}, {"entity": "大宿·释迦炯内", "role": "上师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "上师问小宿'你的家族姓氏是什么'……于是说'是小宿'。依此，他便被称为小宿", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "修行", "title": "小宿苦行安忍", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}, {"entity": "大宿·释迦炯内", "role": "上师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "一开始，由于生活十分拮据，他常将上师布施的食子捡回来作成发酵糌粑糕吃。其余僧人闻到他有一股酒味，禀报上师说：“小宿有酒既不供养上师，也不给道友。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "授记", "title": "大宿赞叹小宿福报缘起", "participants": [{"entity": "大宿·释迦炯内", "role": "主体"}, {"entity": "小宿·西绕札巴", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "“现在还有吗？”小宿回禀上师：“只有一藏升。”上师说：现在没办法揉了，如果再揉，你就会成了整个藏地福报最大的人，然而由对我供养的缘起，你也会有大福报。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "大宿见小宿转绕时脚离地一肘高", "participants": [{"entity": "大宿·释迦炯内", "role": "见证者"}, {"entity": "小宿·西绕札巴", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "”\n由于小宿对上师的话言听计从，所以原原本本地得受了上师的密意。一次，上师看见小宿正在转绕住处门前的一座佛塔，脚离地面一肘高。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "小宿开始宣讲《集密意续》", "participants": [{"entity": "小宿·西绕札巴", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "正当他想现在我利益众生也会成功的时候，上师也说：“现在你讲经说法。”于是他开始宣讲《集密意续》，一时间听法者达到三百人。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "小宿超度二母狗、吐蛆化飞虫", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}, {"entity": "大宿·释迦炯内", "role": "见证者"}], "location": "诶玛多吉波", "time_info": "", "layers": ["神变"], "quote": "小宿把那两条母狗打死，并吃了蛆。其余的人都说：“小宿简直是行为疯狂者，任命这样的人来讲经说法，施主们也会对我们退失信心。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "小宿脚不沾水取回托巴", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}, {"entity": "大宿·释迦炯内", "role": "测试者"}], "location": "香曲河", "time_info": "", "layers": ["神变"], "quote": "”面对着香曲河暴涨，大宿上师依靠神变把托巴抛到河对岸说：“谁能把它拿回来，我就把我的讲经院交付给他。”其余三位顶尖弟子没有能够拿回来，而小宿脚不沾水到达对岸将托巴取了回来。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "小宿空中飞行比试气功最先到达札巴禅院", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}], "location": "札巴禅堂", "time_info": "", "layers": ["神变"], "quote": "上师又让他们比试气功，四尖等其余禅师都能够脚不沾地而行。可是只有小宿腾在一娑罗树高的虚空中飞行，最先到达札巴禅院，由此其余三顶尖弟子也对他心悦诚服。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "授记", "title": "五名空行母指示小宿在九峰神山修行", "participants": [{"entity": "小宿·西绕札巴", "role": "受者"}], "location": "嘉哦岩", "time_info": "", "layers": ["神变"], "quote": "小宿依次得到了三次有关修行处的授记，证悟空性的瑜伽士不是刻意执著它，而是抛在迷乱相中：有一次，出现五名佩带骨饰、手持颅鼓、翩翩起舞的十六岁妙龄少女，对他说：“兄长，如果在九峰神山修行，则能成办二利。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "修行", "title": "小宿在嘉哦岩闭关修行", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}], "location": "嘉哦岩", "time_info": "{'text': '闭关十三整年加一年头，共十四年', 'relative_to': '小宿·西绕札巴 (E_581)', 'absolute': None}", "layers": ["史传"], "quote": "小宿上师本有在嘉哦岩闭关修行二十四年直到成就虹身的意愿，可是由于出现了两个因缘使他必须出关，以至于只闭关了十三个整年，加上一个年头，共十四年。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "地神在嘉哦岩兴风作浪、小宿梦中被抛到大坝", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}], "location": "嘉哦岩", "time_info": "", "layers": ["神变"], "quote": "为此，地神兴风作浪。如此成就的大德，始终处于梦境与现量一味是虚妄的境界中。一天夜里，他梦到：嘉哦岩顶出现一个黑人，抓住他的双脚，在头上旋转后抛了出去，摔倒在塔革大坝上。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "小宿劈蝎子化为毗卢遮那佛消失空中", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}], "location": "嘉哦岩", "time_info": "", "layers": ["神变"], "quote": "小宿现前超越因果的证悟捉住蝎子的两只角，劈成两半，与此同时说道：“恶蝎不善分别忏。”他是在说“不依义而依音（蝎子与罪业是同一词）”的诙谐话，随之扔了出去，结果所有蝎子都变成了毗卢遮那佛而消失在空中。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "小宿将蚂蚁吹化为金刚萨埵", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}], "location": "嘉哦岩", "time_info": "", "layers": ["神变"], "quote": "小宿说：“如果你不起信心，那就这么造吧。”说罢将蚂蚁放在嘴里，又噗的一声吹出来，结果它们全部端端正正变成金刚萨埵飞到空中。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "小宿降伏地神三兄妹", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}], "location": "嘉哦岩", "time_info": "", "layers": ["神变"], "quote": "由此使侍者生起极大的信心。小宿依靠起死回生、不可思议的神变降伏了地神三兄妹，他们现出原形而顶礼其足。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "修行", "title": "小宿修《秘密幻化续》面见金刚萨埵、获四大遍处", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}, {"entity": "金刚萨埵", "role": "本尊"}], "location": "嘉哦岩", "time_info": "", "layers": ["神变"], "quote": "他通过修行《秘密幻化续》中所说的手印禅定修法而面见金刚萨埵，使整个塔革山谷遍满金刚萨埵，获得四大遍处 94 ，身体能变水、风、火、地。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "穹波札色派四弟子驳斥小宿反被折服", "participants": [{"entity": "小宿·西绕札巴", "role": "应辩者"}, {"entity": "穹波札色", "role": "派遣者"}, {"entity": "玖敦夏嘎益", "role": "辩者（后成弟子）"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "四柱弟子，穹波札色的僧人智慧极其敏锐的大法相师，德香嘉哦巴和格西穹波在年热地方应一位施主迎请而相聚时，穹波派他们四位，吩咐说：“去驳斥小宿巴这个邪教者。”\n四位弟子到尊者面前时，看见小宿的长毛大氅内外反穿，其中一个人说：“这种内外皮反穿的衣服是谁的法规？”小宿说：“皮原本就是这样，内外并没有颠倒。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "巴格通所遣僧人与小宿辩论后归依", "participants": [{"entity": "小宿·西绕札巴", "role": "应辩者"}, {"entity": "巴格通", "role": "派遣者"}, {"entity": "玛土香白", "role": "辩者（后成弟子）"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "小宿说'柱子（有法）……在我大圆满自现无偏义中柱子并不成立'……挥动手臂无阻无碍往行柱子。对方万分惊奇……成为小宿的弟子，名叫玛土香白", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "授记", "title": "小宿出定后预言下世转世为萨迦大译师", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}], "location": "嘉哦岩", "time_info": "", "layers": ["授记"], "quote": "当他来到上师禅房，发现上师的脸上、鼻子上全拉着蜘蛛网，他认为上师已经圆寂，不由得失声痛哭起来，结果上师出定，说道：“我如果安住在那种境界中，就不必要再次转世，可是现在还要受生一世，下一世就是萨迦大译师。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "史传", "title": "三位不中用弟子各奔他处致小宿出关", "participants": [{"entity": "够夏擦", "role": "离去者"}, {"entity": "莫穹旺桑", "role": "离去者"}, {"entity": "够穹旺俄", "role": "离去者"}, {"entity": "小宿·西绕札巴", "role": "被迫出关者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "第一位没有认识到密宗精华中具足方便道和解脱道，没有辨别开母续的法相；第二位对于坛城由自地现出，眼睛一直扭到后脑穴（向后看）；第三位没有了解因明是词句宗派，它无法抉择基道。依此原因，三位不中用的弟子没有完成讲学院的任务，使小宿不得不出关。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "史传", "title": "古译师在香地法会不由自主向小宿顶礼", "participants": [{"entity": "古大译师益桑则巴", "role": "顶礼者"}, {"entity": "小宿·西绕札巴", "role": "被礼者"}], "location": "香地", "time_info": "", "layers": ["史传"], "quote": "据说当时，这位能言善辩、紧缩烦恼的大善知识无法堪忍与佛陀密意平等之瑜伽王的威光，就像五比丘的内部规定（不向佛陀顶礼）一样，不由自主、慌慌忙忙，不作礼的誓言高山已完全销声匿迹，五体的藤树就像粘在地上般恭恭敬敬作五体投地的大礼。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "小宿每日在三地传三堂法", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "”本来，众所周知，小宿具有广大神变而能在光线上行走。上午在哦巴隆地方传法，中午在卓普寺传讲，晚上在嘉哦岩传法，在距离十分遥远的地方，他每天都是传三堂法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "建寺造像", "title": "小宿建空行佛堂", "participants": [{"entity": "小宿·西绕札巴", "role": "主持"}], "location": "拉则莫", "time_info": "", "layers": ["史传"], "quote": "上午在哦巴隆地方传法，中午在卓普寺传讲，晚上在嘉哦岩传法，在距离十分遥远的地方，他每天都是传三堂法。一次，他在拉则莫地方观看空行母跳舞，以此为缘而指使空行做事，树立起了七根柱子、两根大柱支起的佛殿，被共称为空行佛堂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "单坚护法像被小宿抽打后点头动唇", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}, {"entity": "多吉勒巴", "role": "被问者"}], "location": "空行佛堂", "time_info": "", "layers": ["神变"], "quote": "佛堂内塑造了四十二尊佛陀、单坚护法神，广略坛城单独绘制。在举\n行开光仪式时，小宿用衣袖抽打单坚像问：“你能护持佛法吗？”单坚像频频点头。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "涅槃", "title": "小宿于六十一岁木虎年涅槃", "participants": [{"entity": "小宿·西绕札巴", "role": "主体"}], "location": "嘉哦岩", "time_info": "{'text': '六十一岁木虎年', 'relative_to': '小宿·西绕札巴 (E_581)', 'absolute': None}", "layers": ["史传"], "quote": "他的言传教授有八十，即“作山的儿子，穿褴褛衣裳，吃粗茶淡饭，让敌人胜利，让田地变成荒野，一心向法……”小宿尊者于六十一岁木虎年时在嘉哦岩伴随着光芒、大地震动等瑞相而前往密严金刚庄严刹土。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "史传", "title": "宿·释迦桑给出生", "participants": [{"entity": "宿·释迦桑给", "role": "主体"}, {"entity": "达母则多嘉", "role": "母"}, {"entity": "小宿·西绕札巴", "role": "父"}], "location": "", "time_info": "{'text': '鄂大译师十六岁的木虎年', 'relative_to': '鄂大译师 (E_854)', 'absolute': None}", "layers": ["史传"], "quote": "为此才把她留下。宿·释迦桑给在鄂大译师十六岁的木虎年出生。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "宿·释迦桑给在众上师前求学", "participants": [{"entity": "宿·释迦桑给", "role": "求法者"}, {"entity": "烂释迦桑波", "role": "传法者"}, {"entity": "扬康喇嘛", "role": "传法者"}, {"entity": "贡哦玖", "role": "传法者"}, {"entity": "烂释迦香切", "role": "传法者"}, {"entity": "至尊香那", "role": "传法者"}], "location": "", "time_info": "{'text': '十五岁起', 'relative_to': '宿·释迦桑给 (E_582)', 'absolute': None}", "layers": ["史传"], "quote": "他由母亲和舅舅抚养，在达普地方住到十五岁。此后来到烂释迦桑波面前，听受《幻化网》，在玖隆，又到扬康上师前闻法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "修行", "title": "宿·释迦桑给在涅热卓山洞修行达到四钉境界", "participants": [{"entity": "宿·释迦桑给", "role": "主体"}], "location": "涅热卓山洞", "time_info": "", "layers": ["史传"], "quote": "在涅热卓山洞修行期间，他达到了生起次第、圆满次第窍诀续中所说的四钉境界，与本尊的身语意融为一体，他年纪轻轻就有极大的\n慑服力，能震慑一切。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "单巴桑吉认出宿·释迦桑给为金刚手化身", "participants": [{"entity": "单巴桑吉", "role": "识别者"}, {"entity": "宿·释迦桑给", "role": "被识别者"}], "location": "当日", "time_info": "", "layers": ["神变"], "quote": "一次，单巴桑吉住在当日地方，释迦桑给师徒五人前去拜见。在到达的当天，单巴仁波切亲口说：“今日金刚手菩萨的化身莅临，要去迎接。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "卓普巴直接显示金刚手形象给画师", "participants": [{"entity": "宿·释迦桑给", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "他对画师说'要照着我自己这样来画'。他直接显示金刚手的形象", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "卓普巴讲法时面容四方可见", "participants": [{"entity": "宿·释迦桑给", "role": "主体"}], "location": "卓普", "time_info": "", "layers": ["神变"], "quote": "一次他在卓普地方讲法之时，坐在没有靠背的一个法座上，四周僧众团团环绕，他的面容了然呈现在四面八方，徒众都真正诚信他就是金刚萨埵幻化网坛城主的代表，而且无有诤议一致公认是位化身。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "涅槃", "title": "卓普巴飞空不舍肉身趋向持明果位", "participants": [{"entity": "宿·释迦桑给", "role": "主体"}, {"entity": "卓普巴四位敦士", "role": "弟子见证"}], "location": "卓普达拉热东", "time_info": "{'text': '六十一岁木虎年', 'relative_to': '宿·释迦桑给 (E_582)', 'absolute': None}", "layers": ["神变"], "quote": "我这次不舍肉身而趋向持明果位，依此对你们留下的也是一种吉祥，唯一要一脉相传、弘扬佛法。”说后他那吉祥喉中唱起一首金刚歌，随着他越来越高飞向空中，那首道歌在回荡，最后身体消失无踪。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "卓普巴因弟子痛哭而降临劝慰", "participants": [{"entity": "宿·释迦桑给", "role": "主体"}, {"entity": "卓普巴四位敦士", "role": "弟子"}], "location": "卓普达拉热东", "time_info": "", "layers": ["神变"], "quote": "四位敦士犹如掏心般极度痛苦，失声痛哭，伤心倒地，呼唤上师的名字。上师像飞禽降落般降临说：“你们不要这样，要按照我上面的教诲去做，你们不听，现在就会给我的传承带来不吉祥的后果。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "史传", "title": "卓普巴荼毗时天神非人供养", "participants": [{"entity": "宿·释迦桑给", "role": "主体"}], "location": "", "time_info": "{'text': '六十一岁木虎年', 'relative_to': '宿·释迦桑给 (E_582)', 'absolute': None}", "layers": ["史传"], "quote": "荼毗之时，一位相貌端严的少年密咒师将一匹佩有稀奇螺鞍的骏马供上，谁也不知道他从哪里来又去了哪里，因此人们说是天神前来供养。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "布玛莫札至卓普巴三代传承", "participants": [{"entity": "布玛莫札", "role": "起始"}, {"entity": "哲姆", "role": "第一代"}, {"entity": "玛尔巴慧光", "role": "第二代"}, {"entity": "朗敦达玛索朗", "role": "第三代"}, {"entity": "宿·释迦桑给", "role": "终端"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "再者，（弟子传承次第：）布玛莫札-荣切参的比丘尼哲姆-南岩夏则的玛尔巴慧光-香拉哦的朗敦达玛索朗-至尊霍波卓普巴。可见，在布玛莫札与卓普巴之间只有三位上师。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "杰敦嘉那在穹波札色等多位上师前听闻显宗教法九年", "participants": [{"entity": "杰敦嘉那", "role": "受者"}, {"entity": "穹波札色", "role": "传法者"}, {"entity": "班善知识", "role": "传法者"}, {"entity": "达巴卡切", "role": "传法者"}, {"entity": "索南益西", "role": "传法者"}], "location": "", "time_info": "{'text': '九年期间', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "”于是至尊嘉那在那里住了下来，在穹波札色面前听闻《般若》，在班善知识前听闻《俱舍论》，在达巴卡切面前听闻《中观》、《因明》，也依止了索南益西。九年期间听受佛法而通达无碍。三十岁时，前往密主卓普巴面前聆听密法，一住就是十一年。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "杰敦嘉那在密主卓普巴前聆听密法十一年", "participants": [{"entity": "杰敦嘉那", "role": "受者"}, {"entity": "卓普巴", "role": "传法者"}], "location": "", "time_info": "{'text': '三十岁时，一住就是十一年', 'relative_to': '杰敦嘉那 (E_810)', 'absolute': None}", "layers": ["史传"], "quote": "三十岁时，前往密主卓普巴面前聆听密法，一住就是十一年。刚开始的三年里，上师只是知道他的名字在僧众中说说罢了，而与上师卓普巴连详细研讨佛法的机会也不曾有过。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "辩论", "title": "杰敦嘉那辩论中驳倒嘉尊桑师徒使卓普巴满怀欢喜", "participants": [{"entity": "杰敦嘉那", "role": "胜方"}, {"entity": "嘉尊桑", "role": "败方"}, {"entity": "拉吉秋库", "role": "在场者"}, {"entity": "卓普巴", "role": "观者"}, {"entity": "多吉札", "role": "受益者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "一次，嘉尊桑师徒、拉吉秋库聚集一起时，嘉尊师徒开始进行辩论，至尊嘉那将他们通通驳倒，摧毁了他们的慢心，使卓普巴尊者满怀欢喜，又因为使卓普巴的亲生子多吉札打开智慧，令上师更无比喜悦，恩赐了生起次第、圆满次第、大圆满的教授、殊胜窍诀连同小字，因此他与其余宿派行者相比，法要齐全，窍诀要深。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "杰敦嘉那在多位上师前得受甘露法等密法", "participants": [{"entity": "杰敦嘉那", "role": "受者"}, {"entity": "嘉藏古瓦", "role": "传法者"}, {"entity": "卓达桑", "role": "传法者"}, {"entity": "单巴布芒", "role": "传法者"}, {"entity": "觉姆年姆", "role": "传法者"}], "location": "", "time_info": "{'text': '四十岁以后', 'relative_to': '杰敦嘉那 (E_810)', 'absolute': None}", "layers": ["史传"], "quote": "此外，他又在年多的嘉藏古瓦面前得受了甘露法，在年玛的卓达桑面前得受《摧破金刚》、《根本金刚橛》法，还有杰派等不同的金刚橛法门，在单巴布芒面前得受了布派大圆满，在觉姆年姆面前得受了康派大圆满阿若精髓。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "卓普巴尊者圆寂", "participants": [{"entity": "卓普巴", "role": "主体"}], "location": "", "time_info": "{'text': '杰敦嘉那四十岁第二年', 'relative_to': '杰敦嘉那 (E_810)', 'absolute': None}", "layers": ["史传"], "quote": "他到了四十岁时，就当云游僧，第二年卓普巴尊者圆寂。此外，他又在年多的嘉藏古瓦面前得受了甘露法，在年玛的卓达桑面前得受《摧破金刚》、《根本金刚橛》法，还有杰派等不同的金刚橛法门，在单巴布芒面前得受了布派大圆满，在觉姆年姆面前得受了康派大圆满阿若精髓。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "杰敦嘉那修药师佛时天女围绕坛城三匝融入", "participants": [{"entity": "杰敦嘉那", "role": "主体"}, {"entity": "药师佛", "role": "加持者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "同样，听受了大圆满梵志类、给仓玛等的法要，极其广博，成为一切显密、续部修法的教主。\n他在修行药师佛的过程中，从药师佛的宫殿中真实出现天女围绕坛城三匝而融入，这是人们有目共睹的。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "杰敦嘉那五十六岁土蛇年圆寂", "participants": [{"entity": "杰敦嘉那", "role": "主体"}], "location": "", "time_info": "{'text': '五十六岁土蛇年', 'relative_to': '杰敦嘉那 (E_810)', 'absolute': None}", "layers": ["史传"], "quote": "他在修行药师佛的过程中，从药师佛的宫殿中真实出现天女围绕坛城三匝而融入，这是人们有目共睹的。总之，这位尊者利生的事业极其广大，在五十六岁土蛇年圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "钦波云丹松十三年依止叔叔杰敦嘉那学修生圆满大圆满", "participants": [{"entity": "钦波云丹松", "role": "受者"}, {"entity": "杰敦嘉那", "role": "传法者"}], "location": "", "time_info": "{'text': '十一岁起求学，十三年依止叔叔', 'relative_to': '钦波云丹松 (E_823)', 'absolute': None}", "layers": ["史传"], "quote": "钦波云丹松杰敦嘉那大师的侄子喇嘛钦波云丹松：火马年诞生，从十一岁起开始求学，十三年依止叔叔，圆满学修了生起次第、圆满次第、大圆满的所有续部、教授、窍诀。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "钦波云丹松二十四岁任住持", "participants": [{"entity": "钦波云丹松", "role": "主体"}], "location": "", "time_info": "{'text': '二十四岁', 'relative_to': '钦波云丹松 (E_823)', 'absolute': None}", "layers": ["史传"], "quote": "钦波云丹松杰敦嘉那大师的侄子喇嘛钦波云丹松：火马年诞生，从十一岁起开始求学，十三年依止叔叔，圆满学修了生起次第、圆满次第、大圆满的所有续部、教授、窍诀。到了二十四岁时，叔叔嘉那巴圆寂，他任住持。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "卫巴敦夏跟随杰敦嘉那云游并圆满得受续及教授", "participants": [{"entity": "卫巴敦夏", "role": "受者"}, {"entity": "杰敦嘉那", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他去卓普巴寺院写字，生起信心便在那里求学。拉吉嘉那（即杰敦嘉那）作云游僧时，他一直跟随左右，圆满得受了一切续及教授。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "闭关修行", "title": "卫巴敦夏在螳螂树岩山修行生起殊胜证悟", "participants": [{"entity": "卫巴敦夏", "role": "主体"}], "location": "螳螂寺", "time_info": "", "layers": ["史传"], "quote": "”卫巴敦夏来到长有螳螂树的岩山，在泉水边上得到了一些食团，他认为这是好兆头，于是就在那里安住修行，结果生起了殊胜证悟，鬼神也听他差遣，拥有利益芸芸众生的能力，被人们称为“螳螂尊者”。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "卫巴秀波跟随嘉那尊者修学生起圆满大圆满", "participants": [{"entity": "卫巴秀波", "role": "受者"}, {"entity": "杰敦嘉那", "role": "传法者"}], "location": "卓普巴寺院", "time_info": "", "layers": ["史传"], "quote": "卫巴秀波卫巴秀波是雅隆地方的人，在至尊卓普巴的寺院当文书而趋入佛门，跟随嘉那尊者，对生起次第、圆满次第、大圆满已经达到娴熟程度，他想回到家乡去坐床，这时就考虑到需要具备伞盖、海螺、供品等条件，于是为了得到这些而前往尼泊尔。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "卫巴秀波返回上师面前求得耳传如意宝教言", "participants": [{"entity": "卫巴秀波", "role": "受者"}, {"entity": "杰敦嘉那", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "途中，他想，我尽管略知佛法，可却没有实修什么，如果现在命归黄泉，一切都无济于事，必须一心依止教言。想到这里，他又返回到上师面前求法，上师恩赐了耳传如意宝教言。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "卫巴秀波在芒境贡塘七日内显现大圆满智慧", "participants": [{"entity": "卫巴秀波", "role": "主体"}], "location": "芒境贡塘", "time_info": "{'text': '七日之内', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "他进行实地修持。他来到芒境贡塘地方，七日之内显现出不可言说的大圆满智慧。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "卫巴秀波达到无碍穿行土石山岩的境界", "participants": [{"entity": "卫巴秀波", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "他从尼泊尔地方取得供品，当一返回芒境贡塘时高烧不退，一直生病，他想，现在情况不妙，于是下定决心，把所有东西放在城里，到深山实修，最后达到了无碍穿行土石山岩的境界。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "卫巴秀波不受霹雳伤害", "participants": [{"entity": "卫巴秀波", "role": "主体"}], "location": "意热瓦古坡", "time_info": "", "layers": ["神变"], "quote": "”他就这样始终如一地居于深山，实地修行，最终一切万法呈现在心里，一切显现无实恍然，礌石也害不了他。当他住在意热瓦古坡时，床榻上方出现霹雳，也没有受到损伤。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "卫巴秀波七十岁圆寂", "participants": [{"entity": "卫巴秀波", "role": "主体"}], "location": "", "time_info": "{'text': '七十岁', 'relative_to': '卫巴秀波 (E_828)', 'absolute': None}", "layers": ["史传"], "quote": "”\n又问：“没有受伤吗？”他说：“传出声音与空性是无二无别的，霹雳又怎么会有自性呢？”而安住在瑜伽大自在中，唯一处在修行的境界中，他出关以后护持寺院十八年，七十岁时圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "桑吉单穹圆寂时授记持明果位", "participants": [{"entity": "桑吉单穹", "role": "主体"}], "location": "", "time_info": "{'text': '月波敦则两岁时', 'relative_to': '月波敦则 (E_829)', 'absolute': None}", "layers": ["史传"], "quote": "当他刚刚到两岁时，父亲做了一个奇特的梦，而对妻子说：“现在我要死了，我死以后也是趋至持明果位，这个儿子将来也是利益他众。”说完就圆寂了。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "月波敦则在舅舅螳螂尊者跟前三年听受荣派大圆满等", "participants": [{"entity": "月波敦则", "role": "受者"}, {"entity": "卫巴敦夏", "role": "传法者"}], "location": "", "time_info": "{'text': '三年期间', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "”于是送他到舅舅螳螂尊者跟前去求学。三年期间，他认真地听受了荣派大圆满、刚哲、《示密篇》 96等。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "月波敦则在杰卡寺云丹宗面前依止多年修学生圆满大圆满", "participants": [{"entity": "月波敦则", "role": "受者"}, {"entity": "云丹宗", "role": "传法者"}], "location": "杰卡寺", "time_info": "{'text': '十六岁来到，安住多年', 'relative_to': '月波敦则 (E_829)', 'absolute': None}", "layers": ["史传"], "quote": "他曾讲述：“上师临圆寂时，我的眼泪止不住地流，最后哽咽，以至于昏迷过去。”十六岁时，他来到杰卡寺云丹宗面前依止，安住多年以后对生起次第、圆满次第、大圆满了如指掌。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "月波敦则十六岁开始讲经说法", "participants": [{"entity": "月波敦则", "role": "主体"}], "location": "", "time_info": "{'text': '十六岁', 'relative_to': '月波敦则 (E_829)', 'absolute': None}", "layers": ["史传"], "quote": "还闻受了荣派的大修行文中《瑜伽觉日》、《禅定目灯》、《禅定心日》、《疑惑与钉》、《问答启迪》、《金刚萨埵问答》等大部分修行文，以及耳传方面，古派、荣派、康派的教授，梵志类的耳传，给仓和宗畅耳传以及界部等不可思议的法要，完全断除了大圆满类的闻思增益。他十六岁开始讲经说法，宣讲了古派的纲要，而位于智者之榜首。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "月波敦则迎请扬上师转法轮并法台寺命名", "participants": [{"entity": "月波敦则", "role": "迎请者"}, {"entity": "扬仓巴", "role": "转法轮者"}], "location": "法台寺", "time_info": "", "layers": ["史传"], "quote": "扬仓巴的弟子藏古舍波在月波尊者面前讲述了扬上师的生平，由此他生起信心，迎请扬上师，请转法轮，尽管没有结上法缘，但他说是加持相续的上师而对其恭敬有加，精心承侍。上师扬说：“你的这个寺院水木没有齐备，会有眷属集聚对众生有利的时候，由此取名为法台寺。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "月波敦则身体融入磐石并穿行墙壁等神变", "participants": [{"entity": "月波敦则", "role": "主体"}], "location": "善普达隆", "time_info": "", "layers": ["神变"], "quote": "由于获得加持而如实证得密意，证悟与解脱同时而能无碍通行一切土石山岩，受到非人转绕，有许多具备神通的公案。当他住在善普达隆静处时，身体融入磐石中，在真波山无阻穿行墙壁，诸如此类的神变不在少数。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "月波敦则三次朝拜金刚座四次朝礼释迦两尊", "participants": [{"entity": "月波敦则", "role": "主体"}], "location": "印度金刚座", "time_info": "", "layers": ["史传"], "quote": "由此原因也摄受了印度、汉地和尼泊尔等不同语种的有情。他先后三次朝拜印度金刚座，四次朝礼堪为赡部洲一大庄严的释迦两尊（大昭寺和小昭寺内的两尊释迦牟尼佛像），造四次石围。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "月波敦则五十六岁土羊年在桑普附近圆寂", "participants": [{"entity": "月波敦则", "role": "主体"}], "location": "桑普", "time_info": "{'text': '五十六岁土羊年', 'relative_to': '月波敦则 (E_829)', 'absolute': None}", "layers": ["史传"], "quote": "他完全是以如此十全十美的事业直接与间接利济他众。当他到了五十六岁土羊年，在建造拉萨后石围的饯行时，有些恶缘的眷属酗酒闹事，使尊者心生厌离，在桑普附近的静处圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "月波敦则遗体荼毗时出现无量祥兆", "participants": [{"entity": "月波敦则", "role": "主体"}], "location": "善塘嘉经堂", "time_info": "", "layers": ["神变"], "quote": "他的遗体被运到善哦嘎寺中安放了四个月，后来赞普与官员弟众想到古寺而迎请到建起的善塘嘉经堂，当时大地剧烈震动，供水中生出莲花根等等瑞相纷呈。清晨荼毗，自然出现妙音、光芒、彩虹、佛塔文字等无量祥兆，该经堂现在只剩下遗址。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "达敦觉波带仆人出家入佛门", "participants": [{"entity": "达敦觉波", "role": "受戒者"}, {"entity": "纽切哦热巴", "role": "亲教师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "达敦觉益成为月波尊者主要弟子的达敦觉益：父亲名叫达敦觉波，是上沃如地方的首领，拥有眷民和土地，他对轮回生起厌离心以后带着四个仆人逃走，到了拉吉烂尼察的心子——纽切哦热巴的面前，主仆五人一起入佛门。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "达敦觉益十二岁在玛敦上师前请求密法并两年念长咒", "participants": [{"entity": "达敦觉益", "role": "受者"}, {"entity": "玛敦", "role": "传法者"}], "location": "", "time_info": "{'text': '十二岁', 'relative_to': '达敦觉益 (E_839)', 'absolute': None}", "layers": ["史传"], "quote": "而觉益十二岁在玛敦上师面前请求了《胜乐金刚》和《金刚手甘露滴》法门。两年当中念长咒，和父亲一起请求了《胜乐金刚》的一百零八灌顶。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "达敦觉益和父亲一起请求《胜乐金刚》一百零八灌顶", "participants": [{"entity": "达敦觉益", "role": "受者"}, {"entity": "达敦觉波", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "而觉益十二岁在玛敦上师面前请求了《胜乐金刚》和《金刚手甘露滴》法门。两年当中念长咒，和父亲一起请求了《胜乐金刚》的一百零八灌顶。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "达敦觉益无偏广闻新旧密法后来到月波尊者前", "participants": [{"entity": "达敦觉益", "role": "受者"}, {"entity": "月波敦则", "role": "传法者"}], "location": "哦嘎寺", "time_info": "{'text': '二十五岁', 'relative_to': '达敦觉益 (E_839)', 'absolute': None}", "layers": ["史传"], "quote": "他二十五岁时来到月波尊者前。起初他并没有求法的念头，认为佛法我自己也精通，教言我自己也很丰富，只是因为他名气大，再加上是弟弟的上师才作一个拜见的形式。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "达敦觉益七年依止月波尊者学修大圆满心部法要", "participants": [{"entity": "达敦觉益", "role": "受者"}, {"entity": "月波敦则", "role": "传法者"}], "location": "", "time_info": "{'text': '七年之间', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "你独自一人还希望什么条件呢？”\n就这样，他在七年之间形影不离地依止上师，以三欢喜作承侍，勤奋学修了《普作王母子三类》、《讲续十经》、《根除轮回续》四部讲续，颂词及注释密诀、根本十八讲轨中甚深论典及托出隐义、窍诀修行总结，其修行注释《六心日》、《心觉六日》、卓瓦那波类耳传、修行大引导文、《觉性日》、《禅定目灯》、《疑惑与钉》以及教授耳传类中古派、荣派、康派的教言及引导。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "达敦觉益获得顿超证悟", "participants": [{"entity": "达敦觉益", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "你独自一人还希望什么条件呢？”\n就这样，他在七年之间形影不离地依止上师，以三欢喜作承侍，勤奋学修了《普作王母子三类》、《讲续十经》、《根除轮回续》四部讲续，颂词及注释密诀、根本十八讲轨中甚深论典及托出隐义、窍诀修行总结，其修行注释《六心日》、《心觉六日》、卓瓦那波类耳传、修行大引导文、《觉性日》、《禅定目灯》、《疑惑与钉》以及教授耳传类中古派、荣派、康派的教言及引导。他认真地吸取了佛语甘霖，顿时获得加持，生起顿超证悟，从而对世间的增损无所畏惧，无有诈现威仪而护持行为。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "建造佛像", "title": "达敦觉益在宗卡塑大悲观音像时生起殊胜证悟", "participants": [{"entity": "达敦觉益", "role": "主体"}, {"entity": "观世音菩萨", "role": "所塑对象"}], "location": "宗卡", "time_info": "{'text': '十八个月', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "他说：“唯一承侍上师而使深重障碍得以清净，禅定也由此日渐增长，所以这比居于深山效益更大。”其原因也是，在塑大悲观音菩萨像的过程中，他在宗卡做了十八个月炼铜的事，结果生起殊胜证悟。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "达敦觉益在多物坡光明岩修护法面见怙主尊颜", "participants": [{"entity": "达敦觉益", "role": "主体"}], "location": "多物坡光明岩", "time_info": "", "layers": ["神变"], "quote": "”其原因也是，在塑大悲观音菩萨像的过程中，他在宗卡做了十八个月炼铜的事，结果生起殊胜证悟。阿阇黎化身的坐骑被坡札匝波抢走时，他在多物坡光明岩修护法，结果面见怙主尊颜（指护法神）。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "达敦觉益六十八岁铁虎年圆寂", "participants": [{"entity": "达敦觉益", "role": "主体"}], "location": "", "time_info": "{'text': '六十八岁铁虎年', 'relative_to': '达敦觉益 (E_839)', 'absolute': None}", "layers": ["史传"], "quote": "为了成办寺院的事宜、月波尊者的事业，他在举国上下广泛利益众生，六次朝礼拉萨释迦二尊。\n觉益尊者六十八岁铁虎年，也就是邬金巴诞生的那一年圆寂，当时出现了许多金刚舍利和普通舍利。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "觉索在月波尊者前得心部法要后被交传给拉康巴大师", "participants": [{"entity": "觉索", "role": "受者"}, {"entity": "月波敦则", "role": "传法者"}, {"entity": "云丹宗", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "觉索达敦觉益的弟弟觉索，在火狗年降生，从小就到了月波尊者跟前，上师摄受而圆满赐给他心部法要并说：“你如此精进修行，所以去我的上师跟前吧。”于是把他交传给拉康巴大师。他在师前完整得受了《经幻心》，成为出类拔萃的一名智者，遗憾的是，他三十一岁火龙年就圆寂了，因此没有成熟太大的事业。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "觉索三十一岁火龙年圆寂", "participants": [{"entity": "觉索", "role": "主体"}], "location": "", "time_info": "{'text': '三十一岁火龙年', 'relative_to': '觉索 (E_852)', 'absolute': None}", "layers": ["史传"], "quote": "”于是把他交传给拉康巴大师。他在师前完整得受了《经幻心》，成为出类拔萃的一名智者，遗憾的是，他三十一岁火龙年就圆寂了，因此没有成熟太大的事业。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "授记", "title": "大班智达释迦西日预言鸱枭谷密法将传播并旺钦哦波将生二子", "participants": [{"entity": "大班智达释迦西日", "role": "授记者"}, {"entity": "宿·旺钦哦波", "role": "受授记者"}], "location": "鸱枭谷", "time_info": "{'text': '木鼠年', 'relative_to': None, 'absolute': None}", "layers": ["授记"], "quote": "当时大班智达说：“这个鸱枭谷有许多密宗之处的功德所点缀，北面山显现为五部如来的自性，这些飞禽走兽等也是圣者的幻化，在那一世密法会传播开来，所以不久你会生两个儿子，给他们取上我的开头名字（释迦），他们将弘法利生。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "宿·释迦光现量照见中阴告知他人作佛事", "participants": [{"entity": "宿·释迦光", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "他依止嘉卡贡巴上师以后听受了父亲传承的所有法要，现量照见中阴，而告诉他人要作佛事。他经常说：“你们的亡人还没有离开生死冤家，给他作没有以菩提心摄持的仪轨毫无意义。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "莫尼嘎热摔释迦光手杖出现单坚护法神", "participants": [{"entity": "莫尼嘎热", "role": "主体"}, {"entity": "宿·释迦光", "role": "赐物者"}, {"entity": "多吉勒巴", "role": "出现者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "释迦光说：'我没有咒力，如果需要我的这个禅杖就拿去吧。'……他用力一摔手杖，结果从中出来单坚护法神四尊类", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "嘎热在宿·释迦光前得受《密藏续》等法要并请酿派法", "participants": [{"entity": "莫尼嘎热", "role": "受者"}, {"entity": "宿·释迦光", "role": "传法者"}, {"entity": "阿达酿", "role": "传法者"}], "location": "南岩卡切", "time_info": "", "layers": ["史传"], "quote": "为了报答恩德，他又亲自带着丰厚的供品去拜见宿·释迦光，得受了《密藏续》等许多法要。他们二人携手来到南岩卡切地方。在库塘拉康和巴卓等地修行，当时见到阿达酿父子，请求了《八大法行·集善逝》等酿派大多数法要。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "降伏非人", "title": "嘎热在蒙古忽必烈前展示咒力勾召阿热霍嘎", "participants": [{"entity": "莫尼嘎热", "role": "主体"}, {"entity": "忽必烈", "role": "委托者"}, {"entity": "阿热霍嘎", "role": "被勾召者"}], "location": "蒙古", "time_info": "", "layers": ["史传"], "quote": "”嘎热以上师圣者仁波切为证，运用风轮方便，结果忽必烈的弟弟阿热霍嘎已失去稳固性而出现，忽必烈仍旧满腹怀疑，于是又说：“在这个湖泊与这个草原之间降下霹雳。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "嘎热在湖泊与草原间降下霹雳使忽必烈信服", "participants": [{"entity": "莫尼嘎热", "role": "主体"}, {"entity": "忽必烈", "role": "观者"}], "location": "蒙古", "time_info": "", "layers": ["神变"], "quote": "'在这个湖泊与这个草原之间降下霹雳。'嘎热就在这之间降下了霹雳，国王才完全信服", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "开取伏藏", "title": "宿·释迦光等人开取长寿水伏藏", "participants": [{"entity": "宿·释迦光", "role": "伏藏师"}, {"entity": "革日穹札", "role": "参与者"}, {"entity": "温钦释迦桑", "role": "参与者"}, {"entity": "阿嘎雅那", "role": "参与者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "之后宿·释迦光、革日穹札、温钦释迦桑、宣旨钦差阿嘎雅那聚集起来，在众人当中开取伏藏，由于伏藏门前锋利的宝剑轮盘\n旋而无法入内，当时宿·释迦光祈祷见证者、供养伏藏主，结果宝剑归回本位，众人感到惊奇不已。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "忽必烈享用长寿水后封释迦光为国师并赏土地", "participants": [{"entity": "忽必烈", "role": "授封者"}, {"entity": "宿·释迦光", "role": "受封者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "钦差用许多东西缠上伏藏水宝瓶，连夜带回汉地，据说国王忽必烈享用后活了一百岁。由此国王嘉奖颁布敕书：卫藏后藏所有咒师全部免服兵役。因为与皇帝的诸位上师所为平等一味，封号为（巴式）国师。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "宿·释迦光六十三岁圆寂遗体愈麻风", "participants": [{"entity": "宿·释迦光", "role": "主体"}], "location": "卡多吉岩", "time_info": "{'text': '六十三岁', 'relative_to': '宿·释迦光 (E_864)', 'absolute': None}", "layers": ["史传"], "quote": "由于那里有龙类的大城市，龙请求供献甲甘唐湖以表心意，于是释迦光让龙类显示神变使之干涸以后就作为密宗大寺院，他一心一意在卡多吉岩中部修行，六十三岁圆寂，当时麻风病患者触到他的遗体麻风病便痊愈。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "达那敦德蒙古军入侵时救护众生", "participants": [{"entity": "达那敦德", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他说：'我不需求黄金，我希望你们作无畏施。'由此救护了芸芸众生", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "降伏非人", "title": "达那敦德在刚札以诛法降伏三万蒙古军兵保护萨迦教法", "participants": [{"entity": "达那敦德", "role": "主体"}], "location": "刚札", "time_info": "", "layers": ["史传"], "quote": "在刻卓普《大般若经》时，水源极其缺乏，依靠他的威力而使天降瓢泼大雨，当西藏阿里地区的蒙古族准备大肆损害萨迦教法时，依照皇帝的诏书和大官根云戒匝的旨意，他依靠诛法的威力在刚札降伏了三万军兵，由此对萨迦教法作出了卓越贡献。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "达那敦德刻经时天降大雨", "participants": [{"entity": "达那敦德", "role": "主体"}], "location": "卓普巴寺院", "time_info": "", "layers": ["神变"], "quote": "在刻卓普《大般若经》时，水源极其缺乏，依靠他的威力而使天降瓢泼大雨，当西藏阿里地区的蒙古族准备大肆损害萨迦教法时，依照皇帝的诏书和大官根云戒匝的旨意，他依靠诛法的威力在刚札降伏了三万军兵，由此对萨迦教法作出了卓越贡献。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "宿·香巴桑给在卓普出家", "participants": [{"entity": "宿·香巴桑给", "role": "受戒者"}], "location": "卓普巴寺院", "time_info": "", "layers": ["史传"], "quote": "宿·香巴桑给这位宿·香巴桑给由于苏醒了大乘种姓，孩提时代就具有大悲心，当看见别人害众生时，他会极度伤心。后来在卓普出家，而得此法名。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "宿·香巴桑给十四岁开始讲经说法", "participants": [{"entity": "宿·香巴桑给", "role": "主体"}], "location": "", "time_info": "{'text': '十四岁', 'relative_to': '宿·香巴桑给 (E_878)', 'absolute': None}", "layers": ["史传"], "quote": "后来在卓普出家，而得此法名。当他对法相因明和卓普法门了如指掌以后，十四岁便开始讲经说法，因此获得了智者的称号。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "宿·香巴桑给在多位上师前广泛闻法", "participants": [{"entity": "宿·香巴桑给", "role": "受者"}, {"entity": "达释迦佩", "role": "传法者"}, {"entity": "杰敦哲巴白", "role": "传法者"}, {"entity": "达敦宿则", "role": "传法者"}, {"entity": "宿隆巴哲土西年", "role": "传法者"}, {"entity": "卓普阿阇黎华秋", "role": "传法者"}, {"entity": "桑当哲巴华", "role": "传法者"}, {"entity": "刚瓦释迦白", "role": "传法者"}], "location": "", "time_info": "{'text': '十五岁至二十七岁', 'relative_to': '宿·香巴桑给 (E_878)', 'absolute': None}", "layers": ["史传"], "quote": "”十五岁在哦瓦隆地方于达释迦佩面前听受《密藏续》，进行修炼，结果成为智者之王。十七岁时撰著了续部注释，住持道场。十九岁在杰敦哲巴白面前听受《幻化网道次第》和大圆满，从而顿然生起证悟。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "宿·香巴桑给修行期间面见许多本尊", "participants": [{"entity": "宿·香巴桑给", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "总而言之，他在众多上师面前听受了内外明、三藏及无量续部，深入探究以后主要还是一心修行，修行期间面见许多本尊，不管谁到他面前都不由自主地生起出离心、信心和悲心。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "宿·香巴桑给被苯波徒下毒身亡年仅二十七岁", "participants": [{"entity": "宿·香巴桑给", "role": "受害者"}], "location": "", "time_info": "{'text': '二十七岁', 'relative_to': '宿·香巴桑给 (E_878)', 'absolute': None}", "layers": ["史传"], "quote": "总而言之，他在众多上师面前听受了内外明、三藏及无量续部，深入探究以后主要还是一心修行，修行期间面见许多本尊，不管谁到他面前都不由自主地生起出离心、信心和悲心。这位大德由于一个苯波徒在食物中下毒而只住世到二十七岁。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "雍敦巴在宿·香巴桑给面前圆满得受《经幻心》窍诀", "participants": [{"entity": "雍敦巴", "role": "受者"}, {"entity": "宿·香巴桑给", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在新旧密宗方面智力十足，特别成为噶玛巴自生金刚的得意弟子。在宿·香巴桑给面前圆满得受了《经幻心》的窍诀，而成为讲解这方面的伟大语自在者。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "降伏非人", "title": "雍敦巴以大威德轮灭害死宿·香巴桑给的苯波徒", "participants": [{"entity": "雍敦巴", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在幻轮降伏事业等方面尤为擅长，而且具有强大的威力。后来，对于害死宿·香巴桑给的苯波徒，他旋转大威德轮使他的人畜连同舍宅一扫而光，片甲不留。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "雍敦巴奉诏赴汉地展现禳解术和降雨能力", "participants": [{"entity": "雍敦巴", "role": "主体"}], "location": "汉地", "time_info": "", "layers": ["史传"], "quote": "在他年青时，奉诏到了汉地，也造了在这个世界上前所未闻的禳解术。当时个别地区出现大旱灾，他又奉诏使天降大雨，由此发挥出自己的能力。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "雍敦巴下半生受比丘戒改名多吉华", "participants": [{"entity": "雍敦巴", "role": "受戒者"}, {"entity": "凑巴秋隆巴", "role": "亲教师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "雅德大班智达见到此论后生起无比信心，师徒十五人到他面前恭敬顶礼。他下半生于凑巴秋隆巴面前受比丘戒，原名多吉白改为多吉华。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "雍敦巴八十二岁木蛇年圆寂", "participants": [{"entity": "雍敦巴", "role": "主体"}], "location": "", "time_info": "{'text': '八十二岁木蛇年', 'relative_to': '雍敦巴 (E_855)', 'absolute': None}", "layers": ["史传"], "quote": "他住在不丹、彭波大山、热德岩等地讲经说法广泛利益他众。八十二岁木蛇年圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "达那卓玛瓦桑哲多吉在宿·香巴桑给面前广泛闻法精通《幻化网》", "participants": [{"entity": "达那卓玛瓦桑哲多吉", "role": "受者"}, {"entity": "宿·香巴桑给", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "达那卓玛瓦桑哲多吉达那卓玛瓦桑哲多吉，是依靠宁玛密法获得成就的哲坚之子，木羊年出生在达那内萨地方。在宿·香巴桑给面前广泛闻法，尤其对《幻化网》最为精通。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "闭关修行", "title": "达那卓玛瓦在雪玛桑给修行达到觉性如量境界", "participants": [{"entity": "达那卓玛瓦桑哲多吉", "role": "主体"}], "location": "雪玛桑给", "time_info": "", "layers": ["史传"], "quote": "在兰涅擦巴索南滚波面前得受幻化网灌顶，智慧与事业令人难以测度。他一心向往寂静处，在雪玛桑给地方专心致志修行大圆满心滴法门，达到了觉性如量的境界，平等畅游如海佛刹。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "达那卓玛瓦桑哲多吉八十二岁火龙年圆寂授记极乐", "participants": [{"entity": "达那卓玛瓦桑哲多吉", "role": "主体"}], "location": "", "time_info": "{'text': '八十二岁火龙年', 'relative_to': '达那卓玛瓦桑哲多吉 (E_892)', 'absolute': None}", "layers": ["史传"], "quote": "共称为香巴全知的兰萨瓦在孩提时代就得受了这位上师赐予众多灌顶、恩赐加持而成为大智者，他诸如此类的加持实在不可思议。八十二岁火龙年临圆寂时他对儿子说：“我将前往极乐世界，你也要活到与我的年岁同等，尔后来极乐国土。”说完便示现圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "宿·桑波华奉诏赴汉地任皇帝诵经师展现威力", "participants": [{"entity": "宿·桑波华", "role": "主体"}, {"entity": "弯颜特汗", "role": "委托者"}], "location": "汉地", "time_info": "", "layers": ["史传"], "quote": "宿·桑波华宿氏传承和子传承中，宿氏传承是宿哈·释迦炯，他的父亲宿·桑波华在世时期，接受皇帝弯颜特汗的诏书，并得到赏赐，后
