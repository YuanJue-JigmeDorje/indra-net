ipants": [{"entity": "蒋花西宁", "role": "主体"}], "location": "菩提迦耶", "time_info": "", "layers": ["史传"], "quote": "对所有耳传作了旁注，由于暂时没有找到交付言传心滴教的法器，便把它隐藏在菩提迦耶东北方十字金刚印持的大磐石下，他自己前往位于菩提迦耶西方的索萨洲大尸林，为那里的不美空行母、无量有情及许多来往的住行修行者示教说法，并于一百零九年安住禅定中。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "弘法", "title": "蒋花西宁在索萨洲大尸林安住禅定一百零九年", "participants": [{"entity": "蒋花西宁", "role": "主体"}], "location": "索萨洲大尸林", "time_info": "一百零九年", "layers": ["史传"], "quote": "对所有耳传作了旁注，由于暂时没有找到交付言传心滴教的法器，便把它隐藏在菩提迦耶东北方十字金刚印持的大磐石下，他自己前往位于菩提迦耶西方的索萨洲大尸林，为那里的不美空行母、无量有情及许多来往的住行修行者示教说法，并于一百零九年安住禅定中。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "佛智在巴乐达巴巴达前听闻十八遍《密集续》未证悟", "participants": [{"entity": "佛智", "role": "受法者"}, {"entity": "巴乐达巴巴达", "role": "主体"}], "location": "贡嘎那", "time_info": "九年", "layers": ["史传"], "quote": "佛智尊者一开始也依止了匝兰达热巴、邬金阿阇黎嘎毕多吉、瑜伽士玛革讷热等\n多位上师，广闻所有密宗法理，一切资具依靠财神、增禄天母提供。一次，他在九年期间依止贡嘎那的阿阇黎巴乐达巴巴达，听了十八遍《密集续》，可是并没有证悟真如本性。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "灌顶", "title": "蒋花西宁幻化文殊金刚坛城为佛智灌顶并传大圆满心部窍诀", "participants": [{"entity": "蒋花西宁", "role": "主体"}, {"entity": "佛智", "role": "受者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "佛智尊者心里十分悲伤，满怀深情诚心诚意地祈祷道“您是一切众生唯一父……”上师又再度如前那样幻化出坛城，为他灌顶，并讲解了大圆满心部的窍诀，依此他证悟了等同虚空的境界。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "圆寂", "title": "佛智中阴时现前金刚持果位", "participants": [{"entity": "佛智", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "以结集的方式造了《文殊言教·二次第真如》修法的这位大师，他已经深入领悟到了万法的堂奥，可是由于一开始没有享用狗吐出的食物且对主人的行为等没有起信，依此缘起即生中未能获得殊胜成就，但在中阴时现前了金刚持果位。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "西日桑哈在哈热巴拉前三年听受声明因明等", "participants": [{"entity": "西日桑哈", "role": "受法者"}, {"entity": "哈热巴拉", "role": "主体"}], "location": "", "time_info": "三年", "layers": ["史传"], "quote": "西日桑哈在那时候，汉地秀恰城市施主具善意和智光母有一位具有头陀功德之子，名为阿阇黎西日桑哈，他到了十五岁的时候，三年之中在哈热巴拉教师前听受了声明学、因明学等共同明处，成了一名大智者。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "西日桑哈在五台山贝拉革德前听闻内外密法", "participants": [{"entity": "西日桑哈", "role": "受法者"}, {"entity": "贝拉革德", "role": "主体"}], "location": "五台山", "time_info": "", "layers": ["史传"], "quote": "”他感到心满意足，但转念一想：为了容易理解无上佛果，对密宗的其余续部也要精通，于是就到五台山贱种上师贝拉革德前无一遗漏地听闻了内外密法，全部深刻体悟，出家以后成为持藏比丘，在三十年期间守持戒律。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "神变", "title": "西日桑哈三年修行成就持明身飞行到索萨洲", "participants": [{"entity": "西日桑哈", "role": "主体"}], "location": "", "time_info": "三年修行", "layers": ["神变"], "quote": "经过圣者观世音再一次授记提醒，他便前往印度，路途中，他想要修成毫不费力的神变，于是在三年当中修行，结果成就了持明身。随即脚离地面一肘左右飞行来到了索萨洲尸林，拜见蒋花西宁大师，并且加以承侍，后来祈求上师摄受。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "西日桑哈在蒋花西宁前二十五年听受教授", "participants": [{"entity": "西日桑哈", "role": "受法者"}, {"entity": "蒋花西宁", "role": "主体"}], "location": "索萨洲大尸林", "time_info": "二十五年", "layers": ["史传"], "quote": "随即脚离地面一肘左右飞行来到了索萨洲尸林，拜见蒋花西宁大师，并且加以承侍，后来祈求上师摄受。上师也欢欣喜悦地应允，并在二十五年期间把所有教授与随教恩赐予他。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "圆寂", "title": "蒋花西宁化光并以宝箧交付《六修觉受》遗教给西日桑哈", "participants": [{"entity": "蒋花西宁", "role": "主体"}, {"entity": "西日桑哈", "role": "受遗教者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "随后，蒋花西宁大师身体化为光蕴身。当时西日桑哈悲痛呼唤，结果上师从空中现身，将一指大的宝箧交在他的手中，传下了《六修觉受》的遗教。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "伏藏", "title": "西日桑哈取出隐藏续部并将窍诀部分四类伏藏", "participants": [{"entity": "西日桑哈", "role": "主体"}], "location": "菩提迦耶、菩提树飞檐殿堂、吉祥门殿堂", "time_info": "", "layers": ["史传"], "quote": "阿阇黎西日桑哈从菩提迦耶的下面取出了以前隐藏的所有续部，到达汉地，将大圆满窍诀部分成外、内、密、无上密四类。前三类编辑为有戏论之义，伏藏在菩提树飞檐殿堂里。无上密类按照空行授\n记，以发愿印持隐藏在（西安）吉祥门殿堂的柱子中，他自己在清凉大尸林，伴着非人们的承侍，安住在禅定中。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "圆寂", "title": "后蒋花西宁最后有漏身体消失无踪（虹身）", "participants": [{"entity": "后蒋花西宁", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "在此之后，蒋花西宁阿阇黎化生到印度西方金饰洲，被人们称为后蒋花西宁，据说他将所有内外密法传给莲花生大士，也为圣天阿阇黎宣讲了大圆满，最后有漏身体消失无踪（即虹身）。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "金刚萨埵亲自授记布玛莫札与嘉纳思札前往汉地菩提树殿堂", "participants": [{"entity": "金刚萨埵", "role": "授记者"}, {"entity": "布玛莫札", "role": "受记者"}, {"entity": "嘉纳思札", "role": "受记者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "他们二人一起安住，金刚萨埵亲自现身对他们说：“奇哉！二位善男子，你们俩虽然曾经五百世受身为班智达，修行妙法，可是以前没有获得果位，现在也没有证果，如果想要即生使有漏身体消失而成佛，就前往汉地菩提树殿堂去吧！”听到此授记，布玛莫札即刻带上钵盂启程，到达目的地，拜见西日桑哈阿阇黎。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "布玛莫札在西日桑哈前二十年听受耳传教言", "participants": [{"entity": "布玛莫札", "role": "受法者"}, {"entity": "西日桑哈", "role": "主体"}], "location": "菩提树飞檐殿堂", "time_info": "二十年", "layers": ["史传"], "quote": "他们二人一起安住，金刚萨埵亲自现身对他们说：“奇哉！二位善男子，你们俩虽然曾经五百世受身为班智达，修行妙法，可是以前没有获得果位，现在也没有证果，如果想要即生使有漏身体消失而成佛，就前往汉地菩提树殿堂去吧！”听到此授记，布玛莫札即刻带上钵盂启程，到达目的地，拜见西日桑哈阿阇黎。上师在二十年期间将耳传内、外、密教言无余赐予他，然而并没有恩赐这些法本。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "嘉纳思札在西日桑哈前得耳传教授及法本", "participants": [{"entity": "嘉纳思札", "role": "受法者"}, {"entity": "西日桑哈", "role": "主体"}], "location": "清凉尸陀林", "time_info": "九年", "layers": ["史传"], "quote": "三年之中，尽心尽力承侍上师，令师欢喜，最后供上纯金曼茶罗请求恩赐教授。上师在九年当中把耳传的教授及法本赐予他。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "灌顶", "title": "西日桑哈为嘉纳思札圆满授予四级灌顶及无上密窍诀", "participants": [{"entity": "西日桑哈", "role": "主体"}, {"entity": "嘉纳思札", "role": "受者"}], "location": "够萨拉山顶", "time_info": "三年传授无上密窍诀+十六年修行", "layers": ["史传"], "quote": "”上师圆满赐予外有戏灌顶，随后在三年中传授了无上密的所有窍诀，要求他实地修行。上师又圆满赐予无戏灌顶，并让他在够萨拉山顶上作区分有寂的行为，逐步将极无戏灌顶和最无戏灌顶也圆满恩赐。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "圆寂", "title": "西日桑哈趣入涅槃并赐《七钉遗教》给嘉纳思札", "participants": [{"entity": "西日桑哈", "role": "主体"}, {"entity": "嘉纳思札", "role": "受遗教者"}], "location": "龟兹国", "time_info": "", "layers": ["神变"], "quote": "在另一时间，他应龟兹国（如今的新疆）的国王迎请而到了该地，七天之内传出巨响并出现了大兆头，结果益西多看到上方虚空中安坐着上师，他知道上师要趣入涅槃，便悲哀哭喊。结果《七钉遗教》落在手中，也听到了“心滴密诀的所有法本在吉祥门柱子内，取出它去往巴桑尸陀林”的授记。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "伏藏", "title": "嘉纳思札从吉祥门柱子取出秘密法本后到巴桑尸林转法轮", "participants": [{"entity": "嘉纳思札", "role": "主体"}], "location": "吉祥门殿堂、巴桑尸林", "time_info": "", "layers": ["史传"], "quote": "于是嘉纳思札从指定地点取出了所有秘密法本以后就到印度巴桑尸林中，一边为该处的世间及出世间空行、空行母转秘密心滴法轮，一边安住在此。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "布玛莫札拜见嘉纳思札得更甚深心滴教授", "participants": [{"entity": "布玛莫札", "role": "受法者"}, {"entity": "嘉纳思札", "role": "主体"}], "location": "巴桑尸林", "time_info": "", "layers": ["史传"], "quote": "空行母亲自告诉他说：“奇哉，具缘者，如果想求得较前更为甚深的心滴教授就去巴桑大尸林。”他遵此授记而来到巴桑尸林，拜见嘉纳思札，请求摄受、恩赐更为甚深的教授。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "灌顶", "title": "嘉纳思札为布玛莫札授予四级灌顶及大圆满四类教言", "participants": [{"entity": "嘉纳思札", "role": "主体"}, {"entity": "布玛莫札", "role": "受者"}], "location": "巴桑尸林、日光山顶", "time_info": "十年修行", "layers": ["史传"], "quote": "上师显示种种神变，为他完整赐予有戏、无戏灌顶，随后他在日光山顶上作区分有寂行为。他依靠上师圆满授予极无戏灌顶而生起了不同寻常的证悟，鼻尖上也出现了一个接近坠落的白色阿字。接着上师又圆满赐予最无戏灌顶，结果他现见了心的赤裸本性。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "圆寂", "title": "嘉纳思札身体化光并以五宝箧赐《四安住法》遗教给布玛莫札", "participants": [{"entity": "嘉纳思札", "role": "主体"}, {"entity": "布玛莫札", "role": "受遗教者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "此后，嘉纳思札身体化光，布玛莫札大声悲泣，上师又再度亲自现身，赐予一个五种珍宝盖印的宝箧，落到他的手里，他得到了《四安住法》的遗教，一五一十正确无误地掌握了词句。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "弘法", "title": "布玛莫札为狮子贤国王国师达二十年", "participants": [{"entity": "布玛莫札", "role": "主体"}, {"entity": "狮子贤", "role": "护持者"}], "location": "嘎玛热城市", "time_info": "二十年", "layers": ["史传"], "quote": "此后，嘉纳思札身体化光，布玛莫札大声悲泣，上师又再度亲自现身，赐予一个五种珍宝盖印的宝箧，落到他的手里，他得到了《四安住法》的遗教，一五一十正确无误地掌握了词句。后来，布玛莫札在东方嘎玛热城市作为狮子贤国王的国师达二十年。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "伏藏", "title": "布玛莫札将胜密经函写三遍分别隐藏三处", "participants": [{"entity": "布玛莫札", "role": "主体"}], "location": "邬金、克什米尔、极能明大尸林", "time_info": "", "layers": ["史传"], "quote": "继此之后，在极能明大尸林中行持克胜诸方的禁行，并为凶猛残暴的众生讲经说法，且将胜密的所有经函写了三遍，一份隐藏在邬金地方金沙铺地的海岛上，一份隐藏在克什米尔金洲的山岩处，一份安放在此尸陀林诸空行母供养的所依内。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "圆寂", "title": "布玛莫札成就大虹身", "participants": [{"entity": "布玛莫札", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "继此之后，在极能明大尸林中行持克胜诸方的禁行，并为凶猛残暴的众生讲经说法，且将胜密的所有经函写了三遍，一份隐藏在邬金地方金沙铺地的海岛上，一份隐藏在克什米尔金洲的山岩处，一份安放在此尸陀林诸空行母供养的所依内。阿阇黎他自己最后成就大虹身，而相合适宜地住在印度，有关他来到藏地的经过在下文中予以叙述。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "弘法", "title": "仲瓦得龙树密宗论典书函形成《密集续·圣类》兴盛开端", "participants": [{"entity": "仲瓦", "role": "主体"}, {"entity": "圣龙树", "role": "著者"}, {"entity": "玛拉当革巴", "role": "主体"}], "location": "贡嘎那", "time_info": "", "layers": ["史传"], "quote": "比如，龙树菩萨的所有密宗论典，包括他和亲传弟子在内圆寂以后过了很长时间，贡嘎那的仲瓦尊者才得到《明灯论》的书函。玛当革巴见到了圣天论师的智慧身……由此才形成了《密集续·圣类》兴盛的开端。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "弘法", "title": "巴拉巴札国王拜寂隐为师弘扬如来教", "participants": [{"entity": "巴拉巴札", "role": "主体"}, {"entity": "寂隐", "role": "上师"}], "location": "波雪山、布德戒", "time_info": "", "layers": ["史传"], "quote": "到了后来，印度南方的波雪山范围内，布德戒地方，执掌国政、成就密宗的国王名叫巴拉巴札，他统治了南方的大多数地带，拜寂隐及其弟众为上师，重新把如来教珍宝弘扬开来。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "神变", "title": "观音加持猴子来藏，与罗刹女繁衍藏人", "participants": [{"entity": "观音", "role": "主体"}, {"entity": "岩罗刹女", "role": "客体"}], "location": "藏地", "time_info": "", "layers": ["神变", "授记"], "quote": "在其中列居第三的雪域，佛教是从什么时候出现的呢？按照《文殊根本续》中“雪域由湖减，出现娑罗林”的授记，人们一致共称：首先在湖泊逐渐减少形成郁郁葱葱的森林时期，普陀山大悲观音加持的一只猴子来到雪域，他和岩罗刹女交配，由此繁衍藏人。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "授记", "title": "《文殊根本续》授记雪域从湖变林", "participants": [{"entity": "文殊根本续", "role": "典据来源"}], "location": "藏地", "time_info": "", "layers": ["授记", "典据"], "quote": "在其中列居第三的雪域，佛教是从什么时候出现的呢？按照《文殊根本续》中“雪域由湖减，出现娑罗林”的授记，人们一致共称：首先在湖泊逐渐减少形成郁郁葱葱的森林时期，普陀山大悲观音加持的一只猴子来到雪域，他和岩罗刹女交配，由此繁衍藏人。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "授记", "title": "《无垢天女授记经》授记佛法弘扬于红面人之境", "participants": [{"entity": "无垢天女授记经", "role": "典据来源"}], "location": "藏地", "time_info": "{'text': '入灭后两千五百年', 'relative_to': '释迦牟尼佛', 'absolute': None}", "layers": ["授记", "典据"], "quote": "他的太子莫赤赞普等天赤七王、上当二王、地上勒六王、地德八王、赞王五代等等依次出世，其中前面历代王朝时期是由神话、谜语、苯教来辅佐国政。《无垢天女授记经》中授记说：“我入灭后两千五百年佛法将弘扬于红面人之境内。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "执政", "title": "涅赤赞普成为藏地第一位国王", "participants": [{"entity": "涅赤赞普", "role": "主体"}], "location": "赞塘阁希", "time_info": "", "layers": ["史传"], "quote": "此地一开始被非人据为己有，渐渐地，人类的众生才形成，依次统治了十二小国或者四十个零星小国。\n涅赤赞普继此之后在藏地出现了第一位国王涅赤赞普。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "迎请", "title": "苯波教徒迎请涅赤赞普为王", "participants": [{"entity": "涅赤赞普", "role": "受者"}, {"entity": "苯教", "role": "迎请者"}], "location": "赞塘阁希", "time_info": "", "layers": ["史传"], "quote": "人们又问：“你从哪里来？”他把手指举向空中。就这样，人们设立木座，把他扛在肩上迎请回去，由此被共称为涅赤赞普（即肩座王）。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "神变", "title": "涅赤赞普现身于如波神山口", "participants": [{"entity": "涅赤赞普", "role": "主体"}], "location": "如波神山口", "time_info": "", "layers": ["传闻"], "quote": "依据教证，所有法王都是出世于乐匝布种姓中，有些认为这位国王是百军王的太子。不管怎样，超出常人的一个奇特人物出现在雪域的如波神山口，他来到赞塘阁希。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "神变", "title": "宝箧降落于永布拉冈王宫", "participants": [{"entity": "拉托托日涅赞", "role": "受者"}, {"entity": "百拜忏悔经", "role": "降落之物"}, {"entity": "如意珠总持印模", "role": "降落之物"}, {"entity": "宝箧经", "role": "降落之物"}, {"entity": "六字真言", "role": "降落之物"}, {"entity": "金塔", "role": "降落之物"}], "location": "永布拉冈", "time_info": "{'text': '第二十八代王朝', 'relative_to': '涅赤赞普 (E_010)', 'absolute': None}", "layers": ["神变"], "quote": "”\n拉托托日涅赞按照经中授记，第二十八代王朝，普贤菩萨的化身拉托托日涅赞居于皇宫永布拉冈的时候，一个宝箧落到王宫顶上，打开一看，里面有《百拜忏悔经》、如意珠总持印模、《宝箧经》、《六字真言》和金塔。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "神变", "title": "拉托托日涅赞因供养宝箧而返老还童增寿", "participants": [{"entity": "拉托托日涅赞", "role": "主体"}, {"entity": "玄秘神物", "role": "供养对象"}], "location": "永布拉冈", "time_info": "{'text': '六十一岁变得好似十六岁一般，额外增加六十年寿命，活到一百二十岁', 'relative_to': '拉托托日涅赞 (E_013)', 'absolute': None}", "layers": ["神变"], "quote": "虽然国王不知道这到底是何物，但还是知道非常贤妙，便取名为玄秘神物，并恭敬、供养，依此加持，六十一岁的国王竟然变得好似十六岁一般容颜柔嫩，额外增加了六十年的寿命，结果活到一百二十岁。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "授记", "title": "拉托托日涅赞获得五代后有人通晓法义的授记", "participants": [{"entity": "拉托托日涅赞", "role": "受者"}], "location": "永布拉冈", "time_info": "{'text': '再过五个朝代以后', 'relative_to': '拉托托日涅赞 (E_013)', 'absolute': None}", "layers": ["授记"], "quote": "他得到'再过五个朝代以后会有人对经中含义心领神会'的授记，这标志着正法的开端", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "弘法", "title": "班智达罗色措与译师特乐色携法要来藏", "participants": [{"entity": "罗色措", "role": "主体"}, {"entity": "特乐色", "role": "主体"}, {"entity": "拉托托日涅赞", "role": "受者"}], "location": "藏地", "time_info": "", "layers": ["史传"], "quote": "实际上，是班智达罗色措与译师特乐色带着那两种法要来到雪域，可是国王既\n不懂文字也不理解意义，为此班智达与译师又返回故里。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "授记", "title": "静命堪布告巴色朗三人前世在迦叶佛时发愿弘法", "participants": [{"entity": "静命", "role": "授记者"}, {"entity": "巴色朗", "role": "受者"}, {"entity": "迦叶佛", "role": "背景"}], "location": "尼泊尔", "time_info": "{'text': '迦叶佛教法时', 'relative_to': '迦叶佛 (E_007)', 'absolute': None}", "layers": ["授记", "典据"], "quote": "后来，巴色朗 60 到了尼泊尔，拜见静命堪布时，堪布说：“吐蕃国王、你和我三人曾经在迦叶佛教法时成为养鸡女的三个儿子，后来发愿在藏地弘扬佛法，但是，由于赞普还没有诞生于世，你也一直拖延，以至于我在这儿已经等了九代王朝。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "授记", "title": "《文殊根本续》授记松赞干布出生", "participants": [{"entity": "文殊根本续", "role": "典据来源"}, {"entity": "松赞干布", "role": "授记对象"}], "location": "藏地", "time_info": "{'text': '拉托托日以后的第五代', 'relative_to': '拉托托日涅赞 (E_013)', 'absolute': None}", "layers": ["授记", "典据"], "quote": "松赞干布《文殊根本续》中说：“名为具天境，雪域之境内，住有人君王，出生乐匝族……”依据这一授记，拉托托日以后的第五代，观世音菩萨示现为人君的形象法王松赞干布。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "执政", "title": "松赞干布十三岁执掌国政", "participants": [{"entity": "松赞干布", "role": "主体"}], "location": "藏地", "time_info": "{'text': '十三岁时', 'relative_to': '松赞干布 (E_014)', 'absolute': None}", "layers": ["史传"], "quote": "松赞干布《文殊根本续》中说：“名为具天境，雪域之境内，住有人君王，出生乐匝族……”依据这一授记，拉托托日以后的第五代，观世音菩萨示现为人君的形象法王松赞干布。他在十三岁时执掌国政，十五岁时由自己化现的比丘阿嘎玛德西日迎请自现圣者观音。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "迎请", "title": "比丘阿嘎玛德西日迎请自现圣者观音", "participants": [{"entity": "松赞干布", "role": "化现者"}, {"entity": "阿嘎玛德西日", "role": "迎请者"}, {"entity": "观世音菩萨", "role": "被迎请之圣物"}], "location": "藏地", "time_info": "{'text': '十五岁时', 'relative_to': '松赞干布 (E_014)', 'absolute': None}", "layers": ["神变"], "quote": "松赞干布《文殊根本续》中说：“名为具天境，雪域之境内，住有人君王，出生乐匝族……”依据这一授记，拉托托日以后的第五代，观世音菩萨示现为人君的形象法王松赞干布。他在十三岁时执掌国政，十五岁时由自己化现的比丘阿嘎玛德西日迎请自现圣者观音。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "婚姻联姻", "title": "松赞干布迎娶赤尊公主与文成公主", "participants": [{"entity": "松赞干布", "role": "主体"}, {"entity": "赤尊公主", "role": "王妃"}, {"entity": "文成公主", "role": "王妃"}, {"entity": "噶尔东赞", "role": "法臣/谋议者"}, {"entity": "八岁佛像", "role": "迎请目的物"}, {"entity": "十二岁佛像", "role": "迎请目的物"}], "location": "藏地", "time_info": "", "layers": ["史传"], "quote": "与金刚手幻化的法臣噶尔东赞商议：为了迎请我等本师真佛的代表八岁与十二岁的佛像，以随顺世间的方式迎娶了颦眉度母的化身——尼泊尔赤尊公主以及度母的化身——汉族文成公主，即共称为海中莲花的两位王妃。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "闭关修行", "title": "松赞干布与二王妃在玛热王宫闭关修行本尊", "participants": [{"entity": "松赞干布", "role": "主体"}, {"entity": "赤尊公主", "role": "主体"}, {"entity": "文成公主", "role": "主体"}], "location": "玛热王宫", "time_info": "", "layers": ["史传"], "quote": "在建造大昭寺时，遭到非人危害，依此因缘，在吉曲尼占帕翁卡地方共称为玛热王宫里，国王与二位王妃闭关修行本尊，结果得以成就。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "建寺", "title": "松赞干布兴建镇肢寺、镇节寺、大昭寺与小昭寺", "participants": [{"entity": "松赞干布", "role": "施主/主体"}, {"entity": "大昭寺", "role": "所建寺院"}, {"entity": "小昭寺", "role": "所建寺院"}, {"entity": "镇肢寺", "role": "所建寺院"}, {"entity": "镇节寺", "role": "所建寺院"}], "location": "藏地", "time_info": "", "layers": ["史传"], "quote": "在建造大昭寺时，遭到非人危害，依此因缘，在吉曲尼占帕翁卡地方共称为玛热王宫里，国王与二位王妃闭关修行本尊，结果得以成就。依照授记，推翻罗刹女仰面的要地，建起镇肢寺与镇节寺，并改良所有恶劣凶地，兴建起大昭寺与小昭寺的所依能依。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "迎请", "title": "从印度和尼泊尔迎请法师来藏翻译经典", "participants": [{"entity": "松赞干布", "role": "施主"}, {"entity": "革萨绕", "role": "受迎请者"}, {"entity": "祥嘎绕", "role": "受迎请者"}, {"entity": "西日拉玛匝", "role": "受迎请者"}, {"entity": "玛哈雅那", "role": "受迎请者"}], "location": "藏地", "time_info": "", "layers": ["史传"], "quote": "从印度迎请阿阇黎革萨绕和婆罗门祥嘎绕，又请来尼泊尔的大师西日拉玛匝与汉地的和尚玛哈雅那等，翻译了大量的三藏及续部，创立起了佛法的轨范。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "译经", "title": "松赞干布时期翻译三藏及续部", "participants": [{"entity": "松赞干布", "role": "施主"}, {"entity": "革萨绕", "role": "译者"}, {"entity": "祥嘎绕", "role": "译者"}, {"entity": "西日拉玛匝", "role": "译者"}, {"entity": "玛哈雅那", "role": "译者"}], "location": "藏地", "time_info": "", "layers": ["史传"], "quote": "从印度迎请阿阇黎革萨绕和婆罗门祥嘎绕，又请来尼泊尔的大师西日拉玛匝与汉地的和尚玛哈雅那等，翻译了大量的三藏及续部，创立起了佛法的轨范。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "传法", "title": "松赞干布暗中为有缘者传授大悲寂猛教言", "participants": [{"entity": "松赞干布", "role": "传法者"}, {"entity": "大悲寂猛教言", "role": "所传法要"}], "location": "藏地", "time_info": "", "layers": ["史传"], "quote": "从印度迎请阿阇黎革萨绕和婆罗门祥嘎绕，又请来尼泊尔的大师西日拉玛匝与汉地的和尚玛哈雅那等，翻译了大量的三藏及续部，创立起了佛法的轨范。尽管那时还没有真正出现讲法闻法，但是国王自身也是在暗地里为众多有缘者传授大悲寂猛教言，并加以实修。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "伏藏埋藏", "title": "松赞干布将《国王遗教》隐藏为三个伏藏", "participants": [{"entity": "松赞干布", "role": "伏藏埋藏者"}, {"entity": "国王遗教", "role": "伏藏品"}], "location": "藏地", "time_info": "", "layers": ["神变"], "quote": "当时所有言教综合一起的《国王遗教》隐藏成三个伏藏，由哲土哦哲、阿达尼、敦巴释迦光三位开取伏藏，当今被人们一致称为《玛尼全集》，这是藏地正法的起始。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "伏藏开取", "title": "三位伏藏师开取《国王遗教》", "participants": [{"entity": "哲土哦哲", "role": "伏藏师"}, {"entity": "阿达尼", "role": "伏藏师"}, {"entity": "敦巴释迦光", "role": "伏藏师"}, {"entity": "国王遗教", "role": "伏藏品"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "当时所有言教综合一起的《国王遗教》隐藏成三个伏藏，由哲土哦哲、阿达尼、敦巴释迦光三位开取伏藏，当今被人们一致称为《玛尼全集》，这是藏地正法的起始。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "派遣", "title": "松赞干布派囤弥桑布札赴印度学习声明和文字", "participants": [{"entity": "松赞干布", "role": "派遣者"}, {"entity": "囤弥桑布札", "role": "受派者"}], "location": "印度", "time_info": "", "layers": ["史传"], "quote": "当时所有言教综合一起的《国王遗教》隐藏成三个伏藏，由哲土哦哲、阿达尼、敦巴释迦光三位开取伏藏，当今被人们一致称为《玛尼全集》，这是藏地正法的起始。文殊菩萨的化身囤弥桑布札被派到印度学习声明和文字，后来以梵文作为蓝本，撰著了藏文字形和《语言学书籍》八本。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "创制文字", "title": "囤弥桑布札以梵文为蓝本创制藏文", "participants": [{"entity": "囤弥桑布札", "role": "主体"}, {"entity": "语言学书籍", "role": "著作成果"}], "location": "藏地", "time_info": "", "layers": ["史传"], "quote": "当时所有言教综合一起的《国王遗教》隐藏成三个伏藏，由哲土哦哲、阿达尼、敦巴释迦光三位开取伏藏，当今被人们一致称为《玛尼全集》，这是藏地正法的起始。文殊菩萨的化身囤弥桑布札被派到印度学习声明和文字，后来以梵文作为蓝本，撰著了藏文字形和《语言学书籍》八本。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "立法", "title": "松赞干布树立十善法与在家道德规范十六条", "participants": [{"entity": "松赞干布", "role": "主体"}, {"entity": "十善法", "role": "法令内容"}, {"entity": "在家道德规范十六条", "role": "法令内容"}], "location": "藏地", "time_info": "", "layers": ["史传"], "quote": "在雪域这片领土，以前没有提及过如法取舍，从此以后，才开始打开正法、如法言论的大门，树立十善法、重新创立了以在家道德规范十六条 62 为主善妙的二规法令，加持藏地成为财产、受用、正法的源泉。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "授记", "title": "松赞干布铜牌授记第五代出现正法", "participants": [{"entity": "松赞干布", "role": "授记者"}, {"entity": "赤松德赞", "role": "授记对象"}], "location": "", "time_info": "{'text': '从现在起到第五代时', 'relative_to': '松赞干布 (E_014)', 'absolute': None}", "layers": ["授记"], "quote": "师君三尊此后到了第五代王朝，文殊菩萨幻化人君赤松德赞出世，祖父松赞干布曾亲自授记“从现在起到第五代时，我的曾孙（因为松赞干布、赤松德赞与赤热巴坚被称为祖孙三尊）国王德时期出现正法。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "执政", "title": "赤松德赞十三岁执掌国政", "participants": [{"entity": "赤松德赞", "role": "主体"}], "location": "藏地", "time_info": "{'text': '十三岁时', 'relative_to': '赤松德赞 (E_P01)', 'absolute': None}", "layers": ["史传"], "quote": "这一授记时间已到。国王赤松德赞在十三岁时执掌国政，二十岁发心弘扬正法，之后迎请萨霍的堪布菩提萨埵绕杰达（即静命）。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "迎请", "title": "赤松德赞迎请静命堪布入藏", "participants": [{"entity": "赤松德赞", "role": "施主/迎请者"}, {"entity": "静命", "role": "受迎请者"}], "location": "藏地", "time_info": "{'text': '二十岁发心弘扬正法，之后迎请', 'relative_to': '赤松德赞 (E_P01)', 'absolute': None}", "layers": ["史传"], "quote": "这一授记时间已到。国王赤松德赞在十三岁时执掌国政，二十岁发心弘扬正法，之后迎请萨霍的堪布菩提萨埵绕杰达（即静命）。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "弘法", "title": "静命为藏人传授八关斋戒及宣讲十善、十八界法门", "participants": [{"entity": "静命", "role": "传法者"}, {"entity": "八关斋戒", "role": "所传法要"}, {"entity": "十善", "role": "所传法要"}], "location": "藏地", "time_info": "", "layers": ["史传"], "quote": "国王赤松德赞在十三岁时执掌国政，二十岁发心弘扬正法，之后迎请萨霍的堪布菩提萨埵绕杰达（即静命）。亲教师静命为个别人传授八关斋戒，并宣讲了十善、十八界 63 相应的法门。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "神变", "title": "藏地凶神恶煞雷击红山、水冲宫殿", "participants": [{"entity": "赤松德赞", "role": "受害方"}], "location": "红山", "time_info": "", "layers": ["神变"], "quote": "亲教师静命为个别人传授八关斋戒，并宣讲了十善、十八界 63 相应的法门。对此，藏地的凶神恶煞勃然大怒，他们雷击红山 64 ，水冲澎塘的宫殿，使天灾人祸屡屡出现。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "离藏", "title": "静命暂离藏地赴尼泊尔", "participants": [{"entity": "静命", "role": "主体"}, {"entity": "赤松德赞", "role": "施主"}], "location": "尼泊尔", "time_info": "", "layers": ["史传"], "quote": "所有奸臣都说：“这是行持正法造成的，必须要把印度瑜伽师（菩提萨埵）遣送回故土。”国王供养堪布大量的黄金，把事情的经过原原本本地讲述了。静命堪布说：“原来是藏地的所有非人不高兴。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "派遣", "title": "静命与赤松德赞先后派遣信使迎请莲师", "participants": [{"entity": "静命", "role": "派遣者"}, {"entity": "赤松德赞", "role": "派遣者"}, {"entity": "莲花生大士", "role": "被迎请者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "那么我暂时去尼泊尔境内，要调伏藏地的妖魔鬼怪，当今在整个大地上有一位最富有威力的密宗堪布莲花生大士。我派人去请他，国王你也要派人去。”\n于是他们先后派遣信使先行，又派降魔金刚等迅速上路。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "神变", "title": "莲师顷刻到达芒耶贡塘与使者会面", "participants": [{"entity": "莲花生大士", "role": "主体"}], "location": "芒耶贡塘", "time_info": "", "layers": ["神变"], "quote": "”\n于是他们先后派遣信使先行，又派降魔金刚等迅速上路。当时，莲花生大士知晓此事，顷刻之间到达芒耶贡塘地方，双方见面。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "神变", "title": "莲师撒金创藏地金矿缘起", "participants": [{"entity": "莲花生大士", "role": "主体"}], "location": "阿里", "time_info": "", "layers": ["神变"], "quote": "莲师说：'我的境界中全是黄金。'然后把他们的金子撒向阿里方向，这也创造了藏地出现金矿的缘起", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "降伏非人", "title": "莲师入藏途中以禅定降伏阻路鬼神", "participants": [{"entity": "莲花生大士", "role": "主体"}], "location": "藏地", "time_info": "", "layers": ["神变"], "quote": "后来，菩提萨埵带着尼泊尔的一位著名石匠，提前到达，莲师从吉中来到，这时藏地的鬼神们降下大雪大雨，并使所有山川相互闭合，莲师则从山间畅通无阻穿行而过，依靠禅定把所有鬼神紧紧束缚住，让他们立誓守护正法。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "降伏非人", "title": "莲师遍踏藏地降伏十二地母等大力非人", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "十二地母", "role": "被降伏者"}, {"entity": "十三革绕神", "role": "被降伏者"}, {"entity": "二十一优婆塞", "role": "被降伏者"}], "location": "藏地", "time_info": "", "layers": ["神变"], "quote": "从此时起，莲师依靠幻变逐渐踏遍了包括阿里、卫藏、多康在内的整个藏地，降伏了十二地母 65 、十三革绕神 66 、二十一优婆塞 67 为主的一切大力非人，他们都诚心诚意立誓守护正法。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "开光", "title": "札马珍桑殿堂开光——佛像开口说话、供品发声增多", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "赤松德赞", "role": "主体"}, {"entity": "札马珍桑殿堂", "role": "开光场所"}], "location": "札马珍桑殿堂", "time_info": "", "layers": ["神变"], "quote": "在札马珍桑殿堂进行开光时，他们将所有佛像迎请到宴会的地点，到了晚上，整个殿堂空空如也，第二天早晨寺庙里所有佛像享用神馐并且开口说话，这是在场人亲眼目睹的，当天所有供品全部自动发出音声，并增多起来。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "降伏非人", "title": "莲师通过圆光识别和降伏残暴天神龙类", "participants": [{"entity": "莲花生大士", "role": "主体"}], "location": "札马珍桑殿堂", "time_info": "", "layers": ["神变"], "quote": "请一些诸根敏锐、聪明伶俐的小孩看圆光 69，结果他们说出了以前对堪布菩提萨埵讲经说法满怀仇恨的藏地残暴天神及龙类的名称、行为、住处等等。莲师用咄咄逼人的威力，使他们都俯首贴耳，立下誓言，皈入正法，并且承诺各自的命咒、仪轨，依此也没有降伏的所有鬼神就依靠烧施 70 来调伏等等，先后做了两次。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "降伏非人", "title": "莲师降伏无恼龙等龙类协助建寺", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "无恼龙", "role": "被降伏者/供养者"}, {"entity": "赤松德赞", "role": "受者"}], "location": "藏地", "time_info": "", "layers": ["神变"], "quote": "莲师用咄咄逼人的威力，使他们都俯首贴耳，立下誓言，皈入正法，并且承诺各自的命咒、仪轨，依此也没有降伏的所有鬼神就依靠烧施 70 来调伏等等，先后做了两次。莲师又降伏了无恼龙等所有龙类，使他们协助国王，供养了建造寺宇的十四藏斗金粉。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "降伏非人", "title": "莲师在黑波山降伏鬼神罗刹", "participants": [{"entity": "莲花生大士", "role": "主体"}], "location": "黑波山", "time_info": "", "layers": ["神变"], "quote": "菩提萨埵观察地基，莲花生大士来到黑波山，降伏所有鬼神罗刹，使他们言听计从。依靠《吉祥证道歌》镇压鬼神，并且依靠在空中跳金刚舞来加持地基，在拉线绳的时候，莲师凭借禅定勾召龙子和天子，他们牵着绳端，遵照堪布的言教，以邬丹达波热经堂作为范\n例，举行奠基仪式，大师也役使所有傲慢的鬼神，整个工程白天由人工建造，晚上非人建得更高，以须弥山、四大部洲、八小洲 71 、日月连同铁围山的模式建起的吉祥桑耶无变自成寺宇，加上三位王妃的三洲 72 ，这么大的面积在五年内竣工。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "建寺", "title": "建造桑耶无变自成寺", "participants": [{"entity": "赤松德赞", "role": "施主"}, {"entity": "静命", "role": "堪布/观察地基"}, {"entity": "莲花生大士", "role": "加持者/奠基者"}, {"entity": "桑耶寺", "role": "所建寺院"}], "location": "藏地", "time_info": "{'text': '五年内竣工', 'relative_to': None, 'absolute': None}", "layers": ["史传", "神变"], "quote": "依靠《吉祥证道歌》镇压鬼神，并且依靠在空中跳金刚舞来加持地基，在拉线绳的时候，莲师凭借禅定勾召龙子和天子，他们牵着绳端，遵照堪布的言教，以邬丹达波热经堂作为范\n例，举行奠基仪式，大师也役使所有傲慢的鬼神，整个工程白天由人工建造，晚上非人建得更高，以须弥山、四大部洲、八小洲 71 、日月连同铁围山的模式建起的吉祥桑耶无变自成寺宇，加上三位王妃的三洲 72 ，这么大的面积在五年内竣工。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "开光", "title": "桑耶寺开光——本尊降临", "participants": [{"entity": "静命", "role": "开光者"}, {"entity": "莲花生大士", "role": "开光者"}, {"entity": "桑耶寺", "role": "开光对象"}], "location": "桑耶寺", "time_info": "", "layers": ["神变"], "quote": "依靠《吉祥证道歌》镇压鬼神，并且依靠在空中跳金刚舞来加持地基，在拉线绳的时候，莲师凭借禅定勾召龙子和天子，他们牵着绳端，遵照堪布的言教，以邬丹达波热经堂作为范\n例，举行奠基仪式，大师也役使所有傲慢的鬼神，整个工程白天由人工建造，晚上非人建得更高，以须弥山、四大部洲、八小洲 71 、日月连同铁围山的模式建起的吉祥桑耶无变自成寺宇，加上三位王妃的三洲 72 ，这么大的面积在五年内竣工。堪布菩提萨埵和莲花生大士进行开光，显示了顶层殿堂所有本尊降临到外面，诸如此类神奇的幻变真是不可思议。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "译经", "title": "赤松德赞组织大规模翻译显密经典", "participants": [{"entity": "赤松德赞", "role": "施主/组织者"}, {"entity": "嘉伟西年", "role": "持藏大师"}, {"entity": "塔坚钦毕拉", "role": "持藏大师"}, {"entity": "云毕昂策", "role": "持藏大师"}, {"entity": "布玛莫札", "role": "金刚持上师"}, {"entity": "现当嘎巴", "role": "金刚持上师"}, {"entity": "贝若札那", "role": "译师"}, {"entity": "噶·瓦拜则", "role": "译师"}, {"entity": "焦·鲁坚赞", "role": "译师"}, {"entity": "祥·益西德", "role": "译师"}], "location": "藏地", "time_info": "", "layers": ["史传"], "quote": "随后国王赤松德赞考虑翻译正法而正式树立起显密佛法，于是派有聪明才智的藏族儿童学习翻译，又从印度请来嘉伟西年、塔坚钦毕拉（遍知天）、云毕昂策等等严持净戒的持藏大师以及布玛莫札、现当嘎巴等诸位金刚持上师，还有说一切有部的十二位比丘等。首先为了观察藏人是否能够出家，国王请信心十足的国舅大臣巴赤则出家。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "出家受戒", "title": "巴赤则出家受比丘戒——预试七人之首", "participants": [{"entity": "巴绕那", "role": "受戒者"}, {"entity": "静命", "role": "亲教师"}, {"entity": "达那西拉", "role": "羯磨师"}, {"entity": "则那莫札", "role": "屏教师"}, {"entity": "赤松德赞", "role": "施主/请求者"}], "location": "藏地", "time_info": "", "layers": ["史传"], "quote": "菩提萨埵作为亲教师 73 ，达那西拉和则那莫札分别作为羯磨师 74 与屏教师 75 ，其余十位班智达作为补充，就这样巴赤则出家为僧并受了比丘戒，取名为花扬，国王也赞称他为巴绕那。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "神变", "title": "巴绕那修持具足六通", "participants": [{"entity": "巴绕那", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "菩提萨埵作为亲教师 73 ，达那西拉和则那莫札分别作为羯磨师 74 与屏教师 75 ，其余十位班智达作为补充，就这样巴赤则出家为僧并受了比丘戒，取名为花扬，国王也赞称他为巴绕那。他通过修持而具足了六通。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "出家受戒", "title": "预试七人出家受比丘戒", "participants": [{"entity": "预试七人", "role": "受戒者集合"}, {"entity": "巴绕那", "role": "受戒者"}, {"entity": "巴色朗", "role": "受戒者"}, {"entity": "贝若札那", "role": "受戒者"}, {"entity": "恩烂嘉巴秋扬", "role": "受戒者"}, {"entity": "玛·仁钦秋", "role": "受戒者"}, {"entity": "坤类旺波忠巴", "role": "受戒者"}, {"entity": "拉色嘉瓦香切", "role": "受戒者"}], "location": "藏地", "time_info": "", "layers": ["史传"], "quote": "后来，巴色朗、巴够贝若札那、恩烂嘉巴秋扬、玛·仁钦秋、坤类旺波忠巴、拉色嘉瓦香切出家，更名为益西旺波等等，受了比丘戒，以上七位就是众所共称的预试七人，这是藏地历史上出家僧团的开端。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "出家受戒", "title": "国舅札玛等约三百人出家", "participants": [{"entity": "国舅札玛", "role": "受戒者代表"}, {"entity": "赤松德赞", "role": "施主"}, {"entity": "静命", "role": "亲教师"}, {"entity": "莲花生大士", "role": "辅助"}], "location": "藏地", "time_info": "", "layers": ["史传"], "quote": "国王想到藏人能够出家，接着有国舅札玛及有聪明才智的民众大约三百人出家，堪布菩提萨埵和莲花生大士等诸位班智达、贝若札那以及噶·瓦拜则、焦·鲁坚赞、祥·益西德三师等所有译师们将显密经典、最主要的注疏论著通通翻译成藏语。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "派遣", "title": "赤松德赞派贝若札那和南卡酿波前往印度求法", "participants": [{"entity": "赤松德赞", "role": "派遣者"}, {"entity": "贝若札那", "role": "受派者"}, {"entity": "南卡酿波", "role": "受派者"}], "location": "印度", "time_info": "", "layers": ["史传"], "quote": "国王又派贝若札那和南卡酿波（虚空藏）等前往印度，贝若札那在西日桑哈前听受大圆满，南卡酿波在吽嘎日座下聆听真实意法，他们各自都获得成就以后回到藏地加以弘扬。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "弘法", "title": "贝若札那在西日桑哈前听受大圆满", "participants": [{"entity": "贝若札那", "role": "受法者"}, {"entity": "西日桑哈", "role": "传法者"}, {"entity": "阿底约嘎", "role": "所传法要"}], "location": "印度", "time_info": "", "layers": ["史传"], "quote": "国王又派贝若札那和南卡酿波（虚空藏）等前往印度，贝若札那在西日桑哈前听受大圆满，南卡酿波在吽嘎日座下聆听真实意法，他们各自都获得成就以后回到藏地加以弘扬。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "弘法", "title": "南卡酿波在吽嘎日座下聆听真实意法", "participants": [{"entity": "南卡酿波", "role": "受法者"}, {"entity": "吽嘎日", "role": "传法者"}, {"entity": "真实意法", "role": "所传法要"}], "location": "印度", "time_info": "", "layers": ["史传"], "quote": "国王又派贝若札那和南卡酿波（虚空藏）等前往印度，贝若札那在西日桑哈前听受大圆满，南卡酿波在吽嘎日座下聆听真实意法，他们各自都获得成就以后回到藏地加以弘扬。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "灌顶传法", "title": "莲师为君臣赐予灌顶并宣讲《金刚橛》等", "participants": [{"entity": "莲花生大士", "role": "传法者"}, {"entity": "赤松德赞", "role": "受法者"}], "location": "藏地", "time_info": "", "layers": ["史传"], "quote": "国王又派贝若札那和南卡酿波（虚空藏）等前往印度，贝若札那在西日桑哈前听受大圆满，南卡酿波在吽嘎日座下聆听真实意法，他们各自都获得成就以后回到藏地加以弘扬。此外，莲花生大士也为君臣中有缘分的人们赐予下密与无上续相应的灌顶，并宣讲了《金刚橛》法部、《窍诀见鬘论》等。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "神变", "title": "莲师入于境界使枯地出水、沙滩变草原、岩山生森林", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "赤松德赞", "role": "请求者"}], "location": "藏地", "time_info": "", "layers": ["神变"], "quote": "当天上午，莲师入于境界中的时候，札玛地方的一块干地便冒出水来，札马湖以前是一片沙滩，全部变成了草原，札达瓦岩山上瞬间出现了一大片森林，在没有溪水的宿喀地方，大江大河陆续出现……本来，其余的事也必定像莲师所说那样而出现。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "离藏", "title": "奸臣劝阻致莲师事业中止", "participants": [{"entity": "莲花生大士", "role": "主体"}], "location": "藏地", "time_info": "", "layers": ["史传"], "quote": "可是，以众生共业作为因，加之心狠手辣的奸臣们因为害怕各自卑鄙罪行败露而对莲师的神通神变忍无可忍，他们一味劝请，使莲师的事业中止，以此为缘，其余的事宜及使帝王朝代福禄增上的火施就此停止下来，三次降伏天、龙的计划也没有成功。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "授记", "title": "莲师预言吐蕃因邪愿臣子而衰落", "participants": [{"entity": "莲花生大士", "role": "授记者"}], "location": "藏地", "time_info": "", "layers": ["授记"], "quote": "可是，以众生共业作为因，加之心狠手辣的奸臣们因为害怕各自卑鄙罪行败露而对莲师的神通神变忍无可忍，他们一味劝请，使莲师的事业中止，以此为缘，其余的事宜及使帝王朝代福禄增上的火施就此停止下来，三次降伏天、龙的计划也没有成功。莲师说：依靠藏地发邪愿的臣子们的果报，使得吐蕃的幸福安宁夭折。转一大法轮时机纯熟中途也会出现大的纷乱。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "伏藏埋藏", "title": "莲师伏藏大量经函", "participants": [{"entity": "莲花生大士", "role": "伏藏埋藏者"}], "location": "藏地", "time_info": "", "layers": ["神变"], "quote": "这些恶龙与恶王居心叵测，帝王后代也不遵纪守法，结果造成四分五裂、东离西散的结局。莲师彻知未来的情况，也宣说了许多猛咒，并且伏藏了大量经函，随后突然间就前往罗刹洲了。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "离藏", "title": "莲师突然前往罗刹洲", "participants": [{"entity": "莲花生大士", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "这些恶龙与恶王居心叵测，帝王后代也不遵纪守法，结果造成四分五裂、东离西散的结局。莲师彻知未来的情况，也宣说了许多猛咒，并且伏藏了大量经函，随后突然间就前往罗刹洲了。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "弘法", "title": "莲师驻藏（短时间观点）", "participants": [{"entity": "E_P02", "role": "subject"}], "location": "藏地", "time_info": "六个月或十八个月", "layers": ["传闻"], "quote": "莲师到底在吐蕃住了多长时间呢？短时间的观点认为莲师在藏地住了六个月或十八个月；中等时间的观点认为住了三年或六年或十二年；长时间的观点将每两季算为一年，共住了一百一十一年，也就是五十五个整年零六个月。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "弘法", "title": "莲师驻藏（中等时间观点）", "participants": [{"entity": "E_P02", "role": "subject"}], "location": "藏地", "time_info": "三年或六年或十二年", "layers": ["传闻"], "quote": "莲师到底在吐蕃住了多长时间呢？短时间的观点认为莲师在藏地住了六个月或十八个月；中等时间的观点认为住了三年或六年或十二年；长时间的观点将每两季算为一年，共住了一百一十一年，也就是五十五个整年零六个月。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "弘法", "title": "莲师驻藏（长时间观点——自宗）", "participants": [{"entity": "E_P02", "role": "subject"}, {"entity": "E_P01", "role": "参照锚点"}], "location": "藏地", "time_info": "五十五年零六个月（赤松德赞二十一岁时莲师来藏，国王五十九岁圆寂后又住十六年零六个月）", "layers": ["宗派"], "quote": "莲师到底在吐蕃住了多长时间呢？短时间的观点认为莲师在藏地住了六个月或十八个月；中等时间的观点认为住了三年或六年或十二年；长时间的观点将每两季算为一年，共住了一百一十一年，也就是五十五个整年零六个月。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "离藏", "title": "莲师于奸臣面前示现飞空离去（第一次示现离藏）", "participants": [{"entity": "E_P02", "role": "subject"}], "location": "洞巴戒创", "time_info": "", "layers": ["史传", "神变"], "quote": "按照《巴协》等中“只是住了短暂的时间”来讲，这是莲师在所有奸臣面前示现第二种身相，从洞巴戒创之外印藏交界的山顶离去，在人们的眼前腾空而飞，伴着庄严法衣、禅杖钉铛作响从云中而离去，\n可是，真身一直安住在耶多卓、青普等雪山静处，为有缘分的君臣转无上密的法轮。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "闭关修行", "title": "莲师真身安住雪山静处为有缘君臣转密法轮", "participants": [{"entity": "E_P02", "role": "subject"}], "location": "耶多卓、青普等雪山静处", "time_info": "", "layers": ["宗派"], "quote": "按照《巴协》等中“只是住了短暂的时间”来讲，这是莲师在所有奸臣面前示现第二种身相，从洞巴戒创之外印藏交界的山顶离去，在人们的眼前腾空而飞，伴着庄严法衣、禅杖钉铛作响从云中而离去，\n可是，真身一直安住在耶多卓、青普等雪山静处，为有缘分的君臣转无上密的法轮。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "迎请", "title": "国王迎请莲师至桑耶寺开光", "participants": [{"entity": "E_P01", "role": "施请者"}, {"entity": "E_P02", "role": "受请者"}], "location": "E_T01", "time_info": "有人察觉莲师安住修行地点后", "layers": ["史传"], "quote": "一时，有人察觉到莲师安住在修行地点，大家议论纷纷，国王说要辨别真假，于是将莲师迎请到桑耶寺开光，一直到赤松德赞有生之年。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "离藏", "title": "莲师于贡塘拉土从空中而逝（最终离藏）", "participants": [{"entity": "E_P02", "role": "subject"}, {"entity": "E_P05", "role": "送行者"}], "location": "贡塘拉土", "time_info": "太子木赤执政时期", "layers": ["史传", "神变"], "quote": "一时，有人察觉到莲师安住在修行地点，大家议论纷纷，国王说要辨别真假，于是将莲师迎请到桑耶寺开光，一直到赤松德赞有生之年。在太子木赤执政的时候，莲花生大士在贡塘拉土地方乘着坐骑从空中而逝。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "弘法", "title": "莲师携益西措嘉踏遍藏地加持圣地", "participants": [{"entity": "E_P02", "role": "subject"}, {"entity": "E_P09", "role": "眷属"}], "location": "整个藏地", "time_info": "", "layers": ["宗派", "神变"], "quote": "如是福田、施主私下共议法事，莲师真身携带益西措嘉空行母等有缘的眷属踏遍了整个藏地的每一块土地，甚至连马蹄大小的地方也没有遗漏。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "授记", "title": "莲师授记未来魔之化身将摧毁佛教", "participants": [{"entity": "E_P02", "role": "授记者"}, {"entity": "E_P01", "role": "受记者"}], "location": "", "time_info": "", "layers": ["授记"], "quote": "阿里一带二十座雪山，在卫藏、后藏有二十一个修行地，多康有二十五圣地，上、中、下部的三隐蔽王处、五山谷、三区域、一岛屿，每一个地方都有如根、如枝、如花、如果的林园等圣地，莲师把雪山湖泊全部加持成修行地。莲师知道后来王族太子——魔的化身将摧毁佛教，于是对国王赐予了许多未来的授记。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "伏藏埋藏", "title": "莲师隐藏大量伏藏品并授记开取", "participants": [{"entity": "E_P02", "role": "subject"}], "location": "藏地各处", "time_info": "", "layers": ["宗派"], "quote": "考虑到密法不会隐没，不被寻思者染污、改造，加持永不消失，所化众生逐渐涌现等等，莲师又隐藏了一百国王魂伏藏、五大意伏藏、二十五甚深大伏藏为主的有名称无名称不可胜数的伏藏品，并一一授记开取的时间、取伏藏的人、有缘的法主等。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "降伏非人", "title": "莲师于达仓三十处降伏藏地凶神恶煞", "participants": [{"entity": "E_P02", "role": "subject"}], "location": "门卡内让狮子堡等达仓三十处", "time_info": "", "layers": ["宗派", "神变"], "quote": "在门卡内让狮子堡等有名称的达仓三十处，莲师示现令人望而生畏的忿怒威猛相，降伏了藏地大大小小的所有凶神恶煞、妖魔鬼怪，使他们全部承诺发誓，并吩咐作为伏藏品的护法神。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "神变", "title": "莲师在多处留下身印、手印、脚印", "participants": [{"entity": "E_P02", "role": "subject"}], "location": "哦塘多吉则巴、巴卓白岩等", "time_info": "", "layers": ["宗派", "神变"], "quote": "为了使后代人们坚信不移，莲师又在哦塘多吉则巴等地留下身体的印迹，在湖泊旁边（的岩石上）等处留下手印，在巴卓白岩等地留下脚印，此外莲师佛父佛母在所有修行地点留下的手印、脚印等稀有的奇迹不可计数。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "降伏非人", "title": "莲师降伏鬼王香夏坚", "participants": [{"entity": "E_P02", "role": "subject"}, {"entity": "E_P05", "role": "执行者"}, {"entity": "E_P01", "role": "指派者"}], "location": "巴达霍修行院", "time_info": "", "layers": ["史传", "神变"], "quote": "国王派太子木赤赞普去摧毁巴达霍修行院，当太子带走了所有东西以后，鬼王香夏坚也尾随而来，这时莲师示现威猛身相降伏了他，并吩咐他保护僧财，当时建起了许多因相乘的讲学院、密宗的修行院。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "建寺", "title": "建立因相乘讲学院与密宗修行院", "participants": [{"entity": "E_P01", "role": "subject"}], "location": "", "time_info": "降伏鬼王香夏坚之后", "layers": ["史传"], "quote": "国王派太子木赤赞普去摧毁巴达霍修行院，当太子带走了所有东西以后，鬼王香夏坚也尾随而来，这时莲师示现威猛身相降伏了他，并吩咐他保护僧财，当时建起了许多因相乘的讲学院、密宗的修行院。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "立法", "title": "树立盟书石碑、规定供养法教规则", "participants": [{"entity": "E_P01", "role": "subject"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "国王派太子木赤赞普去摧毁巴达霍修行院，当太子带走了所有东西以后，鬼王香夏坚也尾随而来，这时莲师示现威猛身相降伏了他，并吩咐他保护僧财，当时建起了许多因相乘的讲学院、密宗的修行院。所有君民一直将出家人作为供养处，光头僧人与发髻咒师分开作为两部僧众，明文规定顶礼供养承侍的法教规则，树立起盟书的石碑。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "离藏", "title": "莲师从贡塘拉土骑狮/骏马前往妙拂洲铜色吉祥山", "participants": [{"entity": "E_P02", "role": "subject"}], "location": "贡塘拉土 → 妙拂洲·铜色吉祥山", "time_info": "赤松德赞圆寂之后", "layers": ["宗派", "神变"], "quote": "莲师从贡塘拉土骑着狮子或骏马而去，伴随着诸位天人无量供养的庄严到达了妙拂洲，在铜色吉祥山顶超度了罗刹王绕卡土创", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "执政", "title": "三太子使佛法蒸蒸日上", "participants": [{"entity": "E_P30", "role": "subject"}, {"entity": "E_P05", "role": "subject"}, {"entity": "E_P31", "role": "subject"}], "location": "", "time_info": "赤松德赞之后", "layers": ["史传"], "quote": "赤热巴坚法王赤松德赞有三位太子，长子叫木奈赞普，次子叫木赤赞普，三太子名叫木迪赞普或者色纳勒劲云。他们使佛法蒸蒸日上，广弘开来。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "弘法", "title": "木奈赞普在桑耶寺兴起四大供养并三度平均贫富", "participants": [{"entity": "E_P30", "role": "subject"}], "location": "E_T01", "time_info": "木奈赞普执政期间", "layers": ["史传"], "quote": "他们使佛法蒸蒸日上，广弘开来。尤其是木奈赞普执政期间，在桑耶寺兴起了四大供养 76 的佛事，三度平均西藏人民的贫富。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "建寺", "title": "木迪赞普建造嘎穹多吉扬寺", "participants": [{"entity": "E_P31", "role": "subject"}], "location": "E_T05", "time_info": "", "layers": ["史传"], "quote": "木迪赞普建造了嘎穹多吉扬寺，他生了五\n位太子，其中最出类拔萃的就是金刚手菩萨的化身——赤热巴坚或者赤德祖丹，赤热巴坚要求每七户子民供养一位出家僧人，共建造了一千所寺院。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "建寺", "title": "赤热巴坚建造一千所寺院", "participants": [{"entity": "E_P04", "role": "subject"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "木迪赞普建造了嘎穹多吉扬寺，他生了五\n位太子，其中最出类拔萃的就是金刚手菩萨的化身——赤热巴坚或者赤德祖丹，赤热巴坚要求每七户子民供养一位出家僧人，共建造了一千所寺院。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "建寺", "title": "赤热巴坚建吉祥善增寺", "participants": [{"entity": "E_P04", "role": "subject"}], "location": "E_L13", "time_info": "", "layers": ["史传"], "quote": "在吉玛哦江多建起了无与伦比的吉祥善增寺，从印度请来思仁札布德、西林札布德、德那西拉等等众多班智达以及藏地的堪布燃那绕杰达、达玛达谢、译师嘉那色那等，并规定：对祖先时代诸位班智达和译师们翻译正法时藏语中没有共称的名词中与正法教义、文法规则不相符合以及难懂的藏语更换成方言的名称予以增加，就这样符合大乘小乘论典而进行译校。", "chapter": "《藏密佛教 ter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "派遣", "title": "三位高僧携律藏逃往康区", "participants": [{"entity": "E_P44", "role": "subject"}, {"entity": "E_P45", "role": "subject"}, {"entity": "E_P46", "role": "subject"}], "location": "葛逻、霍尔 → 康区", "time_info": "朗达玛毁灭佛法期间", "layers": ["史传"], "quote": "朗达玛毁灭佛法期间，巴绕那的弟子——高僧玛尔·释迦牟尼、约·格威穹及藏·绕色三人把律藏驮在一头骡子上，前往葛逻和霍尔境。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "出家受戒", "title": "贡巴绕色（莫色拉巴）出家受戒", "participants": [{"entity": "E_P48", "role": "受戒者"}, {"entity": "E_P44", "role": "亲教师"}, {"entity": "E_P45", "role": "规范师"}], "location": "E_T07", "time_info": "", "layers": ["史传"], "quote": "然而却没有能够使佛法弘扬起来，于是他们到了康区，在玛龙多吉札绕安穹那炯或者丹迪寺修行安住时，莫色拉巴见状生起信心请求出家，于是由玛尔·释迦牟尼作亲教师，约·格威穹为规范师，给他传出家戒，取名为释迦·格巴绕色，他又请求受比丘戒，当时由于五位比丘不齐全，寻找到住在丹地的拉隆·拜吉多吉，可是他说：“因为我杀了恶君，所以不能补充比丘数目，你们再另行寻觅吧！”他派了汉地的和尚格旺、吉番二人，会聚了五比丘传了近圆戒。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "出家受戒", "title": "贡巴绕色受比丘戒（五比丘传近圆戒）", "participants": [{"entity": "E_P48", "role": "受戒者"}, {"entity": "E_P44", "role": "比丘"}, {"entity": "E_P45", "role": "比丘"}, {"entity": "E_P46", "role": "比丘"}, {"entity": "E_P49", "role": "比丘（补足）"}, {"entity": "E_P50", "role": "比丘（补足）"}, {"entity": "E_P47", "role": "推荐者（拒绝补充比丘数目）"}], "location": "E_L18", "time_info": "", "layers": ["史传"], "quote": "然而却没有能够使佛法弘扬起来，于是他们到了康区，在玛龙多吉札绕安穹那炯或者丹迪寺修行安住时，莫色拉巴见状生起信心请求出家，于是由玛尔·释迦牟尼作亲教师，约·格威穹为规范师，给他传出家戒，取名为释迦·格巴绕色，他又请求受比丘戒，当时由于五位比丘不齐全，寻找到住在丹地的拉隆·拜吉多吉，可是他说：“因为我杀了恶君，所以不能补充比丘数目，你们再另行寻觅吧！”他派了汉地的和尚格旺、吉番二人，会聚了五比丘传了近圆戒。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "弘法", "title": "贡巴绕色十五年听受《戒律》并广学诸法", "participants": [{"entity": "E_P48", "role": "受法者"}, {"entity": "E_P44", "role": "亲教师"}, {"entity": "E_P45", "role": "规范师"}, {"entity": "E_P51", "role": "法师"}, {"entity": "E_P52", "role": "法师"}, {"entity": "E_P53", "role": "法师"}], "location": "E_L18", "time_info": "十五年", "layers": ["史传"], "quote": "释迦·格巴绕色于十五年中在亲教师、规范师面前听受了《戒律》。后来又在贡荣桑格札座下聆听了《戒律》，在噶巴哦秋札面前听了《般若》，在耶札酿波面前聆听了《大圆满心部》。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "派遣", "title": "君王益西嘉村派卫藏后藏十人前往康区求戒", "participants": [{"entity": "E_P35", "role": "指派者"}, {"entity": "E_P54", "role": "受派者（卫藏五人之首）"}, {"entity": "E_P55", "role": "受派者（后藏五人之首）"}], "location": "E_L19 → E_L18", "time_info": "贡巴绕色受近圆戒后第五年", "layers": ["史传"], "quote": "他受近圆戒后的第五年，君王益西嘉村等在卫藏为了重新恢复衰退的佛法，委派来自卫藏的鲁墨·赤诚西绕等五人、来自后藏的罗敦多吉旺修等五人前去康区，贡巴绕色上师在一坐垫上以三启白次第传了一次性圆满比丘戒，教他们学通戒律。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "出家受戒", "title": "贡巴绕色以一坐垫三启白顿圆传比丘戒", "participants": [{"entity": "E_P48", "role": "传戒者"}, {"entity": "E_P54", "role": "受戒者"}, {"entity": "E_P55", "role": "受戒者"}, {"entity": "E_P44", "role": "羯磨师"}, {"entity": "E_P45", "role": "羯磨师"}, {"entity": "E_P46", "role": "羯磨师"}], "location": "E_L18", "time_info": "", "layers": ["史传"], "quote": "他受近圆戒后的第五年，君王益西嘉村等在卫藏为了重新恢复衰退的佛法，委派来自卫藏的鲁墨·赤诚西绕等五人、来自后藏的罗敦多吉旺修等五人前去康区，贡巴绕色上师在一坐垫上以三启白次第传了一次性圆满比丘戒，教他们学通戒律。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "恢复佛教", "title": "鲁墨大师培养弟子使衰落佛法从根本上恢复", "participants": [{"entity": "E_P54", "role": "subject"}], "location": "", "time_info": "受戒后返回卫藏", "layers": ["史传"], "quote": "大师贡巴绕\n色任命鲁墨为亲教师，由卫藏、后藏的十人上来后作为所有君臣的国师。鲁墨大师培养出四顶梁之柱的弟子、八大栋梁弟子、三十二椽木弟子、千数短木弟子等等，由此使衰落的佛法从根本上得以恢复。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "建寺", "title": "鲁墨大师创立拉木、绕吉等无数道场", "participants": [{"entity": "E_P54", "role": "subject"}, {"entity": "E_P57", "role": "弟子（建一百零八处道场）"}], "location": "藏地各处", "time_info": "", "layers": ["史传"], "quote": "鲁墨大师培养出四顶梁之柱的弟子、八大栋梁弟子、三十二椽木弟子、千数短木弟子等等，由此使衰落的佛法从根本上得以恢复。创立了拉木、绕吉、也巴、瓦耶、凑迪等无数的道场，雅协的弟子格西札巴独自一人也建立了一百零八处道场。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "弘法", "title": "东律传承形成", "participants": [{"entity": "E_P54", "role": "传承创立者"}, {"entity": "E_P58", "role": "弘扬者"}], "location": "", "time_info": "后弘时期", "layers": ["史传"], "quote": "此后，每一天出家的僧团人数也大大增多，被誉为“东律传承”。前译的出家僧众和后来耶札酿波的幻化——大译师达玛西日将传讲及实修十分广泛弘扬开来，作为藏地雪域的一大庄严邬金敏珠朗佛学院以及它的所有分院戒律传承都属于这一传承，佛教后弘时期的大多数前代持戒大德以及新旧噶当派的多数善知识也致力于这一戒律传承。", "chapter": "《藏密佛教史》> 第三品 藏传佛法"}, {"type": "译经", "title": "则那莫札与嘎瓦花则翻译传讲对法", "participants": [{"entity": "E_P13", "role": "班智达"}, {"en : [{"entity": "扬·嘉瓦云丹", "role": "主体"}], "location": "卫藏 (E_300)、康区", "time_info": "", "layers": ["史传"], "quote": "他们二位又传给扬·嘉瓦云丹、达吉花戒札巴二人。扬·嘉瓦云丹在卫藏传讲了多次，也到康区加以讲授。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "莲师传涅·赞那革玛绕并著《窍诀见鬘论》", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "涅·赞那革玛绕", "role": "受法者"}, {"entity": "窍诀见鬘论", "role": "著作"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "扬·嘉瓦云丹的所有传承，被共称为噶青普玛传承或者窍诀传承。再者，莲花生大士传给涅·赞那革玛绕，也著了《窍诀见鬘论》。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "佛密在岗底斯山传密藏续类", "participants": [{"entity": "佛密", "role": "主体"}, {"entity": "伟·蒋花", "role": "受法者"}, {"entity": "占嘎莫德", "role": "受法者"}, {"entity": "幻化网道庄严", "role": "法门"}], "location": "岗底斯山", "time_info": "", "layers": ["史传"], "quote": "另外，佛密阿阇黎在岗底斯山给伟·蒋花和占嘎莫德等传授《幻化网道庄严》等所有密藏续类，《密集续》依靠阿阇黎多吉夏巴的传统讲规、布夏莫札的所有注释的讲闻修行道规十分兴盛，《佛陀平等行续》依靠革革燃匝和吽嘎日之教轨的所有论疏以及邬金国王成就者嘉辛东波的《平等行续大疏》等的讲闻修行道轨最为鼎盛。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "赤松德赞成就马头明王本尊，马鸣传遍赡部洲", "participants": [{"entity": "赤松德赞", "role": "主体"}, {"entity": "马头明王", "role": "本尊"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "依靠《黑日嘎续》、《马头明王》坛城的本尊赐予其他一切有缘者，其中国王赤松德赞成就了马头明王本尊，使马的鸣叫传遍整个赡部洲。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "弘法", "title": "现德嘎巴在藏地弘扬大威德类", "participants": [{"entity": "现德嘎巴", "role": "主体"}], "location": "藏地", "time_info": "", "layers": ["史传"], "quote": "依靠《黑日嘎续》、《马头明王》坛城的本尊赐予其他一切有缘者，其中国王赤松德赞成就了马头明王本尊，使马的鸣叫传遍整个赡部洲。（二）、修部类：\n一般说来，所有大威德类是由阿阇黎现德嘎巴在藏地弘扬起来的。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "灌顶", "title": "莲师在青普为君臣九人传授八大修部灌顶", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "赤松德赞", "role": "祈请者"}, {"entity": "君臣九人", "role": "受法者"}, {"entity": "八大修部", "role": "法门"}], "location": "青普", "time_info": "赤松德赞时期", "layers": ["史传"], "quote": "具体而言，经过国王赤松德赞祈请，莲师在青普哲革格哦地方为具有殊胜缘分的君臣九人于八大修部外、内、密的坛城中圆满传授了所有灌顶次第，并且恩赐各自花朵所中的本尊修法和窍诀，他们通过实地修行而亲见不同本尊容颜。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "赤松德赞成就殊胜莲花语并撰著《 pe": "神变", "title": "萨霍·曼达绕瓦和益西措嘉证得殊胜成就", "participants": [{"entity": "萨霍·曼达绕瓦", "role": "主体"}, {"entity": "益西措嘉", "role": "主体"}, {"entity": "金刚亥母", "role": "等同"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "萨霍·曼达绕瓦证得无死寿、神变力和无上殊胜成就；大空行母益西措嘉成就了金刚寿、不忘陀罗尼、神变力、空行处及殊胜大乐。这两位女子与真正的金刚亥母无二无别。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "迎请", "title": "赤松德赞劝请贝若札那赴印度求法", "participants": [{"entity": "赤松德赞", "role": "劝请者"}, {"entity": "贝若札那", "role": "受命者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "三、大圆满阿底约嘎类：大圆满阿底约嘎包括心、界、窍诀三部：（一）、宣讲心部、界部：\n贝若札那\n出生于涅莫雪堪地方的阿阇黎贝若札那，经国王赤松德赞劝请，历经七次八大危难等难以承受的五十七种艰难困苦，全然不顾而去往印度，在达那够夏清凉檀香林，临近到达西日桑哈依靠神变设置的九层岩洞，虽然他让那里提水的瑜伽母给上师送信，可是她却没有答复。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "贝若札那拜见花戒桑给大师得受心部十八窍诀及界部", "participants": [{"entity": "贝若札那", "role": "受法者"}, {"entity": "花戒桑给", "role": "主体"}, {"entity": "心部法", "role": "法门"}, {"entity": "界部", "role": "法门"}], "location": "达那够夏清凉檀香林", "time_info": "", "layers": ["史传"], "quote": "上师在晚上采用这种方法：他把心部十八窍诀用白山羊的乳汁写在白绸缎上，当用烟熏时文字就会清晰现出，让护法神承诺保护，作极其保密的印持，盖上极其保密印。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "贝若札那在德瓦尸林拜见嘎绕多吉得受大圆满义传承", "participants": [{"entity": "贝若札那", "role": "受法者"}, {"entity": "嘎绕多吉", "role": "主体"}, {"entity": "阿底约嘎", "role": "法门"}], "location": "德瓦", "time_info": "", "layers": ["史传"], "quote": "此后，贝若札那在德瓦地方的大尸林中又拜见了嘎绕多吉大师，得受了六百四十万大圆满义传承，并且现前获得证悟、解脱同时的大成就。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "贝若札那修成神足返回西藏", "participants": [{"entity": "贝若札那", "role": "主体"}], "location": "西藏", "time_info": "", "layers": ["神变"], "quote": "此后，贝若札那在德瓦地方的大尸林中又拜见了嘎绕多吉大师，得受了六百四十万大圆满义传承，并且现前获得证悟、解脱同时的大成就。随后，他依靠修成的神足返回西藏，白天为国王传共同因果法门，晚上悄悄单独传授大圆满，并翻译了前译五心部。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "译经", "title": "贝若札那翻译前译五心部", "participants": [{"entity": "贝若札那", "role": "主体"}], "location": "西藏", "time_info": "", "layers": ["史传"], "quote": "此后，贝若札那在德瓦地方的大尸林中又拜见了嘎绕多吉大师，得受了六百四十万大圆满义传承，并且现前获得证悟、解脱同时的大成就。随后，他依靠修成的神足返回西藏，白天为国王传共同因果法门，晚上悄悄单独传授大圆满，并翻译了前译五心部。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "离藏", "title": "贝若札那因王妃群臣离间暂时到擦瓦绒", "participants": [{"entity": "贝若札那", "role": "主体"}], "location": "擦瓦绒", "time_info": "", "layers": ["史传"], "quote": "当时，印度人对教言流失到藏地，以嫉妒心而使西藏人们产生怀疑，挑拨离间。由于对正法怀有歹心的王妃和群臣的左右，贝若札那大师暂时不得不来到擦瓦绒地方。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "贝若札那在卫藏为涅·赞那革玛绕和乐萨·西绕卓玛传讲五次第", "participants": [{"entity": "贝若札那", "role": "主体"}, {"entity": "涅·赞那革玛绕", "role": "受法者"}, {"entity": "乐萨·西绕卓玛", "role": "受法者"}, {"entity": "五次第", "role": "法门"}], "location": "卫藏", "time_info": "", "layers": ["史传"], "quote": "在洞空绒的红岩静堡，传给帮·桑吉滚波。在卫藏，为涅·赞那革玛绕、乐萨·西绕卓玛传讲，被一致称为五次第。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "圆寂", "title": "贝若札那在尼泊尔巴桑尸林成就双运身", "participants": [{"entity": "贝若札那", "role": "主体"}], "location": "巴桑尸林", "time_info": "", "layers": ["史传"], "quote": "在卫藏，为涅·赞那革玛绕、乐萨·西绕卓玛传讲，被一致称为五次第。乐萨西绕卓玛迎请贝若札那到龟兹国，最后在尼泊尔巴桑尸林中成就双运身。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "贝若札那在洞空绒传给帮·桑吉滚波", "participants": [{"entity": "贝若札那", "role": "主体"}, {"entity": "帮·桑吉滚波", "role": "受法者"}], "location": "洞空绒", "time_info": "", "layers": ["史传"], "quote": "在擦瓦绒的达则卡，为桑敦益西上师传讲了所有大圆满类。在洞空绒的红岩静堡，传给帮·桑吉滚波。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "帮·桑吉滚波年迈证悟后住世百余年", "participants": [{"entity": "帮·桑吉滚波", "role": "主体"}], "location": "", "time_info": "住世一百多年", "layers": ["神变"], "quote": "遵照贝若札那的言教实地修行结果直观现见法性的本来面目。由于生起顿超证悟使得年迈的他禁不住开怀大笑，无比欢喜地搂住上师的脖子一天当中一直没有松开。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "帮·桑吉滚波传法给安兰·香切嘉村", "participants": [{"entity": "帮·桑吉滚波", "role": "主体"}, {"entity": "安兰·香切嘉村", "role": "受法者"}], "location": "嘉姆达则卡", "time_info": "香切嘉村六十七岁时", "layers": ["史传"], "quote": "香切嘉村帮·桑吉滚波的弟子是安兰·香切嘉村，他就是中部地区安兰绕色巴比丘，六十七岁时来到嘉姆达则卡地方，向帮·麦彭滚波请求教授，结果上师恩赐予他，并说：现在不要回故土，在瓦桑给岩山上修行。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "圆寂", "title": "安兰·香切嘉村一百七十二岁虹化", "participants": [{"entity": "安兰·香切嘉村", "role": "主体"}], "location": "瓦桑给", "time_info": "一百七十二岁", "layers": ["神变"], "quote": "香切嘉村帮·桑吉滚波的弟子是安兰·香切嘉村，他就是中部地区安兰绕色巴比丘，六十七岁时来到嘉姆达则卡地方，向帮·麦彭滚波请求教授，结果上师恩赐予他，并说：现在不要回故土，在瓦桑给岩山上修行。\n他也依教奉行，去那里修行，到了一百七十二岁时身体不留痕迹虹化而逝。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "圆寂", "title": "萨丹仁钦一百四十四岁虹化", "participants": [{"entity": "萨丹仁钦", "role": "主体"}], "location": "瓦桑给", "time_info": "一百四十四岁", "layers": ["神变"], "quote": "萨丹仁钦安兰·香切嘉村的弟子萨丹仁钦出生在上康区，他向安兰请求教授，在瓦桑给山洞与上师形影不离地修行，一百四十四岁时身体也是不留痕迹虹化而逝。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "圆寂", "title": "克杰萨瓦一百一十七岁虹化", "participants": [{"entity": "克杰萨瓦", "role": "主体"}], "location": "瓦桑给", "time_info": "一百一十七岁", "layers": ["神变"], "quote": "克杰萨瓦萨丹仁钦的弟子——来自也隆秀地方的克杰萨瓦尊者是位比丘，五十七岁，经萨丹仁钦恩赐教言而断然放弃返回故乡的想法，在瓦桑给岩山安住修行，结果在一百一十七岁时身体虹化而逝。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "师徒三人同在瓦桑给同在蛇年相继虹化", "participants": [{"entity": "安兰·香切嘉村", "role": "主体"}, {"entity": "萨丹仁钦", "role": "主体"}, {"entity": "克杰萨瓦", "role": "主体"}], "location": "瓦桑给", "time_info": "蛇年", "layers": ["神变"], "quote": "克杰萨瓦萨丹仁钦的弟子——来自也隆秀地方的克杰萨瓦尊者是位比丘，五十七岁，经萨丹仁钦恩赐教言而断然放弃返回故乡的想法，在瓦桑给岩山安住修行，结果在一百一十七岁时身体虹化而逝。就这样，师徒三人同在名叫瓦桑给的岩山，同在蛇年相继如空中彩虹消失或雾消云散般虹化而逝。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "香切札巴向克杰萨瓦请求教授后修行并传法", "participants": [{"entity": "克杰萨瓦", "role": "主体"}, {"entity": "香切札巴", "role": "受法者"}], "location": "桑耶青普", "time_info": "香切札巴四十二岁时", "layers": ["史传"], "quote": "香切札巴克杰萨瓦的弟子香切札巴，故乡是涅耶哲多巴，身份是位比丘，到了四十二岁时，向克杰萨瓦请求教授后返回故里，在桑耶青普修行期间，遇到了布热夏一位名叫酿·西绕炯内的老比丘，他说：“论受比丘戒，我的戒腊高，但您有非常殊胜的教授，请摄受我。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "香切札巴示现四大遍处幻化", "participants": [{"entity": "香切札巴", "role": "主体"}], "location": "坡波切", "time_info": "", "layers": ["神变"], "quote": "”于是他们师徒二人一左一右观瞧，只见位于中央的阿阇黎已无踪无影。正当他们感到莫名其妙之时，酿·香切札巴大师变成的一肘左右的狂风来回盘旋以后变成了火，当他们用水浇火时，火又变成满满一铜盆水。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "圆寂", "title": "香切札巴在后藏嘉尼德卡山旁虹化", "participants": [{"entity": "香切札巴", "role": "主体"}], "location": "后藏嘉尼德卡山", "time_info": "", "layers": ["神变"], "quote": "”酿·香切札巴将教言赐给他，自己在坡波切与扬宗地方安住，他在自己的弟子与传承弟子前也示现四大遍处的幻化。最后，他在自己所居的后藏嘉尼德卡山旁，身体宛若一片云朵般不留痕迹虹化而逝。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "香切札巴将教言赐给酿·西绕炯内", "participants": [{"entity": "香切札巴", "role": "主体"}, {"entity": "酿·西绕炯内", "role": "受法者"}], "location": "桑耶青普", "time_info": "", "layers": ["史传"], "quote": "香切札巴克杰萨瓦的弟子香切札巴，故乡是涅耶哲多巴，身份是位比丘，到了四十二岁时，向克杰萨瓦请求教授后返回故里，在桑耶青普修行期间，遇到了布热夏一位名叫酿·西绕炯内的老比丘，他说：“论受比丘戒，我的戒腊高，但您有非常殊胜的教授，请摄受我。”酿·香切札巴将教言赐给他，自己在坡波切与扬宗地方安住，他在自己的弟子与传承弟子前也示现四大遍处的幻化。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "圆寂", "title": "酿·西绕炯内在坡波切虹化", "participants": [{"entity": "酿·西绕炯内", "role": "主体"}], "location": "坡波切", "time_info": "", "layers": ["神变"], "quote": "西绕炯内\n酿·西绕炯内在青普花吉林间、札吉扬宗、坡波切等处安住，显现了大圆满自现无偏密意之后，衣装、念珠及托巴挂在坡波切神山顶峰一棵独枝的柏树上，身体就像彩虹消散空中一样逝去。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "酿·西绕炯内入定于火等持中使茅棚现火焰", "participants": [{"entity": "酿·西绕炯内", "role": "主体"}, {"entity": "瓦贡", "role": "目击者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "”此后的一次，瓦贡到杜鹃树林中去拾柴，结果看到他自己的茅棚红红的火焰直往上窜，不禁想到，难道大师并没有赶走火而是失火了吗？他带着这种想法赶回来，发现茅棚依然如故，火已消失无踪。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "酿·西绕炯内传授教言给瓦贡", "participants": [{"entity": "酿·西绕炯内", "role": "主体"}, {"entity": "瓦贡", "role": "受法者"}], "location": "", "time_info": "瓦贡二十四岁", "layers": ["史传"], "quote": "瓦贡大师瓦贡到了二十四岁，蒙受酿·西绕炯内传授教言，这位瓦贡身份是在家居士，名字叫做益西香切，具有殊胜的证悟，踩在石上如踏泥土，能在岩石中印上身像，九十八岁时身体安然无恙而圆寂。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "圆寂", "title": "瓦贡九十八岁圆寂无遗骨", "participants": [{"entity": "瓦贡", "role": "主体"}, {"entity": "觉母刚姆", "role": "护持者"}], "location": "", "time_info": "九十八岁", "layers": ["神变"], "quote": "瓦贡大师瓦贡到了二十四岁，蒙受酿·西绕炯内传授教言，这位瓦贡身份是在家居士，名字叫做益西香切，具有殊胜的证悟，踩在石上如踏泥土，能在岩石中印上身像，九十八岁时身体安然无恙而圆寂。觉母刚姆不让任何外人参拜遗体，而在塔室里做荼毗，火化遗体，陶器大小的光芒盘旋到空中，当时外面的人有目共睹，一点遗骨也没有留下。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "奘拜见单巴尊者并得加持和授记", "participants": [{"entity": "奘·达玛布德", "role": "受法者"}, {"entity": "单巴尊者", "role": "主体"}], "location": "多吉洞那", "time_info": "奘十六岁时", "layers": ["史传"], "quote": "当奘长到十六岁时随同部分旅伴到多吉洞那地方做生意，当时多吉才穹地方聚集了许许多多的人，他便去看个究竟，结果得以拜见印度单巴尊者，十四个月中他一直跟随在单巴尊者左右恭敬承侍。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "授记", "title": "单巴尊者授记奘值遇金刚桥", "participants": [{"entity": "单巴尊者", "role": "主体"}, {"entity": "奘·达玛布德", "role": "受记者"}, {"entity": "金刚桥", "role": "法门"}], "location": "", "time_info": "", "layers": ["授记"], "quote": "结果奘心处于楞然的状态中，出现了昭彰显著的认识，口里津液泛起。他蒙单巴尊者加持，得到值遇金刚桥的授记，这一点到后来他才明白。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "瓦贡大师为奘传讲大手印表示窍诀和大圆满固有七类", "participants": [{"entity": "瓦贡", "role": "主体"}, {"entity": "奘·达玛布德", "role": "受法者"}, {"entity": "大手印", "role": "法门"}, {"entity": "大圆满固有七类", "role": "法门"}], "location": "坡波切", "time_info": "", "layers": ["史传"], "quote": "次日早晨，瓦贡上师又款待他，饭后瓦贡上师说：“本来我有一个侍者小僧人，他到中塘取金去了，因为天下大雨而没有回来，你帮我拾些柴吧。”于是他从林间搬回一大背木柴，瓦贡大师心生欢喜，为他传讲了大手印表示窍诀和大圆满固有七类。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "灌顶", "title": "瓦贡为奘圆满授予金刚桥四灌顶和所有教言", "participants": [{"entity": "瓦贡", "role": "主体"}, {"entity": "奘·达玛布德", "role": "受法者"}, {"entity": "金刚桥", "role": "法门"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "上师说：“酥油灯用太阳来代替。”就这样为他圆满授予了解脱道的四灌顶，并恩赐所有教言。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "瓦贡大师手没入石中并印迹岩石", "participants": [{"entity": "瓦贡", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "上师说：“暂时这些景象都是世俗的有法。”说完以后，一掌击在水中的一块卵石上，肘以上没入石中，又再度起身一靠，结果通彻进入岩石，出现了清晰的印迹。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "奘大师身体彩虹萦绕及种种神通", "participants": [{"entity": "奘·达玛布德", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "”奘大师，由于如海神变运用自如，时而身体彩虹萦绕，时而脚不接触地面而行；由于境心融入一味，所以能在顷刻之间到达遥远的地方；由于具有他心通等无碍的神通，所以对未来的一切事也未卜先\n知，予以授记。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "奘大师为索芒赞传授大手印使其迷乱转依为智慧", "participants": [{"entity": "奘·达玛布德", "role": "主体"}, {"entity": "索芒赞", "role": "受法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "此外，他对于景象冒险犯难的力量极其强大，因此可以穿过冬季的寒冰、跃入夏季的江河、跳下不定处的深渊，击打头部、用兵刃殴打等，大力行为无所不作，因此被称为勇士奘穹。奘大师为索芒赞传授大手印，结果他的迷乱显现转依为智慧。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "奘大师为热楚龙穹巴和俄莫加列嘉传授四文字与大圆满使其虹身", "participants": [{"entity": "奘·达玛布德", "role": "主体"}, {"entity": "热楚龙穹巴", "role": "受法者"}, {"entity": "俄莫加列嘉", "role": "受法者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "奘大师为索芒赞传授大手印，结果他的迷乱显现转依为智慧。为热楚龙穹巴、俄莫加列嘉传授《四文字》与大圆满，结果他们的一切迷乱销声匿迹，最后身体消失得无影无踪。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "奘大师跳入水池冰碎水变为气", "participants": [{"entity": "奘·达玛布德", "role": "主体"}], "location": "门嘎忠摩切", "time_info": "", "layers": ["神变"], "quote": "据说，一次，奘生起想走的念头以后到了门嘎忠摩切的面前，他为了测试自己的能力，纵身跳进一个水池里，结果池中冰碎而他沉在水底，当闪现出难为情的妄念时，水变成气，几乎遮蔽了虚空。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "奘大师纵身跳下悬崖如飞禽降落", "participants": [{"entity": "奘·达玛布德", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "还有一次，他和空行母去捡柴，结果得到了一大背柴，他背着柴来到一大悬崖边上，心想这就是在梦中而纵身跳下，结果就像飞禽降落一样。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "奘大师在友多德珠西山洞面见忿怒甘露旋", "participants": [{"entity": "奘·达玛布德", "role": "主体"}, {"entity": "忿怒甘露旋", "role": "本尊"}], "location": "友多德珠西山洞", "time_info": "", "layers": ["神变"], "quote": "在努境荣地方，修炼梦境，结果一切景象认识为梦。在友多德珠西山洞，现见忿怒甘露旋的尊颜，一位非人对他作广大供养、承侍。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "奘大师在达波耶面见一髻佛母护法神", "participants": [{"entity": "奘·达玛布德", "role": "主体"}, {"entity": "诶嘎匝哲", "role": "护法"}], "location": "达波", "time_info": "", "layers": ["神变"], "quote": "在达波耶地方修行护法神阿则（即一髻佛母护法神），结果在上午时分面见尊颜，当他认为是冤魄作怪时，护法神降临承诺“以后相随”，之后就化为一道光。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "奘大师在拉则修金丹术面见无量寿佛", "participants": [{"entity": "奘·达玛布德", "role": "主体"}, {"entity": "无量寿佛", "role": "本尊"}], "location": "拉则寺", "time_info": "", "layers": ["神变"], "quote": "在达波耶地方修行护法神阿则（即一髻佛母护法神），结果在上午时分面见尊颜，当他认为是冤魄作怪时，护法神降临承诺“以后相随”，之后就化为一道光。在拉则修行金丹术，结果面见无量寿佛。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "奘大师在邬嘎岩山面见胜乐金刚佛父佛母", "participants": [{"entity": "奘·达玛布德", "role": "主体"}, {"entity": "胜乐金刚", "role": "本尊"}], "location": "邬嘎岩山", "time_info": "", "layers": ["神变"], "quote": "心相续中呈现出众多佛法的道理。在邬嘎岩山上修行，结果面见胜乐金刚佛父佛母。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "奘大师修行金刚亥母现前，面见至尊金刚亥母得受表示", "participants": [{"entity": "奘·达玛布德", "role": "主体"}, {"entity": "金刚亥母", "role": "本尊"}], "location": "革母", "time_info": "", "layers": ["神变"], "quote": "在也格耶地方，历经三不住之苦行而获得明显乐暖，在五年当中赤身裸体。对其生起定解以后，又历经了修行金刚亥母现前的苦行，结果在革母的西方面见至尊金刚亥母，得受众多表示。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "圆寂", "title": "奘·达玛布德一百一十七岁圆寂", "participants": [{"entity": "奘·达玛布德", "role": "主体"}], "location": "", "time_info": "一百一十七岁；一百零二岁时曾显现生病", "layers": ["史传"], "quote": "奘大师的年龄也是达到一百一十七岁才圆寂。这位大师与阿底峡尊者、仲敦巴尊者、夏瓦秋吉桑给、至尊米拉日巴五位大师先后时间几乎等同。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "沃喀拉哲巴传觉哲幻化网等宁玛法要", "participants": [{"entity": "沃喀拉哲巴", "role": "主体"}, {"entity": "觉哲", "role": "受法者"}, {"entity": "幻化网", "role": "法门"}, {"entity": "喜金刚", "role": "法门"}, {"entity": "真实名经", "role": "法门"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "觉哲奘·觉哲：诞生在密咒师的种姓中，从小就学习文字历算，在沃喀拉哲巴面前得受了《幻化网》等宁玛法要、《喜金刚》、《真实名\n经》。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "奘大师将金刚桥法全部教言传授给觉哲", "participants": [{"entity": "奘·达玛布德", "role": "主体"}, {"entity": "觉哲", "role": "受法者"}, {"entity": "金刚桥", "role": "法门"}], "location": "达波", "time_info": "师徒共住十八年", "layers": ["史传"], "quote": "”后来觉哲上师在赤卡地方传讲了。奘大师与觉哲师徒二人共住了十八年，奘大师将所有教言传授给觉哲以后吩咐他秉持传承。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "根桑在奘祖孙二人面前共得三十五次金刚桥法", "participants": [{"entity": "奘·达玛布德", "role": "主体"}, {"entity": "觉哲", "role": "主体"}, {"entity": "根桑", "role": "受法者"}, {"entity": "金刚桥", "role": "法门"}], "location": "达波", "time_info": "", "layers": ["史传"], "quote": "依止觉哲上师八年，听过七次金刚桥法。后来在秀地得了两次；在色隆听了一次，包括上师为别人传讲顺便听闻的，合计起来共在奘祖孙二人面前得受了三十五次金刚桥法。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "根桑传给亲子化身哦白桑给", "participants": [{"entity": "根桑", "role": "主体"}, {"entity": "哦白桑给", "role": "受法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "秉承二大祖师的教授以后也造了大小论典。根桑尊者传给亲子化身哦白桑给。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "奘大师传金刚桥法给涅达桑哈", "participants": [{"entity": "奘·达玛布德", "role": "主体"}, {"entity": "赞塘巴涅达玛色拉", "role": "受法者"}, {"entity": "金刚桥", "role": "法门"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "再者，奘大师又把金刚桥法传给雅隆赞塘巴的涅达桑哈，他得受加持，生起顿超的证悟，安住在寂静的尸陀林，利益众生的事业极其广大。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "圆寂", "title": "涅达桑哈七十七岁圆寂", "participants": [{"entity": "赞塘巴涅达玛色拉", "role": "主体"}], "location": "", "time_info": "七十七岁", "layers": ["史传"], "quote": "再者，奘大师又把金刚桥法传给雅隆赞塘巴的涅达桑哈，他得受加持，生起顿超的证悟，安住在寂静的尸陀林，利益众生的事业极其广大。最后在七十七岁时圆寂。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "奘大师传承链之一（色隆→让珠→哲波秋钦）", "participants": [{"entity": "奘·达玛布德", "role": "始传者"}, {"entity": "色隆巴", "role": "传承者"}, {"entity": "让珠", "role": "传承者"}, {"entity": "哲波秋钦", "role": "传承者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "涅达桑哈尊者的弟子班则巴尼，班则巴尼的弟子喇嘛拉。再有，奘大师传给色隆，色隆传给阿阇黎让珠，他传给哲波秋钦。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "奘大师传承链之二（多吉嘉灿→德敦达巴尊哲）", "participants": [{"entity": "奘·达玛布德", "role": "始传者"}, {"entity": "多吉嘉村", "role": "传承者"}, {"entity": "德敦达巴尊哲", "role": "传承者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "再有，奘大师传给色隆，色隆传给阿阇黎让珠，他传给哲波秋钦。再者，奘大师传给多吉嘉灿，多吉嘉灿传给德敦达巴尊哲。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "奘大师传承链之三（则益西旺波→...→索敦）", "participants": [{"entity": "奘·达玛布德", "role": "始传者"}, {"entity": "则益西旺波", "role": "传承者"}, {"entity": "堪布拉卡瓦", "role": "传承者"}, {"entity": "滚嘉", "role": "传承者"}, {"entity": "贡热瓦", "role": "传承者"}, {"entity": "索敦", "role": "传承者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "也有德敦达巴尊哲的弟子所造的论典。再者，奘大师传给则益西旺波-堪布拉卡瓦-阿阇黎滚嘉-阿阇黎贡热瓦-索敦。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "奘大师传承链之四（雅敦达瓦哦色→罗敦给登嘉→哦那多巴拉热万德）", "participants": [{"entity": "奘·达玛布德", "role": "始传者"}, {"entity": "雅敦达瓦哦色", "role": "传承者"}, {"entity": "罗敦给登嘉", "role": "传承者"}, {"entity": "哦那多巴拉热万德", "role": "传承者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "再有，奘大师传给帮让巴雅敦达瓦哦色。达瓦哦色传给罗敦给登嘉。也有由此传下的论著。再者，帮让雅敦接近一百岁时，他又传给哦那多巴拉热万德，并加以弘扬。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "奘大师传承链之五（吉才益西旺修→...→释迦嘉波）", "participants": [{"entity": "奘·达玛布德", "role": "始传者"}, {"entity": "吉才益西旺修", "role": "传承者"}, {"entity": "大堪布俄巴", "role": "传承者"}, {"entity": "德敦班则夏绕", "role": "传承者"}, {"entity": "大堪布索南嘉村", "role": "传承者"}, {"entity": "大堪布云讷西绕", "role": "传承者"}, {"entity": "云讷札巴", "role": "传承者"}, {"entity": "大堪布桑吉藏波", "role": "传承者"}, {"entity": "尊则旺修", "role": "传承者"}, {"entity": "塔叶札巴仁钦", "role": "传承者"}, {"entity": "释迦嘉波", "role": "传承者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "再有，奘大师传给吉才益西旺修-则益西旺波-大堪布俄巴-德敦班则夏绕-大堪布索南嘉村-大堪布云讷西绕-阿阇黎云讷札巴-大堪布桑吉藏波-喇嘛尊则旺修-塔叶札巴仁钦-阿阇黎释迦嘉波。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "出家", "title": "释迦嘉波茶卡拉出家受比丘戒", "participants": [{"entity": "释迦嘉波", "role": "主体"}], "location": "茶卡拉", "time_info": "{'text': '年青时', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "再有，奘大师传给吉才益西旺修-则益西旺波-大堪布俄巴-德敦班则夏绕-大堪布索南嘉村-大堪布云讷西绕-阿阇黎云讷札巴-大堪布桑吉藏波-喇嘛尊则旺修-塔叶札巴仁钦-阿阇黎释迦嘉波。\n释迦嘉波阿阇黎释迦嘉波年青时在茶卡拉地方出家，当年受比丘戒，精通了《俱舍论》和《戒律》，到玖隆地方巡回辩论。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "弘法", "title": "释迦嘉波玖隆巡回辩论", "participants": [{"entity": "释迦嘉波", "role": "主体"}], "location": "玖隆", "time_info": "", "layers": ["史传"], "quote": "再有，奘大师传给吉才益西旺修-则益西旺波-大堪布俄巴-德敦班则夏绕-大堪布索南嘉村-大堪布云讷西绕-阿阇黎云讷札巴-大堪布桑吉藏波-喇嘛尊则旺修-塔叶札巴仁钦-阿阇黎释迦嘉波。\n释迦嘉波阿阇黎释迦嘉波年青时在茶卡拉地方出家，当年受比丘戒，精通了《俱舍论》和《戒律》，到玖隆地方巡回辩论。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "圆寂", "title": "释迦嘉波圆寂出舍利", "participants": [{"entity": "释迦嘉波", "role": "主体"}], "location": "", "time_info": "{'text': '住世接近一百岁', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "修证境界不断增长，当年事太高，视力不清时也是由别人代替看书，随读来讲经说法，由诸如此类的事实可见，他的发心相当广大。住世接近一百岁，圆寂以后法体心间自然出现了无尽的舍利子。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "莲师与布玛莫札暗传心滴给益西措嘉", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "布玛莫札", "role": "协同"}, {"entity": "益西措嘉", "role": "受法者"}], "location": "友多德卓", "time_info": "", "layers": ["史传"], "quote": "在西藏，布玛莫札弘扬窍诀心滴，贝若札那把心部弘扬开来，他们考虑到在离开教授精华的恶世之时，广泛利益有情，于是将自己的心滴在友多德卓暗地里传授给空行母益西措嘉。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "莲师朱砂写字勾召莲明公主神识并传法", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "莲明公主", "role": "客体"}, {"entity": "珠萨香切曼", "role": "相关"}], "location": "青普", "time_info": "", "layers": ["神变"], "quote": "国王的王妃珠萨香切曼所生的莲明公主年仅八岁就离开人世，为了解除国王因忧伤而憔悴不堪的状态，在青普，莲师用朱砂在公主遗体的心间写了一个“讷”字，以禅定的锐利铁钩勾召她的神识，当她知道眼见、说话的时候，莲师依靠加持力把窍诀《空行心滴》传授给她，并授予后世法缘的灌顶。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "莲师将《空行心滴》传授给莲明公主", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "莲明公主", "role": "受法者"}], "location": "青普", "time_info": "", "layers": ["史传"], "quote": "国王的王妃珠萨香切曼所生的莲明公主年仅八岁就离开人世，为了解除国王因忧伤而憔悴不堪的状态，在青普，莲师用朱砂在公主遗体的心间写了一个“讷”字，以禅定的锐利铁钩勾召她的神识，当她知道眼见、说话的时候，莲师依靠加持力把窍诀《空行心滴》传授给她，并授予后世法缘的灌顶。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "伏藏", "title": "班玛列哲匝取出《空行心滴》", "participants": [{"entity": "班玛列哲匝", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "当时的甚深伏藏，就是后来班玛列哲匝（意为莲花事业妙力，是无垢光尊者的前世）取出的《空行心滴》，一直传到全知法王龙钦巴的深法，有关这方面的历史在下文予以叙述。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "迎请", "title": "赤松德赞遣译师迎请布玛莫札入藏", "participants": [{"entity": "赤松德赞", "role": "主体"}, {"entity": "布玛莫札", "role": "客体"}, {"entity": "噶瓦拜则", "role": "使者"}, {"entity": "焦若鲁坚赞", "role": "使者"}, {"entity": "酿登珍桑波", "role": "授记者"}], "location": "西藏", "time_info": "", "layers": ["史传"], "quote": "其二、阿阇黎布玛莫札的教规：布玛莫札接近二百岁时，正值藏地国王树立起佛法之际，酿登珍桑波七年里在一座禅定中如如不动，以肉眼同时照见整个四大部洲，为国王预言并且劝告（他迎请布玛莫札）。于是国王派遣噶瓦拜则、焦若鲁坚赞二位译师携带纯金礼品前去迎请。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "布玛莫札以神变令疑谤者起信", "participants": [{"entity": "布玛莫札", "role": "主体"}], "location": "西藏", "time_info": "", "layers": ["神变"], "quote": "当时，印度人以嫉妒心挑拨离间，使藏人们生起怀疑，这时布玛莫札以奇妙的神变使他们起信心，翻译了总的因果法门，分别的法门由耶札酿波作为译师，翻译了后译十三心部。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "译经", "title": "耶札酿波 : "圆寂", "title": "荡玛艮哲嘉村圆寂出彩虹舍利", "participants": [{"entity": "荡玛艮哲嘉村", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "酿噶当巴说：“以前人们只知道荡玛是位长老，谁也不知晓他是位了不起的修行人，当他圆寂的时候，虚空遍布彩虹，遗体中出现了无量无数的舍利，这时众人才感到惊奇，生起后悔之心。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "杰珍传法给酿噶当巴", "participants": [{"entity": "杰珍桑给旺修", "role": "主体"}, {"entity": "玛卓酿噶当巴", "role": "受法者"}], "location": "尼塘", "time_info": "", "layers": ["史传"], "quote": "凭您也是带着这份供品，想必肯定有殊胜教言，请恩赐我吧。”于是杰珍传授给他。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "圆寂", "title": "酿噶当巴友地德卓岩山修行成就虹身", "participants": [{"entity": "玛卓酿噶当巴", "role": "主体"}], "location": "友地德卓岩山", "time_info": "{'text': '修行两年', 'relative_to': None, 'absolute': None}", "layers": ["史传", "神变"], "quote": "”于是杰珍传授给他。他在友地的德卓岩山修行两年，结果成就虹身。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "伏藏", "title": "杰珍将伏藏品隐藏于三处", "participants": [{"entity": "杰珍桑给旺修", "role": "主体"}], "location": "郎卓恰巴", "time_info": "", "layers": ["史传"], "quote": "杰珍桑给旺修酿如年措地方的杰特毕旺波之子——杰珍桑给旺修，从幼年就广闻博学正法，并且通达无碍，在陡坡鹰谷拜见长老荡玛，约定在卡绕传授言教的时间，已圆满得受。上师圆寂以后，杰珍桑给旺修把所有古老的伏藏品隐藏在郎卓恰巴虎形泉眼旁、俄耶、加戒坡三处。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "布玛莫札梦中指引杰珍取伏藏", "participants": [{"entity": "布玛莫札", "role": "授记者"}, {"entity": "杰珍桑给旺修", "role": "受授记者"}], "location": "香门桥山岭", "time_info": "", "layers": ["神变", "授记"], "quote": "他从俄耶转移到香门桥山岭上修行，期间，梦见一个阿渣绕，他说：“我是智者布玛莫札也，具缘欲求最密精华义，前往青普给贡红岩处，彼有\n犹如心脏心滴法，携带彼法俄意切公处，谁人亦不见中修七年，有漏蕴身必定成虹身。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "伏藏", "title": "杰珍前赴青普取布玛莫札伏藏", "participants": [{"entity": "杰珍桑给旺修", "role": "主体"}], "location": "青普", "time_info": "", "layers": ["史传"], "quote": "他从俄耶转移到香门桥山岭上修行，期间，梦见一个阿渣绕，他说：“我是智者布玛莫札也，具缘欲求最密精华义，前往青普给贡红岩处，彼有\n犹如心脏心滴法，携带彼法俄意切公处，谁人亦不见中修七年，有漏蕴身必定成虹身。”听到此言，杰珍桑给旺修尊者前赴青普。那里一位有松石眉毛、皓齿整齐的女人取出一切经函交给他。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "布玛莫札亲身现前为杰珍赐灌顶教授", "participants": [{"entity": "布玛莫札", "role": "主体"}, {"entity": "杰珍桑给旺修", "role": "受法者"}], "location": "俄意切公", "time_info": "{'text': '半月之中', 'relative_to': None, 'absolute': None}", "layers": ["神变"], "quote": "那里一位有松石眉毛、皓齿整齐的女人取出一切经函交给他。杰珍尊者接受后安住在俄意切公静处，结果布玛莫札亲自现身，在半月之中圆满赐授一切灌顶、引导、教授后前往汉地。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "圆寂", "title": "杰珍桑给旺修成就无余虹身", "participants": [{"entity": "杰珍桑给旺修", "role": "主体"}], "location": "", "time_info": "{'text': '修行七年后；一百二十五岁', 'relative_to': None, 'absolute': None}", "layers": ["史传", "神变"], "quote": "杰珍尊者接受后安住在俄意切公静处，结果布玛莫札亲自现身，在半月之中圆满赐授一切灌顶、引导、教授后前往汉地。此后杰珍尊者修行七年，结果成就无余虹身，并将教言完整传给化身扬敦，一百二十五岁时以虹光之身逝于虚空中。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "授记", "title": "化身扬敦见虚空中上师观音度母得授记", "participants": [{"entity": "化身扬敦", "role": "主体"}, {"entity": "观音", "role": "授记者"}, {"entity": "圣度母", "role": "相关"}], "location": "酿东年克", "time_info": "", "layers": ["神变", "授记"], "quote": "从此到二十一岁之间依止了数多智者成就者的上师，研学三藏及新旧密宗续部，开启了智慧之莲花。当他住在酿东年克地方时，见到虚空中上师、大悲观世音及度母等尊颜，并且得到了授记。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "单坚护法神引导化身扬敦取伏藏", "participants": [{"entity": "多吉勒巴", "role": "引导者"}, {"entity": "化身扬敦", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "当他住在酿东年克地方时，见到虚空中上师、大悲观世音及度母等尊颜，并且得到了授记。头戴白帽的白人——单坚护法神说：“会赐予悉地，快去吧！”随后带着他前往。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "授记", "title": "俄嘎匝哲护法神授记化身扬敦做会供", "participants": [{"entity": "俄嘎匝哲护法神", "role": "授记者"}, {"entity": "化身扬敦", "role": "受授记者"}], "location": "", "time_info": "", "layers": ["神变", "授记"], "quote": "她授记道：'你应做一百零八次会供，三年之间对谁也不要宣说'", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "伏藏", "title": "化身扬敦从青普开取布玛莫札伏藏", "participants": [{"entity": "化身扬敦", "role": "主体"}], "location": "青普", "time_info": "{'text': '二十五岁', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "”后来化身扬敦从岩洞门口得到了两颗松耳石，作为资本，做了一百零八次会供。二十五岁时，他来到卫藏，也从青普开取了布玛莫札的伏藏法，直接面见布玛莫札得到开许。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "杰珍桑给旺修在香达那传秘密心滴给化身扬敦", "participants": [{"entity": "杰珍桑给旺修", "role": "主体"}, {"entity": "化身扬敦", "role": "受法者"}], "location": "香达那", "time_info": "", "layers": ["史传"], "quote": "二十五岁时，他来到卫藏，也从青普开取了布玛莫札的伏藏法，直接面见布玛莫札得到开许。后来前往香达那，在桥头遇见杰珍桑给旺修大师，圆满得受秘密心滴。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "圆寂", "title": "化身扬敦火猪年圆寂示现殊胜瑞相", "participants": [{"entity": "化身扬敦", "role": "主体"}], "location": "", "time_info": "{'text': '七十一岁火猪年十一月二十二日', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "他在七十一岁时也就是火猪年十一月二十二日，伴随着东方空中传出七次巨大响声，大地震动三次，空中出现彩虹、光芒、妙音、香气等于本地现前菩提的验相而圆寂。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "化身扬敦传秘密心滴灌顶教授给涅玛波", "participants": [{"entity": "化身扬敦", "role": "主体"}, {"entity": "涅玛波", "role": "受法者"}], "location": "", "time_info": "{'text': '涅玛波五岁开始', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "”于是给他取名涅玛波（意为十万日）。他从五岁开始逐渐在父亲面前得受秘密心滴的灌顶、引导及教授，并且心领神会。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "弘法", "title": "涅玛波十岁坐床传讲十七大续部", "participants": [{"entity": "涅玛波", "role": "主体"}], "location": "", "time_info": "{'text': '十岁', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "他从五岁开始逐渐在父亲面前得受秘密心滴的灌顶、引导及教授，并且心领神会。\n在他十岁举行坐床仪式之时，传讲十七大续部，使所有弟子感到万分惊奇。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "圆寂", "title": "涅玛波五十六岁圆寂出五部金刚舍利", "participants": [{"entity": "涅玛波", "role": "主体"}], "location": "", "time_info": "{'text': '五十六岁', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "总之依止了扬耶札巴、荣地的鄂·多吉桑给等众多成就者的上师，无有偏袒广泛闻思若干经续，也撰著了《大句义论》。尊者五十六岁时圆寂。荼毗时，出现五部金刚舍利，空中搭起彩虹帷幕，在神变月的当时竟然生长豆蔻花等等。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "革日觉白尔拉萨觉沃像前见观音和金刚手", "participants": [{"entity": "革日觉白尔", "role": "主体"}, {"entity": "观音", "role": "所见"}, {"entity": "密主金刚手菩萨", "role": "所见"}], "location": "拉萨", "time_info": "", "layers": ["神变"], "quote": "修行时面见本尊容颜，智慧深远，含而不露。在拉萨觉沃佛像面前献上供品时，目睹光明明点内圣者观世音和金刚手菩萨，在黎明时，见到阿弥陀佛尊颜。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "革日觉白尔黎明见阿弥陀佛", "participants": [{"entity": "革日觉白尔", "role": "主体"}, {"entity": "阿弥陀佛", "role": "所见"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "修行时面见本尊容颜，智慧深远，含而不露。在拉萨觉沃佛像面前献上供品时，目睹光明明点内圣者观世音和金刚手菩萨，在黎明时，见到阿弥陀佛尊颜。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "圆寂", "title": "革日觉白尔六十岁圆寂", "participants": [{"entity": "革日觉白尔", "role": "主体"}], "location": "", "time_info": "{'text': '六十岁', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "觉白尔尊者说：“我们种姓中无有长寿者，但我能安然无恙全是阿弥陀佛的加持。”他拥有无量智慧与慈悲而成为引导众生的商主，在六十岁时圆寂，七日中彩虹网幕相连，遗体中出现“嗡啊吽”和许多舍利。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "授记", "title": "大悲观世音授记赤修桑给嘉巴修心滴", "participants": [{"entity": "观音", "role": "授记者"}, {"entity": "赤修桑给嘉巴", "role": "受授记者"}], "location": "", "time_info": "{'text': '十三岁的一天拂晓', 'relative_to': None, 'absolute': None}", "layers": ["神变", "授记"], "quote": "十三岁的一天拂晓，他梦到日月同时升起，当醒来时见到大悲观世音菩萨，观音菩萨说：“你当修持即生解脱之法——心滴之义。”从此以后，他的悲心无偏增长，对一切众生如独子之母的理念油然而生。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "出家", "title": "赤修桑给嘉巴二十岁出家", "participants": [{"entity": "赤修桑给嘉巴", "role": "主体"}, {"entity": "累俄刚巴", "role": "亲教师"}, {"entity": "哲刚巴", "role": "规范师"}], "location": "", "time_info": "{'text': '二十岁', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "”父母说：“我们怎么生了你这样的儿子。”当他二十岁时，在亲教师累俄刚巴与规范师哲刚巴面前出家。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "革日觉白尔传大圆满给赤修桑给嘉巴", "participants": [{"entity": "革日觉白尔", "role": "主体"}, {"entity": "赤修桑给嘉巴", "role": "受法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在日巴哲美\n俄、拉热华、云讷波、敦夏香云、觉智等诸位上师前听受了新密、旧密、息法断法、大手印数多法要。尤其是依照大悲观音菩萨的授记，在革日觉白尔面前恭听了大圆满，而恍然大悟。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "圆寂", "title": "赤修桑给嘉巴六十四岁圆寂", "participants": [{"entity": "赤修桑给嘉巴", "role": "主体"}], "location": "", "time_info": "{'text': '六十四岁', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "多年在措哦玛等神山和空谷中唯一精进修行，达到本来清净密意果位，使许许多多有缘者得以成熟、解脱。六十四岁时，显示获得胜乘果位的殊胜验相而圆寂。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "出家", "title": "美龙多吉九岁出家", "participants": [{"entity": "美龙巴", "role": "主体"}, {"entity": "哲龙巴", "role": "亲教师"}, {"entity": "思龙巴", "role": "堪布"}], "location": "", "time_info": "{'text': '九岁', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "美龙多吉赤修桑给嘉巴尊者的弟子大成就者美龙多吉，是札普地方瑜伽士萨意之子，九岁于成就者哲龙巴和堪布思龙巴面前出家，当时为超度亡人唯一传诵广、中、略般若。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "美龙多吉前行中六日见金刚萨埵", "participants": [{"entity": "美龙巴", "role": "主体"}, {"entity": "金刚萨埵", "role": "所见"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "十八岁，见到桑给嘉巴桑吉温波尊者得受了心滴窍诀，他豪情满怀地想：现在有了窍诀，已心满意足了。于是开始修行，在修持前行时，六天之中夜以继日见到金刚萨埵尊颜。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "桑给嘉巴桑吉温波传心滴窍诀给美龙多吉", "participants": [{"entity": "桑给嘉巴桑吉温波", "role": "主体"}, {"entity": "美龙巴", "role": "受法者"}], "location": "", "time_info": "{'text': '美龙多吉十八岁', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "此后居无定所，云游四方，依止了策普多哦日巴等诸多上师，朝礼了夏俄达贡和卡其等许多圣地，五十天里以一藏升青稞维生，以非凡的毅力忍耐苦行，历经了无法想象的艰难困苦。十八岁，见到桑给嘉巴桑吉温波尊者得受了心滴窍诀，他豪情满怀地想：现在有了窍诀，已心满意足了。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "美龙多吉亲见金刚亥母、马头明王等众尊", "participants": [{"entity": "美龙巴", "role": "主体"}, {"entity": "金刚亥母", "role": "所见"}, {"entity": "马头明王", "role": "所见"}, {"entity": "普贤如来", "role": "所见"}, {"entity": "莲花生大士", "role": "所见"}, {"entity": "布玛莫札", "role": "所见"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "他以金刚击岩山，金刚融入其中，也现见了马头明王、度母、观世音菩萨、莲花生大士、普贤如来、金刚萨埵、布玛莫札、萨龙巴、桑吉日巴、珠滚帕哲诸位上师尊颜。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "美龙多吉飞行空中踏岩如泥", "participants": [{"entity": "美龙巴", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "这位尊者由于禁行十分出奇，证悟者的行为无取无舍，完全能够直接行持密宗中所说的誓言。见到雄鹰崽翱翔空中，便持着觉性禁行的力量而飞往空中，走在岩石上如踏泥土。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "弘法", "title": "美龙多吉在堪巴炯等地树立修行法幢", "participants": [{"entity": "美龙巴", "role": "主体"}], "location": "堪巴炯", "time_info": "", "layers": ["史传"], "quote": "见到雄鹰崽翱翔空中，便持着觉性禁行的力量而飞往空中，走在岩石上如踏泥土。在堪巴炯、堪巴洲、桑给堡、卡切等地树立修行法幢，利益有情。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "圆寂", "title": "美龙多吉拉瓦尸林圆寂消失于西方", "participants": [{"entity": "美龙巴", "role": "主体"}], "location": "拉瓦尸林", "time_info": "{'text': '六十一岁', 'relative_to': None, 'absolute': None}", "layers": ["史传", "神变"], "quote": "本来他的寿命是三十七岁，当时，有一位名叫根嘎的阿阇黎祈请而住世到六十一岁。最后在拉瓦尸林示现圆寂时，伴随着万丈光芒、妙音，众人看到他消失在西方。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "灌顶", "title": "革玛燃匝七岁获喜金刚胜乐金刚灌顶", "participants": [{"entity": "持明革玛燃匝", "role": "主体"}, {"entity": "吉多巴", "role": "灌顶师"}], "location": "工布哦秀透荡寺", "time_info": "{'text': '七岁', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "在没有学习的情况下自然通达了文字读写。七岁，在工布哦秀透荡寺的吉多巴上师前获得《喜金刚》、《胜乐金刚》的灌顶。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "出家", "title": "革玛燃匝十二岁出家得法名云讷嘉波", "participants": [{"entity": "持明革玛燃匝", "role": "主体"}, {"entity": "叶瓦巴", "role": "亲教师"}, {"entity": "阿日巴", "role": "规范师"}], "location": "帕母哲", "time_info": "{'text': '十二岁', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "十二岁在帕母哲亲教师叶瓦巴和规范师阿日巴前出家，法名为云讷嘉波（意为童子王），之后听闻《戒律》，五年期间在札叶巴仁波切前恭听《那诺六法》等法要。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "革玛燃匝念六字真言见观世音菩萨", "participants": [{"entity": "持明革玛燃匝", "role": "主体"}, {"entity": "观音", "role": "所见"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "在查荡巴上师前听受《二观察续》（即《喜金刚》）。在温波桑西前学习工巧明，同时念诵六字真言，结果见到观世音菩萨在一座水晶室内面带微笑。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "美龙多吉传大手印引导给革玛燃匝", "participants": [{"entity": "美龙巴", "role": "主体"}, {"entity": "持明革玛燃匝", "role": "受法者"}], "location": "阿尔山洞", "time_info": "", "layers": ["史传"], "quote": "后来在穹那夏达前听闻前译派的诸多续部传承窍诀。在阿尔山洞遇到美龙多吉尊者，请求了大手印引导，结果直观而认识了心的本来面目。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "革玛燃匝十日夜见莲花生大士", "participants": [{"entity": "持明革玛燃匝", "role": "主体"}, {"entity": "莲花生大士", "role": "所见"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "美龙多吉尊者前往竹青门空行洲时，他随师前往并请求了《金刚亥母》等法门，随后修持，在十日晚上，见到邬金莲花生大士，莲师说：“奇哉，善男子，恒时修法。”后来他到策普地方，在年日和达玛滚波上师面前无余听受了噶玛巴的法门。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "美龙多吉完整传秘密心滴给革玛燃匝", "participants": [{"entity": "美龙巴", "role": "主体"}, {"entity": "持明革玛燃匝", "role": "受法者"}], "location": "卡切", "time_info": "", "layers": ["史传"], "quote": "后来在嘉曼巴南卡多吉上师前恭聆《直指密要》，在嘎丹巴秋吉桑给前聆听了《密要明镜》等大圆满密法。其后他又再度前去卡切地方，在大成就者美龙多吉面前认认真真地得受了秘密心滴的灌顶、传承及教授。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "革玛燃匝灌顶时见四臂怙主和俄嘎匝哲等护法", "participants": [{"entity": "持明革玛燃匝", "role": "主体"}, {"entity": "四臂怙主", "role": "所见"}, {"entity": "俄嘎匝哲护法神", "role": "所见"}, {"entity": "事业血髻佛母", "role": "所见"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "一次，在灌顶的行列里，他看到：上师头上的虚空中四臂怙主（马哈嘎拉）；门前身色深蓝、手持木棍和豺狼、两层楼高的俄嘎匝哲护法神，外面事业血髻佛母双手从小血湖中掬血而饮。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "革玛燃匝竹园洞面见金刚亥母", "participants": [{"entity": "持明革玛燃匝", "role": "主体"}, {"entity": "金刚亥母", "role": "所见"}], "location": "竹园洞", "time_info": "", "layers": ["神变"], "quote": "他在八年间形影不离地依止上师。住在邬金修行处竹园洞中的一冬天里，面见了金刚亥母，从而智慧无偏得以增长。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "革玛燃匝应自生金刚迎请供养所有心滴教授", "participants": [{"entity": "持明革玛燃匝", "role": "主体"}, {"entity": "噶玛巴·自生金刚", "role": "受法者"}], "location": "策普", "time_info": "", "layers": ["史传"], "quote": "他到匝热神山时，五色彩虹照射在哲母拉地方的尼桑石像上等等。后来在策普应法王自生金刚迎请而供养了所有心滴教授。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "革玛燃匝耶措湖旁摄受地神", "participants": [{"entity": "持明革玛燃匝", "role": "主体"}], "location": "耶措湖", "time_info": "{'text': '八个月', 'relative_to': None, 'absolute': None}", "layers": ["神变"], "quote": "在转绕匝热神山以后又在耶措湖旁只身一人住了八个月，出现鬼神兴风作浪的情况时，他依靠本性中平等一味而摄受了地神，被地神请到室内作承侍供养，财神赐予宝珠，并且见到湖中拇指大小的五光水泡依次融入。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "圆寂", "title": "革玛燃匝水羊年圆寂并延寿十三天", "participants": [{"entity": "持明革玛燃匝", "role": "主体"}, {"entity": "古达", "role": "侍者"}], "location": "", "time_info": "{'text': '七十八岁水羊年七月二十五', 'relative_to': None, 'absolute': None}", "layers": ["史传", "神变"], "quote": "在他七十八岁，水羊年七月二十五，伴随着妙音、自光、帷幕等稀有验相而圆寂。侍者古达为主的身边弟子以最大的虔诚信心和恭敬心，极度哀伤，结果上师再度立起，跏趺而坐，面带微笑地说：“你们不要悲伤，我并非是死。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "自生金刚以夺识术入多隆亡者尸身", "participants": [{"entity": "噶玛巴·自生金刚", "role": "主体"}], "location": "多隆", "time_info": "", "layers": ["神变"], "quote": "噶玛巴·自生金刚噶玛巴·自生金刚是圣者观世音菩萨亲自降临于世间，法界中智慧空行母又以金刚歌劝请，他以无量悲心照见一切有情，于是在多隆地\n方一对年迈夫妻死去儿子的尸体中夺识而入。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "伏藏", "title": "自生金刚取长寿水伏藏使汉地皇帝延寿", "participants": [{"entity": "噶玛巴·自生金刚", "role": "主体"}], "location": "桑耶青普", "time_info": "", "layers": ["史传"], "quote": "他只好再度转生，受生为男女瑜伽之子，一丝一毫也不存在能遮蔽回忆前世的障碍而根本不被胎垢所染污者，在印度就是释迦佛，在藏地唯有这位大德。印度藏地佛法的唯一中流砥柱——噶玛巴·自生金刚从桑耶青普和雅玛隆等地取出长寿水伏藏，从而使汉地皇帝的寿命延长。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "布玛莫札融入自生金刚白毫现前心滴密意", "participants": [{"entity": "布玛莫札", "role": "融入者"}, {"entity": "噶玛巴·自生金刚", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "印度藏地佛法的唯一中流砥柱——噶玛巴·自生金刚从桑耶青普和雅玛隆等地取出长寿水伏藏，从而使汉地皇帝的寿命延长。当他看到布玛莫札融入自己的白毫时，即刻原原本本地现前了心滴的密意。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "自生金刚在革玛燃匝前完整听受秘密心滴", "participants": [{"entity": "噶玛巴·自生金刚", "role": "受法者"}, {"entity": "持明革玛燃匝", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "当他看到布玛莫札融入自己的白毫时，即刻原原本本地现前了心滴的密意。然而，为了示现依止密宗上师的典范，他谦虚地在持明革玛燃匝座前完整听受了秘密心滴的窍诀。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "弘法", "title": "自生金刚教诫弟子分方弘扬心滴法", "participants": [{"entity": "噶玛巴·自生金刚", "role": "主体"}, {"entity": "曼龙巴释迦云尼", "role": "受教者"}, {"entity": "荣敦多吉花", "role": "受教者"}, {"entity": "益嘉瓦", "role": "受教者"}, {"entity": "益西嘉村", "role": "受教者"}, {"entity": "哲革", "role": "受教者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他担心这样的正法会隐没，于是教诫曼龙巴释迦云尼等说：“荣敦多吉花在卫藏弘扬；益嘉瓦在康贡弘扬；益西嘉村在蒙古和汉地弘扬；哲革在卫藏弘扬。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "南哲热玛德护法神护持龙钦巴出生", "participants": [{"entity": "南哲热玛德", "role": "主体"}, {"entity": "无垢光尊者", "role": "客体"}], "location": "", "time_info": "{'text': '第五胜周年土猴年藏历二月初十', 'relative_to': None, 'absolute': None}", "layers": ["神变"], "quote": "在第五胜周年土猴年藏历二月初十那一天生下龙钦巴尊者，当时就像天王承侍释迦太子悉达多一样，南哲热玛德护法神一边说“我来保护”一边把他抱在怀里，之后交给他的母亲就不见了。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "出家", "title": "龙钦巴十二岁于桑耶巴出家", "participants": [{"entity": "无垢光尊者", "role": "主体"}, {"entity": "萨哲仁钦", "role": "堪布"}, {"entity": "根嘎俄色", "role": "阿阇黎"}], "location": "桑耶", "time_info": "{'text': '十二岁', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "九岁，读诵《般若二万颂》、《般若八千颂》一百遍，无一遗漏地铭记于心。十二岁时在桑耶巴堪布萨哲仁钦和阿阇黎根嘎俄色面前出家，法名为赤诚罗珠，认真研学了《戒律》。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "龙钦巴入桑普尼托学院闻显宗教理", "participants": [{"entity": "无垢光尊者", "role": "受法者"}, {"entity": "参滚巴", "role": "上师"}, {"entity": "喇张巴秋花嘉灿", "role": "上师"}], "location": "桑普尼托大佛学院", "time_info": "{'text': '十九岁', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "十九岁进入西藏鄂勒毕西绕的道场——讲因明的桑普尼托大佛学院，在上院第十五代住持阿阇黎参滚巴和第十六代住持喇张巴秋花嘉\n灿二位上师前听受了《弥勒五论》、《因明七论》 83 、《般若》、《中观》等显宗的教理。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "神变", "title": "妙音天女把龙钦巴放在手掌中显示四洲须弥并授记", "participants": [{"entity": "妙音天女", "role": "主体"}, {"entity": "无垢光尊者", "role": "受授记者"}], "location": "", "time_info": "", "layers": ["神变", "授记"], "quote": "他在修行文殊菩萨、妙音天女、不动佛、白金刚亥母时面见各位本尊。尤其是妙音天女把他放在手掌中七天之内显示（转绕）四大部洲及须弥山，并得授记。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "龙钦巴在丹帕巴等四师前听受前译金刚乘法门", "participants": [{"entity": "无垢光尊者", "role": "受法者"}, {"entity": "丹帕巴", "role": "上师"}, {"entity": "云讷敦哲", "role": "上师"}, {"entity": "纽塘玛瓦", "role": "上师"}, {"entity": "桑吉札巴", "role": "上师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "由于无碍智慧的大成就获得自在，拥有了对博大的教理无所畏惧的辩才，由此桑耶隆芒瓦（意为无边众教）或者龙钦绕降的大名传遍四面八方。他在阿阇黎丹帕巴、云讷敦哲、纽塘玛瓦、桑吉札巴等四位上师面前听受《经幻心》、《宁玛续全集》为首的前译金刚乘法门。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "龙钦巴在自生金刚前听受广博法要", "participants": [{"entity": "无垢光尊者", "role": "受法者"}, {"entity": "噶玛巴·自生金刚", "role": "上师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在法王自生金刚面前，听受了《六加行》、《遣除魔障法》、《那诺六法》、《直指三身》、《佛海》、《观音王轨》、《密集续》、《桑布札续》、《玛哈玛雅续》、《红黑大威德续》等等广博的法要。", "chapter": "《藏密佛教史》> 第四品 内密三续"}, {"type": "传法", "title": "龙钦巴在萨迦上师单巴前听受九种深法", "participants": [{"entity": "无垢光尊者", "role": "受法者"}, {"entity": "单巴", "role": "上师"}], "location": "", "time_info": "", "lay
