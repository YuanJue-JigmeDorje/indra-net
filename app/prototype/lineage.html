贡仁真酿波那里，以法主的身份得受了《上师集密意续》完整的能成熟之灌顶和能解脱之教言。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "出家受戒", "title": "多吉朗巴七岁得受沙弥戒", "participants": [{"entity": "多吉朗巴", "role": "受戒者"}, {"entity": "全知察巴释迦", "role": "戒师"}], "location": "帮雄神山", "time_info": "{'text': '七岁', 'relative_to': '多吉朗巴', 'absolute': None}", "layers": ["史传"], "quote": "他苏醒殊胜种姓的验相和奇迹不可思议。七岁在帮雄神山附近，于全知察巴释迦面前得受沙弥戒，并且在他和其余诸位上师面前听受显密新旧派法要，达到究竟。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "多吉朗巴十三岁取出第一个伏藏品三根本修法", "participants": [{"entity": "多吉朗巴", "role": "伏藏师"}, {"entity": "莲花生大士", "role": "授记者"}], "location": "察哲觉姆", "time_info": "{'text': '十三岁时', 'relative_to': '多吉朗巴', 'absolute': None}", "layers": ["史传"], "quote": "十三岁时七次面见邬金仁波切莲花生大士，依照上师秋杰旺修的伏藏中记载的标题，他从察哲觉姆身背后取出第一个伏藏品《三根本修法》以及短小修法、伏藏标题、副标题、猛咒、摄生术，共有一百零八，连同特殊授记法。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "灌顶", "title": "莲花生大士在香达邬嘎札为多吉朗巴灌顶", "participants": [{"entity": "莲花生大士", "role": "灌顶者"}, {"entity": "多吉朗巴", "role": "受灌者"}], "location": "香达邬嘎札", "time_info": "{'text': '十五岁', 'relative_to': '多吉朗巴', 'absolute': None}", "layers": ["证境"], "quote": "十三岁时七次面见邬金仁波切莲花生大士，依照上师秋杰旺修的伏藏中记载的标题，他从察哲觉姆身背后取出第一个伏藏品《三根本修法》以及短小修法、伏藏标题、副标题、猛咒、摄生术，共有一百零八，连同特殊授记法。十五岁开启香达邬嘎札的伏藏门时，在极其宽广的修行山洞里面，莲花生大士亲自降临而陈设坛城为他灌顶。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "多吉朗巴从香达邬嘎札取出大量伏藏法", "participants": [{"entity": "多吉朗巴", "role": "伏藏师"}], "location": "香达邬嘎札", "time_info": "{'text': '十五岁', 'relative_to': '多吉朗巴', 'absolute': None}", "layers": ["史传"], "quote": "从一一黄纸的开头赐授经教传承和伏藏物。他也取出佛像、上师四函、百数卷纸、长寿水四瓶、圣物嘎喔盒等。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "益西措嘉在哦塘香切殿堂赐予多吉朗巴长寿水等", "participants": [{"entity": "益西措嘉空行母", "role": "赐予者"}, {"entity": "多吉朗巴", "role": "受者"}], "location": "哦塘香切殿堂", "time_info": "", "layers": ["证境"], "quote": "之后又次第从珍珠水晶瓦贡地方开取了实修引导十类等，自此开始，在哦塘香切殿堂的长寿洞里，益西措嘉亲自降临而恩赐长寿水以及在扬列秀修行的法药、法王和益西措嘉的神魂璁玉、如意宝珠、法类和猛咒，期间，他从各个伏藏地点取出了四十三大伏藏品，从小的与内部的伏藏处开取出一百零八种伏藏品。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "多吉朗巴在切哦山幻化二身公开取出伏藏", "participants": [{"entity": "多吉朗巴", "role": "主体"}], "location": "切哦山", "time_info": "", "layers": ["神变"], "quote": "之后又次第从珍珠水晶瓦贡地方开取了实修引导十类等，自此开始，在哦塘香切殿堂的长寿洞里，益西措嘉亲自降临而恩赐长寿水以及在扬列秀修行的法药、法王和益西措嘉的神魂璁玉、如意宝珠、法类和猛咒，期间，他从各个伏藏地点取出了四十三大伏藏品，从小的与内部的伏藏处开取出一百零八种伏藏品。在开取青普的伏藏时，他十三次亲见邬金莲师，在切哦山，他幻化二身以后，在众人当中公开取出伏藏，并且留下一肘的脚印。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "多吉朗巴在藏龙建立八大法行大修并为鬼神灌顶", "participants": [{"entity": "多吉朗巴", "role": "主体"}], "location": "藏龙美措酿山洞", "time_info": "", "layers": ["史传"], "quote": "在藏龙美措酿山洞，塘拉与刚嘎夏美作为施主，召集雪域的所有大力鬼神而建立八大法行的大修，为所有鬼神灌顶，以幻化身到达八大尸林礼见八大持明，听受《八禅定见》教授。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圆寂", "title": "多吉朗巴六十岁留下遗教示现圆寂", "participants": [{"entity": "多吉朗巴", "role": "主体"}], "location": "札龙", "time_info": "{'text': '六十岁', 'relative_to': '多吉朗巴', 'absolute': None}", "layers": ["史传"], "quote": "他众所周知的名称是多吉朗巴、班玛朗巴、根炯朗巴、耶仲朗巴、嘉华秋戒西年。这位伏藏师弘法利生的事业究竟以后，在六十岁留下遗教授记，伴随着稀有的瑞相在札龙地方示现圆寂。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "多吉朗巴法体三年安放期间开口教诫并出现大量舍利", "participants": [{"entity": "多吉朗巴", "role": "主体"}, {"entity": "札西炯尼", "role": "心子"}, {"entity": "土美嘉嘎瓦", "role": "弟子"}], "location": "札龙", "time_info": "{'text': '圆寂后三年安放期间', 'relative_to': '多吉朗巴', 'absolute': None}", "layers": ["神变"], "quote": "这位伏藏师弘法利生的事业究竟以后，在六十岁留下遗教授记，伴随着稀有的瑞相在札龙地方示现圆寂。法体在三年安放期间，时而开口教诫恩赐四句回向文而利益有情，最后作荼毗供养，结果尊身出现大量舍利。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "绕那朗巴三十岁取出第一个伏藏品三根本修类", "participants": [{"entity": "法王绕那朗巴", "role": "伏藏师"}], "location": "大鹏岩", "time_info": "{'text': '三十岁时', 'relative_to': '绕那朗巴', 'absolute': None}", "layers": ["史传"], "quote": "三十岁时，从大鹏岩处开取第一个伏藏品《三根本修类》等，渐渐地，又从哲塘古如岩处取出马头明王佛父佛母双运修法，从拉札南给坚，取出《集密意续》四类等、《寂猛上师》、《大悲密集》、《大圆满明界日》为主二十五个伏藏品。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "授记", "title": "莲花生大士幻化为舍事者赐予绕那朗巴伏藏标题", "participants": [{"entity": "莲花生大士", "role": "授记者"}, {"entity": "法王绕那朗巴", "role": "被授记者"}], "location": "", "time_info": "{'text': '二十七岁时', 'relative_to': '绕那朗巴', 'absolute': None}", "layers": ["授记", "证境"], "quote": "他从十岁起就显现出许多清净相，由前世修行力无勤通达一切明处，并且也广泛闻受佛法。在他二十七岁时，莲花生大士幻化成一位头带黄帽、身着黄衣的舍事者，亲自赐予他伏藏标题，并进行教授。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "绕那朗巴取出二十五个伏藏品", "participants": [{"entity": "法王绕那朗巴", "role": "伏藏师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "三十岁时，从大鹏岩处开取第一个伏藏品《三根本修类》等，渐渐地，又从哲塘古如岩处取出马头明王佛父佛母双运修法，从拉札南给坚，取出《集密意续》四类等、《寂猛上师》、《大悲密集》、《大圆满明界日》为主二十五个伏藏品。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "绕那朗巴与美古桑单桑波编集《宁玛续全集》", "participants": [{"entity": "法王绕那朗巴", "role": "主体"}, {"entity": "美古桑单桑波", "role": "传承持有者"}], "location": "哲西棱珠宫殿", "time_info": "", "layers": ["史传"], "quote": "以保存下来的大宿·鸱枭谷上师概略的《续全集》为主，他用最大的努力从四面八方寻找法本传承，他得知完整的教传承除了后藏的美古桑单桑波一人以外整个康藏谁也没有，他不忍心让教传中断，尽管美古尊者当时年事极高，但在很长的时间里师徒二人以最大的精进听受，后来在哲西棱珠宫殿里，编集成《宁玛续全集》的一个正文，先用墨写，后用金撰、金刻，数次弘扬教藏传承，由此可知，如今人们有享受如意宝般的这所\n有密续的机会，唯一来源于这位伏藏大师的悲心，所以，他对前译总的佛法自始至终恩重如山。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圆寂", "title": "绕那朗巴七十六岁前往莲花光宫殿", "participants": [{"entity": "法王绕那朗巴", "role": "主体"}], "location": "", "time_info": "{'text': '七十六岁', 'relative_to': '绕那朗巴', 'absolute': None}", "layers": ["史传"], "quote": "以保存下来的大宿·鸱枭谷上师概略的《续全集》为主，他用最大的努力从四面八方寻找法本传承，他得知完整的教传承除了后藏的美古桑单桑波一人以外整个康藏谁也没有，他不忍心让教传中断，尽管美古尊者当时年事极高，但在很长的时间里师徒二人以最大的精进听受，后来在哲西棱珠宫殿里，编集成《宁玛续全集》的一个正文，先用墨写，后用金撰、金刻，数次弘扬教藏传承，由此可知，如今人们有享受如意宝般的这所\n有密续的机会，唯一来源于这位伏藏大师的悲心，所以，他对前译总的佛法自始至终恩重如山。这位伏藏大师如此事业究竟以后在七十六岁伴随着稀有的大神变而前往莲花光宫殿。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "邬金班玛朗巴从烈火湖取出大圆满明界类", "participants": [{"entity": "邬金班玛朗巴", "role": "伏藏师"}], "location": "那让岩", "time_info": "{'text': '二十七岁时', 'relative_to': '邬金班玛朗巴', 'absolute': None}", "layers": ["史传", "神变"], "quote": "他在二十七岁时，所有甚深伏藏之首大圆满明界类，从那让岩附近人称共称盘旋成结的烈火湖的当河取出，当时在众人聚集之中，他手拿一盏灯无有阻碍走进湖内，当出来之时手中的灯还没有熄灭，瓷罐大小的伏藏大宝箧已夹在腋下，令在场的所有人吃惊不已，生起诚挚的信心，依此无可诤议的美名如日月般遍布整个人间。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "邬金班玛朗巴从桑耶青普取出大圆满集普贤密意续", "participants": [{"entity": "邬金班玛朗巴", "role": "伏藏师"}], "location": "桑耶青普", "time_info": "", "layers": ["史传"], "quote": "他在二十七岁时，所有甚深伏藏之首大圆满明界类，从那让岩附近人称共称盘旋成结的烈火湖的当河取出，当时在众人聚集之中，他手拿一盏灯无有阻碍走进湖内，当出来之时手中的灯还没有熄灭，瓷罐大小的伏藏大宝箧已夹在腋下，令在场的所有人吃惊不已，生起诚挚的信心，依此无可诤议的美名如日月般遍布整个人间。以此为主，他从桑耶青普取出《大圆满集普贤密意续》。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "邬金班玛朗巴从不同地点取出多种伏藏", "participants": [{"entity": "邬金班玛朗巴", "role": "伏藏师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "此外，他从不同的伏藏地点，开取《大圆满无二孺子续》类、《上师宝珠海》、《大悲遣暗灯》、《八大法行意镜》、《普巴极密命剑》、《甘露药修法》类即教藏、普巴、妙药三种，降魔金刚手及威猛金刚手、大中小猛修三种、长寿引导金刚鬘、长寿修法宝珠道用、黑色三类、事业类等许多伏藏。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "邬金班玛朗巴从山丘除土石使众人朝礼霍吉河佛堂", "participants": [{"entity": "邬金班玛朗巴", "role": "主体"}], "location": "霍吉河佛堂", "time_info": "", "layers": ["神变"], "quote": "特别是，霍吉河的佛堂，与三代\n表的殿堂一模一样，这在以前人们见所未见，这位伏藏师从一个山丘除去所有土石，使当代众人有朝礼此殿堂的机会。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "授记", "title": "邬金班玛朗巴得到成佛授记", "participants": [{"entity": "邬金班玛朗巴", "role": "被授记者"}], "location": "", "time_info": "", "layers": ["授记"], "quote": "得到'未来时于莲花庄严刹土成佛，佛号金刚藏'的授记", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "噶玛朗巴十五岁从刚波达神山取出寂猛密意自解脱等", "participants": [{"entity": "噶玛朗巴", "role": "伏藏师"}], "location": "刚波达神山", "time_info": "{'text': '十五岁时', 'relative_to': '噶玛朗巴', 'absolute': None}", "layers": ["史传"], "quote": "十五岁时依授记和缘起聚合，从刚波达神山如起舞岩石内取出《寂猛密意自解脱》及《大悲莲花寂猛》等法要，他将《莲花寂猛》法类完整赐予十四位法主大弟子，《密意自解脱》所有法类独传给亲子尼达秋吉。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "噶玛朗巴传《莲花寂猛》与《密意自解脱》", "participants": [{"entity": "噶玛朗巴", "role": "传法者"}, {"entity": "尼达秋吉", "role": "受法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "十五岁时依授记和缘起聚合，从刚波达神山如起舞岩石内取出《寂猛密意自解脱》及《大悲莲花寂猛》等法要，他将《莲花寂猛》法类完整赐予十四位法主大弟子，《密意自解脱》所有法类独传给亲子尼达秋吉。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "南卡秋吉嘉措开始广泛弘扬寂猛密意自解脱", "participants": [{"entity": "南卡秋吉嘉措", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "三代之前，印持单传法教，由于圣教中所说的业手印缘起遭到破坏，而没过多久便前往其他刹土，《寂猛密意自解脱》，从第三代南卡秋吉嘉措开始广泛弘扬，在卫藏、后藏、康区，尤其是多康南北各地，灌顶、圣教引导传承等以及中阴闻解脱事业迄今为止仍旧在大多数地方十分兴盛。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "唐东嘉波依止五百多位善知识并闻受香派伏藏法", "participants": [{"entity": "唐东嘉波", "role": "弟子"}, {"entity": "根帮敦友嘉灿", "role": "上师"}, {"entity": "多吉云尼", "role": "上师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "唐东嘉波观世音菩萨与马头明王双重的化现、莲花生大士以胎生的方式出世的成就自在者唐东嘉波，第六胜生周木牛年出生在后藏哦瓦拉则地方，他依止了五百多位善知识进行不可估量的闻思，尽管他安住在自然大成就自在的境界中，但由于某种必要而于根帮敦友嘉灿前听受完整的香派伏藏法，在上师多吉云尼前听受香派法，也是在这两位上师前示现获得成就相，以禁行行为到达整个赡部洲及小洲，尤其去往吉祥妙拂莲花光刹土等，于莲花生大士等无量成就者前听闻法要，诸位空行护法顶戴其足。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "建寺", "title": "唐东嘉波在藏地建许多佛殿及五十八座铁桥", "participants": [{"entity": "唐东嘉波", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他在藏地抵制边军的要地建起许多佛殿，降伏所有凶神恶煞。他从桑耶青普取出《长寿修法赐无死吉祥》等五卷纸，从札巴江地方取出《意修无上最密》，从哲措莲花洲取出《窍诀珍宝藏》，从不丹巴卓达仓取出所有经续深要合而为一的十寻卷纸。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "唐东嘉波从桑耶青普等多处取出甚深伏藏", "participants": [{"entity": "唐东嘉波", "role": "伏藏师"}], "location": "桑耶青普", "time_info": "", "layers": ["史传"], "quote": "他从桑耶青普取出《长寿修法赐无死吉祥》等五卷纸，从札巴江地方取出《意修无上最密》，从哲措莲花洲取出《窍诀珍宝藏》，从不丹巴卓达仓取出所有经续深要合而为一的十寻卷纸。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "唐东嘉波创立藏戏", "participants": [{"entity": "唐东嘉波", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在那些时候，他为了劝勉人们行善而把往昔菩萨法王等传记编成歌舞表演，当代藏戏一直延续着，仅此也可看出，尊者令人见而有义的事业实在稀奇卓越。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圆寂", "title": "唐东嘉波一百二十五岁前往空行刹土", "participants": [{"entity": "唐东嘉波", "role": "主体"}, {"entity": "尼玛桑波", "role": "心子"}], "location": "", "time_info": "{'text': '一百二十五岁', 'relative_to': '唐东嘉波', 'absolute': None}", "layers": ["史传"], "quote": "最后在他一百二十五岁时，真身前往空行刹土之际，心子尼玛桑波唱起悲歌，于是他再度返回留下详细遗教，而示现前往吉祥山的瑞相。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "出家受戒", "title": "班玛旺嘉多吉八岁受居士戒", "participants": [{"entity": "班玛旺嘉多吉", "role": "受戒者"}, {"entity": "嘉扬仁钦嘉灿", "role": "父亲/上师"}], "location": "", "time_info": "{'text': '八岁', 'relative_to': '班玛旺嘉多吉', 'absolute': None}", "layers": ["史传"], "quote": "阿里大班智达班玛旺嘉多吉法王赤松德赞的意化身嘉哲拉吉的第九世——阿里大班智达班玛旺嘉多吉，第八胜生周火羊年，诞生于罗哦玛塘地方，父亲为玛尔巴尊者的最后转世拉种姓大智者成就者嘉扬仁钦嘉灿，母亲名为珠嘉措，为他取名班玛旺嘉。\n他八岁时受居士戒，在父亲面前发菩提心，并听受《经幻心》为主的前译教法，研学达到究竟，许多依修得到验相。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "班玛旺嘉多吉二十岁通达百部大论典", "participants": [{"entity": "班玛旺嘉多吉", "role": "主体"}], "location": "", "time_info": "{'text': '二十岁起', 'relative_to': '班玛旺嘉多吉', 'absolute': None}", "layers": ["史传"], "quote": "在诺丹桑波面前听闻律藏、经藏及噶当派法类等。他从二十岁起，通达中观、因明、般若为主的一百部大论典。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "闭关修行", "title": "班玛旺嘉多吉修红大威德见到威猛文殊", "participants": [{"entity": "班玛旺嘉多吉", "role": "修行者"}, {"entity": "嘉扬秋炯", "role": "上师"}, {"entity": "赤诚华", "role": "上师"}], "location": "", "time_info": "{'text': '二十一岁', 'relative_to': '班玛旺嘉多吉', 'absolute': None}", "layers": ["证境"], "quote": "被人们一致共称为名副其实的善知识。二十一岁在嘉扬秋炯和赤诚华等上师前恭听《红大威德》等能成熟的灌顶和能解脱的教言以后进行依修，结果直接见到威猛文殊尊颜。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "出家受戒", "title": "班玛旺嘉多吉二十五岁受比丘戒", "participants": [{"entity": "班玛旺嘉多吉", "role": "受戒者"}, {"entity": "罗哦大堪布索南棱珠", "role": "亲教师"}], "location": "桑哲朗佛学院", "time_info": "{'text': '二十五岁', 'relative_to': '班玛旺嘉多吉', 'absolute': None}", "layers": ["史传"], "quote": "二十五岁时在桑哲朗佛学院，文殊萨迦班智达的幻化罗哦大堪布、索南棱珠作为亲教师、轨范师而受比丘戒，从此开始，就守持头陀一垫禁行，完全依照正法戒律的要求如理实行，依此在当时成为一切持戒者的典范。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "班玛旺嘉多吉到卫藏恢复衰落法脉", "participants": [{"entity": "班玛旺嘉多吉", "role": "主体"}, {"entity": "勒单多吉", "role": "同行者"}], "location": "卫藏", "time_info": "{'text': '三十八岁以来', 'relative_to': '班玛旺嘉多吉', 'absolute': None}", "layers": ["史传"], "quote": "他从三十八岁以来，在普降新旧派无偏大法雨期间，发心在卫藏后藏使衰落的新旧派法脉恢复，得到父亲与罗哦的所有部落首领许\n可，途中由经桑桑拉札等地，与兄弟勒单多吉一起到了卫藏，朝拜大昭寺并得到授记。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "班玛旺嘉多吉在桑耶举行八大法行集善逝大修", "participants": [{"entity": "班玛旺嘉多吉", "role": "主体"}], "location": "桑耶寺", "time_info": "", "layers": ["史传"], "quote": "在拥哲扬地方，在鄂敦索南丹真和札塘巴的夏乐大译师面前听受鄂杰法和《红大威德》类等法要。他到达桑耶，明显苏醒了法王赤松德赞的习气，在中殿举行《八大法行·集善逝》大修，并摄受霍札革日等。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "班玛旺嘉多吉从桑耶上殿取出教集后持明总集之法类", "participants": [{"entity": "班玛旺嘉多吉", "role": "伏藏师"}], "location": "桑耶寺", "time_info": "{'text': '四十六岁', 'relative_to': '班玛旺嘉多吉', 'absolute': None}", "layers": ["史传"], "quote": "特别值得一提的是，关于取甚深伏藏的情形：尊者四十六岁从桑耶上殿的毗卢遮那四像背靠背的密箧内取出《教集后持明总集之法类七品祈祷修法》伏藏，大多数都抉择成文字，现今也十分兴盛。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "开光", "title": "班玛旺嘉多吉与仁真勒单及哲贡仁钦彭措重新对桑耶开光", "participants": [{"entity": "班玛旺嘉多吉", "role": "主体"}, {"entity": "仁真勒单", "role": "介绍者"}, {"entity": "哲贡仁钦彭措", "role": "迎请者"}], "location": "桑耶寺", "time_info": "", "layers": ["史传"], "quote": "特别值得一提的是，关于取甚深伏藏的情形：尊者四十六岁从桑耶上殿的毗卢遮那四像背靠背的密箧内取出《教集后持明总集之法类七品祈祷修法》伏藏，大多数都抉择成文字，现今也十分兴盛。经仁真勒单尊者作介绍，哲贡仁钦彭措迎请大师，师徒三人重新对桑耶作开光，成为藏区利乐的一大源泉。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圆寂", "title": "班玛旺嘉多吉五十六岁前往铜色吉祥山", "participants": [{"entity": "班玛旺嘉多吉", "role": "主体"}], "location": "温门塘", "time_info": "{'text': '五十六岁', 'relative_to': '班玛旺嘉多吉', 'absolute': None}", "layers": ["史传"], "quote": "经仁真勒单尊者作介绍，哲贡仁钦彭措迎请大师，师徒三人重新对桑耶作开光，成为藏区利乐的一大源泉。以此为例，他在卫藏行持了无量无边的弘法利生事业，最终五十六岁由温门塘前往铜色吉祥山。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "出家受戒", "title": "列楚朗巴在法王麦彭札西罗珠前出家", "participants": [{"entity": "列楚朗巴", "role": "受戒者"}, {"entity": "法王麦彭札西罗珠", "role": "上师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他以强烈的出离心和厌离心激励相续，一门心思放在妙法上，发现轮回的一切地方、伴侣犹如火坑以后，逃到法王麦彭札西罗珠面前。当时法王梦到，莲花生大士所造的一座旧佛塔，一些女子请来后说需要他重新开光，他在进行开光时看到光芒闪烁。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "出家受戒", "title": "列楚朗巴在拉则瓦前受近圆戒", "participants": [{"entity": "列楚朗巴", "role": "受戒者"}, {"entity": "拉则瓦", "role": "戒师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "另外，在扬仲诺吾坚巴、哲巴塔坚钦巴、无等拉则瓦等面前对于显密新旧派所有法教似乎无不听受。尤其是在拉则瓦上师前受近圆戒，以真正的比丘身份来修行。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "闭关修行", "title": "列楚朗巴泥封修行十七年", "participants": [{"entity": "列楚朗巴", "role": "修行者"}], "location": "", "time_info": "{'text': '十七年', 'relative_to': '列楚朗巴', 'absolute': None}", "layers": ["史传"], "quote": "尤其是在拉则瓦上师前受近圆戒，以真正的比丘身份来修行。十七年中始终泥封修行，之后在树立修行胜幢时，尽管伏藏的许多授记几番出现，但他却置之度外。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "列楚朗巴首次取伏藏从铁大鹏鸟内取出伏藏标题", "participants": [{"entity": "列楚朗巴", "role": "伏藏师"}, {"entity": "法王麦彭札西罗珠", "role": "劝请者"}], "location": "", "time_info": "{'text': '铁猴年一月初十', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "当金刚手心咒念诵达到一亿之时，再度得到授记，并且经法王仁波切麦彭札西罗珠劝请，于铁猴年一月初十，第一次取伏藏之际，从雏鸟大小的铁合金大鹏鸟内取出伏藏的标题，得到益西措嘉的手稿。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "列楚朗巴秘密取出最深三宝总集等", "participants": [{"entity": "列楚朗巴", "role": "伏藏师"}], "location": "札龙霍察", "time_info": "", "layers": ["史传"], "quote": "当金刚手心咒念诵达到一亿之时，再度得到授记，并且经法王仁波切麦彭札西罗珠劝请，于铁猴年一月初十，第一次取伏藏之际，从雏鸟大小的铁合金大鹏鸟内取出伏藏的标题，得到益西措嘉的手稿。从札龙霍察铁门中秘密取出《最深三宝总集》等伏藏，之后修行伏藏，保密状况十分圆满。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "列楚朗巴从多处取出大悲观音等甚深伏藏", "participants": [{"entity": "列楚朗巴", "role": "伏藏师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "自此以后，他逐渐从贡波哦切、香创则均巴龙的伏藏门、尼木神山、贡仓格敦内、哦热夏殿堂等处，取出《大悲观音》、《马头明王如意宝》、《寂猛了义藏》、《长寿修法天铁金刚》、《莲师猛修》、《吉祥怙主玛囊》类、《莲花庄严刹土志》等许多甚深伏藏品。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "列楚朗巴在尼木神山取伏藏时大显神变", "participants": [{"entity": "列楚朗巴", "role": "主体"}, {"entity": "贡波札德瓦", "role": "阻碍者"}], "location": "尼木神山", "time_info": "", "layers": ["神变"], "quote": "特别是在取尼木神山的伏藏时，贡波札德瓦等有邪念者担心有损地力，于是动用军队保护伏藏地点。伏藏师情绪高昂，骑马驶到只有飞禽才能到的如镜面般光滑的悬崖峭壁，在岩石表面留下了坐骑的足迹。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "列楚朗巴将深法甘露恩赐刚波侍从活佛等众多弟子", "participants": [{"entity": "列楚朗巴", "role": "传法者"}, {"entity": "刚波侍从活佛诺吾坚巴", "role": "第一法主"}, {"entity": "嘉察札巴敦哲", "role": "弟子"}, {"entity": "哲贡秋杰札巴", "role": "弟子"}, {"entity": "多札仁真阿革旺波", "role": "弟子"}, {"entity": "密主陈列棱珠", "role": "弟子"}, {"entity": "德格哲土根嘎嘉措", "role": "弟子"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "自从第一位法主——刚波侍从活佛诺吾坚巴开启事业之门以来，从卫藏、后藏、康区广泛聚集了红黑帽噶玛巴、嘉察札巴敦哲、哲贡秋杰札巴、哲巴华桑旺波、多札仁真阿革旺波、则勒那凑让珠、拉尊南卡晋美、持明陈列棱珠、甘珠瓦滚波索南秋单、布哦巴卡活佛仁真秋杰嘉措、德格哲土根嘎嘉措、伏藏大师降魔金刚、达喇班玛玛德等，对他们恩赐完整的深法甘露，为事业遍及各方创造了缘起。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圆寂", "title": "列楚朗巴七十二岁示现前往大净土", "participants": [{"entity": "列楚朗巴", "role": "主体"}], "location": "旺热玖波", "time_info": "{'text': '七十二岁', 'relative_to': '列楚朗巴', 'absolute': None}", "layers": ["史传"], "quote": "自从第一位法主——刚波侍从活佛诺吾坚巴开启事业之门以来，从卫藏、后藏、康区广泛聚集了红黑帽噶玛巴、嘉察札巴敦哲、哲贡秋杰札巴、哲巴华桑旺波、多札仁真阿革旺波、则勒那凑让珠、拉尊南卡晋美、持明陈列棱珠、甘珠瓦滚波索南秋单、布哦巴卡活佛仁真秋杰嘉措、德格哲土根嘎嘉措、伏藏大师降魔金刚、达喇班玛玛德等，对他们恩赐完整的深法甘露，为事业遍及各方创造了缘起。这位伏藏大师如此事业究竟，在七十二岁，于旺热玖波，公开显现验相和神变、神通，示现前往大净土之相。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "敦珠多吉在德格哲土根嘎嘉措面前供养发心取名", "participants": [{"entity": "敦珠林巴", "role": "弟子"}, {"entity": "德格哲土根嘎嘉措", "role": "上师"}], "location": "棱珠", "time_info": "", "layers": ["史传"], "quote": "从小便住在棱珠上方的佛学院。在持明鹫翎尊者的化身德格哲土根嘎嘉措面前供养发新 101 ，取名为根嘎索南秋帕。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "敦珠多吉在真巴滚秋嘉灿面前听受大圆满后恍然大悟", "participants": [{"entity": "敦珠林巴", "role": "弟子"}, {"entity": "真巴滚秋嘉灿", "role": "上师"}], "location": "莫桑", "time_info": "", "layers": ["史传"], "quote": "在对吉祥萨迦派论典不同程度研学闻思期间，希求精华智慧义如饥似渴，到了莫桑的修行地，在真巴滚秋嘉灿面前听受大圆满等许多深法，并且实地修行，结果恍然大悟。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "闭关修行", "title": "敦珠多吉在白岩修行风脉明点瑜伽", "participants": [{"entity": "敦珠林巴", "role": "修行者"}, {"entity": "酿波大成就者札西才单", "role": "上师"}], "location": "白岩", "time_info": "", "layers": ["史传"], "quote": "之后他到了卫藏，拜见酿波大成就者札西才单，恭听众多能成熟之灌顶、能解脱之教言。在白岩神河断除饮食，只是依摄生术，修行深道风脉明点瑜伽达到究竟。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "敦珠多吉在大持明者嘉村酿波面前闻受伏藏法", "participants": [{"entity": "敦珠林巴", "role": "弟子"}, {"entity": "列楚朗巴", "role": "上师"}], "location": "旺热", "time_info": "", "layers": ["史传"], "quote": "以初入佛门的缘起来到后藏门地，也听受了道果等法要。后来返回时在旺热依止大持明者嘉村酿波，圆满闻受尊者的甚深伏藏为主的诸多灌顶、引导及窍诀。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "敦珠多吉二十九岁开始取出甚深伏藏", "participants": [{"entity": "敦珠林巴", "role": "伏藏师"}], "location": "布哦东切大乐密洞", "time_info": "{'text': '二十九岁', 'relative_to': '敦珠多吉', 'absolute': None}", "layers": ["史传"], "quote": "根据甚深伏藏之初标题到手，他二十九岁，依止具种姓的班玛杰业手印，从璁玉湖宝岩处取出伏藏标题，从布哦东切大乐密洞里开取《妙法密意总集诸门》，这是甚深伏藏的主要部分，后来所取的所有伏藏是它的支分。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "敦珠多吉从多处取出各种伏藏品", "participants": [{"entity": "敦珠林巴", "role": "伏藏师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "根据甚深伏藏之初标题到手，他二十九岁，依止具种姓的班玛杰业手印，从璁玉湖宝岩处取出伏藏标题，从布哦东切大乐密洞里开取《妙法密意总集诸门》，这是甚深伏藏的主要部分，后来所取的所有伏藏是它的支分。自此之后，他逐渐从察瓦卓岩处开取《妙法化身心滴》及护法类。从布热达堡山洞里取出《深义秘密心滴吉祥胜乐》、四臂护法类。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "敦珠多吉在一百个伏藏地点取出千个享解脱", "participants": [{"entity": "敦珠林巴", "role": "伏藏师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "和上述的所有伏藏一同还取出了不可思议的佛像、标帜、圣物类。总之，在一百个伏藏地点，取出一千个享解脱等，按照授记中所说，基本上都已取出。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "建寺", "title": "敦珠多吉应邀建起敦珠寺", "participants": [{"entity": "敦珠林巴", "role": "主体"}, {"entity": "香巴彭措", "role": "迎请者"}], "location": "敦珠寺", "time_info": "{'text': '四十二岁', 'relative_to': '敦珠多吉', 'absolute': None}", "layers": ["史传"], "quote": "总之，在一百个伏藏地点，取出一千个享解脱等，按照授记中所说，基本上都已取出。\n他在四十二岁时应德格上师香巴彭措叔侄迎请，建起尊者前世驻锡的敦珠寺以后，成办有利教、政的大业。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "建寺", "title": "前人在布多得钦塘和耶热刚古建起寺院", "participants": [{"entity": "南秋莫杰多吉", "role": "在场者"}], "location": "布多得钦塘", "time_info": "", "layers": ["史传"], "quote": "在布多得钦塘和耶热刚古处建起寺院，长期安住那里。他打开隐境莲花庄严刹土后，直接的事业臻至究竟，在五十八岁水鼠年前往莲花光大宫殿时，显现传出声音、出现光芒、天降花雨等无量稀有神变。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圆寂", "title": "前人五十八岁水鼠年前往莲花光大宫殿", "participants": [], "location": "莲花光大刹土", "time_info": "{'text': '五十八岁水鼠年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "他打开隐境莲花庄严刹土后，直接的事业臻至究竟，在五十八岁水鼠年前往莲花光大宫殿时，显现传出声音、出现光芒、天降花雨等无量稀有神变。特别是其法体大部分化为光，对剩下的一肘左右法体进行火化，结果五大金刚舍利和舍利子成堆。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "出家受戒", "title": "南卡晋美在松年深山于邬金华玖活佛面前出家", "participants": [{"entity": "拉尊南卡晋美", "role": "受戒者"}, {"entity": "邬金华玖活佛", "role": "亲教师"}], "location": "松年深山", "time_info": "", "layers": ["史传"], "quote": "后来他在松年深山于邬金华玖活佛面前出家，法名为根桑南嘉。最初在塘卓僧团进行不同程度的闻思，逐渐在诸多金刚持上师面前听\n受了经教密意等许多甚深教藏、伏藏、教授的成熟解脱法要，本尊的依修到量而自然通达悉地事业。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "南卡晋美依止竹青索南旺波十七年完整恭听心滴教授", "participants": [{"entity": "拉尊南卡晋美", "role": "受者"}, {"entity": "竹青索南旺波", "role": "传法者"}], "location": "", "time_info": "{'text': '十七年期间', 'relative_to': '南卡晋美', 'absolute': None}", "layers": ["史传"], "quote": "特别是在十七年期间依止竹青索南旺波，完整恭听心滴教授类，加以实修从而获得证悟的境界。为了增进境界，又在阿旺莫玖多吉面前听受贪欲道的所有窍诀后，具足自身方便，修炼她身手印瑜伽空乐智慧妙力，结果四喜执著融入本地，一切显现、声音成熟为俱生喜光明。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "南卡晋美在阿旺莫玖多吉面前听受贪欲道窍诀", "participants": [{"entity": "拉尊南卡晋美", "role": "受者"}, {"entity": "阿旺莫玖多吉", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "为了增进境界，又在阿旺莫玖多吉面前听受贪欲道的所有窍诀后，具足自身方便，修炼她身手印瑜伽空乐智慧妙力，结果四喜执著融入本地，一切显现、声音成熟为俱生喜光明。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "降伏非人", "title": "南卡晋美使藏地所有鬼神作为助伴并修复桑耶寺", "participants": [{"entity": "拉尊南卡晋美", "role": "降伏者"}], "location": "桑耶寺", "time_info": "", "layers": ["神变"], "quote": "尊者在印度调伏外道国王后令他们皈入佛门，在藏地使所有鬼神作为助伴而修复了毁坏的桑耶寺。在匝热神山，眼看大山要坍塌，尊者以看式和契克印加以制止，诸如此类不可思议的神变完全运用自如。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "南卡晋美在匝热神山制止大山坍塌", "participants": [{"entity": "拉尊南卡晋美", "role": "主体"}], "location": "匝热神山", "time_info": "", "layers": ["神变"], "quote": "尊者在印度调伏外道国王后令他们皈入佛门，在藏地使所有鬼神作为助伴而修复了毁坏的桑耶寺。在匝热神山，眼看大山要坍塌，尊者以看式和契克印加以制止，诸如此类不可思议的神变完全运用自如。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "南卡晋美五十岁于哲秀神山打开伏藏门建起寺院", "participants": [{"entity": "拉尊南卡晋美", "role": "伏藏师"}], "location": "哲秀神山", "time_info": "{'text': '五十岁火狗年', 'relative_to': '南卡晋美', 'absolute': None}", "layers": ["史传"], "quote": "尊者到了五十岁火狗年，亲临哲秀神山哦色酿波，打开伏藏门，按照授记建起寺院和修行道场。在札嘎札西当依照空行授记住在札革酿山洞，期间，阿底无上心滴不共教授《持明命修》法在清净境界中浮现出来，加以抉择，并将能成熟、能解脱的甘露恩赐给所有具缘者。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "南卡晋美于札嘎札西当清净境界中浮现《持明命修》", "participants": [{"entity": "拉尊南卡晋美", "role": "伏藏师"}], "location": "札嘎札西当", "time_info": "", "layers": ["证境"], "quote": "在札嘎札西当依照空行授记住在札革酿山洞，期间，阿底无上心滴不共教授《持明命修》法在清净境界中浮现出来，加以抉择，并将能成熟、能解脱的甘露恩赐给所有具缘者。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圆寂", "title": "南卡晋美据说禁行达到究竟而无余圆寂", "participants": [{"entity": "拉尊南卡晋美", "role": "主体"}], "location": "", "time_info": "", "layers": ["传闻"], "quote": "后来，据说禁行行为达到究竟的这位成就者无余而圆寂。《深法持明命修》和《金刚藏妙云道歌》的灌顶、传\n承、窍诀的法脉迄今为止经久未衰而保留着，法传承的事业在藏区多数地方，尤其是在隐境锡金颇为兴盛。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "灌顶", "title": "香瓦仁真阿革旺波赐予五世达赖喇嘛《长寿帷幕》灌顶", "participants": [{"entity": "第五世达赖喇嘛", "role": "受者"}, {"entity": "香瓦仁真阿革旺波", "role": "传法者"}], "location": "", "time_info": "{'text': '降生那一年', 'relative_to': '第五世达赖喇嘛', 'absolute': None}", "layers": ["史传"], "quote": "第五世达赖喇嘛密名多吉土美匝法王赤松德赞的事业幻化、诸多新旧派伏藏品中予以授记、雪域怙主观世音菩萨的大悲自相、密名为多吉土美匝的第五世达赖喇嘛，出生于雄吉达则的萨霍王族中，父亲是国王敦珠绕丹，母亲是雅卓万户长官之女根嘎拉则，第十胜生周火蛇年，伴随着稀有的相兆诞生于世。在降生的那一年，香瓦仁真阿革旺波赐予《长寿帷幕》的灌顶以消灾免难，这就成了最初的吉兆。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "授记", "title": "班禅大师认定五世达赖为嘉瓦云丹嘉措转世", "participants": [{"entity": "罗桑秋杰嘉村", "role": "认定者"}, {"entity": "第五世达赖喇嘛", "role": "转世灵童"}, {"entity": "嘉瓦云丹嘉措", "role": "前世"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在降生的那一年，香瓦仁真阿革旺波赐予《长寿帷幕》的灌顶以消灾免难，这就成了最初的吉兆。大班智达罗桑秋杰嘉村（即班禅大师）认定他为嘉瓦云丹嘉措的转世灵童后被迎请到哲蚌寺，出家名为罗桑嘉措并坐床。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "出家受戒", "title": "五世达赖喇嘛出家坐床", "participants": [{"entity": "第五世达赖喇嘛", "role": "受戒者"}], "location": "哲蚌寺", "time_info": "", "layers": ["史传"], "quote": "大班智达罗桑秋杰嘉村（即班禅大师）认定他为嘉瓦云丹嘉措的转世灵童后被迎请到哲蚌寺，出家名为罗桑嘉措并坐床。在大阿阇黎授记鄂译师的幻化朗曼巴滚乔秋佩面前，从《因明摄类学》开始潜心研学诸大论典，毫不费力而通达。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "五世达赖在班禅大师面前听受众多灌顶传承窍诀", "participants": [{"entity": "第五世达赖喇嘛", "role": "受者"}, {"entity": "罗桑秋杰嘉村", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在班禅大师面前听受众多灌顶、传承和窍诀。在敏珠班智达父子面前听受诗学、声明、声律、词藻学等，在德波瓦和大宿面前听受黑白历算、元音数术等无量学问，成为洞悉十明的大班智达。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "出家受戒", "title": "五世达赖二十二岁在班禅大师戒传承中受近圆戒", "participants": [{"entity": "第五世达赖喇嘛", "role": "受戒者"}, {"entity": "罗桑秋杰嘉村", "role": "亲教师"}], "location": "", "time_info": "{'text': '二十二岁', 'relative_to': '第五世达赖喇嘛', 'absolute': None}", "layers": ["史传"], "quote": "二十二岁，在班禅大师的戒传承中受近圆戒，重新复加法名为阿革旺修。依止了帕翁卡巴昆敦华玖棱珠、夏乐索南秋哲、大宿·秋扬让珠、曼龙瓦罗秋多吉、法王德达朗巴等数位智者成就者的殊胜持教大德。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "执政", "title": "蒙古王革西日丹真秋嘉以兵力收复西藏供养五世达赖", "participants": [{"entity": "革西日丹真秋嘉", "role": "施主"}, {"entity": "第五世达赖喇嘛", "role": "受供者"}], "location": "西藏", "time_info": "{'text': '二十五岁', 'relative_to': '第五世达赖喇嘛', 'absolute': None}", "layers": ["史传"], "quote": "他为法王德达朗巴、持明班玛陈列等受持前译自宗为主的殊胜僧众，完整恩授能成熟之灌顶与能解脱之教言，出现了极其鼎盛的局面，至今传承一直经久未衰。从政治方面来讲，在他二十五岁时，蒙古王革西日丹真秋嘉以兵力收复西藏三区 102 之后全盘供养。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "迎请", "title": "东方皇帝迎请五世达赖到北京敬为帝师", "participants": [{"entity": "第五世达赖喇嘛", "role": "受迎请者"}], "location": "北京", "time_info": "", "layers": ["史传"], "quote": "其后，东方皇帝将五世达赖喇嘛迎请到北京，献上写有“教主金刚持达赖喇嘛国师”金字的诏书等，敬为帝师或阿阇黎，结成师徒的关系。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "建寺", "title": "五世达赖在布达拉山上兴建大布达拉宫", "participants": [{"entity": "第五世达赖喇嘛", "role": "建造者"}], "location": "布达拉宫", "time_info": "", "layers": ["史传"], "quote": "其后，东方皇帝将五世达赖喇嘛迎请到北京，献上写有“教主金刚持达赖喇嘛国师”金字的诏书等，敬为帝师或阿阇黎，结成师徒的关系。他在布达拉山上兴建起大布达拉宫。依照无欺金刚语所说：在浊世，圣者观自在与文殊赤松德赞以持戒之王的身份治理西藏。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "五世达赖创立与敏朗伏藏大师法主施主缘起", "participants": [{"entity": "第五世达赖喇嘛", "role": "施主"}, {"entity": "敏朗伏藏大师", "role": "法主"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尤其按照授记，善妙创立起与敏朗伏藏大师之间法主与施主的缘起，奠定了西藏政治长存的根本。\n他这样的三轮功迹、内外密的传记、不可思议的事业究竟以后，在六十六岁水狗年三月二十五日，依靠未来自在事业的缘起，入定于作明佛母等持而在布达拉宫安享圆寂。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圆寂", "title": "五世达赖六十六岁水狗年于布达拉宫圆寂", "participants": [{"entity": "第五世达赖喇嘛", "role": "主体"}], "location": "布达拉宫", "time_info": "{'text': '六十六岁水狗年三月二十五日', 'relative_to': '第五世达赖喇嘛', 'absolute': None}", "layers": ["史传"], "quote": "他这样的三轮功迹、内外密的传记、不可思议的事业究竟以后，在六十六岁水狗年三月二十五日，依靠未来自在事业的缘起，入定于作明佛母等持而在布达拉宫安享圆寂。圆寂后立即转世到敏班玛朗的家族中，从持明仓扬嘉措迄今为止始终作为大地上圆满佛法的君主，依次转世到第十四世之间，为整个世界众所周知。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "灌顶", "title": "德达朗巴四岁在父亲面前听受八大法行灌顶", "participants": [{"entity": "德达朗巴", "role": "受者"}, {"entity": "纽敦桑达陈列棱珠", "role": "传法者"}], "location": "", "time_info": "{'text': '四岁之初', 'relative_to': '德达朗巴', 'absolute': None}", "layers": ["史传"], "quote": "四岁之初，他在父亲面前听受八大法行秘密圆满的灌顶时，所有对境显现以坛城轮印持，结果照见主尊与上师无二无别，并且相续中播下了四灌顶的种子。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "灌顶", "title": "德达朗巴十岁听闻《集善逝续》灌顶时莲师显现", "participants": [{"entity": "德达朗巴", "role": "受者"}, {"entity": "莲花生大士", "role": "加持者"}], "location": "", "time_info": "{'text': '十岁木羊年初秋', 'relative_to': '德达朗巴', 'absolute': None}", "layers": ["证境"], "quote": "四岁之初，他在父亲面前听受八大法行秘密圆满的灌顶时，所有对境显现以坛城轮印持，结果照见主尊与上师无二无别，并且相续中播下了四灌顶的种子。十岁木羊年初秋听闻《集善逝续》灌顶时，在光明境界中，莲花生大士予以灌顶并使加持力增长，宝瓶灌顶的体验将境相抉择为如幻。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "德达朗巴十一岁于哲蚌寺礼见五世达赖", "participants": [{"entity": "德达朗巴", "role": "受者"}, {"entity": "第五世达赖喇嘛", "role": "传法者"}], "location": "哲蚌寺", "time_info": "{'text': '十一岁', 'relative_to': '德达朗巴', 'absolute': None}", "layers": ["史传"], "quote": "十一岁，在吉祥哲蚌寺 104 ，于全知第五世达赖喇嘛面前供养发新，给他取名为阿旺班玛丹真，并欢喜地说：“与吉隆的天然观音 105初到此处时间巧合，因此缘起很好。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "天然观音像面带微笑心间放光融入德达朗巴", "participants": [{"entity": "天然观音像", "role": "主体"}, {"entity": "德达朗巴", "role": "受益者"}], "location": "哲蚌寺", "time_info": "{'text': '十一岁', 'relative_to': '德达朗巴', 'absolute': None}", "layers": ["神变"], "quote": "当时，观音像面带微笑，神态鲜明，心间放光融入他身体。十七岁时，到桑耶寺拜见至尊第五世达赖喇嘛时，见到上师就是观世音菩萨的形象。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "德达朗巴在达敦秋嘉丹真和班玛陈列面前听受密集续灌顶等", "participants": [{"entity": "德达朗巴", "role": "受者"}, {"entity": "达敦秋嘉丹真", "role": "传法者"}, {"entity": "持明班玛陈列", "role": "传法者"}], "location": "多吉札", "time_info": "", "layers": ["史传"], "quote": "在达敦秋嘉丹真面前，《密集续灌顶仪轨——珍宝鬘》上面分成四十五坛城，其中圆满四法流灌顶、交付印持及长寿法的灌顶、教言、讲解和传承。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "德达朗巴十八岁从雅玛隆取出《持明心滴》", "participants": [{"entity": "德达朗巴", "role": "伏藏师"}], "location": "雅玛隆", "time_info": "{'text': '十八岁水兔年五月初十', 'relative_to': '德达朗巴', 'absolute': None}", "layers": ["史传"], "quote": "由于苏醒宿愿而秉持甚深伏藏的传承情形：在他十八岁水兔年五月初十那一天，从雅玛隆取出《持明心滴》。二十二岁火羊年八月初八，依靠神变从水晶岩取出《大威德》。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "德达朗巴二十二岁从水晶岩取出《大威德》", "participants": [{"entity": "德达朗巴", "role": "伏藏师"}], "location": "水晶岩", "time_info": "{'text': '二十二岁火羊年八月初八', 'relative_to': '德达朗巴', 'absolute': None}", "layers": ["史传"], "quote": "二十二岁火羊年八月初八，依靠神变从水晶岩取出《大威德》。三十一岁火龙年虎月（正月）十五，从嗡呷岩取出帷幕《猛修》和《金刚萨埵阿底》类。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "德达朗巴三十一岁从嗡呷岩取出帷幕《猛修》和《金刚萨埵阿底》", "participants": [{"entity": "德达朗巴", "role": "伏藏师"}], "location": "嗡呷岩", "time_info": "{'text': '三十一岁火龙年虎月十五', 'relative_to': '德达朗巴', 'absolute': None}", "layers": ["史传"], "quote": "三十一岁火龙年虎月（正月）十五，从嗡呷岩取出帷幕《猛修》和《金刚萨埵阿底》类。三十五岁铁猴年五月二十九日，从夏哦达门当众公开取出《大悲善逝总集》法门，开取了众多伏藏。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "德达朗巴三十五岁从夏哦达门当众公开取出《大悲善逝总集》", "participants": [{"entity": "德达朗巴", "role": "伏藏师"}], "location": "夏哦达门当", "time_info": "{'text': '三十五岁铁猴年五月二十九日', 'relative_to': '德达朗巴', 'absolute': None}", "layers": ["史传"], "quote": "三十一岁火龙年虎月（正月）十五，从嗡呷岩取出帷幕《猛修》和《金刚萨埵阿底》类。三十五岁铁猴年五月二十九日，从夏哦达门当众公开取出《大悲善逝总集》法门，开取了众多伏藏。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "闭关修行", "title": "德达朗巴在多处圣地闭关修行次第取出三十五位本尊依修法", "participants": [{"entity": "德达朗巴", "role": "修行者"}], "location": "红岩青普", "time_info": "", "layers": ["史传"], "quote": "并且在这些前后也在红岩青普、雅玛隆等成就奇妙的圣地以及新旧派寺院的寝室、茅棚光明顶和禅定顶等诸寂静处，闭关六个月、三个月、一个月，次第取出寂猛上师（即莲师）、金刚萨埵、八大法行、大悲观音、金刚橛、大威德、马头明王、空行等三十五位本尊的依修法以及大圆满直断实修，将这些核心概括以后，顿超和修风等也结合时间要点加以实修，从而不清净相泯灭，生起次第得以稳固，无碍成办四事业。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "德达朗巴讲经说法事业——五世达赖等拜其为国师", "participants": [{"entity": "德达朗巴", "role": "传法者"}, {"entity": "第五世达赖喇嘛", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "其中，讲经说法的事业：主要是第五世达赖喇嘛在他面前听受了前译续全集宝为主深广法门而拜其为国师。以此为例，对于萨迦派、帕竹噶举、哲贡噶举、达隆噶举等身居高位的许多大德和大官员、首\n领等大人物、众多开显佛法的善知识的身子兄弟们以及语子尊者为主，从卫藏后藏康区贡布、蒙古、不丹、阿里等以信心聚集的无量上下各层有缘者，连续不断地恩赐相应他们各自智慧的前译教藏伏藏及新密经部等的灌顶、引导、讲解、传承的诸多法门，以无与伦比的讲经说法事业弘扬光大佛法。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "恢复佛教", "title": "德达朗巴使衰落的前译宁玛教法从根本上恢复", "participants": [{"entity": "德达朗巴", "role": "复法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "特别是，在赤松德赞应供和施主的功迹、前译宁玛《经幻心》为主自宗殊胜的讲修如油尽之灯濒临绝境之际，他以毫无怯懦的魄力、最大的努力百般寻觅，通过讲修事业使衰落的佛法从根本上得以恢复。\n依靠这位举足轻重的至尊大师及兄弟、家族的恩德，才使密宗宁玛派名副其实无有错误堪为正量的传承留传迄今一直经久未衰，方兴未艾。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圆寂", "title": "德达朗巴六十九岁木马年圆寂", "participants": [{"entity": "德达朗巴", "role": "主体"}], "location": "", "time_info": "{'text': '六十九岁木马年霍尔月', 'relative_to': '德达朗巴', 'absolute': None}", "layers": ["史传"], "quote": "第二个霍尔月初二上午，尊者说要向东方迈七步，于是站起身移动七步，最后跏趺而坐，口中以留遗嘱的方\n式说道：“现声识尊咒法身，身与智慧无边舞，深密大瑜伽士修，无别一味意明点。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "德达朗巴圆寂前向东方迈七步口述遗偈", "participants": [{"entity": "德达朗巴", "role": "主体"}], "location": "", "time_info": "{'text': '第二个霍尔月初二上午', 'relative_to': None, 'absolute': None}", "layers": ["神变"], "quote": "第二个霍尔月初二上午，尊者说要向东方迈七步，于是站起身移动七步，最后跏趺而坐，口中以留遗嘱的方\n式说道：“现声识尊咒法身，身与智慧无边舞，深密大瑜伽士修，无别一味意明点。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "出家受戒", "title": "全知晋美朗巴在益西措嘉化身前出家", "participants": [{"entity": "全知晋美朗巴", "role": "受戒者"}, {"entity": "阿旺罗桑班玛", "role": "亲教师"}], "location": "吉祥山寺", "time_info": "{'text': '六岁', 'relative_to': '全知晋美朗巴', 'absolute': None}", "layers": ["史传"], "quote": "六岁就进入至尊札匝绕莫讲、修、事业的吉祥山佛学院，在益西措嘉化身阿旺罗桑班玛前出家，取名为班玛钦哲哦色。后来在阿旺根嘎勒巴炯尼面前也重新受了沙弥戒。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "全知晋美朗巴十三岁礼见持明特秋多吉", "participants": [{"entity": "全知晋美朗巴", "role": "受者"}, {"entity": "持明特秋多吉", "role": "传法者"}], "location": "", "time_info": "{'text': '十三岁', 'relative_to': '全知晋美朗巴', 'absolute': None}", "layers": ["史传"], "quote": "从上座根桑哦色前得受《解脱顶》和《上师集密意续》的灌顶、传承。尤其是在十三岁，礼见持明特秋多吉以后，听受大手印智慧见解脱等，最初相续得以成熟，因此把他当作自己的一位殊胜根本上师。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "闭关修行", "title": "全知晋美朗巴二十八岁起在吉祥山闭关三年", "participants": [{"entity": "全知晋美朗巴", "role": "修行者"}], "location": "吉祥山寺", "time_info": "{'text': '二十八岁火牛年神变月起三年', 'relative_to': '全知晋美朗巴', 'absolute': None}", "layers": ["史传"], "quote": "二十八岁，从火牛年神变月开始，他就在自己的寺院吉祥山唯一明点禅房严格闭关三年，主要按照伏藏大师西绕哦色的甚深伏藏《解脱顶密意自解脱》远传及近传之方式的传承，唯一实修其中的生起次第和圆满次第，结果获得了殊胜的暖相。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "全知晋美朗巴修上师集密意续依修时头顶发出马鸣声获莲师赐名", "participants": [{"entity": "全知晋美朗巴", "role": "主体"}, {"entity": "莲花生大士", "role": "赐名者"}], "location": "吉祥山寺", "time_info": "", "layers": ["证境"], "quote": "修持《上师集密意续》的依修时，从头顶发出马鸣声，邬金莲花生大士赐予吉祥班玛旺钦的美名冠冕。通过阿阇黎蒋花西宁亲自加持的威德力，如实领受能表示的喻智慧，从而护持黑日嘎的威严大禁行。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "全知晋美朗巴在夏绒卡秀佛塔光明境界中得大圆满大界心滴法藏", "participants": [{"entity": "全知晋美朗巴", "role": "伏藏师"}], "location": "夏绒卡秀佛塔", "time_info": "", "layers": ["证境"], "quote": "尤其是，他于光明境界中在尼泊尔夏绒卡秀佛塔前，依靠法身智慧空行母赐予空行表示，大圆满大界心滴众所周知的大法藏，都运用自如等等，达到了高深的成就果位。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "闭关修行", "title": "全知晋美朗巴到桑耶青普大密花山洞苦行三年", "participants": [{"entity": "全知晋美朗巴", "role": "修行者"}], "location": "桑耶青普", "time_info": "{'text': '三年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "然而，他并没有以此为满足，在那个地方安住三年后到了桑耶青普，在大密花山洞，以极度的苦行再度一心专注修行精华义三年。期间，总的来说，有无量无边的清净所见，尤其是三次见到全知法王龙钦绕降吉祥贤的智慧身，得到身语意的直接加持，并且获得恩赐言教，依此而现见圣道义智慧大圆满的真谛。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "全知晋美朗巴三次见到无垢光尊者智慧身得加持", "participants": [{"entity": "全知晋美朗巴", "role": "受者"}, {"entity": "无垢光尊者", "role": "加持者"}], "location": "桑耶青普", "time_info": "", "layers": ["证境"], "quote": "期间，总的来说，有无量无边的清净所见，尤其是三次见到全知法王龙钦绕降吉祥贤的智慧身，得到身语意的直接加持，并且获得恩赐言教，依此而现见圣道义智慧大圆满的真谛。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "全知晋美朗巴首次为十五位弟子开启广大意伏藏成熟解脱之门", "participants": [{"entity": "全知晋美朗巴", "role": "传法者"}], "location": "桑耶青普", "time_info": "", "layers": ["史传"], "quote": "在那里，他首次为具有缘分的十五位弟子开启广大意伏藏的成熟解脱之门，自此开始，甚深义源源不断，因此成为大圆满心滴的一位祖师。三年的誓言究竟圆满以后，现前了秋杰旺修仁波切的甚深伏藏《卡热问答》中所说“我幻行利穹结内，不知是谁顿时说，钦瓦多或旺索南，降天塔寺复兴建”的金刚教真义。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "建寺", "title": "全知晋美朗巴在贡革深山重新建造寺院", "participants": [{"entity": "全知晋美朗巴", "role": "建造者"}], "location": "长寿域", "time_info": "", "layers": ["史传"], "quote": "并且，依靠列乐那凑让珠的智\n慧身亲自交付密意、宣说表示方法等众多因缘缘起而返回自地，在穹结松赞旺索的南方贡革深山敦喀山谷、吉祥长寿域莲花光明胜乘洲的山间重新建造寺院佛像等后，在有生之年，以舍事隐蔽的瑜伽士形象一直安住。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "全知晋美朗巴出资将前译续全集二十五函重新书写", "participants": [{"entity": "全知晋美朗巴", "role": "出资者"}], "location": "敏朗", "time_info": "", "layers": ["史传"], "quote": "对此，尊者实在于心不忍，于是由他出资，将敏朗保存下来的宁玛续珍宝的完整法本，开头五页用珍宝书写，其余以普通书写，共有二十五函。在这之前，还不曾有谁著过有关这方面的目录及依推理证成的广史，这位至尊与三相推理关联的深广辩才，造了《前译续全集珍宝史——周遍世界之庄严》，凭借教理的善妙之光从根本上驱散染污宗派的邪分别与怀疑黑暗。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圆寂", "title": "全知晋美朗巴七十岁土马年圆寂", "participants": [{"entity": "全知晋美朗巴", "role": "主体"}], "location": "长寿域", "time_info": "{'text': '七十岁土马年九月初三', 'relative_to': '全知晋美朗巴', 'absolute': None}", "layers": ["史传"], "quote": "尊者这样的讲经说法、实地修持、广行善举的三轮事业究竟以后，在七十岁土马年九月初三，于自处长寿域的最寂静处解脱顶峰莲花光大刹土，伴随着瑞相和神变而前往净土。按照提前详细赐予遗教的稀有金刚句，所有后事由侄子哦色陈列等处理，完成其广大遗愿。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "德钦月波朗巴十三岁时莲师亲自降临并授记", "participants": [{"entity": "德钦月波朗巴", "role": "受授记者"}, {"entity": "莲花生大士", "role": "授记者"}], "location": "玛尼卡", "time_info": "{'text': '十三岁', 'relative_to': '德钦月波朗巴', 'absolute': None}", "layers": ["神变", "授记"], "quote": "十三岁，他去玛尼卡地方玩耍时，邬金莲花生大士亲自降临，询问了地方等的名称，他一一答复。于是莲师为他授记说：“萨拉玛尼卡，诺吾丹真汝，拉阿雅山谷，世间汝超胜。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "出家受戒", "title": "德钦月波朗巴在达隆玛仁波切前受沙弥戒", "participants": [{"entity": "德钦月波朗巴", "role": "受戒者"}, {"entity": "达隆玛仁波切", "role": "亲教师"}], "location": "", "time_info": "{'text': '十三岁', 'relative_to': '德钦月波朗巴', 'absolute': None}", "layers": ["史传"], "quote": "也就是在此时，他于达隆玛仁波切前受沙弥戒。第八勇士寺法王郑重授予《上师集密意》、心滴修法、擦瓦玛塔、花鬘严饰仪轨的法本传承加持后，教诫他最好认真实修，并交付义伏藏传承。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "德钦月波朗巴二十五岁礼见司徒班玛年雪旺波", "participants": [{"entity": "德钦月波朗巴", "role": "受者"}, {"entity": "司徒班玛年雪旺波", "role": "传法者"}], "location": "哲蚌寺", "time_info": "{'text': '二十五岁', 'relative_to': '德钦月波朗巴', 'absolute': None}", "layers": ["史传"], "quote": "二十五岁，经莲花生大士的授记敦促，他来到吉祥哲蚌寺，礼见司徒班玛年雪旺波，供养了《金刚橛喜笑大自在》等法，令司徒仁波切满心欢喜，而创立了遣除违缘、长久住世的缘起，恩赐他伏藏修法与秘印需要究竟的言教。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "德钦月波朗巴拜见蒋扬钦则旺波受法得殊胜境界", "participants": [{"entity": "德钦月波朗巴", "role": "受者"}, {"entity": "全知多吉宿则", "role": "传法者"}], "location": "", "time_info": "{'text': '同年二月', 'relative_to': '德钦月波朗巴', 'absolute': None}", "layers": ["史传"], "quote": "就在那一年的二月，他去拜见蒋扬钦则旺波时，钦则尊者也知道国王世代依次相传的关系，首先赐予《金刚橛·最秘剑》，后来又授予昆派金刚橛大灌顶，以遣除内外密的违缘。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "灌顶", "title": "蒋扬钦则旺波授德钦月波朗巴心滴如意宝灌顶", "participants": [{"entity": "全知多吉宿则", "role": "传法者"}, {"entity": "德钦月波朗巴", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传", "证境"], "quote": "就在那一年的二月，他去拜见蒋扬钦则旺波时，钦则尊者也知道国王世代依次相传的关系，首先赐予《金刚橛·最秘剑》，后来又授予昆派金刚橛大灌顶，以遣除内外密的违缘。在进行心滴如意宝的灌顶期间，他直接照见上师就是大班智达布玛莫札，诸如此类显出殊胜的境界，并认识了赤裸觉性。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "德钦月波朗巴受护法灌顶时直接见到一髻佛母", "participants": [{"entity": "德钦月波朗巴", "role": "受者"}, {"entity": "诶嘎匝哲", "role": "主体"}, {"entity": "全知多吉宿则", "role": "传法者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "在授予阿仲玛护法神听命灌顶时，出现大地震动的大威力，他直接见到一髻佛母阿仲玛，她说：三年之内予与师徒二人大悉地。后来，出现了悟大圆满三部的前兆。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "灌顶", "title": "德钦月波朗巴二十七岁听受真实九本尊大灌顶心间脉结解开", "participants": [{"entity": "德钦月波朗巴", "role": "受者"}, {"entity": "全知多吉宿则", "role": "传法者"}], "location": "", "time_info": "{'text': '二十七岁', 'relative_to': '德钦月波朗巴', 'absolute': None}", "layers": ["史传", "证境"], "quote": "他二十七岁在听受真实九本尊大灌顶期间，显现出大上师黑日嘎从头上融入的觉受，从而心间脉结解开。自此开始，自然流露金刚道歌。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "闭关修行", "title": "德钦月波朗巴在哦门嘎玛闭关三年修行究竟", "participants": [{"entity": "德钦月波朗巴", "role": "修行者"}], "location": "哦门嘎玛", "time_info": "{'text': '三年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "他在扬彻静处进行最深三宝总集的依修，以此为首，按照莲师的授记，在哦门嘎玛闭关三年，精进修行，生起次第、圆满次第和大圆满的实修达到究竟，现前了无量无边的成就相。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "德钦月波朗巴十三岁从札嘎宗穹开取二十四天子修法等", "participants": [{"entity": "德钦月波朗巴", "role": "伏藏师"}], "location": "札嘎宗穹", "time_info": "{'text': '十三岁', 'relative_to': '德钦月波朗巴', 'absolute': None}", "layers": ["史传"], "quote": "第二、自己有缘的地伏藏，他十三岁从札嘎宗穹开取二十四天子修法以及《集密意续》、官印、《金刚顶镜》，自此开始一直到三十九岁依照上师给予的标题及劝请，他从则革诺吾苯取出《妙法宝珠七类》、莲师像、狮吼莲师服饰，共开取三十七个殊胜伏藏。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "德钦月波朗巴共开取三十七个殊胜伏藏", "participants": [{"entity": "德钦月波朗巴", "role": "伏藏师"}], "location": "", "time_info": "{'text': '十三岁至三十九岁', 'relative_to': '德钦月波朗巴', 'absolute': None}", "layers": ["史传"], "quote": "第二、自己有缘的地伏藏，他十三岁从札嘎宗穹开取二十四天子修法以及《集密意续》、官印、《金刚顶镜》，自此开始一直到三十九岁依照上师给予的标题及劝请，他从则革诺吾苯取出《妙法宝珠七类》、莲师像、狮吼莲师服饰，共开取三十七个殊胜伏藏。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "德钦月波朗巴从达年卡拉荣门取出《心滴修法除障法》", "participants": [{"entity": "德钦月波朗巴", "role": "伏藏师"}], "location": "达年卡拉荣门", "time_info": "", "layers": ["史传"], "quote": "其中最主要的是，从达年卡拉荣门取出《心滴修法除障法》，从那万堡取出《大悲莲花心滴》，由哦门嘎玛后面取出《甚深实修七类》，由益嘉南卡奏取出其分支续教类以及根本心滴修法《密意总集》、两尊佛像等，从曼秀赡囊班玛西坡取出妙法大圆满三部，从桑钦南札的下方贡木山取出《妙法六部》，从十万空行堡取出《大悲莲花幻化网》和《根除轮回续》，从嘎玛吉祥德处\n取出《空行母总集》，从革拉诺吾苯三处，依照钦则尊者的授记取出《心滴修行如意宝》，从益嘉南方也白札取出《八大法行·集善逝》和《甚深大圆满金熔液》，从荣美嘎木达仓取出《心滴修法金刚猛力》和心要五类，从如单刚出取出《胜乐续》、《佛陀平等行续》，以此为例，从每一伏藏地点也取出了极其可观的不同物品、圣物佛像标帜。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "德钦月波朗巴从多处取出系列伏藏品", "participants": [{"entity": "德钦月波朗巴", "role": "伏藏师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "其中最主要的是，从达年卡拉荣门取出《心滴修法除障法》，从那万堡取出《大悲莲花心滴》，由哦门嘎玛后面取出《甚深实修七类》，由益嘉南卡奏取出其分支续教类以及根本心滴修法《密意总集》、两尊佛像等，从曼秀赡囊班玛西坡取出妙法大圆满三部，从桑钦南札的下方贡木山取出《妙法六部》，从十万空行堡取出《大悲莲花幻化网》和《根除轮回续》，从嘎玛吉祥德处\n取出《空行母总集》，从革拉诺吾苯三处，依照钦则尊者的授记取出《心滴修行如意宝》，从益嘉南方也白札取出《八大法行·集善逝》和《甚深大圆满金熔液》，从荣美嘎木达仓取出《心滴修法金刚猛力》和心要五类，从如单刚出取出《胜乐续》、《佛陀平等行续》，以此为例，从每一伏藏地点也取出了极其可观的不同物品、圣物佛像标帜。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "钦则旺波与德钦月波朗巴成为如日月般两位伏藏大师", "participants": [{"entity": "全知多吉宿则", "role": "传法者"}, {"entity": "德钦月波朗巴", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "彼此之间心心相印，钦则尊者也在其前接受\n了新伏藏的成熟、解脱甘露，由此他们成为如日月般无有诤议、众所周知的两位伏藏大师。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "德钦月波朗巴回忆前世抉择努氏口传和《集密意续》灌顶引导", "participants": [{"entity": "德钦月波朗巴", "role": "伏藏师"}, {"entity": "努·克隆巴云丹嘉措", "role": "前世"}], "location": "", "time_info": "", "layers": ["证境"], "quote": "第五、回忆宿世：尊者回忆起他前世转生为努·克隆巴云丹嘉措，大努临圆寂恩赐遗教金刚教授，他将努氏口传简略立成文字，咒语诵法与舞姿也都通达无碍。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "德钦月波朗巴面见布玛莫札得教授抉择甚深心滴", "participants": [{"entity": "德钦月波朗巴", "role": "受者"}, {"entity": "布玛莫札", "role": "传法者"}], "location": "旺耶山", "time_info": "", "layers": ["证境"], "quote": "第六、净相：尊者开启旺耶山伏藏之门时在布玛莫札的修行山洞面见大班智达布玛莫札，布玛莫札赐予他教授，由此也抉择了布玛莫札的《甚深心滴》等。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "德钦月波朗巴对多派持教大德直接间接授予深法灌顶", "participants": [{"entity": "德钦月波朗巴", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尊者对噶玛噶举、竹巴噶举、哲贡噶举、达隆噶举为主的噶举派，敏朗、噶托、白玉、西钦、竹青为主的宁玛派以及萨迦派等无偏的持教大德，直接与间接授予深法的灌顶与教言。享解脱物的布施遍及整个西藏每一个角落。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "建寺", "title": "德钦月波朗巴在噶玛山静处等建起寺院佛堂", "participants": [{"entity": "德钦月波朗巴", "role": "建造者"}], "location": "噶玛山静处", "time_info": "", "layers": ["史传"], "quote": "对西藏安宁十法之中缘起法加以抉择后按照它的意义，在师君三尊 108 佛教节日具足宣说显密讲修事业兴盛的稀有仪轨，逐渐在白玉、噶托、竹青诸处弘扬。在噶玛山静处、内单刚、则革得多建起寺院佛堂。于后两处也创立僧团，延续显密讲修的传承。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圆寂", "title": "德钦月波朗巴四十二岁铁马年圆寂", "participants": [{"entity": "德钦月波朗巴", "role": "主体"}], "location": "", "time_info": "{'text': '四十二岁铁马年霍尔五月初一', 'relative_to': '德钦月波朗巴', 'absolute': None}", "layers": ["史传"], "quote": "尊者这样的事业趋至究竟后暂时为广大利他着想，于四十二岁铁马年示现生病，当时显现出到达清净佛刹的境界。霍尔五月初一，大地震动、虹光萦绕等，显示稀奇神变而入定于寂灭法界中。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "钦则旺波净相中见德钦月波朗巴现为莲芽菩萨", "participants": [{"entity": "全知多吉宿则", "role": "见者"}, {"entity": "德钦月波朗巴", "role": "被见者"}, {"entity": "莲芽菩萨", "role": "显现形象"}], "location": "", "time_info": "{'text': '当年正月十五', 'relative_to': None, 'absolute': None}", "layers": ["证境"], "quote": "当年的正月十五，钦则旺波尊者的清净所见中，西方刹土被莲花覆盖，他见到伏藏大师现为莲芽菩萨，在其前悠然听受了修法、灌顶、教言甘露。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "出家受戒", "title": "蒋扬钦则旺波二十一岁在邬金敏珠林寺受近圆戒", "participants": [{"entity": "全知多吉宿则", "role": "受戒者"}, {"entity": "仁真桑波", "role": "亲教师"}], "location": "邬金敏珠林寺", "time_info": "{'text': '二十一岁', 'relative_to': '蒋扬钦则旺波', 'absolute': None}", "layers": ["史传"], "quote": "他的智慧与洞察力无与伦比，无勤当中便精通文字读写等，大多数经函只要过目一遍便对句义了如指掌。二十一岁，在邬金敏珠林寺的堪布仁真桑波面前受近圆戒。在萨迦派多吉仁钦等上师座下受与两大宗轨相关的菩萨戒。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "灌顶", "title": "蒋扬钦则旺波在益钦巴面前恭听寂猛幻化网灌顶", "participants": [{"entity": "全知多吉宿则", "role": "受者"}, {"entity": "益钦巴杰美特多南嘉", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在益钦巴杰美特多南嘉面前恭听《寂猛幻化网》的灌顶，依此奠定了密乘戒的基础。从根本上摧毁转世活佛的地位与种族势力雄厚的骄矜，历经千辛万苦，以最大的努力和精进依止卫藏、后藏、康区的上师金刚持、善知识、精通明处的智者等，共依止了一百五十位左右，对共称的工巧明、医方明、声明、因明十种明处，以及戒律、俱舍、中观、般若为主显宗的论典均加以听闻研究达到究竟。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "蒋扬钦则旺波共依止约一百五十位上师", "participants": [{"entity": "全知多吉宿则", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "从根本上摧毁转世活佛的地位与种族势力雄厚的骄矜，历经千辛万苦，以最大的努力和精进依止卫藏、后藏、康区的上师金刚持、善知识、精通明处的智者等，共依止了一百五十位左右，对共称的工巧明、医方明、声明、因明十种明处，以及戒律、俱舍、中观、般若为主显宗的论典均加以听闻研究达到究竟。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "蒋扬钦则旺波十三年唯一闻法", "participants": [{"entity": "全知多吉宿则", "role": "主体"}], "location": "", "time_info": "{'text': '十三年中', 'relative_to': '蒋扬钦则旺波 (E_1100)', 'absolute': None}", "layers": ["史传"], "quote": "宁玛教藏，新旧噶当派，萨、鄂、擦萨迦三派，噶玛噶举、竹巴噶举、哲贡噶举、达隆噶举噶举四派，觉囊雅乐哦东派等没有失毁一直保存以前宗轨完整的能成熟的灌顶和能解脱的教言、《幻化网密藏续》、《时轮金刚》、《胜乐金刚》、《喜金刚》、《密集金刚》等续及论的所有讲轨，再加上甘珠尔、宁\n玛续全集、丹珠尔中传承下来的为主，藏地无偏宗派的论典综合起来共有七百函左右的传承全部听闻……简而言之，他在十三年中唯一闻法，共称的讲传十大顶梁之柱的多数宗义基本上都已听受。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "蒋扬钦则旺波广传经续论典", "participants": [{"entity": "全知多吉宿则", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "凡是他所听受的经续论典的能成熟之灌顶和能解脱之教言，大多数都传讲了多次，至少也传过一遍，唯一以清净无染的法布施如理满足诸位大德直到平凡乞丐之间求法者各自的心愿。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "建寺", "title": "蒋扬钦则旺波造佛像经典佛塔建殿堂", "participants": [{"entity": "全知多吉宿则", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "但是依靠尊者的三盛（福德、智慧、名声）和三聚 109 的功德外现无勤当中得到的所有财物，一丝一毫也没有浪费在非法方面。单单作金铜身所依的佛像就达两千尊，刻印语所依的经典近四十函，手写与刻版的经函合起来共有两千左右。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "蒋扬钦则旺波恢复因战乱受损的寺院", "participants": [{"entity": "全知多吉宿则", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "但是后来由于时势战乱上下发生冲突时，寺院遭到莫大的损害，尊者根据寺院规模大小，布施的茶砖达三千余块。通过与所有汉藏的官员、法王德格君臣达成协议使以前存在的道场得以恢复、重建。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "闭关修行", "title": "蒋扬钦则旺波十三年修行新旧派本尊", "participants": [{"entity": "全知多吉宿则", "role": "主体"}], "location": "", "time_info": "{'text': '十三年中', 'relative_to': '蒋扬钦则旺波 (E_1100)', 'absolute': None}", "layers": ["史传"], "quote": "解脱世间八法的束缚，而对上下的任何人都从根本上杜绝护情面、表里不一的行为，成为放下今生的舍事之王。先后在十三年中，修行新旧派续部的本尊之依修。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "授记", "title": "唐东嘉波对蒋扬钦则旺波的金刚语授记", "participants": [{"entity": "唐东嘉波", "role": "授记者"}, {"entity": "全知多吉宿则", "role": "被授记者"}], "location": "", "time_info": "", "layers": ["授记"], "quote": "尤其是，大成就者唐东嘉波的金刚语授记：“与我无二瑜伽士，具足五种法相者，自此七百年之内，龙年生于多康境，纽之种姓仁嘎子，具有嘉康勇士相，莲花王予加持故，具七付教显密洲，布玛莫札予加持，光明幻化之金刚，文殊幻化君王相，称加持法善知识，如幻之士现世间。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "灌顶", "title": "蒋扬钦则旺波八岁时莲师益西措嘉现身赐灌顶", "participants": [{"entity": "全知多吉宿则", "role": "受灌者"}, {"entity": "莲花生大士", "role": "灌顶师"}, {"entity": "益西措嘉空行母", "role": "灌顶师"}], "location": "", "time_info": "{'text': '八岁时', 'relative_to': '蒋扬钦则旺波 (E_1100)', 'absolute': None}", "layers": ["证境"], "quote": "”并且，前文中引用的大圆满三部授记经教等七教而运用自如广泛弘法利生，依金刚语授记中再再赞叹的均已一一得到验证。尊者到了八岁时，身体出现严重疾病，受到苦受所折磨时，莲花生大士和益西措嘉现身，在金刚橛坛城中赐予灌顶并予以加持和随教。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "蒋扬钦则旺波十五岁净相中蒋华西宁授经", "participants": [{"entity": "全知多吉宿则", "role": "受法者"}, {"entity": "蒋华西宁", "role": "授法者"}], "location": "金刚座", "time_info": "{'text': '十五岁', 'relative_to': '蒋扬钦则旺波 (E_1100)', 'absolute': None}", "layers": ["证境"], "quote": "他以最大的恭敬顶礼膜拜并虔诚祈祷，结果大阿阇黎从左方取来一本经函——《般若摄颂》的梵文本，放在他头上指点密意说：“以此圆满一切显宗法教传承。”从右面取来一本经函显然是《大圆满金刚萨埵意镜续》，又放在他头上指点密意说：“这是圆满密宗金刚乘总法理尤其是大圆满三部句义一切加持。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "蒋扬钦则旺波净相中入火粗身焚烧见布玛莫札光明身", "participants": [{"entity": "全知多吉宿则", "role": "主体"}, {"entity": "布玛莫札", "role": "关联圣众"}], "location": "", "time_info": "{'text': '十五岁', 'relative_to': '蒋扬钦则旺波 (E_1100)', 'absolute': None}", "layers": ["证境"], "quote": "顷刻间他处于无所不及的无分别等持中，从中觉醒后回来，在他的门口有一堆熊熊燃烧的大火，他不由自主地走入火里，结果粗大的身蕴焚烧成无实法，他认为是布玛莫札的光明身灿然出现。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "唐东嘉波梦中现身赐予蒋扬钦则旺波教授", "participants": [{"entity": "唐东嘉波", "role": "授法者"}, {"entity": "全知多吉宿则", "role": "受法者"}], "location": "", "time_info": "", "layers": ["证境"], "quote": "顷刻间他处于无所不及的无分别等持中，从中觉醒后回来，在他的门口有一堆熊熊燃烧的大火，他不由自主地走入火里，结果粗大的身蕴焚烧成无实法，他认为是布玛莫札的光明身灿然出现。此外，这时成就自在者唐东嘉波在他梦中现身并加持，赐予教授及随教，他只是将上师修法立成文字。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "第一教藏传——莲师赐七教传承", "participants": [{"entity": "全知多吉宿则", "role": "受法者"}, {"entity": "莲花生大士", "role": "授法者"}], "location": "妙拂莲花光刹土", "time_info": "{'text': '十六岁时，萨迦月初十黎明', 'relative_to': '蒋扬钦则旺波 (E_1100)', 'absolute': None}", "layers": ["证境"], "quote": "莲师以密意加持，并授予表示的灌顶和七教传承，给予大安慰，最后眼作看式说：“不为所取对境沾，不为能取妄念染，护持赤裸觉空性，即一切佛之密意。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "第二地伏藏传——蒋扬钦则旺波二十岁到妙颈红岩取伏藏", "participants": [{"entity": "全知多吉宿则", "role": "伏藏师"}, {"entity": "年钦塘拉", "role": "护法供养者"}], "location": "妙颈红岩", "time_info": "{'text': '二十岁', 'relative_to': '蒋扬钦则旺波 (E_1100)', 'absolute': None}", "layers": ["史传"], "quote": "第二、地伏藏传：蒋扬钦则旺波在二十岁到了妙颈红岩时，智慧空行亲自供养伏藏宝箧，其中有大悲心性休息（即观音菩萨）的法要和二十一梵志的遗骨。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "空行母从色俄耶湖和班玛西热取出伏藏供养蒋扬钦则旺波", "participants": [{"entity": "全知多吉宿则", "role": "受供者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "年钦塘拉护法神从单秀酿仲地方取出上师四身修法、莲花生大士牙中幻化的舍利供养尊者。空行母以神变从色俄耶湖取出《三根本幻化网》类，从伏藏河班玛西热取出《三根本总集》类，供养他。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "秋杰朗巴劝请开取心滴修法如意宝类", "participants": [{"entity": "秋杰朗巴", "role": "伏藏师"}, {"entity": "全知多吉宿则", "role": "主体"}], "location": "则革诺吾苯", "time_info": "", "layers": ["史传"], "quote": "诸如此类，许多保存下来的伏藏品中除了少许根本颂以外均没有开许抉择。心滴修法如意宝类和莲师像悉地盛燃，保存在则革诺吾苯三处，经秋杰朗巴特意劝请而开取并加以抉择。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "第三极密伏藏——莲师以桑吉朗巴身相赐法", "participants": [{"entity": "莲花生大士", "role": "授法者"}, {"entity": "全知多吉宿则", "role": "受法者"}, {"entity": "伏藏大师桑吉朗巴", "role": "示现身相"}], "location": "", "time_info": "{'text': '土羊年', 'relative_to': None, 'absolute': None}", "layers": ["证境"], "quote": "第三、极密伏藏：土羊年，莲师显现为伏藏大师桑吉朗巴的身相而赐给他经函并予以加持，以此殊胜的清净境界而打开智慧，所有伏藏大师的传记和保存的伏藏法都了然在心，似乎已经得到了那些教传的传承。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "第四甚深密意伏藏——莲师在桑耶加持嘉滚罗珠塔益", "participants": [{"entity": "嘉滚罗珠塔益", "role": "受法者"}, {"entity": "莲花生大士", "role": "授法者"}, {"entity": "莲师金刚像", "role": "圣物"}], "location": "桑耶", "time_info": "{'text': '二十九岁土猴年', 'relative_to': '嘉滚罗珠塔益 (E_1101)', 'absolute': None}", "layers": ["证境"], "quote": "第四、甚深密意伏藏：尊者于二十九岁土猴年来到卫藏，途经香卓格嘉，在初十会供期间，莲师亲自现身作加持。在桑耶，于年伏藏品莲师金刚像前作供养时，那尊佛像变成真正的莲花生大士给予加持并恩授教言。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "莲师在香卓格嘉亲自现身加持嘉滚罗珠塔益", "participants": [{"entity": "莲花生大士", "role": "加持者"}, {"entity": "嘉滚罗珠塔益", "role": "受加持者"}], "location": "香卓格嘉", "time_info": "{'text': '二十九岁土猴年', 'relative_to': '嘉滚罗珠塔益 (E_1101)', 'absolute': None}", "layers": ["证境"], "quote": "嘉滚罗珠塔益亲口说：其他旧伏藏传承基本已中断了，只有零星的少许，然而尊者以其稀有的智慧大妙力再三虔诚祈祷时，近传的极密伏藏也极其可观，所有这些都保存在《大宝伏藏》中。第四、甚深密意伏藏：尊者于二十九岁土猴年来到卫藏，途经香卓格嘉，在初十会供期间，莲师亲自现身作加持。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "嘉滚罗珠塔益面见十字妙音圣母", "participants": [{"entity": "嘉滚罗珠塔益", "role": "主体"}, {"entity": "十字妙音圣母", "role": "显现者"}], "location": "", "time_info": "{'text': '三十五岁木虎年十二月', 'relative_to': '嘉滚罗珠塔益 (E_1101)', 'absolute': None}", "layers": ["证境"], "quote": "依此，上师修法三类的密修莲师心滴法自然浮现。尊者三十五岁木虎年十二月，进行无死如意轮的依修，结果直接面见十字妙音圣母而得加持。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "第五回忆前世——嘉滚罗珠塔益忆起杰珍桑给旺修", "participants": [{"entity": "嘉滚罗珠塔益", "role": "主体"}, {"entity": "杰珍桑给旺修", "role": "前世"}], "location": "藏哦耶", "time_info": "", "layers": ["证境"], "quote": "第五、回忆前世：尊者来到西藏期间，抵达藏哦耶的山脚时一五一十地回忆起前世转为杰珍桑给旺修成就光明身的时间、地点而加以认定，开显了杰珍心滴，回想起前世转为朗卓滚炯时，显现出《长寿修法心滴》、白面狮母的摄生术等。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "第七耳传——莲师八相赐八大法行灌顶教言", "participants": [{"entity": "全知多吉宿则", "role": "受法者"}, {"entity": "莲花生大士", "role": "授法者"}], "location": "炯秀集善逝", "time_info": "", "layers": ["证境"], "quote": "第七、耳传：安住于炯秀集善逝圣地期间，清净境界中到达乐积佛塔前，在塔的四面八方和中央有莲师八相和总集莲师身像，他们赐予他八大法行、寂猛幻化网的能成熟之灌顶和能解脱之教言精华耳传，他加以抉择。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圆寂", "title": "蒋扬钦则旺波圆寂", "participants": [{"entity": "全知多吉宿则", "role": "主体"}, {"entity": "布玛莫札", "role": "法界融入"}], "location": "", "time_info": "{'text': '七十三岁水龙年六月初六清晨', 'relative_to': '蒋扬钦则旺波 (E_1100)', 'absolute': None}", "layers": ["史传"], "quote": "如此稀有的事业暂时究竟，于七十三岁水龙年六月初六清晨，尊者一边散花一边恩授许多吉祥文后入定，色身融入大阿阇黎布玛莫札的密意界中。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "授记", "title": "《三摩地王经》授记嘉滚罗珠塔益", "participants": [{"entity": "嘉滚罗珠塔益", "role": "被授记者"}], "location": "", "time_info": "", "layers": ["典据"], "quote": "嘉滚云丹嘉措罗珠塔益关于大译师贝若札那直接现世的嘉滚云丹嘉措罗珠塔益，《三摩地王经》中云：“其手具有胜等持，圣者慈氏名远扬，广行一切有情利，罗珠塔益（意为智慧无边）我授记。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "授记", "title": "《楞伽经》授记嘉滚罗珠塔益", "participants": [{"entity": "嘉滚罗珠塔益", "role": "被授记者"}], "location": "", "time_info": "", "layers": ["典据"], "quote": "嘉滚云丹嘉措罗珠塔益关于大译师贝若札那直接现世的嘉滚云丹嘉措罗珠塔益，《三摩地王经》中云：“其手具有胜等持，圣者慈氏名远扬，广行一切有情利，罗珠塔益（意为智慧无边）我授记。”《楞伽经》中也说：“其后行持时，导师罗珠者，宣说五所知，大勇现世间……”对于他的尊名、事业，佛陀都亲自予以明显授记。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "嘉滚罗珠塔益在色钦晋美特多南嘉等前闻法", "participants": [{"entity": "嘉滚罗珠塔益", "role": "弟子"}, {"entity": "色钦晋美特多南嘉", "role": "上师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "依靠大福德力不加勤奋自然具足顺缘，在五明大班智达色钦晋美特多南嘉等众多智者成就者持教大德前听受共同十种明处、不共内明《中观》、《般若》、《戒律》、《俱舍》、《慈氏五论》为主法相乘的许多经教及注释，极其不共的教藏、伏藏、新旧派大续部，应有尽有的法，他都一一听受。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "嘉滚罗珠塔益在司徒班玛年学旺波足下求法", "participants": [{"entity": "嘉滚罗珠塔益", "role": "弟子"}, {"entity": "司徒班玛年学旺波", "role": "上师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他在香滚达的司徒班玛年学旺波足下恭敬顶戴，以三戒甘露为主究竟了义秘密俱生大乐智慧得以现前，自在运用精华义传承之王的方便。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "嘉滚罗珠塔益在蒋扬钦则旺波等五十余位善知识前闻受八大教派", "participants": [{"entity": "嘉滚罗珠塔益", "role": "弟子"}, {"entity": "全知多吉宿则", "role": "主要上师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尤其是在真正的文殊菩萨蒋扬钦则旺波为主的五十余位无偏善知识面前，圆满闻受八大教派的道轨雪域所有能成熟之灌顶和能解脱之教言的甚深醍醐。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "嘉滚罗珠塔益编纂五大宝藏", "participants": [{"entity": "嘉滚罗珠塔益", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他所著的论典：从共同明处开始到不共九乘究竟的大圆满阿底约嘎之间，显密善说，集成遍及一切所知的《所知宝藏》；八大教派的根本精华与能成熟之灌顶、能解脱之教言的最深醍醐合而为一，形成《教言宝藏》；金刚乘前译教藏《真实意》、《金刚橛》、《大威德》等，新译玛尔巴、鄂罗译师续部修行能成熟的灌顶、能解脱的教言合而为一的《教传密藏》；前译具六种传承的甚深伏藏海之结晶——《大宝伏藏》；就像下文中即将阐述一样，空行黄纸、圣物等甚深伏藏秘密不同特殊宝藏，以及与之相关的零星著合集成《广大宝\n藏》，如此五大宝藏在赡部洲前所未有，尊者也并不是将单单以粗略的片面闻思想写想著而撰成的某些枯燥文字命名为《全集》的。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "建寺", "title": "嘉滚罗珠塔益重建匝札仁钦岩和炯秀集善逝道场", "participants": [{"entity": "嘉滚罗珠塔益", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "于匝札仁钦岩和炯秀集善逝的修行地，重新兴建道场，并恢复许多陈旧的所依，重新塑的佛像、印的佛典、造的佛塔身语意所依也是不可思议，举行众会大修超过一百五十二次之多，供养三宝、承侍僧众等，总而言之，如果衡量其十大法行的功迹，又觉得他似乎一生都投放在行持佛事上了。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "莲师梦中赐嘉滚罗珠塔益四灌顶及咒语加持", "participants": [{"entity": "嘉滚罗珠塔益", "role": "受灌者"}, {"entity": "莲花生大士", "role": "灌顶师"}], "location": "", "time_info": "", "layers": ["证境"], "quote": "在修行《上师集密意续》依修时，梦中见到莲师，莲师赐予四灌顶及咒语的加持并说：今年遣除了寿障，再过几年，我们会真实相见，许多言教也会逐步出现。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "钦则仁波切与秋杰朗巴祈请嘉滚罗珠塔益安坐法座授名", "participants": [{"entity": "嘉滚罗珠塔益", "role": "受封者"}, {"entity": "全知多吉宿则", "role": "主持者"}, {"entity": "秋杰朗巴", "role": "参与者"}], "location": "匝达秘密山洞", "time_info": "{'text': '四十岁', 'relative_to': '嘉滚罗珠塔益 (E_1101)', 'absolute': None}", "layers": ["史传"], "quote": "尊者到了四十岁时，首先一见到伏藏大师秋杰朗巴，心智就融为一体，对其恩赐的所有特殊言教加以实修，特别是在开启炯秀集善哲处之门的时候，全知钦则仁波切和伏藏大师秋杰朗巴一起，在匝达秘\n密山洞，祈请尊者安坐高高的法座，依靠大供养的缘起，了知三时的邬金莲师赐给的名字齐美丹尼永仲朗巴，并且使之名声大震。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "嘉滚罗珠塔益五十八岁从多处取出伏藏", "participants": [{"entity": "嘉滚罗珠塔益", "role": "伏藏师"}], "location": "", "time_info": "{'text': '五十八岁', 'relative_to': '嘉滚罗珠塔益 (E_1101)', 'absolute': None}", "layers": ["史传"], "quote": "尊者五十八岁时，从拉多波木大乐莲花庄严处取出《集三根本密意》法部、从胜身大乐洞取出《集三根本密意密诀》黄纸和吽嘎日的密衣等，从班玛拉则中央山至尊洞取出莲师像吉祥灿然。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "列绕朗巴与秋杰朗巴受派开取嘉滚罗珠塔益有缘伏藏", "participants": [{"entity": "列绕朗巴", "role": "伏藏师"}, {"entity": "秋杰朗巴", "role": "伏藏师"}, {"entity": "嘉滚罗珠塔益", "role": "有缘者"}, {"entity": "全知多吉宿则", "role": "指派者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "此外，尊者有缘的伏藏品，有些由于时间地点而没有到手，依靠钦则仁波切以其交代守护伏藏护法神的威力，派伏藏师列绕朗巴开取，一些由伏藏大师秋杰朗巴开取，而送到尊者手中。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "钦则仁波切净相中嘉滚罗珠塔益显现为吽嘎日赐灌顶", "participants": [{"entity": "嘉滚罗珠塔益", "role": "显现者"}, {"entity": "全知多吉宿则", "role": "受法者"}, {"entity": "持明者吽嘎日", "role": "示现身相"}], "location": "", "time_info": "{'text': '二十九日晚上', 'relative_to': None, 'absolute': None}", "layers": ["证境"], "quote": "在荣美嘎木达仓，抉择莲师猛修法后二位尊者共同作会供时，钦则仁波切的所见境界中，出现一黑一白两条大蝎子，尊者说这是此法极其严厉的征兆。尊者生起匝札仁钦岩山和炯秀集善逝宫殿是两大圣地的光明境界。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "二位尊者共同抉择《集三根本密意》上师持明修部", "participants": [{"entity": "嘉滚罗珠塔益", "role": "主体"}, {"entity": "全知多吉宿则", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "特别是有一次，二十九日晚上，钦则\n仁波切的清净所见前，嘉滚罗珠塔益显现为成就上师持明者吽嘎日的形象，赐予他《集三根本密意》的灌顶、引导及窍诀，依靠生起如此光明境界，空行文字的完整意义了然在心。于是，他们二位尊者共同作了《集三根本密意》中上师持明殊胜修部的记录。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "灌顶", "title": "觉受光明中钦则仁波切赐嘉滚罗珠塔益四灌顶并直指", "participants": [{"entity": "全知多吉宿则", "role": "灌顶师"}, {"entity": "嘉滚罗珠塔益", "role": "受灌者"}], "location": "", "time_info": "", "layers": ["证境"], "quote": "一天黎明，尊者觉受光明境界中，在一座布局完美的宫殿里，本体是革日仁波切莲师，形象是钦则仁波切，现空光明身表情不定而住，他对其恭敬顶礼，结果钦则仁波切按照持明传承瑜伽随诵皈依、发心七支供，观想本尊加持，取来一个宝瓶放在他头顶，恩赐秘密灌顶与佛母双运的菩提甘露，交付智慧灌顶明妃，心间显示出一个水晶石，直指说：“一切法本来清净深明如水晶般，任运自成的现相妙力显现一切如水晶光相外明一般。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "嘉滚罗珠塔益劝请秋杰朗巴开启炯秀集善逝神山", "participants": [{"entity": "嘉滚罗珠塔益", "role": "劝请者"}, {"entity": "秋杰朗巴", "role": "伏藏师"}], "location": "炯秀集善逝", "time_info": "", "layers": ["史传"], "quote": "后来便劝请秋杰朗巴开启神山之门并抉择神山山志，结果二十五大圣地的略标题从吉祥岩处得到，依此因缘而打开了伏藏之门，诸如此类。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "嘉滚罗珠塔益向各派大德授灌顶传承", "participants": [{"entity": "嘉滚罗珠塔益", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "阿罗华得，匝札支分的圣地汇瓦，所有圣地都按照钦则仁波切的言教，嘉滚亲口对所有圣地状况加以诠解，抉择法类完成的灌顶、传承授予噶托、白玉、西钦、竹青、萨迦、格鲁、噶玛噶举、竹巴噶举、哲贡噶举、达隆噶举的诸位大德，他们首次广泛传授给卫藏具有缘分者，恩德可想而知，所有圣物的利生事业直接间接弘扬到四面八方，开启凡是结缘者都具有实义的事业大门。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "嘉滚罗珠塔益穿行房屋石上留印", "participants": [{"entity": "嘉滚罗珠塔益", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在灌顶、大修、会供等时，甘露沸腾、血液溢流，药香扑鼻，天空搭起虹云帷幕，花雨纷飞等等各种各样的稀奇瑞相是众人有目共睹的。此外，尊者能通彻穿行房屋，在石头上留下手印、脚印。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圆寂", "title": "嘉滚罗珠塔益圆寂", "participants": [{"entity": "嘉滚罗珠塔益", "role": "主体"}], "location": "西方现达哦热城", "time_info": "{'text': '八十七岁土狗年一月初三', 'relative_to': '嘉滚罗珠塔益 (E_1101)', 'absolute': None}", "layers": ["史传"], "quote": "尤其是，甚深伏藏的授记中明明说他寿命不长，但他依靠金刚瑜伽和风脉的能力延长了寿命，到了八十七岁仍然青春饱满，双目炯炯有神……内在的殊胜成就相现量可见。当他直接的事业暂时究竟，八十七岁土狗年一月初三，伴随着众多稀奇的神变，身体前往西方现达哦热城，密意融入法界。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "嘉滚罗珠塔益将佛法交付噶玛巴大司徒等持教大德", "participants": [{"entity": "嘉滚罗珠塔益", "role": "传法者"}, {"entity": "塔则阿阇黎嘉阳洛德旺波", "role": "弟子"}, {"entity": "炯色阿里秋吉根嘎嘉阳", "role": "弟子"}, {"entity": "麦彭嘉扬南嘉嘉措", "role": "弟子"}, {"entity": "列绕朗巴", "role": "弟子"}, {"entity": "晋美俄敦旺波", "role": "弟子"}, {"entity": "杰仲陈列香巴炯内", "role": "弟子"}, {"entity": "益西贡佩", "role": "弟子"}, {"entity": "阿旺单秋嘉措", "role": "弟子"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "此外，他完整交付佛法及成为义补处的第十四、第十五世噶玛巴、第十世和第十一世大司徒为主噶玛、竹巴、哲贡、达隆等噶举派\n的诸位持教大德，塔则阿阇黎嘉阳洛德旺波、炯色阿里秋吉根嘎嘉阳等萨迦派的持教大德，麦彭嘉扬南嘉、伏藏师列绕朗巴、我的根本上师晋美俄敦旺波、杰仲陈列香巴炯内等前译宁玛派的诸位持教大德，还有下密院堪布益西贡佩、札雅东哲大智者阿旺单秋嘉措等山居格鲁派的众多大德。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "麦彭嘉扬南嘉六七岁背诵《三戒论》", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "主体"}], "location": "", "time_info": "{'text': '六七岁', 'relative_to': '麦彭嘉扬南嘉嘉措 (E_1102)', 'absolute': None}", "layers": ["史传"], "quote": "他从小与生俱来就具有信心、出离心、智慧、悲心等大乘种姓的一切功德力。从六七岁开始便能背诵《三戒论》并听受了黑白历算的前行等法，十岁开始无碍读写文字，也造了不同的论著。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "麦彭嘉扬南嘉十二岁入朗寺则美霍密宗院", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "主体"}], "location": "朗寺则美霍密宗院", "time_info": "{'text': '十二岁之初', 'relative_to': '麦彭嘉扬南嘉嘉措 (E_1102)', 'absolute': None}", "layers": ["史传"], "quote": "从六七岁开始便能背诵《三戒论》并听受了黑白历算的前行等法，十岁开始无碍读写文字，也造了不同的论著。十二岁之初，在邬金敏珠林巴的传承萨钦丹尼达吉朗寺则美霍密宗院，以普通僧侣的身份居住。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "闭关修行", "title": "麦彭嘉扬南嘉十五岁修文殊语狮子十八月", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "主体"}], "location": "则纽深山", "time_info": "{'text': '十五岁', 'relative_to': '麦彭嘉扬南嘉嘉措 (E_1102)', 'absolute': None}", "layers": ["史传"], "quote": "在则纽深山里修行文殊语狮子修法十八月，并且修炼妙丹事业，结果获得殊胜验相，从此以后，对显密及明处的任何论典，只要一看便无所不通。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "麦彭嘉扬南嘉十八岁朝拜拉萨读噶丹寺佛学院", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "主体"}, {"entity": "杰桑", "role": "同行者"}], "location": "拉萨", "time_info": "{'text': '十八岁', 'relative_to': '麦彭嘉扬南嘉嘉措 (E_1102)', 'absolute': None}", "layers": ["史传"], "quote": "就是从此时开始，他对地理才格外精通。\n十八岁，他和舅舅杰桑一起朝拜拉萨，当时在噶丹寺只读了一个月的佛学院。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "麦彭嘉扬南嘉在南岩卡切显现空乐境界", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "主体"}], "location": "南岩卡切", "time_info": "{'text': '十八岁', 'relative_to': '麦彭嘉扬南嘉嘉措 (E_1102)', 'absolute': None}", "layers": ["证境"], "quote": "随后就到了南部地区，途中顺便来到南岩卡切时，平庸的显现转依，而呈现出空乐的境界，几天当中都处于暖乐的觉受中，他说这似乎是那一圣地的加持。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "灌顶", "title": "麦彭嘉扬南嘉受玛德白文殊开许灌顶", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "受灌者"}, {"entity": "德嘉滚旺钦极喜金刚", "role": "灌顶师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "后来返回，在德嘉滚旺钦极喜金刚面前，听受了玛德白文殊之开许灌顶，在得受灌顶时和后来恩赐玛卡事业两个时间里，现前了论中所说的成就相，从而开启了智慧莲花。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "麦彭嘉扬南嘉在华智仁波切前听受《入菩萨行论·智慧品》", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "弟子"}, {"entity": "华智仁波切", "role": "上师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "后来返回，在德嘉滚旺钦极喜金刚面前，听受了玛德白文殊之开许灌顶，在得受灌顶时和后来恩赐玛卡事业两个时间里，现前了论中所说的成就相，从而开启了智慧莲花。在邬金晋美秋杰旺波即华智仁波切面前听受了五天的《入菩萨行论·智慧品》，结果所有句义完全通达，后来也造了《澄清宝珠论》。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "蒋扬钦则旺波以满瓶倾泻方式传法予麦彭嘉扬南嘉", "participants": [{"entity": "全知多吉宿则", "role": "上师"}, {"entity": "麦彭嘉扬南嘉嘉措", "role": "弟子"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尤其是以三欢喜依止生生世世有缘的根本上师部主班玛哦色多昂朗巴或蒋扬钦则旺波，被他视为唯一心子，从开始玛德白文殊之开许灌顶而打开法门时起，共不共典籍、近传的显密殊胜论典、大密金刚乘教藏传、伏藏传、净相传应有尽有的灌顶、教言、密诀、窍诀、实践法和直接引导全部以满瓶倾泻的方式恩赐于他。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "麦彭嘉扬南嘉在嘉滚罗珠塔益前听受明处及灌顶", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "弟子"}, {"entity": "嘉滚罗珠塔益", "role": "上师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "此外，尊者先后不同程度在嘉滚罗珠塔益面前，听受了《声律学》、《水银炼洗法》等共同明处以及文殊长寿法等不同法能成熟之灌顶与能解脱之教言。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "麦彭嘉扬南嘉闻受《般若摄颂》后即传讲", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "弟子/传法者"}, {"entity": "则温晋美多吉", "role": "上师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "与四依不违真实通过四种道理的方式通达了如来教的所有深广法理，等同虚空自然本智的显现获得自在从而解开八大辩才的宝藏。在善知识则温晋美多吉面前闻受《般若摄颂》的传承后，立即给别人传讲了一个月。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "白萨格西听麦彭嘉扬南嘉讲《入中论》后赞叹", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "讲者"}, {"entity": "白萨格西阿旺炯内", "role": "上师/赞叹者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "于是他从《入中论》开头往下\n讲。格西在眷属中赞叹说：“我虽然拥有格西的名称，但连此人的一部分智慧也不具足。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "麦彭嘉扬南嘉与罗桑绕色格西书函辩论", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "辩论者"}, {"entity": "罗桑绕色", "role": "辩论者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "可见，诸位大圣者完全是为了护持正法宝藏，遣除他众的邪分别等等，都有着重大意义，尊者与大智者罗桑绕色格西，相互也是通过所造的善说书函往来进行辩论，最后，彼此密意融为一体，抛散赞叹的鲜花。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "麦彭嘉扬南嘉梦中见萨迦班智达获得《释量论》宝剑", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "主体"}, {"entity": "法王萨迦班智达", "role": "显现者"}], "location": "", "time_info": "", "layers": ["证境"], "quote": "尊者在阅览《释量论》的过程中，一天梦中光明境界里，本体是萨迦班智达，形象是身穿印度班智达成就者的装束、鼻尖稍屈的一个人说：《释量论》没有什么不懂的，就是破立两者。说完将《释量论》的法本一分两半交到尊者手中说：“愿平等护持这两者。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "钦则仁波切正式交付麦彭嘉扬南嘉为法太子", "participants": [{"entity": "全知多吉宿则", "role": "传法者"}, {"entity": "麦彭嘉扬南嘉嘉措", "role": "法太子"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在一个吉祥的日子里，钦则仁波切让他将平时极其罕见的显密及明处的好论典、关键要点类的所有经函放在供台上，并广作供养，又请他坐在此前面高高的坐垫上，说道：“这所有经函的经教都交付给您。从此以后，以讲辩著受持，愿佛法如意宝长久照亮这个世界。”为\n他赐予成为法主的灌顶、白度母唐卡、亲自造的长久住世文等佛像、佛典与佛塔，并赐给他灌顶的标帜——上师自己戴过的班智达长耳帽，高度赞叹他是名副其实的法太子。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "麦彭嘉扬南嘉与嘉巴多昂辩论", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "辩论者"}, {"entity": "嘉巴多昂", "role": "辩论者"}, {"entity": "华智仁波切", "role": "见证者"}, {"entity": "秋热", "role": "请问者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "一次格鲁派的大智者嘉巴多昂评说《入行论·智慧品释》不合理的部分，由智者成就者之首的华智仁波切作证，在几天研讨的过程中，基本上只是说些普通人相合各自观点的言词，而区分不出谁胜谁负。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "麦彭嘉扬南嘉在\"大圆本智总色\"研讨中获胜", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "辩论者"}, {"entity": "嘉巴多昂", "role": "辩论者"}, {"entity": "华智仁波切", "role": "开许者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "当时，华智仁波切也说：“嘉巴多昂关于（《三戒论》中）‘大圆本智总色’作了解释，对此有些人遮破，有些人建立，所以在这上面也作一次研讨。”于是他们依其言教而进行研讨，结果麦彭尊者获胜。华智仁波切开许他著写经续窍诀之注释。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "闭关修行", "title": "麦彭嘉扬南嘉在嘎木达仓十三年闭关修行", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "主体"}], "location": "嘎木达仓", "time_info": "{'text': '十三年', 'relative_to': '麦彭嘉扬南嘉嘉措 (E_1102)', 'absolute': None}", "layers": ["史传"], "quote": "后来，麦彭仁波切在修行地之王嘎木达仓，树立十三年修行胜幢，尊者在念诵主要有缘本尊文殊大威德心咒时，论中所说的一切验相无不出现。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "钦则仁波切问麦彭嘉扬南嘉闭关修行情况并传无垢光尊者窍诀", "participants": [{"entity": "全知多吉宿则", "role": "上师"}, {"entity": "麦彭嘉扬南嘉嘉措", "role": "弟子"}, {"entity": "无垢光尊者", "role": "窍诀来源"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "上师说：大全知无垢光尊者说过一无所作而安住本位。我就是如此安住，虽然没有见到所谓心本来面目一个有形有色的东西，但现在即使死也没有一丝一毫的畏惧", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "麦彭嘉扬南嘉撰著三十二函论典", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尤其是依靠大圆满本来清净直断、任运自成顿超瑜伽不停留于伺察意而使法性现量如量，一切显现行为任运驾驭为身智的游舞，依靠内在脉风明点文字完全清净的力量，使修所生慧从境界中自然流露，撰著所有深义意伏藏论典，也有以加持的入门——生起信心、礼赞和传记类，断除所知总增益的共同明处、解脱道的津梁深广内明，使佛法长久住世、吉祥恒常周遍任运的缘起回向吉祥愿文类。总体分四大部分，内部许多分类经函如意宝共有三十二妙相数，因此使总的佛法分别的前译教法延续了慧命。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "麦彭嘉扬南嘉水鼠年出关写遗嘱", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "主体"}], "location": "", "time_info": "{'text': '水鼠年一月十三', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "在水鼠年一月十三出关，从十八日起，对俗世个别客人往来，生起厌离心，依靠此缘，二十一日突然这样写下手稿：“顶礼文殊智慧勇识！立誓于现喜等诸净土，自在获得佛子如海行，尔后尽虚空际以悲心，永恒摄受遍空诸有情。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "闭关修行", "title": "麦彭嘉扬南嘉念不动佛心咒二十万遍", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "主体"}], "location": "", "time_info": "{'text': '二月三月期间', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "今以乐观待死之心念，书写最后遗言之文字……”写下遗嘱以后隐藏起来。在二月三月期间，念了不动佛心咒二十万遍，对侍者喇嘛哦色不同程度讲了一些教言。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "麦彭嘉扬南嘉自述菩萨乘愿投生", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "一次，上师说：“当今时代如果对外说真话，则没有人听，倘若说妄言，大家都信以为真，所以我以前对谁也没有说过，其实我并不是一个普普通通的凡夫人，是一位菩萨乘愿投生的，现在的这个身份虽说该对总的弘法利生、尤其是密宗前译教法做大的利益，然而由于所有宁玛派学人福报浅薄，违缘重重，因为缘起破坏，以致重病缠身等等，不管从哪方面讲都没能如愿以偿。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "麦彭嘉扬南嘉临终顿超虹光境界", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "主体"}], "location": "", "time_info": "{'text': '从二十二日起', 'relative_to': None, 'absolute': None}", "layers": ["证境"], "quote": "以前敏朗兄弟在世时，虽然不同程度地弘法利生，可是当今由于时代的原因，这类情况难以出现，此后并不是永不再转生在不清净刹土，而安住于清净刹土后再以愿力随机幻化的游舞，所有圣者乃至轮回、时间存在就会接连不断涌现，这也是一种自然规律……”从二十二日起尊者就说：现在身体不调的疾病已经恶化，但我根本没有苦受，白天晚上都唯一处在顿超的虹光、明点、佛身及刹土的境界中。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圆寂", "title": "麦彭嘉扬南嘉嘉措圆寂", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "主体"}, {"entity": "喇嘛哦色", "role": "办理后事者"}], "location": "北方香巴拉", "time_info": "{'text': '六十七岁水鼠年四月二十九', 'relative_to': '麦彭嘉扬南嘉嘉措 (E_1102)', 'absolute': None}", "layers": ["史传"], "quote": "”尊者六十七岁水鼠年四月二十九，身体跏趺，手结定印说法印，入定于无漏本来基法界中。当对尊者遗体火化时，虹光搭成帷幕等等稀有瑞相纷集那里，这是众人有目共睹的事实。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "嘉滚云丹嘉措在麦彭嘉扬南嘉前闻受传承", "participants": [{"entity": "嘉滚罗珠塔益", "role": "弟子"}, {"entity": "麦彭嘉扬南嘉嘉措", "role": "上师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "后来，钦则仁波切对他众说：“此时，在人间，智慧没有超过麦彭上师的，他的生平和超越功德如果写成文字，比般若经函还多，但恐怕他现在会不高兴。”嘉滚云丹嘉措也称之为玛哈班智达麦彭嘉措，并在其前闻受了尊者所造的《释量论释》、《八大法行释》等传承。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "辩论中多昂弟子见文殊光线连接麦彭心间", "participants": [{"entity": "麦彭嘉扬南嘉嘉措", "role": "主体"}, {"entity": "妙吉祥", "role": "加持者"}, {"entity": "嘉巴多昂", "role": "辩论对手"}], "location": "", "time_info": "", "layers": ["传闻"], "quote": "这时，上师秋热请问华智仁波切这两人谁得胜？华智仁波切说：“我不能断定，不能裁决，就像世间俗话所说，儿子不必由父亲赞叹，假设敌方称赞，那才是真好，女儿不必由母亲赞叹，倘若婆家称赞，那才是真好。多昂的弟子们告诉我：先前辩论时，他们明显见到上师麦彭所依本尊文殊菩萨的身体，从他心间发射一道光线，连到上师麦彭的心间。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "降伏非人", "title": "莲花生大士以大悲调伏妖魔鬼怪使藏地可以享用佛法", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "赤松德赞", "role": "施主"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "国王赤松德赞虽然点亮正法明灯，可是邪恶的所有凶神恶煞大显神变来兴风作浪，在接近受他们左右的关键时刻，莲花生大士以大悲调伏了所有残暴的妖魔鬼怪，才使整个藏地人们可以随意享用佛法，建立寺院，大转法轮。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "荣索班智达提出前译派六种殊胜特点", "participants": [{"entity": "荣索班智达", "role": "论述者"}], "location": "", "time_info": "", "layers": ["典据"], "quote": "尽管在印度保存的个别续可能会有，但只是去一次并不一定见到，从前安住圣者地化现的诸位译师、班智达们以神变到达二十四个圣境等，而作为薄地凡夫并不能前往。凭借这些理由，阿底峡尊者也无法辩胜的大智者荣索班智达亲口说过：密宗前译派有超胜后译派的六种殊胜特点", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "荣索班智达批评当今假译师对佛陀经教不屑一顾", "participants": [{"entity": "荣索班智达", "role": "论述者"}], "location": "", "time_info": "", "layers": ["典据"], "quote": "当今时代的假译师对以前的译文大肆作各种修改后声称'翻译我妙来源我可靠'而对佛陀的经教、上师的言教不屑一顾", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "邬金巴仁钦华论证宁玛续在尼泊尔保存", "participants": [{"entity": "邬金巴仁钦华", "role": "论述者"}, {"entity": "恰译师", "role": "被驳对象"}], "location": "尼泊尔巴哈绕", "time_info": "", "layers": ["典据"], "quote": "一般来说，在印度来源可靠的所有法本毁坏了许多，佛经也不可限量，西藏的译师们又如何能断定它的来源呢？我虽然去过西方邬金境内，可是也无法断定此境边际，也就是说，最初的所有梵文本后来多数在尼泊尔，因此尼泊尔巴哈绕的一个寺院里，宁玛的所有续不可思议的数目都保存着。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "弘法", "title": "阿底峡尊者在白哈洲见到未见未闻的法本断除傲慢心", "participants": [{"entity": "阿底峡尊者", "role": "主体"}], "location": "白哈洲", "time_info": "", "layers": ["史传"], "quote": "如果他们知道是伪经，也去造连佛经中没有的经续，那还是很好的……”此外，阿底峡尊者的传记中记载：阿底峡尊者的心里有着“对保存在人间的密宗，我认为没有比我更精通之人”的傲慢心，可后来到了西藏，打开白哈洲的一个佛典书库门，阅览了梵文本，竟然有尊者也见所未见、闻所未闻的法本保存着。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "神变", "title": "空行母从虚空中显现无量殿显示众多续部", "participants": [{"entity": "阿底峡尊者", "role": "观者"}], "location": "白哈洲", "time_info": "", "layers": ["神变"], "quote": "这时，空行母也从虚空中显现不可计数的无量殿，显示众多续部并说：“所有这些都没有，大乘此密宗无边无际。”由此断除了他的傲慢心，他后来多次诚心随喜西藏的国王说：“像西藏这般佛法兴盛，甚至在印度也未曾出现过。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "达绕那塔论证莲花生大士在卓当洲首次创立原始教法", "participants": [{"entity": "达绕那塔", "role": "论述者"}, {"entity": "莲花生大士", "role": "事件主体"}, {"entity": "阿底峡尊者", "role": "事件主体"}], "location": "卓当洲", "time_info": "", "layers": ["典据"], "quote": "至尊达绕那塔说：“在卓当洲前所未有的原始教法，莲花生大士首次创立，阿底峡尊者也来到，从此开始，一百年左右期间，玛嘎达、邬金、克什米尔等地的诸多金刚持上师来到这里，才使密乘尤为兴盛。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "布敦大师实修酿伏藏品面见八大莲师", "participants": [{"entity": "布敦大师", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "再者，后来的布敦大师十分重视秉持前译的宗轨，实修酿伏藏品四臂怙主等，面见八大莲师予以授记等等，如果这些是真的，那么他所说的“对宁玛的所有续舍置”显然也是顾及当时宗派诤论的他人情面，察巴司徒门兰多吉从事雪域翻译的所有佛典的校对，布敦大师也亲自参与了，将宁玛派《经幻心》及修部保存在《甘珠尔》的续集中，是以正量证实是原始续的缘故才放的，而他们也证实了新派完整的《三十二绕乐续》和《无二胜续》等多数不是佛语，进而放下。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "布敦大师将宁玛派《经幻心》及修部保存在《甘珠尔》续集中", "participants": [{"entity": "布敦大师", "role": "主体"}, {"entity": "察巴司徒门兰多吉", "role": "参与者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "再者，后来的布敦大师十分重视秉持前译的宗轨，实修酿伏藏品四臂怙主等，面见八大莲师予以授记等等，如果这些是真的，那么他所说的“对宁玛的所有续舍置”显然也是顾及当时宗派诤论的他人情面，察巴司徒门兰多吉从事雪域翻译的所有佛典的校对，布敦大师也亲自参与了，将宁玛派《经幻心》及修部保存在《甘珠尔》的续集中，是以正量证实是原始续的缘故才放的，而他们也证实了新派完整的《三十二绕乐续》和《无二胜续》等多数不是佛语，进而放下。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "色隆巴释迦秋单论证宁玛续如非正法则噶焦祥三位翻译皆非正法", "participants": [{"entity": "色隆巴释迦秋单", "role": "论述者"}], "location": "", "time_info": "", "layers": ["典据"], "quote": "然而这位大班智达的主张是这样的：如果有人认为宁玛续不是正法，那么当时这样承许者就必须要承认，噶、焦、祥三位所翻译的三藏所有法，事续、行续、瑜伽续等大译师仁钦桑波没有出现之前所有译本都不是正法。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "色隆巴释迦秋单论证莲花生大士所讲论典与佛经无有差别", "participants": [{"entity": "色隆巴释迦秋单", "role": "论述者"}, {"entity": "莲花生大士", "role": "事件主体"}], "location": "", "time_info": "", "layers": ["典据"], "quote": "莲花生大士所宣讲的论典与佛经无有差别，如云：‘随应获得解脱道，当如佛经而顶戴。’就像《弥勒五论》、《时轮略续》及其注释《无垢光疏》等一样。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "驳斥邪见", "title": "驳斥\"大圆满是和尚宗\"之指责", "participants": [{"entity": "释迦佛", "role": "教证来源"}], "location": "", "time_info": "", "layers": ["宗派"], "quote": "再者，大圆满的本性中，直接宣讲离作宗派不存在因缘有为界的了义究竟智慧时，讲述不需要观待黑白因果勤作的所作法。个别藏人说出“舍弃行为就成了与和尚宗一致”这样令人目瞪口呆的指责。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "引《普作王续》论证大圆满不说因果二法", "participants": [], "location": "", "time_info": "", "layers": ["典据"], "quote": "如《普作王续》云：“约嘎之顶大圆满，若说有因亦有果，彼不具证大圆义，胜义世俗说为二，乃为增损之词句，彼未证悟无二致，三世诸佛之证悟，亦未见二证一理。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "引《觉性自现续》论证大圆满十度波罗蜜多集于本智中", "participants": [], "location": "", "time_info": "", "layers": ["典据"], "quote": "”不舍弃成为智慧分支的方便行为是此大宗派善巧方便的缘故，暂时不舍世俗谛，然而现量证悟实相谛的法性无迷乱自本体时，不堕于二谛轮番一方，十度等菩提分法的道谛所有法也都包括在此中的道理，如《觉性自现续》云：“任运自成之法身，显现明蔽黑暗散，超离常断之二边，无有明暗所取境，超离一体多体法，超离现与不现法，远离生灭之词句，歧障我念岂能有？思维性中无所思，智慧波罗蜜多边，集于明觉法身中；禅定波罗蜜多边，集于直定灯性中；精进波罗蜜多边，集于无念自然义；安忍波罗蜜多边，集于显现直断中；戒律波罗蜜多边，集于无伴唯一中；布施波罗蜜多边，集于舍弃轮回执；大愿波罗蜜多边，集于显现无希忧；方便波罗蜜多边，集于觉性直定中；大力波罗蜜多边，集于离缘显现中；本智波罗蜜多边，集于显现离缘中。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "引阿底峡解释龙树密意论证入定远离寻伺", "participants": [{"entity": "阿底峡尊者", "role": "论述者"}, {"entity": "圣龙树", "role": "被解释者"}], "location": "", "time_info": "", "layers": ["典据"], "quote": "”阿底峡解释圣者龙树菩萨的密意说：“安住于远离寻伺的入定寂止与胜观中时，如同燧木与燧垫剧烈磨擦起火作为比喻来说明，对任何识都不分别，也不执著一切，尽断一切忆念作意……”作了详细阐述。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "引嘎玛拉西拉修行三次第论证远离寻伺", "participants": [{"entity": "嘎玛拉西拉", "role": "论述者"}], "location": "", "time_info": "", "layers": ["典据"], "quote": "”阿底峡解释圣者龙树菩萨的密意说：“安住于远离寻伺的入定寂止与胜观中时，如同燧木与燧垫剧烈磨擦起火作为比喻来说明，对任何识都不分别，也不执著一切，尽断一切忆念作意……”作了详细阐述。与之相同，嘎玛拉西拉的修行三次第中也予以宣说，因此的的确确是中观自续派共称的言教。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "驳斥邪见", "title": "驳斥\"阿底约嘎不是乘\"的观点", "participants": [{"entity": "法王萨迦班智达", "role": "原论述者"}], "location": "", "time_info": "", "layers": ["宗派"], "quote": "”正是考虑到此原因，萨迦班智达说：“阿底约嘎之见解，亦是智慧而非乘。”虽然从甚深见解的实相无误成立的反体角度善加说明是智慧，但是说它不是乘是有密意的，凭依声缘、菩萨、佛地所摄的智慧尚未圆满、稍许圆满、完全圆满而安立四圣者与乘的次第，《宝性论》中云：“色之行相劣，中胜虚空同。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "驳斥邪见", "title": "驳斥\"大手印是刚波巴伪造\"的观点", "participants": [{"entity": "刚波巴", "role": "被诬者"}], "location": "", "time_info": "", "layers": ["宗派"], "quote": "”对原本就成立的宗派大圆满不相信的同时，将以分别心重新安立的宗派视为最殊胜，并将三解脱门的意义也奉献给别人，这种人如同无有影像的影子一样。此外，声称因乘中连大手印的名字也没有提及，仅是刚波巴伪造等，将佛教引入非理之途的现象也时有出现。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "引《趋入诸佛境智光庄严经》论证佛陀宣说大手印", "participants": [{"entity": "释迦佛", "role": "说法者"}], "location": "", "time_info": "", "layers": ["典据"], "quote": "但实际上，佛陀也对无为法界以手印标帜而宣说过，《趋入诸佛境智光庄严经》云：“阿难，法印即诸法之手印，乃无手印，乃无作之手印，乃无别之手印。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "引《楞伽经》论证十地菩萨依靠灌顶成佛", "participants": [{"entity": "释迦佛", "role": "说法者"}], "location": "", "time_info": "", "layers": ["典据"], "quote": "大慧，诸菩萨大菩萨从一地始，依佛陀加被作加持，入定于菩萨之大乘大光明等持中，菩萨大菩萨入定于菩萨大乘大光明等持中，即刻，安住于十方世界之善逝应供真实圆满正等觉显露尊颜，真实显示一切身、面、语，是故大慧，菩萨大菩萨金刚藏，及具如此功德法相之菩萨大菩萨如实加持他众。大慧，如此一地菩萨大菩萨获得入定于等持之加持。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "驳斥邪见", "title": "驳斥古拉则声称宁玛续部在印度不存在", "participants": [{"entity": "古拉则", "role": "持邪见者"}, {"entity": "法王宿巴", "role": "求法对象"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "再者，古拉则到法王宿巴面前去求法，依靠没有得到的心病而到了印度，大肆声称宁玛派的续部在印度没有，并对《密藏续》罗列了四过等过失，个别藏人重蹈覆辙，然而他们自己去印度，只在一些小地方没有听过，由此并不能证明前译派不存在，大圆满等最深的续部除了口耳相传独传以外，连法本也不曾公开，也无有教授留下来，在西藏包括狗、鼠以上（意思是说人人）修行密宗的这种轨范在印度是没有的，因此他见所未见、闻所未闻的确属实。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "热波绕哲在《密藏续修法》中引布夏莫札论证《密藏续》真实", "participants": [{"entity": "热波绕哲", "role": "论述者"}, {"entity": "布夏莫札", "role": "被引用者"}], "location": "", "time_info": "", "layers": ["典据"], "quote": "尤其是精通后译派的智者之最，对佛教中不如法之处进行清理的大德——热波绕哲在《密藏续修法》中如此说道：“此续真实的理由即布夏莫札论师所造的《密集续大疏》，其中‘智慧勇识谁触及’的解释中：引用《密藏续》云：‘密严刹土无有边际，基无量本智坛城明现，智慧宝耀眼之无量殿，不偏向十方。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "海生阿阇黎论说续部结集者为意金刚", "participants": [{"entity": "海生阿阇黎", "role": "论述者"}], "location": "", "time_info": "", "layers": ["典据"], "quote": "”断除四种颠倒过失等：此说是佛陀之一切语，十地菩萨也不能结集，因此是承许佛陀所结集的观点，海生阿阇黎所造的《密集续释·密成论》中言：“多数论师如是说，具德聚集大光泽，续部结集之作者，勇士世间自在尊，依于上师之恩德，具德密集结集者，非有所谓其余者，能说唯一本来性，造续者即意金刚。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "夏嘎秋巴论证宁玛诸法由印度翻译无需另证", "participants": [{"entity": "夏嘎秋巴", "role": "论述者"}], "location": "", "time_info": "", "layers": ["典据"], "quote": "因此，大班智达夏嘎秋巴说：“宁玛诸法由印度，精勤翻译无需证，阿阇黎之幻化身，所说成立即足可，由从圣境后翻译，密宗术语虽不同，殊胜共同修行中，无欺成就故为量。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "毁灭佛教", "title": "朗达玛毁灭佛教但密咒师未遭根本迫害", "participants": [{"entity": "朗达玛", "role": "主体"}, {"entity": "努·克隆巴云丹嘉措", "role": "受承诺者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "简而言之，朗达玛毁灭佛教后的那段时期，所有显宗寺院已经从根本上摧毁，而密宗的所有修行院，由于位于深山、岩洞等零星地带的缘故，加上正如朗达玛对大努承诺的一样，密咒师谁也没有从根本上遭受迫害。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "弘法", "title": "灭法后持明大德们受持内三续部佛法", "participants": [{"entity": "酿万登珍桑波", "role": "受持者"}, {"entity": "如·释迦炯内", "role": "受持者"}, {"entity": "德香大宿", "role": "受持者"}, {"entity": "努·克隆巴云丹嘉措", "role": "受持者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在那些日子里，酿万登珍桑波、安兰香切嘉灿、涅匝那的弟子八大华子中的多数、大努父子、如·释迦炯内、德香大宿等二悉地获得自在为数众多的持明大德们受持内三续部的佛法。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "圆寂", "title": "帮麦彭滚波弟子七代和酿万登珍桑波到荡玛棱珠七代虹身传承", "participants": [{"entity": "帮麦彭滚波", "role": "传承祖师"}, {"entity": "酿万登珍桑波", "role": "传承祖师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "也有依靠大圆满界部的教授，帮麦彭滚波弟子七代传承、酿万登珍桑波到荡玛棱珠等七代，由经窍诀光明心滴道成就大虹身而使色身荡然无存。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "神变", "title": "宿氏祖孙三人成就起死回生的禁行真身在空中消失", "participants": [], "location": "", "time_info": "", "layers": ["神变"], "quote": "也有依靠大圆满界部的教授，帮麦彭滚波弟子七代传承、酿万登珍桑波到荡玛棱珠等七代，由经窍诀光明心滴道成就大虹身而使色身荡然无存。宿氏祖孙三人等成就起死回生的禁行，真身在空中消失，也出现了许多传承。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "圆寂", "title": "班玛灯德以光明身消失", "participants": [{"entity": "班玛灯德", "role": "主体"}], "location": "", "time_info": "{'text': '第十五胜生周水羊年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "以后来的此时为例，在第十五胜生周的水羊年成就自在持明者班玛灯德以光明身而消失，其后他的亲传弟子伏藏大师让热多吉在敏珠林寺圆寂时，遗体化光所留下来的只有一卡大小，被人迎\n请到多康，现今也可以朝见。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "圆寂", "title": "让热多吉在敏珠林寺圆寂遗体化光仅一卡大小", "participants": [{"entity": "让热多吉", "role": "主体"}], "location": "敏珠林寺", "time_info": "", "layers": ["史传"], "quote": "以后来的此时为例，在第十五胜生周的水羊年成就自在持明者班玛灯德以光明身而消失，其后他的亲传弟子伏藏大师让热多吉在敏珠林寺圆寂时，遗体化光所留下来的只有一卡大小，被人迎\n请到多康，现今也可以朝见。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "圆寂", "title": "敦珠朗巴亲子弟子十三位获虹身成就", "participants": [{"entity": "敦珠朗巴", "role": "传承祖师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "以后来的此时为例，在第十五胜生周的水羊年成就自在持明者班玛灯德以光明身而消失，其后他的亲传弟子伏藏大师让热多吉在敏珠林寺圆寂时，遗体化光所留下来的只有一卡大小，被人迎\n请到多康，现今也可以朝见。与之同时代，伏藏大师敦珠朗巴的亲子和弟子获得虹身成就的有十三位。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "圆寂", "title": "朗仓匝巴札西哦色无余化为虹身", "participants": [{"entity": "朗仓匝巴札西哦色", "role": "主体"}], "location": "多康", "time_info": "{'text': '第十六胜生周木猪年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "近代第十六胜生周木猪年，多康朗仓匝巴札西哦色，其后火牛年，他的继承人罗珠嘉灿，其后水龙年，德格意隆巴索南南嘉，这些我都记得一清二楚，涌现出许许多多无余化为虹身的现量实例。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "圆寂", "title": "罗珠嘉灿火牛年虹身", "participants": [{"entity": "罗珠嘉灿", "role": "主体"}], "location": "", "time_info": "{'text': '火牛年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "近代第十六胜生周木猪年，多康朗仓匝巴札西哦色，其后火牛年，他的继承人罗珠嘉灿，其后水龙年，德格意隆巴索南南嘉，这些我都记得一清二楚，涌现出许许多多无余化为虹身的现量实例。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "圆寂", "title": "索南南嘉水龙年虹身", "participants": [{"entity": "索南南嘉", "role": "主体"}], "location": "", "time_info": "{'text': '水龙年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "近代第十六胜生周木猪年，多康朗仓匝巴札西哦色，其后火牛年，他的继承人罗珠嘉灿，其后水龙年，德格意隆巴索南南嘉，这些我都记得一清二楚，涌现出许许多多无余化为虹身的现量实例。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "译经", "title": "贝若札那翻译《医学四续》", "participants": [{"entity": "贝若札那", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "此外，对圣者智慧善逝甚深法理无所畏惧，获得严饰赡洲之殊胜庄严龙树菩萨和无著菩萨一样果位的荣索秋戒桑波、全知法王龙钦绕降等抵达广闻大海的彼岸，也涌现出这样的大师。就共同而言，幻化的译师贝若札那翻译的《医学四续》也给予无量众生莫大的安慰。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "神变", "title": "萨迦班智达以金刚橛明咒束缚飞空的杵雪嘎波", "participants": [{"entity": "法王萨迦班智达", "role": "主体"}, {"entity": "杵雪嘎波", "role": "被降伏者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "也有因为遭到大怖畏，而需要直接间接寻觅前译派及随行者作为依怙的，诸如：萨迦班智达虽然能以正理击败杵雪嘎波，可是当对方准备飞到空中时，还是要用金刚橛明咒束缚住他，这是现量的事实。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "古译师云讷华论证朗达玛灭法后宁玛密咒师维护藏地佛法", "participants": [{"entity": "古译师云讷华瓦", "role": "论述者"}], "location": "", "time_info": "", "layers": ["典据"], "quote": "念及这种情况，大智者古译师云讷华说：“一般而言，自从朗达玛毁灭佛教以来七十余年间，在卫藏、后藏一个出家僧人也没有，而在有许多宁玛巴密咒师的各自地方以殊胜修行给整个藏地增添了祥和。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "传法", "title": "大成就
