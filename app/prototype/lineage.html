者寂隐从莲花生大士直接听受续部", "participants": [{"entity": "大成就者寂隐", "role": "受者"}, {"entity": "莲花生大士", "role": "传法者"}], "location": "卓当洲", "time_info": "", "layers": ["史传"], "quote": "同样，大班智达释迦西日从大阿阇黎莲师那里直接听受普巴金刚，帕单巴将大圆满作为修行的核心，也有这样的史实。后来，大成就者寂隐从莲花生大士那里直接恭听许多续部的讲解、灌顶、窍诀等，随即在卓当地方等其他境内也加以弘扬。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "传法", "title": "扬耶札巴直接听受大圆满", "participants": [{"entity": "扬耶札巴", "role": "受者"}, {"entity": "莲花生大士", "role": "传法者"}, {"entity": "菩提萨埵", "role": "传法者"}, {"entity": "布玛莫札", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "扬耶札巴在莲花生大士、菩提萨埵、布玛莫札面前直接听受大圆满，至尊米拉日巴最初在努·克隆巴面前听受大圆满心部时，没有入定于觉性上，暂时法与人似乎背道而驰，但是最后以南岩马尔巴译师的绝地火为因而经过大圆满心尽法尽之道而证得成就。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "弘法", "title": "米拉日巴经大圆满心尽法尽之道证得成就", "participants": [{"entity": "米拉日巴", "role": "主体"}, {"entity": "努·克隆巴", "role": "初授大圆满者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "扬耶札巴在莲花生大士、菩提萨埵、布玛莫札面前直接听受大圆满，至尊米拉日巴最初在努·克隆巴面前听受大圆满心部时，没有入定于觉性上，暂时法与人似乎背道而驰，但是最后以南岩马尔巴译师的绝地火为因而经过大圆满心尽法尽之道而证得成就。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "弘法", "title": "噶玛巴巴卡回忆大圆满前世并闻受大圆满而成就", "participants": [{"entity": "噶玛巴巴卡", "role": "主体"}, {"entity": "卡嘎绕多吉", "role": "上师"}, {"entity": "噶托巴香巴波", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他在《金刚歌》中也说：“以大圆满由前钉，以大手印从后钉，口中吐出教言血……”由此足可表明。噶玛巴巴卡成为卡嘎绕多吉的高足后回忆起通达大圆满六百四十万续的前世，并在噶托巴香巴波面前闻受大圆满等而获得成就。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "宗喀巴大师祈祷业金刚后由密主赐予《问答甘露妙药》", "participants": [{"entity": "宗喀巴大师", "role": "祈祷者"}, {"entity": "业金刚", "role": "请求者"}, {"entity": "密主金刚手菩萨", "role": "赐予者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "宗喀巴大师对真实甚深见断除疑虑而祈祷大成就者业金刚，结果他向密主请求，密主赐予的《问答甘露妙药》中说：“普贤佛父之密意，普贤佛母之忠言，金刚持我之密语，乘之极顶大妙药之修行追溯心性光明。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "罗桑秋杰嘉灿论大圆满与大手印等实修获得一密意", "participants": [{"entity": "罗桑秋杰嘉灿", "role": "论述者"}], "location": "", "time_info": "", "layers": ["典据"], "quote": "同样，大班智达罗桑秋杰嘉灿在《大手印引导文》中说：大圆满与大手印，中观道果断法等，纵然安立各自名，然实修者瑜伽士，分析获得一密意。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "传法", "title": "第五世达赖喇嘛在帕旺卡巴面前听受大圆满窍诀", "participants": [{"entity": "第五世达赖喇嘛", "role": "受者"}, {"entity": "帕旺卡巴华玖棱珠", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "帕旺卡巴华玖棱珠，依止自己的父亲持明才旺诺吉和让珠尼达桑吉成为大圆满心滴之妙道得以稳固的瑜伽大自在者，也撰著了大手印、大圆满、大中观普遍直指引导文等以及开显心滴的部分文稿。第五世达赖喇嘛在这位尊者面前听受大圆满窍诀。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "伏藏埋藏", "title": "莲花生大士将修法撷取立成文字隐藏于深山岩石湖泊", "participants": [{"entity": "莲花生大士", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "同样，就西藏而言，如实照见一切的莲花生大士了知后代所化众生的状况，从所有深广续部中撷取修法、事业、会供、窍诀等齐全的道法，立成空行黄纸文字续以后在深山、岩石、湖泊等处委托交付给非人伏藏主，并以“授权未来具缘者此位补特伽罗愿他开取”的发愿印持而隐蔽起来。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "引《圣三摩地经》论证菩萨伏藏置于山树内", "participants": [], "location": "", "time_info": "", "layers": ["典据"], "quote": "集诸福德之《圣三摩地经》中云：“无垢威光，欲求法之诸菩萨大菩萨伏藏置于山、山丘、树内。无量陀罗尼与法门作成经函亦到手中。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "引用论证", "title": "引《摄正法经》论证将法隐成伏藏得十种功德", "participants": [], "location": "", "time_info": "", "layers": ["典据"], "quote": "”《摄正法经》中云：“阿难，为安住何法，若将此等法之法类写成经函而隐成伏藏作供养，则彼者得到十得，阿难，尽得佛眼而现见佛陀之伏藏、尽得天耳而听法之伏藏，不退转故尽得僧而现僧之伏藏，尽得宝手无穷之伏藏，圆满相好色之伏藏，不分遮掩而成遮掩之伏藏，尽得辩才殊胜之伏藏，制服反驳不畏之伏藏，维护一切有情生存福德之伏藏。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "驳斥邪见", "title": "萨迦班智达在《辨析三戒论》中大力破斥达波噶举", "participants": [{"entity": "法王萨迦班智达", "role": "驳斥者"}, {"entity": "刚波巴", "role": "被驳对象"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "如果西藏的诸位智者成就者凡是进行遮破都是非法的话，那就得不到一点真实\n法了，萨迦班智达在《辨析三戒论》中对六法及大手印等达波噶举进行了大力破斥，噶当派的格西南卡白的问答中也说：“我认为哲达大手印此法轨与任何续藏皆不符合，我想这不是正道，切莫将此语传给别人。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "驳斥邪见", "title": "格西南卡白说哲达大手印不符合续藏不是正道", "participants": [{"entity": "格西南卡白", "role": "驳斥者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "如果西藏的诸位智者成就者凡是进行遮破都是非法的话，那就得不到一点真实\n法了，萨迦班智达在《辨析三戒论》中对六法及大手印等达波噶举进行了大力破斥，噶当派的格西南卡白的问答中也说：“我认为哲达大手印此法轨与任何续藏皆不符合，我想这不是正道，切莫将此语传给别人。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "驳斥邪见", "title": "帕单巴尊者等对噶当派加以遮破", "participants": [{"entity": "帕单巴", "role": "驳斥者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "”对噶举极其严厉进行遮破。对噶当派，帕单巴尊者等加以遮破，对于达波拉吉受持噶当派的事迹，受到了米拉日巴尊者的批评。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "驳斥邪见", "title": "雅荣二尊和够释迦达三者对宗喀巴见解极度遮破", "participants": [{"entity": "宗喀巴大师", "role": "被驳对象"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "香巴的四金法也被说是穹波赤诚滚波所造法而不纳入《丹珠尔》之列。萨迦派的雅、荣二尊和够、释迦、达三者对宗喀巴大师的见解和宗派极度遮破，并认为宗大师面见的文殊菩萨也不真实。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "驳斥邪见", "title": "仁达瓦从多方面驳斥《时轮金刚》", "participants": [{"entity": "仁达瓦", "role": "驳斥者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "至尊仁达瓦说：“共称《时轮金刚》等，十地自在者所造，然析合理及非理，智者分析不合理，根本续无诶与旺（即智慧与方便），略续中见多相违，所取来源亦不现，如娼妓子谁依此……”从多方面驳斥《时轮金刚》。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "驳斥邪见", "title": "古拉则因嫉妒卓莫大译师而遮破道果", "participants": [{"entity": "古拉则", "role": "驳斥者"}, {"entity": "卓莫大译师", "role": "被嫉妒者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "古拉则说：'扰乱抄袭空行续，嘎雅达绕金法生。'而遮破道果，其实他是嫉妒弘扬该法的卓莫大译师", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "驳斥邪见", "title": "龙树解说大乘被声闻宣扬为伪造经教", "participants": [{"entity": "圣龙树", "role": "被诬者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "”我们要具备正念，否则，触及法界海底的唯是佛陀的行境，而诸位圣者尚且没有证悟，又怎么能是雪域带有偏执者的行境呢？没有完全证悟，一味沉湎于不了义，堕入偏执之道，嫉妒与自己等同者，希求名闻利养，以这种动机驱使而\n妄加诽谤的这种人丝毫也没有触及到真实义，诸如：龙树菩萨解说大乘，诸位声闻宣扬：怙主龙树伪造经教而算在佛经中，实际大乘不是佛说。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "驳斥邪见", "title": "无著依弥勒意趣诠解末转法轮而被摈除大乘", "participants": [{"entity": "无著", "role": "被排斥者"}, {"entity": "弥勒菩萨", "role": "意趣来源"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "”我们要具备正念，否则，触及法界海底的唯是佛陀的行境，而诸位圣者尚且没有证悟，又怎么能是雪域带有偏执者的行境呢？没有完全证悟，一味沉湎于不了义，堕入偏执之道，嫉妒与自己等同者，希求名闻利养，以这种动机驱使而\n妄加诽谤的这种人丝毫也没有触及到真实义，诸如：龙树菩萨解说大乘，诸位声闻宣扬：怙主龙树伪造经教而算在佛经中，实际大乘不是佛说。圣者无著依照补处弥勒的意趣诠解末转法轮，结果包括追随者在内都被摈除大乘之外。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "毁灭佛教", "title": "达玛巴拉时期小乘行人毁坏黑日嘎银像焚烧密宗经函", "participants": [{"entity": "朗达玛", "role": "时期国王"}, {"entity": "佛智论师", "role": "护持者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "国王达玛巴拉在位时期，小乘行人毁坏黑日嘎银像以得利，将密宗的经函烧在火里，宣称大乘密宗是魔所造，由此遭到王法制裁，佛智阿阇黎加以护持，也有这样的历史。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "驳斥邪见", "title": "驳斥宁玛派与苯波教意趣一模一样的说法", "participants": [], "location": "", "time_info": "", "layers": ["宗派"], "quote": "但事实上，法语等相同之处倒有许多，但他们是根据苯教的需要而抄袭的，又怎么能与宁玛派等量齐观呢？譬如说，在印度，将内教的声闻宗派与名言派、缘觉与唯识、事续与行续、瑜伽父续、母续与无二续并列在一起的宗派总共有十种等。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "降伏非人", "title": "莲花生大士以降伏禁行使鬼神惟命是从取受命心", "participants": [{"entity": "莲花生大士", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "其原因也是，往昔整个藏地由无形的黑法鬼\n神据为己有，对此，莲花生大士，以降伏的禁行威力使他们不由自主惟命是从，取受了他们的命心，吩咐他们作为护法神。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "驳斥邪见", "title": "堪布菩提萨埵及莲师驳倒苯波教见解行为", "participants": [{"entity": "菩提萨埵", "role": "主体"}, {"entity": "莲花生大士", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "”国王的愿望，以翻译及讲说正法为主树立佛教也出现了许多波折。最终，苯波教的见解、行为被堪布菩提萨埵及莲花生大士驳倒、以成就相神变予以击败。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "立法", "title": "赤松德赞令苯波徒行持佛法并将不从者斩首", "participants": [{"entity": "赤松德赞", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "最终，苯波教的见解、行为被堪布菩提萨埵及莲花生大士驳倒、以成就相神变予以击败。国王令苯波徒行持佛法，结果只有少数人听从，他们将许多经典译成苯教。国王听后，将许多苯教徒斩首。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "授记", "title": "莲花生大士金刚语授记伏藏事业", "participants": [{"entity": "莲花生大士", "role": "授记者"}], "location": "", "time_info": "", "layers": ["授记"], "quote": "然而，莲花生大士的悲心与加持越来越迅猛。其金刚语说道：“未来法施无穷尽，莲花伏藏满世间，取者皆是我幻化，装束行为无定准。", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "授记", "title": "作者自称莲花生大士使者给予授记", "participants": [], "location": "", "time_info": "", "layers": ["授记"], "quote": "没有信心并信口雌黄的人，有朝一日也成为莲师的所化，无疑领受永乐的善缘。这是莲花生大士的使者我给予的授记", "chapter": "《藏密佛教史》> 第七品 遣除邪见"}, {"type": "诞生", "title": "释迦佛入胎于摩耶夫人", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}, {"entity": "摩耶夫人", "role": "母亲"}], "location": "", "time_info": "{'text': '阳土羊年箕宿月十五日午夜鬼星隐没的合时', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "善加领悟其理而于此处如是宣说：具体而言，我们的这位本师义成太子，于阳土羊年箕宿月（藏历六月）十五日午夜鬼星隐没的合时，入于正在持斋戒的摩耶夫人胎中，其后过了九个月零二十三天，铁猴年萨迦月初七上午伴随皎月鬼星出现之际，在蓝毗尼花园降生。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "诞生", "title": "释迦佛在蓝毗尼花园降生", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}], "location": "蓝毗尼花园", "time_info": "{'text': '铁猴年萨迦月初七上午伴随皎月鬼星出现之际', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "善加领悟其理而于此处如是宣说：具体而言，我们的这位本师义成太子，于阳土羊年箕宿月（藏历六月）十五日午夜鬼星隐没的合时，入于正在持斋戒的摩耶夫人胎中，其后过了九个月零二十三天，铁猴年萨迦月初七上午伴随皎月鬼星出现之际，在蓝毗尼花园降生。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "出家受戒", "title": "释迦佛二十九岁出家", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}], "location": "", "time_info": "{'text': '二十九岁，土鼠年昴宿月十月初八上半夜', 'relative_to': '释迦佛', 'absolute': None}", "layers": ["史传"], "quote": "二十九岁，土鼠年昴宿月（藏历九月十六至十月十五）十月初八上半夜，于耶输陀罗植下种姓的种子，中夜见到鬼宿升起之时出家，历经六年苦行，到了三十五岁，土马年萨迦月（藏历四月）十五，前往菩提树下，初夜降伏魔众，中夜过后金刚月食等至之际入定，临近解脱月食，间隔一刹那黎明出现，接近敲响胜利鼓的时刻现前圆满佛果，他的儿子罗睺罗住胎六年之后于那时降生。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "成佛", "title": "释迦佛三十五岁于菩提树下成佛", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}], "location": "菩提树", "time_info": "{'text': '三十五岁，土马年萨迦月十五', 'relative_to': '释迦佛', 'absolute': None}", "layers": ["史传"], "quote": "二十九岁，土鼠年昴宿月（藏历九月十六至十月十五）十月初八上半夜，于耶输陀罗植下种姓的种子，中夜见到鬼宿升起之时出家，历经六年苦行，到了三十五岁，土马年萨迦月（藏历四月）十五，前往菩提树下，初夜降伏魔众，中夜过后金刚月食等至之际入定，临近解脱月食，间隔一刹那黎明出现，接近敲响胜利鼓的时刻现前圆满佛果，他的儿子罗睺罗住胎六年之后于那时降生。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "诞生", "title": "罗睺罗及阿难在佛成道时降生", "participants": [{"entity": "班智达罗睺罗", "role": "主体"}, {"entity": "阿难", "role": "主体"}], "location": "", "time_info": "{'text': '佛成道之时', 'relative_to': '释迦佛', 'absolute': None}", "layers": ["史传"], "quote": "二十九岁，土鼠年昴宿月（藏历九月十六至十月十五）十月初八上半夜，于耶输陀罗植下种姓的种子，中夜见到鬼宿升起之时出家，历经六年苦行，到了三十五岁，土马年萨迦月（藏历四月）十五，前往菩提树下，初夜降伏魔众，中夜过后金刚月食等至之际入定，临近解脱月食，间隔一刹那黎明出现，接近敲响胜利鼓的时刻现前圆满佛果，他的儿子罗睺罗住胎六年之后于那时降生。他的诞生令众人欢喜，当时阿难也降生了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "弘法", "title": "释迦佛于鹿野苑第一转四谛法轮", "participa ity": "达波达哦云讷", "role": "法源"}], "location": "", "time_info": "{'text': '第二胜生周', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "第二胜生周开始那年，玛吉拉卓，生肖铁羊，五十七岁；岭国格萨尔王，生肖土虎，五十岁整；至尊米拉日巴，生肖铁龙，四十八\n岁；鄂译师，生肖土猪，十六岁；密主卓普巴，生肖木虎，十四岁；达波达哦云讷，生肖土羊，九岁。达波瓦的弟子康巴三人等次第分出的四大、八小噶举派广泛弘扬。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "建寺", "title": "宗喀巴建噶丹寺——格鲁派出现", "participants": [{"entity": "宗喀巴大师", "role": "主体"}], "location": "噶丹寺", "time_info": "{'text': '第七胜生周土牛年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "至尊宗喀巴大师广泛弘扬噶当经论以及新派密续双运的讲修事业，并在此胜生周的土牛年，建起噶丹寺，法脉取名为寺院的名称，由此出现了众所周知的格鲁派。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "执政", "title": "萨迦巴统治西藏三区", "participants": [{"entity": "法王萨迦班智达", "role": "主体"}], "location": "西藏", "time_info": "{'text': '第四胜生周水牛年开始', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "第四胜生周开始那年，革日秋杰旺修，生肖水猴，五十六岁；智者涅波，生肖土虎，五十岁整；朗日班玛多吉与觉姆曼姆，生肖土猴，二十岁；萨迦班智达，生肖土虎，二十六岁；达隆桑吉雅熏，生肖水猪，五岁。从这里的水牛年开始，大师萨迦巴统治了西藏三区。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "执政", "title": "噶丹颇章统治西藏", "participants": [{"entity": "第五世达赖喇嘛", "role": "相关者"}], "location": "西藏", "time_info": "{'text': '第十一胜生周水马年开始', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "第十一胜生周开始那年，至尊达绕那塔，生肖木猪，五十三岁；持明嘉村酿波，生肖木鸡，四十三岁；罗哲夏仲阿旺那嘉，生肖木马，三十四岁；拉尊南卡晋美，生肖火鸡，三十一岁；语化身慈诚多吉，生肖土狗，三十岁整；刚波巴诺吾坚巴，生肖土猪，二十九岁；噶玛巴秋扬多吉（法界金刚），生肖木蛇，二十三岁；密主陈列棱\n珠，生肖铁猪，十七岁；伏藏大师敦珠多吉，生肖木兔，十三岁；第五世达赖喇嘛罗桑嘉措，生肖火蛇，十一岁。此胜生周的铁蛇年，蒙古军到来使嘎藏的佛法、政权遭到巨大损害，从水马年开始，噶丹颇章统治整个西藏。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "毁灭佛教", "title": "准噶尔军队使宁玛寺院遭巨大损害", "participants": [], "location": "", "time_info": "{'text': '第十二胜生周火鸡年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "第十二胜生周开始那年，香达班玛陈列与班玛朗巴的心子丹增杰美多吉，生肖为铁蛇，四十七岁；敏朗伏藏大师杰美多吉，生肖火狗，四十二岁；大译师达玛西日，生肖木马，三十四岁；第十一世噶玛巴益西多吉，生肖火龙，十二岁；第三世康智阿旺根嘎丹增，生肖铁猴，七岁。此胜生周的火鸡年，准噶尔的军队使宁玛寺院遭到巨大损害。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "具力金刚发愿在贤劫千佛教法期间示现化身利益有情", "participants": [{"entity": "具力金刚", "role": "主体"}], "location": "", "time_info": "", "layers": ["授记"], "quote": "往昔，法身本师大金刚持佛为了弘法利生，而在所化对境前示现色身，就是众所周知的瑜伽自在具力金刚，他为千佛灌顶，被授权为三界法王，他为了利益众生发下如此大愿：“在贤劫千佛的教法没有圆满之前，愿我的殊胜化身连续不断应世，随机广利有情。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "莲花生大士命一世敦珠法王前往藏地利益众生", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "敦珠林巴", "role": "受者"}, {"entity": "益西措嘉空行母", "role": "请求者"}], "location": "", "time_info": "", "layers": ["授记"], "quote": "你是示现色身持明降魔金刚，别无其他……时机已经成熟，现在就去吧", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "莲花生大士授记一世敦珠法王将利益三千有缘之士", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "敦珠林巴", "role": "受者"}], "location": "", "time_info": "", "layers": ["授记"], "quote": "”莲师又再度教诲：“请听，敦珠札波匝，浊世众生虽难以调化，然而依靠前世愿力相系，三千有缘之士成为你的所化，一生获得解脱的大士五百有余，你的事业使者，涌现出二十五位君臣化身，另有十位利益众生的化身伏藏大师，七位极其优秀的密咒师，化现为你的子孙，必将利益众生毋庸置疑。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "诞生", "title": "一世敦珠法王在木羊年八月初十降生", "participants": [{"entity": "敦珠林巴", "role": "主体"}, {"entity": "阿丹", "role": "父亲"}, {"entity": "哦奏", "role": "母亲"}], "location": "札甲空", "time_info": "{'text': '木羊年八月初十晚上，太阳临近升起', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "木羊年八月初十的晚上，母亲分娩，太阳临近升起，众人有目共睹：我家帐篷的里里外外都是彩虹萦绕", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "灌顶", "title": "晋美上师为新生敦珠法王赐予长寿灌顶", "participants": [{"entity": "晋美", "role": "灌顶师"}, {"entity": "敦珠林巴", "role": "受者"}], "location": "", "time_info": "{'text': '出生时', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["史传"], "quote": "当时，父母迎请晋美（即无畏之义）上师，他赐予了长寿灌顶，上师亲口说：“以前，我就总觉得你们二人如果结为良缘，是最好不过的，这与今天早晨彩虹射入帐篷两者完全一致。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "证境", "title": "敦珠法王三岁时在觉受中见无疑王如来获密宗金刚灌顶", "participants": [{"entity": "敦珠林巴", "role": "受者"}, {"entity": "无疑王如来", "role": "灌顶师"}], "location": "", "time_info": "{'text': '三岁，鸡年二月初八', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["证境"], "quote": "无疑王如来亲口说：孩儿呀，你是我的法太子，授予你密宗金刚灌顶", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "证境", "title": "敦珠法王三岁时觉受中回忆起前世修行宿缘", "participants": [{"entity": "敦珠林巴", "role": "主体"}], "location": "", "time_info": "{'text': '三岁', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["证境"], "quote": "”我听话地一吞而尽，依此使我回忆起许多法门，以前的生生世世中听闻、修行的宿缘以及所有生圆次第就像刻印一样了然呈现在心里，在这种状态中安住片刻之后，一切都如梦初醒般消失于法界中了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "证境", "title": "敦珠法王四岁时梦境中见金刚亥母获保护加持", "participants": [{"entity": "敦珠林巴", "role": "受者"}, {"entity": "金刚亥母", "role": "主体"}], "location": "邬金", "time_info": "{'text': '四岁，四月初十晚上', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["证境"], "quote": "”最后她手掌中射出“旺”、“哈”、“热”、“讷”、“萨”五个文字，结果给我穿上了五彩光芒的衣裳，而且从她右乳尖端断掉一个“瓦”字融入我的心间，使我周身遍布红光，化为光芒。金刚亥母说：“孩儿，你快回到自己的住处去吧，下半生会广利众生。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "证境", "title": "敦珠法王四岁时白色地鼠念诵皈依偈后化光消失", "participants": [{"entity": "敦珠林巴", "role": "主体"}], "location": "", "time_info": "{'text': '四岁，四月初七', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["证境"], "quote": "岁\n4\n转眼我到了四岁，四月初七那天，我在去玩的路边，遇到一个又陈旧又坚硬的灰堆，我就在那里挖了许多洞穴放着，上午再去看时，发现在一个洞里有一只白色地鼠。虽然我想逮住它，可是也不敢去抓。过了一会儿，我把小棍插进去，哪曾想那只地鼠蹲着说：卟卟刚刚咧咧吙！胜皈依处三宝尊，佛陀身智即真实，妙法二谛即真实，\n僧教证德即真实，三宝尊前诚皈依。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "证境", "title": "敦珠法王五岁时空行母赐水晶念珠并嘱念一亿遍六字大明咒", "participants": [{"entity": "敦珠林巴", "role": "受者"}], "location": "", "time_info": "{'text': '五岁，猪年六月初十', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["证境"], "quote": "岁\n5\n我到了五岁那一年是猪年，六月初十那一天，西南的天空白云缭绕，五色彩虹帷幕环绕中，有一位白净妩媚、身穿绫罗衣裳的人沿着彩虹道来到我的对面，他递给我一串水晶念珠，说：“孩儿呀，你如果能念完一亿遍六字大明咒（指观音心咒），下半生就会广泛利益众生。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "证境", "title": "敦珠法王五岁时红黑现巴药叉显现交付怀业箭", "participants": [{"entity": "敦珠林巴", "role": "受者"}, {"entity": "红黑现巴药叉", "role": "主体"}], "location": "雅青山脚下", "time_info": "{'text': '五岁，十月二十五日', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["证境"], "quote": "在未来的兔年，如果把它插在那个山沟里 119 ，福报、名声都将圆满齐全，我就是红黑现巴药叉，多生累世没有离开过你，现在我要鼎力协助你的事业。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "证境", "title": "赞古卓列神向敦珠法王表明身份", "participants": [{"entity": "赞古卓列神", "role": "主体"}, {"entity": "敦珠林巴", "role": "受者"}], "location": "", "time_info": "{'text': '三岁，同年十二月初九上午', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["证境"], "quote": "在同年的十二月初九上午时分，我去羊圈的外面玩耍，视野中，一个身色湛蓝的男人骑着铁马，右手挥动白色的矛幡 115 ，从我的右方转绕三圈，随之摘下虎皮帽说道：“奇哉切穹罗匝瓦 116 ，你若未识我面目，我外是阿拉达孜（一座神山），内即赞古卓列神 117 ，密即护法九娘舅，昔于也巴红岩处，邬金莲师予灌顶，委付三大伏藏法，赐无量财诸受用，嘱咐浊世五百年，我来守护阿甲柱，交付此位伏藏师，想必是你前来观，今认识我露笑颜。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "证境", "title": "敦珠法王六岁时见颦眉天女传度母教言", "participants": [{"entity": "敦珠林巴", "role": "受者"}, {"entity": "颦眉天女", "role": "主体"}], "location": "", "time_info": "{'text': '六岁，鼠年七月', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["证境"], "quote": "在同年七月的一天晚上，我蒙着头还没有睡着的时候，眼前出现一道好似天亮般的光芒，宛若流星般一闪而过，如电掣般的红光中，出现一位说是颦眉天女的盛怒女人，身色湛蓝、令人恐怖，她怒目圆睁地说：“奇哉！至尊度母告诉我，有众多鬼神反对你，不要忘记在早晨观想度母，顶礼皈依，切切莫忘！祈祷的时候，念诵：‘祈祷至尊度母您垂念，救护一切怖畏与痛苦。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "金刚巴新指示敦珠法王修法次第", "participants": [{"entity": "金刚巴新", "role": "主体"}, {"entity": "敦珠林巴", "role": "受者"}], "location": "色达东让拉卡", "time_info": "{'text': '六岁，鼠年十月二十五日晚', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["授记", "证境"], "quote": "完成这些以后，在你二十二岁的时候意伏藏会自然流露，二十四岁的时候开取出三类地伏藏，四十岁以后利益无量众生，一般来说，对于发邪愿的魔类诅骂、诽谤及结怨等恶心恶行的一切恶果，都能予以消除，到那时，断除悲喜、希忧的耽著而安住于自己的境界，依此要点能使所有违缘转成助伴。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "证境", "title": "敦珠法王六岁梦境中见观世音菩萨童子获教导", "participants": [{"entity": "敦珠林巴", "role": "受者"}, {"entity": "大悲观音", "role": "主体"}], "location": "", "time_info": "{'text': '六岁，鼠年十二月初十晚', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["证境"], "quote": "在那一年十二月初十的晚上，在梦境当中，东方的天空中出现犹如十五皎洁月色般的白光，在白云萦绕之中，大众以垒环式 121 围绕，好不热闹，听到各种各样的不同语音，十分喧嚣，这种景象离我越来越近，最后到了我的对面，在其内，说是大悲观世音菩萨的童子，又白又亮，让人见而生喜，他端坐在十万勇士、空行母的中央，对我显出一副和颜悦色的欢喜神情，谆谆教诲说：“善男子，你心里观想我，时而以祈祷的方式念诵六字真言，时而把你的身体清晰观想成我，以心咒的方式念诵六字真言，我与你永不分离，相依相伴并予以授记，我能遣除一切内外违缘。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "证境", "title": "敦珠法王七岁时龙钦绕降顺彩虹道前来赐会供丸", "participants": [{"entity": "敦珠林巴", "role": "受者"}, {"entity": "无垢光尊者", "role": "主体"}], "location": "", "time_info": "{'text': '七岁，牛年新年', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["证境"], "quote": "这时，从空中出现一道彩虹，直射我的对面，顺着彩虹之道，说是持明龙钦绕降、身着比丘装束、相好庄严的一位童子来到我面前，给了我两粒会供丸。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "证境", "title": "敦珠法王七岁时撬开磐石见到闭关比丘", "participants": [{"entity": "敦珠林巴", "role": "主体"}], "location": "坡擦山坡", "time_info": "{'text': '七岁，牛年十二月十五', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["证境"], "quote": "当时，山缝里面五光彩虹的璎珞缭绕，其中有美妙、动人的五色明点的范围内一位庄严的比丘，身穿法衣、肩披袈裟，一手结说法印，一手结定印，双足半跏趺坐，他面带笑容地说：“打开我的门干什么？我与世隔绝在这里已经住了三千年，你依靠往昔的愿力才得以见到我。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "敦珠法王八岁时顺虹道渡河", "participants": [{"entity": "敦珠林巴", "role": "主体"}], "location": "色达河", "time_info": "{'text': '八岁，虎年五月十五日', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["神变"], "quote": "我一眼看见在波涛的交界处有一块又高又大的磐石，便想到那上面去，正在这时，看到彩虹光道犹如铺开的氆氇一般，于是我就顺着虹道走去，那种感觉就像走在地上一样。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "弘法", "title": "嘉扬上师开始摄受敦珠法王并教授文字", "participants": [{"entity": "嘉扬", "role": "主体"}, {"entity": "敦珠林巴", "role": "受者"}], "location": "", "time_info": "{'text': '十一岁，蛇年十月初一', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["史传"], "quote": "当时，上师满心欢喜，笑容可掬地抚摸着我的头，给了我一些糖果，说：“昨晚我做了一个好梦，今天也出现了可喜的觉受，他会不会是一个出类拔萃的好僧人呢？当然凡夫人不具备无漏的神通，都将梦境觉受执为殊胜，如果他们是真的，那我的梦也一定不假。”说毕，就教了我三遍三十个藏文字母，随后替我发了三遍愿。从此之后，上师开始摄受并教我文字。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "证境", "title": "敦珠法王十二岁梦境中在非人空行城面见莲花生大士", "participants": [{"entity": "敦珠林巴", "role": "受者"}, {"entity": "莲花生大士", "role": "主体"}], "location": "", "time_info": "{'text': '十二岁，马年七月初九晚', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["证境"], "quote": "在彩虹光网萦绕之中，我们来到了非人空行城，那里，空行空行母如同集市般云集一处，位于中央的霓虹宫周围有小小的金刚杵串环绕着。在里面，邬金莲花生大士就像画像一样的装束、饰品无不圆满，他正在为空行母众传讲了义大乘密法。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "莲师于梦境中授记嘉扬上师为除盖障菩萨化身并教导敦珠法王", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "敦珠林巴", "role": "受者"}, {"entity": "嘉扬", "role": "被授记者"}], "location": "", "time_info": "{'text': '十二岁', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["授记", "证境"], "quote": "莲花生大士说：“你的这位嘉扬上师是除盖障菩萨的化身，他是你五世有缘的上师，你要听从他的言教好好学习文字，一定要善始善\n终。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "证境", "title": "敦珠法王十三岁见黑色忿怒圣尊预警魔王", "participants": [{"entity": "敦珠林巴", "role": "受者"}, {"entity": "黑玛囊护法神", "role": "主体"}], "location": "", "time_info": "{'text': '十三岁，九月十五晚', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["证境"], "quote": "岁\n13\n我到了十三岁，在九月十五的那天晚上，一切显现成为法性远离戏论之边的法界，过了一会儿，如同空中出现彩虹般，在空性清净虚空法界中，熊熊烈火燃及四面八方和周围的界域内，一位黑色忿怒圣尊，他身穿黑色大氅、手持弯刀，旃檀大棍插在腰间，十分恐怖，令人不敢正视，他说：“孩儿，你不要惊慌，莫要害怕。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "灌顶", "title": "嘉扬上师赐敦珠法王现巴夜叉灌顶传承", "participants": [{"entity": "嘉扬", "role": "灌顶师"}, {"entity": "敦珠林巴", "role": "受者"}], "location": "", "time_info": "{'text': '十三岁', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["史传"], "quote": "不管怎么我还是把现巴夜叉的灌顶和传承给你。”说完就赐予我灌顶传承，而交付教法并令我发愿。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "空行母预告舅舅与穹温僧人九月命绝", "participants": [{"entity": "敦珠林巴", "role": "受者"}], "location": "", "time_info": "{'text': '十四岁，一月初十晚', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["授记", "证境"], "quote": "岁\n14\n我到了十四岁的时候，在一月初十的晚上，一位用淡蓝松耳石珠串精心装饰身体的空行母对我说：“下方的那个残暴魔王已经把你的舅舅和穹温僧人的魂带走了，九月里他们会命绝身亡，如果谨慎念修金刚橛法，还有扭转的办法。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "圆寂", "title": "敦珠法王舅舅因瘟疫去世", "participants": [], "location": "", "time_info": "{'text': '十四岁那年九月', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["史传"], "quote": "”早晨我把这话如实讲了，他们一边说“你什么都不懂”一边用巴掌打我的头。到了九月，流行起瘟疫来，舅舅喉咙肿胀，最后去世了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "证境", "title": "红黑现巴夜叉护法教导敦珠法王忿怒莲师观想法", "participants": [{"entity": "红黑现巴药叉", "role": "主体"}, {"entity": "敦珠林巴", "role": "受者"}], "location": "", "time_info": "{'text': '十四岁，十月初三夜', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["证境"], "quote": "”正当我准备启程之时，又一个骑着红色金翅鸟、身色鲜红的人出现说：“孩子，你千万不能去，你要这样想，命已经落到鬼魔的手中，心里如此观想：吽！自己的身语意三门，变成空性，由空性法界中，上师本尊无二无别的本体忿怒莲师，身色红黑，一面四臂，龇牙咧嘴，舌头上卷，胡须眉毛迸射火星，褐色头发向上立起，第一双手将金刚杵和三尖天杖向空中挥舞，第二双手握着金刚橛和铁蝎，下身以燃铁橛插入厉鬼的心间，在劫末火般的界域内，吽的声音如千声巨雷般传出，以数多小忿怒铁蝎，摧毁所有凶神恶煞。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "闭关修行", "title": "晋嘎活佛闭关修行天法中威猛莲师金刚橛合修法", "participants": [{"entity": "晋嘎活佛", "role": "主体"}], "location": "", "time_info": "{'text': '十四岁那年', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["史传"], "quote": "第二天，我把他的话转告给晋嘎活佛，活佛说：“那一定是个奇特的梦兆，现从今天开始我自己决定要修行出自《天法》中的威猛莲师、金刚橛合修法。”于是，他在一个月内严格闭关修行。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "敦珠法王十四岁夜射木箭穿透铁马镫", "participants": [{"entity": "敦珠林巴", "role": "主体"}, {"entity": "红黑现巴药叉", "role": "护持者"}], "location": "尼多色绕寺", "time_info": "{'text': '十四岁，十二月初五夜', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["神变"], "quote": "当时，红黑现巴夜叉护法神，伴随着雷鸣般发出“恰”的巨声出现在空中说道：“你带上木箭和木弓去呼唤的地方！”当我马上带着弓箭赶到呼喊声的地点时，发现一个马鞍的马镫上面有一个赤身裸体的小孩，他两眼正目不转睛地注视着我。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "夜叉护法神以燃火剑斩杀前来报仇的女鬼", "participants": [{"entity": "红黑现巴药叉", "role": "主体"}, {"entity": "敦珠林巴", "role": "被保护者"}], "location": "", "time_info": "{'text': '十四岁，射箭次日夜', 'relative_to': '一世敦珠法王', 'absolute': None}", "layers": ["证境"], "quote": "正在这千钧一发的时刻，从上空中，夜叉护法神用一把燃火的剑刺中那个女人的身体，结果她的身体就像劈开竹子般劈成两半，当时就消失不见了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "作者以金刚陀罗尼咒加持石子降伏怨鬼化现的旋风", "participants": [{"entity": "敦珠仁波切", "role": "主体"}], "location": "", "time_info": "{'text': '四月初五', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境"], "quote": "在四月初五那天，我去放牧，当时一股左旋的黑色狂风一直跟到我的身旁，我躲避开，可是它又随后来到，于是我就把用无碍金刚陀罗尼咒加持的许多石子抛向它，即刻那股旋风变成了不知是男是女的一个人，唱起了这支歌：“嗌嗌嗌！过来倾听，没有头脑的小孩子，我本是你真正的护法神。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "密智空行母授记作者应修文殊语狮子以开启智慧脉门", "participants": [{"entity": "密智空行母", "role": "主体"}, {"entity": "敦珠仁波切", "role": "受者"}], "location": "", "time_info": "{'text': '十月十八那天晚上', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境", "授记"], "quote": "在同一年的十月十八那天晚上，我现见了密智空行母，当时她把手放在我的头上说：“孩子，打开你脉门的方便，如果精进观修文殊语狮子、念诵文殊心咒，并且读诵《真实名经》，智慧的脉门开启以后虚空藏的境界一定会显露出来，不要忘记这一点，铭记在心。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "益西措嘉空行母授记作者依止晋美上师实修前行仪轨", "participants": [{"entity": "益西措嘉", "role": "主体"}, {"entity": "敦珠仁波切", "role": "受者"}], "location": "", "time_info": "{'text': '六月初十的夜里', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境", "授记"], "quote": "岁\n16\n我到了十六岁那一年是狗年，在六月初十的夜里，一位说是益西措嘉空行母、相貌端庄、佩带各种装饰品的女子对我说：“奇哉！我是智慧空行，显示女人形象，呈现在你眼前。此地导师晋美，展开莲师事业，你于今年依之，实修前行仪轨，会现成就吉兆。此师原本乃为，汝昔有缘上师，莫忘记在心里。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "闭关修行", "title": "作者与十五位道友一起请求前行月修法门", "participants": [{"entity": "敦珠仁波切", "role": "主体"}, {"entity": "十五位道友", "role": "同修"}], "location": "", "time_info": "{'text': '十一月初一', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "”说着说着她就消失了。在那一年的十一月初一，我来到上师跟前，与十五位道友一起请求前行月修法门。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "境界中上师亲口说作者获得共同成就", "participants": [{"entity": "敦珠仁波切", "role": "受者"}], "location": "", "time_info": "{'text': '十五晚上', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境"], "quote": "当时，父母迎请晋美（即无畏之义）上师，他赐予了长寿灌顶，上师亲口说：“以前，我就总觉得你们二人如果结为良缘，是最好不过的，这与今天早晨彩虹射入帐篷两者完全一致。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "闭关修行", "title": "作者背靠磐石端直如如不动修行七天", "participants": [{"entity": "敦珠仁波切", "role": "主体"}], "location": "", "time_info": "{'text': '四月初七开始，修了七天', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "于是，我就背靠磐石，身体端直如如不动修了七天，最后我不知不觉睡着了：这时，一个只有一卡高、光着身子的小孩在茅草和花朵上跑跑跳跳，最后他目不转睛地看着我说：“身体就像空空的舍宅，语言就是由心造的作业，心则是能造形形色色一切的作者。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "传法", "title": "莲师童子在境界中教授作者修行正道——虚空法性", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "敦珠仁波切", "role": "受者"}], "location": "", "time_info": "{'text': '十七岁', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境"], "quote": "他们可谓是众说纷纭，但无论怎样取名，实际上都决定不是正道。如果真想要步入正道，那么，上方清净刹土和下方不清净轮回的一切器情除了如虚空般的法性以外别无其\n他。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "作者大彻大悟法性离边的法界", "participants": [{"entity": "敦珠仁波切", "role": "主体"}], "location": "", "time_info": "{'text': '十七岁', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境"], "quote": "”说着说着就不见了。从那时候起，我就只是眼睛不舍专注虚空，转为道用而一心一意实修，由达到法性离边的法界中而大彻大悟了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "作者经历血河等觉受境界并与莲师童子问答修行之理", "participants": [{"entity": "敦珠仁波切", "role": "主体"}, {"entity": "莲花生大士", "role": "教授者"}], "location": "", "time_info": "{'text': '十二月初四的夜晚', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境"], "quote": "过了一会儿，一个身色湛蓝、身穿蓝衣、说是邬金莲师的童子说：“你的这种觉受境界难道不是很神奇吗？”我回答他说：“这种觉受境界最初显现为鲜红的血液，而令我产生一种恐惧感，中间呈现漆黑一片使我的心感到疲惫，最后出现绚丽的彩虹，现在现似蓝光江河流淌，当我观察这种情形时，感觉形形色色的这所有景象除了虚空以外一无所有。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "食子从虚空落入桶中——成就瑞相", "participants": [{"entity": "敦珠仁波切", "role": "受者"}, {"entity": "金刚亥母", "role": "委派者"}, {"entity": "乌鸦面怙主", "role": "送达者"}], "location": "", "time_info": "{'text': '五月初十', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["神变"], "quote": "路上，一个食子从虚空中落到桶里，于是我抬头望望空中，发现有一只乌鸦在飞，我知道是它抛的食子，也明白这是成就的瑞相，于是便取悉地而把食子接触（自己的头顶、喉间、心间）三处，就享受了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "遍明自在姆空行母告知食子来历并确认获得共同成就", "participants": [{"entity": "遍明自在姆空行母", "role": "主体"}, {"entity": "敦珠仁波切", "role": "受者"}], "location": "", "time_info": "{'text': '那天夜间', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境", "授记"], "quote": "那天夜间，一位说是遍明自在姆空行母的女子说：“昨天的那个食子是尼泊尔众林园中名叫色嘎西日的尼泊尔人的修行食子，由空行金刚亥母委托乌鸦面怙主护法神捎给你，你一定已经获得了共同成就，值得欢喜。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "虚空法界自在母授记作者获至高无上成就并预言伏藏流露", "participants": [{"entity": "虚空法界自在母", "role": "主体"}, {"entity": "敦珠仁波切", "role": "受者"}], "location": "", "time_info": "{'text': '十月初十', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境", "授记"], "quote": "晚上，说是虚空法界自在母的空行母说：“奇哉奇哉！母亲孩儿请谛听，乘之数目有多种，意义总集大宝藏，彼等即是大圆满，显现九个小丸丸，母亲已经赐予你，了知决定得悉地，具有智慧孩童你，现在必定已获得，至高无上之成就。今若切合要诀修，密意界中自流露，三类密意之伏藏，必将广利诸有情。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "赞嘉卓林玛波护法神打落鬼女疾病种子保护作者", "participants": [{"entity": "赞嘉卓林玛波", "role": "主体"}, {"entity": "敦珠仁波切", "role": "受护者"}], "location": "", "time_info": "{'text': '十二月十五', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["神变"], "quote": "我一下子生起嗔心，气冲冲大声地质问他：“你到底干什么？”\n他回答说：“那是鬼女散播疾病的种子，你还会吃吗？”我又问他：“你究竟是谁？”他回答说：“我是赞嘉卓林玛波护法神，在做遣除你违缘的事。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "作者在札隆山以心经回遮赞卓昂坚之妻的威胁", "participants": [{"entity": "敦珠仁波切", "role": "主体"}, {"entity": "赞卓昂坚", "role": "相关"}], "location": "札隆", "time_info": "{'text': '十九岁', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["神变"], "quote": "我一边心里暗想“如果我身亡，那么杀人凶手一定就是这个女人，我必须杀掉她”，一边伸手抓她，结果她销声匿迹了。随后我就住在那里念诵三遍《心经》进行回遮，这时从山岩内传出回响般的声音：“你可以住在这里，我发誓显示的恶兆只是儿戏。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "闭关修行", "title": "作者念修文殊语狮子一月后丸子增长飞舞", "participants": [{"entity": "敦珠仁波切", "role": "主体"}, {"entity": "妙吉祥", "role": "本尊"}], "location": "札隆", "time_info": "{'text': '十一月里', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "随后我就住在那里念诵三遍《心经》进行回遮，这时从山岩内传出回响般的声音：“你可以住在这里，我发誓显示的恶兆只是儿戏。”在同年的十一月里，我开始念修文殊语狮子，不知不觉一个月过去了，最后所有的丸子都增长、飞舞。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "传法", "title": "文殊菩萨亲赐智慧教言与修法咒语后融入作者心间", "participants": [{"entity": "妙吉祥", "role": "主体"}, {"entity": "敦珠仁波切", "role": "受者"}], "location": "札隆", "time_info": "{'text': '念修文殊语狮子一月后', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境"], "quote": "大智慧眼而现前，广阔虚空之时际，即与我性无二致，你已获得大智慧，你也获得智慧眼，现在我与你二者，无二无别境界阿。”就这样文殊菩萨赐给我修法及咒语以后融入心间，我在法性境界中稍住片刻。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "梦中面见不动佛于空行莲园中自然传出教言后融入作者", "participants": [{"entity": "不动佛", "role": "主体"}, {"entity": "敦珠仁波切", "role": "受者"}], "location": "", "time_info": "{'text': '二月初八夜间', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境"], "quote": "其内，说是怙主不动佛的上师身着三法衣，一手作压地手印，一手结定印，他默默不语安坐着，从他身体中犹如回音般自然传出这种音声：“阿诶！所有一切有为法，虚幻不实之妄相，如魔术师变魔术；阳焰因缘聚合幻，错将阳焰当作水；梦中景象千千万，梦者迷惑耽实有；虽然现量见影像，然现境外别不成；尽管感受回响声，仅一音声非其他；水中映现出水月，亦非水外之月亮；天空之中现彩虹，不成虚空外他法；眼前出现之毛发，非除患眼之别法；\n火中显现火光芒，亦非火外之别法；我中显现外界物，亦非自身外他法。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "红色女子预言灶具将被打碎，次日果然应验", "participants": [{"entity": "敦珠仁波切", "role": "见证"}, {"entity": "滚丹", "role": "受害者"}], "location": "", "time_info": "{'text': '十二月初五晚上', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["神变"], "quote": "十二月初五的晚上，我梦到一个周身红色的女人，她说：“明天你会亲眼见到有人来大肆打烂砸碎大锅和炉灶。”说完就消失了。到了第二天，施主滚丹的妹妹佳瑞玛来了，与此同时，出现了一个灰不溜秋的小孩，我看见他哈哈大笑肆无忌惮在三角灶上跳起舞来，于是便对施主滚丹说：“要注意你的灶具啊！独角鬼在灶头上嬉笑呢。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "空行母唱歌授记作者如意树、雄狮、大鹏等未来喻象", "participants": [{"entity": "敦珠仁波切", "role": "受者"}], "location": "", "time_info": "{'text': '一月十三那天晚上', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境", "授记"], "quote": "成立成立任运幻，本身本身影像真，目的目的为了你，讲说讲说有说词。现在谛听此词句：当今时代如意树，枝叶花瓣皆渺小，果实鲜花不成熟，与其余树相混淆，谁者前悉不需要，然树无生亦无灭。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "蜜蜂在花丛中吟唱无常之歌启迪作者", "participants": [{"entity": "敦珠仁波切", "role": "受者"}], "location": "色达札隆草原", "time_info": "{'text': '六月初十', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境"], "quote": "正当这时，一只蜜蜂盘旋在花丛中，在我的境界中它是在吟唱这支给人启迪的歌：嗡嗡！绿草荫荫花园中，小小金蜂我多么快活，快乐也决定不会永恒，秋季的白霜一到，竞相开放的莲园即将凋零。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "境界中海螺天子与则乐非天引领作者朝拜五台山", "participants": [{"entity": "海螺天子", "role": "引导者"}, {"entity": "则乐非天", "role": "引导者"}, {"entity": "敦珠仁波切", "role": "受引导者"}], "location": "五台山", "time_info": "{'text': '七月十八的晚上', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境"], "quote": "他对我说：“我们结伴去汉地五台山顶朝拜好吗？”正说着，我们已经行走来到了那里。一座山上有五个顶，当到了中台高耸入云的山顶上时，那个身色洁白的人说：“你向上望！”我按他所说抬头看，只见上方似乎降下了红红火星般的雨水。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "空行母以镜子和白芥子预言十三位虹身瑜伽士弟子", "participants": [{"entity": "敦珠仁波切", "role": "受者"}], "location": "", "time_info": "{'text': '七月十五的晚上', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境", "授记"], "quote": "当天正是十五日，晚上，一位美丽可爱、令人看不厌足的空行母在一面琉璃宝制的镜子上抛了十三颗白芥子，并说道：“儿你听我言，再过十五年，数千之弟子，逐渐而聚集，趋至永乐地。尤其胜子徒，无定居深山，头上绾发髻，身穿瑜伽衣，成就虹身幻，十三瑜伽士，勇士你友伴。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "红色女子授记作者翌年与良友至东方果洛涌现心子", "participants": [{"entity": "敦珠仁波切", "role": "受者"}], "location": "", "time_info": "{'text': '十月初九的晚上', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境", "授记"], "quote": "非人空行地，道歌作表示，无人语交流，因你极愚笨，故以人言释，莫忘铭刻心，至关重要也！”她又接着说：“明年六月里一位良友来到，那时你们一同到东方果洛地方，去那里会化到很好的缘。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "弘法", "title": "作者随革勒旺里前往东方果洛弘法", "participants": [{"entity": "敦珠仁波切", "role": "主体"}, {"entity": "革勒旺里", "role": "同行"}, {"entity": "罗丹", "role": "同行"}, {"entity": "桑昂哲秋", "role": "委托者"}], "location": "果洛", "time_info": "{'text': '六月', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "六月里，一个名叫革勒旺里的人和他的侄子罗丹从果洛来到色达做生意，上师桑昂哲秋将此事托付给他，于是我和他俩一道去东方果洛地方。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "传法", "title": "作者给阿旺嘉措传讲忿怒金刚修法", "participants": [{"entity": "敦珠仁波切", "role": "主体"}, {"entity": "阿旺嘉措", "role": "受者"}], "location": "果洛", "time_info": "{'text': '二十三岁', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "”说着说着她就不见了。那个勒旺有个侄子名叫阿旺嘉措，是个小僧人，我给他传讲了忿怒金刚的一个修法。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "刚穹玛空行授记作者值遇旺修瑜伽士及珠瓦滚波得灌顶传承", "participants": [{"entity": "刚穹玛空行", "role": "主体"}, {"entity": "敦珠仁波切", "role": "受者"}], "location": "", "time_info": "{'text': '过了一个月后', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境", "授记"], "quote": "玛多吉祥旋之处，前世殊胜之本尊，忿怒金刚大吉祥，作为第一胜本尊，出现旺修瑜伽士，彼前得灌顶传承，不久值遇已五次，诵咒到量老瑜伽，灌顶传承完整求，恒常实地而修行。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "灌顶", "title": "大悲观音亲授《寂集密意自解脱》修法灌顶传承", "participants": [{"entity": "观世音菩萨", "role": "主体"}, {"entity": "敦珠仁波切", "role": "受者"}], "location": "", "time_info": "{'text': '一月初十的晚上', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境"], "quote": "岁\n24\n转年我到了二十四岁，在一月初十的晚上，我面见了圣者大悲观音，他圆满恩授我说是《寂集密意自解脱》的修法灌顶传承之后说道：“善男子，你如果能将此立成文字，很可能会利益一些众生，要把这件事记在心里。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "灌顶", "title": "印度持明吽嘎日授予《现巴玛林续》灌顶传承", "participants": [{"entity": "持明吽嘎日", "role": "主体"}, {"entity": "敦珠仁波切", "role": "受者"}], "location": "", "time_info": "{'text': '四月二十五日夜晚', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境"], "quote": "在同年的四月二十五日夜晚，当我面见印度持明者吽嘎日时，他手掌中显示这个伏藏文，并且说：“如果把这个立成文字，那就好比是降伏佛教敌人的金刚霹雳，因此善男子，你需要《红黑现巴夜叉》这部续，赠送你。”于是他圆满授予《现巴玛林续》的灌顶、传承后就不见了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "热温诽谤伏藏法导致作者烧毁文稿", "participants": [{"entity": "热温", "role": "破坏者"}, {"entity": "敦珠仁波切", "role": "受害者"}], "location": "果洛", "time_info": "{'text': '二十四岁', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "在我勤奋立成文字的过程中，从霍科地方来到果洛的一个小僧人，名叫热温，他口口声声说“这所有伏藏法一定是邪法”，由此破坏了缘起，我也一边对他发恶愿一边把文稿烧了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "闭关修行", "title": "作者与阿旺嘉措一起修行忿怒金刚法", "participants": [{"entity": "敦珠仁波切", "role": "主体"}, {"entity": "阿旺嘉措", "role": "同修"}], "location": "", "time_info": "{'text': '十月十五', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "当年的十月十五日我和道友阿旺嘉措一起开始修行忿怒金刚法期间，十一月初十的那天，一位身色洁白的空行母来到我的对面说了这番话：“奇哉！勇士你同行道友，犹如雪狮之阿旺，好似猛虎札西巴，投胎转世之华丹。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "空行母授记彭措札西为作者执笔者将广利众生", "participants": [{"entity": "敦珠仁波切", "role": "受者"}, {"entity": "彭措札西", "role": "受授记者"}], "location": "", "time_info": "{'text': '十一月初十', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境", "授记"], "quote": "撒播口舌之恶果，盗窃信财二十八，恶魔化身将现\n世，护法神将协助你，并无祸患切莫忘，铭记在心善男子，初中末皆成善妙！”她又接着说：“孩儿呀，你的弟子霍尔的僧人彭措札西，来到这里时，不要让他离开，作为执笔者，将来会广利众生。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "空行母授记作者为莲花生大士事业领主并指示绕塔伏藏处", "participants": [{"entity": "敦珠仁波切", "role": "受者"}], "location": "", "time_info": "{'text': '四月初十', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境", "授记"], "quote": "在那一年的四月初十那天作了百数会供酬谢，当天晚上，一位身色红艳、身穿白色裙子的空行母对我说：“前世累劫之前，福德资粮与宏愿威力聚合的士夫你就是莲花生大士事业的领主，甚深伏藏法主，在玛多形似小箱子的红色岩石地方，隐藏着贝诺的藤杖伏藏，由此那里简称为‘绕塔’。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "伏藏开取", "title": "作者在绕塔取出度母像、念珠和伏藏标题", "participants": [{"entity": "敦珠仁波切", "role": "主体"}], "location": "绕塔", "time_info": "{'text': '六月初十', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "”她又嘱咐道：“到绕塔地方去，那里存放着萨绕哈巴的念珠和朱砂所造的度母像，连同伏藏标题，因此不可耽搁快快前去！”遵照空行母的授记，六月初十那一天，我启程前往绕塔，我来到了那里时，有一块大岩石掉了下来，我观望落下岩石的原处，从炭堆里取出度母像紫胶小宝箧和一串陈旧、不太好看的念珠，在那个小宝箧内有一卷纸，我定睛观看封面，发现上面写着在“银鹰”岩石宛若金翅鸟的颈部有伏藏标题。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "伏藏开取", "title": "作者在色达金刚岩开取七个伏藏宝箧", "participants": [{"entity": "敦珠仁波切", "role": "主体"}, {"entity": "德钦", "role": "助伴"}], "location": "金刚岩", "time_info": "{'text': '十一月初十', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "我们逐渐顺着岩梯往上登，我带着舒畅、柔和的感受行走着，到了大约五步弓（一步弓相当于五市尺）的地方时，我用凿子凿击一块半圆形的岩缝，门打开了，我看见里面大量炭堆中央，柏树皮和桦树皮内有许多小宝箧，按照标题中所说只能取三次，我取了三次，只有七个小宝箧取到手，尽管眼睁睁地看着有许多佛像、佛经、佛塔，可是由于法主和明妃不全的原因而没能取到。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "阿哦穹友部落以战争威胁要求交出伏藏品被作者平息", "participants": [{"entity": "敦珠仁波切", "role": "主体"}, {"entity": "阿哦穹友全部落", "role": "威胁者"}], "location": "", "time_info": "{'text': '取伏藏之后', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "后来，阿哦穹友全部落的所有僧人俗人都说：“在寒冬腊月里看见漫山遍野布满彩虹，那肯定是我们的土地神制造的不祥之兆，你如果不把所取出来的所有伏藏品交给我们，那就等着我们发动战争吧。”我说：“那正像莲花生大士所说：当有缘者遇到我的伏藏品时，藏汉所有凶暴的鬼神聚集起来，显示出各种现似吉祥的凶相，你们发动军队吧，我也有对付的好办法。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "普明母授记塞彭那波恶魔王出现并指示降伏方法", "participants": [{"entity": "普明母", "role": "主体"}, {"entity": "敦珠仁波切", "role": "受者"}], "location": "哦穹达西", "time_info": "{'text': '二十六岁', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境", "授记"], "quote": "空行母普明母说：“名叫塞彭那波者，邬金莲花生大士没有调伏的恶业魔王出现，统治霍尔部落，控制重重山谷，有能令人动魔心的发邪愿者名叫‘瓦囊罗玛真’的人，存心攻击玛多色之际，你要从上方降下‘卡嘉矛’，从下方湖泊向上涌，彻底推翻魔黑岩，上下打开交通门。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "梦中空行母引至南方具集乐园面见贤劫千佛获教法融入", "participants": [{"entity": "贤劫千佛", "role": "法源"}, {"entity": "敦珠仁波切", "role": "受者"}], "location": "具集乐园", "time_info": "{'text': '神变月初十的晚上', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境"], "quote": "”说完所有左手拿着的经函圣教伴着轰隆隆的声音说：“我们的教法无不圆满，你要坚信，撷取这些精华醍醐的全部窍诀，为了利益所化众生而立成文字。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "作者现前大彻大悟境界——法句如刻印般自然流露", "participants": [{"entity": "敦珠仁波切", "role": "主体"}], "location": "", "time_info": "{'text': '二十七岁', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境"], "quote": "从那时起，轮涅所摄的一切法如同海中的星辰一般归集于我的大光明法界中，我现前了大彻大悟的境界，心只要专注何处，所需要的一切法句就像刻印一样顿时自然流露。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "传法", "title": "梦中龙树菩萨与千三百比丘于金刚座为作者传承教法", "participants": [{"entity": "圣龙树", "role": "主体"}, {"entity": "一千三百比丘", "role": "眷属"}, {"entity": "敦珠仁波切", "role": "受者"}], "location": "印度金刚座", "time_info": "{'text': '五月十七的晚上', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境"], "quote": "在那里，说是圣龙树的比丘，相貌格外庄严，周围由一千三百比丘环绕，他们手里各个拿着一本经函，这样说\n道：“奇哉！具缘善男子，这里是印度金刚座，我等如来的长子，你是如来的补处，从无始时生世以来，所有五欲妙的法，无一不被执为我所，心里观想取受它们，为了报答法恩而作供养，心的受用无尽宝藏，这是无上绝妙的曼茶罗。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "美热珍雪空行母授记作者去珠日神山修行及明妃心子", "participants": [{"entity": "美热珍雪", "role": "主体"}, {"entity": "敦珠仁波切", "role": "受者"}], "location": "", "time_info": "{'text': '二十八岁（狗年）', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境", "授记"], "quote": "岁\n28\n我到了二十八岁的那一年是狗年，一位说是美热珍雪的空行母对我说：“你如果去仲坡（指珠日神山处）空行大殿中修行，下半生受用和威力将圆满。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "闭关修行", "title": "作者在珠日神山一月修行出现吉祥瑞相", "participants": [{"entity": "敦珠仁波切", "role": "主体"}], "location": "珠日神山", "time_info": "{'text': '春季一月里', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "”说着就从我的视野中消失了。按照如此授记，在春季一月里，我去了珠日神山，只是在一个月修行的过程中就出现了许多神奇吉祥的瑞相", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "太一济世地母唱歌告诫作者勤修精华法舍弃信财", "participants": [{"entity": "太一济世地母", "role": "主体"}, {"entity": "敦珠仁波切", "role": "受者"}], "location": "珠日神山", "time_info": "{'text': '第七天的晚上', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境", "授记"], "quote": "精进修行精华法要，舍弃收揽信财寻求利养，致力于讲经说法和著书立说，到了下半生，无勤之中福泽自增，\n有缘弟子男女信士，纷纷云集无不圆满，你也会渐渐获得功绩，必定成办今生来世的大利。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "传法", "title": "莲花生大士降临赐予教诲并赐甘露托巴", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "敦珠仁波切", "role": "受者"}], "location": "珠日神山", "time_info": "{'text': '第二十一天的晚上', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境"], "quote": "第二十一天的晚上，邬金大法王莲花生大士从彩云虹光萦绕的界域降临到我前方的虚空中，说道：“善男子，你精勤会供、酬补尤为重要；要给严厉的护法多施食子；每年不间断严格闭关修行数月，要掌握这三点，把这个殊妙悉地无余享用了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "持明降魔金刚赐空行金刚亥母甘露融入作者身体", "participants": [{"entity": "一世敦珠法王", "role": "主体"}, {"entity": "金刚亥母", "role": "委派者"}, {"entity": "敦珠仁波切", "role": "受者"}], "location": "珠日神山", "time_info": "{'text': '临近取大修悉地的晚上', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境"], "quote": "随后，在临近取大修悉地的晚上，持明降魔金刚往一个铜盘里倒酒，藏文元音辅音字母如同影像映现般灿然闪烁、溅起虹浪，他把酒给我，接着说：“这是空行母金刚亥母捎给我所幻现、与我无二的善男子你的，接触三处。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "传法", "title": "持明吽嘎日在清净妙生乐园教诲作者住所安排与修行方法", "participants": [{"entity": "持明吽嘎日", "role": "主体"}, {"entity": "敦珠仁波切", "role": "受者"}], "location": "清净妙生", "time_info": "{'text': '夏天四月初十的夜晚', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境"], "quote": "他对我说：“以前的珠日金刚空行聚集处是自然生起领悟功德的地方，暂时作为你的住所，勤修精华法，过了一年以后，\n去色达的紫青山沟东边圣地（指喇荣），如果修行两个月，做两千次酬补、会供，那么福德的果必将如同降雨般增长、成熟。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "弘法", "title": "作者在霍尔一带造许多《忿怒金刚修法》", "participants": [{"entity": "敦珠仁波切", "role": "主体"}], "location": "霍尔", "time_info": "{'text': '二十八岁', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "”最后，上师亲口说：“我的意传融入你，所有教言如同河流般涌现。”在这以后，我如前一样去了霍尔地带，由自己的清净境界中出现，而造了许多《忿怒金刚修法》。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "伏藏开取", "title": "嘉瓦活佛确认作者为莲师化身要求取伏藏", "participants": [{"entity": "嘉瓦活佛", "role": "认证者"}, {"entity": "阿那旺钦", "role": "传话者"}, {"entity": "敦珠仁波切", "role": "受认证者"}], "location": "", "time_info": "{'text': '五月里', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "五月里的一天，阿那旺钦来了，他说：“从去年以来，自称是伏藏师成就者的人异常多，虽然我自己不相信这一套，可是嘉瓦活佛说：‘你让革勒家的那个伏藏师取出一个修法，他不是邬金莲花生大士的化身，那我就是骗你了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "弘法", "title": "格喇秋帕验证马头明王修法——经噶托雅萨活佛梦验确认为真", "participants": [{"entity": "格喇秋帕", "role": "验证者"}, {"entity": "噶托雅萨活佛", "role": "梦验者"}, {"entity": "敦珠仁波切", "role": "伏藏师"}], "location": "果洛", "time_info": "{'text': '六月里', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "”一清早，他就去问：“昨晚请求观察的情况怎样？”上师说：“昨晚我梦到在一个良田里六谷丰登成熟，还稍稍有点不适宜收割，却提前收割了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "热温质疑伏藏法被噶托活佛引多则钦之语反驳后二度导致文稿被焚", "participants": [{"entity": "热温", "role": "质疑者"}, {"entity": "噶托雅萨活佛", "role": "辩护者"}, {"entity": "敦珠仁波切", "role": "受害者"}], "location": "果洛", "time_info": "{'text': '二十八岁', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "”活佛说：“如果这种说法有过错，那多则钦也说过‘意识解脱迷乱是风动的幻化游舞’，那也是一样的，难道他也不合理了吗？”热温说：“他真这样说过吗？”他低着头在大众当中不再说什么了。当我听到这话时，说谛实语诅咒，并把文稿烧了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "阿札嘉姆空行母揭示玖纽札巴为萨钦根嘎嘉村转世的隐蔽瑜伽士", "participants": [{"entity": "阿札嘉姆空行母", "role": "主体"}, {"entity": "玖纽札巴", "role": "受授记者"}, {"entity": "萨钦根嘎嘉村", "role": "前世"}], "location": "", "time_info": "{'text': '九月', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境", "授记"], "quote": "”当天晚上，说是阿札嘉姆空行母、肌肤蓝色的女子出现在我的面前，我先问她：“这个玖纽札巴究竟是好人还是坏人？”她笑着说：“那个隐蔽的上等瑜伽士，就是萨钦根嘎嘉村，是工纽隐蔽的瑜伽士，为了净化剩余的障碍，当今受生这样的身体，遇到伏\n藏师你的缘起，是甚深心滴，美名的象征就是铃鼓，断法的象征是手鼓，名字叫‘札巴’就是名声远播的相兆，这样的吉兆祥兆实属稀少。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "灌顶", "title": "持明无畏洲、龙钦绕降、莲师三像为作者赐灌顶传承", "participants": [{"entity": "持明无畏洲", "role": "灌顶者"}, {"entity": "无垢光尊者", "role": "灌顶者"}, {"entity": "莲花生大士", "role": "灌顶者"}, {"entity": "敦珠仁波切", "role": "受者"}], "location": "", "time_info": "{'text': '第二天晚上', 'relative_to': '玖纽札巴来访', 'absolute': None}", "layers": ["证境"], "quote": "”第二天晚上，当我谒见持明无畏洲、全知龙钦绕降、莲花生大士的三尊像时，他们把两部经函放在我的头上说：“所诠句的灌顶传承，无诠义的灌顶传承，近传圆满的灌顶传承都赐予你，愿你获得，愿你圆满。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "闭关修行", "title": "作者与两弟子在珠日神山实修龙钦宁提风及绝地火一年", "participants": [{"entity": "敦珠仁波切", "role": "主体"}], "location": "珠日神山", "time_info": "{'text': '十一月初一到珠日，初十开始实修一年', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "十一月初一，我到了珠日神山，从初十那一天开始，我和自己的两位弟子一起在一年里实修龙钦宁提的风及绝地火，期间亲眼见到如宝瓶般宝瓶气的暖相。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "修行中出现宝瓶气暖相——寒冬单衣即足", "participants": [{"entity": "敦珠仁波切", "role": "主体"}], "location": "珠日神山", "time_info": "{'text': '二十八岁修行期间', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境"], "quote": "十一月初一，我到了珠日神山，从初十那一天开始，我和自己的两位弟子一起在一年里实修龙钦宁提的风及绝地火，期间亲眼见到如宝瓶般宝瓶气的暖相。而且，在寒冬腊月，周身火力旺盛，只是单层布衣就完全足够。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "闭关修行", "title": "作者与钦绕等道友依忿怒金刚法闭关修行两月", "participants": [{"entity": "敦珠仁波切", "role": "主体"}, {"entity": "诺若上师钦绕", "role": "同修"}, {"entity": "噶玛·滚秋", "role": "同修"}, {"entity": "喇嘛丹", "role": "同修"}, {"entity": "热秋", "role": "同修"}], "location": "", "time_info": "{'text': '十二月初一', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "岁\n29\n我在二十九岁那年十一月十五返回故土，十二月初一，依靠降魔金刚的伏藏品《忿怒金刚修法》，和修行道友钦绕、噶玛·滚秋、喇嘛丹及热秋等人一起在两个月期间修行。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "作者修火禅定驱走三个女鬼", "participants": [{"entity": "敦珠仁波切", "role": "主体"}], "location": "", "time_info": "{'text': '第七天的夜里', 'relative_to': '修行开始', 'absolute': None}", "layers": ["神变"], "quote": "在这过程中，那位僧人钦绕得了一个凶暴鬼王的病，要降伏妖魔使他脱离病患，就要采取修行的措施。\n第七天的夜里，三个女人来到门口时，我修火禅定，结果她们叫着“哎哟哟”而逃走了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "作者以忿怒金刚观想降伏鬼魔幻变的红猫迫使其发誓不害人", "participants": [{"entity": "敦珠仁波切", "role": "主体"}, {"entity": "诺若上师钦绕", "role": "受保护者"}], "location": "", "time_info": "{'text': '第二十一天的夜间', 'relative_to': '修行开始', 'absolute': None}", "layers": ["神变"], "quote": "我有些害怕，便观想忿怒金刚的生起次第，左手紧紧掐住它的脖子，没想到它即时变成了一个衣衫褴褛的僧人，他哀求着：“哎哟哟，快松开我的脖子，有话好说。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "修行结束白色彩虹束射住舍片片雪花翩翩飞舞", "participants": [{"entity": "敦珠仁波切", "role": "主体"}], "location": "", "time_info": "{'text': '修行结束临取悉地时', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["神变"], "quote": "我对本尊做了两千遍会供酬补，临取悉地时，有一道白色彩虹束射到我住舍上面，片片的雪花翩翩飞舞，出现了诸如此类格外吉祥的征兆。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "闭关修行", "title": "作者再次在珠日神山住修", "participants": [{"entity": "敦珠仁波切", "role": "主体"}], "location": "珠日神山", "time_info": "{'text': '三十岁', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "岁\n30\n我到了三十岁又再次到珠日神山去住，四月十八的晚上，一位空行母出现在我的面前，她周身，右侧蓝晶晶，左侧是红彤彤，中间黄澄澄，用黄的金线、红的铜线和黑的铁线系成腰带，下身穿着五彩绫罗的裙子，她说：“善男子：凡是你具备的成就相都对我讲一讲。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "传法", "title": "空行母龙扬曼询问成就相后教授直断与顿超要领融入作者心间", "participants": [{"entity": "龙扬曼", "role": "主体"}, {"entity": "敦珠仁波切", "role": "受者"}], "location": "珠日神山", "time_info": "{'text': '四月十八的晚上', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境"], "quote": "然未现前致，漂泊于三有，不清净业缘，灭于净法界，享光明法性，无勤自然得，地道之功德。直断法性谛，你已现量见，实地修捷径，大虹身教授，我精华光明，变精华母子，无别融一味。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "作者讲述三十岁前成就相——泉水恢复、死牛复生、穿墙、降伏厉鬼等", "participants": [{"entity": "敦珠仁波切", "role": "主体"}, {"entity": "滚丹", "role": "施主"}, {"entity": "诺珍玛", "role": "龙女"}], "location": "色绕秀得", "time_info": "{'text': '十六岁至三十岁之间', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境", "神变"], "quote": "顷刻间，黄风狂啸，与之同时天降霹雳，结果五头母牛和牛犊丧生，枯水沟里泉水涌流。这是不是成就相呢？再有，那个施主家的一头母犏牛死掉，我说谛实语对那个龙女宣布誓言，结果那头牛死而复生，站起来离开了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "作者在霍喇邬金嘉措家降伏厉鬼——关押二十一天后释放", "participants": [{"entity": "敦珠仁波切", "role": "主体"}, {"entity": "霍喇邬金嘉措", "role": "受害者"}], "location": "霍尔", "time_info": "{'text': '约二十九岁前', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["神变"], "quote": "于是我从离门前大约三弓的地方，不假思索地往里冲，结果径直穿墙进去了。那是成就相吗？刚到那间房子里，那个厉鬼幻变的一个老僧人就用四肢从背后捆住我说：‘现在你还有什么力量？我的力量就是这个，我能抵过你。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "圆寂", "title": "霍喇邬金嘉措因厉鬼侵害而圆寂", "participants": [{"entity": "霍喇邬金嘉措", "role": "主体"}], "location": "霍尔", "time_info": "{'text': '厉鬼被释放后第二天病情恶化', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "本来，在那二十一天期间，霍喇邬金嘉措喇嘛的病已经好转，可当天晚上他梦见那个厉鬼说：‘我在这二十一天里被一个野蛮的僧人关在监狱，饥渴难耐，饱尝痛苦，现在才到这里。’第二天早晨，他的病情也越来越恶化，最后圆寂了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "圆寂", "title": "嘉嘎喇嘛未听从作者告诫一月后去世", "participants": [{"entity": "嘉嘎喇嘛", "role": "主体"}], "location": "", "time_info": "{'text': '会供解散后一个月', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "我对嘉嘎喇嘛说：‘你在大家聚会念诵会供的时候，悄悄溜走，一个月内闭关修金刚橛。’可是他没有照我的话去做，在会供解散以后才离开，结果在后一个月里就去世了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "圆寂", "title": "达擦喇嘛未听从作者告诫骑牛惊奔送命", "participants": [{"entity": "达擦喇嘛", "role": "主体"}], "location": "", "time_info": "{'text': '返回自己家中三天后', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "我也告诉达擦喇嘛：‘你把所有过多的饮食用来熏焦烟，口里叫三遍霍尔鬼魄的名字，趁人不注意偷偷逃走，只有这样才不会有麻烦，否则必遭横死。’可是，他也没听我的话，返回自己家中，隔了三天后，骑牛到玛尔那边去，结果牦牛惊奔，就送了性命。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "依光明顿超道入定见不可思议佛刹——慧日如来、不变如来等说法", "participants": [{"entity": "敦珠仁波切", "role": "主体"}, {"entity": "慧日如来", "role": "说法者"}, {"entity": "不变如来", "role": "说法者"}], "location": "", "time_info": "{'text': '三十岁', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境"], "quote": "从那时起，依靠光明顿超之道一心一意实修的过程中，观看房间的缝隙，心一缘入定于等持中时，在一个广大境的地方，见到不可思议的佛刹，看见慧日如来为八千万眷属宣讲妙法，不变如来为十亿所化众生讲法等等，呈现出不可思议的境界。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "无疑王佛以报身装饰现于虚空中装饰品内显现佛刹——作者觉性七日方灭", "participants": [{"entity": "无疑王佛", "role": "主体"}, {"entity": "敦珠仁波切", "role": "见证者"}], "location": "", "time_info": "{'text': '三十一岁', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境"], "quote": "岁\n31\n在我三十一岁的时候，有一天，面前正对的虚空中，出现一位以报身各种装饰严饰、说是无疑王佛的如来，他身体装饰的珠串和璎珞里一一显现佛刹，我还见到那些装饰品每一个内部都有许许多多刹土，就在这般逐步显现时，我现前了不可思议的觉性，在七天之中这种景象才泯灭，以至于身边的侍者、儿子、弟子们都想到“是死相”而忧伤不已。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "空行嘎绕措化红鸟授记作者不久即现前普贤王果位", "participants": [{"entity": "嘎绕措", "role": "主体"}, {"entity": "敦珠仁波切", "role": "受者"}], "location": "", "time_info": "{'text': '三十一岁', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境", "授记"], "quote": "以慧眼而观，显现种种法，如梦亦如幻，无有常存理。一切虚空性，万法之现基，现前为虚空，修获定准士，自位自成佛，不久即现前，决定之捷径，无勤住本地，得普贤王果。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "红色小鸟授记作者为莲师信使应安住顿超殊胜深道利益众生", "participants": [{"entity": "敦珠仁波切", "role": "受者"}, {"entity": "莲花生大士", "role": "委派者"}], "location": "", "time_info": "{'text': '三十一岁', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["证境", "授记"], "quote": "凡夫之痛苦，不见其边际，觉悟轮涅现，万法大法尔，虚空瑜伽士，不久速趋至，普贤之果位，大士之快乐。儿你为利生，邬金之莲师，委派做信使，当成办他利。安住此顿超，殊胜甚深道，培育自子弟。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "灌顶", "title": "作者在嘎长夏擦活佛前听受降魔金刚伏藏法所有灌顶传承", "participants": [{"entity": "敦珠仁波切", "role": "受者"}, {"entity": "嘎长夏擦活佛", "role": "灌顶者"}, {"entity": "一世敦珠法王", "role": "法源"}], "location": "", "time_info": "{'text': '去年', 'relative_to': '敦珠仁波切', 'absolute': None}", "layers": ["史传"], "quote": "那些是成就相吗？\n去年，我在嘎长夏擦活佛面前，听受持明降魔金刚的伏藏法的所有灌顶传承，期间有一天坐在众会行列中的时候，一个女孩对我说：‘不要坐在这里。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "证境", "title": "法性现量中四灌顶能力成熟身语意境", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "主体"}], "location": "", "time_info": "{'text': None, 'relative_to': None, 'absolute': None}", "layers": ["证境"], "quote": "”在法性现量的时候，宝瓶灌顶的能力落到身体上，从而使身体成熟为金刚身，秘密灌顶的能力落到语上而成熟为金刚语的游舞，智慧灌顶的能力落到心中，使心成熟为智慧，彻悟了法性虚空藏的境界。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "传法", "title": "持明嘎绕多吉在法性现量中为敦珠讲法", "participants": [{"entity": "嘎绕多吉", "role": "说法者"}, {"entity": "伏藏大师敦珠朗巴", "role": "闻法者"}], "location": "", "time_info": "{'text': None, 'relative_to': None, 'absolute': None}", "layers": ["证境"], "quote": "句义灌顶的能力落到对境上，使一切景象转变成彩虹、明点的庄严，这所有验相，我都已经现前了。此时此刻，说是持明嘎绕多吉、身穿白色短裤的人说道：“轮涅诸显现，如梦亦如幻，大无基离根，自现无自性。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "传法", "title": "吽钦嘎日从虹光界中出现对敦珠说法", "participants": [{"entity": "吽钦嘎日", "role": "说法者"}, {"entity": "伏藏大师敦珠朗巴", "role": "闻法者"}], "location": "", "time_info": "{'text': None, 'relative_to': None, 'absolute': None}", "layers": ["证境"], "quote": "吽钦嘎日者...于七年之中，不间断修行，大虹身成佛，取受传家宝，利益他众生", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "吽钦嘎日授记敦珠七年不间断修行可得大虹身", "participants": [{"entity": "吽钦嘎日", "role": "授记者"}, {"entity": "伏藏大师敦珠朗巴", "role": "受记者"}], "location": "", "time_info": "{'text': None, 'relative_to': None, 'absolute': None}", "layers": ["授记"], "quote": "还有一次，说是吽钦嘎日阿阇黎的瑜伽士，身穿红黑黑日嘎的装束，从虹光明点界中出现说：“奇哉！你可认识我？我是持明王，吽钦嘎日者，儿你觉受增，相现为庄严，天尊及刹土，不定种种相，应当断定此，虚幻觉受相，越过歧途隘。于七年之中，不间断修行，大虹身成佛，取受传家宝，利益他众生。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "传法", "title": "嘉扬上师在梦中为敦珠宣讲断法教授", "participants": [{"entity": "嘉扬", "role": "说法者"}, {"entity": "伏藏大师敦珠朗巴", "role": "闻法者"}], "location": "喜苑", "time_info": "{'text': '三十二岁，一月初一晚上', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "过了一会儿说：“你想求的，请听我宣讲：奇哉！所谓的断法就是摧毁我执的窍诀，将四魔消灭于本地的教授，一切听闻的至极，所有修行的除障，一切万法的精髓，所有瑜伽的妙道，获得遍智一切捷径的要塞，顿然断除恶缘的教言，化险为夷的诀窍，病痛道用的深法，鬼神协助的妙方，轮涅决定为自现的方便，虚空无碍的往生法，越渡中阴法界的顿超，它是解脱唯一本位的所有妙道。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "嘉扬上师授记有缘弟子依靠此法趋入涅槃", "participants": [{"entity": "嘉扬", "role": "授记者"}, {"entity": "伏藏大师敦珠朗巴", "role": "受记者"}], "location": "喜苑", "time_info": "{'text': '三十二岁，一月初一晚上', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["授记"], "quote": "”说完作了详细解释。最后教诲我：“要把我所讲的那些内容牢记在心，为他人开示，有缘的众多弟子依靠虚空无碍之力必将于超越因果的法界中趋入涅槃。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "空行母多吉嘉姆带领敦珠飞往铜色吉祥山", "participants": [{"entity": "多吉嘉姆", "role": "引导者"}, {"entity": "伏藏大师敦珠朗巴", "role": "朝拜者"}], "location": "铜色吉祥山", "time_info": "{'text': '五月初七晚上', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "”说着所有的所依能依都融入了我自己。五月初七晚上，出现一位说是多吉嘉姆的空行母，她身青一色，全无衣饰，赤裸裸的。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "灌顶", "title": "持明吽钦嘎日在铜色吉祥山为敦珠授四灌顶", "participants": [{"entity": "吽钦嘎日", "role": "灌顶师"}, {"entity": "伏藏大师敦珠朗巴", "role": "受灌者"}], "location": "铜色吉祥山", "time_info": "{'text': '五月初七晚上', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "这时，从云隙中，一位戴宝瓶形帽的上师双手放在我的头上说：“我是持明吽钦嘎日，你是我事业的化现，愿你圆满获得无变身宝瓶灌顶，愿你圆满获得无灭语秘密灌顶，愿你圆满获得无谬意智慧灌顶，愿你圆满获得无相离言任运大乐灌顶，从即日起，愿你获得与我无二无别的灌顶。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "灌顶", "title": "莲花生大士在铜色吉祥山为敦珠授灌顶并传大圆满", "participants": [{"entity": "莲花生大士", "role": "灌顶师"}, {"entity": "伏藏大师敦珠朗巴", "role": "受灌者"}], "location": "铜色吉祥山", "time_info": "{'text': '五月初七晚上', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "”莲师双手放在我的头上说道：“善男子，愿你圆满获得能成熟的殊胜灌顶，愿你圆满获得三世如来及佛子身语意功德事业的殊妙加持悉地，愿身语意三金刚的庄严融入你，使你得以成熟、解脱进而成为三界法王，能将凡是结缘的众生领入解脱的五道十地。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "传法", "title": "莲师依《大密二取自解脱大续》为敦珠宣说大圆满", "participants": [{"entity": "莲花生大士", "role": "说法者"}, {"entity": "伏藏大师敦珠朗巴", "role": "闻法者"}], "location": "铜色吉祥山", "time_info": "{'text': '五月初七晚上', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "为此，我为你讲解一生现前成佛的妙道——大圆满。”莲师依照《大密二取自解脱大续》宣说，就如同刻印一般了然呈现在我的相续，并得以稳固。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "莲师授记敦珠后半生及晚年弘法利生", "participants": [{"entity": "莲花生大士", "role": "授记者"}, {"entity": "伏藏大师敦珠朗巴", "role": "受记者"}], "location": "铜色吉祥山", "time_info": "{'text': None, 'relative_to': None, 'absolute': None}", "layers": ["授记"], "quote": "你的前半生没有出现大灾大难，到了后半生，疾病、刀兵、饥荒等泛滥频频出现，但是，你在这一生没有结束之前，显密正法不会落入邪魔手中。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "金色空行母带领敦珠前往邬金天然尸林", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "主体"}], "location": "邬金天然尸林", "time_info": "{'text': '同一年九月的某个晚上', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "于是我安住在觉性界中醒了过来。在同一年九月的某个晚上，如纯金般肌肤黄色的一位空行母烁烁闪光，身穿一件花绿色的氆氇。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "传法", "title": "金刚亥母等三位空行主尊为敦珠讲法并传《空行集聚雪亮弯刀》等", "participants": [{"entity": "金刚亥母", "role": "说法者"}, {"entity": "益西措嘉空行母", "role": "说法者"}, {"entity": "释迦德瓦", "role": "说法者"}, {"entity": "伏藏大师敦珠朗巴", "role": "闻法者"}], "location": "邬金天然尸林", "time_info": "{'text': '同一年九月的某个晚上', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "”三位空行主尊，同一密意、异口同声说：“奇哉！具有缘分之善男子，且观当今藏土世界，称伏藏师多之又多，自恃清高摇摆游荡，所\n想所行多是虚伪。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "三位空行母授记敦珠有十六位超群弟子", "participants": [{"entity": "金刚亥母", "role": "授记者"}, {"entity": "伏藏大师敦珠朗巴", "role": "受记者"}], "location": "邬金天然尸林", "time_info": "{'text': None, 'relative_to': None, 'absolute': None}", "layers": ["授记"], "quote": "最后教诲：“善男子，你有缘的弟子中有十六位超群绝伦者，一般的弟子数以百计，播下解脱种子的有一百三十五位，现在不是伏藏法长久住世的时候，当为有福分的弟子们宣讲并嘱咐他们实地修持。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "敦珠三十三岁梦中认出梦境并降伏恶僧", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "主体"}], "location": "", "time_info": "{'text': '三十三岁，二月初七晚间', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "正当万分恐惧的那一刻，我顿然认识了梦境，随即吟唱了这首歌：“嘿嘿！请听暴虐油子僧，携带野蛮丑女伴，你是迷梦之妄相，我是空色无形身，岂有所杀与能杀？我与你是一味体，好似面容镜中像，虽现显现显现者，一切皆是空自性，空性不可杀空性，杀我你俩也死殁，无死唯是显现死，彩虹虚空之图画，虚空消于虚空中，今你与我无有别，离戏法界净虚空，自然大胜阿阿啪达。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "红色小鸟对敦珠说法——一切不会永久常存", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "闻法者"}], "location": "", "time_info": "{'text': '三十三岁七月二十一日', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "在那一年的七月二十一日当天，一只红色小鸟对我说：奇哉！善男子请倾听，众多了不起的大德已趋入不现的法界，留下浊世的孤儿，也不会永久常存。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "传法", "title": "小鸟在光明顿超法界中为敦珠唱法偈——真伏藏师罕见", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "闻法者"}], "location": "", "time_info": "{'text': '三十三岁十一月初十', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "你没见母子成百增长？高高坚固的岩石山，虽不是所有动物的住所，却是鸟王雄鹰的栖地，你没见秃鹰母子的增长？不定寂静的深山，虽不是所有人的住所，却是殊胜舍事者的栖身之地，你没见眷属弟子云集？空中繁星众多，独有日月罕见；大地花朵众多，独有昙花罕见；树木森林众多，如意妙树罕见；成群猛兽众多，白色雄狮罕见；获人身者众多，具实义者罕见；声称上师众多，真正上师罕见；形象僧人众多，具戒僧人罕见；空谈智者众多，法入心者罕见；口说修行众多，实证空性罕见；口说成就众多，真成就者罕见；称伏藏师虽多，真伏藏师罕见。\n不知伏藏师否？善缘大德请听，自现精华光明，深道虹身大法，一缘专注修行，即生定得解脱。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "敦珠三十四岁举行黑怒母会供时天降鹰翎、空传乐声", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "主体"}], "location": "", "time_info": "{'text': '三十四岁，一月二十五日', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["神变"], "quote": "一月二十五日，在举行《黑怒母修法》的会供时，彩虹光束网络密布，天上飘下雄鹰的翎毛。与会的人们都听到从荡荡的空中传来管乐和琵琶非常动听的音声。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "梦中钦则益西多吉请求投生为敦珠之子", "participants": [{"entity": "钦则益西多吉", "role": "主体"}, {"entity": "伏藏大师敦珠朗巴", "role": "父亲"}, {"entity": "赤松德赞", "role": "前世身份"}], "location": "", "time_info": "{'text': '三十四岁，一月二十五日晚上', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "我投你子为摄受，培育剩余所化众，必须前往此人间，今日来至你林园，我是法王赤松者，钦则益西多吉也，断绝怀疑殊胜士，究竟父子成无别，得以同生极乐国。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "梦中见极乐世界——空行母解说自现义", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "主体"}], "location": "", "time_info": "{'text': '三十四岁，五月初三夜里', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "当我问那位空行母：“这般令人感到无比快乐、动人心弦，那边的地方到底是哪儿呀？”她说：“那边的地方就是极乐世界，那光芒是阿弥陀佛的光，如果发愿，将来你也将往生到那儿。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "灌顶", "title": "狮面空行赐敦珠松石莲花碗和铜蓝宝箧并嘱念十字心咒", "participants": [{"entity": "狮面空行", "role": "授予者"}, {"entity": "伏藏大师敦珠朗巴", "role": "受者"}], "location": "", "time_info": "{'text': '三十四岁，十月十八日晚上', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "十月十八日晚上，一位狮面空行降临到我面前，她把松石的莲花碗和两个铜蓝宝箧交给我说：“善男子，你把这三件东西吞下去吃了。我的所有念修法会了然在心，阻碍你的违缘重重，要持诵空行心血的精髓十字心咒。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "空行母色创玛带敦珠观未来缘起——供杯与佛塔", "participants": [{"entity": "色创玛", "role": "引导者"}, {"entity": "伏藏大师敦珠朗巴", "role": "主体"}], "location": "", "time_info": "{'text': '三十五岁，五月十五夜晚', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "岁\n35\n当我三十五岁的时候，五月十五夜晚梦里：一位说是色创玛（金鬘母）空行母的女孩问：“去看看未来所发生的事好吗？”于是我和她结伴而行，到了一个全然陌生的地方，在一座大山坡上，有四脚撑起的佛塔，它的下面，有一个就像小匣子一样的石角，里面有大约一百五十个供水杯。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "空行母吉德姆预告次日具戒人发疯须用断法降伏", "participants": [{"entity": "吉德姆", "role": "授记者"}, {"entity": "伏藏大师敦珠朗巴", "role": "受记者"}], "location": "", "time_info": "{'text': '三十五岁，十二月十九日晚上', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["授记"], "quote": "在那一年的十二月十九日的晚上梦里：一位说是吉德姆空行母翠绿璁玉色的女子来到我的跟前说：“最上士夫你倾听，明日下午之时分，一位具戒之人，被凶戾魔鬼左右，精神颠狂准备自杀，为了调伏他，要使用断魔最甚深的窍诀，来消除他的迷乱，将他的神识超度到法界，以血肉作宴请。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "敦珠以断法治愈比丘多勒的疯病", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "主体"}, {"entity": "多勒", "role": "受益者"}], "location": "", "time_info": "{'text': '三十五岁', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["史传"], "quote": "刚到疯人跟前，我就用一张全人皮猛打他，当全人皮从腰间折断时，我想起了昨晚的梦，不由自主地生起了顾虑。到了次日，疯人病好了，可我的心却一直嘣嘣跳个不停，无法入睡，不论怎么作赎命、回向、会供、酬补都无济于事。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "闭关修行", "title": "敦珠在危险山岩中修行克服心悸", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "主体"}], "location": "", "time_info": "{'text': '三十五岁', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["史传"], "quote": "修'病也欢喜死也快乐'，到一个又危险又恐怖的山岩里...病就杳无踪迹了", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "敦珠在梦中降伏革戒滚波派来的黑人大臣", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "主体"}, {"entity": "革戒滚波", "role": "指使者"}], "location": "", "time_info": "{'text': '三十六岁，七月初九夜晚', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "岁\n36\n我三十六岁那年七月初九的夜晚，在梦里，出现一个凶相毕露的黑人，他一手插入我的怀里说：“我是革戒滚波的大臣，被派来取你的心肺。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "敦珠以断法治愈朗拉瓦的疯病", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "主体"}, {"entity": "朗拉瓦", "role": "受益者"}], "location": "", "time_info": "{'text': '三十六岁', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["史传"], "quote": "当时，有一个叫朗拉瓦的人，被藏巴喇嘛诅咒，为了回遮，他念诵大白伞盖，结果发疯了，后来他到我的跟前，我也凭借断法的教授而祛除了他的病。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "敦珠降伏七个黑色女人随从的魔鬼并令其发誓", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "主体"}], "location": "", "time_info": "{'text': '三十六岁，十月某夜', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "他承诺：发誓绝不害你的子徒", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "闭关修行", "title": "敦珠修阿巴绕大财神法并面见大财神", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "修行者"}, {"entity": "大财神", "role": "现身者"}], "location": "", "time_info": "{'text': '三十六岁，十一月初十至十二月初五', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "十一月初十那天，我开始修《阿巴绕大财神法》，十二月初五的晚上，面见了大财神，他说：“九年之内，凡是给你的财产切不可要，九年之后，我将给予你所需求的一切。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "大财神授记敦珠九年后赐予所需及弟子状况", "participants": [{"entity": "大财神", "role": "授记者"}, {"entity": "伏藏大师敦珠朗巴", "role": "受记者"}], "location": "", "time_info": "{'text': '三十六岁，十二月初五', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["授记"], "quote": "十一月初十那天，我开始修《阿巴绕大财神法》，十二月初五的晚上，面见了大财神，他说：“九年之内，凡是给你的财产切不可要，九年之后，我将给予你所需求的一切。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "空行母旺吉嘉姆指示敦珠前往金刚空行地与坡隆修行", "participants": [{"entity": "旺吉嘉姆", "role": "授记者"}, {"entity": "伏藏大师敦珠朗巴", "role": "受记者"}], "location": "", "time_info": "{'text': '三十六岁，十二月初三', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["授记"], "quote": "凡今转生你处者，皆会获得少成就，酿芒小谷住一时，以精进修行诛业，降伏佛教之怨敌，坡隆附近之山上，\n即是财神之圣地，依诛法力获名誉，暂时安住于彼处，善缘子徒会云集，不久前往于彼地。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "闭关修行", "title": "敦珠在酿芒山谷闭关修大自在天", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "修行者"}, {"entity": "大自在天", "role": "所修本尊"}], "location": "酿芒", "time_info": "{'text': '铁羊年（三十七岁），一月初一至二月十五', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["史传"], "quote": "岁\n37\n我三十七岁的那一年是铁羊年，一月初一当天，我来到玛尔的酿芒山谷，开始修大自在天，从一月十五到二月十五之间严格闭关修行期间，大自在天直接赐给我说是挖眼锐利铁钩的咒语五字真言。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "灌顶", "title": "大自在天直接赐予敦珠挖眼锐利铁钩五字真言", "participants": [{"entity": "大自在天", "role": "授予者"}, {"entity": "伏藏大师敦珠朗巴", "role": "受者"}], "location": "酿芒", "time_info": "{'text': '三十七岁闭关期间', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "岁\n37\n我三十七岁的那一年是铁羊年，一月初一当天，我来到玛尔的酿芒山谷，开始修大自在天，从一月十五到二月十五之间严格闭关修行期间，大自在天直接赐给我说是挖眼锐利铁钩的咒语五字真言。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "敦珠念修大自在天咒十天令佛教怨敌双目失明", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "主体"}], "location": "", "time_info": "{'text': '三十七岁', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["史传"], "quote": "岁\n37\n我三十七岁的那一年是铁羊年，一月初一当天，我来到玛尔的酿芒山谷，开始修大自在天，从一月十五到二月十五之间严格闭关修行期间，大自在天直接赐给我说是挖眼锐利铁钩的咒语五字真言。我实际念修十天，那个佛教怨敌的眼睛就瞎了，依靠这种威力我赢得了名声。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "建寺", "title": "敦珠在坡隆噶托建房（七月初三打地基）", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "建造者"}], "location": "坡隆噶托", "time_info": "{'text': '三十七岁秋季七月初三', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["史传"], "quote": "到了秋季七月初三，我召集了许多做工的人打地基，在挖护法神殿的地基时，蹦出来金子、松石、海螺三块珍宝和铜、银、铁三块，还有黄铜、铜蓝、珊瑚等，熟知不熟知的珍宝足足有一小盆，我知道这是福报和受用增上的缘起。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "坡隆噶托建寺挖地基时出土珍宝六种", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "主体"}], "location": "坡隆噶托", "time_info": "{'text': '三十七岁秋季七月初三', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["神变"], "quote": "到了秋季七月初三，我召集了许多做工的人打地基，在挖护法神殿的地基时，蹦出来金子、松石、海螺三块珍宝和铜、银、铁三块，还有黄铜、铜蓝、珊瑚等，熟知不熟知的珍宝足足有一小盆，我知道这是福报和受用增上的缘起。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "益西措嘉梦中指示弟子达玛巴之前世因缘与修行潜力", "participants": [{"entity": "益西措嘉空行母", "role": "授记者"}, {"entity": "伏藏大师敦珠朗巴", "role": "闻法者"}, {"entity": "达玛巴", "role": "被授记者"}], "location": "", "time_info": "{'text': '三十七岁，十一月初十', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["授记"], "quote": "当天夜里，空行母益西措嘉说：“我是空行益西措嘉，你有什么事要做的？”我连忙回禀：“这个弟子诚恳祈求说‘需要黑怒母的一个修法’，我已经开始造了，不知好不好？”空行母说：“现在你的这个弟子，原是伏藏大师西绕哦色的弟子桑格嘉措，尽管拥有上师的愿力，可是由宿业所感，如今投生为下劣种\n姓的人。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "敦珠梦中见上师嘉扬于东方现喜刹土并汇报伏藏经历", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "汇报者"}, {"entity": "嘉扬", "role": "听法者"}], "location": "东方现喜刹土", "time_info": "{'text': '三十七岁，十二月初八晚间', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "岁\n33\n我到了三十三岁时，二月初七晚间梦里，一位让人目不忍睹、十分恐怖的僧人，用一把锋利的匕首插入我的心脏，恶狠狠地说：“今天晚上就是我杀你的时刻。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "伏藏开取", "title": "敦珠自述从瓦得岩等六处开取深密空行心滴伏藏品", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "伏藏师"}], "location": "玛尔", "time_info": "{'text': None, 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "我开取深法空行心滴标题的情况是这样的：从玛尔的瓦得岩、尊木俄古岩、玛尔的波宗佛塔、吉珠佛\n塔、札西古芒和喜热坚里，得到了标题、副标题等石质、竹管、土、紫胶、木质所制的宝箧，存在于石炭里没有宝箧的卷纸也都得到了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "弘法", "title": "敦珠将忿怒空行母修法立成文字——风吹文稿为普及之兆", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "著者"}], "location": "", "time_info": "{'text': '水猴年（三十八岁）', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["史传"], "quote": "诸佛真实智悲力，三部怙主身语意，幻化应机调众现，不可思议金刚语，三种深法之喜宴，满足所愿多稀奇！遇彼极其有缘者，即是最后有者矣，愚傲搅心其余者，纵以妒心妄中伤，拥有修证老人我，心安理得真快乐！\n岁\n38\n我三十八岁那一年是水猴年，在将《忿怒空行母修法》立成文字期间，刮起了一场狂风，将文稿吹到四面八方，我清楚这是普及各方的象征。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "班玛札西写忿怒空行母文稿时天降乳汁", "participants": [{"entity": "班玛札西", "role": "主体"}], "location": "", "time_info": "{'text': '三十八岁', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["神变"], "quote": "当时，鸟王雄鹰漫山遍野，空行之灵——鹰鹫的翎羽如雨洒落。弟子班玛札西立誓把它作为自己的修法，在他开始写文字的当天，从朗朗的天空中，降下营养丰富、味道鲜美的乳汁，足有一碗。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "才杰写忿怒空行母文稿时出现五色彩虹", "participants": [{"entity": "才杰", "role": "主体"}], "location": "", "time_info": "{'text': '三十八岁', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["神变"], "quote": "弟子才杰，以十分喜悦之情想把它作为自己的修法，在写文稿的过程中，他住宅的上面呈现出五种成匹绸缎般的彩虹，那标志着解脱成为虹身幻身。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "圆寂", "title": "弟子才杰在拉萨圆寂时出现彩虹光幕等超胜验相", "participants": [{"entity": "才杰", "role": "圆寂者"}], "location": "拉萨", "time_info": "{'text': None, 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "弟子才杰，以十分喜悦之情想把它作为自己的修法，在写文稿的过程中，他住宅的上面呈现出五种成匹绸缎般的彩虹，那标志着解脱成为虹身幻身。到最后，他在拉萨圆寂之时，也出现了彩虹光幕及超胜的验相，成为卫藏、后藏等众所周知的一件奇迹。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "闭关修行", "title": "敦珠与三位高足闭关一月修忿怒空行母法", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "主修者"}, {"entity": "才杰", "role": "修行道友"}, {"entity": "班玛札西", "role": "修行道友"}, {"entity": "邬金", "role": "修行道友"}], "location": "", "time_info": "{'text': '三十八岁十一月', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["史传"], "quote": "在十一月里，我进入一个月的《忿怒空行母法》修行时，修行的道友只有高足才杰、班玛札西和邬金三人，因为我断定他们必然是恪守誓言的人。在那期间，鸟王雄鹰的翎毛飘然而落，芬芳的妙香遍满舍宅，诸如此类的瑞相纷纷呈现。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "灌顶", "title": "空行母赐敦珠铁金刚橛", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "受者"}], "location": "", "time_info": "{'text': '三十九岁，五月初九夜', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "岁\n39\n转年，我到了三十九岁，五月初九的夜里，一位空行母说：“这是你需要的东西。”说完交给我一个铁金刚橛，那个金刚橛格外精美，令\n人合意，系着黑绫子，顶端还系着一个不太好看的石头橛。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "空行母授记多吉桑波为益西措嘉化身可获虹身成就", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "闻法者"}, {"entity": "多吉桑波", "role": "被授记者"}], "location": "", "time_info": "{'text': '三十九岁，五月初十晚', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["授记"], "quote": "在当天晚上，一位空行母说：“这位多吉桑波是空行益西措嘉的化身，要宣讲所有教授的醍醐，此人的心很有危险被邪教转变，如果没有转变而听从你的话，那么能将无数所化众生领入解脱道，最后获得虹身成就，肉身化光而解脱。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "传法", "title": "空行母格则玛为敦珠传教言——五大皆虚空自性即大圆满", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "闻法者"}], "location": "", "time_info": "{'text': '三十九岁，十月初八夜', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "奇哉！有缘之士你听：地是虚空自性，虚空显现为地，水是虚空自性，虚空显现为水，火是虚空自性，虚空显现为火，风亦虚空自性，虚空显现为风，虹是虚空自性，虚空显现彩虹。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "智慧自在母解释日月星辰同升之相兆意义", "participants": [{"entity": "智慧自在母", "role": "授记者"}, {"entity": "伏藏大师敦珠朗巴", "role": "受记者"}], "location": "", "time_info": "{'text': '四十岁，二月初三晚上', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["授记"], "quote": "于是我问她：“天上同时升起这些日月星辰是什么相兆？”她娓娓解释说：“奇哉，善缘之士请你听：东方朝阳冉冉升起，那表示红黑现巴夜叉；阳光普照大地，表示无偏护持传承；天空明月高挂，那表示大自在天；月光普洒地面，表示佛教遣除恼热；南方出现启明星，那表示空行护持佛法；北方升起彗星，那表示事业由绕呵拉护法来成办。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "传法", "title": "布玛莫札以瑜伽士身为敦珠宣说轮涅圆满教授", "participants": [{"entity": "布玛莫札", "role": "说法者"}, {"entity": "伏藏大师敦珠朗巴", "role": "闻法者"}], "location": "", "time_info": "{'text': '四十岁，四月十五晚上', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "”他问：“给你直指见解、修行的上师是谁？”我说：“在这个世界上，给我直指见修人中的上师一个也没有，有时我是凭着自力证悟，有时靠持明上师们和佛母、智慧空行众在觉受或梦境中作指点，这种情况屡屡出现，使我原原本本认识了轮回涅槃大圆满的实相或本性。”他又说：“我来给你宣讲轮回涅槃圆满的教授。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "传法", "title": "梦中妙慧老人与敦珠就伏藏师真伪进行长篇对话", "participants": [{"entity": "妙慧", "role": "对话者"}, {"entity": "伏藏大师敦珠朗巴", "role": "对话者"}], "location": "", "time_info": "{'text': '四十岁，十月初九夜晚', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "”他说：“你怎么取上伏藏师名称的？声称伏藏师的人很多，可是当今无误的伏藏师没有啊！”我不屑地说：“给你一个老头子讲伏藏的历史，你也不懂，没有必要。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "敦珠依靠绕呵拉护法以伏藏法对治抢马仇敌", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "主体"}, {"entity": "绕呵拉", "role": "护法"}, {"entity": "布索", "role": "仇敌"}, {"entity": "秋西多勒", "role": "仇敌"}, {"entity": "秋西旺波", "role": "仇敌"}], "location": "", "time_info": "{'text': None, 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "’于是，我马上召集众弟子们祈祷一千遍绕呵拉护法神，最后放咒。结果在十一月二十九的夜里，狂风大作，天降大冰雹，与之同时，巨雷大震，在这些上面降下星曜之雨，秋西多勒牙关紧咬不能开合，吃不进去饭；嘎卡札口吐鲜血而亡，所夺的马等还回来了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "敦珠念咒令反对者杰姆拉布人财两空", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "主体"}, {"entity": "杰姆拉布", "role": "对手"}], "location": "", "time_info": "{'text': None, 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "在我建房子、修寺院的过程中，一个名叫杰姆拉布的人说‘我的冬牧地被你们抢去，这罪过可严重了’来反抗，我念诵红黑现巴夜叉护法神心咒，结果他人财两空。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "闭关修行", "title": "敦珠修一月降魔金刚伏藏法《忿怒金刚》并修忿怒母法", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "修行者"}], "location": "", "time_info": "{'text': '四十岁，十一月初一至十二月十五', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["史传"], "quote": "说完他就融入了岩石中。在那一年十一月初一，我开始修一个月的降魔金刚伏藏法《忿怒金刚》，从十二月初五到十五之间修行《忿怒母法》。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "密藏主母空行指示敦珠去雅青喇荣沟暂住", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "受记者"}], "location": "", "time_info": "{'text': '四十一岁，五月十八', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["授记"], "quote": "”她接着吟唱起这首歌：“冤魂幻化来反对，怨鬼垂手取掌中，鬼蜮握入手中缘，受用财富恶魔反，其果不安痛楚起，尔时非为留住时，去往西南交界处，名为雅青喇荣沟，暂时安住则善妙，美名远扬增吉利，具缘子徒纷纷至，莫忘如此记心里。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "梦中老虎吐出老妇人母子讲述劫形成史与未来情形", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "听闻者"}], "location": "", "time_info": "{'text': '四十一岁，六月某夜', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "”于是那个老妇女详详细细讲述了初劫形成的原始历史。接着，那个孩子又叙述了未来的情形，我就这样听着他们详尽讲说，但唯恐篇幅冗长，而没有书写。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "敦珠在普隆噶托播种两袋青稞收获五十一袋", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "主体"}], "location": "坡隆噶托", "time_info": "{'text': '四十二岁，三月初一播种', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["史传"], "quote": "”她的话音刚落，那只老虎就把她吞到口里，它一边说“边陲野人临近会毁灭佛法”，一边与云朵浑然融合而消失。\n岁\n42\n我四十二岁的时候，在三月初一的那一天，我在普隆噶托耕地，播下两皮口袋青稞，秋天时收获了五十一皮口袋。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "大獠牙护财空行带敦珠飞往普陀山朝拜观音", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "朝拜者"}, {"entity": "大悲观世音", "role": "受朝拜者"}], "location": "普陀山", "time_info": "{'text': '四十二岁，八月十五晚上', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "八月十五的晚上，一位空行母，肌肤黄色，宛如纯金般光彩夺目，她身穿一件白缎子的裙子，来到我的对面说：“去南方普陀山朝拜好吗？”我问：“你是谁？”她说：“我是住在普陀山的大獠牙护财空行，前世我们有缘，你的那个明妃就是我的化身，来唤你到那里。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "灌顶", "title": "大悲观音在普陀山为敦珠授灌顶传承", "participants": [{"entity": "大悲观世音", "role": "灌顶师"}, {"entity": "伏藏大师敦珠朗巴", "role": "受灌者"}], "location": "普陀山", "time_info": "{'text': '四十二岁，八月十五晚上', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "观音又说：“现在给予你我修行此法的灌顶和传承。”说完就宣讲了一遍，结尾时说：“愿以宝瓶灌顶使身体成熟为金刚身，愿以秘密灌顶使语成熟为金刚语，愿以智慧灌顶使意成熟为金刚意，愿以句义灌顶使境心转移、成熟、解脱为身智的庄严。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "观音授记敦珠弟子居深山可获虹身成就", "participants": [{"entity": "大悲观世音", "role": "授记者"}, {"entity": "伏藏大师敦珠朗巴", "role": "受记者"}], "location": "普陀山", "time_info": "{'text': None, 'relative_to': None, 'absolute': None}", "layers": ["授记"], "quote": "如今你在良辰吉日做会供，至关重要。所有弟子如果能够居于深山，会涌现出一批获得虹身成就的人，我予以授记。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "闭关修行", "title": "敦珠四十二岁冬三月闭关修本尊法", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "修行者"}], "location": "", "time_info": "{'text': '四十二岁冬三月', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["史传"], "quote": "”随后，那个女子一边说“走吧、走吧”一边牵着我的手，结果我醒了。\n接下来冬天的三个月里，我进入本尊念修，严格闭关。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "普明具目母空行授记宗萨札山为空行安乐源可得悉地", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "受记者"}], "location": "", "time_info": "{'text': '四十三岁，四月初十晚', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["授记"], "quote": "岁\n43\n我四十三岁那年，四月初十的晚上，说是普明具目母的一位空行对我说：“善男子且听我言：依照南方使者语，幼狮腾越雪山巅，绿色鬃毛极完美，东宗萨札此座山，是赞木真玛波处，佛母空行安乐源，俱胝空行眷属绕，若有彼处修行缘，除非是破誓言人，皆得一分微悉地，不要忘记铭刻心，具有缘分善男子！”说完就消失了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "弘法", "title": "敦珠在多耶藏钦寺和诺若寺祈求心子钦则涅革坐床", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "主体"}, {"entity": "钦则益西多吉", "role": "坐床者"}], "location": "多耶藏钦寺", "time_info": "{'text': '四十三岁五月初一起', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["史传"], "quote": "岁\n43\n我四十三岁那年，四月初十的晚上，说是普明具目母的一位空行对我说：“善男子且听我言：依照南方使者语，幼狮腾越雪山巅，绿色鬃毛极完美，东宗萨札此座山，是赞木真玛波处，佛母空行安乐源，俱胝空行眷属绕，若有彼处修行缘，除非是破誓言人，皆得一分微悉地，不要忘记铭刻心，具有缘分善男子！”说完就消失了。五月初一我开始上路，多耶藏钦寺，祈求心子钦则涅革（智悲芽）坐床，后来到了诺若寺，他们也祈求他坐床。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "闭关修行", "title": "敦珠四十三岁冬三月闭关修本尊法", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "修行者"}], "location": "", "time_info": "{'text': '四十三岁冬三月', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["史传"], "quote": "在那年冬季的三个月，我也闭关修本尊法，期间，许多空行献上食品、财物、衣服等各种妙不可言的受用，三次在觉受、梦境中发愿、得受灌顶。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "囊哲旺姆空行授记敦珠前往匝嘉华哦及蛇年往色达", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "受记者"}], "location": "", "time_info": "{'text': '四十四岁，一月初十晚', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["授记"], "quote": "岁\n44\n在我四十四岁那一年一月初十的晚上，说是囊哲旺姆空行的一位女子，翠绿璁玉的肤色，佩带骨质六饰，她对我说：“具有多劫愿力缘起力的士夫，使者劝请有重大意义的必要，去匝嘉华哦神山附近，小住一段时间。玛嘉波热护法神奉送财物，达嘉华哦承侍于你，在蛇年，前往色达山谷，弟子兴盛，也富有声誉，如果执意住在此地，会有大难临头，因此要明白这件事。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "敦珠前往石渠途中三百头野牛同行三天——玛嘉护法迎送", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "主体"}, {"entity": "玛嘉波热", "role": "护法"}], "location": "玛多", "time_info": "{'text': '四十四岁五月初一启程', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["神变"], "quote": "五月初一那天，我启程到香匝切嘎（石渠）去时，玛多地方有三百头野牛和我们一起同行了三天，我们白天提前行路，晚上住在附近\n地方，我知道这是玛嘉护法神派遣迎送的。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "护法根嘎云讷梦中先行通知擦哲腾出住所", "participants": [{"entity": "根嘎云讷", "role": "护法使者"}, {"entity": "擦哲", "role": "受通知者"}], "location": "匝嘉寺", "time_info": "{'text': '四十四岁', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["神变"], "quote": "五月初一那天，我启程到香匝切嘎（石渠）去时，玛多地方有三百头野牛和我们一起同行了三天，我们白天提前行路，晚上住在附近\n地方，我知道这是玛嘉护法神派遣迎送的。过后的一天夜晚梦里，神山护法根嘎云讷说：“我先行一步，提前通知擦哲，需要腾出住所。”说完他就走了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "迎请", "title": "匝嘉寺僧人列队恭迎敦珠师徒并安顿于擦哲仁波切寝室", "participants": [{"entity": "伏藏大师敦珠朗巴", "role": "受迎者"}, {"entity": "擦哲", "role": "迎请者"}], "location": "匝嘉寺", "time_info": "{'text': '四十四岁', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["史传"], "quote": "当天，遇到匝嘉寺的人来迎接。第一天到达匝嘉寺时，僧人列队恭迎，擦哲师徒三人也出来相迎，祈请我的小儿坐床，擦哲仁波切的寝室作为住舍，我们安顿下来。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "传法", "title": "敦珠在匝嘉寺面见无垢光尊者获完整大圆满教授", "participants": [{"entity": "无垢光尊者", "role": "说法者"}, {"entity": "伏藏大师敦珠朗巴", "role": "闻法者"}], "location": "匝嘉寺", "time_info": "{'text': '四十四岁，到匝嘉寺第七天晚上', 'relative_to': '敦珠朗巴', 'absolute': None}", "layers": ["证境"], "quote": "第一天到达匝嘉寺时，僧人列队恭迎，擦哲师徒三人也出来相迎，祈请我的小儿坐床，擦哲仁波切的寝室作为住舍，我们安顿下来。第七天的晚上，我面见全知无垢光尊者，他完整恩赐大圆满的教授，并完全交付。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "空行母授记敦珠林巴带小儿子拜华智仁波切", "participants": [{"entity": "敦珠仁波切", "role": "受记者"}], "location": "", "time_info": "{'text': '六月初九的晚上', 'relative_to': None, 'absolute': None}", "layers": ["授记"], "quote": "六月初九的晚上，又有一位空行母说：“明天带着小儿子到华智仁波切面前，请求一些传承，会得到。”初十当天，我们来到华智仁波切面前，正赶上他们做完会供接受供养的献新之时，上师说：“缘起非常好，供养献新就给这两位吧。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "传法", "title": "华智仁波切为敦珠林巴传授多部论典引导传承", "participants": [{"entity": "华智仁波切", "role": "传法者"}, {"entity": "敦珠仁波切", "role": "受法者"}, {"entity": "钦则益西多吉", "role": "受法者"}], "location": "", "time_info": "{'text': '初十当天起', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "”我们遵照他所说呆在那儿，结果上师完整宣讲《入行论》、《现观庄严论》、《入中论》、《密藏续》等许多引导传承，我们都得到了。后来，智悲芽师徒住在该寺，我们师徒五人准备在十月初十回到故土，谁知途中下起一场大雪，心里不免有些害怕、恐慌。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "红黑现巴夜叉护法神使大雪停止", "participants": [{"entity": "红黑现巴夜叉护法神", "role": "主体"}, {"entity": "敦珠仁波切", "role": "受益者"}], "location": "", "time_info": "{'text': '十月初十回故土途中', 'relative_to': None, 'absolute': None}", "layers": ["神变"], "quote": "后来，智悲芽师徒住在该寺，我们师徒五人准备在十月初十回到故土，谁知途中下起一场大雪，心里不免有些害怕、恐慌。晚上，我\n梦到红黑现巴夜叉护法神说：“你们不要害怕，不要痛苦，我使大雪不再下。”从那时起，当年整个冬天都不曾下雪。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "敦珠林巴以伏藏法诅咒仇敌秋古拉丹", "participants": [{"entity": "敦珠仁波切", "role": "主体"}, {"entity": "秋古拉丹", "role": "受害者"}], "location": "", "time_info": "{'text': '四十五岁，十七的黄昏', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["史传"], "quote": "”十七的黄昏，我用自己伏藏品的《曜护法神法》诅咒，结果在当天晚上，仇敌家降下凶曜，第二天，帐篷里一条柱子粗的黑蛇一直在盘旋。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "玛多土地神永仲嘉则阻止敦珠林巴离开", "participants": [{"entity": "永仲嘉则", "role": "主体"}, {"entity": "敦珠仁波切", "role": "被阻者"}], "location": "玛多", "time_info": "{'text': '四十六岁', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["神变"], "quote": "岁\n46\n我到了四十六岁时，就打算去色达上方喇荣山沟，先派三人前往，结果玛多的永仲嘉则（土地神）不想让我走，使所有马匹都瘫卧不起，无法行进。当我们准备往回返时，所有的马都站起来返回。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "敦珠林巴降伏喇荣的凶龙", "participants": [{"entity": "敦珠仁波切", "role": "主体"}], "location": "喇荣", "time_info": "{'text': '五月初三', 'relative_to': None, 'absolute': None}", "layers": ["神变"], "quote": "五月初三，我来到了色达上方的喇荣，那里住着一条凶悍的龙，骑着一个裸体的人，来到我的面前说：“你不可以住在这儿，这样会对我们造成极大的损害。”我说：“我给你造一个供台，不要紧。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "敦珠林巴降伏紫青草原树神母", "participants": [{"entity": "敦珠仁波切", "role": "主
