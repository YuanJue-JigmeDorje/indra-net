来奉诏前往汉地。起初作为皇帝的诵经师，他以其超凡绝伦的威力和咒力，能保护庄稼免遭灾害，用灵器食子能摧毁雷雹等的侵袭。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "宿·桑波华禳解恶蝎相乌云凶兆", "participants": [{"entity": "宿·桑波华", "role": "主体"}], "location": "地德", "time_info": "", "layers": ["神变"], "quote": "尤其是有一次，皇宫地德的上空，出现了恶蝎相乌云的凶兆，谁也无法消除它。当时皇帝下诏书，宿·桑波华作了禳解术，施食子，跳起舞，结果乌云散去，诸如此类在边地多次展现出佛法的优胜性，使皇帝生起信心，在他面前请求了真实九本尊的灌顶和长寿灌顶。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "皇帝弯颜特在宿·桑波华前请求灌顶", "participants": [{"entity": "弯颜特汗", "role": "受者"}, {"entity": "宿·桑波华", "role": "灌顶师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "当时皇帝下诏书，宿·桑波华作了禳解术，施食子，跳起舞，结果乌云散去，诸如此类在边地多次展现出佛法的优胜性，使皇帝生起信心，在他面前请求了真实九本尊的灌顶和长寿灌顶。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "宿·桑波华刻版前译派二十八法部各印一千份", "participants": [{"entity": "宿·桑波华", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "就这样，他以此丰富的财产刻版《根本密藏续》、《巴卡释》、《密宗道次第》以及《九窍诀》等前译派的二十八法部。各印一千份发给僧人。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "皇帝弯颜特驾崩后在桑波华境界中出现", "participants": [{"entity": "弯颜特汗", "role": "主体"}, {"entity": "宿·桑波华", "role": "见者"}], "location": "汉地", "time_info": "", "layers": ["神变"], "quote": "而且提供了刻宁玛续全集的物资，诸如此类，对佛教作出了巨大贡献。后来，国王弯颜特患的风病用热疗法以后就驾崩了。此时萨迦派和宿氏派宗派同心同德，十分融洽。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "护法铸像迎请到西藏时面向西藏跨越七步", "participants": [{"entity": "七步护法铸像", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "其后也赐予了他十升银子。当汉土响铜金刚萨埵佛像和护法兄妹跳神铸像迎请到西藏之时，怙主护法面向西藏跨越七步，由此被人们共称为七步护法铸像。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "宿·桑波华三十八岁在汉地圆寂", "participants": [{"entity": "宿·桑波华", "role": "主体"}], "location": "汉地", "time_info": "{'text': '三十八岁', 'relative_to': '宿·桑波华 (E_897)', 'absolute': None}", "layers": ["史传"], "quote": "”不肯离去。他在不愿意去的情况下说出了“自由自在皆安乐，受他控制皆痛苦……”的教授以后去往汉地，只住世到三十八岁。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "宿哈·释迦炯五岁时宣讲根本续令众人目瞪口呆", "participants": [{"entity": "宿·释迦炯", "role": "主体"}], "location": "", "time_info": "{'text': '五岁', 'relative_to': '宿哈·释迦炯 (E_894)', 'absolute': None}", "layers": ["史传"], "quote": "宿哈·释迦炯这位宿哈·释迦炯从小就开始研修父辈祖辈的法要，觉醒了前世的缘分，五岁时在父亲前去汉土迎接的大人物及使者中，零零碎碎、模模糊糊地宣讲根本续，使得众人目瞪口呆。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "宿哈·释迦炯受沙弥戒和比丘戒", "participants": [{"entity": "宿·释迦炯", "role": "受戒者"}, {"entity": "喇嘛根帮巴", "role": "亲教师"}, {"entity": "秋吉索朗札巴", "role": "亲教师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他从七岁开始住持讲学院。在喇嘛根帮巴面前受沙弥戒，在秋吉索朗札巴面前受比丘戒，法名为释迦炯内。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "宿哈·释迦炯在卓钦桑多面前听受《经·集密意续》灌顶", "participants": [{"entity": "宿·释迦炯", "role": "受者"}, {"entity": "卓钦桑多", "role": "灌顶师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "特别是着重探究《现观庄严论》、《入行论》、《时轮金刚》、《普作王续》、《幻化网道次第》、《密藏续》、《巴卡释》，是人们公认的大智者、大成就者，后来成为宿派的唯一教主。他在卓钦桑多面前听受《经·集密意续》灌顶时，供养了汉藏的衣物、厨具、五十斗青稞等为主的供品，传承、实修都已达到究竟。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "宿哈·释迦炯境界中见到释迦佛和黑日嘎五部佛", "participants": [{"entity": "宿·释迦炯", "role": "主体"}, {"entity": "释迦牟尼佛", "role": "显现者"}, {"entity": "黑日嘎五部佛", "role": "显现者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "为了得到印证，他又再次供养大匹锦缎和黄金令上师欢喜。在他的境界中极其明显地见到释迦佛、黑日嘎五部佛。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "宿哈·释迦炯三十八岁圆寂", "participants": [{"entity": "宿·释迦炯", "role": "主体"}], "location": "", "time_info": "{'text': '三十八岁', 'relative_to': '宿哈·释迦炯 (E_894)', 'absolute': None}", "layers": ["史传"], "quote": "而且他撰著了《集密意续释》等大量论典，对《经幻心》教法作出了卓越贡献。他培养了卓玛瓦之子桑吉仁钦、涅巴德勒巴等光显佛法的众多弟子，三十八岁时圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "桑吉仁钦嘉村六岁精通《密藏续》被释迦炯关怀备至", "participants": [{"entity": "桑吉仁钦嘉村", "role": "受者"}, {"entity": "宿·释迦炯", "role": "传法者"}], "location": "", "time_info": "{'text': '六岁', 'relative_to': '桑吉仁钦嘉村 (E_905)', 'absolute': None}", "layers": ["史传"], "quote": "人们都说：“你的这个儿子起不到利益，对他如此宠爱有什么用呢？”其父说：“他会对众生有利。”他年仅六岁时就精通了《密藏续》。当他来到宿·释迦炯面前时，宿·释迦炯说“这是我上师之子”而关怀备至，精心抚养。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "桑吉仁钦嘉村在秋库刚面前受近圆戒", "participants": [{"entity": "桑吉仁钦嘉村", "role": "受戒者"}, {"entity": "秋库刚", "role": "亲教师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "”他娶了一个妻子，生下几个儿子，就这样以居士的身份圆满学修。后来，他在秋库刚面前受近圆戒，身相极为端严。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "桑吉仁钦嘉村七十岁时摄受古云讷华传授大量法要", "participants": [{"entity": "桑吉仁钦嘉村", "role": "传法者"}, {"entity": "古云讷华", "role": "受者"}], "location": "", "time_info": "{'text': '七十岁', 'relative_to': '桑吉仁钦嘉村 (E_905)', 'absolute': None}", "layers": ["史传"], "quote": "他在七十岁那一年，摄受古罗益桑则巴，为他传授了幻化网寂猛灌顶、幻化网长寿灌顶、《根除续》灌顶、《长寿主尊》、《真实一火》灌顶、那哦巴派和达嘉派马头明王的开许、库派的金刚橛猛尊灌顶及开许、十八种心部的觉性妙力灌顶及《密藏续释》的讲解。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "桑吉仁钦嘉村七十二岁于旺札巴嘉村前依止得灌顶传承", "participants": [{"entity": "桑吉仁钦嘉村", "role": "受者"}, {"entity": "旺札巴嘉村", "role": "传法者"}], "location": "刚波山禅定洲", "time_info": "{'text': '七十二岁铁牛年', 'relative_to': '桑吉仁钦嘉村 (E_905)', 'absolute': None}", "layers": ["史传"], "quote": "尊者在八十二岁铁猪年圆寂，从小宿大师降生到此时之前显然已过了四百一十七年。\n古云讷华古云讷华大师，父亲名叫古敦炯内多吉，母亲哲塔吉，水猴年出生。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "桑吉仁钦嘉村八十二岁铁猪年圆寂", "participants": [{"entity": "桑吉仁钦嘉村", "role": "主体"}], "location": "", "time_info": "{'text': '八十二岁铁猪年', 'relative_to': '桑吉仁钦嘉村 (E_905)', 'absolute': None}", "layers": ["史传"], "quote": "如此法王桑吉仁钦在他七十二岁铁牛年来到卫藏，在刚波山的禅定洲，于旺札巴嘉村前恭敬依止，于是上师传给他《集密意续》等许多灌顶，并传讲《密藏续》等诸多传承。\n尊者在八十二岁铁猪年圆寂，从小宿大师降生到此时之前显然已过了四百一十七年。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "古云讷华在金益堪钦面前出家", "participants": [{"entity": "古云讷华", "role": "受戒者"}, {"entity": "金益堪钦", "role": "亲教师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "古云讷华古云讷华大师，父亲名叫古敦炯内多吉，母亲哲塔吉，水猴年出生。在金益堪钦面前出家，于噶玛巴德云香巴前得受菩萨戒并听受六法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "古云讷华在噶玛巴德云香巴前得菩萨戒并听受六法", "participants": [{"entity": "古云讷华", "role": "受者"}, {"entity": "噶玛巴德云香巴", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "古云讷华古云讷华大师，父亲名叫古敦炯内多吉，母亲哲塔吉，水猴年出生。在金益堪钦面前出家，于噶玛巴德云香巴前得受菩萨戒并听受六法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "古云讷华在大班智达瓦那绕那前得受无上续部灌顶并翻译", "participants": [{"entity": "古云讷华", "role": "受者"}, {"entity": "大班智达瓦那绕那", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尤其是在大班智达瓦那绕那面前得受了无上续部大多数的灌顶，并听闻了《真实名经》、《谢特论》、《略说灌顶》、六加行颂及注释，并且进行翻译。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "古云讷华在噶玛巴秋札嘉措前供养法教灌顶引导", "participants": [{"entity": "古云讷华", "role": "传法者"}, {"entity": "噶玛巴秋札嘉措", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尊者也在噶玛巴秋札嘉措前供养了三类心释等众多法教、灌顶、引导，并为第四世红帽秋吉札巴传比丘戒，而且授予《幻化网》为主新旧派如海续部的灌顶教言、窍诀引导等不可思议的法要。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "古云讷华为第四世红帽传比丘戒及新旧派灌顶教言", "participants": [{"entity": "古云讷华", "role": "传法者"}, {"entity": "第四世红帽秋吉札巴", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尊者也在噶玛巴秋札嘉措前供养了三类心释等众多法教、灌顶、引导，并为第四世红帽秋吉札巴传比丘戒，而且授予《幻化网》为主新旧派如海续部的灌顶教言、窍诀引导等不可思议的法要。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "第四世红帽金厄仁波切在宿芒寺拜见第七世噶玛巴而出家", "participants": [{"entity": "第四世红帽金厄仁波切", "role": "受戒者"}, {"entity": "第七世噶玛巴", "role": "亲教师"}], "location": "宿芒寺", "time_info": "", "layers": ["史传"], "quote": "第四世红帽金厄仁波切第四世红帽金厄仁波切，父亲东滚巴嘉，母亲名为札萨索南卓玛，水鸡年出生在哲秀康玛地方。后来在宿芒寺拜见第七世噶玛巴至尊秋札嘉措而出家，法名为秋吉札巴益西吉祥贤。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "第四世红帽金厄仁波切二十四岁受比丘戒", "participants": [{"entity": "第四世红帽金厄仁波切", "role": "受戒者"}, {"entity": "古大译师益桑则巴", "role": "亲教师"}], "location": "", "time_info": "{'text': '二十四岁', 'relative_to': '第四世红帽金厄仁波切 (E_820)', 'absolute': None}", "layers": ["史传"], "quote": "二十四岁以古大译师益桑则巴作为亲教师而受了比丘戒，先后闻受《时轮金刚》、《胜乐金刚》、《喜乐金刚》、《大威德》等新派诸续部以及《幻化网密藏续》等的灌顶及教授等无量法要。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "红帽金厄仁波切闻受新派诸续部及幻化网密藏续等灌顶教授", "participants": [{"entity": "第四世红帽金厄仁波切", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "二十四岁以古大译师益桑则巴作为亲教师而受了比丘戒，先后闻受《时轮金刚》、《胜乐金刚》、《喜乐金刚》、《大威德》等新派诸续部以及《幻化网密藏续》等的灌顶及教授等无量法要。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "金厄仁波切闻金刚橛灌顶时梦中见到莲花生大士", "participants": [{"entity": "第四世红帽金厄仁波切", "role": "受者"}, {"entity": "莲花生大士", "role": "授予者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "而且在安兰嘉瓦秋扬的后裔大译师索南嘉措面前也听受了众多新旧派法门。在古译师面前闻受金刚橛灌顶时梦中见到莲花生大士尊颜，也得到莲师赐予教授。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "第四世红帽金厄仁波切七十三岁木鸡年圆寂", "participants": [{"entity": "第四世红帽金厄仁波切", "role": "主体"}], "location": "", "time_info": "{'text': '七十三岁木鸡年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "在古译师面前闻受金刚橛灌顶时梦中见到莲花生大士尊颜，也得到莲师赐予教授。他在为所化众生开示新旧派诸法理以后，于七十三岁木鸡年圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "哲贡宿巴仁钦彭措八岁在金厄仁波切面前出家", "participants": [{"entity": "哲贡宿巴仁钦彭措", "role": "受戒者"}, {"entity": "第四世红帽金厄仁波切", "role": "亲教师"}], "location": "", "time_info": "{'text': '八岁', 'relative_to': '哲贡宿巴仁钦彭措 (E_827)', 'absolute': None}", "layers": ["史传"], "quote": "哲贡宿巴仁钦彭措，出生在卫多哲贡年刚地方杰绕种姓中。八岁时，在金厄仁波切秋吉札巴面前出家。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "哲贡宿巴仁钦彭措在昌珠寺开光时大显神变", "participants": [{"entity": "哲贡宿巴仁钦彭措", "role": "主体"}], "location": "昌珠寺", "time_info": "{'text': '十三岁', 'relative_to': '哲贡宿巴仁钦彭措 (E_827)', 'absolute': None}", "layers": ["神变"], "quote": "八岁时，在金厄仁波切秋吉札巴面前出家。\n他十三岁时，嘎波巴在则塘禅定洲，修复破损的昌珠寺，迎请他去开光，当时他大显神变。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "开取伏藏", "title": "哲贡宿巴仁钦彭措从德卓札革大殿开取五种黄纸伏藏", "participants": [{"entity": "哲贡宿巴仁钦彭措", "role": "主体"}], "location": "德卓札革大殿", "time_info": "", "layers": ["史传"], "quote": "按照空行的授记，身份改为白衣（在家）。在扬巴坚，得到伏藏标题的同时，从德卓札革大殿开取了莲花生大士身语意结晶妙法最深密意的五种黄纸伏藏。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "哲贡宿巴仁钦彭措在铜色吉祥山拜见莲师并得灌顶", "participants": [{"entity": "哲贡宿巴仁钦彭措", "role": "受者"}, {"entity": "莲花生大士", "role": "灌顶师"}], "location": "铜色吉祥山", "time_info": "", "layers": ["神变"], "quote": "另一时间，他来到铜色吉祥山拜见黑日嘎形象的莲花生大士，受用嘎那匝札会供，莲师依靠三根本坛城授予他所有灌顶及教授、随授，黑日嘎的身体转依成莲花生大士，也恩授了许多口传窍诀。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "哲贡宿巴仁钦彭措将幻化网法要传承经扬珠尼达桑吉至昆·敦华玖棱珠", "participants": [{"entity": "哲贡宿巴仁钦彭措", "role": "传法者"}, {"entity": "扬珠尼达桑吉", "role": "中间传承"}, {"entity": "阿阇黎才旺诺吉", "role": "中间传承"}, {"entity": "昆·敦华玖棱珠", "role": "最终受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "昆·敦华玖棱珠哲贡宿巴仁钦彭措尊者将《幻化网》所有法要传给扬珠尼达桑吉。扬珠尼达桑吉传给昆种姓的阿阇黎才旺诺吉。阿阇黎才旺诺吉传给自己的儿子昆·敦华玖棱珠。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "昆·敦华玖棱珠十岁在全知索南嘉措面前出家", "participants": [{"entity": "昆·敦华玖棱珠", "role": "受戒者"}, {"entity": "全知索南嘉措", "role": "亲教师"}], "location": "", "time_info": "{'text': '十岁', 'relative_to': '昆·敦华玖棱珠 (E_831)', 'absolute': None}", "layers": ["史传"], "quote": "这位尊者的母亲名为嘉姆俊，他出生于铁鸡年，从小圣种习气复苏，生起了真实的出离心。他到了十岁时在全知索南嘉措面前出家，听受了皈依、发心及大悲观音的修行传承等。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "昆·敦华玖棱珠在父亲面前学修幻化网密藏续及诸注释", "participants": [{"entity": "昆·敦华玖棱珠", "role": "受者"}, {"entity": "阿阇黎才旺诺吉", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尤其是，他在父亲金刚持尊面前学修《幻化网密藏续》、雍敦所著的《密藏续释》、全知龙钦巴的《密藏续释·遣除十方黑暗》的所有注释时，苏醒卓普巴大师的习气而成为依靠此道获得成就无与伦比的证道者。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "昆·敦华玖棱珠十八岁在尼达桑吉座前听大圆满明界心滴灌顶", "participants": [{"entity": "昆·敦华玖棱珠", "role": "受者"}, {"entity": "尼达桑吉", "role": "灌顶师"}], "location": "", "time_info": "{'text': '十八岁', 'relative_to': '昆·敦华玖棱珠 (E_831)', 'absolute': None}", "layers": ["史传"], "quote": "他十八岁在努·南卡酿波的化身——大持明者尼达桑吉座前，恭聆大圆满明界心滴的灌顶、引导及窍诀，从而认识了一切法的实相大圆满自证法身并探究到堂奥。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "昆·敦华玖棱珠三十四岁受比丘戒法名华玖棱珠", "participants": [{"entity": "昆·敦华玖棱珠", "role": "受戒者"}, {"entity": "嘉康则瓦华玖嘉措", "role": "亲教师"}, {"entity": "法王格敦嘉村", "role": "轨范师"}], "location": "", "time_info": "{'text': '三十四岁', 'relative_to': '昆·敦华玖棱珠 (E_831)', 'absolute': None}", "layers": ["史传"], "quote": "他三十四岁时在嘉康则瓦华玖嘉措和法王格敦嘉村亲教师、轨范师面前受了比丘戒，法名为华玖棱珠，也听闻了格鲁派的密法类，并且担当桑普与色雪的讲闻阿阇黎。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "第五世达赖在昆·敦华玖棱珠足下听受新旧派无量法门", "participants": [{"entity": "第五世达赖喇嘛", "role": "受者"}, {"entity": "昆·敦华玖棱珠", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尊者断除了聚会的散乱，居于东够哲或帕旺卡深林静处。观音化现的第五世达赖也在其足下依止，听受新旧派的灌顶、传承、引导及窍诀的无量法门。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "昆·敦华玖棱珠七十六岁火牛年圆寂", "participants": [{"entity": "昆·敦华玖棱珠", "role": "主体"}], "location": "", "time_info": "{'text': '七十六岁火牛年八月十一日', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "”没有应允，而说：“我必须去往（莲师的刹土——）妙佛莲花光无量殿。”火牛年八月十一日伴随着稀奇的瑞相色身融入法界。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "授记", "title": "香巴仁真阿革旺波授记宿钦·秋扬让珠今世大有裨益宁玛教法", "participants": [{"entity": "香巴仁真阿革旺波", "role": "授记者"}, {"entity": "宿钦·秋扬让珠", "role": "受记者"}], "location": "", "time_info": "{'text': '九岁', 'relative_to': '宿钦·秋扬让珠 (E_839)', 'absolute': None}", "layers": ["授记"], "quote": "秋扬让珠被仲巴尊者认定为滚秋仁钦巴的转世灵童，他逐步学习文字读写，并且毫不费力地通达了印度的所有文字种类，而且在父亲面前学习了常用修法。他九岁时遇到香巴仁真阿革旺波，阿革旺波尊者亲口授记说：“你今世会对宁玛教法大有裨益。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "宿钦·秋扬让珠在囊色仁波切面前听受灌顶传承及实修引导", "participants": [{"entity": "宿钦·秋扬让珠", "role": "受者"}, {"entity": "囊色仁波切阿旺益西哲巴", "role": "传法者"}], "location": "", "time_info": "{'text': '年仅十二岁起', 'relative_to': '宿钦·秋扬让珠 (E_839)', 'absolute': None}", "layers": ["史传"], "quote": "他从年仅十二岁时起，一直留在囊色仁波切阿旺益西哲巴面前，听受了《八大法行·集善逝》、教藏传及伏藏传的《空行心滴》、《上师宝海》、噶玛朗巴的《寂猛密意自解脱》等的灌顶、传承及实修引导，都已达到究竟。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "闭关修行", "title": "宿钦·秋扬让珠在藏巴达古实修大圆满空行心滴三年获证悟", "participants": [{"entity": "宿钦·秋扬让珠", "role": "主体"}], "location": "藏巴达古", "time_info": "{'text': '三年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "他在藏巴达古地方居住三年，主要切中要点实修大圆满《空行心滴》的本来清净与任运自成，结果彻底击毁了万法的假相，获得现前\n自证本来怙主本面的证悟，在光明境界中自在畅游报身刹土的妙力已达到纯熟。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "帕旺卡巴华玖以满瓶倾泄方式传授宿钦·秋扬让珠教藏法伏藏法", "participants": [{"entity": "帕旺卡巴华玖", "role": "传法者"}, {"entity": "宿钦·秋扬让珠", "role": "受者"}], "location": "", "time_info": "{'text': '十七岁起', 'relative_to': '宿钦·秋扬让珠 (E_839)', 'absolute': None}", "layers": ["史传"], "quote": "上师也满怀喜悦加以摄受，把浩如烟海的教藏法、伏藏法理以满瓶倾泄的方式恩授予他。主要是《密藏根本续》及《巴卡释》，结合藏地雍敦所著的注释加以讲解，每天传授两堂课。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "宿钦·秋扬让珠二十岁受比丘戒", "participants": [{"entity": "宿钦·秋扬让珠", "role": "受戒者"}], "location": "", "time_info": "{'text': '水狗年，二十岁', 'relative_to': '宿钦·秋扬让珠 (E_839)', 'absolute': None}", "layers": ["史传"], "quote": "”在小小宿舍，上师辅导传讲到三十页，他也依师言教作了笔录，只是五品以前，在此之后的记录就停止了。水狗年，他年至二十岁时，又从居士戒开始受到比丘戒。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "宿钦·秋扬让珠在花吉则佛教大学冬季大法会讲解密藏续", "participants": [{"entity": "宿钦·秋扬让珠", "role": "主体"}], "location": "花吉则佛教大学", "time_info": "{'text': '木鼠年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "木鼠年，在花吉则佛教大学冬季大法会开端，他讲解了《密藏续》，依此摧毁了那些依于字面的大师们的辩才，对精华教法（指金刚密乘）作出了巨大贡献，因此受到诸位正直者的一致赞评，香巴仁真钦波也予以高度赞叹。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "宿钦·秋扬让珠在则塘佛教大学建立巡回辩经", "participants": [{"entity": "宿钦·秋扬让珠", "role": "主体"}], "location": "则塘佛教大学", "time_info": "", "layers": ["史传"], "quote": "尤其昆·敦华玖棱珠尊者摄受宿秋扬让珠以后，每一天给他传雍敦的《密藏续释》一两堂课，而且也恩授心滴等无量法门。按照尊者的指导，宿钦秋扬让珠在则塘佛教大学，建立起巡回辩经。由此使那些认为前译续无有讲续的嫉妒者自然闭口。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "第五世达赖拜宿钦·秋扬让珠为师听受教藏法及猛咒", "participants": [{"entity": "第五世达赖喇嘛", "role": "受者"}, {"entity": "宿钦·秋扬让珠", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尤其是作了依《八大法行·集善逝》坛城的绕萨雅那修法，就是从此时开始，第五世达赖喇嘛拜他为师，而恭听了《威猛》等一切教藏法以及猛咒等息增怀诛浩瀚事业的所有传承、修法引导，进而加以实修。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "降伏非人", "title": "宿钦·秋扬让珠进行无数次降伏事业助格鲁派教法遍及藏地", "participants": [{"entity": "宿钦·秋扬让珠", "role": "主体"}, {"entity": "第五世达赖喇嘛", "role": "辅助"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "当时，噶地、后藏的僧人与施主对总的格鲁派怀着嗔恨，尤其是对西藏政府深恶痛绝，在孜革巴发生战乱之时，尊者进行了无数次降伏事业。依靠第五世达赖喇嘛的事业时机成熟和这位尊者的加持力迅猛，使哲蚌寺的教法遍及整个藏地。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "宿钦·秋扬让珠认定香巴仁真阿革旺波转世并为其坐床传法", "participants": [{"entity": "宿钦·秋扬让珠", "role": "主体"}, {"entity": "阿杰丹毕尼玛仁真班玛陈列", "role": "受者"}], "location": "土丹多吉札寺", "time_info": "", "layers": ["史传"], "quote": "尊者也认定了香巴仁真阿革旺波的转世是阿杰丹毕尼玛仁真班玛陈列。在土丹多吉札寺为他举行坐床仪式，并恩授了所有的教藏法及伏藏法，奉其为教主。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "宿钦·秋扬让珠六十六岁土鸡年圆寂", "participants": [{"entity": "宿钦·秋扬让珠", "role": "主体"}], "location": "", "time_info": "{'text': '六十六岁土鸡年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "并且不同程度地培养了印藏蒙的高僧大德等，为求法义的弟子们宣讲了教藏法、伏藏法，开示新旧派的解脱道。尊者到了六十六岁土鸡年，伴着稀有奇妙的瑞相前往莲花光刹土。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "桑吉札修财神法田地被冲走后处理麻风病人丧事得黄金", "participants": [{"entity": "雄吉嘉曼巴桑吉札", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "年幼之时，修财神法，结果仅有的一小块田地也被水冲走，在他舍弃琐事前往他方的行途中，看到有一个麻风病富人的尸体无人收殓。他生起强烈悲心，在没有什么分别念中给他处理了丧事，结果床边出现了许多黄金。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "桑吉札在琼波卓哦修真实法现见本尊", "participants": [{"entity": "雄吉嘉曼巴桑吉札", "role": "主体"}], "location": "琼波卓哦", "time_info": "", "layers": ["神变"], "quote": "他知道这是财神给予的悉地。于是再度返回，在琼波卓哦遇到札些康玛在修真实法，他也随着修行，结果得以现见本尊。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "多土巴在忽必烈皇帝面前被封入佛塔一年后变成金刚橛身", "participants": [{"entity": "雄吉嘉曼巴桑吉札", "role": "主体"}, {"entity": "忽必烈皇帝", "role": "观察者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "多土巴到忽必烈皇帝面前。皇帝为了观察他的能力，强迫他进入佛塔内，封闭门而放置一年。一年后打开一看，发现他变成了金刚橛\n身，为此皇帝大感稀奇。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "桑吉札建立多土特道场", "participants": [{"entity": "雄吉嘉曼巴桑吉札", "role": "主体"}], "location": "多土特道场", "time_info": "", "layers": ["史传"], "quote": "当时一位富人供养了一百斗青稞，遇到有人提供顺缘，他依此在卓普巴的弟子酿那多波及其弟子拉吉达桑给面前听闻了《幻化网》。成为大智者以后回到故乡，建立了多土特道场。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "曼隆巴释迦光在杰秋戒桑给面前学习集密意续和幻化网", "participants": [{"entity": "曼隆巴释迦光", "role": "受者"}, {"entity": "华哦杰秋戒桑给", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "佛法的沉浮也能促发人生起伤感之情。\n曼隆巴释迦光杰秋戒桑给的弟子就是曼隆巴释迦光，他是炯波卡热的涅大师所生五个儿子——共称为雅隆五活佛兄弟中的老大。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "滚波多吉身体融入墙壁留下印迹", "participants": [{"entity": "滚波多吉", "role": "主体"}], "location": "秋丹寺", "time_info": "", "layers": ["神变"], "quote": "据说他出生在雅隆地方的曼隆寺。次子，就是现在共称为秋丹寺的住持，真实法名叫滚波多吉，获得了极大成就，身体靠墙壁融入其中而留下的印迹，现今仍旧存在。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "多吉嘉烂在嘉益西滚波面前学习集密意续幻化网并造论", "participants": [{"entity": "多吉嘉烂", "role": "受者"}, {"entity": "嘉·益西滚波", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "温波多吉嘉烂\n杰·秋戒桑给的道场住持——嘉·益西滚波也依止了杰·秋戒桑给和兰秋嘉二位上师，精通了《集密意续》、《幻化网》法门，他的侄子名叫多吉嘉烂，幼年时前往桑普研学《定量论》，后来在嘉益西滚波面前认真学习了《集密意续》、《幻化网》法门，造了《巴卡释论疏》和灌顶仪轨等。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "噶托巴单巴德香十七岁出家并受比丘戒", "participants": [{"entity": "噶托巴单巴德香", "role": "受戒者"}], "location": "卫藏", "time_info": "{'text': '十七岁', 'relative_to': '噶托巴单巴德香 (E_868)', 'absolute': None}", "layers": ["史传"], "quote": "十七岁时他前往卫藏，于番地在上师香切桑给面前出家，法名取为西绕僧佫。在那吉堪钦玛德杰坚面前按东律传承受了比丘戒，精通戒律。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "噶托巴在匝敦珠为滚波面前听受幻化网密藏续等达到通达", "participants": [{"entity": "噶托巴单巴德香", "role": "受者"}, {"entity": "匝敦珠为滚波", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在那吉堪钦玛德杰坚面前按东律传承受了比丘戒，精通戒律。于宿·卓普巴大师的心子——匝敦珠为滚波面前，听受《幻化网密藏续》及心部等法要，已完全通达。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "建寺", "title": "噶托巴单巴德香于土鼠年建立噶托寺", "participants": [{"entity": "噶托巴单巴德香", "role": "主体"}], "location": "噶托寺", "time_info": "{'text': '土鼠年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "于嘎字形的上方，于土鼠年建立寺院", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "降伏非人", "title": "噶托巴和法王藏敦降伏妖石曼哦", "participants": [{"entity": "噶托巴单巴德香", "role": "主体"}, {"entity": "法王藏敦", "role": "辅助"}, {"entity": "妖石曼哦", "role": "被降伏者"}], "location": "噶托寺", "time_info": "", "layers": ["神变"], "quote": "随后在嘎字形的上方，于土鼠年建立寺院，曾在苯教师前受过誓言的妖石曼哦亲现原身，通过各种途径制造违缘。当师徒三人紧紧追赶之时它就融入了一块岩石中。法王藏敦用法衣裹住以后在前面拉，单巴（即噶托巴）用鞭子抽打在后面赶，一直到了山谷的河边，如今也可现量见到那块磐石。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "降伏非人", "title": "吉祥天女使八位苯波师修行岩洞倒塌", "participants": [{"entity": "吉祥天女", "role": "主体"}, {"entity": "噶托巴单巴德香", "role": "辅助"}], "location": "噶托寺", "time_info": "", "layers": ["神变"], "quote": "法王藏敦用法衣裹住以后在前面拉，单巴（即噶托巴）用鞭子抽打在后面赶，一直到了山谷的河边，如今也可现量见到那块磐石。八位苯波师修恶咒时，吉祥天女使他们的修行岩洞倒塌，尊者用手在那上面画了个十字杵，使八个磐石回归原位置。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "噶托巴单巴德香在噶托寺传授大圆满幻化密藏续等", "participants": [{"entity": "噶托巴单巴德香", "role": "主体"}], "location": "噶托寺", "time_info": "", "layers": ["史传"], "quote": "尊者建立起寺院以后一直安住道场，从东方安多到南方擦瓦绒和罗曼地带的诸位弟子纷纷云集，尊者主要为他们传授大圆满、《幻化密藏续》的讲教与灌顶教、修法等印藏大大小小的所有注释一律按照具德宿氏的教轨传承，尤其着重传讲《集密意续》等。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "噶托巴单巴德香七十一岁水鼠年圆寂", "participants": [{"entity": "噶托巴单巴德香", "role": "主体"}], "location": "", "time_info": "{'text': '七十一岁水鼠年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "简而言之，他在多康领域内奠定了密法的基础。最后七十一岁水鼠年色身示现圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "授记", "title": "噶托巴单巴德香得到来世在极乐世界及成佛的授记", "participants": [{"entity": "噶托巴单巴德香", "role": "受记者"}], "location": "", "time_info": "", "layers": ["授记"], "quote": "也得到了'下一世在极乐世界以慧藏菩萨的身份安住、获证八地现观、未来星布劫成为无量寿如来'的授记", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "藏敦巴十七岁遇到德香巴上师闻受佛法", "participants": [{"entity": "藏敦巴", "role": "受者"}, {"entity": "噶托巴单巴德香", "role": "传法者"}], "location": "", "time_info": "{'text': '十七岁', 'relative_to': '藏敦巴 (E_872)', 'absolute': None}", "layers": ["史传"], "quote": "藏敦巴噶托巴单巴德香尊者的法脉继承人藏敦巴，火马年出生于哦波刚所属的藏雅地方。十七岁时遇到德香巴上师而闻受佛法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "藏敦巴亲睹吉祥黑日嘎与四十二寂静本尊坛城", "participants": [{"entity": "藏敦巴", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "”上师对藏敦巴说：“那就是你。”当时，他亲睹了吉祥黑日嘎与四十二寂静本尊坛城。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "藏敦巴五十六岁任噶托寺住持弘扬经幻心教法", "participants": [{"entity": "藏敦巴", "role": "主体"}], "location": "噶托寺", "time_info": "{'text': '五十六岁', 'relative_to': '藏敦巴 (E_872)', 'absolute': None}", "layers": ["史传"], "quote": "能回忆起曾是益西秋译师与印度夏那伟等的前世。他五十六岁时任噶托寺住持，按照上师的传统弘扬经幻心教法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "布札巴在藏敦巴面前得受幻化网灌顶智慧觉醒", "participants": [{"entity": "大菩萨布札巴", "role": "受者"}, {"entity": "藏敦巴", "role": "灌顶师"}], "location": "噶托寺", "time_info": "", "layers": ["史传"], "quote": "这说明他的名声远播各方。后来，布札巴来到噶托，在藏敦巴仁波切面前得受了《幻化网》的灌顶，结果智慧无偏得以觉醒。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "授记", "title": "不动佛授记藏敦巴未来成为发光如来", "participants": [{"entity": "不动佛", "role": "授记者"}, {"entity": "藏敦巴", "role": "受记者"}], "location": "", "time_info": "", "layers": ["授记"], "quote": "还有一次，在所见的不动佛刹土中，眷属菩萨们说这位法王是“宝藏菩萨”的声音轰轰隆隆，并说下一世在极乐世界成为如此这般。另一次见到此刹土时，他也听到本师不动佛授记说：“善男子宝藏，你未来时成为发光如来。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "藏敦巴九十岁火鼠年圆寂", "participants": [{"entity": "藏敦巴", "role": "主体"}], "location": "", "time_info": "{'text': '九十岁火鼠年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "另一次见到此刹土时，他也听到本师不动佛授记说：“善男子宝藏，你未来时成为发光如来。”尊者在九十岁火鼠年圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "香巴波为噶玛巴哲嘉单巴传授比丘戒", "participants": [{"entity": "香巴波", "role": "亲教师"}, {"entity": "金厄芒波瓦索南波", "role": "羯磨师"}, {"entity": "噶玛巴哲嘉单巴", "role": "受戒者"}], "location": "噶托寺", "time_info": "", "layers": ["史传"], "quote": "噶玛巴哲嘉单巴于秋修降生时，首先礼见布札巴和夏白，后来遵照他的言教来到噶托寺，香巴仁波切作为亲教师，金厄芒波瓦索南波作为羯磨师，为噶玛巴传授了近圆比丘戒，尊其为法太子，取名秋杰喇嘛，他也在尊者面前听受了《幻化网》与大圆满的灌顶及教授。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "香巴波七十四岁水鼠年圆寂", "participants": [{"entity": "香巴波", "role": "主体"}], "location": "", "time_info": "{'text': '七十四岁水鼠年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "噶玛巴哲嘉单巴于秋修降生时，首先礼见布札巴和夏白，后来遵照他的言教来到噶托寺，香巴仁波切作为亲教师，金厄芒波瓦索南波作为羯磨师，为噶玛巴传授了近圆比丘戒，尊其为法太子，取名秋杰喇嘛，他也在尊者面前听受了《幻化网》与大圆满的灌顶及教授。尊者住世到七十四岁，期间一直弘法利生，水鼠年圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "金厄瓦索南波巴六十一岁圆寂", "participants": [{"entity": "金厄芒波瓦索南波", "role": "主体"}], "location": "", "time_info": "{'text': '六十一岁', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "金厄瓦索南波巴香巴波的法脉继承人金厄瓦索南波巴于水羊年出生，三十岁时坐床任住持。着力弘扬《集密意续》、《幻化网》及大圆满，护持佛法，六十一岁圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "噶托巴哦鸥益西对帕思巴仁波切授予幻化网寂猛灌顶", "participants": [{"entity": "哦鸥益西", "role": "灌顶师"}, {"entity": "帕思巴仁波切", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "”于是，噶托巴尊者入于驱魔等持中，将殿堂弄得翻天覆地改变，萨迦法王迎请降临智慧尊者，而示现了恢复如初的奇迹。噶托巴尊者对帕思巴仁波切授予《幻化网》寂猛灌顶，他们抵达蒙古境内。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "噶托巴哦鸥益西驱魔使殿堂翻天覆地萨迦法王恢复如初", "participants": [{"entity": "哦鸥益西", "role": "主体"}, {"entity": "法王萨迦班智达", "role": "辅助"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "噶托巴亲口说：“开光之初的驱魔，由我们旧派（宁玛派）来进行，智慧尊者安住等开光正行由你们新派来进行。”于是，噶托巴尊者入于驱魔等持中，将殿堂弄得翻天覆地改变，萨迦法王迎请降临智慧尊者，而示现了恢复如初的奇迹。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "法王萨迦班智达在蒙古圆寂", "participants": [{"entity": "法王萨迦班智达", "role": "主体"}], "location": "蒙古", "time_info": "", "layers": ["史传"], "quote": "噶托巴尊者对帕思巴仁波切授予《幻化网》寂猛灌顶，他们抵达蒙古境内。后来法王萨迦班智达在蒙古圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "供养", "title": "帕思巴返回西藏时将灵塔和供水杯供在噶托寺", "participants": [{"entity": "帕思巴仁波切", "role": "供养者"}], "location": "噶托寺", "time_info": "", "layers": ["史传"], "quote": "后来法王萨迦班智达在蒙古圆寂。帕思巴返回西藏时将三层楼高的响铜灵塔和七套巨型供水杯供在噶托寺，现今仍旧保存着。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "香切华瓦弹指令宰杀的牲畜飞到空中", "participants": [{"entity": "香切华瓦", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "据说在建殿堂时，所有工人宰杀了大量的牛羊而把皮肉分离开来，香切华瓦尊者在它们面前弹了一声响指，结果所有的牲畜全部吵吵囔囔飞到空中。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "根嘎波巴以头顶糌粑令天降大雪退敌军", "participants": [{"entity": "根嘎波巴", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "另有一时，江国王发动大批军队，侍者因为军兵到来而慌慌张张地向他禀报并问：“现在该怎么办？”尊者说：在他的头上放大量的糌粑。侍者按照这样去做，结果天降大雪，使得所有军兵全部撤退。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "克主益西嘉村在札哦秋波面前无余闻受集密意续幻化网等", "participants": [{"entity": "克主益西嘉村", "role": "受者"}, {"entity": "札哦秋波", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "香切嘉村的弟子哦波克主匝那给都被授记是涅译师益西云讷的化身，对于总的所有显密道次第都十分精通，尤其是在大成就者札哦秋波面前无余听受了《集密意续》、《幻化网》寂猛灌顶及讲解修法等。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "克主益西嘉村使密藏续颂释等根本教轨如日轮昭然开显", "participants": [{"entity": "克主益西嘉村", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "克主益西嘉村使《密藏续颂释》、《集密意续》、大圆满心、界、窍诀三部各自的所有教轨根本再度如日轮般昭然开显，以讲修事业使佛法弘扬得遍及各处，撰著了《寂猛普巴教释》、对《密藏续》作了注释、科判、摄义，对《道庄严》作了注疏和注解。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "授记", "title": "空行母业自在母为克主益西嘉村授记成佛", "participants": [{"entity": "空行母业自在母", "role": "授记者"}, {"entity": "克主益西嘉村", "role": "受记者"}], "location": "", "time_info": "", "layers": ["授记"], "quote": "空行母业自在母为他授记说：“你六十四岁时于此往生，前往北方广利有情，尔后于极乐世界，以乐芽菩萨身份修行佛刹，并于清净劫于功德庄严乐藏刹土成佛。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "荣波土秋三位在东方嘉木绒弘扬佛法", "participants": [{"entity": "西绕嘉村", "role": "主体"}, {"entity": "西绕华瓦", "role": "主体"}, {"entity": "西绕多吉", "role": "主体"}], "location": "嘉木绒", "time_info": "", "layers": ["史传"], "quote": "再者，单巴德夏的弟子称为荣波土秋三位，即西绕嘉村、西绕华瓦、西绕多吉，决定是利根顿悟者，他们只是听到单巴仁波切的法音便获得探究到诸法堂奥的大自在成就。他们三位在东方的嘉木绒弘扬佛法，迄今为止佛法如意宝一直经久未损、方兴未艾，也来源于此。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "建寺", "title": "哲擦刚巴建起一百零八座寺院弘扬佛法", "participants": [{"entity": "哲擦刚巴", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "此外，嘎单巴的高足共称有四位教子，其中哲擦刚巴在波、绒、夏卡瓦嘎波以内，建起了一百零八座寺院，将佛法普遍弘扬开来，功绩卓著。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "建寺", "title": "匝德金厄南卡多吉建立够觉匝寺", "participants": [{"entity": "匝德金厄南卡多吉", "role": "主体"}], "location": "够觉匝寺", "time_info": "", "layers": ["史传"], "quote": "匝德金厄南卡多吉建立起够觉匝寺，他的弟子仲特吉益西，在敦巴旺玖等面前得受《幻化网》和大圆满的所有法要，传到卫藏，由此出现了所谓的康派。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "成就者玛尼仁钦以法衣作翅膀翱翔虚空后以光蕴身消逝", "participants": [{"entity": "成就者玛尼仁钦", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "然而，他刚刚对前三代祖师的遗塔作完承侍，便将法衣作翅膀犹如鸟一样翱翔虚空而到达对面的山顶，在那里也留下了脚印。此后住在绕觉地方不久便以光蕴身消逝。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "荣索班智达幼年在嘎敦赤诚桑波面前听法", "participants": [{"entity": "荣索班智达", "role": "受者"}, {"entity": "嘎敦赤诚桑波", "role": "传法者"}], "location": "酿曼", "time_info": "", "layers": ["史传"], "quote": "还有一种说法：一位名叫阿匝绕查拉让莫的班智达到达康区，翻译、传讲《密集续广释》等以后圆寂，转世为荣索班智达。荣索班智达从幼年时起就具备任运自成的大智慧，在酿曼地方，于嘎敦赤诚桑波面前听法，他的父亲前去给他送口粮。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "授记", "title": "阿底峡尊者赞叹荣索班智达为阿匝雅黑行尊者转世", "participants": [{"entity": "阿底峡尊者", "role": "授记者"}, {"entity": "荣索班智达", "role": "受记者"}, {"entity": "阿匝雅黑行尊者", "role": "前世"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "阿底峡尊者与这位大师会晤时，尊者亲口赞叹说：印度的阿匝雅黑行尊者的转世绝对是这位尊者，所以我又岂能胜过他的辩才，这是无可诤议一致共称的。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "荣索班智达著《密藏续释·三宝释》", "participants": [{"entity": "荣索班智达", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "再者，由于荣索班智达所著的《密藏续释》的开头有“三宝自性菩提心”，所以他的《密藏续释》命名为《三宝释》，全知龙钦巴大师的注释《遣除十方黑暗》解释乘王之宗，简明易懂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "荣索班智达在多敦桑给上师前闻法时梦到用续部做饭做菜", "participants": [{"entity": "荣索班智达", "role": "主体"}, {"entity": "多敦桑给", "role": "上师"}], "location": "", "time_info": "{'text': '幼年时', 'relative_to': '荣索班智达 (E_780)', 'absolute': None}", "layers": ["史传"], "quote": "如果理解了藏地的这两部主要注释，就能赐予你智慧威力。尊者在幼年时，在多敦桑给上师前听闻前译教法的过程中，有一次，他梦到用《密藏续》做饭，用《佛陀平等行续》做菜，正在享用。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "荣索班智达造三种窍诀及大量注释", "participants": [{"entity": "荣索班智达", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "”为了满上师的意愿，他造了依靠三学如意宝的三种窍诀，宣说殊胜戒学意义的《誓言广解》；宣说殊胜定学的注释《四理十五支》；宣说殊胜慧学大圆满之见修窍诀——《平等行续释》，此外，他还撰著了《净恶趣续释》、《大威德续释》等大量的注释及窍诀。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "荣索班智达折服西藏四翼所有智者", "participants": [{"entity": "荣索班智达", "role": "主体"}, {"entity": "扬钦喇嘛", "role": "被折服者"}, {"entity": "玛巴多巴", "role": "被折服者"}, {"entity": "哦耶巴达敦", "role": "被折服者"}, {"entity": "多穹波哄酿", "role": "被折服者"}, {"entity": "色楚嘉措白", "role": "被折服者"}, {"entity": "擦敦够愉", "role": "被折服者"}, {"entity": "帮嘎达穹", "role": "被折服者"}, {"entity": "古拉则", "role": "被折服者"}, {"entity": "嘉甲赤", "role": "被折服者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "甚至，他也造了有关世间的农业、畜牧、如何做乳制品在内的论典。当时，西藏四翼的所有智者一开始兴冲冲前去辩论，但后来荣索班智达折服了他们的辩才，摧毁了他们的我慢。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "够热译师读《入大乘论》后依止荣索班智达", "participants": [{"entity": "够热译师", "role": "弟子"}, {"entity": "荣索班智达", "role": "上师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "够热译师比丘秋杰西绕拥有多闻的陀罗尼，他最初也是一味责怪，中间看了荣索班智达所著的《入大乘论》法本，结果生起极大恭\n敬心，最后带着丰厚的财物前去依止，毫不隐晦地说明实情之后祈求摄受，在其前听受了《文殊秘密续》等众多法要，在讲密续期间，大班智达亲口说：我们如果有印度法本，就这样进行，正因为没有印度法本，现在不可更改。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "译经", "title": "荣索班智达依止印度班智达翻译大量续部", "participants": [{"entity": "荣索班智达", "role": "译师"}, {"entity": "玛则西日巴玛", "role": "班智达"}, {"entity": "玛则西日匝那", "role": "班智达"}, {"entity": "俄巴雅西日莫札", "role": "班智达"}, {"entity": "哦达阿嘎绕巴札", "role": "班智达"}, {"entity": "德瓦嘎绕赞札", "role": "班智达"}, {"entity": "巴绕美夏", "role": "班智达"}, {"entity": "阿木嘎班则", "role": "班智达"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "荣索班智达依止印度堪布玛则西日巴玛、玛则西日匝那、俄巴雅西日莫札、哦达阿嘎绕巴札、德瓦嘎绕赞札、巴绕美夏、阿木嘎班则等众多班智达以后，作为他们的译师，翻译了《大威德金刚》、《阎罗黑敌续》、《文殊具密续》、《胜乐根本续》等大量续部，译文极其优美，堪为新译的典范，印度的班智达众口一词地对他说：“达玛巴札，你要撰著丰富法要，救护一切众生，不用说你的其余功德，仅仅了解你所精通声明、因明三分之一的人在印度便可造论，为什么你不造论呢？”尽管他具足如此圆满功德，却谦虚谨慎、戒骄戒躁。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "荣索班智达以神变行走岩石、插橛入岩、飞翔空中", "participants": [{"entity": "荣索班智达", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "再从他的成就事迹而言，他依靠神变行为能走在如镜面般的陡峭磐石上，能将金刚橛插入岩石，能飞翔空中，具有对藏地的大多数鬼神住所、行为了如指掌的神通，诸如此类有众多成就。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "荣索班智达住世一百一十九岁后圆寂", "participants": [{"entity": "荣索班智达", "role": "主体"}], "location": "", "time_info": "{'text': '住世到一百一十九岁', 'relative_to': '荣索班智达 (E_780)', 'absolute': None}", "layers": ["史传"], "quote": "如此无可非议的这位化身大班智达，受到当时出世的所有智者交口称赞、恭敬顶戴。荣索班智达住世到一百一十九岁，在身体安然无恙的情况下示现圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "莲花生大士在桑耶寺传君王派普巴", "participants": [{"entity": "莲花生大士", "role": "传法者"}, {"entity": "赤松德赞", "role": "受者"}, {"entity": "卡钦萨", "role": "受者"}], "location": "桑耶寺", "time_info": "", "layers": ["史传"], "quote": "那么，普巴金刚到底是如何弘扬开来的呢？由邬金堪布班玛桑巴瓦（即莲花生大士）延续下来的普巴有君王派、明妃派、嘉姆派，再有那南或荣派、黑尊派、花尊派由身色共称等有多种迥然不同的异门，然而这些都是一个本体，只是从窍诀的反体以及传教的差别才如此共称的。第一、君王派普巴：莲花生大士在桑耶寺传给国王赤松德赞、明妃卡钦萨及迎请此法的三人。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "莲花生大士临近离藏时传明妃派普巴给卡钦萨", "participants": [{"entity": "莲花生大士", "role": "传法者"}, {"entity": "卡钦萨", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "第一、君王派普巴：莲花生大士在桑耶寺传给国王赤松德赞、明妃卡钦萨及迎请此法的三人。第二、明妃派：莲花生大士临近离开（藏地）时，言简意赅地归纳普巴颂上事业修行菩提、下事业诅咒道用的精华，传给明妃卡钦萨。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "闭关修行", "title": "卡钦萨在门卡那让狮子堡修普巴二十一天获成就", "participants": [{"entity": "卡钦萨", "role": "主体"}], "location": "门卡那让狮子堡山洞", "time_info": "{'text': '二十一天', 'relative_to': None, 'absolute': None}", "layers": ["神变"], "quote": "她在南方门卡那让狮子堡山洞，打开外相圣物坛城而修行二十一天，结果所有金刚橛发笑、放光、跳动摇晃，明妃觉母心里想：已经成就了金刚橛，就要做降伏事业。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "卡钦萨以金刚橛降伏祖先馋鬼", "participants": [{"entity": "卡钦萨", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "虽然当时没有真正降伏的对象，但是她心里想降伏祖先的馋鬼而捻动金刚橛念咒，结果金刚橛腾空而起，落到她故乡家宅遗址处祖先馋鬼所在处的黄柏刺丛上面，黄柏刺丛焚烧起来，将馋鬼超度到等性界中，后来那把金刚橛由明妃的叔伯们保存。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "卡钦萨传降伏鬼神传承给哥哥卡钦华杰旺修", "participants": [{"entity": "卡钦萨", "role": "传法者"}, {"entity": "卡钦华杰旺修", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "人们共称是由卡钦萨传下降伏鬼神的传承。明妃将此传给自己的哥哥卡钦华杰旺修，之后逐渐弘扬开来。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "益西措嘉教授玖如萨传下嘉姆派", "participants": [{"entity": "益西措嘉", "role": "传法者"}, {"entity": "玖如萨", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "第三、嘉姆派：尽管玖如萨直接依止了莲花生大士，但由于灌顶没有在上师前得受而在本尊前请求，结果本尊摄于阿阇黎心间，她失去了灌顶的机会。后来莲师把她交给明妃益西措嘉，由益西措嘉空行母教授玖如萨，由此传下。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "哲阿匝绕传朗拉香切多吉普巴甚深要诀", "participants": [{"entity": "哲阿匝绕萨列", "role": "传法者"}, {"entity": "朗拉香切多吉", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "朗拉香切多吉朗拉香切多吉在幼年时就失去父母双亲，就像至尊米拉日巴的遭遇一样，受到父系叔伯的虐待，孤苦伶仃，极其可怜。哲阿匝绕于心不忍，于是传给他普巴窍诀中甚深的要诀，他实地修行以后降伏了父系的叔伯。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "降伏非人", "title": "朗拉香切多吉以普巴降伏叔伯", "participants": [{"entity": "朗拉香切多吉", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "朗拉香切多吉朗拉香切多吉在幼年时就失去父母双亲，就像至尊米拉日巴的遭遇一样，受到父系叔伯的虐待，孤苦伶仃，极其可怜。哲阿匝绕于心不忍，于是传给他普巴窍诀中甚深的要诀，他实地修行以后降伏了父系的叔伯。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "朗拉香切多吉以金刚橛打败绕译师", "participants": [{"entity": "朗拉香切多吉", "role": "主体"}, {"entity": "绕译师", "role": "被降伏者"}], "location": "库热", "time_info": "", "layers": ["神变"], "quote": "结果朗拉开始勾招、迎请，说谛实语，对着绕译师师徒，降下木扦普巴雨，结果绕译师的眷属僧人都受了伤，中间朗拉修十方忿怒坛城，使铁橛如雨降下，最后到处遍满熊熊火焰及震耳欲聋的声音。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "伏藏开取", "title": "德巴嘉扬楚从瓷桶伏藏取出大威德类", "participants": [{"entity": "德巴嘉扬楚", "role": "伏藏师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "德巴嘉扬楚从瓷桶伏藏中取出大威德类，他只抄录了《长寿法罪恶满心》一半内容，就到绕译师面前，绕译师对自己的大威德类补充以后依靠印度的原本进行译校。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "朗拉尊者传杰江吉金刚橛法", "participants": [{"entity": "朗拉香切多吉", "role": "传法者"}, {"entity": "杰江吉", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "朗拉 尊者 的 主 要 弟子 有那南西绕赤诚、孟地的杰江吉（倒 墙者）、让革章普哦古、哦耶如波酿那。\n杰万香切仁钦杰江吉或者叫杰万香切仁钦，他的房屋、田地、牲畜被叔伯抢夺一空，他极度悲哀，向朗拉尊者请求金刚橛法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "闭关修行", "title": "杰江吉修金刚橛九个月后达到目的", "participants": [{"entity": "杰江吉", "role": "主体"}], "location": "色甲西", "time_info": "{'text': '九个月念修本尊，之后在色甲西地方修两个月', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "上师说：'九个月念修本尊，之后在色甲西地方修两个月，会达到目的。'他如此修行，结果达到了预期的效果", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "杰江吉以金刚橛指向墙壁使墙倒塌杀死怨敌", "participants": [{"entity": "杰江吉", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "一天，他看到许多人在一堵墙下晒太阳，那伙人无不成为怨敌，他把金刚橛指向墙壁，结果墙壁顷刻倒塌，那些人命归黄泉，由此被人们一致称为倒墙者。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "莲花生大士举金刚橛使旃檀林失火后恢复如初", "participants": [{"entity": "莲花生大士", "role": "主体"}], "location": "旃檀林", "time_info": "", "layers": ["神变"], "quote": "有一次，旃檀林失火，莲花生大士举起金刚橛使森林恢复如初；对于恒河暴涨，布玛莫札举起橛使恒河上下中断；尼泊尔西拉玛则将橛举向贡坚岩堡，结果岩山塌成一段一段的；明妃卡钦萨把金刚橛插入豺狼的足迹，结果豺狼滚下悬崖；美尼嘉瓦酿波将金刚橛指向衔走念珠的乌鸦，结果乌鸦坠落到草原上；罗华戒罗珠把金刚橛插入军兵的茅屋，结果门军惨遭失败。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "布玛莫札举橛使恒河断流", "participants": [{"entity": "布玛莫札", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "有一次，旃檀林失火，莲花生大士举起金刚橛使森林恢复如初；对于恒河暴涨，布玛莫札举起橛使恒河上下中断；尼泊尔西拉玛则将橛举向贡坚岩堡，结果岩山塌成一段一段的；明妃卡钦萨把金刚橛插入豺狼的足迹，结果豺狼滚下悬崖；美尼嘉瓦酿波将金刚橛指向衔走念珠的乌鸦，结果乌鸦坠落到草原上；罗华戒罗珠把金刚橛插入军兵的茅屋，结果门军惨遭失败。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "伏藏埋藏", "title": "莲花生大士将马头明王最密法类伏藏在耶巴色瓦谷", "participants": [{"entity": "莲花生大士", "role": "主体"}], "location": "耶巴色瓦谷", "time_info": "", "layers": ["史传"], "quote": "再者，从伏藏法中能得到昭彰显著的验相，莲花生大士在为国王传授灌顶、续部及教授以后，与马头明王最密法类一起伏藏在耶巴色瓦谷岩石中。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "达夏热瓦在觉母那嘉上山洞亲见莲花生大士", "participants": [{"entity": "达夏热瓦", "role": "主体"}, {"entity": "莲花生大士", "role": "显现者"}], "location": "觉母那嘉上山洞", "time_info": "", "layers": ["神变"], "quote": "再者，从伏藏法中能得到昭彰显著的验相，莲花生大士在为国王传授灌顶、续部及教授以后，与马头明王最密法类一起伏藏在耶巴色瓦谷岩石中。\n达夏热瓦成就自在者达夏热瓦在觉母那嘉上山洞修行，结果亲见莲花生大士。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "莲花生大士每日乘阳光来益巴达瓦山洞为达夏热瓦传法", "participants": [{"entity": "莲花生大士", "role": "传法者"}, {"entity": "达夏热瓦", "role": "受者"}], "location": "益巴达瓦山洞", "time_info": "", "layers": ["神变"], "quote": "莲师告诉他：“去益巴达瓦山洞修行。”他依教奉行，在那里，每天清晨，莲花生大士都乘坐阳光而来，为他传法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "伏藏开取", "title": "达夏热瓦从益波色瓦隆取出金刚橛伏藏", "participants": [{"entity": "达夏热瓦", "role": "伏藏师"}], "location": "益波色瓦隆", "time_info": "", "layers": ["史传"], "quote": "当时，达夏热瓦从益波色瓦隆取出外相圣物金刚橛伏藏，到达拉萨的集市时，狂风大作，把整个集市搞得七零八落，此后他到达后藏时，萨迦班智达要到金城，二人在同一舍宅相聚，达夏热瓦念诵：“嗡班则戒乐戒拉雅吽啪达”。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "达夏热瓦到拉萨集市时狂风大作", "participants": [{"entity": "达夏热瓦", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "当时，达夏热瓦从益波色瓦隆取出外相圣物金刚橛伏藏，到达拉萨的集市时，狂风大作，把整个集市搞得七零八落，此后他到达后藏时，萨迦班智达要到金城，二人在同一舍宅相聚，达夏热瓦念诵：“嗡班则戒乐戒拉雅吽啪达”。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "达夏热瓦将金刚橛整个插入岩石", "participants": [{"entity": "达夏热瓦", "role": "主体"}, {"entity": "法王萨迦班智达", "role": "见证者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "萨迦班智达说：“你念的不对，应该念‘班则革乐革拉雅吽啪达’”。达夏热显得不悦地说，尽管咒语念得不对，但也有如此作用，说完将金刚橛整个击在岩石上，结果就像插入泥里一样插了进去。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "萨迦班智达与楚雪嘎波辩论十三天获胜", "participants": [{"entity": "法王萨迦班智达", "role": "辩论者"}, {"entity": "楚雪嘎波", "role": "辩论者"}], "location": "金城", "time_info": "{'text': '十三天', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "萨迦班智达与楚雪嘎波二人在十三天之中展开了激烈的辩论。最后萨迦班智达大获全胜，可是楚雪嘎波不愿意皈入佛门，狡辩道：“我们在成就相上一决胜负。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "达夏热瓦以金刚橛插入外道影子心间降伏飞翔空中的楚雪嘎波", "participants": [{"entity": "达夏热瓦", "role": "主体"}, {"entity": "楚雪嘎波", "role": "被降伏者"}, {"entity": "法王萨迦班智达", "role": "请求者"}], "location": "金城", "time_info": "", "layers": ["神变"], "quote": "逍遥自在的大瑜伽士一边将金刚橛插入外道影子的心间一边念诵“嗡班则戒乐戒拉雅吽啪达”。最后外道好像被石头击中的飞禽一般落到地上。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "十二地母制裁楚雪嘎波使其在交界处绝命", "participants": [{"entity": "十二地母", "role": "执行者"}, {"entity": "楚雪嘎波", "role": "受害者"}], "location": "金城", "time_info": "", "layers": ["神变"], "quote": "萨迦班智达为了表示辩论得胜，没有让楚雪嘎波出家，带着他一起前行。由于莲花生大士吩咐防止外道进入西藏，因此十二地母予以制裁，结果那个外道在金城与西藏交界处口吐鲜血绝命身亡。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "嘉扬仁钦嘉村在阿里为亲子大班智达兄弟灌顶", "participants": [{"entity": "嘉扬仁钦嘉村", "role": "灌顶师"}, {"entity": "仁真勒丹", "role": "受者"}], "location": "阿里拉哦玛塘", "time_info": "{'text': '兔年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "阿里哦则瓦嘉扬仁钦嘉村在勒巴华桑面前听受。嘉扬仁钦嘉村在兔年，于阿里拉哦玛塘为亲子大班智达兄弟灌顶。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "喇钦作雄巴由父领着听受《集密意续》灌顶", "participants": [{"entity": "喇钦作雄巴涅敦秋嘉多吉", "role": "受者"}, {"entity": "芒绕瓦班玛敦珠", "role": "领引者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他在后藏桑哲则华嘎处传授《经·集密意续》灌顶及交付印持的过程中，年幼的喇钦作雄巴涅敦秋嘉多吉由父亲芒绕瓦班玛敦珠领着完整地听受了。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "喇钦在桑库为曼隆巴独传《集密意续》灌顶", "participants": [{"entity": "喇钦作雄巴涅敦秋嘉多吉", "role": "灌顶师"}, {"entity": "曼隆巴钦波酿敦罗秋多吉", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他在荣莫香巴绕地方，严格闭关，也以造黑心滴引导作伪装，在桑库地方为曼隆巴钦波酿敦罗秋多吉独传《集密意续》灌顶及交付印持。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "曼隆巴将《集密意续》灌顶详细传给多吉札化身", "participants": [{"entity": "曼隆巴钦波酿敦罗秋多吉", "role": "传法者"}, {"entity": "根桑班玛陈列", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他将《集密意续》灌顶、交付印持及实践窍诀详细赐给前译佛法的教主多吉札仁真秋的化身，这位大德是那南多吉敦珠（降魔金刚）的转世——仁真吉的化身，铁蛇年于曼卡南哲洲出生在夏那种姓中，其父名为德巴嘎玛彭措旺波。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "根桑班玛陈列在第五世达赖前出家受比丘戒", "participants": [{"entity": "根桑班玛陈列", "role": "受戒者"}, {"entity": "第五世达赖喇嘛", "role": "亲教师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他在全知第五世达\n赖喇嘛面前出家，赐名为根桑班玛陈列（意为普贤莲花事业）。后来也在第五世达赖喇嘛前受比丘戒，并且听受了众多深法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "根桑班玛陈列造《集密意续灌顶仪轨坛城海之津梁》", "participants": [{"entity": "根桑班玛陈列", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尤其是经全知第五世达赖喇嘛诏书劝请，造了《集密意续灌顶仪轨坛城海之津梁》，并且多次完整授予《集密意续》灌顶等等，依此对《经·集密意续》利益颇大。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "扬敦南卡多吉在得钦卓玛前听受《集密意续》灌顶", "participants": [{"entity": "扬敦南卡多吉", "role": "受者"}, {"entity": "得钦卓玛", "role": "灌顶师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尤其是有关《集密意续》的灌顶、交付印持及教言，他在有桑吉仁钦亲传的得钦卓玛面前听受过，对经续窍诀及修部无不精通，在达寻南当的禅房里主要专心致志实修，结果风心获得稳固，现前了生圆次第的密意，四种事业运用自如，依此利益所化众生。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "扬敦南卡多吉为夏莫多吉嘉村灌顶并恩授教言", "participants": [{"entity": "扬敦南卡多吉", "role": "灌顶师"}, {"entity": "夏莫多吉嘉村", "role": "受者"}], "location": "达寻南当禅房", "time_info": "", "layers": ["史传"], "quote": "尤其是有关《集密意续》的灌顶、交付印持及教言，他在有桑吉仁钦亲传的得钦卓玛面前听受过，对经续窍诀及修部无不精通，在达寻南当的禅房里主要专心致志实修，结果风心获得稳固，现前了生圆次第的密意，四种事业运用自如，依此利益所化众生。他在南当禅房为成就者夏莫多吉嘉村灌顶，并恩授讲释及教言。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "扬敦南卡多吉将《集密意续》灌顶授予仁真耶哲多吉", "participants": [{"entity": "扬敦南卡多吉", "role": "灌顶师"}, {"entity": "仁真耶哲多吉", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在大乐静处修行，生起次第得到稳固，无碍成就四事业，圆满次第的觉受证悟达到究竟，以讲经说法、实地修行弘扬佛法。\n仁真耶哲多吉扬敦南卡多吉在大乐修行处，将《集密意续》的灌顶、交付印持圆满授予仁真耶哲多吉，并且也恩赐了讲解与教言。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "仁真耶哲多吉为克主罗珠嘉村传授《集密意续》灌顶", "participants": [{"entity": "仁真耶哲多吉", "role": "灌顶师"}, {"entity": "克主罗珠嘉村", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "克主罗珠嘉村仁真耶哲多吉为涅嘉那革玛绕的化身克主罗珠嘉村吉祥贤，传授《集密意续》圆满四源流的灌顶、交付印持、讲解、教言及实践法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "克主罗珠嘉村弃俗出家", "participants": [{"entity": "克主罗珠嘉村", "role": "受戒者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "正当他风华正茂之时，便觉醒了佛性，而弃俗出家，依止了大上师金刚持札巴仁钦、永真阿旺札巴、班朗心子达瓦嘉村、伏藏大师月波朗巴、不舍肉身飞往空行刹土的多吉桑给等若干位成就者的殊胜上师，无有厌足地听闻无边法门。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "克主罗珠嘉村用金粉印《十七续》等教法经函", "participants": [{"entity": "克主罗珠嘉村", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他造了讲修注疏、仪轨、事业、实践法、教史、辩答等著作，也用金粉印了《十七续》、《布玛心滴》、《集善逝》等为主为数不少的教藏法、伏藏经函，以诸如此类讲经说法、实地修持、广行善事极其壮观的事业发扬光大前译佛法，这位尊者在七十三岁时撰著《观察赎死文》。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "克主罗珠嘉村为大译师洋彭多吉赐予《集密意续》灌顶", "participants": [{"entity": "克主罗珠嘉村", "role": "灌顶师"}, {"entity": "大译师洋彭多吉", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "很显然，他住世时间较此更长。\n贡绕大译师洋彭多吉克主罗珠嘉村尊者为贡绕大译师洋彭多吉赐予《集密意续》的四法流圆满灌顶、交付印持、讲解、教言及实践法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "大译师洋彭多吉受沙弥戒和比丘戒", "participants": [{"entity": "大译师洋彭多吉", "role": "受戒者"}], "location": "", "time_info": "{'text': '十二岁受沙弥戒，二十一岁受比丘戒', 'relative_to': '大译师洋彭多吉 (E_851)', 'absolute': None}", "layers": ["史传"], "quote": "他孩提时代，聪明伶俐，无拘无束，有对谁也无所畏惧的豪迈气概。他从小就一心向往无有挂碍的出家身份，十二岁在红帽法自在面前受沙弥戒，二十一岁受比丘戒，成了出类拔萃的僧人。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "大译师洋彭多吉三次刻印《宁玛续全集》", "participants": [{"entity": "大译师洋彭多吉", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他曾三次刻印《宁玛续全集》，考虑到佛法一脉相传，其中的两份送到康区和贡地，以此为主，对于有能力利益众生者，只要他手中有经卷，就会赐予，即使没有，他也会慷慨布施给他们修行的物资。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "大译师洋彭多吉六十一岁圆寂", "participants": [{"entity": "大译师洋彭多吉", "role": "主体"}], "location": "", "time_info": "{'text': '六十一岁', 'relative_to': '大译师洋彭多吉 (E_851)', 'absolute': None}", "layers": ["史传"], "quote": "总而言之，这位大德具有智慧高超、戒律清净、人格贤善的功德，讲经说法、实地修持、广行善举的事业等同虚空。六十一岁正值年灾之初趋至寂灭法界。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "大译师洋彭多吉将法脉传给密主陈列棱珠", "participants": [{"entity": "大译师洋彭多吉", "role": "传法者"}, {"entity": "密主陈列棱珠", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "六十一岁正值年灾之初趋至寂灭法界。\n密主陈列棱珠贡绕大译师洋彭多吉将法脉传给大努桑吉益西的转世密主陈列棱珠。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "密主陈列棱珠在则拉嘉措前出家", "participants": [{"entity": "密主陈列棱珠", "role": "受戒者"}, {"entity": "则拉嘉措", "role": "亲教师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尤其是在父亲面前闻受了上师（即莲花生大士）、大圆满、大悲观音三修部等教藏法与伏藏法的许多灌顶、引导、讲解、传承，并以思维修行抉择。后来在大德则拉嘉措面前出家，赐名陈列棱珠吉祥贤，也在其前不同程度地听闻了法要。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "密主陈列棱珠在大译师面前听受《集密意续》四法流灌顶", "participants": [{"entity": "密主陈列棱珠", "role": "受者"}, {"entity": "大译师洋彭多吉", "role": "灌顶师"}], "location": "", "time_info": "{'text': '二十九岁土兔年四月', 'relative_to': '密主陈列棱珠 (E_877)', 'absolute': None}", "layers": ["史传"], "quote": "二十九岁土兔年四月，在贡绕棱珠得地方于大译师洋彭多吉面前，用彩粉建起《集密意续》根本及分支的所有坛城，在涅巴德勒的法本上，十七天内圆满听受了四法流的灌顶、交付印持、修行次第及窍诀，与大修之业次第相关的法要。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "密主陈列棱珠完整授法并授予继承者灌顶给伏藏大师杰美多吉", "participants": [{"entity": "密主陈列棱珠", "role": "传法者"}, {"entity": "伏藏大师杰美多吉", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "消除自私自利的执著，遍虚空的利他大悲不加勤作油然而生，进而对追求解脱的许多高低有缘者，不间断地广转讲修法轮，依此大范围地弘扬佛法、利乐有情。尤其是对身语意之胜子——伏藏大师杰美多吉，完整无缺地恩赐博大精深的一切法，并授予作为继承者的灌顶。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "密主陈列棱珠五十二岁水虎年圆寂", "participants": [{"entity": "密主陈列棱珠", "role": "主体"}], "location": "", "time_info": "{'text': '五十二岁水虎年二月二十二', 'relative_to': '密主陈列棱珠 (E_877)', 'absolute': None}", "layers": ["史传"], "quote": "尤其是对身语意之胜子——伏藏大师杰美多吉，完整无缺地恩赐博大精深的一切法，并授予作为继承者的灌顶。五十二岁水虎年二月二十二，伴着顶髻跳动、自光四射、香气缭绕，色身融入法界。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "大译师秋嘉丹真在索南仁钦前出家", "participants": [{"entity": "大译师秋嘉丹真", "role": "受戒者"}, {"entity": "索南仁钦", "role": "亲教师"}], "location": "穹吉华热佛学院", "time_info": "", "layers": ["史传"], "quote": "不费力而通达读写、仪轨、事业。一心向往而来到穹吉华热佛学院，在住持索南仁钦面前出家，取名为秋嘉丹真。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "秋嘉丹真听受宿派《集密意续》灌顶", "participants": [{"entity": "大译师秋嘉丹真", "role": "受者"}, {"entity": "密主陈列棱珠", "role": "灌顶师"}], "location": "", "time_info": "{'text': '十八岁土鼠年', 'relative_to': '大译师秋嘉丹真 (E_888)', 'absolute': None}", "layers": ["史传"], "quote": "那一年内，持明陈列棱珠被迎请到穹吉华山，化身秋陈列南嘉，将卫藏的僧人集中在后藏，听受了宿派《集密意续》的灌顶、教言、交付印持、与彩粉坛城中大修相关的法要，聚集少数师徒，上师在彩画上赐予康派和宿派的法要时，他也一起听受了。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "秋嘉丹真向伏藏大师杰美多吉献上《集密意续》灌顶", "participants": [{"entity": "大译师秋嘉丹真", "role": "灌顶师"}, {"entity": "伏藏大师杰美多吉", "role": "受者"}], "location": "", "time_info": "{'text': '三十二岁水虎年', 'relative_to': '大译师秋嘉丹真 (E_888)', 'absolute': None}", "layers": ["史传"], "quote": "当时，正确地领会了在父亲前所听受的《集密意续》灌顶、传承和实践法，后来应寺院迎请，他欣然同意，到达以后对伏藏大师仁波切也献上《集密意续》的灌顶。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "大译师秋嘉丹真七十八岁圆寂", "participants": [{"entity": "大译师秋嘉丹真", "role": "主体"}], "location": "", "time_info": "{'text': '七十八岁土鼠年四月', 'relative_to': '大译师秋嘉丹真 (E_888)', 'absolute': None}", "layers": ["史传"], "quote": "因此对前译派教法作出了至高无上的贡献。尊者七十八岁土鼠年四月，在达多朗静处圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "大译师达玛西日在第五世达赖前出家受戒", "participants": [{"entity": "大译师达玛西日", "role": "受戒者"}, {"entity": "第五世达赖喇嘛", "role": "亲教师"}], "location": "", "time_info": "{'text': '十五岁出家受沙弥戒，二十岁受比丘戒', 'relative_to': '大译师达玛西日 (E_893)', 'absolute': None}", "layers": ["史传"], "quote": "在伏藏大师面前受三皈五戒，取名丹增嘉扬旺波。十五岁时，在第五世达赖喇嘛面前出家，赐名谓阿旺秋华，并受沙弥戒。二十岁也是在第五世达赖喇嘛前受比丘戒。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "大译师达玛西日十二岁于彩粉坛城听受持明心滴灌顶", "participants": [{"entity": "大译师达玛西日", "role": "受者"}], "location": "", "time_info": "{'text': '十二岁', 'relative_to': '大译师达玛西日 (E_893)', 'absolute': None}", "layers": ["史传"], "quote": "在至尊伏藏大师面前受了三教轨的菩萨戒。曾经在十二岁时，于彩粉坛城中听受持明心滴灌顶，而使心相续得以成熟。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "大译师达玛西日传授比丘戒和沙弥戒", "participants": [{"entity": "大译师达玛西日", "role": "亲教师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "此外，他还在持明班玛陈列面前听受了《时轮金刚》的圆满灌顶和寂猛幻化网的灌顶为主新旧派无偏二十位上师各自不同教轨的如海法理，并进行思维修行，这方面的实例言之不尽。他一心为佛法着想，由他传授比丘戒的有四百四十七位比丘，一千二百八十八位沙弥。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "大译师达玛西日冬夏两季不间断传《密藏续》法轮", "participants": [{"entity": "大译师达玛西日", "role": "传法者"}], "location": "", "time_info": "{'text': '四十八岁到六十四岁', 'relative_to': '大译师达玛西日 (E_893)', 'absolute': None}", "layers": ["史传"], "quote": "他从四十八岁开始到六十四岁之间，在冬夏两季，一直不间断地为六十位具有殊胜缘分、智慧敏捷的持明僧众转《密藏续》法轮，也传讲了《决定三戒论》、《般若》、《戒律》等许多大经大论。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "大译师达玛西日授予萨迦巴大师新伏藏圆满灌顶", "participants": [{"entity": "大译师达玛西日", "role": "灌顶师"}, {"entity": "阿旺根嘎札西", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "对具德萨迦巴大师阿旺根嘎札西，授予了新伏藏的圆满灌顶、传承、大悲成熟引导", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "大译师达玛西日在多康畅都传法", "participants": [{"entity": "大译师达玛西日", "role": "传法者"}, {"entity": "帕巴拉嘉瓦嘉措", "role": "受者"}, {"entity": "月瓦桑波", "role": "受者"}, {"entity": "阿旺哲革", "role": "受者"}], "location": "多康畅都", "time_info": "{'text': '五十九岁水龙年', 'relative_to': '大译师达玛西日 (E_893)', 'absolute': None}", "layers": ["史传"], "quote": "五十九岁水龙年，他被迎请到了多康畅都地方，为帕巴拉嘉瓦嘉措、月瓦桑波及阿旺哲革传授完整的新伏藏类、《上师密集续》、涅伏藏威猛法，《普巴剑》、《根除地狱》、君王派观音法等新旧派无偏的许多灌顶、传承、窍诀甘露，使他们心相续得以成 // BFS: get N generations up and down from a root
// ============================================================
function getLineageTree(rootName, upGens = 3, downGens = 3) {
  const nodes = new Map(); // name → { name, type, generation }
  const edges = []; // { source, target, specialty }

  const rootNode = nodeMap[rootName] || { id: rootName, type: 'unknown', sub_type: '' };
  nodes.set(rootName, { name: rootName, type: rootNode.type, sub_type: rootNode.sub_type || '', generation: 0 });

  // BFS upward (teachers)
  let frontier = [rootName];
  for (let gen = 1; gen <= upGens; gen++) {
    const next = [];
    frontier.forEach(name => {
      (teachers[name] || []).forEach(t => {
        if (!nodes.has(t.name)) {
          const n = nodeMap[t.name] || { type: 'unknown', sub_type: '' };
          nodes.set(t.name, { name: t.name, type: n.type, sub_type: n.sub_type || '', generation: -gen });
          next.push(t.name);
        }
        edges.push({ source: t.name, target: name, specialty: t.specialty, quote: t.quote, chapter: t.chapter });
      });
    });
    frontier = next;
  }

  // BFS downward (students)
  frontier = [rootName];
  for (let gen = 1; gen <= downGens; gen++) {
    const next = [];
    frontier.forEach(name => {
      (students[name] || []).forEach(s => {
        if (!nodes.has(s.name)) {
          const n = nodeMap[s.name] || { type: 'unknown', sub_type: '' };
          nodes.set(s.name, { name: s.name, type: n.type, sub_type: n.sub_type || '', generation: gen });
          next.push(s.name);
        }
        edges.push({ source: name, target: s.name, specialty: s.specialty, quote: s.quote, chapter: s.chapter });
      });
    });
    frontier = next;
  }

  // Deduplicate edges
  const edgeSet = new Set();
  const uniqueEdges = edges.filter(e => {
    const key = `${e.source}→${e.target}`;
    if (edgeSet.has(key)) return false;
    edgeSet.add(key);
    return true;
  });

  return { nodes: Array.from(nodes.values()), edges: uniqueEdges, root: rootName };
}

// ============================================================
// RENDER — hierarchical top-to-bottom layout
// ============================================================
const width = window.innerWidth;
const height = window.innerHeight;
const svg = d3.select("#chart").attr("width", width).attr("height", height);
const g = svg.append("g");

// Zoom
svg.call(d3.zoom().scaleExtent([0.2, 4]).on("zoom", e => g.attr("transform", e.transform)));

const typeColors = {
  "人物": "#7eb8da", "圣众": "#c9a96e", "非人": "#b05a5a",
  "寺院": "#6ba386", "地名": "#8895a7", "经典": "#9a85a8",
  "教法": "#c4956a", "教派": "#8a7d68", "仪轨": "#6a9b9e",
  "法器圣物": "#a88a9d", "集合": "#b5b88a", "unknown": "#555"
};

let currentRoot = null;

function renderTree(data) {
  g.selectAll("*").remove();

  const { nodes, edges, root } = data;
  if (nodes.length === 0) return;

  currentRoot = root;

  // Compute generation range
  const minGen = d3.min(nodes, d => d.generation);
  const maxGen = d3.max(nodes, d => d.generation);

  // Group nodes by generation
  const genGroups = {};
  nodes.forEach(n => {
    if (!genGroups[n.generation]) genGroups[n.generation] = [];
    genGroups[n.generation].push(n);
  });

  // Layout: vertical layers, horizontal spread
  // 动态层间距：根据最大一层的节点数调整
  const maxGroupSize = Math.max(...Object.values(genGroups).map(g => g.length));
  const layerHeight = Math.max(160, maxGroupSize * 12); // 节点越多层距越大
  const nodeSpacing = 160; // 每个节点最小水平间距

  const centerY = height / 2 - ((maxGen + minGen) / 2) * layerHeight;

  const nodePositions = {};
  Object.keys(genGroups).sort((a, b) => a - b).forEach(gen => {
    const group = genGroups[gen];
    const y = centerY + gen * layerHeight;
    const totalWidth = group.length * nodeSpacing;
    const startX = (width - totalWidth) / 2 + nodeSpacing / 2;

    group.forEach((n, i) => {
      n.x = group.length === 1 ? width / 2 : startX + i * nodeSpacing;
      n.y = y;
      nodePositions[n.name] = n;
    });
  });

  // Generation labels
  const genLabels = {
    0: "当前",
  };
  for (let i = 1; i <= -minGen; i++) genLabels[-i] = `上${i}代`;
  for (let i = 1; i <= maxGen; i++) genLabels[i] = `下${i}代`;

  Object.entries(genGroups).forEach(([gen, group]) => {
    g.append("text")
      .attr("class", "generation-label")
      .attr("x", 60)
      .attr("y", centerY + gen * layerHeight + 4)
      .text(genLabels[gen] || `第${gen}代`)
      .attr("fill", gen == 0 ? "#c9a96e" : "#444");

    // Subtle horizontal line
    g.append("line")
      .attr("x1", 70).attr("x2", width - 20)
      .attr("y1", centerY + gen * layerHeight)
      .attr("y2", centerY + gen * layerHeight)
      .attr("stroke", gen == 0 ? "rgba(201,169,110,0.15)" : "rgba(255,255,255,0.03)")
      .attr("stroke-width", 1);
  });

  // Draw edges — S 曲线，悬停原生 tooltip 显示原文
  var linkG = g.append("g");

  edges.forEach(function(e) {
    var src = nodePositions[e.source];
    var tgt = nodePositions[e.target];
    if (!src || !tgt) return;

    var sy = src.y + 14, ty = tgt.y - 14;
    var cy1 = sy + (ty - sy) * 0.4;
    var cy2 = sy + (ty - sy) * 0.6;
    var d = "M" + src.x + "," + sy + " C" + src.x + "," + cy1 + " " + tgt.x + "," + cy2 + " " + tgt.x + "," + ty;

    // 可见线
    var line = linkG.append("path").attr("d", d)
      .attr("fill", "none").attr("stroke", "rgba(106,174,214,0.25)").attr("stroke-width", 1.2);

    // 粗透明线捕获鼠标
    var tip = e.source + " → " + e.target;
    if (e.specialty) tip += "\n传承: " + e.specialty;
    if (e.quote) tip += "\n原文:「" + e.quote + "」";
    if (e.chapter) tip += "\n来源: " + e.chapter;

    linkG.append("path").attr("d", d)
      .attr("fill", "none").attr("stroke", "transparent").attr("stroke-width", 10)
      .style("cursor", "pointer")
      .on("mouseover", function() { line.attr("stroke", "rgba(106,174,214,0.8)").attr("stroke-width", 2.5); })
      .on("mouseout", function() { line.attr("stroke", "rgba(106,174,214,0.25)").attr("stroke-width", 1.2); })
      .on("click", (function(ev) {
        var p = document.getElementById("relation-panel");
        document.getElementById("rel-title").textContent = ev.source + " → " + ev.target;
        document.getElementById("rel-specialty").textContent = ev.specialty || "（未标注）";
        document.getElementById("rel-quote").textContent = ev.quote ? "「" + ev.quote + "」" : "（无原文记录）";
        document.getElementById("rel-source").textContent = ev.chapter || "";
        p.style.display = "block";
      }).bind(null, e));

    // 箭头
    linkG.append("polygon").attr("points", "-3,-5 3,-5 0,0")
      .attr("transform", "translate(" + tgt.x + "," + ty + ")")
      .attr("fill", "rgba(106,174,214,0.3)");
  });

  // Draw nodes
  const nodeG = g.append("g");
  nodes.forEach(n => {
    const isRoot = n.name === root;
    const color = typeColors[n.type] || typeColors.unknown;
    const radius = isRoot ? 16 : 10;

    const ng = nodeG.append("g")
      .attr("transform", `translate(${n.x},${n.y})`)
      .style("cursor", "pointer")
      .on("click", () => selectEntity(n.name));

    // Glow for root
    if (isRoot) {
      ng.append("circle")
        .attr("r", radius + 6)
        .attr("fill", "none")
        .attr("stroke", color)
        .attr("stroke-width", 1)
        .attr("opacity", 0.3);
    }

    ng.append("circle")
      .attr("class", "node-circle")
      .attr("r", radius)
      .attr("fill", color)
      .attr("stroke", isRoot ? "#fff" : "rgba(255,255,255,0.15)")
      .attr("stroke-width", isRoot ? 2 : 1)
      .attr("opacity", isRoot ? 1 : 0.85);

    ng.append("text")
      .attr("class", "node-label")
      .attr("y", radius + 16)
      .attr("fill", isRoot ? "#e0d0a0" : "#aaa")
      .attr("font-size", isRoot ? "13px" : "11px")
      .attr("font-weight", isRoot ? "500" : "400")
      .text(n.name);
  });

  // Show info panel
  showPanel(root);
}

// ============================================================
// Panel
// ============================================================
function showPanel(name) {
  const panel = document.getElementById("info-panel");
  const node = nodeMap[name] || {};

  document.getElementById("panel-name").textContent = name;
  document.getElementById("panel-type").textContent = node.sub_type || node.type || 'unknown';

  const teacherList = (teachers[name] || []).map(t =>
    `<span onclick="selectEntity('${t.name}')">${t.name}</span>${t.specialty ? '<span class="specialty-tag">' + t.specialty + '</span>' : ''}${t.quote ? '<div class="quote-text">「' + t.quote + '」<span class="quote-src">' + t.chapter + '</span></div>' : ''}`
  ).join('') || '<span style="color:#555">无记录</span>';

  const studentList = (students[name] || []).map(s =>
    `<span onclick="selectEntity('${s.name}')">${s.name}</span>${s.specialty ? '<span class="specialty-tag">' + s.specialty + '</span>' : ''}${s.quote ? '<div class="quote-text">「' + s.quote + '」<span class="quote-src">' + s.chapter + '</span></div>' : ''}`
  ).join('') || '<span style="color:#555">无记录</span>';

  document.getElementById("panel-teachers").innerHTML = teacherList;
  document.getElementById("panel-students").innerHTML = studentList;

  // Events
  var evtSection = document.getElementById("events-section");
  var evtDiv = document.getElementById("panel-events");
  var evtCount = document.getElementById("events-count");
  if (typeof entityEventIndex !== 'undefined' && entityEventIndex[name]) {
    var indices = entityEventIndex[name];
    evtCount.textContent = "(" + indices.length + ")";
    evtDiv.innerHTML = indices.slice(0, 30).map(function(idx) {
      var evt = allEvents[idx];
      if (!evt) return '';
      var q = evt.quote || '';
      var qShort = q.length > 60 ? q.substring(0, 60) + '…' : q;
      return '<div class="event-item" onclick="this.classList.toggle(\'expanded\')">'
        + '<span class="event-type-tag">' + (evt.type || '') + '</span>'
        + '<span class="event-title">' + (evt.title || '') + '</span>'
        + '<div class="event-quote">「' + q + '」<div class="event-chapter">' + (evt.chapter || '') + '</div></div>'
        + '</div>';
    }).join('');
    evtSection.style.display = "block";
  } else {
    evtSection.style.display = "none";
  }

  panel.style.display = "block";
}

function closePanel() {
  document.getElementById("info-panel").style.display = "none";
}

function selectEntity(name) {
  const tree = getLineageTree(name, 3, 3);
  renderTree(tree);
  document.getElementById("help-text").style.display = "none";
}

// ============================================================
// Search
// ============================================================
const searchInput = document.getElementById("search-input");
const suggestionsDiv = document.getElementById("suggestions");

const searchableNames = Array.from(allNames).sort();

searchInput.addEventListener("input", function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { suggestionsDiv.style.display = "none"; return; }

  const matches = searchableNames.filter(n => n.toLowerCase().includes(q)).slice(0, 15);

  if (matches.length === 0) {
    suggestionsDiv.style.display = "none";
    return;
  }

  suggestionsDiv.innerHTML = matches.map(m => {
    const node = nodeMap[m] || {};
    return `<div class="suggestion-item" onclick="selectEntity('${m}'); suggestionsDiv.style.display='none'; searchInput.value='${m}';">
      ${m} <span class="type-tag">${node.type || ''}</span>
    </div>`;
  }).join('');
  suggestionsDiv.style.display = "block";
});

searchInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    const q = this.value.trim();
    const match = searchableNames.find(n => n === q) || searchableNames.find(n => n.includes(q));
    if (match) {
      selectEntity(match);
      suggestionsDiv.style.display = "none";
    }
  }
});

document.addEventListener("click", function(e) {
  if (!e.target.closest("#search-box") && !e.target.closest("#suggestions")) {
    suggestionsDiv.style.display = "none";
  }
});

// ============================================================
// Default: show 莲花生大士
// ============================================================
selectEntity("莲花生大士");
</script>
