体"}, {"entity": "紫青树神母", "role": "被降伏者"}], "location": "色达", "time_info": "{'text': '四十七岁，三月十三', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["神变"], "quote": "我一把抓住她的右手，夺过粗牛毛带子，将金刚橛插入她的心脏。她大喊：“坏蛋，放了我！”我说：“我非杀你不可！”她连忙说：“不要杀我，我发誓不害你。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "敦珠林巴呼唤永仲嘉则名字降雪验相", "participants": [{"entity": "敦珠仁波切", "role": "主体"}, {"entity": "永仲嘉则", "role": "到来者"}], "location": "色达", "time_info": "{'text': '六月初二', 'relative_to': None, 'absolute': None}", "layers": ["神变"], "quote": "六月初二那天，我到高高的山顶，喊了三遍“永仲嘉则”，当时万里无云、蓝蓝的晴空中飘落星星点点的雪粒，整个大地变成了银白色，人们都感到奇怪。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "空行母预言四十八岁大寿障及修行要诀", "participants": [{"entity": "益西措嘉空行母", "role": "授记者（以女孩形态）"}, {"entity": "敦珠仁波切", "role": "受记者"}], "location": "", "time_info": "{'text': '四十七岁六月之前', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["授记"], "quote": "在该月之前，说是空行母益西措嘉的女孩，穿着五色的长短衣裳，用各种珍宝装饰打扮，出现在我的对面说：“尊敬的大德，你四十八岁会有一个大寿障，难以消除，想方设法遣除它相当重要。”我问：“要采取什么措施呢？”她说：“奇哉！请听请听善男子，出生东族之中者，名字末尾有卓字，因有往昔之愿力，如若依之作手印，消除寿障圆财富，又得三种珍宝珠，盛名遍及于三地。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "传法", "title": "敦珠林巴传授断魔和大圆满引导予百名弟子", "participants": [{"entity": "敦珠仁波切", "role": "传法者"}], "location": "", "time_info": "{'text': '四十八岁冬天', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["史传"], "quote": "岁\n48\n在我四十八岁那年冬天，我给一百名左右的弟子传授断魔和大圆满引导。十一月初十的晚上，说是遍行能明空行母的一个女子对我说了这番话：“奇哉！不要涣散倾听空行的话语，在这个地方，受持你教法的大德中，有班玛名称的人，实修切合要点，居无定所；有敦思名字的大德，秉承大圆满密意通彻的言教，居于不定的山间，如果没有被邪道恶魔欺惑，获得大虹身，现前成佛；名字中有嘉措的大德，策励修行精华法门，如果能做到终生修行，获证真实圆满佛果；名字结尾有珠字的大德，如果没有周旋在世间八法中，将成就虹身幻身；名字以绕结尾的大德，如果没有被八风所诱惑，将成就虹身幻身胜果。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "遍行能明空行母授记弟子修行前途", "participants": [{"entity": "遍行能明空行母", "role": "授记者"}, {"entity": "敦珠仁波切", "role": "受记者"}], "location": "", "time_info": "{'text': '十一月初十的晚上', 'relative_to': None, 'absolute': None}", "layers": ["授记"], "quote": "十一月初十的晚上，说是遍行能明空行母的一个女子对我说了这番话：“奇哉！不要涣散倾听空行的话语，在这个地方，受持你教法的大德中，有班玛名称的人，实修切合要点，居无定所；有敦思名字的大德，秉承大圆满密意通彻的言教，居于不定的山间，如果没有被邪道恶魔欺惑，获得大虹身，现前成佛；名字中有嘉措的大德，策励修行精华法门，如果能做到终生修行，获证真实圆满佛果；名字结尾有珠字的大德，如果没有周旋在世间八法中，将成就虹身幻身；名字以绕结尾的大德，如果没有被八风所诱惑，将成就虹身幻身胜果。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "大密藏空行母授记须以诛法降伏树神母", "participants": [{"entity": "大密藏空行母", "role": "授记者"}, {"entity": "敦珠仁波切", "role": "受记者"}], "location": "", "time_info": "{'text': '十二月十六', 'relative_to': None, 'absolute': None}", "layers": ["授记"], "quote": "十二月十六那天，说是大密藏空行母的一个黑色女人说：“奇哉，此地是空行圣母、莲花空行聚集的圣地，对面的那片森林住着树神母，她与曼姆、夏萨、卓绰玛、莫珍四位相伴，如果没有依靠诛法降伏她，以息业无法指使，到了猴年，会出现预兆，要集中精力运用诛业。”说完她就无踪无影了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "敦珠林巴净相游历杨柳刹土面见忿怒本尊", "participants": [{"entity": "敦珠仁波切", "role": "主体"}], "location": "杨柳刹土", "time_info": "{'text': '四十九岁，三月初六的晚上', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["证境"], "quote": "岁\n49\n我四十九岁的那一年，三月初六的晚上，一位肌肤红色、穿着红锦缎衣裳的空行母牵着我的右手说：“我们去杨柳刹土去观赏好吗？”就这样，我们在上方八由旬高的空中以飞行姿势翱翔，向东而行，我眼前浮现出这样一幅场面：在一个大山谷尾端，有一片茂密的森林，中间到处是檀香树、青竹、果树。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "灌顶", "title": "杨柳刹土寂静本尊授灌顶并教授伏藏要义", "participants": [{"entity": "敦珠仁波切", "role": "受灌者"}], "location": "杨柳刹土", "time_info": "{'text': '同一净相中', 'relative_to': None, 'absolute': None}", "layers": ["证境"], "quote": "尊者用金刚杵接触我的头说道：“愿你圆满我修法的灌顶传承。”最后他问我：“善男子，你正在将伏藏法立成文字吗？”我禀告说：“尽管我立了一些文字，但有远见卓识的智者们多数都说：‘以前佛陀的经典及高僧大德的论著已经足够了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "敦珠林巴降伏紫青树神母及其三眷属", "participants": [{"entity": "敦珠仁波切", "role": "主体"}, {"entity": "紫青树神母", "role": "被降伏者"}, {"entity": "万索", "role": "助手"}], "location": "", "time_info": "{'text': '五十岁，一月至四月', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["史传", "神变"], "quote": "”说完就不见了。后来我依教奉行，到那片树林中，抛撒驱魔芥子，射出许多火箭，摧毁妖岩，斩断妖树，熏烧臭烟，降伏了她的三个树神母眷属。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "弘法", "title": "敦珠林巴在多耶昂巴山谷为百名弟子传法", "participants": [{"entity": "敦珠仁波切", "role": "传法者"}], "location": "多耶昂巴山谷", "time_info": "{'text': '五十岁五月', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["史传"], "quote": "从那以后，按照持密藏空行母所说“现在去多耶昂巴山谷”，五月里我去那里居住下来，为云集于那里的一百名左右弟子讲经说法。八月初十的晚上，说是乐源的空行母，身上穿着白色的衣裳，手里拿着香杖，这样说道：“奇哉！尊贵的大德请倾听，如果你不认识我，我就是乐源空行母，如果你不知这个地方，它就是北方嘉札宗钦。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "乐源空行母授记嘉札宗钦佛法兴盛及金刚手化身投生", "participants": [{"entity": "乐源空行母", "role": "授记者"}, {"entity": "敦珠仁波切", "role": "受记者"}], "location": "", "time_info": "{'text': '八月初十的晚上', 'relative_to': None, 'absolute': None}", "layers": ["授记"], "quote": "你如果在此久留，佛法兴盛，财源丰富，会广泛利益众生。由于\n业缘的感召，我没有发现你有久留的缘分，此处的东方佛塔前，名叫东勒曼的天女，受持邬金莲师的意伏藏，三次呼唤她的名字，将赐予殊胜的佛塔。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "伏藏开取", "title": "敦珠林巴从东勒曼天女处获得金刚橛和七佛遗塔舍利", "participants": [{"entity": "敦珠仁波切", "role": "受领者"}, {"entity": "东勒曼", "role": "交付者"}], "location": "", "time_info": "{'text': '九月初十', 'relative_to': None, 'absolute': None}", "layers": ["神变"], "quote": "”说完就拿来一个金刚橛和一个桦树皮的小包，把那个金刚橛交给我说：“这是邬金莲花生大士交付的一百零八个橛中的一个，是指定交予你的。”说完就给了我。她又把桦树皮的小包给我说：“这是七佛遗塔中的舍利，本来，此物与许多伏藏品是交付给伏藏大师大乐洲的，但由于他的缘起破坏了而没有取到，现在交付给你。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "切藏军兵攻击敦珠林巴帐篷未中", "participants": [{"entity": "敦珠仁波切", "role": "被攻击者"}], "location": "涅革章俄", "time_info": "{'text': '五十一岁，四月十五', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["史传"], "quote": "四月十五那天，切藏地方大约一百名军兵来到，他们向我的帐篷大概射了二十个火箭，可是没有中到帐篷，全部落到草原上了。在此之后，我把伏藏箱摔在地上，开始念诵真言诅咒。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "大夜叉护法神击退切藏土地神人马", "participants": [{"entity": "红黑现巴夜叉护法神", "role": "主体"}, {"entity": "拉隆勒卡", "role": "被击退者"}], "location": "喇荣", "time_info": "{'text': '九月到十一月间', 'relative_to': None, 'absolute': None}", "layers": ["神变"], "quote": "当时，说是切藏的土地神拉隆勒卡的十二匹人马，气势汹汹来到我的上方，当时大夜叉护法神挥舞宝剑宰了五匹人马，如同鹞鹰追小鸡一样把剩余的七个赶回到了他们自己的地方。那一年五月里，我的一个儿子降生了，出生后二十天他就能叫妈妈，并会念诵六字真言，我给他取名叫拉钦多杰嘉波。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "敦珠林巴之子拉钦多杰嘉波出生即能说话念咒", "participants": [{"entity": "拉钦多杰嘉波", "role": "主体"}, {"entity": "敦珠仁波切", "role": "父亲"}], "location": "", "time_info": "{'text': '五十一岁五月', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["神变"], "quote": "那一年五月里，我的一个儿子降生了，出生后二十天他就能叫妈妈，并会念诵六字真言，我给他取名叫拉钦多杰嘉波。\n岁\n52\n转年，我到了五十二岁，五月十三的晚上，一位说是莲冠空行母白皙的女子对我说：“你如果明天占据地盘，会有饮食的悉地，最后厉魔美达玛波的一个幻化，把它给了别人，那时就到了你必须用诛法的紧急关头。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "敦珠林巴召回紫青树神母", "participants": [{"entity": "敦珠仁波切", "role": "主体"}, {"entity": "紫青树神母", "role": "被召回者"}], "location": "紫青草原", "time_info": "{'text': '五十二岁六月二十六', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["神变"], "quote": "”六月二十六那天，我带着几个道友到以前住的那座山顶，连着喊了三遍：“紫青树神母，你上来吧！上来吧！”结果，当场的人们有目共睹了她到来的征相：伴着巨大的响声，刮起一阵黑黑的旋风，从虚空最后到了树林里。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "灌顶", "title": "邬金得达嘉波授予敦珠林巴阿巴绕则修法灌顶传承", "participants": [{"entity": "邬金得达嘉波", "role": "传法者"}, {"entity": "敦珠仁波切", "role": "受灌者"}], "location": "", "time_info": "{'text': '五十二岁九月初十', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["证境"], "quote": "”大师说：“我也想你需要财富，才来到这里。我是财神阿巴绕则，与大夜叉护法神、金刚手无二无别，显示财神相，我来讲解它的甚深修法，请认真听闻，铭记在心。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "嘉扬上师解释空行不悦之因", "participants": [{"entity": "嘉扬上师", "role": "授记者"}, {"entity": "敦珠仁波切", "role": "受记者"}], "location": "", "time_info": "{'text': '五十三岁十一月二十四晚', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["证境"], "quote": "当前，我除了修行，没有做什么令空行不高兴的事，可是多番出现空行心情不悦的相，这到底是什么导致的呢？”上师说：“你的确没有做过非法之事，可是大圆满是一切佛母、空行的殊妙心髓，如果对破誓言、不实修、颠倒受持意义以及不诚信的人们广传，那就是佛母、空行心情不悦的因，除此之外，众生的恶行是众生的本性，有什么可不悦的呢？为此要记住，勤奋念诵百字明，忏悔净罪至关重要。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "具法眼空行母授记北方多库有调化刹土", "participants": [{"entity": "具法眼空行母", "role": "授记者"}, {"entity": "敦珠仁波切", "role": "受记者"}], "location": "", "time_info": "{'text': '五十四岁五月初十夜晚', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["授记"], "quote": "”她说：“善男子，你听我讲，你自此前去上方，北方多库地方，有你所调化的刹土，也有一些财产受用，也有少许安乐的时机。当然只是暂时拥有，持久永恒的安乐，在南赡部洲绝不会有。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "红黑现巴夜叉护法神讲说肉食供养甚深义", "participants": [{"entity": "红黑现巴夜叉护法神", "role": "主体"}, {"entity": "敦珠仁波切", "role": "受教者"}], "location": "哦穹达西", "time_info": "{'text': '五十四岁六月初十', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["证境"], "quote": "”我说：“诸位智者们都说：不准摆设肉类供品，那是什么意思呢？”\n他哈哈大笑地说：“上至怙主勒丹，下至独角鬼塔嘉，没有不喜欢肉食的，为什么呢？五毒相续错乱的行人修行平庸所取能取的所有天尊，都是以平庸五毒的本性而居，因此全部贪婪血肉食品、喜欢杀业，就被立为屠杀佛教怨敌性命之刽子手的护法神。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "敦珠林巴降伏梦中持刀老僧鬼", "participants": [{"entity": "敦珠仁波切", "role": "主体"}], "location": "", "time_info": "{'text': '五十四岁某月十九晚', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["证境"], "quote": "”“我发誓不走，你杀我！从没有听过意形的鬼神在梦里能杀人。”说着我右手擒住他，他的刀掉到地上，指甲抓胸，我把他抱在怀里，仰面朝天打翻在地，将他的头平均划成四瓣，吮吸他的脑髓。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "大夜叉护法神斩断嘎桑多吉所派红骑士之弓", "participants": [{"entity": "红黑现巴夜叉护法神", "role": "护卫者"}, {"entity": "敦珠仁波切", "role": "受护者"}, {"entity": "嘎桑多吉", "role": "派遣者"}], "location": "哦穹达西", "time_info": "{'text': '在上达西修行时', 'relative_to': None, 'absolute': None}", "layers": ["证境"], "quote": "”他说完就拉弓射箭，正在这时，大夜叉护法神挥舞宝剑，从中间斩断了他的弓。于是，我抓住他说：“你要杀我，我能不杀你吗？”说罢将刀插入他的胸口。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "降伏非人", "title": "敦珠林巴降伏也钦寺大威德修行鬼", "participants": [{"entity": "敦珠仁波切", "role": "主体"}, {"entity": "红黑现巴夜叉护法神", "role": "助手"}], "location": "也钦寺", "time_info": "{'text': '九月', 'relative_to': None, 'absolute': None}", "layers": ["证境"], "quote": "”当下，我观想：自己的心与他的神识无别融合，在法界清净虚空境界中，以三声“啪达”，融合一体。一下子他就松开了我，一切就荡然无存了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "黑色女子授记敦珠林巴当修本尊回遮罗刹", "participants": [{"entity": "敦珠仁波切", "role": "受记者"}], "location": "", "time_info": "{'text': '五十五岁牛年三月初四晚', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["授记"], "quote": "岁\n55\n我五十五岁那一年是牛年，三月初四的晚上，我梦到：一个身穿青色罗玛衣裳的黑色女人对我说：“请听，善缘人请你听，东方可怖的罗刹，削断南方罗刹的发髻，佛教徒和苯教徒显现为不共戴天的冤\n家，大罗刹放出勾召咒，为了回遮来呼唤你，你全力以赴修行本尊，依此要点能消除自身的外缘，也能遣除施主之缘。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "建寺", "title": "敦珠林巴在勒达强建贤劫寺", "participants": [{"entity": "敦珠仁波切", "role": "建寺者"}], "location": "勒达强", "time_info": "{'text': '五十六岁', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["史传"], "quote": "七月里，有人从果洛来喊我时，我就去了那里。\n岁\n56\n我到了五十六岁时，在勒达强建了贤劫寺。那一年四月初八，我面见密智空行母。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "密智空行母授记高足兔年往生及金刚手化身投生", "participants": [{"entity": "密智空行母", "role": "授记者"}, {"entity": "敦珠仁波切", "role": "受记者"}], "location": "", "time_info": "{'text': '五十六岁四月初八', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["授记"], "quote": "她说：“尊贵的大士，你的那位高足，在兔年一月二十一日晚必定往生到邬金空行洲。兔年末，到贤劫寺去，暂时安住会吉祥善妙。”在那一年九月十九，空行母益西措嘉说：“明年金刚手的一位化身来投生为你的儿子。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "圆寂", "title": "敦珠林巴弟子正月二十一圆寂", "participants": [{"entity": "敦珠仁波切", "role": "师父"}], "location": "", "time_info": "{'text': '五十七岁正月二十一', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["史传"], "quote": "岁\n57\n转年我到了五十七岁，正月二十一那天，我的那个弟子圆寂了。二月初五的晚上，“则列曼”空行母对我说：“奇哉！请听善缘士，我是则列曼，来自妙拂境，此年仲秋月，上方有数人，迎请华智尊，使者两次至，未到羊年前，非是坐床时，空行令延迟。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "则列曼空行母授记华智转世坐床时机", "participants": [{"entity": "则列曼", "role": "授记者"}, {"entity": "敦珠仁波切", "role": "受记者"}], "location": "", "time_info": "{'text': '五十七岁二月初五晚', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["授记"], "quote": "二月初五的晚上，“则列曼”空行母对我说：“奇哉！请听善缘士，我是则列曼，来自妙拂境，此年仲秋月，上方有数人，迎请华智尊，使者两次至，未到羊年前，非是坐床时，空行令延迟。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "多吉耶喜玛空行母授记积累财产时机", "participants": [{"entity": "多吉耶喜玛空行母", "role": "授记者"}, {"entity": "敦珠仁波切", "role": "受记者"}], "location": "", "time_info": "{'text': '五十八岁一月初一夜', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["授记"], "quote": "她告诉我说：“很快有人邀请你时，你要毫不犹豫去往那里。到彼处之时，你会获得所需要的资财。四月里，来一位迎请的使者时你就去彼地。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "益西旺姆空行母告知不宜久住上达土", "participants": [{"entity": "益西旺姆", "role": "授记者"}, {"entity": "敦珠仁波切", "role": "受记者"}], "location": "", "time_info": "{'text': '五十八岁五月', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["授记"], "quote": "当时，我观察自己的梦，一位名叫益西旺姆的空行母这样说道：“诶诶，请听善缘士，若想居此处，高官多着魔，引领各方魔，境如梦中境，舍宅如鸟穴，人如集市客，假僧如黄狼，不见住此缘，此事记心中。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "空行母萨恰旺姆带敦珠林巴至度母净土", "participants": [{"entity": "萨恰旺姆", "role": "引导者"}, {"entity": "敦珠仁波切", "role": "朝礼者"}, {"entity": "圣度母", "role": "主尊"}], "location": "", "time_info": "{'text': '五十八岁初十', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["证境"], "quote": "到了初十那天，空行母萨恰旺姆说：“我们去观光吧。”我马上和她一起腾越到大约五十寻的上空，来到一个碧绿灿烂的大山顶峰越过一由旬的地方，翠绿光辉形成的大地幅员辽阔，中央是有些宝石所成\n的广大无量宫，里面莲花月垫上，至尊圣度母身色墨绿，右手拿着宝瓶，左手持执青莲花，以圆满报身装束严饰，双足作王妃起舞式，居于彩虹光芒萦绕之中，相貌极其庄严，令人动心，现为八岁妙龄童女，闪闪发光，她由二十位度母和不可思议的菩萨会众围绕着。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "敦珠林巴修大自在天法后梦中面见大自在天", "participants": [{"entity": "敦珠仁波切", "role": "修行者"}, {"entity": "大自在天", "role": "主尊"}], "location": "", "time_info": "{'text': '十一月念修二十一天后', 'relative_to': None, 'absolute': None}", "layers": ["证境"], "quote": "过了二十一天的晚上，梦中红光所成的无量殿里，红宝石组成的高广宝座莲花日月垫上，艳如红宝石般的大自在天，如劫末火般光芒耀眼，半静半怒，他由俄玛得瓦佛母和四时吉祥怙主骄矜的天女会众所环绕。我见到他时，他说：“你虽然精勤修行、供养我，可是由于修行助伴不妙，不会获得大悉地，以后会得到些微悉地。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "西方莲花空行母授记去班玛古取伏藏开隐蔽刹土门", "participants": [{"entity": "西方莲花空行母", "role": "授记者"}, {"entity": "敦珠仁波切", "role": "受记者"}], "location": "", "time_info": "{'text': '五十九岁一月初一晚', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["授记"], "quote": "在今年，从此向西方，有个叫班玛古的隐蔽地点，你去那里。在加拉桑达的地方有一个如猪头朝天般的山岩，那里隐藏着标题和钥匙伏藏，取出它，开启秘密刹土的门，能打开六十九种隐蔽山谷之门，必然广利众生。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "弟子阿旺嘉措往生后显现授记", "participants": [{"entity": "阿旺嘉措", "role": "授记者"}, {"entity": "敦珠仁波切", "role": "受记者"}, {"entity": "彭措札西", "role": "被授记者"}, {"entity": "仁增嘉措", "role": "被授记者"}], "location": "", "time_info": "{'text': '五十九岁四月初十夜', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["授记", "证境"], "quote": "在同年四月初十的夜晚，我的弟子阿旺嘉措以圆满受用身的装束严饰，从彩云浑然的领域向我作礼，说道：“南无！皈依之处上师尊，我之寿命究竟已，五十二岁离人世，往生现喜之刹土。为诸有缘徒开示，直断顿超双运道，有缘勇猛而修行，有些解脱大虹身，有些解脱智慧幻。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "执政", "title": "拉多华嘉瓦被认定为依钦仁波切转世而坐床", "participants": [{"entity": "拉多华嘉瓦", "role": "主体"}, {"entity": "敦珠仁波切", "role": "父亲"}], "location": "达则桑哲寺", "time_info": "{'text': '五十九岁七月十三', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["史传"], "quote": "在七月十三那天，我的幼子拉多华嘉瓦，被认定为噶托派达则桑哲寺无与伦比的活佛依钦仁波切的转世，而登上高高的金座（坐床），最后回到家乡，为已得莲花生大士授记的弟子圆满恩赐众多灌顶、传承。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "得雪旺姆授记弟子修大虹身教授之前途", "participants": [{"entity": "得雪旺姆", "role": "授记者"}, {"entity": "敦珠仁波切", "role": "受记者"}], "location": "", "time_info": "{'text': '五十九岁九月初十夜', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["授记"], "quote": "在那一年的九月初十的夜里，由许多珍宝饰品装点的空行母得雪旺姆出现在我的对面这样说道：“开隐刹门时已过，今于男女众弟子，\n指示大虹身正道，嘎门嘎之群体中，三名士夫成虹身；嘉门嘉之群体中，二人成就大虹身。喇门喇之群体中，三人成就虹光身；达门达之群体中，二人成就虹光身；大门大之群体中，五人成就虹光身；阿门阿之群体中，三人成就虹光身；东门东之群体中；一人成就虹光身；德门德之群体中，一人成就虹光身，格门格之群体中，四人成就虹光身；旺门旺之群体中，二人成就虹光身。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "观世音菩萨告诫放下嗔恨生起悲心", "participants": [{"entity": "大悲观音", "role": "授记者"}, {"entity": "敦珠仁波切", "role": "受记者"}], "location": "", "time_info": "{'text': '五十九岁十一月二十五晚', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["证境"], "quote": "那一年十一月二十五晚上，我面见了圣者观世音菩萨，他说：“孩儿呀，会出现个别引导下乘的上师对你的见修加以诋毁诽谤，他们都是魔的眷属。对此要放下嗔恨、生起悲心。请听，善缘之大德，光明大圆满，福浅无缘人，诽谤你可知？密乘大圆满，众生之福缘，无偏自圆满，愚法及一师，众生之福缘。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "灌顶", "title": "晋美上师在净土中授予觉性妙力大灌顶", "participants": [{"entity": "晋美", "role": "传法者"}, {"entity": "敦珠仁波切", "role": "受灌者"}, {"entity": "托毕创丹玛", "role": "引导者"}], "location": "", "time_info": "{'text': '六十岁一月初四夜', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["证境"], "quote": "”这时上师给我传了觉性妙力大灌顶，说道：“儿呀，你的心性原本清净，无有改造、无有取舍而安住在现前清净虚空的法界境界中，使境界得以稳固。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "耆婆医生告诫寺院修行要点", "participants": [{"entity": "敦珠仁波切", "role": "受教者"}], "location": "", "time_info": "{'text': '六十岁十二月二十八', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["证境"], "quote": "如果你想这里能否成立一个寺院，那么必然要有一个讲法修行闭关院。否则，取上寺院和学院的名称也没有必要。以前，虽然有一些怨敌、盗贼、土匪威胁，但在寺院里不会有。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "螺耳天童再度现身唱离世道歌", "participants": [{"entity": "螺耳天童", "role": "主体"}, {"entity": "敦珠仁波切", "role": "受教者"}], "location": "", "time_info": "{'text': '六十一岁某夜', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["证境"], "quote": "我到了三十三岁的一天夜里，他对我这样说：“噢，现在\n你稍稍认识见解，要知道那是我的恩德所致。我叫螺耳天童，受大圣观世音菩萨委派做你的友伴，现在暂时我和你不再见面。”说完就消失了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "执政", "title": "匝嘉寺为华给活佛转世举行坐床仪式", "participants": [{"entity": "华给活佛", "role": "转世者"}, {"entity": "敦珠仁波切", "role": "主持者"}], "location": "匝嘉寺", "time_info": "{'text': '六十一岁七月', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["史传"], "quote": "到了那里，僧人列队相迎，他们为华给活佛转世举行坐床仪式。随后从十一月起到十二月之间，一直传法。\n岁\n62\n我六十二岁那年二月下旬，我们又搬迁到赤瓦玛山谷。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "神变", "title": "空行母桑波炯玛带敦珠林巴游历珠日神山内境", "participants": [{"entity": "桑波炯玛", "role": "引导者"}, {"entity": "敦珠仁波切", "role": "主体"}, {"entity": "珠日山神", "role": "主人"}], "location": "珠日神山", "time_info": "{'text': '六十二岁四月初八晚', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["证境"], "quote": "”她却不以为然地说：“虽然外面是山，但内在可是广大的境地。”我又说：“小小的山不能容纳广大的境地。”她说：“梦中的辽阔地域与非人的城市相仿。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "敦珠林巴在珠日神山回顾一生面见本尊空行经历", "participants": [{"entity": "敦珠仁波切", "role": "叙述者"}, {"entity": "珠日山神", "role": "听者"}], "location": "珠日神山", "time_info": "{'text': '同一净相中', 'relative_to': None, 'absolute': None}", "layers": ["证境"], "quote": "”他问：“你有没有常常面见本尊、得到授记？”我回答：“我自从当初从母胎中降生以来，面见持明勇士空行尊颜、他们予以授记的情况不可限量。尤其是从邬金莲师摄受时起，一刹那也不曾分离。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "圣度母告知今年不须逃避", "participants": [{"entity": "圣度母", "role": "授记者"}, {"entity": "敦珠仁波切", "role": "受记者"}], "location": "", "time_info": "{'text': '六十二岁六月', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["授记"], "quote": "正当此际，面见了至尊圣度母，她说：“孩儿，你今年不需要逃避，人的军队不会造成威胁，而边鄙野人依靠幻变收摄命气的厉鬼出现，想逃也逃不了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "誓言天女札母哈授记大批汉人来袭应修回遮法", "participants": [{"entity": "誓言天女札母哈", "role": "授记者"}, {"entity": "敦珠仁波切", "role": "受记者"}], "location": "", "time_info": "{'text': '六十二岁十月十八晚', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["授记"], "quote": "十月十八的晚上，我梦到：大批的汉人铺天盖地，誓言天女札母哈从虚空界中说：“汉族之军队，邪愿魔统领，念修狮面母，恒常作回遮。月修大自在，精进自避难。”说完就消失了。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "授记", "title": "益西措嘉授记速立自传文字", "participants": [{"entity": "益西措嘉空行母", "role": "授记者"}, {"entity": "敦珠仁波切", "role": "受记者"}, {"entity": "龙多嘉措", "role": "被授记者"}, {"entity": "钦绕嘉措", "role": "被授记者"}], "location": "", "time_info": "{'text': '六十二岁十二月十五晚', 'relative_to': '敦珠林巴', 'absolute': None}", "layers": ["授记"], "quote": "到了十二月十五那天晚上梦里：云朵、彩虹萦绕之中，空行益西措嘉的上半身显露出来，这样说道：“奇哉！你稍倾听教授：传记立成文字，是先佛之传统，诸位善缘弟子，迅速圆满方便。佛子扬攀塔益，热穹多吉札巴，令其校正文字。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}, {"type": "弘法", "title": "敦珠林巴撰著自传", "participants": [{"entity": "敦珠仁波切", "role": "著者"}, {"entity": "钦绕嘉措", "role": "执笔者"}, {"entity": "得勒华桑", "role": "执笔者"}, {"entity": "班玛龙多", "role": "校对者"}, {"entity": "才杰", "role": "劝请者"}, {"entity": "嘉华", "role": "劝请者"}], "location": "喇荣", "time_info": "{'text': None, 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "临近开始时，又有许多弟子再再劝请，敦珠多吉（一世敦珠法王）我撰著，钦绕嘉措、得勒华桑等执笔，大智者班玛龙多活佛谨慎校对，愿此传记广兴十方三时，久住世间！2008年9月18日译毕于成都华西医院\n[1] 三传：佛语远传、伏藏近传、净相深传。", "chapter": "《藏密佛教史》> 第八品 佛教年表与自传"}];

// teachers[X] = list of X's teachers (X learned FROM them)
// students[X] = list of X's students (X taught TO them)
const teachers = {};
const students = {};
teacherLinks.forEach(l => {
  if (!teachers[l.target]) teachers[l.target] = [];
  teachers[l.target].push({ name: l.source, specialty: l.specialty, quote: l.quote || '', chapter: l.chapter || '' });
  if (!students[l.source]) students[l.source] = [];
  students[l.source].push({ name: l.target, specialty: l.specialty, quote: l.quote || '', chapter: l.chapter || '' });
});

// ============================================================
// BFS: get N generations up and down from a root
// ============================================================
function getLineageTree(rootName, upGens = 3, downGens = 3) {
  const nodes = new Map(); // name → { name, type, generation }
  const edges = []; // { source, target, specialty }

  const rootNode = nodeMap[rootName] || { id: rootName, type: 'unknown', sub_type: '' };
  nodes.set(rootName, { name: rootName, type: rootNode.type, sub_type: rootNode.sub_type || '', generation: 0 });

  // BFS upward (teachers)
  let frontier = [rootName];
  for (let gen = 1; gen <= upGens; gen++) {
    const next = [];
    frontier.forEach(name => {
      (teachers[name] || []).forEach(t => {
        if (!nodes.has(t.name)) {
          const n = nodeMap[t.name] || { type: 'unknown', sub_type: '' };
          nodes.set(t.name, { name: t.name, type: n.type, sub_type: n.sub_type || '', generation: -gen });
          next.push(t.name);
        }
        edges.push({ source: t.name, target: name, specialty: t.specialty, quote: t.quote, chapter: t.chapter });
      });
    });
    frontier = next;
  }

  // BFS downward (students)
  frontier = [rootName];
  for (let gen = 1; gen <= downGens; gen++) {
    const next = [];
    frontier.forEach(name => {
      (students[name] || []).forEach(s => {
        if (!nodes.has(s.name)) {
          const n = nodeMap[s.name] || { type: 'unknown', sub_type: '' };
          nodes.set(s.name, { name: s.name, type: n.type, sub_type: n.sub_type || '', generation: gen });
          next.push(s.name);
        }
        edges.push({ source: name, target: s.name, specialty: s.specialty, quote: s.quote, chapter: s.chapter });
      });
    });
    frontier = next;
  }

  // Deduplicate edges
  const edgeSet = new Set();
  const uniqueEdges = edges.filter(e => {
    const key = `${e.source}→${e.target}`;
    if (edgeSet.has(key)) return false;
    edgeSet.add(key);
    return true;
  });

  return { nodes: Array.from(nodes.values()), edges: uniqueEdges, root: rootName };
}

// ============================================================
// RENDER — hierarchical top-to-bottom layout
// ============================================================
const width = window.innerWidth;
const height = window.innerHeight;
const svg = d3.select("#chart").attr("width", width).attr("height", height);
const g = svg.append("g");

// Zoom
svg.call(d3.zoom().scaleExtent([0.2, 4]).on("zoom", e => g.attr("transform", e.transform)));

const typeColors = {
  "人物": "#7eb8da", "圣众": "#c9a96e", "非人": "#b05a5a",
  "寺院": "#6ba386", "地名": "#8895a7", "经典": "#9a85a8",
  "教法": "#c4956a", "教派": "#8a7d68", "仪轨": "#6a9b9e",
  "法器圣物": "#a88a9d", "集合": "#b5b88a", "unknown": "#555"
};

let currentRoot = null;

function renderTree(data) {
  g.selectAll("*").remove();

  const { nodes, edges, root } = data;
  if (nodes.length === 0) return;

  currentRoot = root;

  // Compute generation range
  const minGen = d3.min(nodes, d => d.generation);
  const maxGen = d3.max(nodes, d => d.generation);

  // Group nodes by generation
  const genGroups = {};
  nodes.forEach(n => {
    if (!genGroups[n.generation]) genGroups[n.generation] = [];
    genGroups[n.generation].push(n);
  });

  // Layout: vertical layers, horizontal spread
  // 动态层间距：根据最大一层的节点数调整
  const maxGroupSize = Math.max(...Object.values(genGroups).map(g => g.length));
  const layerHeight = Math.max(160, maxGroupSize * 12); // 节点越多层距越大
  const nodeSpacing = 160; // 每个节点最小水平间距

  const centerY = height / 2 - ((maxGen + minGen) / 2) * layerHeight;

  const nodePositions = {};
  Object.keys(genGroups).sort((a, b) => a - b).forEach(gen => {
    const group = genGroups[gen];
    const y = centerY + gen * layerHeight;
    const totalWidth = group.length * nodeSpacing;
    const startX = (width - totalWidth) / 2 + nodeSpacing / 2;

    group.forEach((n, i) => {
      n.x = group.length === 1 ? width / 2 : startX + i * nodeSpacing;
      n.y = y;
      nodePositions[n.name] = n;
    });
  });

  // Generation labels
  const genLabels = {
    0: "当前",
  };
  for (let i = 1; i <= -minGen; i++) genLabels[-i] = `上${i}代`;
  for (let i = 1; i <= maxGen; i++) genLabels[i] = `下${i}代`;

  Object.entries(genGroups).forEach(([gen, group]) => {
    g.append("text")
      .attr("class", "generation-label")
      .attr("x", 60)
      .attr("y", centerY + gen * layerHeight + 4)
      .text(genLabels[gen] || `第${gen}代`)
      .attr("fill", gen == 0 ? "#c9a96e" : "#444");

    // Subtle horizontal line
    g.append("line")
      .attr("x1", 70).attr("x2", width - 20)
      .attr("y1", centerY + gen * layerHeight)
      .attr("y2", centerY + gen * layerHeight)
      .attr("stroke", gen == 0 ? "rgba(201,169,110,0.15)" : "rgba(255,255,255,0.03)")
      .attr("stroke-width", 1);
  });

  // Draw edges — S 曲线，悬停原生 tooltip 显示原文
  var linkG = g.append("g");

  edges.forEach(function(e) {
    var src = nodePositions[e.source];
    var tgt = nodePositions[e.target];
    if (!src || !tgt) return;

    var sy = src.y + 14, ty = tgt.y - 14;
    var cy1 = sy + (ty - sy) * 0.4;
    var cy2 = sy + (ty - sy) * 0.6;
    var d = "M" + src.x + "," + sy + " C" + src.x + "," + cy1 + " " + tgt.x + "," + cy2 + " " + tgt.x + "," + ty;

    // 可见线
    var line = linkG.append("path").attr("d", d)
      .attr("fill", "none").attr("stroke", "rgba(106,174,214,0.25)").attr("stroke-width", 1.2);

    // 粗透明线捕获鼠标
    var tip = e.source + " → " + e.target;
    if (e.specialty) tip += "\n传承: " + e.specialty;
    if (e.quote) tip += "\n原文:「" + e.quote + "」";
    if (e.chapter) tip += "\n来源: " + e.chapter;

    linkG.append("path").attr("d", d)
      .attr("fill", "none").attr("stroke", "transparent").attr("stroke-width", 10)
      .style("cursor", "pointer")
      .on("mouseover", function() { line.attr("stroke", "rgba(106,174,214,0.8)").attr("stroke-width", 2.5); })
      .on("mouseout", function() { line.attr("stroke", "rgba(106,174,214,0.25)").attr("stroke-width", 1.2); })
      .on("click", (function(ev) {
        var p = document.getElementById("relation-panel");
        document.getElementById("rel-title").textContent = ev.source + " → " + ev.target;
        document.getElementById("rel-specialty").textContent = ev.specialty || "（未标注）";
        document.getElementById("rel-quote").textContent = ev.quote ? "「" + ev.quote + "」" : "（无原文记录）";
        document.getElementById("rel-source").textContent = ev.chapter || "";
        p.style.display = "block";
      }).bind(null, e));

    // 箭头
    linkG.append("polygon").attr("points", "-3,-5 3,-5 0,0")
      .attr("transform", "translate(" + tgt.x + "," + ty + ")")
      .attr("fill", "rgba(106,174,214,0.3)");
  });

  // Draw nodes
  const nodeG = g.append("g");
  nodes.forEach(n => {
    const isRoot = n.name === root;
    const color = typeColors[n.type] || typeColors.unknown;
    const radius = isRoot ? 16 : 10;

    const ng = nodeG.append("g")
      .attr("transform", `translate(${n.x},${n.y})`)
      .style("cursor", "pointer")
      .on("click", () => selectEntity(n.name));

    // Glow for root
    if (isRoot) {
      ng.append("circle")
        .attr("r", radius + 6)
        .attr("fill", "none")
        .attr("stroke", color)
        .attr("stroke-width", 1)
        .attr("opacity", 0.3);
    }

    ng.append("circle")
      .attr("class", "node-circle")
      .attr("r", radius)
      .attr("fill", color)
      .attr("stroke", isRoot ? "#fff" : "rgba(255,255,255,0.15)")
      .attr("stroke-width", isRoot ? 2 : 1)
      .attr("opacity", isRoot ? 1 : 0.85);

    ng.append("text")
      .attr("class", "node-label")
      .attr("y", radius + 16)
      .attr("fill", isRoot ? "#e0d0a0" : "#aaa")
      .attr("font-size", isRoot ? "13px" : "11px")
      .attr("font-weight", isRoot ? "500" : "400")
      .text(n.name);
  });

  // Show info panel
  showPanel(root);
}

// ============================================================
// Panel
// ============================================================
function showPanel(name) {
  const panel = document.getElementById("info-panel");
  const node = nodeMap[name] || {};

  document.getElementById("panel-name").textContent = name;
  document.getElementById("panel-type").textContent = node.sub_type || node.type || 'unknown';

  const teacherList = (teachers[name] || []).map(t =>
    `<span onclick="selectEntity('${t.name}')">${t.name}</span>${t.specialty ? '<span class="specialty-tag">' + t.specialty + '</span>' : ''}${t.quote ? '<div class="quote-text">「' + t.quote + '」<span class="quote-src">' + t.chapter + '</span></div>' : ''}`
  ).join('') || '<span style="color:#555">无记录</span>';

  const studentList = (students[name] || []).map(s =>
    `<span onclick="selectEntity('${s.name}')">${s.name}</span>${s.specialty ? '<span class="specialty-tag">' + s.specialty + '</span>' : ''}${s.quote ? '<div class="quote-text">「' + s.quote + '」<span class="quote-src">' + s.chapter + '</span></div>' : ''}`
  ).join('') || '<span style="color:#555">无记录</span>';

  document.getElementById("panel-teachers").innerHTML = teacherList;
  document.getElementById("panel-students").innerHTML = studentList;

  // Events
  var evtSection = document.getElementById("events-section");
  var evtDiv = document.getElementById("panel-events");
  var evtCount = document.getElementById("events-count");
  if (typeof entityEventIndex !== 'undefined' && entityEventIndex[name]) {
    var indices = entityEventIndex[name];
    evtCount.textContent = "(" + indices.length + ")";
    evtDiv.innerHTML = indices.slice(0, 30).map(function(idx) {
      var evt = allEvents[idx];
      if (!evt) return '';
      var q = evt.quote || '';
      var qShort = q.length > 60 ? q.substring(0, 60) + '…' : q;
      return '<div class="event-item" onclick="this.classList.toggle(\'expanded\')">'
        + '<span class="event-type-tag">' + (evt.type || '') + '</span>'
        + '<span class="event-title">' + (evt.title || '') + '</span>'
        + '<div class="event-quote">「' + q + '」<div class="event-chapter">' + (evt.chapter || '') + '</div></div>'
        + '</div>';
    }).join('');
    evtSection.style.display = "block";
  } else {
    evtSection.style.display = "none";
  }

  panel.style.display = "block";
}

function closePanel() {
  document.getElementById("info-panel").style.display = "none";
}

function selectEntity(name) {
  const tree = getLineageTree(name, 3, 3);
  renderTree(tree);
  document.getElementById("help-text").style.display = "none";
}

// ============================================================
// Search
// ============================================================
const searchInput = document.getElementById("search-input");
const suggestionsDiv = document.getElementById("suggestions");

const searchableNames = Array.from(allNames).sort();

searchInput.addEventListener("input", function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { suggestionsDiv.style.display = "none"; return; }

  const matches = searchableNames.filter(n => n.toLowerCase().includes(q)).slice(0, 15);

  if (matches.length === 0) {
    suggestionsDiv.style.display = "none";
    return;
  }

  suggestionsDiv.innerHTML = matches.map(m => {
    const node = nodeMap[m] || {};
    return `<div class="suggestion-item" onclick="selectEntity('${m}'); suggestionsDiv.style.display='none'; searchInput.value='${m}';">
      ${m} <span class="type-tag">${node.type || ''}</span>
    </div>`;
  }).join('');
  suggestionsDiv.style.display = "block";
});

searchInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    const q = this.value.trim();
    const match = searchableNames.find(n => n === q) || searchableNames.find(n => n.includes(q));
    if (match) {
      selectEntity(match);
      suggestionsDiv.style.display = "none";
    }
  }
});

document.addEventListener("click", function(e) {
  if (!e.target.closest("#search-box") && !e.target.closest("#suggestions")) {
    suggestionsDiv.style.display = "none";
  }
});

// ============================================================
// Default: show 莲花生大士
// ============================================================
var params = new URLSearchParams(window.location.search); var highlightName = params.get("highlight"); selectEntity(highlightName || "莲花生大士");
</script>
