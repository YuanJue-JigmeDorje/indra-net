tle": "雍敦巴奉诏赴汉地展现禳解术和降雨能力", "participants": [{"entity": "雍敦巴", "role": "主体"}], "location": "汉地", "time_info": "", "layers": ["史传"], "quote": "在他年青时，奉诏到了汉地，也造了在这个世界上前所未闻的禳解术。当时个别地区出现大旱灾，他又奉诏使天降大雨，由此发挥出自己的能力。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "雍敦巴下半生受比丘戒改名多吉华", "participants": [{"entity": "雍敦巴", "role": "受戒者"}, {"entity": "凑巴秋隆巴", "role": "亲教师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "雅德大班智达见到此论后生起无比信心，师徒十五人到他面前恭敬顶礼。他下半生于凑巴秋隆巴面前受比丘戒，原名多吉白改为多吉华。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "雍敦巴八十二岁木蛇年圆寂", "participants": [{"entity": "雍敦巴", "role": "主体"}], "location": "", "time_info": "{'text': '八十二岁木蛇年', 'relative_to': '雍敦巴 (E_855)', 'absolute': None}", "layers": ["史传"], "quote": "他住在不丹、彭波大山、热德岩等地讲经说法广泛利益他众。八十二岁木蛇年圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "达那卓玛瓦桑哲多吉在宿·香巴桑给面前广泛闻法精通《幻化网》", "participants": [{"entity": "达那卓玛瓦桑哲多吉", "role": "受者"}, {"entity": "宿·香巴桑给", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "达那卓玛瓦桑哲多吉达那卓玛瓦桑哲多吉，是依靠宁玛密法获得成就的哲坚之子，木羊年出生在达那内萨地方。在宿·香巴桑给面前广泛闻法，尤其对《幻化网》最为精通。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "闭关修行", "title": "达那卓玛瓦在雪玛桑给修行达到觉性如量境界", "participants": [{"entity": "达那卓玛瓦桑哲多吉", "role": "主体"}], "location": "雪玛桑给", "time_info": "", "layers": ["史传"], "quote": "在兰涅擦巴索南滚波面前得受幻化网灌顶，智慧与事业令人难以测度。他一心向往寂静处，在雪玛桑给地方专心致志修行大圆满心滴法门，达到了觉性如量的境界，平等畅游如海佛刹。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "达那卓玛瓦桑哲多吉八十二岁火龙年圆寂授记极乐", "participants": [{"entity": "达那卓玛瓦桑哲多吉", "role": "主体"}], "location": "", "time_info": "{'text': '八十二岁火龙年', 'relative_to': '达那卓玛瓦桑哲多吉 (E_892)', 'absolute': None}", "layers": ["史传"], "quote": "共称为香巴全知的兰萨瓦在孩提时代就得受了这位上师赐予众多灌顶、恩赐加持而成为大智者，他诸如此类的加持实在不可思议。八十二岁火龙年临圆寂时他对儿子说：“我将前往极乐世界，你也要活到与我的年岁同等，尔后来极乐国土。”说完便示现圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "宿·桑波华奉诏赴汉地任皇帝诵经师展现威力", "participants": [{"entity": "宿·桑波华", "role": "主体"}, {"entity": "弯颜特汗", "role": "委托者"}], "location": "汉地", "time_info": "", "layers": ["史传"], "quote": "宿·桑波华宿氏传承和子传承中，宿氏传承是宿哈·释迦炯，他的父亲宿·桑波华在世时期，接受皇帝弯颜特汗的诏书，并得到赏赐，后来奉诏前往汉地。起初作为皇帝的诵经师，他以其超凡绝伦的威力和咒力，能保护庄稼免遭灾害，用灵器食子能摧毁雷雹等的侵袭。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "宿·桑波华禳解恶蝎相乌云凶兆", "participants": [{"entity": "宿·桑波华", "role": "主体"}], "location": "地德", "time_info": "", "layers": ["神变"], "quote": "尤其是有一次，皇宫地德的上空，出现了恶蝎相乌云的凶兆，谁也无法消除它。当时皇帝下诏书，宿·桑波华作了禳解术，施食子，跳起舞，结果乌云散去，诸如此类在边地多次展现出佛法的优胜性，使皇帝生起信心，在他面前请求了真实九本尊的灌顶和长寿灌顶。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "皇帝弯颜特在宿·桑波华前请求灌顶", "participants": [{"entity": "弯颜特汗", "role": "受者"}, {"entity": "宿·桑波华", "role": "灌顶师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "当时皇帝下诏书，宿·桑波华作了禳解术，施食子，跳起舞，结果乌云散去，诸如此类在边地多次展现出佛法的优胜性，使皇帝生起信心，在他面前请求了真实九本尊的灌顶和长寿灌顶。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "宿·桑波华刻版前译派二十八法部各印一千份", "participants": [{"entity": "宿·桑波华", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "就这样，他以此丰富的财产刻版《根本密藏续》、《巴卡释》、《密宗道次第》以及《九窍诀》等前译派的二十八法部。各印一千份发给僧人。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "皇帝弯颜特驾崩后在桑波华境界中出现", "participants": [{"entity": "弯颜特汗", "role": "主体"}, {"entity": "宿·桑波华", "role": "见者"}], "location": "汉地", "time_info": "", "layers": ["神变"], "quote": "而且提供了刻宁玛续全集的物资，诸如此类，对佛教作出了巨大贡献。后来，国王弯颜特患的风病用热疗法以后就驾崩了。此时萨迦派和宿氏派宗派同心同德，十分融洽。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "护法铸像迎请到西藏时面向西藏跨越七步", "participants": [{"entity": "七步护法铸像", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "其后也赐予了他十升银子。当汉土响铜金刚萨埵佛像和护法兄妹跳神铸像迎请到西藏之时，怙主护法面向西藏跨越七步，由此被人们共称为七步护法铸像。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "宿·桑波华三十八岁在汉地圆寂", "participants": [{"entity": "宿·桑波华", "role": "主体"}], "location": "汉地", "time_info": "{'text': '三十八岁', 'relative_to': '宿·桑波华 (E_897)', 'absolute': None}", "layers": ["史传"], "quote": "”不肯离去。他在不愿意去的情况下说出了“自由自在皆安乐，受他控制皆痛苦……”的教授以后去往汉地，只住世到三十八岁。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "宿哈·释迦炯五岁时宣讲根本续令众人目瞪口呆", "participants": [{"entity": "宿·释迦炯", "role": "主体"}], "location": "", "time_info": "{'text': '五岁', 'relative_to': '宿哈·释迦炯 (E_894)', 'absolute': None}", "layers": ["史传"], "quote": "宿哈·释迦炯这位宿哈·释迦炯从小就开始研修父辈祖辈的法要，觉醒了前世的缘分，五岁时在父亲前去汉土迎接的大人物及使者中，零零碎碎、模模糊糊地宣讲根本续，使得众人目瞪口呆。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "宿哈·释迦炯受沙弥戒和比丘戒", "participants": [{"entity": "宿·释迦炯", "role": "受戒者"}, {"entity": "喇嘛根帮巴", "role": "亲教师"}, {"entity": "秋吉索朗札巴", "role": "亲教师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他从七岁开始住持讲学院。在喇嘛根帮巴面前受沙弥戒，在秋吉索朗札巴面前受比丘戒，法名为释迦炯内。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "宿哈·释迦炯在卓钦桑多面前听受《经·集密意续》灌顶", "participants": [{"entity": "宿·释迦炯", "role": "受者"}, {"entity": "卓钦桑多", "role": "灌顶师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "特别是着重探究《现观庄严论》、《入行论》、《时轮金刚》、《普作王续》、《幻化网道次第》、《密藏续》、《巴卡释》，是人们公认的大智者、大成就者，后来成为宿派的唯一教主。他在卓钦桑多面前听受《经·集密意续》灌顶时，供养了汉藏的衣物、厨具、五十斗青稞等为主的供品，传承、实修都已达到究竟。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "宿哈·释迦炯境界中见到释迦佛和黑日嘎五部佛", "participants": [{"entity": "宿·释迦炯", "role": "主体"}, {"entity": "释迦佛", "role": "显现者"}, {"entity": "黑日嘎五部佛", "role": "显现者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "为了得到印证，他又再次供养大匹锦缎和黄金令上师欢喜。在他的境界中极其明显地见到释迦佛、黑日嘎五部佛。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "宿哈·释迦炯三十八岁圆寂", "participants": [{"entity": "宿·释迦炯", "role": "主体"}], "location": "", "time_info": "{'text': '三十八岁', 'relative_to': '宿哈·释迦炯 (E_894)', 'absolute': None}", "layers": ["史传"], "quote": "而且他撰著了《集密意续释》等大量论典，对《经幻心》教法作出了卓越贡献。他培养了卓玛瓦之子桑吉仁钦、涅巴德勒巴等光显佛法的众多弟子，三十八岁时圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "桑吉仁钦嘉村六岁精通《密藏续》被释迦炯关怀备至", "participants": [{"entity": "桑吉仁钦嘉村", "role": "受者"}, {"entity": "宿·释迦炯", "role": "传法者"}], "location": "", "time_info": "{'text': '六岁', 'relative_to': '桑吉仁钦嘉村 (E_905)', 'absolute': None}", "layers": ["史传"], "quote": "人们都说：“你的这个儿子起不到利益，对他如此宠爱有什么用呢？”其父说：“他会对众生有利。”他年仅六岁时就精通了《密藏续》。当他来到宿·释迦炯面前时，宿·释迦炯说“这是我上师之子”而关怀备至，精心抚养。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "桑吉仁钦嘉村在秋库刚面前受近圆戒", "participants": [{"entity": "桑吉仁钦嘉村", "role": "受戒者"}, {"entity": "秋库刚", "role": "亲教师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "”他娶了一个妻子，生下几个儿子，就这样以居士的身份圆满学修。后来，他在秋库刚面前受近圆戒，身相极为端严。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "桑吉仁钦嘉村七十岁时摄受古云讷华传授大量法要", "participants": [{"entity": "桑吉仁钦嘉村", "role": "传法者"}, {"entity": "古云讷华", "role": "受者"}], "location": "", "time_info": "{'text': '七十岁', 'relative_to': '桑吉仁钦嘉村 (E_905)', 'absolute': None}", "layers": ["史传"], "quote": "他在七十岁那一年，摄受古罗益桑则巴，为他传授了幻化网寂猛灌顶、幻化网长寿灌顶、《根除续》灌顶、《长寿主尊》、《真实一火》灌顶、那哦巴派和达嘉派马头明王的开许、库派的金刚橛猛尊灌顶及开许、十八种心部的觉性妙力灌顶及《密藏续释》的讲解。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "桑吉仁钦嘉村七十二岁于旺札巴嘉村前依止得灌顶传承", "participants": [{"entity": "桑吉仁钦嘉村", "role": "受者"}, {"entity": "旺札巴嘉村", "role": "传法者"}], "location": "刚波山禅定洲", "time_info": "{'text': '七十二岁铁牛年', 'relative_to': '桑吉仁钦嘉村 (E_905)', 'absolute': None}", "layers": ["史传"], "quote": "尊者在八十二岁铁猪年圆寂，从小宿大师降生到此时之前显然已过了四百一十七年。\n古云讷华古云讷华大师，父亲名叫古敦炯内多吉，母亲哲塔吉，水猴年出生。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "桑吉仁钦嘉村八十二岁铁猪年圆寂", "participants": [{"entity": "桑吉仁钦嘉村", "role": "主体"}], "location": "", "time_info": "{'text': '八十二岁铁猪年', 'relative_to': '桑吉仁钦嘉村 (E_905)', 'absolute': None}", "layers": ["史传"], "quote": "如此法王桑吉仁钦在他七十二岁铁牛年来到卫藏，在刚波山的禅定洲，于旺札巴嘉村前恭敬依止，于是上师传给他《集密意续》等许多灌顶，并传讲《密藏续》等诸多传承。\n尊者在八十二岁铁猪年圆寂，从小宿大师降生到此时之前显然已过了四百一十七年。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "古云讷华在金益堪钦面前出家", "participants": [{"entity": "古云讷华", "role": "受戒者"}, {"entity": "金益堪钦", "role": "亲教师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "古云讷华古云讷华大师，父亲名叫古敦炯内多吉，母亲哲塔吉，水猴年出生。在金益堪钦面前出家，于噶玛巴德云香巴前得受菩萨戒并听受六法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "古云讷华在噶玛巴德云香巴前得菩萨戒并听受六法", "participants": [{"entity": "古云讷华", "role": "受者"}, {"entity": "如毕多吉", "role": "传法者"}], "location": "", "time_info": "" 四岁以古大译师益桑则巴作为亲教师而受了比丘戒，先后闻受《时轮金刚》、《胜乐金刚》、《喜乐金刚》、《大威德》等新派诸续部以及《幻化网密藏续》等的灌顶及教授等无量法要。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "金厄仁波切闻金刚橛灌顶时梦中见到莲花生大士", "participants": [{"entity": "第四世红帽金厄仁波切", "role": "受者"}, {"entity": "莲花生大士", "role": "授予者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "而且在安兰嘉瓦秋扬的后裔大译师索南嘉措面前也听受了众多新旧派法门。在古译师面前闻受金刚橛灌顶时梦中见到莲花生大士尊颜，也得到莲师赐予教授。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "第四世红帽金厄仁波切七十三岁木鸡年圆寂", "participants": [{"entity": "第四世红帽金厄仁波切", "role": "主体"}], "location": "", "time_info": "{'text': '七十三岁木鸡年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "在古译师面前闻受金刚橛灌顶时梦中见到莲花生大士尊颜，也得到莲师赐予教授。他在为所化众生开示新旧派诸法理以后，于七十三岁木鸡年圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "哲贡宿巴仁钦彭措八岁在金厄仁波切面前出家", "participants": [{"entity": "哲贡宿巴仁钦彭措", "role": "受戒者"}, {"entity": "第四世红帽金厄仁波切", "role": "亲教师"}], "location": "", "time_info": "{'text': '八岁', 'relative_to': '哲贡宿巴仁钦彭措 (E_827)', 'absolute': None}", "layers": ["史传"], "quote": "哲贡宿巴仁钦彭措，出生在卫多哲贡年刚地方杰绕种姓中。八岁时，在金厄仁波切秋吉札巴面前出家。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "哲贡宿巴仁钦彭措在昌珠寺开光时大显神变", "participants": [{"entity": "哲贡宿巴仁钦彭措", "role": "主体"}], "location": "昌珠寺", "time_info": "{'text': '十三岁', 'relative_to': '哲贡宿巴仁钦彭措 (E_827)', 'absolute': None}", "layers": ["神变"], "quote": "八岁时，在金厄仁波切秋吉札巴面前出家。\n他十三岁时，嘎波巴在则塘禅定洲，修复破损的昌珠寺，迎请他去开光，当时他大显神变。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "开取伏藏", "title": "哲贡宿巴仁钦彭措从德卓札革大殿开取五种黄纸伏藏", "participants": [{"entity": "哲贡宿巴仁钦彭措", "role": "主体"}], "location": "德卓札革大殿", "time_info": "", "layers": ["史传"], "quote": "按照空行的授记，身份改为白衣（在家）。在扬巴坚，得到伏藏标题的同时，从德卓札革大殿开取了莲花生大士身语意结晶妙法最深密意的五种黄纸伏藏。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "哲贡宿巴仁钦彭措在铜色吉祥山拜见莲师并得灌顶", "participants": [{"entity": "哲贡宿巴仁钦彭措", "role": "受者"}, {"entity": "莲花生大士", "role": "灌顶师"}], "location": "铜色吉祥山", "time_info": "", "layers": ["神变"], "quote": "另一时间，他来到铜色吉祥山拜见黑日嘎形象的莲花生大士，受用嘎那匝札会供，莲师依靠三根本坛城授予他所有灌顶及教授、随授，黑日嘎的身体转依成莲花生大士，也恩授了许多口传窍诀。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "哲贡宿巴仁钦彭措将幻化网法要传承经扬珠尼达桑吉至昆·敦华玖棱珠", "participants": [{"entity": "哲贡宿巴仁钦彭措", "role": "传法者"}, {"entity": "扬珠尼达桑吉", "role": "中间传承"}, {"entity": "阿阇黎才旺诺吉", "role": "中间传承"}, {"entity": "昆·敦华玖棱珠", "role": "最终受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "昆·敦华玖棱珠哲贡宿巴仁钦彭措尊者将《幻化网》所有法要传给扬珠尼达桑吉。扬珠尼达桑吉传给昆种姓的阿阇黎才旺诺吉。阿阇黎才旺诺吉传给自己的儿子昆·敦华玖棱珠。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "昆·敦华玖棱珠十岁在全知索南嘉措面前出家", "participants": [{"entity": "昆·敦华玖棱珠", "role": "受戒者"}, {"entity": "全知索南嘉措", "role": "亲教师"}], "location": "", "time_info": "{'text': '十岁', 'relative_to': '昆·敦华玖棱珠 (E_831)', 'absolute': None}", "layers": ["史传"], "quote": "这位尊者的母亲名为嘉姆俊，他出生于铁鸡年，从小圣种习气复苏，生起了真实的出离心。他到了十岁时在全知索南嘉措面前出家，听受了皈依、发心及大悲观音的修行传承等。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "昆·敦华玖棱珠在父亲面前学修幻化网密藏续及诸注释", "participants": [{"entity": "昆·敦华玖棱珠", "role": "受者"}, {"entity": "阿阇黎才旺诺吉", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尤其是，他在父亲金刚持尊面前学修《幻化网密藏续》、雍敦所著的《密藏续释》、全知龙钦巴的《密藏续释·遣除十方黑暗》的所有注释时，苏醒卓普巴大师的习气而成为依靠此道获得成就无与伦比的证道者。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "昆·敦华玖棱珠十八岁在尼达桑吉座前听大圆满明界心滴灌顶", "participants": [{"entity": "昆·敦华玖棱珠", "role": "受者"}, {"entity": "尼达桑吉", "role": "灌顶师"}], "location": "", "time_info": "{'text': '十八岁', 'relative_to': '昆·敦华玖棱珠 (E_831)', 'absolute': None}", "layers": ["史传"], "quote": "他十八岁在努·南卡酿波的化身——大持明者尼达桑吉座前，恭聆大圆满明界心滴的灌顶、引导及窍诀，从而认识了一切法的实相大圆满自证法身并探究到堂奥。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "昆·敦华玖棱珠三十四岁受比丘戒法名华玖棱珠", "participants": [{"entity": "昆·敦华玖棱珠", "role": "受戒者"}, {"entity": "嘉康则瓦华玖嘉措", "role": "亲教师"}, {"entity": "法王格敦嘉村", "role": "轨范师"}], "location": "", "time_info": "{'text': '三十四岁', 'relative_to': '昆·敦华玖棱珠 (E_831)', 'absolute': None}", "layers": ["史传"], "quote": "他三十四岁时在嘉康则瓦华玖嘉措和法王格敦嘉村亲教师、轨范师面前受了比丘戒，法名为华玖棱珠，也听闻了格鲁派的密法类，并且担当桑普与色雪的讲闻阿阇黎。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "第五世达赖在昆·敦华玖棱珠足下听受新旧派无量法门", "participants": [{"entity": "第五世达赖喇嘛", "role": "受者"}, {"entity": "昆·敦华玖棱珠", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尊者断除了聚会的散乱，居于东够哲或帕旺卡深林静处。观音化现的第五世达赖也在其足下依止，听受新旧派的灌顶、传承、引导及窍诀的无量法门。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "昆·敦华玖棱珠七十六岁火牛年圆寂", "participants": [{"entity": "昆·敦华玖棱珠", "role": "主体"}], "location": "", "time_info": "{'text': '七十六岁火牛年八月十一日', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "”没有应允，而说：“我必须去往（莲师的刹土——）妙佛莲花光无量殿。”火牛年八月十一日伴随着稀奇的瑞相色身融入法界。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "授记", "title": "香巴仁真阿革旺波授记宿钦·秋扬让珠今世大有裨益宁玛教法", "participants": [{"entity": "香巴仁真阿革旺波", "role": "授记者"}, {"entity": "宿钦·秋扬让珠", "role": "受记者"}], "location": "", "time_info": "{'text': '九岁', 'relative_to': '宿钦·秋扬让珠 (E_839)', 'absolute': None}", "layers": ["授记"], "quote": "秋扬让珠被仲巴尊者认定为滚秋仁钦巴的转世灵童，他逐步学习文字读写，并且毫不费力地通达了印度的所有文字种类，而且在父亲面前学习了常用修法。他九岁时遇到香巴仁真阿革旺波，阿革旺波尊者亲口授记说：“你今世会对宁玛教法大有裨益。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "宿钦·秋扬让珠在囊色仁波切面前听受灌顶传承及实修引导", "participants": [{"entity": "宿钦·秋扬让珠", "role": "受者"}, {"entity": "囊色仁波切阿旺益西哲巴", "role": "传法者"}], "location": "", "time_info": "{'text': '年仅十二岁起', 'relative_to': '宿钦·秋扬让珠 (E_839)', 'absolute': None}", "layers": ["史传"], "quote": "他从年仅十二岁时起，一直留在囊色仁波切阿旺益西哲巴面前，听受了《八大法行·集善逝》、教藏传及伏藏传的《空行心滴》、《上师宝海》、噶玛朗巴的《寂猛密意自解脱》等的灌顶、传承及实修引导，都已达到究竟。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "闭关修行", "title": "宿钦·秋扬让珠在藏巴达古实修大圆满空行心滴三年获证悟", "participants": [{"entity": "宿钦·秋扬让珠", "role": "主体"}], "location": "藏巴达古", "time_info": "{'text': '三年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "他在藏巴达古地方居住三年，主要切中要点实修大圆满《空行心滴》的本来清净与任运自成，结果彻底击毁了万法的假相，获得现前\n自证本来怙主本面的证悟，在光明境界中自在畅游报身刹土的妙力已达到纯熟。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "帕旺卡巴华玖以满瓶倾泄方式传授宿钦·秋扬让珠教藏法伏藏法", "participants": [{"entity": "帕旺卡巴华玖", "role": "传法者"}, {"entity": "宿钦·秋扬让珠", "role": "受者"}], "location": "", "time_info": "{'text': '十七岁起', 'relative_to': '宿钦·秋扬让珠 (E_839)', 'absolute': None}", "layers": ["史传"], "quote": "上师也满怀喜悦加以摄受，把浩如烟海的教藏法、伏藏法理以满瓶倾泄的方式恩授予他。主要是《密藏根本续》及《巴卡释》，结合藏地雍敦所著的注释加以讲解，每天传授两堂课。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "宿钦·秋扬让珠二十岁受比丘戒", "participants": [{"entity": "宿钦·秋扬让珠", "role": "受戒者"}], "location": "", "time_info": "{'text': '水狗年，二十岁', 'relative_to': '宿钦·秋扬让珠 (E_839)', 'absolute': None}", "layers": ["史传"], "quote": "”在小小宿舍，上师辅导传讲到三十页，他也依师言教作了笔录，只是五品以前，在此之后的记录就停止了。水狗年，他年至二十岁时，又从居士戒开始受到比丘戒。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "宿钦·秋扬让珠在花吉则佛教大学冬季大法会讲解密藏续", "participants": [{"entity": "宿钦·秋扬让珠", "role": "主体"}], "location": "花吉则佛教大学", "time_info": "{'text': '木鼠年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "木鼠年，在花吉则佛教大学冬季大法会开端，他讲解了《密藏续》，依此摧毁了那些依于字面的大师们的辩才，对精华教法（指金刚密乘）作出了巨大贡献，因此受到诸位正直者的一致赞评，香巴仁真钦波也予以高度赞叹。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "宿钦·秋扬让珠在则塘佛教大学建立巡回辩经", "participants": [{"entity": "宿钦·秋扬让珠", "role": "主体"}], "location": "则塘佛教大学", "time_info": "", "layers": ["史传"], "quote": "尤其昆·敦华玖棱珠尊者摄受宿秋扬让珠以后，每一天给他传雍敦的《密藏续释》一两堂课，而且也恩授心滴等无量法门。按照尊者的指导，宿钦秋扬让珠在则塘佛教大学，建立起巡回辩经。由此使那些认为前译续无有讲续的嫉妒者自然闭口。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "第五世达赖拜宿钦·秋扬让珠为师听受教藏法及猛咒", "participants": [{"entity": "第五世达赖喇嘛", "role": "受者"}, {"entity": "宿钦·秋扬让珠", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尤其是作了依《八大法行·集善逝》坛城的绕萨雅那修法，就是从此时开始，第五世达赖喇嘛拜他为师，而恭听了《威猛》等一切教藏法以及猛咒等息增怀诛浩瀚事业的所有传承、修法引导，进而加以实修。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "降伏非人", "title": "宿钦·秋扬让珠进行无数次降伏事业助格鲁派教法遍及藏地", "participants": [{"entity": "宿钦·秋扬让珠", "role": "主体"}, {"entity": "第五世达赖喇嘛", "role": "辅助"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "当时，噶地、后藏的僧人与施主对总的格鲁派怀着嗔恨，尤其是对西藏政府深恶痛绝，在孜革巴发生战乱之时，尊者进行了无数次降伏事业。依靠第五世达赖喇嘛的事业时机成熟和这位尊者的加持力迅猛，使哲蚌寺的教法遍及整个藏地。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "宿钦·秋扬让珠认定香巴仁真阿革旺波转世并为其坐床传法", "participants": [{"entity": "宿钦·秋扬让珠", "role": "主体"}, {"entity": "阿杰丹毕尼玛仁真班玛陈列", "role": "受者"}], "location": "土丹多吉札寺", "time_info": "", "layers": ["史传"], "quote": "尊者也认定了香巴仁真阿革旺波的转世是阿杰丹毕尼玛仁真班玛陈列。在土丹多吉札寺为他举行坐床仪式，并恩授了所有的教藏法及伏藏法，奉其为教主。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "宿钦·秋扬让珠六十六岁土鸡年圆寂", "participants": [{"entity": "宿钦·秋扬让珠", "role": "主体"}], "location": "", "time_info": "{'text': '六十六岁土鸡年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "并且不同程度地培养了印藏蒙的高僧大德等，为求法义的弟子们宣讲了教藏法、伏藏法，开示新旧派的解脱道。尊者到了六十六岁土鸡年，伴着稀有奇妙的瑞相前往莲花光刹土。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "桑吉札修财神法田地被冲走后处理麻风病人丧事得黄金", "participants": [{"entity": "雄吉嘉曼巴桑吉札", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "年幼之时，修财神法，结果仅有的一小块田地也被水冲走，在他舍弃琐事前往他方的行途中，看到有一个麻风病富人的尸体无人收殓。他生起强烈悲心，在没有什么分别念中给他处理了丧事，结果床边出现了许多黄金。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "桑吉札在琼波卓哦修真实法现见本尊", "participants": [{"entity": "雄吉嘉曼巴桑吉札", "role": "主体"}], "location": "琼波卓哦", "time_info": "", "layers": ["神变"], "quote": "他知道这是财神给予的悉地。于是再度返回，在琼波卓哦遇到札些康玛在修真实法，他也随着修行，结果得以现见本尊。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "多土巴在忽必烈皇帝面前被封入佛塔一年后变成金刚橛身", "participants": [{"entity": "雄吉嘉曼巴桑吉札", "role": "主体"}, {"entity": "忽必烈皇帝", "role": "观察者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "多土巴到忽必烈皇帝面前。皇帝为了观察他的能力，强迫他进入佛塔内，封闭门而放置一年。一年后打开一看，发现他变成了金刚橛\n身，为此皇帝大感稀奇。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "桑吉札建立多土特道场", "participants": [{"entity": "雄吉嘉曼巴桑吉札", "role": "主体"}], "location": "多土特道场", "time_info": "", "layers": ["史传"], "quote": "当时一位富人供养了一百斗青稞，遇到有人提供顺缘，他依此在卓普巴的弟子酿那多波及其弟子拉吉达桑给面前听闻了《幻化网》。成为大智者以后回到故乡，建立了多土特道场。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "曼隆巴释迦光在杰秋戒桑给面前学习集密意续和幻化网", "participants": [{"entity": "曼隆巴释迦光", "role": "受者"}, {"entity": "华哦杰秋戒桑给", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "佛法的沉浮也能促发人生起伤感之情。\n曼隆巴释迦光杰秋戒桑给的弟子就是曼隆巴释迦光，他是炯波卡热的涅大师所生五个儿子——共称为雅隆五活佛兄弟中的老大。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "滚波多吉身体融入墙壁留下印迹", "participants": [{"entity": "滚波多吉", "role": "主体"}], "location": "秋丹寺", "time_info": "", "layers": ["神变"], "quote": "据说他出生在雅隆地方的曼隆寺。次子，就是现在共称为秋丹寺的住持，真实法名叫滚波多吉，获得了极大成就，身体靠墙壁融入其中而留下的印迹，现今仍旧存在。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "多吉嘉烂在嘉益西滚波面前学习集密意续幻化网并造论", "participants": [{"entity": "多吉嘉烂", "role": "受者"}, {"entity": "嘉·益西滚波", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "温波多吉嘉烂\n杰·秋戒桑给的道场住持——嘉·益西滚波也依止了杰·秋戒桑给和兰秋嘉二位上师，精通了《集密意续》、《幻化网》法门，他的侄子名叫多吉嘉烂，幼年时前往桑普研学《定量论》，后来在嘉益西滚波面前认真学习了《集密意续》、《幻化网》法门，造了《巴卡释论疏》和灌顶仪轨等。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "噶托巴单巴德香十七岁出家并受比丘戒", "participants": [{"entity": "噶托巴单巴德香", "role": "受戒者"}], "location": "卫藏", "time_info": "{'text': '十七岁', 'relative_to': '噶托巴单巴德香 (E_868)', 'absolute': None}", "layers": ["史传"], "quote": "十七岁时他前往卫藏，于番地在上师香切桑给面前出家，法名取为西绕僧佫。在那吉堪钦玛德杰坚面前按东律传承受了比丘戒，精通戒律。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "噶托巴在匝敦珠为滚波面前听受幻化网密藏续等达到通达", "participants": [{"entity": "噶托巴单巴德香", "role": "受者"}, {"entity": "匝敦珠为滚波", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在那吉堪钦玛德杰坚面前按东律传承受了比丘戒，精通戒律。于宿·卓普巴大师的心子——匝敦珠为滚波面前，听受《幻化网密藏续》及心部等法要，已完全通达。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "建寺", "title": "噶托巴单巴德香于土鼠年建立噶托寺", "participants": [{"entity": "噶托巴单巴德香", "role": "主体"}], "location": "噶托寺", "time_info": "{'text': '土鼠年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "于嘎字形的上方，于土鼠年建立寺院", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "降伏非人", "title": "噶托巴和法王藏敦降伏妖石曼哦", "participants": [{"entity": "噶托巴单巴德香", "role": "主体"}, {"entity": "法王藏敦", "role": "辅助"}, {"entity": "妖石曼哦", "role": "被降伏者"}], "location": "噶托寺", "time_info": "", "layers": ["神变"], "quote": "随后在嘎字形的上方，于土鼠年建立寺院，曾在苯教师前受过誓言的妖石曼哦亲现原身，通过各种途径制造违缘。当师徒三人紧紧追赶之时它就融入了一块岩石中。法王藏敦用法衣裹住以后在前面拉，单巴（即噶托巴）用鞭子抽打在后面赶，一直到了山谷的河边，如今也可现量见到那块磐石。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "降伏非人", "title": "吉祥天女使八位苯波师修行岩洞倒塌", "participants": [{"entity": "吉祥天女", "role": "主体"}, {"entity": "噶托巴单巴德香", "role": "辅助"}], "location": "噶托寺", "time_info": "", "layers": ["神变"], "quote": "法王藏敦用法衣裹住以后在前面拉，单巴（即噶托巴）用鞭子抽打在后面赶，一直到了山谷的河边，如今也可现量见到那块磐石。八位苯波师修恶咒时，吉祥天女使他们的修行岩洞倒塌，尊者用手在那上面画了个十字杵，使八个磐石回归原位置。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "噶托巴单巴德香在噶托寺传授大圆满幻化密藏续等", "participants": [{"entity": "噶托巴单巴德香", "role": "主体"}], "location": "噶托寺", "time_info": "", "layers": ["史传"], "quote": "尊者建立起寺院以后一直安住道场，从东方安多到南方擦瓦绒和罗曼地带的诸位弟子纷纷云集，尊者主要为他们传授大圆满、《幻化密藏续》的讲教与灌顶教、修法等印藏大大小小的所有注释一律按照具德宿氏的教轨传承，尤其着重传讲《集密意续》等。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "噶托巴单巴德香七十一岁水鼠年圆寂", "participants": [{"entity": "噶托巴单巴德香", "role": "主体"}], "location": "", "time_info": "{'text': '七十一岁水鼠年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "简而言之，他在多康领域内奠定了密法的基础。最后七十一岁水鼠年色身示现圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "授记", "title": "噶托巴单巴德香得到来世在极乐世界及成佛的授记", "participants": [{"entity": "噶托巴单巴德香", "role": "受记者"}], "location": "", "time_info": "", "layers": ["授记"], "quote": "也得到了'下一世在极乐世界以慧藏菩萨的身份安住、获证八地现观、未来星布劫成为无量寿如来'的授记", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "藏敦巴十七岁遇到德香巴上师闻受佛法", "participants": [{"entity": "藏敦巴", "role": "受者"}, {"entity": "噶托巴单巴德香", "role": "传法者"}], "location": "", "time_info": "{'text': '十七岁', 'relative_to': '藏敦巴 (E_872)', 'absolute': None}", "layers": ["史传"], "quote": "藏敦巴噶托巴单巴德香尊者的法脉继承人藏敦巴，火马年出生于哦波刚所属的藏雅地方。十七岁时遇到德香巴上师而闻受佛法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "藏敦巴亲睹吉祥黑日嘎与四十二寂静本尊坛城", "participants": [{"entity": "藏敦巴", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "”上师对藏敦巴说：“那就是你。”当时，他亲睹了吉祥黑日嘎与四十二寂静本尊坛城。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "藏敦巴五十六岁任噶托寺住持弘扬经幻心教法", "participants": [{"entity": "藏敦巴", "role": "主体"}], "location": "噶托寺", "time_info": "{'text': '五十六岁', 'relative_to': '藏敦巴 (E_872)', 'absolute': None}", "layers": ["史传"], "quote": "能回忆起曾是益西秋译师与印度夏那伟等的前世。他五十六岁时任噶托寺住持，按照上师的传统弘扬经幻心教法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "布札巴在藏敦巴面前得受幻化网灌顶智慧觉醒", "participants": [{"entity": "大菩萨布札巴", "role": "受者"}, {"entity": "藏敦巴", "role": "灌顶师"}], "location": "噶托寺", "time_info": "", "layers": ["史传"], "quote": "这说明他的名声远播各方。后来，布札巴来到噶托，在藏敦巴仁波切面前得受了《幻化网》的灌顶，结果智慧无偏得以觉醒。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "授记", "title": "不动佛授记藏敦巴未来成为发光如来", "participants": [{"entity": "不动佛", "role": "授记者"}, {"entity": "藏敦巴", "role": "受记者"}], "location": "", "time_info": "", "layers": ["授记"], "quote": "还有一次，在所见的不动佛刹土中，眷属菩萨们说这位法王是“宝藏菩萨”的声音轰轰隆隆，并说下一世在极乐世界成为如此这般。另一次见到此刹土时，他也听到本师不动佛授记说：“善男子宝藏，你未来时成为发光如来。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "藏敦巴九十岁火鼠年圆寂", "participants": [{"entity": "藏敦巴", "role": "主体"}], "location": "", "time_info": "{'text': '九十岁火鼠年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "另一次见到此刹土时，他也听到本师不动佛授记说：“善男子宝藏，你未来时成为发光如来。”尊者在九十岁火鼠年圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "香巴波为噶玛巴哲嘉单巴传授比丘戒", "participants": [{"entity": "香巴波", "role": "亲教师"}, {"entity": "金厄芒波瓦索南波", "role": "羯磨师"}, {"entity": "噶玛巴哲嘉单巴", "role": "受戒者"}], "location": "噶托寺", "time_info": "", "layers": ["史传"], "quote": "噶玛巴哲嘉单巴于秋修降生时，首先礼见布札巴和夏白，后来遵照他的言教来到噶托寺，香巴仁波切作为亲教师，金厄芒波瓦索南波作为羯磨师，为噶玛巴传授了近圆比丘戒，尊其为法太子，取名秋杰喇嘛，他也在尊者面前听受了《幻化网》与大圆满的灌顶及教授。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "香巴波七十四岁水鼠年圆寂", "participants": [{"entity": "香巴波", "role": "主体"}], "location": "", "time_info": "{'text': '七十四岁水鼠年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "噶玛巴哲嘉单巴于秋修降生时，首先礼见布札巴和夏白，后来遵照他的言教来到噶托寺，香巴仁波切作为亲教师，金厄芒波瓦索南波作为羯磨师，为噶玛巴传授了近圆比丘戒，尊其为法太子，取名秋杰喇嘛，他也在尊者面前听受了《幻化网》与大圆满的灌顶及教授。尊者住世到七十四岁，期间一直弘法利生，水鼠年圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "金厄瓦索南波巴六十一岁圆寂", "participants": [{"entity": "金厄芒波瓦索南波", "role": "主体"}], "location": "", "time_info": "{'text': '六十一岁', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "金厄瓦索南波巴香巴波的法脉继承人金厄瓦索南波巴于水羊年出生，三十岁时坐床任住持。着力弘扬《集密意续》、《幻化网》及大圆满，护持佛法，六十一岁圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "噶托巴哦鸥益西对帕思巴仁波切授予幻化网寂猛灌顶", "participants": [{"entity": "哦鸥益西", "role": "灌顶师"}, {"entity": "帕思巴仁波切", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "”于是，噶托巴尊者入于驱魔等持中，将殿堂弄得翻天覆地改变，萨迦法王迎请降临智慧尊者，而示现了恢复如初的奇迹。噶托巴尊者对帕思巴仁波切授予《幻化网》寂猛灌顶，他们抵达蒙古境内。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "噶托巴哦鸥益西驱魔使殿堂翻天覆地萨迦法王恢复如初", "participants": [{"entity": "哦鸥益西", "role": "主体"}, {"entity": "法王萨迦班智达", "role": "辅助"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "噶托巴亲口说：“开光之初的驱魔，由我们旧派（宁玛派）来进行，智慧尊者安住等开光正行由你们新派来进行。”于是，噶托巴尊者入于驱魔等持中，将殿堂弄得翻天覆地改变，萨迦法王迎请降临智慧尊者，而示现了恢复如初的奇迹。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "法王萨迦班智达在蒙古圆寂", "participants": [{"entity": "法王萨迦班智达", "role": "主体"}], "location": "蒙古", "time_info": "", "layers": ["史传"], "quote": "噶托巴尊者对帕思巴仁波切授予《幻化网》寂猛灌顶，他们抵达蒙古境内。后来法王萨迦班智达在蒙古圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "供养", "title": "帕思巴返回西藏时将灵塔和供水杯供在噶托寺", "participants": [{"entity": "帕思巴仁波切", "role": "供养者"}], "location": "噶托寺", "time_info": "", "layers": ["史传"], "quote": "后来法王萨迦班智达在蒙古圆寂。帕思巴返回西藏时将三层楼高的响铜灵塔和七套巨型供水杯供在噶托寺，现今仍旧保存着。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "香切华瓦弹指令宰杀的牲畜飞到空中", "participants": [{"entity": "香切华瓦", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "据说在建殿堂时，所有工人宰杀了大量的牛羊而把皮肉分离开来，香切华瓦尊者在它们面前弹了一声响指，结果所有的牲畜全部吵吵囔囔飞到空中。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "根嘎波巴以头顶糌粑令天降大雪退敌军", "participants": [{"entity": "根嘎波巴", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "另有一时，江国王发动大批军队，侍者因为军兵到来而慌慌张张地向他禀报并问：“现在该怎么办？”尊者说：在他的头上放大量的糌粑。侍者按照这样去做，结果天降大雪，使得所有军兵全部撤退。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "克主益西嘉村在札哦秋波面前无余闻受集密意续幻化网等", "participants": [{"entity": "克主益西嘉村", "role": "受者"}, {"entity": "札哦秋波", "role": "传法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "香切嘉村的弟子哦波克主匝那给都被授记是涅译师益西云讷的化身，对于总的所有显密道次第都十分精通，尤其是在大成就者札哦秋波面前无余听受了《集密意续》、《幻化网》寂猛灌顶及讲解修法等。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "克主益西嘉村使密藏续颂释等根本教轨如日轮昭然开显", "participants": [{"entity": "克主益西嘉村", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "克主益西嘉村使《密藏续颂释》、《集密意续》、大圆满心、界、窍诀三部各自的所有教轨根本再度如日轮般昭然开显，以讲修事业使佛法弘扬得遍及各处，撰著了《寂猛普巴教释》、对《密藏续》作了注释、科判、摄义，对《道庄严》作了注疏和注解。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "授记", "title": "空行母业自在母为克主益西嘉村授记成佛", "participants": [{"entity": "空行母业自在母", "role": "授记者"}, {"entity": "克主益西嘉村", "role": "受记者"}], "location": "", "time_info": "", "layers": ["授记"], "quote": "空行母业自在母为他授记说：“你六十四岁时于此往生，前往北方广利有情，尔后于极乐世界，以乐芽菩萨身份修行佛刹，并于清净劫于功德庄严乐藏刹土成佛。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "荣波土秋三位在东方嘉木绒弘扬佛法", "participants": [{"entity": "西绕嘉村", "role": "主体"}, {"entity": "西绕华瓦", "role": "主体"}, {"entity": "西绕多吉", "role": "主体"}], "location": "嘉木绒", "time_info": "", "layers": ["史传"], "quote": "再者，单巴德夏的弟子称为荣波土秋三位，即西绕嘉村、西绕华瓦、西绕多吉，决定是利根顿悟者，他们只是听到单巴仁波切的法音便获得探究到诸法堂奥的大自在成就。他们三位在东方的嘉木绒弘扬佛法，迄今为止佛法如意宝一直经久未损、方兴未艾，也来源于此。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "建寺", "title": "哲擦刚巴建起一百零八座寺院弘扬佛法", "participants": [{"entity": "哲擦刚巴", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "此外，嘎单巴的高足共称有四位教子，其中哲擦刚巴在波、绒、夏卡瓦嘎波以内，建起了一百零八座寺院，将佛法普遍弘扬开来，功绩卓著。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "建寺", "title": "匝德金厄南卡多吉建立够觉匝寺", "participants": [{"entity": "匝德金厄南卡多吉", "role": "主体"}], "location": "够觉匝寺", "time_info": "", "layers": ["史传"], "quote": "匝德金厄南卡多吉建立起够觉匝寺，他的弟子仲特吉益西，在敦巴旺玖等面前得受《幻化网》和大圆满的所有法要，传到卫藏，由此出现了所谓的康派。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "成就者玛尼仁钦以法衣作翅膀翱翔虚空后以光蕴身消逝", "participants": [{"entity": "成就者玛尼仁钦", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "然而，他刚刚对前三代祖师的遗塔作完承侍，便将法衣作翅膀犹如鸟一样翱翔虚空而到达对面的山顶，在那里也留下了脚印。此后住在绕觉地方不久便以光蕴身消逝。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "荣索班智达幼年在嘎敦赤诚桑波面前听法", "participants": [{"entity": "荣索班智达", "role": "受者"}, {"entity": "嘎敦赤诚桑波", "role": "传法者"}], "location": "酿曼", "time_info": "", "layers": ["史传"], "quote": "还有一种说法：一位名叫阿匝绕查拉让莫的班智达到达康区，翻译、传讲《密集续广释》等以后圆寂，转世为荣索班智达。荣索班智达从幼年时起就具备任运自成的大智慧，在酿曼地方，于嘎敦赤诚桑波面前听法，他的父亲前去给他送口粮。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "授记", "title": "阿底峡尊者赞叹荣索班智达为阿匝雅黑行尊者转世", "participants": [{"entity": "阿底峡尊者", "role": "授记者"}, {"entity": "荣索班智达", "role": "受记者"}, {"entity": "阿匝雅黑行尊者", "role": "前世"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "阿底峡尊者与这位大师会晤时，尊者亲口赞叹说：印度的阿匝雅黑行尊者的转世绝对是这位尊者，所以我又岂能胜过他的辩才，这是无可诤议一致共称的。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "荣索班智达著《密藏续释·三宝释》", "participants": [{"entity": "荣索班智达", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "再者，由于荣索班智达所著的《密藏续释》的开头有“三宝自性菩提心”，所以他的《密藏续释》命名为《三宝释》，全知龙钦巴大师的注释《遣除十方黑暗》解释乘王之宗，简明易懂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "荣索班智达在多敦桑给上师前闻法时梦到用续部做饭做菜", "participants": [{"entity": "荣索班智达", "role": "主体"}, {"entity": "多敦桑给", "role": "上师"}], "location": "", "time_info": "{'text': '幼年时', 'relative_to': '荣索班智达 (E_780)', 'absolute': None}", "layers": ["史传"], "quote": "如果理解了藏地的这两部主要注释，就能赐予你智慧威力。尊者在幼年时，在多敦桑给上师前听闻前译教法的过程中，有一次，他梦到用《密藏续》做饭，用《佛陀平等行续》做菜，正在享用。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "荣索班智达造三种窍诀及大量注释", "participants": [{"entity": "荣索班智达", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "”为了满上师的意愿，他造了依靠三学如意宝的三种窍诀，宣说殊胜戒学意义的《誓言广解》；宣说殊胜定学的注释《四理十五支》；宣说殊胜慧学大圆满之见修窍诀——《平等行续释》，此外，他还撰著了《净恶趣续释》、《大威德续释》等大量的注释及窍诀。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "荣索班智达折服西藏四翼所有智者", "participants": [{"entity": "荣索班智达", "role": "主体"}, {"entity": "扬钦喇嘛", "role": "被折服者"}, {"entity": "玛巴多巴", "role": "被折服者"}, {"entity": "哦耶巴达敦", "role": "被折服者"}, {"entity": "多穹波哄酿", "role": "被折服者"}, {"entity": "色楚嘉措白", "role": "被折服者"}, {"entity": "擦敦够愉", "role": "被折服者"}, {"entity": "帮嘎达穹", "role": "被折服者"}, {"entity": "古拉则", "role": "被折服者"}, {"entity": "嘉甲赤", "role": "被折服者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "甚至，他也造了有关世间的农业、畜牧、如何做乳制品在内的论典。当时，西藏四翼的所有智者一开始兴冲冲前去辩论，但后来荣索班智达折服了他们的辩才，摧毁了他们的我慢。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "够热译师读《入大乘论》后依止荣索班智达", "participants": [{"entity": "够热译师", "role": "弟子"}, {"entity": "荣索班智达", "role": "上师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "够热译师比丘秋杰西绕拥有多闻的陀罗尼，他最初也是一味责怪，中间看了荣索班智达所著的《入大乘论》法本，结果生起极大恭\n敬心，最后带着丰厚的财物前去依止，毫不隐晦地说明实情之后祈求摄受，在其前听受了《文殊秘密续》等众多法要，在讲密续期间，大班智达亲口说：我们如果有印度法本，就这样进行，正因为没有印度法本，现在不可更改。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "译经", "title": "荣索班智达依止印度班智达翻译大量续部", "participants": [{"entity": "荣索班智达", "role": "译师"}, {"entity": "玛则西日巴玛", "role": "班智达"}, {"entity": "玛则西日匝那", "role": "班智达"}, {"entity": "俄巴雅西日莫札", "role": "班智达"}, {"entity": "哦达阿嘎绕巴札", "role": "班智达"}, {"entity": "德瓦嘎绕赞札", "role": "班智达"}, {"entity": "巴绕美夏", "role": "班智达"}, {"entity": "阿木嘎班则", "role": "班智达"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "荣索班智达依止印度堪布玛则西日巴玛、玛则西日匝那、俄巴雅西日莫札、哦达阿嘎绕巴札、德瓦嘎绕赞札、巴绕美夏、阿木嘎班则等众多班智达以后，作为他们的译师，翻译了《大威德金刚》、《阎罗黑敌续》、《文殊具密续》、《胜乐根本续》等大量续部，译文极其优美，堪为新译的典范，印度的班智达众口一词地对他说：“达玛巴札，你要撰著丰富法要，救护一切众生，不用说你的其余功德，仅仅了解你所精通声明、因明三分之一的人在印度便可造论，为什么你不造论呢？”尽管他具足如此圆满功德，却谦虚谨慎、戒骄戒躁。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "荣索班智达以神变行走岩石、插橛入岩、飞翔空中", "participants": [{"entity": "荣索班智达", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "再从他的成就事迹而言，他依靠神变行为能走在如镜面般的陡峭磐石上，能将金刚橛插入岩石，能飞翔空中，具有对藏地的大多数鬼神住所、行为了如指掌的神通，诸如此类有众多成就。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "荣索班智达住世一百一十九岁后圆寂", "participants": [{"entity": "荣索班智达", "role": "主体"}], "location": "", "time_info": "{'text': '住世到一百一十九岁', 'relative_to': '荣索班智达 (E_780)', 'absolute': None}", "layers": ["史传"], "quote": "如此无可非议的这位化身大班智达，受到当时出世的所有智者交口称赞、恭敬顶戴。荣索班智达住世到一百一十九岁，在身体安然无恙的情况下示现圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "莲花生大士在桑耶寺传君王派普巴", "participants": [{"entity": "莲花生大士", "role": "传法者"}, {"entity": "赤松德赞", "role": "受者"}, {"entity": "卡钦萨", "role": "受者"}], "location": "桑耶寺", "time_info": "", "layers": ["史传"], "quote": "那么，普巴金刚到底是如何弘扬开来的呢？由邬金堪布班玛桑巴瓦（即莲花生大士）延续下来的普巴有君王派、明妃派、嘉姆派，再有那南或荣派、黑尊派、花尊派由身色共称等有多种迥然不同的异门，然而这些都是一个本体，只是从窍诀的反体以及传教的差别才如此共称的。第一、君王派普巴：莲花生大士在桑耶寺传给国王赤松德赞、明妃卡钦萨及迎请此法的三人。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "莲花生大士临近离藏时传明妃派普巴给卡钦萨", "participants": [{"entity": "莲花生大士", "role": "传法者"}, {"entity": "卡钦萨", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "第一、君王派普巴：莲花生大士在桑耶寺传给国王赤松德赞、明妃卡钦萨及迎请此法的三人。第二、明妃派：莲花生大士临近离开（藏地）时，言简意赅地归纳普巴颂上事业修行菩提、下事业诅咒道用的精华，传给明妃卡钦萨。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "闭关修行", "title": "卡钦萨在门卡那让狮子堡修普巴二十一天获成就", "participants": [{"entity": "卡钦萨", "role": "主体"}], "location": "门卡那让狮子堡山洞", "time_info": "{'text': '二十一天', 'relative_to': None, 'absolute': None}", "layers": ["神变"], "quote": "她在南方门卡那让狮子堡山洞，打开外相圣物坛城而修行二十一天，结果所有金刚橛发笑、放光、跳动摇晃，明妃觉母心里想：已经成就了金刚橛，就要做降伏事业。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "卡钦萨以金刚橛降伏祖先馋鬼", "participants": [{"entity": "卡钦萨", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "虽然当时没有真正降伏的对象，但是她心里想降伏祖先的馋鬼而捻动金刚橛念咒，结果金刚橛腾空而起，落到她故乡家宅遗址处祖先馋鬼所在处的黄柏刺丛上面，黄柏刺丛焚烧起来，将馋鬼超度到等性界中，后来那把金刚橛由明妃的叔伯们保存。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "卡钦萨传降伏鬼神传承给哥哥卡钦华杰旺修", "participants": [{"entity": "卡钦萨", "role": "传法者"}, {"entity": "卡钦华杰旺修", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "人们共称是由卡钦萨传下降伏鬼神的传承。明妃将此传给自己的哥哥卡钦华杰旺修，之后逐渐弘扬开来。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "益西措嘉教授玖如萨传下嘉姆派", "participants": [{"entity": "益西措嘉空行母", "role": "传法者"}, {"entity": "玖如萨", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "第三、嘉姆派：尽管玖如萨直接依止了莲花生大士，但由于灌顶没有在上师前得受而在本尊前请求，结果本尊摄于阿阇黎心间，她失去了灌顶的机会。后来莲师把她交给明妃益西措嘉，由益西措嘉空行母教授玖如萨，由此传下。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "哲阿匝绕传朗拉香切多吉普巴甚深要诀", "participants": [{"entity": "哲阿匝绕萨列", "role": "传法者"}, {"entity": "朗拉香切多吉", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "朗拉香切多吉朗拉香切多吉在幼年时就失去父母双亲，就像至尊米拉日巴的遭遇一样，受到父系叔伯的虐待，孤苦伶仃，极其可怜。哲阿匝绕于心不忍，于是传给他普巴窍诀中甚深的要诀，他实地修行以后降伏了父系的叔伯。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "降伏非人", "title": "朗拉香切多吉以普巴降伏叔伯", "participants": [{"entity": "朗拉香切多吉", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "朗拉香切多吉朗拉香切多吉在幼年时就失去父母双亲，就像至尊米拉日巴的遭遇一样，受到父系叔伯的虐待，孤苦伶仃，极其可怜。哲阿匝绕于心不忍，于是传给他普巴窍诀中甚深的要诀，他实地修行以后降伏了父系的叔伯。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "朗拉香切多吉以金刚橛打败绕译师", "participants": [{"entity": "朗拉香切多吉", "role": "主体"}, {"entity": "绕译师", "role": "被降伏者"}], "location": "库热", "time_info": "", "layers": ["神变"], "quote": "结果朗拉开始勾招、迎请，说谛实语，对着绕译师师徒，降下木扦普巴雨，结果绕译师的眷属僧人都受了伤，中间朗拉修十方忿怒坛城，使铁橛如雨降下，最后到处遍满熊熊火焰及震耳欲聋的声音。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "伏藏开取", "title": "德巴嘉扬楚从瓷桶伏藏取出大威德类", "participants": [{"entity": "德巴嘉扬楚", "role": "伏藏师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "德巴嘉扬楚从瓷桶伏藏中取出大威德类，他只抄录了《长寿法罪恶满心》一半内容，就到绕译师面前，绕译师对自己的大威德类补充以后依靠印度的原本进行译校。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "朗拉尊者传杰江吉金刚橛法", "participants": [{"entity": "朗拉香切多吉", "role": "传法者"}, {"entity": "杰江吉", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "朗拉 尊者 的 主 要 弟子 有那南西绕赤诚、孟地的杰江吉（倒 墙者）、让革章普哦古、哦耶如波酿那。\n杰万香切仁钦杰江吉或者叫杰万香切仁钦，他的房屋、田地、牲畜被叔伯抢夺一空，他极度悲哀，向朗拉尊者请求金刚橛法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "闭关修行", "title": "杰江吉修金刚橛九个月后达到目的", "participants": [{"entity": "杰江吉", "role": "主体"}], "location": "色甲西", "time_info": "{'text': '九个月念修本尊，之后在色甲西地方修两个月', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "上师说：'九个月念修本尊，之后在色甲西地方修两个月，会达到目的。'他如此修行，结果达到了预期的效果", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "杰江吉以金刚橛指向墙壁使墙倒塌杀死怨敌", "participants": [{"entity": "杰江吉", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "一天，他看到许多人在一堵墙下晒太阳，那伙人无不成为怨敌，他把金刚橛指向墙壁，结果墙壁顷刻倒塌，那些人命归黄泉，由此被人们一致称为倒墙者。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "莲花生大士举金刚橛使旃檀林失火后恢复如初", "participants": [{"entity": "莲花生大士", "role": "主体"}], "location": "旃檀林", "time_info": "", "layers": ["神变"], "quote": "有一次，旃檀林失火，莲花生大士举起金刚橛使森林恢复如初；对于恒河暴涨，布玛莫札举起橛使恒河上下中断；尼泊尔西拉玛则将橛举向贡坚岩堡，结果岩山塌成一段一段的；明妃卡钦萨把金刚橛插入豺狼的足迹，结果豺狼滚下悬崖；美尼嘉瓦酿波将金刚橛指向衔走念珠的乌鸦，结果乌鸦坠落到草原上；罗华戒罗珠把金刚橛插入军兵的茅屋，结果门军惨遭失败。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "布玛莫札举橛使恒河断流", "participants": [{"entity": "布玛莫札", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "有一次，旃檀林失火，莲花生大士举起金刚橛使森林恢复如初；对于恒河暴涨，布玛莫札举起橛使恒河上下中断；尼泊尔西拉玛则将橛举向贡坚岩堡，结果岩山塌成一段一段的；明妃卡钦萨把金刚橛插入豺狼的足迹，结果豺狼滚下悬崖；美尼嘉瓦酿波将金刚橛指向衔走念珠的乌鸦，结果乌鸦坠落到草原上；罗华戒罗珠把金刚橛插入军兵的茅屋，结果门军惨遭失败。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "伏藏埋藏", "title": "莲花生大士将马头明王最密法类伏藏在耶巴色瓦谷", "participants": [{"entity": "莲花生大士", "role": "主体"}], "location": "耶巴色瓦谷", "time_info": "", "layers": ["史传"], "quote": "再者，从伏藏法中能得到昭彰显著的验相，莲花生大士在为国王传授灌顶、续部及教授以后，与马头明王最密法类一起伏藏在耶巴色瓦谷岩石中。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "达夏热瓦在觉母那嘉上山洞亲见莲花生大士", "participants": [{"entity": "达夏热瓦", "role": "主体"}, {"entity": "莲花生大士", "role": "显现者"}], "location": "觉母那嘉上山洞", "time_info": "", "layers": ["神变"], "quote": "再者，从伏藏法中能得到昭彰显著的验相，莲花生大士在为国王传授灌顶、续部及教授以后，与马头明王最密法类一起伏藏在耶巴色瓦谷岩石中。\n达夏热瓦成就自在者达夏热瓦在觉母那嘉上山洞修行，结果亲见莲花生大士。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "莲花生大士每日乘阳光来益巴达瓦山洞为达夏热瓦传法", "participants": [{"entity": "莲花生大士", "role": "传法者"}, {"entity": "达夏热瓦", "role": "受者"}], "location": "益巴达瓦山洞", "time_info": "", "layers": ["神变"], "quote": "莲师告诉他：“去益巴达瓦山洞修行。”他依教奉行，在那里，每天清晨，莲花生大士都乘坐阳光而来，为他传法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "伏藏开取", "title": "达夏热瓦从益波色瓦隆取出金刚橛伏藏", "participants": [{"entity": "达夏热瓦", "role": "伏藏师"}], "location": "益波色瓦隆", "time_info": "", "layers": ["史传"], "quote": "当时，达夏热瓦从益波色瓦隆取出外相圣物金刚橛伏藏，到达拉萨的集市时，狂风大作，把整个集市搞得七零八落，此后他到达后藏时，萨迦班智达要到金城，二人在同一舍宅相聚，达夏热瓦念诵：“嗡班则戒乐戒拉雅吽啪达”。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "达夏热瓦到拉萨集市时狂风大作", "participants": [{"entity": "达夏热瓦", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "当时，达夏热瓦从益波色瓦隆取出外相圣物金刚橛伏藏，到达拉萨的集市时，狂风大作，把整个集市搞得七零八落，此后他到达后藏时，萨迦班智达要到金城，二人在同一舍宅相聚，达夏热瓦念诵：“嗡班则戒乐戒拉雅吽啪达”。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "达夏热瓦将金刚橛整个插入岩石", "participants": [{"entity": "达夏热瓦", "role": "主体"}, {"entity": "法王萨迦班智达", "role": "见证者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "萨迦班智达说：“你念的不对，应该念‘班则革乐革拉雅吽啪达’”。达夏热显得不悦地说，尽管咒语念得不对，但也有如此作用，说完将金刚橛整个击在岩石上，结果就像插入泥里一样插了进去。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "萨迦班智达与楚雪嘎波辩论十三天获胜", "participants": [{"entity": "法王萨迦班智达", "role": "辩论者"}, {"entity": "楚雪嘎波", "role": "辩论者"}], "location": "金城", "time_info": "{'text': '十三天', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "萨迦班智达与楚雪嘎波二人在十三天之中展开了激烈的辩论。最后萨迦班智达大获全胜，可是楚雪嘎波不愿意皈入佛门，狡辩道：“我们在成就相上一决胜负。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "神变", "title": "达夏热瓦以金刚橛插入外道影子心间降伏飞翔空中的楚雪嘎波", "participants": [{"entity": "达夏热瓦", "role": "主体"}, {"entity": "楚雪嘎波", "role": "被降伏者"}, {"entity": "法王萨迦班智达", "role": "请求者"}], "location": "金城", "time_info": "", "layers": ["神变"], "quote": "逍遥自在的大瑜伽士一边将金刚橛插入外道影子的心间一边念诵“嗡班则戒乐戒拉雅吽啪达”。最后外道好像被石头击中的飞禽一般落到地上。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "十二地母制裁楚雪嘎波使其在交界处绝命", "participants": [{"entity": "十二地母", "role": "执行者"}, {"entity": "楚雪嘎波", "role": "受害者"}], "location": "金城", "time_info": "", "layers": ["神变"], "quote": "萨迦班智达为了表示辩论得胜，没有让楚雪嘎波出家，带着他一起前行。由于莲花生大士吩咐防止外道进入西藏，因此十二地母予以制裁，结果那个外道在金城与西藏交界处口吐鲜血绝命身亡。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "嘉扬仁钦嘉村在阿里为亲子大班智达兄弟灌顶", "participants": [{"entity": "嘉扬仁钦嘉村", "role": "灌顶师"}, {"entity": "仁真勒丹", "role": "受者"}], "location": "阿里拉哦玛塘", "time_info": "{'text': '兔年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "阿里哦则瓦嘉扬仁钦嘉村在勒巴华桑面前听受。嘉扬仁钦嘉村在兔年，于阿里拉哦玛塘为亲子大班智达兄弟灌顶。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "喇钦作雄巴由父领着听受《集密意续》灌顶", "participants": [{"entity": "喇钦作雄巴涅敦秋嘉多吉", "role": "受者"}, {"entity": "芒绕瓦班玛敦珠", "role": "领引者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他在后藏桑哲则华嘎处传授《经·集密意续》灌顶及交付印持的过程中，年幼的喇钦作雄巴涅敦秋嘉多吉由父亲芒绕瓦班玛敦珠领着完整地听受了。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "喇钦在桑库为曼隆巴独传《集密意续》灌顶", "participants": [{"entity": "喇钦作雄巴涅敦秋嘉多吉", "role": "灌顶师"}, {"entity": "曼隆巴钦波酿敦罗秋多吉", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他在荣莫香巴绕地方，严格闭关，也以造黑心滴引导作伪装，在桑库地方为曼隆巴钦波酿敦罗秋多吉独传《集密意续》灌顶及交付印持。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "曼隆巴将《集密意续》灌顶详细传给多吉札化身", "participants": [{"entity": "曼隆巴钦波酿敦罗秋多吉", "role": "传法者"}, {"entity": "根桑班玛陈列", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他将《集密意续》灌顶、交付印持及实践窍诀详细赐给前译佛法的教主多吉札仁真秋的化身，这位大德是那南多吉敦珠（降魔金刚）的转世——仁真吉的化身，铁蛇年于曼卡南哲洲出生在夏那种姓中，其父名为德巴嘎玛彭措旺波。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "根桑班玛陈列在第五世达赖前出家受比丘戒", "participants": [{"entity": "根桑班玛陈列", "role": "受戒者"}, {"entity": "第五世达赖喇嘛", "role": "亲教师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他在全知第五世达\n赖喇嘛面前出家，赐名为根桑班玛陈列（意为普贤莲花事业）。后来也在第五世达赖喇嘛前受比丘戒，并且听受了众多深法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "根桑班玛陈列造《集密意续灌顶仪轨坛城海之津梁》", "participants": [{"entity": "根桑班玛陈列", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尤其是经全知第五世达赖喇嘛诏书劝请，造了《集密意续灌顶仪轨坛城海之津梁》，并且多次完整授予《集密意续》灌顶等等，依此对《经·集密意续》利益颇大。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "扬敦南卡多吉在得钦卓玛前听受《集密意续》灌顶", "participants": [{"entity": "扬敦南卡多吉", "role": "受者"}, {"entity": "得钦卓玛", "role": "灌顶师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尤其是有关《集密意续》的灌顶、交付印持及教言，他在有桑吉仁钦亲传的得钦卓玛面前听受过，对经续窍诀及修部无不精通，在达寻南当的禅房里主要专心致志实修，结果风心获得稳固，现前了生圆次第的密意，四种事业运用自如，依此利益所化众生。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "扬敦南卡多吉为夏莫多吉嘉村灌顶并恩授教言", "participants": [{"entity": "扬敦南卡多吉", "role": "灌顶师"}, {"entity": "夏莫多吉嘉村", "role": "受者"}], "location": "达寻南当禅房", "time_info": "", "layers": ["史传"], "quote": "尤其是有关《集密意续》的灌顶、交付印持及教言，他在有桑吉仁钦亲传的得钦卓玛面前听受过，对经续窍诀及修部无不精通，在达寻南当的禅房里主要专心致志实修，结果风心获得稳固，现前了生圆次第的密意，四种事业运用自如，依此利益所化众生。他在南当禅房为成就者夏莫多吉嘉村灌顶，并恩授讲释及教言。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "扬敦南卡多吉将《集密意续》灌顶授予仁真耶哲多吉", "participants": [{"entity": "扬敦南卡多吉", "role": "灌顶师"}, {"entity": "仁真耶哲多吉", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在大乐静处修行，生起次第得到稳固，无碍成就四事业，圆满次第的觉受证悟达到究竟，以讲经说法、实地修行弘扬佛法。\n仁真耶哲多吉扬敦南卡多吉在大乐修行处，将《集密意续》的灌顶、交付印持圆满授予仁真耶哲多吉，并且也恩赐了讲解与教言。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "仁真耶哲多吉为克主罗珠嘉村传授《集密意续》灌顶", "participants": [{"entity": "仁真耶哲多吉", "role": "灌顶师"}, {"entity": "克主罗珠嘉村", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "克主罗珠嘉村仁真耶哲多吉为涅嘉那革玛绕的化身克主罗珠嘉村吉祥贤，传授《集密意续》圆满四源流的灌顶、交付印持、讲解、教言及实践法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "克主罗珠嘉村弃俗出家", "participants": [{"entity": "克主罗珠嘉村", "role": "受戒者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "正当他风华正茂之时，便觉醒了佛性，而弃俗出家，依止了大上师金刚持札巴仁钦、永真阿旺札巴、班朗心子达瓦嘉村、伏藏大师月波朗巴、不舍肉身飞往空行刹土的多吉桑给等若干位成就者的殊胜上师，无有厌足地听闻无边法门。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "克主罗珠嘉村用金粉印《十七续》等教法经函", "participants": [{"entity": "克主罗珠嘉村", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他造了讲修注疏、仪轨、事业、实践法、教史、辩答等著作，也用金粉印了《十七续》、《布玛心滴》、《集善逝》等为主为数不少的教藏法、伏藏经函，以诸如此类讲经说法、实地修持、广行善事极其壮观的事业发扬光大前译佛法，这位尊者在七十三岁时撰著《观察赎死文》。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "克主罗珠嘉村为大译师洋彭多吉赐予《集密意续》灌顶", "participants": [{"entity": "克主罗珠嘉村", "role": "灌顶师"}, {"entity": "大译师洋彭多吉", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "很显然，他住世时间较此更长。\n贡绕大译师洋彭多吉克主罗珠嘉村尊者为贡绕大译师洋彭多吉赐予《集密意续》的四法流圆满灌顶、交付印持、讲解、教言及实践法。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "大译师洋彭多吉受沙弥戒和比丘戒", "participants": [{"entity": "大译师洋彭多吉", "role": "受戒者"}], "location": "", "time_info": "{'text': '十二岁受沙弥戒，二十一岁受比丘戒', 'relative_to': '大译师洋彭多吉 (E_851)', 'absolute': None}", "layers": ["史传"], "quote": "他孩提时代，聪明伶俐，无拘无束，有对谁也无所畏惧的豪迈气概。他从小就一心向往无有挂碍的出家身份，十二岁在红帽法自在面前受沙弥戒，二十一岁受比丘戒，成了出类拔萃的僧人。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "大译师洋彭多吉三次刻印《宁玛续全集》", "participants": [{"entity": "大译师洋彭多吉", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他曾三次刻印《宁玛续全集》，考虑到佛法一脉相传，其中的两份送到康区和贡地，以此为主，对于有能力利益众生者，只要他手中有经卷，就会赐予，即使没有，他也会慷慨布施给他们修行的物资。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "大译师洋彭多吉六十一岁圆寂", "participants": [{"entity": "大译师洋彭多吉", "role": "主体"}], "location": "", "time_info": "{'text': '六十一岁', 'relative_to': '大译师洋彭多吉 (E_851)', 'absolute': None}", "layers": ["史传"], "quote": "总而言之，这位大德具有智慧高超、戒律清净、人格贤善的功德，讲经说法、实地修持、广行善举的事业等同虚空。六十一岁正值年灾之初趋至寂灭法界。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "大译师洋彭多吉将法脉传给密主陈列棱珠", "participants": [{"entity": "大译师洋彭多吉", "role": "传法者"}, {"entity": "陈列棱珠", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "六十一岁正值年灾之初趋至寂灭法界。\n密主陈列棱珠贡绕大译师洋彭多吉将法脉传给大努桑吉益西的转世密主陈列棱珠。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "密主陈列棱珠在则拉嘉措前出家", "participants": [{"entity": "陈列棱珠", "role": "受戒者"}, {"entity": "则拉嘉措", "role": "亲教师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尤其是在父亲面前闻受了上师（即莲花生大士）、大圆满、大悲观音三修部等教藏法与伏藏法的许多灌顶、引导、讲解、传承，并以思维修行抉择。后来在大德则拉嘉措面前出家，赐名陈列棱珠吉祥贤，也在其前不同程度地听闻了法要。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "密主陈列棱珠在大译师面前听受《集密意续》四法流灌顶", "participants": [{"entity": "陈列棱珠", "role": "受者"}, {"entity": "大译师洋彭多吉", "role": "灌顶师"}], "location": "", "time_info": "{'text': '二十九岁土兔年四月', 'relative_to': '密主陈列棱珠 (E_877)', 'absolute': None}", "layers": ["史传"], "quote": "二十九岁土兔年四月，在贡绕棱珠得地方于大译师洋彭多吉面前，用彩粉建起《集密意续》根本及分支的所有坛城，在涅巴德勒的法本上，十七天内圆满听受了四法流的灌顶、交付印持、修行次第及窍诀，与大修之业次第相关的法要。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "密主陈列棱珠完整授法并授予继承者灌顶给伏藏大师杰美多吉", "participants": [{"entity": "陈列棱珠", "role": "传法者"}, {"entity": "伏藏大师杰美多吉", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "消除自私自利的执著，遍虚空的利他大悲不加勤作油然而生，进而对追求解脱的许多高低有缘者，不间断地广转讲修法轮，依此大范围地弘扬佛法、利乐有情。尤其是对身语意之胜子——伏藏大师杰美多吉，完整无缺地恩赐博大精深的一切法，并授予作为继承者的灌顶。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "密主陈列棱珠五十二岁水虎年圆寂", "participants": [{"entity": "陈列棱珠", "role": "主体"}], "location": "", "time_info": "{'text': '五十二岁水虎年二月二十二', 'relative_to': '密主陈列棱珠 (E_877)', 'absolute': None}", "layers": ["史传"], "quote": "尤其是对身语意之胜子——伏藏大师杰美多吉，完整无缺地恩赐博大精深的一切法，并授予作为继承者的灌顶。五十二岁水虎年二月二十二，伴着顶髻跳动、自光四射、香气缭绕，色身融入法界。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "大译师秋嘉丹真在索南仁钦前出家", "participants": [{"entity": "大译师秋嘉丹真", "role": "受戒者"}, {"entity": "索南仁钦", "role": "亲教师"}], "location": "穹吉华热佛学院", "time_info": "", "layers": ["史传"], "quote": "不费力而通达读写、仪轨、事业。一心向往而来到穹吉华热佛学院，在住持索南仁钦面前出家，取名为秋嘉丹真。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "秋嘉丹真听受宿派《集密意续》灌顶", "participants": [{"entity": "大译师秋嘉丹真", "role": "受者"}, {"entity": "陈列棱珠", "role": "灌顶师"}], "location": "", "time_info": "{'text': '十八岁土鼠年', 'relative_to': '大译师秋嘉丹真 (E_888)', 'absolute': None}", "layers": ["史传"], "quote": "那一年内，持明陈列棱珠被迎请到穹吉华山，化身秋陈列南嘉，将卫藏的僧人集中在后藏，听受了宿派《集密意续》的灌顶、教言、交付印持、与彩粉坛城中大修相关的法要，聚集少数师徒，上师在彩画上赐予康派和宿派的法要时，他也一起听受了。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "秋嘉丹真向伏藏大师杰美多吉献上《集密意续》灌顶", "participants": [{"entity": "大译师秋嘉丹真", "role": "灌顶师"}, {"entity": "伏藏大师杰美多吉", "role": "受者"}], "location": "", "time_info": "{'text': '三十二岁水虎年', 'relative_to': '大译师秋嘉丹真 (E_888)', 'absolute': None}", "layers": ["史传"], "quote": "当时，正确地领会了在父亲前所听受的《集密意续》灌顶、传承和实践法，后来应寺院迎请，他欣然同意，到达以后对伏藏大师仁波切也献上《集密意续》的灌顶。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "圆寂", "title": "大译师秋嘉丹真七十八岁圆寂", "participants": [{"entity": "大译师秋嘉丹真", "role": "主体"}], "location": "", "time_info": "{'text': '七十八岁土鼠年四月', 'relative_to': '大译师秋嘉丹真 (E_888)', 'absolute': None}", "layers": ["史传"], "quote": "因此对前译派教法作出了至高无上的贡献。尊者七十八岁土鼠年四月，在达多朗静处圆寂。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "出家受戒", "title": "大译师达玛西日在第五世达赖前出家受戒", "participants": [{"entity": "达玛西日", "role": "受戒者"}, {"entity": "第五世达赖喇嘛", "role": "亲教师"}], "location": "", "time_info": "{'text': '十五岁出家受沙弥戒，二十岁受比丘戒', 'relative_to': '大译师达玛西日 (E_893)', 'absolute': None}", "layers": ["史传"], "quote": "在伏藏大师面前受三皈五戒，取名丹增嘉扬旺波。十五岁时，在第五世达赖喇嘛面前出家，赐名谓阿旺秋华，并受沙弥戒。二十岁也是在第五世达赖喇嘛前受比丘戒。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "灌顶", "title": "大译师达玛西日十二岁于彩粉坛城听受持明心滴灌顶", "participants": [{"entity": "达玛西日", "role": "受者"}], "location": "", "time_info": "{'text': '十二岁', 'relative_to': '大译师达玛西日 (E_893)', 'absolute': None}", "layers": ["史传"], "quote": "在至尊伏藏大师面前受了三教轨的菩萨戒。曾经在十二岁时，于彩粉坛城中听受持明心滴灌顶，而使心相续得以成熟。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "大译师达玛西日传授比丘戒和沙弥戒", "participants": [{"entity": "达玛西日", "role": "亲教师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "此外，他还在持明班玛陈列面前听受了《时轮金刚》的圆满灌顶和寂猛幻化网的灌顶为主新旧派无偏二十位上师各自不同教轨的如海法理，并进行思维修行，这方面的实例言之不尽。他一心为佛法着想，由他传授比丘戒的有四百四十七位比丘，一千二百八十八位沙弥。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "大译师达玛西日冬夏两季不间断传《密藏续》法轮", "participants": [{"entity": "达玛西日", "role": "传法者"}], "location": "", "time_info": "{'text': '四十八岁到六十四岁', 'relative_to': '大译师达玛西日 (E_893)', 'absolute': None}", "layers": ["史传"], "quote": "他从四十八岁开始到六十四岁之间，在冬夏两季，一直不间断地为六十位具有殊胜缘分、智慧敏捷的持明僧众转《密藏续》法轮，也传讲了《决定三戒论》、《般若》、《戒律》等许多大经大论。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "大译师达玛西日授予萨迦巴大师新伏藏圆满灌顶", "participants": [{"entity": "达玛西日", "role": "灌顶师"}, {"entity": "阿旺根嘎札西", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "对具德萨迦巴大师阿旺根嘎札西，授予了新伏藏的圆满灌顶、传承、大悲成熟引导", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "传法", "title": "大译师达玛西日在多康畅都传法", "participants": [{"entity": "达玛西日", "role": "传法者"}, {"entity": "帕巴拉嘉瓦嘉措", "role": "受者"}, {"entity": "月瓦桑波", "role": "受者"}, {"entity": "阿旺哲革", "role": "受者"}], "location": "多康畅都", "time_info": "{'text': '五十九岁水龙年', 'relative_to': '大译师达玛西日 (E_893)', 'absolute': None}", "layers": ["史传"], "quote": "五十九岁水龙年，他被迎请到了多康畅都地方，为帕巴拉嘉瓦嘉措、月瓦桑波及阿旺哲革传授完整的新伏藏类、《上师密集续》、涅伏藏威猛法，《普巴剑》、《根除地狱》、君王派观音法等新旧派无偏的许多灌顶、传承、窍诀甘露，使他们心相续得以成熟、解脱。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "建寺", "title": "哲旺竹青巴班玛仁真在热达金察山谷建竹青寺", "participants": [{"entity": "哲旺竹青巴班玛仁真", "role": "建寺者"}], "location": "热达金察山谷", "time_info": "", "layers": ["史传"], "quote": "再者，哲旺竹青巴班玛仁真，共称是阿阇黎革革燃匝和布玛莫札双重的幻化，并且有着不可思议的智慧、持戒、成就的传记，在第五世达赖喇嘛以照见后际的授记劝请下，他到了多康地区，在热达金察山谷建起了修部禅定法洲（即竹青寺），成为前译佛教的一个主体。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "建寺", "title": "仁真根桑西绕建立白玉寺", "participants": [{"entity": "仁真根桑西绕", "role": "建寺者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "与之相同，拉色嘉瓦香切的幻化仁真根桑西绕，建立华境南嘉香切洲的寺院（即白玉寺），祖师们次第性示现化身，持教大德成就者心子前仆后继涌现，广泛弘扬讲修业的辉煌事业。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "嘉哲洋彭塔益刻印《经·集密意续》等经函十套", "participants": [{"entity": "嘉哲洋彭塔益", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "特别是与第四世竹青法王莫杰南卡多吉同时，敏朗伏藏大师的幻化嘉哲洋彭塔益，广弘显密众多论典的讲修，尤其是对于前译佛经，尽心尽力寻找法本、灌顶、经教、窍诀的传承并大范围弘扬。刻印《经·集密意续》、《幻化网》等经函十套，对佛法延续有着无法想象的恩德，作出了不可思议的贡献。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "班玛多昂丹增重新修复达塘白玉寺并每年举行教藏法灌顶", "participants": [{"entity": "班玛多昂丹增", "role": "主体"}], "location": "达塘白玉寺", "time_info": "", "layers": ["史传"], "quote": "后来，嘉滚钦哲旺波、伏藏大师秋杰朗巴发心苏醒，佛子班玛多昂丹增，在该寺每年连续不断举行前译教藏法的灌顶、授教的传承，如今共有二十七大坛城供修法\n会，重新修复达塘显密讲修洲（即达塘白玉寺）等，讲经说法、实地修持、广行善举的事业十分卓越。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "弘法", "title": "邬金多昂秋杰尼玛印完整教藏法宝库二十函", "participants": [{"entity": "邬金多昂秋杰尼玛", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尤其是邬金多昂秋杰尼玛的发心愿力不仰仗他人的威力，所有完整的教藏法宝库印了二十函，我本人也有福分得到法本，依此在如今藏土边地野蛮恶劫时难以承受的坎坷盛行的此时此刻，《经幻心》为主的前译教藏法的火炬在此方（指印度）燃起，使佛法慧命得到没有隐没的生机，这位尊者无比的宏恩永远无法衡量。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "恢复佛教", "title": "龙萨嘉哲索南德赞依止敏朗伏藏大师恢复噶托教法", "participants": [{"entity": "龙萨嘉哲索南德赞", "role": "主体"}, {"entity": "伏藏大师杰美多吉", "role": "上师"}], "location": "噶托寺", "time_info": "", "layers": ["史传"], "quote": "按照前文所说，本来噶托金刚座佛学院（即噶托寺），是前译教法的一个源头，后来持明者降魔金刚和龙萨酿波的事业蒸蒸日上，尽管所有教藏法在中期似乎渐渐衰退，但是降魔金刚的转世龙萨嘉哲索南德赞，依止了敏朗伏藏大师仁波切足下，而再度使所有佛经教法从根本上得以恢复。", "chapter": "《藏密佛教史》> 第五品 远传经幻心"}, {"type": "伏藏隐藏", "title": "莲花生大士在印度、尼泊尔、藏地隐藏不计其数的伏藏品", "participants": [{"entity": "莲花生大士", "role": "主体"}], "location": "印度", "time_info": "", "layers": ["史传"], "quote": "”这位莲花生大士并不单单是经行道次第的补特伽罗或者住地圣者，而是为了以种种方便调伏所有难以调化的人、非人众生，无量光佛与无等释迦佛等示现的化身，因此他的传记，甚至连诸大圣者也无\n法道尽一分，然而简单扼要的内容如前所述，特别是事业的优越性，为未来的所化与佛法的延续着想，莲师在印度、尼泊尔、藏地，隐藏了不计其数的财宝、妙药、三宝所依与誓言物伏藏品。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏隐藏", "title": "益西措嘉在西藏三地区隐藏不可思议的伏藏品", "participants": [{"entity": "益西措嘉空行母", "role": "主体"}], "location": "西藏", "time_info": "莲花生大士前往妙拂洲以后", "layers": ["史传"], "quote": "特别是莲花生大士前往妙拂洲以后，益西措嘉空行母在人间住世百余年，在西藏上下中三地区隐藏了不可思议的伏藏品，加以印持等做后行事宜。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "结集", "title": "益西措嘉依不忘陀罗尼结集莲师伏藏法", "participants": [{"entity": "益西措嘉空行母", "role": "主体"}, {"entity": "莲花生大士", "role": "法源"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "为此，诚信开取伏藏的大师们超越了一般人的行境，精通调伏的方便，宣说了与总法门尤其是与三瑜伽密切相关的无量续、教、窍诀、事业、会供。这一切都是由密主母法界自在益西措嘉依靠不忘陀罗尼铭记而作结集的。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏隐藏", "title": "布玛莫札等大师隐藏许多甚深伏藏", "participants": [{"entity": "布玛莫札", "role": "主体"}, {"entity": "贝若札那", "role": "主体"}, {"entity": "努桑吉益西", "role": "主体"}, {"entity": "南卡酿波", "role": "主体"}, {"entity": "涅·嘉那革玛绕", "role": "主体"}, {"entity": "那南降魔金刚", "role": "主体"}, {"entity": "年万当珍桑波", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "此外，大班智达布玛莫札、法王父子、大译师贝若札那、努桑吉益西和南卡酿波、涅·嘉那革玛绕、那南降魔金刚、年万当珍桑波等也隐藏了许多甚深伏藏。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "桑吉喇嘛从阿里罗哦格嘎寺柱中取出上师、大圆满、大悲观音三种伏藏", "participants": [{"entity": "伏藏大师桑吉朗巴", "role": "主体"}], "location": "罗哦格嘎寺", "time_info": "", "layers": ["史传"], "quote": "桑吉喇嘛\n嘉哲拉吉单单转为伏藏师共有十三世，其中第一世就是历史上第一位伏藏师桑吉喇嘛，他大约在大译师仁钦桑波的上半生时诞生在多措瓦，以光头咒师的身份住世。他从阿里罗哦格嘎寺柱中取出上师、大圆满、大悲观音三种伏藏，在其附近的马头明王岩山取出《三根本汇修·稳见悉地》。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "桑吉喇嘛从马头明王岩山取出《三根本汇修·稳见悉地》", "participants": [{"entity": "伏藏大师桑吉朗巴", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "桑吉喇嘛\n嘉哲拉吉单单转为伏藏师共有十三世，其中第一世就是历史上第一位伏藏师桑吉喇嘛，他大约在大译师仁钦桑波的上半生时诞生在多措瓦，以光头咒师的身份住世。他从阿里罗哦格嘎寺柱中取出上师、大圆满、大悲观音三种伏藏，在其附近的马头明王岩山取出《三根本汇修·稳见悉地》。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "桑吉喇嘛从塘巴库朗岩等地取出马头明王猛压服法", "participants": [{"entity": "伏藏大师桑吉朗巴", "role": "主体"}], "location": "塘巴", "time_info": "", "layers": ["史传"], "quote": "在塘巴，从库朗岩等地取出马头明王猛压服法，从汉地取出许多翻译过的显宗仪轨、转移法等，他也前往卫藏、后藏地方，利益众生圆满究竟，住世八十年。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "桑吉喇嘛从汉地取出显宗仪轨、转移法等", "participants": [{"entity": "伏藏大师桑吉朗巴", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在塘巴，从库朗岩等地取出马头明王猛压服法，从汉地取出许多翻译过的显宗仪轨、转移法等，他也前往卫藏、后藏地方，利益众生圆满究竟，住世八十年。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圆寂", "title": "桑吉喇嘛住世八十年圆满利益众生", "participants": [{"entity": "伏藏大师桑吉朗巴", "role": "主体"}], "location": "", "time_info": "住世八十年", "layers": ["史传"], "quote": "在塘巴，从库朗岩等地取出马头明王猛压服法，从汉地取出许多翻译过的显宗仪轨、转移法等，他也前往卫藏、后藏地方，利益众生圆满究竟，住世八十年。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "编集", "title": "蒋扬钦则旺波编辑桑吉喇嘛伏藏法保存在《大宝伏藏》中", "participants": [{"entity": "全知多吉宿则", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尽管这位化身伏藏大师的甚深伏藏精华有《三根本汇修二十一问答》的黄纸已到手中，但由于抉择伏藏根本论没有开取出，于是他便与伏藏密意相符而编辑了事业、食子、灌顶仪轨，加以弘扬，保存在《大宝伏藏》当中。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "出家受戒", "title": "札巴温西在雅谢嘉瓦哦面前出家", "participants": [{"entity": "札巴温西", "role": "受戒者"}, {"entity": "雅谢嘉瓦哦", "role": "亲教师"}], "location": "桑耶寺", "time_info": "", "layers": ["史传"], "quote": "札巴温西谢哦华戒桑给和大译师贝若札那双重的化身札巴温西，在没有到第一胜生周之前的水鼠年，生于友热札杰地方切多吉杰穹种族中，从幼年起他就苏醒了妙法的种姓，到了桑耶寺，在鲁墨的弟子雅谢嘉瓦哦面前出家，由于他的家乡是札，因此称札巴，由于精通《俱舍论》，故名温西（意为通俱舍）。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "札巴温西从桑耶顶层门上开取《红财神密修法》与《夜叉金刚降魔续》", "participants": [{"entity": "札巴温西", "role": "主体"}], "location": "桑耶寺", "time_info": "", "layers": ["史传"], "quote": "从顶层门上开取了《红财神密修法》、《夜叉金刚降魔续》及修法", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "札巴温西从桑耶中殿柱中取出贝若札那翻译的《具德四续》原本", "participants": [{"entity": "札巴温西", "role": "主体"}, {"entity": "贝若札那", "role": "法源"}], "location": "桑耶寺", "time_info": "阳土虎年仲秋月十五夜半三时", "layers": ["史传"], "quote": "尤其是，按照娘舅护法授记，在阳土虎年仲秋月十五夜半三时，从桑耶顶层的中殿有宝瓶的柱中，开取了大译师贝若札那翻译的医方明《具德四续》的原本，并且把抄录经函的底本保存在自己的住所，副本保密一年。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "札巴温西将《具德四续》抄本恩赐给格西克敦达玛札", "participants": [{"entity": "札巴温西", "role": "传法者"}, {"entity": "格西克敦达玛札", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尤其是，按照娘舅护法授记，在阳土虎年仲秋月十五夜半三时，从桑耶顶层的中殿有宝瓶的柱中，开取了大译师贝若札那翻译的医方明《具德四续》的原本，并且把抄录经函的底本保存在自己的住所，副本保密一年。后来恩赐给雅砻的格西克敦达玛札，并传教到雪域被誉为第二药王的耶土云丹滚波，仅仅护持此大业的功勋和奇迹也是不可思议。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "建寺", "title": "札巴温西以财神悉地金物为资本建立札囊达华札塘佛教大寺院", "participants": [{"entity": "札巴温西", "role": "主体"}], "location": "札囊达华札塘佛教大寺院", "time_info": "", "layers": ["史传"], "quote": "他在修行财神时，财神赐予金物悉地，以此作为资本，建立起札囊达华札塘佛教大寺院，以此为主创办了许多道场，担当所有道场和桑耶寺的住持，显现为大善知识，前文中提到的《夜叉续》及修法的灌顶、经教传承，以及《医学四续》的讲教这些传承依靠他而一直没有间断。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "札巴温西修行财神时财神赐予金物悉地", "participants": [{"entity": "札巴温西", "role": "修行者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "他在修行财神时，财神赐予金物悉地，以此作为资本，建立起札囊达华札塘佛教大寺院，以此为主创办了许多道场，担当所有道场和桑耶寺的住持，显现为大善知识，前文中提到的《夜叉续》及修法的灌顶、经教传承，以及《医学四续》的讲教这些传承依靠他而一直没有间断。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "诞生", "title": "酿绕尼玛哦色于第二胜生周阳木龙年诞生", "participants": [{"entity": "酿绕尼玛哦色", "role": "主体"}, {"entity": "酿敦秋戒库罗", "role": "父"}, {"entity": "班玛得瓦匝", "role": "母"}], "location": "南岩达西", "time_info": "第二胜生周阳木龙年", "layers": ["史传"], "quote": "酿绕尼玛哦色共称五位伏藏师王和三位殊胜化身的第一世法王仓巴拉美多特意转世的酿绕尼玛哦色，于第二胜生周阳木龙年，出生于南岩达西所属的桑地色静处，父亲名为酿敦秋戒库罗，母亲名为班玛得瓦匝。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "酿绕尼玛哦色八岁清净境界中现见释迦牟尼佛等", "participants": [{"entity": "酿绕尼玛哦色", "role": "主体"}, {"entity": "释迦佛", "role": "显现者"}, {"entity": "观世音菩萨", "role": "显现者"}, {"entity": "莲花生大士", "role": "显现者"}], "location": "", "time_info": "八岁", "layers": ["神变"], "quote": "他从小时候起就伴随着无量的稀奇瑞相。他八岁，在清净的境界中现见了释迦牟尼佛、大悲观世音、莲花生大士等，一个月内觉受纷呈。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "灌顶", "title": "莲花生大士骑白马以宝瓶甘露赐予酿绕尼玛哦色四灌顶", "participants": [{"entity": "莲花生大士", "role": "灌顶师"}, {"entity": "酿绕尼玛哦色", "role": "受者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "尤其是一天晚上，见到莲花生大士骑着一匹白马，由四部空行随行，以宝瓶甘露赐予他四灌顶，依靠呈现出的天崩、地动、山摇般的三种觉受，作各种行为，以至于众人把他当成疯子。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "修行", "title": "酿绕尼玛哦色在桑普雪山修行马头明王面见本尊", "participants": [{"entity": "酿绕尼玛哦色", "role": "主体"}], "location": "桑普雪山", "time_info": "", "layers": ["神变"], "quote": "尤其是一天晚上，见到莲花生大士骑着一匹白马，由四部空行随行，以宝瓶甘露赐予他四灌顶，依靠呈现出的天崩、地动、山摇般的三种觉受，作各种行为，以至于众人把他当成疯子。他在父亲面前听受马头明王的灌顶，并在桑普雪山修行，从而面见本尊，铜金刚橛发出马鸣，在岩石上留下手印、脚印。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "酿绕尼玛哦色在珍姆白吉岩石开取铜箧、瓷瓶等伏藏", "participants": [{"entity": "酿绕尼玛哦色", "role": "主体"}], "location": "珍姆白吉岩石", "time_info": "", "layers": ["史传"], "quote": "伏藏门也已找到后，他开取了铜箧、瓷瓶、佛像、圣物、宝物等许多伏藏，铜箧中出现大悲观音与寂猛莲师，瓷瓶中是怙主（玛哈嘎拉）和恶咒类，虎箧中出现空行的许多法门。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "酿绕尼玛哦色从库塘毗卢遮那佛像后面取出紫色和灰白色宝箧", "participants": [{"entity": "酿绕尼玛哦色", "role": "主体"}], "location": "库塘", "time_info": "", "layers": ["史传"], "quote": "此后，他从一位商人手中又得到了本尊像的断指，其内出现标题，他按照此标题，从库塘毗卢遮那佛像后面取出紫色和灰白色两个宝箧，其中紫色宝箧内放有《八大法行·集善逝》、教及窍诀的一百三十类法——贝若札那和单玛则芒的手书，也是法王他自己的经卷。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "八大持明在清凉尸林将八大法行等完整传授给酿绕尼玛哦色", "participants": [{"entity": "八大持明", "role": "传法者"}, {"entity": "莲花生大士", "role": "传法者"}, {"entity": "酿绕尼玛哦色", "role": "受者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "在莫德西戒巴贡地方实修上师意修法期间，益西措嘉空行母亲自降临，赐予《空行百题问答录》，把他带到清凉尸林以后，莲师等八大持明将总的八大法行及分别的各自灌顶、续、窍诀完整传授给他。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "益西措嘉空行母赐予酿绕尼玛哦色《空行百题问答录》", "participants": [{"entity": "益西措嘉空行母", "role": "传法者"}, {"entity": "酿绕尼玛哦色", "role": "受者"}], "location": "莫德西戒巴贡", "time_info": "", "layers": ["神变"], "quote": "在莫德西戒巴贡地方实修上师意修法期间，益西措嘉空行母亲自降临，赐予《空行百题问答录》，把他带到清凉尸林以后，莲师等八大持明将总的八大法行及分别的各自灌顶、续、窍诀完整传授给他。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "修行", "title": "酿绕尼玛哦色修《上师三身总集修法》三年面见莲花生大士", "participants": [{"entity": "酿绕尼玛哦色", "role": "主体"}, {"entity": "莲花生大士", "role": "显现者"}], "location": "", "time_info": "三年", "layers": ["神变"], "quote": "他依止了父亲酿敦钦波、嘉纽巴敦单、月波尼玛桑给、玛嘎瓦坚巴、敦巴克切等诸多上师而广泛听受显密法要。《上师三身总集修法》修了三年，从而直接面见莲花生大士，获得许多言传。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "殴哲佩巴将大悲法类五卷恩授予酿绕尼玛哦色", "participants": [{"entity": "殴哲佩巴", "role": "传法者"}, {"entity": "酿绕尼玛哦色", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他也认真听受以后，成为教藏伏藏融会贯通的教主。大成就者殴哲佩巴从拉萨开取出大悲法类五卷对他说：“法主也是你自己。”之后恩授予他。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "酿绕尼玛哦色修药师佛法时药天女亲来供养", "participants": [{"entity": "酿绕尼玛哦色", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "他修行药师佛修法期间，药天女带着湿润的藏青果和叶子直接来供养，在没有解开跏趺坐的情况下腾到空中，脚不沾地等示现无量神变。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "酿绕尼玛哦色腾空不沾地等示现无量神变", "participants": [{"entity": "酿绕尼玛哦色", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "他修行药师佛修法期间，药天女带着湿润的藏青果和叶子直接来供养，在没有解开跏趺坐的情况下腾到空中，脚不沾地等示现无量神变。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圆寂", "title": "酿绕尼玛哦色六十九岁阳水鼠年从心间白色舍字前往极乐世界", "participants": [{"entity": "酿绕尼玛哦色", "role": "主体"}], "location": "", "time_info": "六十九岁阳水鼠年", "layers": ["史传"], "quote": "后来他的利生事业广如虚空，对佛法作出了不可思议的贡献。\n六十九岁阳水鼠年伴随着稀奇的瑞相，以广大标志尤其是从心间一个白色“舍”字前往极乐世界而圆寂。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "荼毗", "title": "恰译师点燃酿绕尼玛哦色法体出现殊胜舍利子", "participants": [{"entity": "恰译师", "role": "主体"}, {"entity": "酿绕尼玛哦色", "role": "受荼毗者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "恰译师点燃其法体，火却无法燃起来，后来火又自然燃起，当时安放法体的室内一位小童子及其空行眷属念诵猛咒“哈热讷萨……”，出现众人有目共睹的许多验相，而且自现现出大量的殊胜舍利子。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传法", "title": "酿绕尼玛哦色将成熟解脱圆满法教交传给儿子珠滚南卡华巴", "participants": [{"entity": "酿绕尼玛哦色", "role": "传法者"}, {"entity": "南卡华巴", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "由于高度赞叹法与补特伽罗，所以他不仅从前人们公认是无有诤议堪为正量的伏藏大师，而且也清除了所有新派邪分别之垢，在雪域犹如日月般家喻户晓。他将成熟、解脱圆满的法教交传给主要弟子——亲生儿子珠滚南卡华巴，作为教主，并授记他是观世音的化身。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "南卡华巴将石头从虚空降落又在拉萨砌觉沃河堤", "participants": [{"entity": "南卡华巴", "role": "主体"}], "location": "拉萨", "time_info": "", "layers": ["神变"], "quote": "他的神变极其广大，当他安住在境界中时，便将夏波前的所有石头像赶羊群一样从虚空而降。在别人的眼里，他不知从什么地方来的就在拉萨金河畔，砌起一片灰灰的石头，作为觉沃河堤，据说以前所有石头种类不错而存在着。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "诞生", "title": "秋杰旺修于第四胜生周水猴年藏历正月十五诞生", "participants": [{"entity": "秋杰旺修", "role": "主体"}, {"entity": "帮敦哲毕酿波", "role": "父"}], "location": "", "time_info": "第四胜生周水猴年藏历正月十五", "layers": ["史传"], "quote": "秋杰旺修尊者于第四胜生周水猴年藏历正月十五太阳初升之际诞生，父亲对正在用金粉书写《真实名经》的文句间隔观察缘起，结果刚好是在“法之自在法之王”这一句上，于是为他取了“法自在”的名字。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "降伏", "title": "帮吉尊叉以契克印反击苯教五把霹雳箭使苯教城区毁灭", "participants": [{"entity": "帮吉尊叉", "role": "主体"}, {"entity": "苯涅绕", "role": "受者"}], "location": "", "time_info": "佛法前弘时期", "layers": ["史传"], "quote": "佛法前弘时期，苯涅绕发誓对赞普赤松德赞降霹雳，杀害他，莲花生大士、布玛莫札、贝若札那三位的弟子帮吉尊叉是一位具有咒力的人，苯教同时射出五把霹雳箭，他以契克印接受，反而使他们自己苯教城区毁灭了，国王对他大大赏赐。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "学法", "title": "秋杰旺修十一岁圆满《幻化网》灌顶传承窍诀", "participants": [{"entity": "秋杰旺修", "role": "受者"}], "location": "", "time_info": "十一岁", "layers": ["史传"], "quote": "大威德与金刚橛咒念诵到量。十一岁圆满《幻化网》的所有灌顶、传承及窍诀。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "秋杰旺修十三岁觉受中觉姆卓玛带他见金刚萨埵", "participants": [{"entity": "秋杰旺修", "role": "受者"}, {"entity": "觉姆卓玛", "role": "引导者"}, {"entity": "金刚手菩萨", "role": "显现者"}], "location": "", "time_info": "十三岁", "layers": ["神变"], "quote": "十三岁听闻并修行真实意与阎罗母、大悲二轨、马头明王等新旧派诸多法要。十三岁时，在觉受境界中，觉姆卓玛把他带到一座水晶建筑顶上，见到金刚萨埵。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "学法", "title": "秋杰旺修十四岁在德色珠扬萨瓦面前听受大论典及大手印大圆满等", "participants": [{"entity": "秋杰旺修", "role": "受者"}, {"entity": "德色珠扬萨瓦", "role": "传法者"}], "location": "", "time_info": "十四岁", "layers": ["史传"], "quote": "他在德色珠扬萨瓦面前听受因明、《大乘阿毗达磨》、《入行论》、《喜金刚》等大论典以及大手印、大圆满、能息六法等的窍诀", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传承", "title": "秋杰旺修十七岁遇阿达珠滚成为酿仁波切无量伏藏之主", "participants": [{"entity": "秋杰旺修", "role": "受者"}, {"entity": "阿达珠滚", "role": "传法者"}], "location": "", "time_info": "十七岁", "layers": ["史传"], "quote": "在父亲面前听受息法、大手印、大圆满、断法、直指教言、护法猛咒，并全部心领神会。十七岁遇到阿达珠滚，成为酿仁波切尼玛哦色的无量伏藏之主。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "发心", "title": "秋杰旺修十八岁在萨迦班智达面前得受发心", "participants": [{"entity": "秋杰旺修", "role": "受者"}, {"entity": "法王萨迦班智达", "role": "授者"}], "location": "刚波道场", "time_info": "十八岁", "layers": ["史传"], "quote": "十七岁遇到阿达珠滚，成为酿仁波切尼玛哦色的无量伏藏之主。十八岁时于刚波道场在萨迦班智达面前得受发心，在江萨地方结上法缘，在拉隆的佛塔前进行开光。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "秋杰旺修梦中于五台山见文殊菩萨说法而获深深定解", "participants": [{"entity": "秋杰旺修", "role": "受者"}, {"entity": "妙吉祥", "role": "传法者"}], "location": "五台山", "time_info": "十八岁", "layers": ["神变"], "quote": "当天晚上梦中，到汉地五台山去寻找昙花，结果文殊菩萨在青莲花上面说：“匝那嘎雅达玛达德，法之自在是我，我是你心分别，分别心是不可思议法门，不可思议法门之义是自然智慧唯一明点，八万四千法门之义已为你宣说，请分析其义。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "秋杰旺修从拉雅年山谷等处取出十九种伏藏", "participants": [{"entity": "秋杰旺修", "role": "主体"}], "location": "", "time_info": "二十二岁以后", "layers": ["史传"], "quote": "其中龙像之内出现四类教言，嘎哦盒内出现一百零八窍诀，取出以此为首的十八大伏藏品，再加上意伏藏，共取出十九种伏藏：1、天空阶梯；2、红岩；3、马头明王；4、曼卡当；5、马头明王；6、温匝之门；7、库意红阎罗；8、马头明王；9、宝箧法；10、哲卡；11、嘉哦坡让；12、夏特玛；13、桑耶阿雅；14、铁金刚橛；15、曼哦塘；16、则戒阿康；17、荣札；18、哈哦刚；19、自藏义之伏藏。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "秋杰旺修骑鹰飞至三十层天空面见金刚萨埵获觉性妙力灌顶", "participants": [{"entity": "秋杰旺修", "role": "受者"}, {"entity": "金刚手菩萨", "role": "灌顶师"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "他开启了给仓之门，结果出来一只大鹏大小的雄鹰，他骑上它在三十层天空的上方虹光萦绕的霓虹宫内面见金刚萨埵，获得了觉性妙力灌顶，并得恩赐甘露宝瓶。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "秋杰旺修被两女子带到妙拂吉祥山面见莲花生大士获完整灌顶", "participants": [{"entity": "秋杰旺修", "role": "受者"}, {"entity": "莲花生大士", "role": "灌顶师"}], "location": "妙拂洲", "time_info": "", "layers": ["神变"], "quote": "”秋杰旺修心灰意冷，于是想把教授再度隐藏，这时两个女子骑着有翅膀的白马把他带到妙拂吉祥山。莲花生大士为他圆满授予完整秘密的灌顶后，以“道之胜道是利他，于此谁人生懈怠，彼者远离菩提道……”言传赐予安慰，并且说：“不要耽著这里，如果耽著，则有生于此的危险。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "预言应验", "title": "木鼠年蒙古黑马军队到来证实秋杰旺修的伏藏授记", "participants": [{"entity": "秋杰旺修", "role": "预言者"}], "location": "", "time_info": "木鼠年", "layers": ["史传"], "quote": "”即刻，他撑起光幕瞬间返回原处。\n木鼠年，蒙古黑马军队来到此地，因此证实了他的未卜先知。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "灌顶", "title": "秋杰旺修以金刚身大坛城灌顶令巴如则真获顿超证悟", "participants": [{"entity": "秋杰旺修", "role": "灌顶师"}, {"entity": "巴如则真", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "上师知道于无取舍之行为、金刚大誓言之处无所畏惧的有缘弟子界性与意乐后，从金刚身大坛城出代表毗卢遮那的大香甘露进行灌顶，结果巴如身体呈现出如蛇身脱皮的觉受。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "秋杰旺修以降伏法杀兔子和旱獭后超度并教诫悲心", "participants": [{"entity": "秋杰旺修", "role": "主体"}, {"entity": "巴如则真", "role": "旁证者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "于是上师到了一个兔子所在地的旁边，在地上画了个兔子的像。对着针诵了七遍咒语，然后把针插入像中，结果那只兔子径直向下滚落。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "秋杰旺修一时间显示六种不同身体庄严飞翔空中等神变", "participants": [{"entity": "秋杰旺修", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "”说完将那黄金扔在河里。此外，上师能够在一时间显示六种不同的身体庄严，飞翔空中，在石头上留下无数手印、脚印，诸如此类显示众多神变。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "建寺", "title": "秋杰旺修建立匆地革木和如意大乐寺", "participants": [{"entity": "秋杰旺修", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "藏地的所有上师都敬其为上师，他的名声足可震动世界。他建起匆地革木和如意大乐寺两座寺院。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "秋杰旺修从哈布雪山开取莲师隐藏的释迦佛像", "participants": [{"entity": "秋杰旺修", "role": "主体"}], "location": "哈布雪山", "time_info": "", "layers": ["史传"], "quote": "与拉萨觉沃佛像等同的释迦佛像，圣龙树曾经从当宗山迎请，莲师将它隐藏在哈布雪山，这位伏藏大师开取出来，被请到拉雅革日寺殿内，从此他把该寺作为主要的道场。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圆寂", "title": "秋杰旺修五十九岁前往莲花光大宫殿", "participants": [{"entity": "秋杰旺修", "role": "主体"}], "location": "莲花光大宫殿", "time_info": "五十九岁", "layers": ["史传"], "quote": "”又言：“我之骨肉豆许一芥子，入谁腹中趋至大乐地。”以诸如此类的言教给予安慰以后，在五十九岁，显示不可思议的瑞相和神变前往莲花光大宫殿。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "诞生", "title": "觉母曼姆于第四胜生周土猴年诞生", "participants": [{"entity": "觉母曼姆", "role": "主体"}, {"entity": "多吉嘉波", "role": "父"}, {"entity": "班玛华簇", "role": "母"}], "location": "诶萨木隆", "time_info": "第四胜生周土猴年", "layers": ["史传"], "quote": "觉母曼姆出生在与觉性之源的莲师修行洞萨木隆附近，父亲是达波噶举派的咒师多吉嘉波，母亲是空行种姓，名叫班玛华簇，她在第四胜生周土猴年诞生，父母为她取名班玛措嘉（莲海王）。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "灌顶", "title": "金刚亥母赐予觉母曼姆成熟灌顶与解脱教言并交空行秘密总集教函", "participants": [{"entity": "金刚亥母", "role": "灌顶师"}, {"entity": "觉母曼姆", "role": "受者"}], "location": "诶萨木隆", "time_info": "十三岁", "layers": ["神变"], "quote": "她看到秘洞的门突然打开，心里产生一种不同的感受，便径直无阻进入里面，结果到了尸林布局阴森可怕的中央空行会众行列中，见到众会的主尊是真实的金刚亥母。金刚亥母安慰她说：“善女子善来。”又从背后山岩处取出拿来一本小经函放在她的头顶，顿时圆满赐予成熟的灌顶与解脱的教言，接着把经函交到她的手中，并说：“这是空行母秘密总集的教言，你如果极其保密地实修，将获得殊胜成就。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "传承", "title": "觉母曼姆拜见秋杰旺修无勤中生起俱生智慧", "participants": [{"entity": "觉母曼姆", "role": "受者"}, {"entity": "秋杰旺修", "role": "上师"}], "location": "南岩西部拉雅帮村", "time_info": "", "layers": ["史传"], "quote": "依靠这样的因缘使她心生厌离，不再贪恋故土，而居无定所，四处云游。当她来到南岩西部拉雅帮村，仅仅拜见革日秋杰旺修，在无勤当中就生起了俱生智慧。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "觉母曼姆主仆三人不舍肉身飞向虚空前往铜色吉祥山", "participants": [{"entity": "觉母曼姆", "role": "主体"}], "location": "哲拉日", "time_info": "三十六岁七月初十", "layers": ["神变"], "quote": "最后到了三十六岁七月初十那一天，来到卫藏哲拉日顶峰，主仆三人举行一次会供，三人都在不舍肉身的情况下，如飞禽王翱翔空中般飞向虚空界，越来越高，无有阻碍前往邬金铜色吉祥山空行会众行列中。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "编集", "title": "蒋扬钦则旺波秉持觉母曼姆教藏法保存在《大宝伏藏》中", "participants": [{"entity": "全知多吉宿则", "role": "主体"}, {"entity": "觉母曼姆", "role": "法源"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "诤时末期调伏时机成熟，以大悲和愿力幻化的伏藏师大持明者班玛哦色多昂朗巴（即蒋扬钦哲旺波），依靠以往成为秋杰旺修仁波切的密友之因、智慧空行\n加持之缘，秉持了此教藏法并回忆起句义作了抉择，保存在《大宝伏藏》中。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "诞生", "title": "雅吉邬金朗巴于第五胜生周阳水猪年诞生", "participants": [{"entity": "雅吉邬金朗巴", "role": "主体"}], "location": "友热札囊", "time_info": "第五胜生周阳水猪年", "layers": ["史传"], "quote": "雅吉邬金朗巴天子秋哲嘉波的第七世雅吉邬金朗巴，于第五胜生周阳水猪年，出生在友热札囊的雅吉地方殊胜密咒师种族中，身份也是出家的咒师，他十分精通咒力、医药、历算等。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "雅吉邬金朗巴从桑耶红塔获得伏藏标题", "participants": [{"entity": "雅吉邬金朗巴", "role": "主体"}], "location": "桑耶寺", "time_info": "二十三岁", "layers": ["史传"], "quote": "二十三岁时从桑耶红塔处获得伏藏标题，雅砻水晶岩的背面山岩奇迹般的莲积水晶洞，也就是邬金莲师赐予甘露药修行的地方，形似寂猛本尊众会，他从其护门大遍入天上面的头上，取出《生起次第上师二教三类寂猛》，《大悲莲花心滴》，《大圆满长寿修法》，《阿底总底扬底》等大圆满类，即上师、大圆满及大悲观音。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "雅吉邬金朗巴从雅砻水晶岩取出大量伏藏法", "participants": [{"entity": "雅吉邬金朗巴", "role": "主体"}], "location": "雅砻水晶岩", "time_info": "", "layers": ["史传"], "quote": "二十三岁时从桑耶红塔处获得伏藏标题，雅砻水晶岩的背面山岩奇迹般的莲积水晶洞，也就是邬金莲师赐予甘露药修行的地方，形似寂猛本尊众会，他从其护门大遍入天上面的头上，取出《生起次第上师二教三类寂猛》，《大悲莲花心滴》，《大圆满长寿修法》，《阿底总底扬底》等大圆满类，即上师、大圆满及大悲观音。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "雅吉邬金朗巴总计取出二十八种大伏藏品", "participants": [{"entity": "雅吉邬金朗巴", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "从札处大岩石内开取《大威德》、《长寿法》类等，伏藏法共有一百余函，仅仅教集法门也有三十多函，但是由于没有从黄纸中抉择而再度隐藏为伏藏。佛像、圣物、珠宝伏藏等无量的伏藏品为主，总之开取了二十八种大伏藏品及相关的伏藏。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "诽谤", "title": "达色香切嘉对雅吉邬金朗巴妄加诽谤破坏缘起", "participants": [{"entity": "达色香切嘉", "role": "诽谤者"}, {"entity": "雅吉邬金朗巴", "role": "受害者"}], "location": "叉哲恰多", "time_info": "", "layers": ["史传"], "quote": "但是，在叉哲恰多地方，开启最初法门，举行教集法门的灌顶和大修时，柳吾东则的达色香切嘉村将授记的词句断章取义而对他妄加诽谤，由此因缘破坏了缘起，伏藏师\n也侥幸逃到诶地和达波地方，没过多久，就在诶地附近的罗穹地方圆寂。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圆寂", "title": "雅吉邬金朗巴在诶地附近罗穹地方圆寂", "participants": [{"entity": "雅吉邬金朗巴", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "但是，在叉哲恰多地方，开启最初法门，举行教集法门的灌顶和大修时，柳吾东则的达色香切嘉村将授记的词句断章取义而对他妄加诽谤，由此因缘破坏了缘起，伏藏师\n也侥幸逃到诶地和达波地方，没过多久，就在诶地附近的罗穹地方圆寂。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圣物安奉", "title": "蒋扬钦则旺波求得雅吉邬金朗巴体肉做享解脱圣物", "participants": [{"entity": "全知多吉宿则", "role": "主体"}, {"entity": "堪布上师札吉哦色", "role": "使者"}, {"entity": "雅吉邬金朗巴", "role": "法源"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "后来一位世代的有缘者听人们共称尊者的法体为七世享解脱后，便求得了少许体肉，享受以后觉受昭彰显著，竟然能够离地面一肘而行，并在山谷之间飞来飞去，由此尊者的法体才被予以高度重视起来。中期，蒋扬钦则旺波从多康派使者堪布上师札吉哦色，去求得部分体肉，做成享解脱圣物，广泛分发。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圣物迁移", "title": "哲炯德木仁波切将雅吉邬金朗巴遗体迎请到万藏寺", "participants": [{"entity": "哲炯德木仁波切", "role": "主体"}, {"entity": "雅吉邬金朗巴", "role": "受供者"}], "location": "万藏寺", "time_info": "", "layers": ["史传"], "quote": "中期，蒋扬钦则旺波从多康派使者堪布上师札吉哦色，去求得部分体肉，做成享解脱圣物，广泛分发。其后，哲炯德木仁波切将其遗体迎请到柳吾的东万藏寺，保存在木质遗塔中。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圣物安奉", "title": "第十三世达赖喇嘛试图将雅吉邬金朗巴遗体安于布达拉宫被桑耶护法阻止", "participants": [{"entity": "第十三世达赖喇嘛", "role": "主体"}, {"entity": "尊贡塘巴", "role": "使者"}], "location": "布达拉宫", "time_info": "", "layers": ["史传"], "quote": "后来第十三世达赖喇嘛，考虑到人们过多地求得遗体肉，就会趋于完竭，这样一来有损于整个西藏的福报，他准备将其遗体安住在布达拉宫，特意派尊贡塘巴前去迎请，桑耶大护法降临说：此法体只能安放在南部地带的这一地点而不能移往他处，依此，达赖喇嘛就将它放回原位。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "达赖喇嘛与普玖香滚仁波切补全邬金朗巴遗体", "participants": [{"entity": "第五世达赖喇嘛", "role": "主体"}, {"entity": "普玖香滚仁波切", "role": "协助者"}], "location": "万藏寺", "time_info": "", "layers": ["史传"], "quote": "后来驾临南部时专程到万藏寺，将以前的法体肉的丸子中四升左右赐给寺院，以利益众生，剩余全部与药粉配合，与经师普玖香滚仁波切一道，达赖喇嘛亲自动手将遗体补全恢复本面。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "立法", "title": "达赖喇嘛下诏保护邬金朗巴法体", "participants": [{"entity": "第五世达赖喇嘛", "role": "主体"}], "location": "万藏寺", "time_info": "", "layers": ["史传"], "quote": "并且，将先前以优质木的遗塔上部用镀金铜建起，塔上部与下部交界处有瓶门，将遗体放入里面后加以印封。达赖喇嘛又下诏书命令：柳吾地方的官民与万藏寺的僧众要齐心协力一同保存此法体，坚持不懈，恭敬珍重。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "神变", "title": "达赖喇嘛赐予寺院的体肉丸增长四倍", "participants": [{"entity": "第五世达赖喇嘛", "role": "施者"}], "location": "万藏寺", "time_info": "", "layers": ["神变"], "quote": "我本人（即本论作者）也有幸得到直接礼见的善缘，达赖喇嘛赐予寺院的体肉丸，放在木匣里，后来打开一看，竟然比以前增长了四倍左右。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "邬哲嘉村从札桑山顶峰取出三大伏藏和一百小伏藏钥匙", "participants": [{"entity": "邬哲嘉村", "role": "伏藏师"}], "location": "札桑山", "time_info": "{'text': '火马年蛇月上弦初八', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "依此，在火马年蛇月上弦初八，邬哲嘉村尊者从札桑山顶峰，在藏白岩的三块长形石中开取出三大伏藏和一百小伏藏的钥匙以后将伏藏替代物隐藏起来，伏藏遗迹保留在原位，当今人们把它称为龙桑，在那里第二年新年时树叶重新发芽，之后年年如此，一直持续至今。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "邬哲嘉村从桑藏拉札山洞取出五宝库甚深大伏藏", "participants": [{"entity": "邬哲嘉村", "role": "伏藏师"}], "location": "桑藏拉札山洞", "time_info": "{'text': '那一年的羊月初四黄昏', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "那一年的羊月初四黄昏，他从岩山上如蛇堆般的半山腰上桑藏拉札山洞取出四方形蓝色伏藏宝箧，里面隔开五格，存有五种宝藏汇集的甚深大伏藏。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "邬哲嘉村被拜为上师利益藏地安宁", "participants": [{"entity": "邬哲嘉村", "role": "上师"}, {"entity": "贡塘国王秋哲德", "role": "弟子"}], "location": "哲木雄", "time_info": "", "layers": ["史传"], "quote": "从上部穹隆俄卡到下部康区的龙塘卓玛以上西藏总体及分别的种种安定方法，他在七大隐蔽地为主的众多地方保存着标题的钥匙等，因此他是众所周知利益整个西藏领土如大臣般的一位伏藏师。他的下半生，来到哲木雄以后安住下来打开了伏藏大门，贡塘国王秋哲德也拜他为上师，而对藏地的幸福安宁大有利益。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圆寂", "title": "邬哲嘉村七十二岁融入法界", "participants": [{"entity": "邬哲嘉村", "role": "主体"}], "location": "", "time_info": "{'text': '七十二岁', 'relative_to': '邬哲嘉村', 'absolute': None}", "layers": ["史传"], "quote": "他的下半生，来到哲木雄以后安住下来打开了伏藏大门，贡塘国王秋哲德也拜他为上师，而对藏地的幸福安宁大有利益。他的如此事业究竟后在七十二岁，伴随着纷纷的稀奇瑞相而融入法界密意中。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "第四世持明班玛陈列广弘讲修业", "participants": [{"entity": "持明班玛陈列", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "从香达之子第三世持明阿革旺波开始在卫藏住持寺院，就像众\n所周知的土单多吉札寺。从第四世持明班玛陈列开始广弘讲修业的伟业，由此成为前译教法的一个源头。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "出家受戒", "title": "桑吉朗巴五岁听受居士戒", "participants": [{"entity": "伏藏大师桑吉朗巴", "role": "受戒者"}, {"entity": "堪布云尼华", "role": "堪布"}], "location": "", "time_info": "{'text': '五岁时', 'relative_to': '桑吉朗巴', 'absolute': None}", "layers": ["史传"], "quote": "桑吉朗巴天子单真如巴智慧妙力的化现伏藏大师桑吉朗巴，第六胜生周铁龙年伴随着稀奇瑞相降生在三岩金刚岩上，他的故土是贡波地区所属的酿波地方邬金莲师的修行地江坡耶山谷脚下达当，父亲是马头明王的化身康月达隆纽巴，母亲是金刚亥母加持的具相阿哄坚，为他取名仁真。五岁时在堪布云尼华面前听受居士戒，清净境界中显现大悲观音。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "出家受戒", "title": "桑吉朗巴在菩提寺出家", "participants": [{"entity": "伏藏大师桑吉朗巴", "role": "受戒者"}, {"entity": "香切多吉", "role": "亲教师"}, {"entity": "释迦益西", "role": "轨范师"}], "location": "菩提寺", "time_info": "", "layers": ["史传"], "quote": "但由于父亲圆寂，母亲改嫁别人，因为继父虐待而使他饱受苦难，当时按照一位红衣女子授记，他到了隆波城萨达地方嘉旺如巴金刚面前，在匝热神山的附近寂静处菩提寺，在亲教师香切多吉、轨范师释迦益西面前出家，取名为桑吉桑波，后来他取出甚深伏藏而被一致共称为桑吉朗巴，在亲教师和规范师二位上师前听受众多法要。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "授记", "title": "如毕多吉授记桑吉朗巴为众生导师", "participants": [{"entity": "如毕多吉", "role": "授记者"}, {"entity": "伏藏大师桑吉朗巴", "role": "被授记者"}, {"entity": "香切多吉", "role": "供养者"}], "location": "", "time_info": "", "layers": ["授记"], "quote": "如毕多吉尊者从卫藏来到那里时对上师香切多吉说：你的这位侄子供养给我。上师也遵照他所说供养，由此令如毕多吉极为欢喜，并授记他会成为芸芸众生的导师。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "桑吉朗巴面见莲花生大士并立下闭关三年誓言", "participants": [{"entity": "伏藏大师桑吉朗巴", "role": "主体"}, {"entity": "莲花生大士", "role": "被礼见者"}], "location": "拉萨", "time_info": "", "layers": ["证境"], "quote": "上师也遵照他所说供养，由此令如毕多吉极为欢喜，并授记他会成为芸芸众生的导师。到达拉萨时他面见观世音菩萨，尤其是见到莲花生大士的尊颜，从此开始屡屡见到，并立下闭关修行三年的誓言。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "赞古钦波供养伏藏纸并桑吉朗巴修行伏藏法", "participants": [{"entity": "赞古钦波", "role": "供养者"}, {"entity": "伏藏大师桑吉朗巴", "role": "伏藏师"}, {"entity": "秋戒罗珠", "role": "上师"}], "location": "棱珠", "time_info": "", "layers": ["史传"], "quote": "一天夜里，保护伏藏的赞古钦波亲自供养他三卷纸，里面有伏藏标题、授记、伏藏修法言教，依此，上师也赐予顺缘，如理恩授伏藏修法，结果蒙受邬金空行众灌顶，遵照授记及开许，在木龙年八\n月二十五日，从波山大山洞开取出藏地所有地下的一伏藏教集《上师集密意续论》及窍诀《大悲法类》。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "桑吉朗巴从波山大山洞取出《上师集密意续论》及《大悲法类》", "participants": [{"entity": "伏藏大师桑吉朗巴", "role": "伏藏师"}], "location": "波山大山洞", "time_info": "{'text': '木龙年八月二十五日', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "一天夜里，保护伏藏的赞古钦波亲自供养他三卷纸，里面有伏藏标题、授记、伏藏修法言教，依此，上师也赐予顺缘，如理恩授伏藏修法，结果蒙受邬金空行众灌顶，遵照授记及开许，在木龙年八\n月二十五日，从波山大山洞开取出藏地所有地下的一伏藏教集《上师集密意续论》及窍诀《大悲法类》。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "桑吉朗巴从多处取出普巴修法心髓等伏藏", "participants": [{"entity": "伏藏大师桑吉朗巴", "role": "伏藏师"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "从那一年开始，他逐渐从嘎则仓、吉波荣、则钦札、龙波香得白巴、龙波嘎达仓、晋戒嘎当仓等地，取出《普巴修法心髓》、《达察黑乌龟》、《黑马头明王》等以及《大悲观音极无上密》，物伏藏誓言物丸、莲师像、镀金铜瓶、铁金刚橛、如来的二十一舍利等等。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "桑吉朗巴与哲美酣波共同取出贡波青伏藏", "participants": [{"entity": "伏藏大师桑吉朗巴", "role": "伏藏师"}, {"entity": "伏藏师哲美酣波", "role": "伏藏师"}], "location": "贡波青", "time_info": "", "layers": ["史传"], "quote": "在开取贡波青地方伏藏时，伏藏师哲美酣波也以空行授记劝请，依此桑吉朗巴尊者到达那里后和他一起，取出身着蓝衣的金刚手像、曼巴德德恶咒、邬金佛父佛母的菩提甘露。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "伏藏开取", "title": "桑吉朗巴从各处取出圣观音法类等并从贡波单热取出集密意根本六续", "participants": [{"entity": "伏藏大师桑吉朗巴", "role": "伏藏师"}], "location": "", "time_info": "{'text': '从二十五岁到三十二岁', 'relative_to': '桑吉朗巴', 'absolute': None}", "layers": ["史传"], "quote": "再者，从莲师修行的山洞内取出《摄大圆满心要》，从贡波单热取出《集密意根本六续》，从桑耶青普取出莲师殊胜身像，从哦秀龙卓取出达夏得瓦宝珠和空行身饰等。从二十五岁到三十二岁之间共开取了十八大伏藏品。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "噶玛巴德云香巴携集密意续献给明朝皇帝", "participants": [{"entity": "如毕多吉", "role": "使者"}, {"entity": "伏藏大师桑吉朗巴", "role": "伏藏来源"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尤其是汉地大明皇帝迎请噶玛巴德云香巴时，诏书中提及要请到邬金成就者莲花生大士的无垢伏藏法。依此，法王德云香巴带着深法《集密意续》、稀有蓝宝瓶、誓言纯金金刚前去献给皇帝。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "建寺", "title": "明朝皇帝建起尼坡得钦桑哲寺", "participants": [{"entity": "伏藏大师桑吉朗巴", "role": "道场主"}], "location": "尼坡得钦桑哲寺", "time_info": "", "layers": ["史传"], "quote": "皇帝满心欢喜，供养了玉印和名贵的衣物等等，建起尼坡得钦桑哲寺而作为桑吉朗巴的道场，他修行甘露药修法，结果出现超出他人的验相，并大显神变，当今这种修法也保留着。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "圆寂", "title": "桑吉朗巴五十七岁融入法界", "participants": [{"entity": "伏藏大师桑吉朗巴", "role": "主体"}], "location": "菩提寺", "time_info": "{'text': '五十七岁火鼠年三月三十', 'relative_to': '桑吉朗巴', 'absolute': None}", "layers": ["史传"], "quote": "皇帝满心欢喜，供养了玉印和名贵的衣物等等，建起尼坡得钦桑哲寺而作为桑吉朗巴的道场，他修行甘露药修法，结果出现超出他人的验相，并大显神变，当今这种修法也保留着。这位尊者以如此方式行持弘法利生的无量事业以后，在五十七岁火鼠年三月三十那天，于静处菩提寺融入法界密意中。", "chapter": "《藏密佛教史》> 第六品 近传伏藏史"}, {"type": "弘法", "title": "特钦阿旺南嘉得受集密意续完整灌顶并建立初十会供传统", "participants": [{"entity": "霍哲侍从活佛特钦阿旺南嘉", "role": "法主"}, {"entity": "贡仁真酿波", "role": "传法者"}], "location": "帮塘得瓦钦波", "time_info": "", "layers": ["史传"], "quote": "后来霍哲侍从活佛特钦阿旺南嘉从第七代
