<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f0f1a;
  color: #d0d0d0;
  font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  overflow: hidden;
  width: 100vw; height: 100vh;
}

#header {
  position: absolute; top: 0; left: 0; right: 0; z-index: 20;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px;
  background: linear-gradient(180deg, rgba(15,15,26,0.97) 0%, rgba(15,15,26,0) 100%);
}
#header h1 {
  font-size: 18px; font-weight: 400; letter-spacing: 4px; color: #c9a96e;
}
#search-box {
  display: flex; align-items: center; gap: 8px;
}
#search-box input {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px; padding: 6px 14px; color: #e0e0e0; font-size: 14px;
  width: 260px; outline: none;
}
#search-box input:focus { border-color: rgba(201,169,110,0.5); }
#search-box input::placeholder { color: #666; }
#suggestions {
  position: absolute; top: 42px; right: 24px; z-index: 30;
  background: rgba(20,20,35,0.95); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; max-height: 300px; overflow-y: auto; width: 260px;
  display: none;
}
.suggestion-item {
  padding: 8px 14px; cursor: pointer; font-size: 13px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.suggestion-item:hover { background: rgba(201,169,110,0.15); }
.suggestion-item .type-tag {
  font-size: 10px; color: #888; margin-left: 6px;
}

#info-panel {
  position: absolute; top: 60px; left: 20px; z-index: 20;
  background: rgba(15,15,26,0.92); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px; padding: 16px 20px; width: 280px;
  backdrop-filter: blur(8px); display: none;
}
#info-panel h2 { font-size: 16px; color: #c9a96e; margin-bottom: 8px; }
#info-panel .info-type { font-size: 12px; color: #7eb8da; margin-bottom: 12px; }
#info-panel .info-section { margin-bottom: 10px; }
#info-panel .info-label { font-size: 11px; color: #888; margin-bottom: 4px; }
#info-panel .teacher-list, #info-panel .student-list {
  font-size: 13px; line-height: 1.8;
}
#info-panel .teacher-list span, #info-panel .student-list span {
  cursor: pointer; border-bottom: 1px dotted rgba(201,169,110,0.3);
}
#info-panel .teacher-list span:hover, #info-panel .student-list span:hover {
  color: #c9a96e;
}
.specialty-tag {
  font-size: 10px; padding: 1px 5px; border-radius: 3px;
  background: rgba(106,174,214,0.15); color: #6aaed6; margin-left: 4px;
}
.quote-text {
  font-size: 11px; color: #999; margin: 2px 0 8px 0; padding-left: 8px;
  border-left: 2px solid rgba(201,169,110,0.3); line-height: 1.5;
}
.quote-src {
  font-size: 9px; color: #666; margin-left: 6px;
}

#relation-panel {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 25; display: none;
  background: rgba(15,15,26,0.95); border: 1px solid rgba(201,169,110,0.3);
  border-radius: 10px; padding: 16px 24px; min-width: 360px; max-width: 600px;
  backdrop-filter: blur(10px);
}
#relation-panel h3 { font-size: 15px; color: #c9a96e; margin-bottom: 10px; }
#relation-panel .close-btn { position: absolute; top: 8px; right: 14px; cursor: pointer; color: #666; font-size: 16px; }
#relation-panel .close-btn:hover { color: #ccc; }
.quote-block {
  font-size: 13px; color: #d0c8b0; line-height: 1.8; padding: 10px 14px;
  background: rgba(201,169,110,0.06); border-left: 3px solid rgba(201,169,110,0.4);
  border-radius: 0 6px 6px 0; margin: 4px 0;
}
.source-tag { font-size: 12px; color: #8895a7; margin-top: 4px; }

body.light #relation-panel { background: rgba(255,255,255,0.97); border-color: rgba(139,105,20,0.3); }
body.light #relation-panel h3 { color: #8b6914; }
body.light .quote-block { color: #4a4a3a; background: rgba(139,105,20,0.04); border-left-color: rgba(139,105,20,0.5); }
body.light .source-tag { color: #888; }

/* Theme toggle */
#theme-toggle {
  position: absolute; top: 14px; right: 300px; z-index: 20;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 5px; padding: 4px 10px; cursor: pointer;
  color: #999; font-size: 12px;
}
#theme-toggle:hover { background: rgba(255,255,255,0.15); color: #ccc; }

/* Light theme */
body.light {
  background: #f5f3ee; color: #333;
}
body.light #header { background: linear-gradient(180deg, rgba(245,243,238,0.97) 0%, rgba(245,243,238,0) 100%); }
body.light #header h1 { color: #8b6914; text-shadow: none; }
body.light #info-panel { background: rgba(255,255,255,0.95); border-color: rgba(0,0,0,0.1); color: #333; }
body.light #info-panel h2 { color: #8b6914; }
body.light #info-panel .info-type { color: #2b6ca3; }
body.light #info-panel .info-label { color: #888; }
body.light .quote-text { color: #666; border-left-color: rgba(139,105,20,0.4); }
body.light .quote-src { color: #999; }
body.light #suggestions { background: rgba(255,255,255,0.97); border-color: rgba(0,0,0,0.1); }
body.light .suggestion-item { color: #333; border-bottom-color: rgba(0,0,0,0.05); }
body.light .suggestion-item:hover { background: rgba(139,105,20,0.08); }
body.light #search-box input { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.12); color: #333; }
body.light .node-label { fill: #444; }
body.light .generation-label { fill: #bbb; }
body.light #help-text { color: #aaa; }
body.light #theme-toggle { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); color: #888; }
#info-panel .close-btn {
  position: absolute; top: 8px; right: 12px; cursor: pointer;
  color: #666; font-size: 16px;
}
#info-panel .close-btn:hover { color: #ccc; }

#help-text {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  font-size: 12px; color: #555; z-index: 10; pointer-events: none;
}

svg { display: block; }

.link-line { fill: none; }
.node-circle { cursor: pointer; }
.node-label { pointer-events: none; fill: #ccc; font-size: 11px; text-anchor: middle; }
.generation-label { fill: #333; font-size: 11px; text-anchor: end; }
</style>

// ============================================================
// Build adjacency for teacherOf
// ============================================================
const teacherLinks = RAW_LINKS.filter(l => l.type === 'teacherOf');
const allNames = new Set();
teacherLinks.forEach(l => { allNames.add(l.source); allNames.add(l.target); });

const nodeMap = {};
RAW_NODES.forEach(n => { nodeMap[n.id] = n; });

// teachers[X] = list of X's teachers (X learned FROM them)
// students[X] = list of X's students (X taught TO them)
const teachers = {};
const students = {};
teacherLinks.forEach(l => {
  if (!teachers[l.target]) teachers[l.target] = [];
  teachers[l.target].push({ name: l.source, specialty: l.specialty, quote: l.quote || '', chapter: l.chapter || '' });
  if (!students[l.source]) students[l.source] = [];
  students[l.source].push({ name: l.target, specialty: l.specialty, quote: l.quote || '', chapter: l.chapter || '' });
});

// ============================================================
// BFS: get N generations up and down from a root
// ============================================================
function getLineageTree(rootName, upGens = 3, downGens = 3) {
  const nodes = new Map(); // name → { name, type, generation }
  const edges = []; // { source, target, specialty }

  const rootNode = nodeMap[rootName] || { id: rootName, type: 'unknown', sub_type: '' };
  nodes.set(rootName, { name: rootName, type: rootNode.type, sub_type: rootNode.sub_type || '', generation: 0 });

  // BFS upward (teachers)
  let frontier = [rootName];
  for (let gen = 1; gen <= upGens; gen++) {
    const next = [];
    frontier.forEach(name => {
      (teachers[name] || []).forEach(t => {
        if (!nodes.has(t.name)) {
          const n = nodeMap[t.name] || { type: 'unknown', sub_type: '' };
          nodes.set(t.name, { name: t.name, type: n.type, sub_type: n.sub_type || '', generation: -gen });
          next.push(t.name);
        }
        edges.push({ source: t.name, target: name, specialty: t.specialty, quote: t.quote, chapter: t.chapter });
      });
    });
    frontier = next;
  }

  // BFS downward (students)
  frontier = [rootName];
  for (let gen = 1; gen <= downGens; gen++) {
    const next = [];
    frontier.forEach(name => {
      (students[name] || []).forEach(s => {
        if (!nodes.has(s.name)) {
          const n = nodeMap[s.name] || { type: 'unknown', sub_type: '' };
          nodes.set(s.name, { name: s.name, type: n.type, sub_type: n.sub_type || '', generation: gen });
          next.push(s.name);
        }
        edges.push({ source: name, target: s.name, specialty: s.specialty, quote: s.quote, chapter: s.chapter });
      });
    });
    frontier = next;
  }

  // Deduplicate edges
  const edgeSet = new Set();
  const uniqueEdges = edges.filter(e => {
    const key = `${e.source}→${e.target}`;
    if (edgeSet.has(key)) return false;
    edgeSet.add(key);
    return true;
  });

  return { nodes: Array.from(nodes.values()), edges: uniqueEdges, root: rootName };
}

// ============================================================
// RENDER — hierarchical top-to-bottom layout
// ============================================================
const width = window.innerWidth;
const height = window.innerHeight;
const svg = d3.select("#chart").attr("width", width).attr("height", height);
const g = svg.append("g");

// Zoom
svg.call(d3.zoom().scaleExtent([0.2, 4]).on("zoom", e => g.attr("transform", e.transform)));

const typeColors = {
  "人物": "#7eb8da", "圣众": "#c9a96e", "非人": "#b05a5a",
  "寺院": "#6ba386", "地名": "#8895a7", "经典": "#9a85a8",
  "教法": "#c4956a", "教派": "#8a7d68", "仪轨": "#6a9b9e",
  "法器圣物": "#a88a9d", "集合": "#b5b88a", "unknown": "#555"
};

let currentRoot = null;

function renderTree(data) {
  g.selectAll("*").remove();

  const { nodes, edges, root } = data;
  if (nodes.length === 0) return;

  currentRoot = root;

  // Compute generation range
  const minGen = d3.min(nodes, d => d.generation);
  const maxGen = d3.max(nodes, d => d.generation);

  // Group nodes by generation
  const genGroups = {};
  nodes.forEach(n => {
    if (!genGroups[n.generation]) genGroups[n.generation] = [];
    genGroups[n.generation].push(n);
  });

  // Layout: vertical layers, horizontal spread
  // 动态层间距：根据最大一层的节点数调整
  const maxGroupSize = Math.max(...Object.values(genGroups).map(g => g.length));
  const layerHeight = Math.max(160, maxGroupSize * 12); // 节点越多层距越大
  const nodeSpacing = 160; // 每个节点最小水平间距

  const centerY = height / 2 - ((maxGen + minGen) / 2) * layerHeight;

  const nodePositions = {};
  Object.keys(genGroups).sort((a, b) => a - b).forEach(gen => {
    const group = genGroups[gen];
    const y = centerY + gen * layerHeight;
    const totalWidth = group.length * nodeSpacing;
    const startX = (width - totalWidth) / 2 + nodeSpacing / 2;

    group.forEach((n, i) => {
      n.x = group.length === 1 ? width / 2 : startX + i * nodeSpacing;
      n.y = y;
      nodePositions[n.name] = n;
    });
  });

  // Generation labels
  const genLabels = {
    0: "当前",
  };
  for (let i = 1; i <= -minGen; i++) genLabels[-i] = `上${i}代`;
  for (let i = 1; i <= maxGen; i++) genLabels[i] = `下${i}代`;

  Object.entries(genGroups).forEach(([gen, group]) => {
    g.append("text")
      .attr("class", "generation-label")
      .attr("x", 60)
      .attr("y", centerY + gen * layerHeight + 4)
      .text(genLabels[gen] || `第${gen}代`)
      .attr("fill", gen == 0 ? "#c9a96e" : "#444");

    // Subtle horizontal line
    g.append("line")
      .attr("x1", 70).attr("x2", width - 20)
      .attr("y1", centerY + gen * layerHeight)
      .attr("y2", centerY + gen * layerHeight)
      .attr("stroke", gen == 0 ? "rgba(201,169,110,0.15)" : "rgba(255,255,255,0.03)")
      .attr("stroke-width", 1);
  });

  // Draw edges — S 曲线，悬停原生 tooltip 显示原文
  var linkG = g.append("g");

  edges.forEach(function(e) {
    var src = nodePositions[e.source];
    var tgt = nodePositions[e.target];
    if (!src || !tgt) return;

    var sy = src.y + 14, ty = tgt.y - 14;
    var cy1 = sy + (ty - sy) * 0.4;
    var cy2 = sy + (ty - sy) * 0.6;
    var d = "M" + src.x + "," + sy + " C" + src.x + "," + cy1 + " " + tgt.x + "," + cy2 + " " + tgt.x + "," + ty;

    // 可见线
    var line = linkG.append("path").attr("d", d)
      .attr("fill", "none").attr("stroke", "rgba(106,174,214,0.25)").attr("stroke-width", 1.2);

    // 粗透明线捕获鼠标
    var tip = e.source + " → " + e.target;
    if (e.specialty) tip += "\n传承: " + e.specialty;
    if (e.quote) tip += "\n原文:「" + e.quote + "」";
    if (e.chapter) tip += "\n来源: " + e.chapter;

    linkG.append("path").attr("d", d)
      .attr("fill", "none").attr("stroke", "transparent").attr("stroke-width", 10)
      .style("cursor", "pointer")
      .on("mouseover", function() { line.attr("stroke", "rgba(106,174,214,0.8)").attr("stroke-width", 2.5); })
      .on("mouseout", function() { line.attr("stroke", "rgba(106,174,214,0.25)").attr("stroke-width", 1.2); })
      .on("click", (function(ev) {
        var p = document.getElementById("relation-panel");
        document.getElementById("rel-title").textContent = ev.source + " → " + ev.target;
        document.getElementById("rel-specialty").textContent = ev.specialty || "（未标注）";
        document.getElementById("rel-quote").textContent = ev.quote ? "「" + ev.quote + "」" : "（无原文记录）";
        document.getElementById("rel-source").textContent = ev.chapter || "";
        p.style.display = "block";
      }).bind(null, e));

    // 箭头
    linkG.append("polygon").attr("points", "-3,-5 3,-5 0,0")
      .attr("transform", "translate(" + tgt.x + "," + ty + ")")
      .attr("fill", "rgba(106,174,214,0.3)");
  });

  // Draw nodes
  const nodeG = g.append("g");
  nodes.forEach(n => {
    const isRoot = n.name === root;
    const color = typeColors[n.type] || typeColors.unknown;
    const radius = isRoot ? 16 : 10;

    const ng = nodeG.append("g")
      .attr("transform", `translate(${n.x},${n.y})`)
      .style("cursor", "pointer")
      .on("click", () => selectEntity(n.name));

    // Glow for root
    if (isRoot) {
      ng.append("circle")
        .attr("r", radius + 6)
        .attr("fill", "none")
        .attr("stroke", color)
        .attr("stroke-width", 1)
        .attr("opacity", 0.3);
    }

    ng.append("circle")
      .attr("class", "node-circle")
      .attr("r", radius)
      .attr("fill", color)
      .attr("stroke", isRoot ? "#fff" : "rgba(255,255,255,0.15)")
      .attr("stroke-width", isRoot ? 2 : 1)
      .attr("opacity", isRoot ? 1 : 0.85);

    ng.append("text")
      .attr("class", "node-label")
      .attr("y", radius + 16)
      .attr("fill", isRoot ? "#e0d0a0" : "#aaa")
      .attr("font-size", isRoot ? "13px" : "11px")
      .attr("font-weight", isRoot ? "500" : "400")
      .text(n.name);
  });

  // Show info panel
  showPanel(root);
}

// ============================================================
// Panel
// ============================================================
function showPanel(name) {
  const panel = document.getElementById("info-panel");
  const node = nodeMap[name] || {};

  document.getElementById("panel-name").textContent = name;
  document.getElementById("panel-type").textContent = node.sub_type || node.type || 'unknown';

  const teacherList = (teachers[name] || []).map(t =>
    `<span onclick="selectEntity('${t.name}')">${t.name}</span>${t.specialty ? '<span class="specialty-tag">' + t.specialty + '</span>' : ''}${t.quote ? '<div class="quote-text">「' + t.quote + '」<span class="quote-src">' + t.chapter + '</span></div>' : ''}`
  ).join('') || '<span style="color:#555">无记录</span>';

  const studentList = (students[name] || []).map(s =>
    `<span onclick="selectEntity('${s.name}')">${s.name}</span>${s.specialty ? '<span class="specialty-tag">' + s.specialty + '</span>' : ''}${s.quote ? '<div class="quote-text">「' + s.quote + '」<span class="quote-src">' + s.chapter + '</span></div>' : ''}`
  ).join('') || '<span style="color:#555">无记录</span>';

  document.getElementById("panel-teachers").innerHTML = teacherList;
  document.getElementById("panel-students").innerHTML = studentList;

  panel.style.display = "block";
}

function closePanel() {
  document.getElementById("info-panel").style.display = "none";
}

function selectEntity(name) {
  const tree = getLineageTree(name, 3, 3);
  renderTree(tree);
  document.getElementById("help-text").style.display = "none";
}

// ============================================================
// Search
// ============================================================
const searchInput = document.getElementById("search-input");
const suggestionsDiv = document.getElementById("suggestions");

const searchableNames = Array.from(allNames).sort();

searchInput.addEventListener("input", function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { suggestionsDiv.style.display = "none"; return; }

  const matches = searchableNames.filter(n => n.toLowerCase().includes(q)).slice(0, 15);

  if (matches.length === 0) {
    suggestionsDiv.style.display = "none";
    return;
  }

  suggestionsDiv.innerHTML = matches.map(m => {
    const node = nodeMap[m] || {};
    return `<div class="suggestion-item" onclick="selectEntity('${m}'); suggestionsDiv.style.display='none'; searchInput.value='${m}';">
      ${m} <span class="type-tag">${node.type || ''}</span>
    </div>`;
  }).join('');
  suggestionsDiv.style.display = "block";
});

searchInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    const q = this.value.trim();
    const match = searchableNames.find(n => n === q) || searchableNames.find(n => n.includes(q));
    if (match) {
      selectEntity(match);
      suggestionsDiv.style.display = "none";
    }
  }
});

document.addEventListener("click", function(e) {
  if (!e.target.closest("#search-box") && !e.target.closest("#suggestions")) {
    suggestionsDiv.style.display = "none";
  }
});

// ============================================================
// Default: show 莲花生大士
// ============================================================
selectEntity("莲花生大士");
</script>
