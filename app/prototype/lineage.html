<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f0f1a;
  color: #d0d0d0;
  font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  overflow: hidden;
  width: 100vw; height: 100vh;
}

#header {
  position: absolute; top: 0; left: 0; right: 0; z-index: 20;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px;
  background: linear-gradient(180deg, rgba(15,15,26,0.97) 0%, rgba(15,15,26,0) 100%);
}
#header h1 {
  font-size: 18px; font-weight: 400; letter-spacing: 4px; color: #c9a96e;
}
#search-box {
  display: flex; align-items: center; gap: 8px;
}
#search-box input {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px; padding: 6px 14px; color: #e0e0e0; font-size: 14px;
  width: 260px; outline: none;
}
#search-box input:focus { border-color: rgba(201,169,110,0.5); }
#search-box input::placeholder { color: #666; }
#suggestions {
  position: absolute; top: 42px; right: 24px; z-index: 30;
  background: rgba(20,20,35,0.95); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; max-height: 300px; overflow-y: auto; width: 260px;
  display: none;
}
.suggestion-item {
  padding: 8px 14px; cursor: pointer; font-size: 13px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.suggestion-item:hover { background: rgba(201,169,110,0.15); }
.suggestion-item .type-tag {
  font-size: 10px; color: #888; margin-left: 6px;
}

#info-panel {
  position: absolute; top: 60px; left: 20px; z-index: 20;
  background: rgba(15,15,26,0.92); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px; padding: 16px 20px; width: 280px;
  backdrop-filter: blur(8px); display: none;
}
#info-panel h2 { font-size: 16px; color: #c9a96e; margin-bottom: 8px; }
#info-panel .info-type { font-size: 12px; color: #7eb8da; margin-bottom: 12px; }
#info-panel .info-section { margin-bottom: 10px; }
#info-panel .info-label { font-size: 11px; color: #888; margin-bottom: 4px; }
#info-panel .teacher-list, #info-panel .student-list {
  font-size: 13px; line-height: 1.8;
}
#info-panel .teacher-list span, #info-panel .student-list span {
  cursor: pointer; border-bottom: 1px dotted rgba(201,169,110,0.3);
}
#info-panel .teacher-list span:hover, #info-panel .student-list span:hover {
  color: #c9a96e;
}
.specialty-tag {
  font-size: 10px; padding: 1px 5px; border-radius: 3px;
  background: rgba(106,174,214,0.15); color: #6aaed6; margin-left: 4px;
}
.quote-text {
  font-size: 11px; color: #999; margin: 2px 0 8px 0; padding-left: 8px;
  border-left: 2px solid rgba(201,169,110,0.3); line-height: 1.5;
}
.quote-src {
  font-size: 9px; color: #666; margin-left: 6px;
}

#relation-panel {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 25; display: none;
  background: rgba(15,15,26,0.95); border: 1px solid rgba(201,169,110,0.3);
  border-radius: 10px; padding: 16px 24px; min-width: 360px; max-width: 600px;
  backdrop-filter: blur(10px);
}
#relation-panel h3 { font-size: 15px; color: #c9a96e; margin-bottom: 10px; }
#relation-panel .close-btn { position: absolute; top: 8px; right: 14px; cursor: pointer; color: #666; font-size: 16px; }
#relation-panel .close-btn:hover { color: #ccc; }
.quote-block {
  font-size: 13px; color: #d0c8b0; line-height: 1.8; padding: 10px 14px;
  background: rgba(201,169,110,0.06); border-left: 3px solid rgba(201,169,110,0.4);
  border-radius: 0 6px 6px 0; margin: 4px 0;
}
.source-tag { font-size: 12px; color: #8895a7; margin-top: 4px; }
.event-item {
  margin: 6px 0; padding: 6px 10px; border-radius: 5px;
  background: rgba(255,255,255,0.03); border-left: 3px solid rgba(106,174,214,0.3);
  cursor: pointer;
}
.event-item:hover { background: rgba(106,174,214,0.08); }
.event-type-tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: rgba(201,169,110,0.15); color: #c9a96e; margin-right: 6px; }
.event-title { font-size: 12px; color: #ccc; }
.event-quote { font-size: 11px; color: #999; margin-top: 3px; line-height: 1.6; display: none; }
.event-item.expanded .event-quote { display: block; }
.event-chapter { font-size: 9px; color: #666; margin-top: 2px; }
body.light .event-item { background: rgba(0,0,0,0.02); border-left-color: rgba(43,108,163,0.3); }
body.light .event-title { color: #444; }
body.light .event-quote { color: #666; }
body.light .event-type-tag { background: rgba(139,105,20,0.1); color: #8b6914; }

body.light #relation-panel { background: rgba(255,255,255,0.97); border-color: rgba(139,105,20,0.3); }
body.light #relation-panel h3 { color: #8b6914; }
body.light .quote-block { color: #4a4a3a; background: rgba(139,105,20,0.04); border-left-color: rgba(139,105,20,0.5); }
body.light .source-tag { color: #888; }

/* Theme toggle */
#theme-toggle {
  position: absolute; top: 14px; right: 300px; z-index: 20;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 5px; padding: 4px 10px; cursor: pointer;
  color: #999; font-size: 12px;
}
#theme-toggle:hover { background: rgba(255,255,255,0.15); color: #ccc; }

/* Light theme */
body.light {
  background: #f5f3ee; color: #333;
}
body.light #header { background: linear-gradient(180deg, rgba(245,243,238,0.97) 0%, rgba(245,243,238,0) 100%); }
body.light #header h1 { color: #8b6914; text-shadow: none; }
body.light #info-panel { background: rgba(255,255,255,0.95); border-color: rgba(0,0,0,0.1); color: #333; }
body.light #info-panel h2 { color: #8b6914; }
body.light #info-panel .info-type { color: #2b6ca3; }
body.light #info-panel .info-label { color: #888; }
body.light .quote-text { color: #666; border-left-color: rgba(139,105,20,0.4); }
body.light .quote-src { color: #999; }
body.light #suggestions { background: rgba(255,255,255,0.97); border-color: rgba(0,0,0,0.1); }
body.light .suggestion-item { color: #333; border-bottom-color: rgba(0,0,0,0.05); }
body.light .suggestion-item:hover { background: rgba(139,105,20,0.08); }
body.light #search-box input { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.12); color: #333; }
body.light .node-label { fill: #444; }
body.light .generation-label { fill: #bbb; }
body.light #help-text { color: #aaa; }
body.light #theme-toggle { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); color: #888; }
#info-panel .close-btn {
  position: absolute; top: 8px; right: 12px; cursor: pointer;
  color: #666; font-size: 16px;
}
#info-panel .close-btn:hover { color: #ccc; }

#help-text {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  font-size: 12px; color: #555; z-index: 10; pointer-events: none;
}

svg { display: block; }

.link-line { fill: none; }
.node-circle { cursor: pointer; }
.node-label { pointer-events: none; fill: #ccc; font-size: 11px; text-anchor: middle; }
.generation-label { fill: #333; font-size: 11px; text-anchor: end; }
</style>
</head>

</div>

    "quote": "《功德圆满庄严经》中记载：“我自开始发起无上菩提心时起，在三大阿僧祇劫以最大的精进累积资粮，并且照见在人寿百岁之时一切无有导师盲目的有情而在此赡部洲成佛，之后广转不可思议法轮……”再有，密宗的个别佛典，总体来说与共同大乘所讲的情节是一致的，不同的是，当义成王子在尼连禅河畔安住于不动三摩地的时候，所有佛陀唤他出定并劝请，结果他把假合的身体放在河边，而智慧身到达密严刹土，蒙受一切如来灌顶，依靠五种证觉的方便成佛，随后再度到金刚座示现成佛。",

hapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "典据", "title": "不共大乘观点——释迦佛在密严庄严刹土成佛后依次示现", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}], "location": "密严刹土", "time_info": "", "layers": ["典据"], "quote": "”承许外现前菩提是以离贪的方式成佛；内现前菩提是以四种贪欲法理而现前光明法身之后证得双运身。依照不共大乘的观点认为，释迦佛是在密严庄严刹土中成佛以后依次在净居天 16 、金刚座示现成佛。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "典据", "title": "无上了义观点——释迦佛从无始时以来即在法性光明刹土现前菩提", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}], "location": "", "time_info": "{'text': '无始时以来', 'relative_to': None, 'absolute': None}", "layers": ["典据"], "quote": "这里按照无上了义精藏的观点来讲，我等大师释迦佛从无始时以来就在本基法界中以自证智慧解脱的方式而现前菩提，在法性光明刹土，与三世一切佛陀密意一味一体安住在身智无合无离的境界中如如不动，与此同时，为了利益一切有情而现示不可思议化身佛的幻化，随着不同所化众生的缘分，把他们安置在三菩提 17 的果位，以此无量的事业调化众生。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "神变", "title": "白幢天子在兜率天宣讲正法", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}], "location": "兜率天", "time_info": "", "layers": ["神变"], "quote": "《宝性论》中说：“法身不动中，以异化身性，真实而投生，从兜率天降，入胎及诞生，精通工巧明，嬉享妃眷属，出家与苦行，趋至菩提树，降魔圆正觉，转大妙法轮，示现涅槃相，于诸不净刹，无间示安住。”\n（一）降天我等大师释迦佛自从在兜率天 20 成为名叫“白幢”的天子，就对诸位天人宣讲正法并且与众天人在一起。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "神变", "title": "燃灯佛授记偈颂乐音在走廊中自然传出", "participants": [{"entity": "燃灯佛", "role": "典据来源"}, {"entity": "释迦牟尼佛", "role": "受者"}], "location": "兜率天", "time_info": "", "layers": ["授记"], "quote": "当时，周围的走廊中自然传出燃灯佛授记劝请偈颂的乐音，白幢端坐在妙法增上宫殿里十分精致的法座上，即将要示现受生南赡部洲，于是他观察要投生的洲、种姓、父亲、母亲、时间——五照见。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "神变", "title": "白幢天子五照见后安慰天人即将投生南赡部洲", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}], "location": "兜率天", "time_info": "", "layers": ["神变"], "quote": "当时，周围的走廊中自然传出燃灯佛授记劝请偈颂的乐音，白幢端坐在妙法增上宫殿里十分精致的法座上，即将要示现受生南赡部洲，于是他观察要投生的洲、种姓、父亲、母亲、时间——五照见。这般观察以后就安慰众天人说：“我要到南赡部洲摩诃摩耶胎中结生，能现前甚深甘露果位（即佛果），能胜伏十八种寻思者，能使芸芸众生得到解脱。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "神变", "title": "白幢天子以六牙白象形象入母胎", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}, {"entity": "摩耶夫人", "role": "客体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "这般观察以后就安慰众天人说：“我要到南赡部洲摩诃摩耶胎中结生，能现前甚深甘露果位（即佛果），能胜伏十八种寻思者，能使芸芸众生得到解脱。”\n（二）入胎接着，他便以婆罗门吠陀中说的灰白童象（即六牙白象）的形象来到正在持斋戒的母亲胎中。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "神变", "title": "太子于蓝毗尼花园从母亲右肋诞生", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}, {"entity": "摩耶夫人", "role": "客体"}], "location": "蓝毗尼花园", "time_info": "", "layers": ["神变"], "quote": "（三）诞生表示十地 22 圆满而住胎十月圆满，他那以二十种相证得菩提的身体犹如纯金一般，当以世间福德力在蓝毗尼花园中降生的时刻已到，他在母亲没有任何损害的情况下从她的右肋自然诞生。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "神变", "title": "天子沐浴太子、梵天帝释天供养", "participants": [{"entity": "释迦牟尼佛", "role": "受者"}, {"entity": "梵天", "role": "供养者"}, {"entity": "帝释天", "role": "供养者"}], "location": "蓝毗尼花园", "time_info": "", "layers": ["神变"], "quote": "为了表示他苏醒得受王族太子灌顶或者不动金刚等一切如来自本体的种姓，众天子从天而降精心为他沐浴；空中的天人恭恭敬敬以妙音赞叹；梵天帝释\n天献上精美的妙衣。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "神变", "title": "太子降生向四方各迈七步", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}], "location": "蓝毗尼花园", "time_info": "", "layers": ["神变"], "quote": "为了表示他苏醒得受王族太子灌顶或者不动金刚等一切如来自本体的种姓，众天子从天而降精心为他沐浴；空中的天人恭恭敬敬以妙音赞叹；梵天帝释\n天献上精美的妙衣。为了说明欢喜趋向四无量 23 道，菩萨刚刚降生，便向四方各迈七步，脚下所踏天人供养的莲花花蕊也显得奕奕生辉。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "五百释迦童子等一同出生及五百宝藏出现", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}, {"entity": "五百释迦童子", "role": "伴随者"}, {"entity": "八百童女", "role": "伴随者"}, {"entity": "五百仆人", "role": "伴随者"}, {"entity": "五百良驹", "role": "伴随者"}], "location": "蓝毗尼花园", "time_info": "", "layers": ["史传"], "quote": "为了说明欢喜趋向四无量 23 道，菩萨刚刚降生，便向四方各迈七步，脚下所踏天人供养的莲花花蕊也显得奕奕生辉。当时，蓝毗尼花园百花盛开，难陀等五百释迦童子以及耶输陀罗等八百童女、登巴等五百仆人、阿丹等五百良驹也一同出生。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "相师预言太子命运——转轮王或佛陀", "participants": [{"entity": "释迦牟尼佛", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "由此成办了国王的一切利益，所以就为太子取名“义成”。相师们预言说：如果太子身在俗家，就会成为克胜四方的转轮王；倘若离开尘世出家为僧，就会成为佛陀。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "摩耶夫人于太子出生七日后离世", "participants": [{"entity": "摩耶夫人", "role": "主体"}, {"entity": "释迦牟尼佛", "role": "关联者"}], "location": "", "time_info": "{'text': '太子出生后第七天', 'relative_to': '释迦牟尼佛', 'absolute': None}", "layers": ["史传"], "quote": "相师们预言说：如果太子身在俗家，就会成为克胜四方的转轮王；倘若离开尘世出家为僧，就会成为佛陀。\n（四）精通工巧太子出生后的第七天，母亲摩耶夫人就离开了人世。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "三十二位姨母抚养太子", "participants": [{"entity": "释迦牟尼佛", "role": "受者"}, {"entity": "众生主母", "role": "主体"}, {"entity": "三十二位姨母", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "（四）精通工巧太子出生后的第七天，母亲摩耶夫人就离开了人世。于是国王把他交给众生主母等三十二位姨母，抚养成长。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "太子于师长处学习文字历算", "participants": [{"entity": "释迦牟尼佛", "role": "受者"}, {"entity": "根戒西尼", "role": "师长"}, {"entity": "真哦够恰", "role": "师长"}, {"entity": "桑林", "role": "师长"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "长大以后，在根戒西尼（意为众知识）、真哦够恰等等师长面前学习文字、历算，在国舅桑林（意为善取）那里学习了骑象等许多技艺，所有的知识、本领样样精通，就这样一直住在宫中。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "太子比武——象力、箭术及六十四项本领", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}, {"entity": "提婆达多", "role": "对手"}, {"entity": "难陀", "role": "对手"}], "location": "广严城", "time_info": "", "layers": ["史传"], "quote": "当时，广严城供养太子一头大象，提婆达多怀着极大的嫉妒心以一掌力击死大象，难陀用力把大象从城门抛到城外。为了灭他们的威风，菩萨太子一边坐在马车上一边用脚拇趾尖挑起象尾扔到越过七个城墙的野外。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "太子迎娶三位太子妃及六万妃子", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}, {"entity": "耶输陀罗", "role": "受者"}, {"entity": "耶惟檀", "role": "受者"}, {"entity": "热达吉", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "（五）嬉享妃眷彻知世间的君主，暂时也是随机入世调伏人们，并且为了遣除男根无有功能的诽谤，而迎娶了远离五种过失、具有八种功德的女子——耶输陀罗、耶惟檀与热达吉，连同她们各自的二万眷属，即六万妃子，如幻般享受妙欲。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "太子目睹生老病死四景后立誓出家", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}, {"entity": "登巴", "role": "驾驶者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "（六）出家当他乘着登巴驾驶的马车到城市四方消遣的时候，目睹了生老病死的四种景象，心中异常悲哀，情不自禁地说道：“衰老病死亡，若无此三者，我亦能欢喜，极悦一切境。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "净饭王严加守护禁止太子外出", "participants": [{"entity": "净饭王", "role": "主体"}, {"entity": "释迦牟尼佛", "role": "客体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "”他对一切圆满都是无常、与变苦相伴、被遍布的行苦拥抱、苦苦如影随形的规律生起了极大的厌离心，立誓出家。当时，净饭王由于担心太子出家，于是命监视者和夜间巡逻者在城的周围严加守护，禁止太子外出。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "太子夜间出家——向父王顶礼后跨马腾空", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}, {"entity": "阿丹", "role": "坐骑"}, {"entity": "净饭王", "role": "关联者"}], "location": "", "time_info": "{'text': '一天夜里', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "当时，净饭王由于担心太子出家，于是命监视者和夜间巡逻者在城的周围严加守护，禁止太子外出。最后，一天夜里，太子默默向父王顶礼，以此断除父母没有允许出家的过失。他跨上阿丹坐骑，在四大天王的承侍下，腾空而去。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "太子在清净塔前剃度出家", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他跨上阿丹坐骑，在四大天王的承侍下，腾空而去。来到清净塔前，自己剃掉发须，标志着正式出家，脱下俗衣，换上袈裟。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "太子在让佩、拉秀处听闻无所有定与有顶等持", "participants": [{"entity": "释迦牟尼佛", "role": "受者"}, {"entity": "让佩", "role": "师长"}, {"entity": "拉秀", "role": "师长"}], "location": "广严城", "time_info": "", "layers": ["史传"], "quote": "（七）苦行随后他在广严城、王舍城，于身怀因明窍诀、大名鼎鼎的让佩与拉秀大师那里，听闻无所有定与有顶等持，尽管期间已经现前了上师\n的果位，但当他认识到这些等持与行为并不是解脱轮回过患的正道以后，就到尼连禅河畔，与憍陈如等五人开始了长达六年的苦行禅修生涯。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "太子与憍陈如等五人于尼连禅河畔六年苦行", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}, {"entity": "憍陈如等五人", "role": "伴随者"}], "location": "尼连禅河", "time_info": "{'text': '六年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "（七）苦行随后他在广严城、王舍城，于身怀因明窍诀、大名鼎鼎的让佩与拉秀大师那里，听闻无所有定与有顶等持，尽管期间已经现前了上师\n的果位，但当他认识到这些等持与行为并不是解脱轮回过患的正道以后，就到尼连禅河畔，与憍陈如等五人开始了长达六年的苦行禅修生涯。他们在最初两年当中每人每年只吃一粒米，中间的两年中每年只喝一滴水，最后的两年中什么饮食也没有享用。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "憍陈如等五人不悦离去往鹿野苑", "participants": [{"entity": "憍陈如等五人", "role": "主体"}, {"entity": "释迦牟尼佛", "role": "关联者"}], "location": "鹿野苑", "time_info": "", "layers": ["史传"], "quote": "菩萨稍稍享用了一点粗食，结果使憍陈如等五人心中不悦，于是他们就去了鹿野苑", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "婆罗门女妙生母以醍醐供养菩萨", "participants": [{"entity": "妙生母", "role": "供养者"}, {"entity": "释迦牟尼佛", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "（八）前往金刚座此后，菩萨前往金刚座，途中，婆罗门女妙生母以五百野黄牛乳汁提炼出的甘甜醍醐供养菩萨，（他接受并享受，）即刻身体变得像纯金一般，依此而不虚耗她的福德。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "草商吉祥供养柔软草", "participants": [{"entity": "吉祥", "role": "供养者"}, {"entity": "释迦牟尼佛", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "（八）前往金刚座此后，菩萨前往金刚座，途中，婆罗门女妙生母以五百野黄牛乳汁提炼出的甘甜醍醐供养菩萨，（他接受并享受，）即刻身体变得像纯金一般，依此而不虚耗她的福德。行途中，菩萨又接受了草商吉祥所供养的如孔雀颈般柔软的草，最后来到金刚座。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "菩萨于金刚座菩提树下跏趺而坐立下成佛誓愿", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}], "location": "金刚座", "time_info": "", "layers": ["史传"], "quote": "在一切佛陀加持中自然形成的金刚座菩提树下，于草垫上跏趺而坐，立下誓愿：“于此垫上我身纵干枯，皮肤骨骼聚合纵散落，多劫难得菩提未获前，于此垫上身体绝不动。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "神变", "title": "菩萨入定摧毁魔军等持，光芒慑服魔众", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}], "location": "金刚座", "time_info": "{'text': '初夜时分', 'relative_to': None, 'absolute': None}", "layers": ["神变"], "quote": "在一切佛陀加持中自然形成的金刚座菩提树下，于草垫上跏趺而坐，立下誓愿：“于此垫上我身纵干枯，皮肤骨骼聚合纵散落，多劫难得菩提未获前，于此垫上身体绝不动。”\n（九）降伏魔众在初夜时分，他入定于摧毁魔军的等持中，惊动、慑服魔众所在地的光芒遍及各处。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "神变", "title": "魔王波旬化现猎人试图扰乱菩萨", "participants": [{"entity": "魔王波旬", "role": "主体"}, {"entity": "释迦牟尼佛", "role": "客体"}], "location": "金刚座", "time_info": "", "layers": ["神变"], "quote": "魔王波旬化现为猎人的形象来到他面前对他说：“迦毗罗卫国已经被提婆达多控制，王宫被他摧毁，所有释迦族人也被他屠杀，你为什么还呆在这里？”菩萨回答说：“为了成佛。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "神变", "title": "地神安稳母破土而出为菩萨作证", "participants": [{"entity": "地神安稳母", "role": "主体"}, {"entity": "释迦牟尼佛", "role": "受者"}], "location": "金刚座", "time_info": "", "layers": ["神变"], "quote": "”他的话音刚落，地神安稳母的半个金色身躯便破土而出，手里拿着一个极微尘说：“我有能力把这个大地的微尘数得一清二楚，可是这位善男子布施的头颅、肢体，我却无法数尽，所以他真实圆满成佛的时间已到。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "神变", "title": "魔王发动千万亿魔军被大慈等持降服", "participants": [{"entity": "魔王波旬", "role": "主体"}, {"entity": "释迦牟尼佛", "role": "主体"}], "location": "金刚座", "time_info": "", "layers": ["神变"], "quote": "返回以后他又发动数以千万亿的魔军，布下足可以使没有得到如幻殊胜智慧之人恐惧不已、吓得痴呆的战场，气势汹汹而来。可是对于已经摧毁了烦恼怨敌并且完全现见了如虚空般的心无有本体者来说，以兴师动众的场面是绝不能损害的。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "神变", "title": "魔王幻变七魔女引诱菩萨失败", "participants": [{"entity": "魔王波旬", "role": "主体"}, {"entity": "七魔女", "role": "执行者"}, {"entity": "白莲母", "role": "执行者"}, {"entity": "美那嘎", "role": "执行者"}, {"entity": "妙饰女", "role": "执行者"}, {"entity": "卷发女", "role": "执行者"}, {"entity": "释迦牟尼佛", "role": "客体"}], "location": "金刚座", "time_info": "", "layers": ["神变"], "quote": "魔王再度幻变成七个妖艳魔女的形象，试图用贪欲的手段来引诱菩萨，其中的白莲母用媚态加以诱惑；美那嘎脖子上的各种项链悬垂着；妙饰女用腰带加以捆缚；卷发女用钉铛作响的钏镯……她们使尽周身解术用诸如此类的三十二种令人陶醉的伎俩勾引，企图用这样的羂索束缚他，但是菩萨甚至连一根毫毛尖也没有动摇，反而加持她们变成了七个老太婆，她们心生后悔，祈求宽恕才得以恢复如初。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "神变", "title": "菩萨午夜入第四静虑黎明现前正等正觉", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}], "location": "金刚座", "time_info": "{'text': '午夜至黎明', 'relative_to': None, 'absolute': None}", "layers": ["神变"], "quote": "（十）大彻大悟随后，现前菩提的时刻已到，午夜时分，菩萨入于第四静虑的等持境界中，临近黎明胜利鼓就要敲响之际，获得了天眼以及漏尽通，究竟四谛而现前真实圆满正等正觉果位。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "罗睺罗与阿难在月食之际降生", "participants": [{"entity": "班智达罗睺罗", "role": "主体"}, {"entity": "阿难", "role": "主体"}], "location": "", "time_info": "{'text': '出现月食的时候', 'relative_to': '释迦牟尼佛成佛', 'absolute': None}", "layers": ["史传"], "quote": "此时整个大地普皆震动，中脉光明法身美妙室中，一切所净的所取能取之界无余在无二智慧中现前菩提，当出现月食的时候，罗睺罗与阿难也在此刻降生人间。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "商主嘎滚和护贤供养蜂蜜、四大天王供养石钵", "participants": [{"entity": "商主嘎滚", "role": "供养者"}, {"entity": "护贤", "role": "供养者"}, {"entity": "释迦牟尼佛", "role": "受者"}], "location": "", "time_info": "{'text': '成佛后七七四十九日中', 'relative_to': '释迦牟尼佛成佛', 'absolute': None}", "layers": ["史传"], "quote": "菩萨成佛以后在七七四十九日中，商主嘎滚和护贤供养蜂蜜，四大天王供养珍宝钵到石钵之间的四钵盂，佛陀考虑到前三质地的钵不是僧侣所用之具而拒绝，只是接受了石钵，并念诵吉祥文。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "梵天回忆宏愿劝请佛转法轮", "participants": [{"entity": "梵天", "role": "主体"}, {"entity": "释迦牟尼佛", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "（十一）广转法轮当时，梵天回忆起往昔的宏愿，于是来到如来面前请求道：“佛陀今日为何住等舍，祈请擂击微妙大法鼓，祈请吹奏微妙之法螺……”依靠这些偈颂劝请，并撒檀香粉。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "帝释天供如意宝珠劝请佛转法轮——佛未应允", "participants": [{"entity": "帝释天", "role": "主体"}, {"entity": "释迦牟尼佛", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "为了让帝释天也祈请，他又返回到自己的住处，随后与帝释天一道前来。帝释天供上如意宝珠请求：“犹如满月已离曜，能仁您意尽解脱，祈请沙场得胜者，慧光驱除世间暗。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "梵天供养千辐金法轮再次劝请——佛应允", "participants": [{"entity": "梵天", "role": "主体"}, {"entity": "释迦牟尼佛", "role": "受者"}, {"entity": "千辐金法轮", "role": "供品"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "梵天知晓屡屡劝请能获得大福德资粮，于是又供养千辐金法轮，并再次以“先前摩竭陀人只知以有垢法造罪”的偈颂劝请，佛陀接受法轮说道：“梵天摩竭陀地诸有情，具有耳根信心及智慧，人生诸行恒时闻正法，我于彼等开启甘露门。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "佛前赴鹿野苑途中回答婆罗门正命三问", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}, {"entity": "正命", "role": "提问者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "佛陀行至途中，有一个名叫正命的婆罗门不假思索顺口就问：“释迦牟尼，你是在谁面前出家的？”佛告诉他：“我无任何传戒师，无有与我相同者，我唯圆满正等觉，已得清凉漏永尽……”这样回答了三个问题。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "佛陀于鹿野苑初转四谛法轮——憍陈如等五人得近圆戒", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}, {"entity": "憍陈如", "role": "受者"}, {"entity": "憍陈如等五人", "role": "受者"}], "location": "鹿野苑", "time_info": "", "layers": ["史传"], "quote": "佛陀为憍陈如等五人及八万天人转了远离二边中道的四谛 28 法轮，重复了三次，也就是十二相法轮（合称词典中有十二转说：十二种诵文，即此苦圣谛，此集圣谛、此灭圣谛、此道圣谛，以上乃念诵四谛本质；苦应知、集应断、灭应现、道应修，以上乃念诵四谛见之于行；应知苦而苦未断、应断集而集未断、应现灭而灭未现、应修道而道未修，以上乃念诵四谛之\n果）。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "佛陀于灵鹫山转第二无相法轮", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}, {"entity": "舍利子", "role": "眷属"}, {"entity": "目犍连", "role": "眷属"}, {"entity": "众生主母", "role": "眷属"}, {"entity": "给孤独", "role": "眷属"}, {"entity": "萨嘎", "role": "眷属"}, {"entity": "护贤", "role": "眷属"}, {"entity": "宝生", "role": "眷属"}, {"entity": "网施", "role": "眷属"}], "location": "灵鹫山", "time_info": "", "layers": ["史传"], "quote": "继此之后，佛在圆满处灵鹫山，于舍利子 29 、目犍连 30 等五千阿罗汉、众生主母等五百比丘尼、给孤独等优婆塞、萨嘎等优婆夷、天龙乾闼婆等多之又多的共同四众眷属，以及护贤、宝生、网施等诸得地大菩萨多不可数的不共眷属面前，转了第二无相法轮。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "史传", "title": "佛陀于不定地点转第三了义法轮", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "期间，佛陀从主要宣说经藏定学入手，其中经藏之律藏，是讲菩萨戒的所有戒条；经藏之经藏是有关深广等持的教义；经藏之论藏是有关（十）地（五）道、总持、等持的所有详细分类。佛陀还在天界、龙宫等不定的地点，为不可胜数的比丘、比丘尼、天龙、菩萨转了第三了义法轮，此次法轮中，主要宣讲论藏慧学。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "神变", "title": "众生主母发愿佛陀住世三大阿僧祇劫", "participants": [{"entity": "众生主母", "role": "主体"}, {"entity": "释迦牟尼佛", "role": "受者"}], "location": "拘尸那城", "time_info": "", "layers": ["史传"], "quote": "这声音被众生主母听到，她立即发愿说：“愿佛陀住世三大阿僧祇劫。”这一发愿的声音从人间一直传到色究竟天之间，所有众生听到以后也都这样发愿。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "圆寂", "title": "众生主母与五百女阿罗汉趣入涅槃", "participants": [{"entity": "众生主母", "role": "主体"}, {"entity": "五百女阿罗汉", "role": "随同"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "”众生主母为了忏悔，与五百女阿罗汉一道趣入涅槃。当时，目犍连与舍利子二位尊者到地狱巡视，正在感受业报的外道上师，对他们二位说：“我们自己的宗派追随着错误的法规，请你们将此口信捎给我们的弟子。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "弘法", "title": "目犍连与舍利子巡视地狱", "participants": [{"entity": "目犍连", "role": "主体"}, {"entity": "舍利子", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "当时，目犍连与舍利子二位尊者到地狱巡视，正在感受业报的外道上师，对他们二位说：“我们自己的宗派追随着错误的法规，请你们将此口信捎给我们的弟子。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "圆寂", "title": "目犍连被外道徒殴打致死", "participants": [{"entity": "目犍连", "role": "受害者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "”外道徒听后怒不可遏地说：“这个人不但对我们妄加责难，居然胆大包天地诽谤起我们的上师来了。给我打！”外道徒数数殴打目犍连，他的身体被摧残得简直像苇草一样。舍利子用法衣包起同伴，背着来到离城很远的地方。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "圆寂", "title": "舍利子与八万阿罗汉于那烂陀寺涅槃", "participants": [{"entity": "舍利子", "role": "主体"}], "location": "那烂陀寺", "time_info": "", "layers": ["史传"], "quote": "他发现目犍连不可能再活下去，悲哀地说：“朋友死讯听也不忍心听，更何况亲眼目睹？”说完就前往那烂陀寺 31，当天上午与八万阿罗汉一起趣入涅槃。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "圆寂", "title": "目犍连与七万罗汉同时涅槃", "participants": [{"entity": "目犍连", "role": "主体"}], "location": "", "time_info": "{'text': '当日下午', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "他发现目犍连不可能再活下去，悲哀地说：“朋友死讯听也不忍心听，更何况亲眼目睹？”说完就前往那烂陀寺 31，当天上午与八万阿罗汉一起趣入涅槃。当日下午目犍连与七万罗汉同时涅槃。另外还有许多阿罗汉也如同柴尽的火焰一样相继入灭。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "传法", "title": "佛陀将佛法交付大迦叶", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}, {"entity": "大迦叶", "role": "受法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在此之后，佛陀将佛法连同四众眷属交付与上座大迦叶，并把上衣脱下说：“诸位比丘观看如来身，观看如来实在难得，犹如昙花一现。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "圆寂", "title": "佛陀于娑罗双树下示现圆满涅槃", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}], "location": "娑罗双树", "time_info": "{'text': '佛寿为八十', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "后来佛陀到娑罗双树下示现圆满涅槃。当时，大迦叶尊者从龙宫返回，面对着如来遗体虔诚祈祷，结果佛身自然焚烧，最后变成了零星的舍利。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "建寺", "title": "迦叶将佛舍利分八份装藏八大佛塔", "participants": [{"entity": "大迦叶", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "当时，大迦叶尊者从龙宫返回，面对着如来遗体虔诚祈祷，结果佛身自然焚烧，最后变成了零星的舍利。（迦叶）根据众生各自的缘分把舍利分成八份，作为八大佛塔 32 的装藏物。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "弘法", "title": "第一次结集", "participants": [{"entity": "优婆离", "role": "结集律藏"}, {"entity": "阿难", "role": "结集经藏"}, {"entity": "大迦叶", "role": "结集论藏"}, {"entity": "未生怨王", "role": "施主"}, {"entity": "五百阿罗汉", "role": "参与者"}], "location": "列卓达山洞", "time_info": "{'text': '佛陀灭度后的第二年夏令安居期间', 'relative_to': '释迦牟尼佛', 'absolute': None}", "layers": ["典据"], "quote": "”为了遣除天人的这种讥讽，佛陀灭度后的第二年夏令安居 34 期间，在王舍城的列卓达山洞里，由未生怨王作施主，五百阿罗汉济济一堂（进行了第一次结集三藏）。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "弘法", "title": "第二次结集", "participants": [{"entity": "耶舍", "role": "领衔者"}, {"entity": "七百罗汉", "role": "参与者"}, {"entity": "阿育王", "role": "施主"}], "location": "婆利迦精舍", "time_info": "{'text': '第一次结集之后过了一百一十年', 'relative_to': None, 'absolute': None}", "layers": ["典据"], "quote": "”\n第二次结集：继第一次结集之后过了一百一十年，广严城中有比丘公开宣扬十种非事，如云：“口呼负随喜，威仪器及盐，途双指搅垫，可以触金银，此许十非事 36 。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "弘法", "title": "大天比丘等宣扬五种邪法", "participants": [{"entity": "大天比丘", "role": "主体"}, {"entity": "善贤", "role": "主体"}, {"entity": "龙长老", "role": "主体"}, {"entity": "安意", "role": "主体"}], "location": "", "time_info": "{'text': '离忧的儿子勇部时期开始', 'relative_to': '勇部', 'absolute': None}", "layers": ["史传"], "quote": "第三次结集：国王达玛阿修嘎的孙子名叫离忧，自从离忧的儿子勇部时期开始，受到魔加持的大天比丘、善贤、龙长老、安意等相继出现，他们向别人宣扬“答复他不知，怀疑皆观察，能养活自己，此乃佛教法”这样的五种邪法。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "弘法", "title": "僧团分裂为十八部", "participants": [{"entity": "龙长老", "role": "分裂者"}, {"entity": "安意", "role": "分裂者"}], "location": "", "time_info": "{'text': '勇部、欢喜王、大莲花王、嘎纳加嘎四位国王统治期间', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "由于佛陀未曾开许将律藏立成文字，久而久之，由于《别解脱经》的诵法有所不同，而分裂成了十八部，又因为龙长老扩大争端，使得说一切有部中又分出了大众部、上座部、正量部三部，这样一来就成了根本四部。随后，安意再度使争论不断扩张，结果四部又逐步分成十八部，其中说一切有部分成七部 39 ，大众部分成五部 40 ，上座部 41 与正量部 42 各分成三部。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "弘法", "title": "第三次结集", "participants": [{"entity": "腻契波王", "role": "施主"}], "location": "", "time_info": "{'text': '争论稍有平息之后', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "这时，腻契波王作为施主开始第三次结集。这次结集主要依据《国王哲哲梦境授记经》中所说：“真实圆满正等觉迦叶佛告哲哲国王言：‘国王，你在梦中见十八人同扯一匹布，即预示释迦佛教法分成十八部，每一块布不曾毁坏预示十八部每一部均有解脱。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "弘法", "title": "第三次结集（克什米尔说法）", "participants": [{"entity": "妙辐", "role": "领衔者"}, {"entity": "瓦色莫札", "role": "参与者"}, {"entity": "五百阿罗汉", "role": "参与者"}, {"entity": "五百菩萨", "role": "参与者"}], "location": "耳饰精舍", "time_info": "", "layers": ["传闻"], "quote": "比如克什米尔的论师们认为：“在克什米尔境内的耳饰精舍，圣者妙辐等五百阿罗汉、瓦色莫札等四百大尊者以及五百菩萨作第三次结集。”印度的部分班智达则认为：“第三次结集是在匝兰绕静处革瓦那精舍，由五百罗汉、五千大尊者结集的。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "弘法", "title": "第三次结集（印度班智达说法）", "participants": [{"entity": "五百阿罗汉", "role": "参与者"}], "location": "革瓦那精舍", "time_info": "", "layers": ["传闻"], "quote": "”印度的部分班智达则认为：“第三次结集是在匝兰绕静处革瓦那精舍，由五百罗汉、五千大尊者结集的。”按照当代藏地一致共许的观点来说，佛陀入灭后接近四百年时，五百罗汉、五百或一万六千菩萨集聚一堂作了第三次结集。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "弘法", "title": "第三次结集（藏地共许说法）", "participants": [{"entity": "五百阿罗汉", "role": "参与者"}], "location": "", "time_info": "{'text': '佛陀入灭后接近四百年', 'relative_to': '释迦牟尼佛', 'absolute': None}", "layers": ["传闻"], "quote": "”按照当代藏地一致共许的观点来说，佛陀入灭后接近四百年时，五百罗汉、五百或一万六千菩萨集聚一堂作了第三次结集。诚如《智燃论》中说：“佛陀入灭后过了两百年，长老母之子结集教法。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "授记", "title": "迦叶佛授记释迦佛教法分成十八部", "participants": [{"entity": "迦叶佛", "role": "授记者"}, {"entity": "哲哲国王", "role": "受者"}], "location": "", "time_info": "", "layers": ["授记", "典据"], "quote": "这次结集主要依据《国王哲哲梦境授记经》中所说：“真实圆满正等觉迦叶佛告哲哲国王言：‘国王，你在梦中见十八人同扯一匹布，即预示释迦佛教法分成十八部，每一块布不曾毁坏预示十八部每一部均有解脱。’”在此次结集中，引用此经的教证建立十八部均是清净的佛教，并将律藏立成文字，经藏与论藏先前没有立成文字的也在当时立成文字，以前所有立成文字的也再次作了校订。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "弘法", "title": "大乘结集（不共大乘观点）", "participants": [{"entity": "普贤菩萨", "role": "结集者"}, {"entity": "妙吉祥", "role": "结集经藏"}, {"entity": "密主金刚手菩萨", "role": "结集论藏"}, {"entity": "弥勒菩萨", "role": "结集律藏"}], "location": "布玛萨巴瓦山", "time_info": "", "layers": ["典据"], "quote": "以前的史料中一致记载：“在王舍城的南方布玛萨巴瓦山上，百万菩萨聚集，弥勒结集律藏、文殊结集经藏、金刚手结集论藏。”再有，大乘经藏中说：“所有甚深见派法藏由文殊结集，所有广大行派法藏由弥勒结集。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "传法", "title": "佛陀分坐垫让迦叶为继承人", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}, {"entity": "大迦叶", "role": "受法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "”三、教藏交付传代之情节：\n迦叶尊者\n佛陀在世时把一半坐垫分给大迦叶尊者，让他作为自己的继承人。也就是说，佛陀将佛法交付给大迦叶及十六大阿罗汉 43 。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "出家受戒", "title": "迦叶在佛陀面前出家获得比丘戒", "participants": [{"entity": "大迦叶", "role": "受戒者"}, {"entity": "释迦牟尼佛", "role": "亲教师"}], "location": "哦芒塔", "time_info": "{'text': '释迦世尊现前成佛还没过多久', 'relative_to': '释迦牟尼佛', 'absolute': None}", "layers": ["史传"], "quote": "迦叶一见到佛陀就生起了本师之想，不禁脱口说了三遍“世尊是我之导师，我是世尊之声闻”。佛陀回应“我是汝之本师，汝是我之声闻”三遍完毕，迦叶即已获得比丘戒，他在佛弟子当中被赞为“头陀行 44 第一”。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "弘法", "title": "迦叶护持佛教四十余年", "participants": [{"entity": "大迦叶", "role": "主体"}], "location": "", "time_info": "{'text': '四十多年', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "迦叶尊者认真结集了佛经并且护持佛教，经历了四十多年的悠悠岁月，许多所化众生在这期间被引导趋入解脱，因此他对佛教做出了巨大贡献。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "传法", "title": "迦叶将佛法交传与阿难", "participants": [{"entity": "大迦叶", "role": "主体"}, {"entity": "阿难", "role": "受法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "当自己要趣入涅槃之时，迦叶尊者对阿难说：“阿难，你要知道，本师佛陀将圣教交付与我而趣入涅槃，现在我也将要入灭，因此以后佛法由你护持，你将来再交传与麻衣。”说完他对所有佛舍利塔及佛牙塔进行供养，之后便登上位于南方的鸡足山，他刚到那里，山门自然打开，他在中央铺上草垫，披上世尊的粪扫祖衣，加持遗体不坏一直保持到弥勒成佛，接着示现众多神变而趣入涅槃。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "圆寂", "title": "迦叶于鸡足山趣入涅槃", "participants": [{"entity": "大迦叶", "role": "主体"}], "location": "鸡足山", "time_info": "", "layers": ["史传"], "quote": "”说完他对所有佛舍利塔及佛牙塔进行供养，之后便登上位于南方的鸡足山，他刚到那里，山门自然打开，他在中央铺上草垫，披上世尊的粪扫祖衣，加持遗体不坏一直保持到弥勒成佛，接着示现众多神变而趣入涅槃。诸位天人供\n养，整个山门又闭合，迦叶尊者又作加持：当未生怨王前来朝见之时此门再打开。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "神变", "title": "迦叶加持遗体不坏至弥勒成佛", "participants": [{"entity": "大迦叶", "role": "主体"}], "location": "鸡足山", "time_info": "", "layers": ["神变"], "quote": "”说完他对所有佛舍利塔及佛牙塔进行供养，之后便登上位于南方的鸡足山，他刚到那里，山门自然打开，他在中央铺上草垫，披上世尊的粪扫祖衣，加持遗体不坏一直保持到弥勒成佛，接着示现众多神变而趣入涅槃。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "授记", "title": "阿难转述弥勒佛将展示迦叶遗体之授记", "participants": [{"entity": "阿难", "role": "授记转述者"}, {"entity": "弥勒菩萨", "role": "授记中主体"}, {"entity": "大迦叶", "role": "授记中客体"}], "location": "鸡足山", "time_info": "", "layers": ["授记"], "quote": "到那时，弥勒佛与首批眷属九十九俱胝声闻弟子来到此地，他将尊者的遗体放在掌中说：‘这是释迦佛声闻弟子中头陀第一的尊者，他身披的祖衣也是释迦佛陀的祖衣。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "建寺", "title": "阿难与未生怨王在鸡足山顶建造遗塔", "participants": [{"entity": "阿难", "role": "主体"}, {"entity": "未生怨王", "role": "主体"}], "location": "鸡足山", "time_info": "", "layers": ["史传"], "quote": "后来阿难与未生怨王在鸡足山顶建造了遗塔。\n阿难尊者阿难尊者，其实就是佛陀的叔父甘露饭之子，当释迦牟尼成佛的时候他与罗睺罗 45 同时诞生。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "出家受戒", "title": "阿难在十力迦叶前按次第受戒", "participants": [{"entity": "阿难", "role": "受戒者"}, {"entity": "十力迦叶", "role": "亲教师"}], "location": "", "time_info": "{'text': '释迦成佛后六年', 'relative_to': '释迦牟尼佛', 'absolute': None}", "layers": ["史传"], "quote": "过了六年作为佛陀父子相会之际，世尊把阿难交给十力迦叶，并以现今的仪轨按次第给他传戒。他后来当佛陀的侍者，并被赞为佛弟子中“多闻第一”。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "弘法", "title": "阿难护持佛教四十余年", "participants": [{"entity": "阿难", "role": "主体"}], "location": "", "time_info": "{'text': '四十年之余', 'relative_to': None, 'absolute': None}", "layers": ["史传"], "quote": "阿难护持佛教有四十年之余。随后如前面一样教诫麻衣说：“佛陀把佛法交传与迦叶，迦叶又付教于我，我也即将入灭，因此由你来护持佛教。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "传法", "title": "阿难将佛法交传麻衣", "participants": [{"entity": "阿难", "role": "主体"}, {"entity": "麻衣", "role": "受法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "随后如前面一样教诫麻衣说：“佛陀把佛法交传与迦叶，迦叶又付教于我，我也即将入灭，因此由你来护持佛教。将来在觉拉地方摩仁达山，有商主之子那达和帕达建造精舍并作为施主。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "出家受戒", "title": "阿难在恒河中央为五百仙人传比丘戒", "participants": [{"entity": "阿难", "role": "亲教师"}], "location": "恒河", "time_info": "", "layers": ["史传", "神变"], "quote": "阿难到达恒河中央的时候，有一位携带五百眷属的仙人在他面前请求出家，阿难便在恒河中央幻化一座岛\n屿，在那里为他们传了比丘戒。仙人刚刚受戒即刻证得阿罗汉果位，所以就被人们共称为“日中罗汉”或者“水中罗汉”。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "授记", "title": "佛陀授记日中罗汉将在克什米尔弘法", "participants": [{"entity": "释迦牟尼佛", "role": "授记者"}, {"entity": "日中罗汉", "role": "受者"}], "location": "", "time_info": "", "layers": ["授记"], "quote": "他在传戒师面前请求先行入灭。阿难对他说：“佛陀授记你将来在克什米尔弘扬佛法，当如此而行。”日中罗汉也承诺依教奉行。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "圆寂", "title": "阿难在恒河中央示现涅槃", "participants": [{"entity": "阿难", "role": "主体"}, {"entity": "未生怨王", "role": "见证者"}], "location": "恒河", "time_info": "", "layers": ["史传"], "quote": "”日中罗汉也承诺依教奉行。阿难尊者随即示现种种神变而入灭。他的遗体一半交与未生怨王，一半由广严城民众带走，在广严城与萨那哦城建塔。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "授记", "title": "佛在《文殊根本续》中授记阿育王出世", "participants": [{"entity": "释迦牟尼佛", "role": "授记者"}, {"entity": "阿育王", "role": "受记者"}], "location": "", "time_info": "{'text': '佛陀入灭后一百年', 'relative_to': '释迦牟尼佛', 'absolute': None}", "layers": ["授记", "典据"], "quote": "这位国王，按照佛在《文殊根本续》中授记：“佛陀入灭后一百年出世，寿命达一百五十，八十七年供养佛塔，依此从七座舍利塔中出现佛舍利，在南赡部洲四面八方建造八万四千七宝塔。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "建寺", "title": "阿育王建造八万四千七宝塔", "participants": [{"entity": "阿育王", "role": "主体"}, {"entity": "香达夜叉", "role": "协助者"}], "location": "南赡部洲", "time_info": "{'text': '佛陀入灭后一百年', 'relative_to': '释迦牟尼佛', 'absolute': None}", "layers": ["史传"], "quote": "这位国王，按照佛在《文殊根本续》中授记：“佛陀入灭后一百年出世，寿命达一百五十，八十七年供养佛塔，依此从七座舍利塔中出现佛舍利，在南赡部洲四面八方建造八万四千七宝塔。”香达夜叉协助建造。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "开光", "title": "麻衣罗汉为阿育王佛塔开光", "participants": [{"entity": "麻衣", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "所有罗汉一致赞叹说：“无忧王住迦纳哦，大兴广造七宝塔，彼之威力此大地，成为宏愿真庄严。”麻衣罗汉对这些佛塔作了开光，并将佛法交传与小护以后趣入涅槃。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "传法", "title": "麻衣将佛法交传与小护", "participants": [{"entity": "麻衣", "role": "主体"}, {"entity": "小护", "role": "受法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "”麻衣罗汉对这些佛塔作了开光，并将佛法交传与小护以后趣入涅槃。\n小护尊者关于小护，一致共称佛在《杂阿含经》中亲自如此授记：“我入灭后百年时卖香者护藏之子名为小护，出家后成为无相佛，行持如来事业。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "授记", "title": "佛在《杂阿含经》中授记小护出家", "participants": [{"entity": "释迦牟尼佛", "role": "授记者"}, {"entity": "小护", "role": "受记者"}], "location": "", "time_info": "{'text': '佛入灭后百年', 'relative_to': '释迦牟尼佛', 'absolute': None}", "layers": ["授记", "典据"], "quote": "小护尊者关于小护，一致共称佛在《杂阿含经》中亲自如此授记：“我入灭后百年时卖香者护藏之子名为小护，出家后成为无相佛，行持如来事业。”众所周知，小护出家修道，并且成为三藏罗汉，在他为眷属讲经说法之时，魔王波旬示现幻变让他的所有眷属心不在焉，给他们证果制造障碍。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "降伏非人", "title": "小护以三尸花鬘降伏魔王波旬", "participants": [{"entity": "小护", "role": "主体"}, {"entity": "魔王波旬", "role": "被降伏者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "”众所周知，小护出家修道，并且成为三藏罗汉，在他为眷属讲经说法之时，魔王波旬示现幻变让他的所有眷属心不在焉，给他们证果制造障碍。小护幻化出三尸花鬘，系在魔王的头上，结果当他一生起恶心时就感到臭气难熏，一旦生起善心，就会现出鲜花的本面。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "传法", "title": "小护将佛法交付有愧", "participants": [{"entity": "小护", "role": "主体"}, {"entity": "有愧", "role": "受法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "小护把佛法交付于有愧后便趣入涅槃。\n有愧尊者有愧也是一位精通三藏的阿罗汉，他将佛法交付给摩竭陀国的圣者黑色后便趣入涅槃。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "传法", "title": "有愧将佛法交付黑色", "participants": [{"entity": "有愧", "role": "主体"}, {"entity": "黑色", "role": "受法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "有愧尊者有愧也是一位精通三藏的阿罗汉，他将佛法交付给摩竭陀国的圣者黑色后便趣入涅槃。\n黑色尊者圣者黑色也是精通三藏的阿罗汉，他广泛护持佛法，最后交付给善见，便入于寂灭。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "传法", "title": "黑色将佛法交付善见", "participants": [{"entity": "黑色", "role": "主体"}, {"entity": "善见", "role": "受法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "黑色尊者圣者黑色也是精通三藏的阿罗汉，他广泛护持佛法，最后交付给善见，便入于寂灭。有些论师将日中罗汉加在付法藏师中来算，但自宗认为是龙树菩萨以上的七位。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "弘法", "title": "十六大罗汉在四大部洲三十三天等护持佛法", "participants": [{"entity": "十六大阿罗汉", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "特别是十六大罗汉在四大部洲、三十三天等各境，与五百阿罗汉等一起护持佛法如意宝，在汉地唐玄宗、薛禅皇帝 46 、益旺大帝的时代，人们可以现量见到他们，除此之外，其他普通人是看不见的，就像虹身成就者一样。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "降伏非人", "title": "日中罗汉以跏趺镇压克什米尔龙类", "participants": [{"entity": "日中罗汉", "role": "主体"}], "location": "克什米尔", "time_info": "{'text': '阿难圆寂后接近二十年', 'relative_to': '阿难', 'absolute': None}", "layers": ["神变"], "quote": "正如此授记所说一样，阿难圆寂后接近二十年的时候，日中罗汉发现授记的时间已到，于是到了克什米尔，在有湖泊的九个山谷汇合处，以一跏趺进行镇压，结果惊扰了龙类。龙类使大地震动，并降下瓢泼大雨，可是日中罗汉连法衣边也没有动摇，并且把剑刃雨变成鲜花，使得龙类倍感稀奇，问他有何吩咐？罗汉回答说：“我是佛陀授记来到此处，请施给我这块地。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "弘法", "title": "日中罗汉在克什米尔建立佛法", "participants": [{"entity": "日中罗汉", "role": "主体"}], "location": "克什米尔", "time_info": "", "layers": ["史传"], "quote": "他让魔术师作幻化城，他加持一直保持完美不坏。并让民众安居该城，他又从香醉山取来藏红花，并加持直至佛法住世期间此花常开，就这样形成了有许多城市、极其赏心悦目的地方，如今仍旧被人们称为迦湿弥罗国。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "传法", "title": "文殊菩萨以比丘相对护月国王宣讲大乘法", "participants": [{"entity": "妙吉祥", "role": "主体"}, {"entity": "护月", "role": "受法者"}], "location": "邬哲波夏", "time_info": "{'text': '大莲花王时期稍稍过后', 'relative_to': '大莲花王', 'absolute': None}", "layers": ["史传"], "quote": "特别是大乘，在大莲花王时期稍稍过后，邬哲波夏地方出现了一位名叫护月的国王，圣者文殊菩萨以比丘相来到他的王宫，对护月国王相应宣讲大乘法，并且留下了一本经函。显宗的观点认为这本经函是《般若八千颂》。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "传法", "title": "佛陀将续部交传邬金国王恩札布德", "participants": [{"entity": "释迦牟尼佛", "role": "主体"}, {"entity": "恩札布德", "role": "受法者"}], "location": "邬金", "time_info": "", "layers": ["传闻"], "quote": "密宗的所有续部，根据在印度佛法完好无损的时候所翻译以及后来几经沉浮时翻译的差别出现了旧派、新派不同的历史，关于自宗前译密宗的详细观点在下文中予以阐述。按照密宗新派的观点，也有说佛陀将所有续部交传给邬金国王恩札布德；也有说是金刚手菩萨交付的。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "传法", "title": "金刚手菩萨将续部交传恩札布德", "participants": [{"entity": "密主金刚手菩萨", "role": "主体"}, {"entity": "恩札布德", "role": "受法者"}], "location": "邬金", "time_info": "", "layers": ["传闻"], "quote": "按照密宗新派的观点，也有说佛陀将所有续部交传给邬金国王恩札布德；也有说是金刚手菩萨交付的。不管怎么说，国王的确是将所有续部造成经函，并且为众生宣讲，因此在他的境内包括细微含生在内都获得了成就，并变成虹身。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "弘法", "title": "恩札布德在邬金宣讲续部使境内众生获得成就", "participants": [{"entity": "恩札布德", "role": "主体"}], "location": "邬金", "time_info": "", "layers": ["史传"], "quote": "不管怎么说，国王的确是将所有续部造成经函，并且为众生宣讲，因此在他的境内包括细微含生在内都获得了成就，并变成虹身。在此之后，邬金地方空空如也，形成了汪洋，里面充满龙类。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "传法", "title": "密主金刚手为邬金龙类宣讲续部", "participants": [{"entity": "密主金刚手菩萨", "role": "主体"}], "location": "邬金", "time_info": "", "layers": ["史传"], "quote": "在此之后，邬金地方空空如也，形成了汪洋，里面充满龙类。密主为这些龙类，宣讲续部并且使它们相续得以成熟，渐渐地，它们都转生为人，在海岸边营造城区，实地修行，最终获得成就。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "伏藏开取", "title": "瓦色嘎巴从黑日嘎殿堂取出《密集续》", "participants": [{"entity": "瓦色嘎巴", "role": "主体"}], "location": "黑日嘎殿堂", "time_info": "", "layers": ["史传"], "quote": "在黑日嘎殿堂的仓库里保存着所有续部经函，后来国王瓦色嘎巴从中\n取出《密集续》，龙树菩萨取出《喜金刚》，革革热巴取出《玛哈玛雅》、《大威德续》等，诸位大成就者从那里取出了大多数续部。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "伏藏开取", "title": "龙树菩萨从黑日嘎殿堂取出《喜金刚》", "participants": [{"entity": "圣龙树", "role": "主体"}], "location": "黑日嘎殿堂", "time_info": "", "layers": ["史传"], "quote": "在黑日嘎殿堂的仓库里保存着所有续部经函，后来国王瓦色嘎巴从中\n取出《密集续》，龙树菩萨取出《喜金刚》，革革热巴取出《玛哈玛雅》、《大威德续》等，诸位大成就者从那里取出了大多数续部。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "伏藏开取", "title": "革革热巴从黑日嘎殿堂取出《玛哈玛雅》《大威德续》等", "participants": [{"entity": "革革热巴", "role": "主体"}], "location": "黑日嘎殿堂", "time_info": "", "layers": ["史传"], "quote": "在黑日嘎殿堂的仓库里保存着所有续部经函，后来国王瓦色嘎巴从中\n取出《密集续》，龙树菩萨取出《喜金刚》，革革热巴取出《玛哈玛雅》、《大威德续》等，诸位大成就者从那里取出了大多数续部。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "伏藏开取", "title": "则乐巴从香巴拉取来《时轮金刚》", "participants": [{"entity": "则乐巴", "role": "主体"}], "location": "香巴拉", "time_info": "", "layers": ["史传"], "quote": "在黑日嘎殿堂的仓库里保存着所有续部经函，后来国王瓦色嘎巴从中\n取出《密集续》，龙树菩萨取出《喜金刚》，革革热巴取出《玛哈玛雅》、《大威德续》等，诸位大成就者从那里取出了大多数续部。同样，则乐巴等从香巴拉取来《时轮金刚》等，也有从别处取到而弘扬开来的。", "chapter": "《藏密佛教史》> 第一品 佛教总况"}, {"type": "传法", "title": "普贤如来在密严刹土以金刚持形象转密意法轮", "participants": [{"entity": "普贤如来", "role": "主体"}, {"entity": "五部佛", "role": "受法者"}], "location": "密严刹土", "time_info": "", "layers": ["典据"], "quote": "如来密意传\n轮回、涅槃的总体遍主第六部普贤如来在自现法界刹土极其清净的金刚大密严刹中，以相好圆满的金刚持形象，于自性无二的眷属补处五部佛 47 及自现眷属显现为如来的无量寂猛坛城相者面前，以远离一切言词、法性不可思议的实相真如本智密意作加持，使他们证悟实相，对此以名言假立为法身之语。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "报身佛对大菩萨金刚手、观世音、妙吉祥等转无上瑜伽乘法轮", "participants": [{"entity": "普贤如来", "role": "主体"}, {"entity": "密主金刚手菩萨", "role": "受法者"}, {"entity": "观音", "role": "受法者"}, {"entity": "文殊", "role": "受法者"}], "location": "密严刹土", "time_info": "", "layers": ["典据"], "quote": "其中十地相续末际的诸大圣者前显现的他现所摄殊胜圆满受用报身刹土——密严刹土中，以第六部的形象、五部的本师相，对殊胜觉性的眷属大菩萨金刚手、观世音、妙吉祥等根境清净相之果的诸位菩萨，通过密意表示恒常不断转了不可言说的无上瑜伽乘法轮。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "结集", "title": "密主金刚手结集大圆满等绝大多数续", "participants": [{"entity": "密主金刚手菩萨", "role": "主体"}, {"entity": "金刚法", "role": "协作者"}, {"entity": "金刚藏", "role": "协作者"}, {"entity": "文殊", "role": "协作者"}, {"entity": "观音", "role": "协作者"}, {"entity": "嘎绕多吉", "role": "协作者"}], "location": "", "time_info": "", "layers": ["典据"], "quote": "”此外，大圆满等绝大多数续是由密主金刚手以及金刚法、金刚藏、文殊菩萨、观世音菩萨、化身极喜金刚等结集，也有布那寂静空行母等空行母众结集的，还有所化天龙夜叉等不定种姓众作结集的。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "结集", "title": "妙月结集《时轮金刚》，金刚藏结集《喜金刚》等", "participants": [{"entity": "妙月", "role": "主体"}, {"entity": "金刚藏", "role": "主体"}, {"entity": "密主金刚手菩萨", "role": "主体"}, {"entity": "金刚亥母", "role": "主体"}], "location": "", "time_info": "", "layers": ["典据"], "quote": "也有说原本续部均是由密主金刚手结集的，分别的所有续部，求法者是谁，结集者也就是他。《时轮金刚》是由妙月结集、《喜金刚》由金刚藏结集、《戒生续》由金刚手结集、《金刚空行续》由金刚亥母结集。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "文殊菩萨示现锐利金刚童子在天界传法", "participants": [{"entity": "文殊", "role": "主体"}, {"entity": "具称胜护天人", "role": "受法者"}], "location": "天界", "time_info": "", "layers": ["典据"], "quote": "具体来说，文殊菩萨示现锐利金刚童子的庄严身相，在天界为具称胜护天人讲解，具称胜护天人——光耀珍宝梵天——众生主梵天——度众梵天——具髻梵天——帝释天王——十万天人持明众。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "天界持明传承：具称胜护天人至十万天人持明众", "participants": [{"entity": "具称胜护天人", "role": "传法者"}, {"entity": "光耀珍宝梵天", "role": "受法者"}, {"entity": "众生主梵天", "role": "受法者"}, {"entity": "度众梵天", "role": "受法者"}, {"entity": "具髻梵天", "role": "受法者"}, {"entity": "帝释天王", "role": "受法者"}, {"entity": "十万天人持明众", "role": "受法者"}], "location": "天界", "time_info": "", "layers": ["典据"], "quote": "具体来说，文殊菩萨示现锐利金刚童子的庄严身相，在天界为具称胜护天人讲解，具称胜护天人——光耀珍宝梵天——众生主梵天——度众梵天——具髻梵天——帝释天王——十万天人持明众。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "观世音菩萨示现甘露药身相在龙宫传法", "participants": [{"entity": "观音", "role": "主体"}, {"entity": "黑喉龙王", "role": "受法者"}], "location": "龙宫", "time_info": "", "layers": ["典据"], "quote": "观世音菩萨示现甘露药的身相，\n在龙宫为黑喉龙王讲解，黑喉龙王——嘎德玛龙母——德仓玛龙母——意喜龙——安置龙——十万龙持明众。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "龙宫持明传承：黑喉龙王至十万龙持明众", "participants": [{"entity": "黑喉龙王", "role": "传法者"}, {"entity": "嘎德玛龙母", "role": "受法者"}, {"entity": "德仓玛龙母", "role": "受法者"}, {"entity": "意喜龙", "role": "受法者"}, {"entity": "安置龙", "role": "受法者"}, {"entity": "十万龙持明众", "role": "受法者"}], "location": "龙宫", "time_info": "", "layers": ["典据"], "quote": "观世音菩萨示现甘露药的身相，\n在龙宫为黑喉龙王讲解，黑喉龙王——嘎德玛龙母——德仓玛龙母——意喜龙——安置龙——十万龙持明众。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "金刚手菩萨示现忿怒身相在夜叉境传法", "participants": [{"entity": "密主金刚手菩萨", "role": "主体"}, {"entity": "普贤夜叉", "role": "受法者"}], "location": "夜叉境", "time_info": "", "layers": ["典据"], "quote": "金刚手菩萨示现忿怒可怖的威猛身相，在夜叉境内为普贤夜叉传讲，普贤夜叉——金刚手夜叉——具称护方夜叉——流星面夜叉——十万夜叉持明众，他们也是为各自的众眷属宣讲，结果连同眷属全部证得金刚持果位。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "夜叉持明传承：普贤夜叉至十万夜叉持明众", "participants": [{"entity": "普贤夜叉", "role": "传法者"}, {"entity": "金刚手夜叉", "role": "受法者"}, {"entity": "具称护方夜叉", "role": "受法者"}, {"entity": "流星面夜叉", "role": "受法者"}, {"entity": "十万夜叉持明众", "role": "受法者"}], "location": "夜叉境", "time_info": "", "layers": ["典据"], "quote": "金刚手菩萨示现忿怒可怖的威猛身相，在夜叉境内为普贤夜叉传讲，普贤夜叉——金刚手夜叉——具称护方夜叉——流星面夜叉——十万夜叉持明众，他们也是为各自的众眷属宣讲，结果连同眷属全部证得金刚持果位。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "灌顶", "title": "金刚萨埵为胜心天子授如来方便灌顶并传大圆满窍诀", "participants": [{"entity": "金刚萨埵", "role": "灌顶师"}, {"entity": "胜心天子", "role": "受者"}], "location": "三十三天", "time_info": "", "layers": ["典据"], "quote": "大圆满法在（天界弘扬的情况：）三十三天护贤之子胜心出现四种殊胜梦兆，与之相应，金刚萨埵依靠十方三世一切佛陀及所有五部如来的加持，为胜心天子授予如来方便灌顶，并且恩赐大圆满所有窍诀，随后他在天界弘扬开来。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "弘法", "title": "胜心天子在天界弘扬大圆满", "participants": [{"entity": "胜心天子", "role": "主体"}], "location": "天界", "time_info": "", "layers": ["典据"], "quote": "大圆满法在（天界弘扬的情况：）三十三天护贤之子胜心出现四种殊胜梦兆，与之相应，金刚萨埵依靠十方三世一切佛陀及所有五部如来的加持，为胜心天子授予如来方便灌顶，并且恩赐大圆满所有窍诀，随后他在天界弘扬开来。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "集会", "title": "圣种五贤聚集玛拉雅山顶哀叹佛陀涅槃", "participants": [{"entity": "圣种五贤", "role": "主体"}, {"entity": "具称胜护天人", "role": "成员"}, {"entity": "安置龙", "role": "成员"}, {"entity": "流星面夜叉", "role": "成员"}, {"entity": "慧方便罗刹", "role": "成员"}, {"entity": "乐匝布无垢称", "role": "成员"}], "location": "玛拉雅山", "time_info": "佛陀入灭后二十八年", "layers": ["史传"], "quote": "”佛陀的殊胜化身入灭后过了二十八年的时候，具称胜护天人、安置龙王、流星面夜叉、慧方便罗刹、乐匝布无垢称——圣种五贤以各自的神通知道世间怙主佛陀趣入大涅槃以后，从境界中起定，依靠神变聚集在楞伽境内的玛拉雅山顶上，他们念诵“呜呼哀哉极悲切，导师日光若隐没，世间黑暗孰能除……”二十三句悲哀之词，并且嚎啕大哭。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "密主金刚手在玛拉雅山顶为圣种五贤传密法", "participants": [{"entity": "密主金刚手菩萨", "role": "主体"}, {"entity": "圣种五贤", "role": "受法者"}], "location": "玛拉雅山", "time_info": "佛陀入灭后二十八年", "layers": ["史传"], "quote": "密主金刚手……就现身在玛拉雅山顶，为圣种五贤及其他多数持明僧众重复宣讲了以前本师在密严刹土等处宣说的所有密乘佛法", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "伏藏", "title": "慧方便罗刹将密法以蓝琉璃液写金函隐藏于虚空界", "participants": [{"entity": "慧方便罗刹", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "按照世尊授记“密宗将来普传世间”时间已到之际，密主金刚手在如来前已经得受宣讲密宗，赐灌顶，所以就现身在玛拉雅山顶，为圣种五贤及其他多数持明僧众重复宣讲了以前本师在密严刹土等处宣说的所有密乘佛法。这所有密法由慧方便罗刹用蓝琉璃液写在金函上，以密意七妙力印持而隐藏在虚空界中。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "调伏", "title": "嘎哈那巴调伏大罗刹女布夏热波及五百眷属", "participants": [{"entity": "嘎哈那巴", "role": "主体"}, {"entity": "布夏热波", "role": "受调伏者"}], "location": "楞伽国", "time_info": "", "layers": ["史传"], "quote": "大阿阇黎嘎哈那巴到了那里，调伏了一位名叫布夏热波的大罗刹女和她的五百眷属，并且将密法弘扬开来……后来，大乘阿阇黎楞伽嘉瓦桑波诞生，簪札贡美 51 也来到了该地。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "弘法", "title": "莲花生大士师徒在楞伽住六年后到印度", "participants": [{"entity": "莲花生大士", "role": "主体"}], "location": "楞伽国", "time_info": "六年", "layers": ["史传"], "quote": "在它的中央，有一座名叫玛那革札（意为意贤积）的丘壑，在这以上是连绵起伏的岩山环绕，所以一般人是无法行走的。莲花生大士师徒也到那里住了六年才到印度的。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "弘法", "title": "国王拉卡阿秀迎请五百论师住阿白山精舍弘扬大乘", "participants": [{"entity": "国王拉卡阿秀", "role": "祈请者"}, {"entity": "五百阿阇黎", "role": "主体"}], "location": "阿白山", "time_info": "国王嘎讷卡之子掌权时期", "layers": ["史传"], "quote": "西方的国王拉卡阿秀迎请这五百论师，请他们住在建于阿白山顶峰的精舍中，而且国王命自己手下的五百名有敏锐智慧的眷属也出家为僧，在五百位上师前听闻大乘法。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "神变", "title": "密法经函及金刚手一肘像降落到国王匝王宫", "participants": [{"entity": "国王匝", "role": "受者"}, {"entity": "金刚手一肘像", "role": "圣物"}, {"entity": "佛陀平等行续", "role": "法藏"}], "location": "萨霍", "time_info": "", "layers": ["神变"], "quote": "不管怎样，国王匝修行下续部瑜伽安住期间，与先前的梦兆一致，在他的王宫上真正降落了《佛陀平等行续》等密宗所有大法藏以及密主金刚手的一肘像。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "修行成就", "title": "国王匝修行七月亲见金刚萨埵并得智慧灌顶", "participants": [{"entity": "国王匝", "role": "主体"}, {"entity": "金刚萨埵", "role": "本尊"}], "location": "", "time_info": "七个月", "layers": ["神变"], "quote": "于是他虔诚祈祷，结果通达了其中的《面见金刚萨埵品》，随后他依靠《面见金刚萨埵品》与金刚手菩萨像修行了七个月，由此亲见金刚萨埵尊颜并且得受了智慧灌顶，最后对经函的句义无余精通。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "革革燃匝通达续部后得金刚萨埵授记、密主金刚手降临传灌顶", "participants": [{"entity": "革革燃匝", "role": "受法者"}, {"entity": "金刚萨埵", "role": "授记者"}, {"entity": "密主金刚手菩萨", "role": "灌顶师"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "”国王匝把所有经函给萨霍地方大名鼎鼎的上师俄巴燃匝看，结果他并没有理解句义，随后又给革革燃匝阿阇黎看，他通达了《金刚萨埵幻化网·面见金刚萨埵品》，经过修行，金刚萨埵现身并预言说：“所有续义将由密主金刚手来宣讲。”他仍然继续修行，结果密主金刚手直接降临，为他传授了圆满义教诸乘的灌顶。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "革革燃匝分十八大续部传给国王匝", "participants": [{"entity": "革革燃匝", "role": "主体"}, {"entity": "国王匝", "role": "受法者"}, {"entity": "十八大续部", "role": "法门"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "”阿阇黎革革燃匝依照密主言教奉行，将续部分成十八大续部以后传授给国王匝，国王匝所著的《幻化道庄严论》中说：“东方恩札之山谷，嘉龙金刚积聚处，具种恩札布德我，密主亲自而宣说，幻化网续之修行，随同五万眷属众，现前成就金刚手，无有罪恶而善灌，舍取禁行之顶也，复次弘扬于人间。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "修行成就", "title": "革革燃匝行持禁行十二年证得大手印悉地", "participants": [{"entity": "革革燃匝", "role": "主体"}], "location": "", "time_info": "十二年", "layers": ["史传"], "quote": "他白天为数以千计狗形象的勇士及瑜伽母讲法，晚上就和他们一起前赴尸陀林作会供等誓言普行，就这样行持了十二年，最终证得大手印悉地。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "十八大续部传承链：国王匝至公主贡玛德波", "participants": [{"entity": "国王匝", "role": "传法者"}, {"entity": "革革燃匝", "role": "传承者"}, {"entity": "太子德札布哲", "role": "传承者"}, {"entity": "桑哈燃匝", "role": "传承者"}, {"entity": "夏札布德", "role": "传承者"}, {"entity": "公主贡玛德波", "role": "传承者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "国王匝将这所有续部传给革革燃匝——太子德札布哲或者小恩札布德——桑哈燃匝——夏札布德或俄巴燃匝——公主贡玛德波，他们连同各自的眷属群体依靠众会修行道而趋至金刚持果位。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "国王匝将大乐光明教言传匝兰达热巴", "participants": [{"entity": "国王匝", "role": "主体"}, {"entity": "匝兰达热", "role": "受法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "印度的诸位大成就者普遍开悟的续部、教言几乎都是来源于这位国王种姓的阿阇黎。所有大乐光明教言，国王匝恩赐与哲土雪巴或者匝兰达热巴，匝兰达热巴传授给黑行尊者及其徒众，一脉相承。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "匝兰达热巴传法给黑行尊者及其徒众", "participants": [{"entity": "匝兰达热", "role": "主体"}, {"entity": "黑行尊者", "role": "受法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "印度的诸位大成就者普遍开悟的续部、教言几乎都是来源于这位国王种姓的阿阇黎。所有大乐光明教言，国王匝恩赐与哲土雪巴或者匝兰达热巴，匝兰达热巴传授给黑行尊者及其徒众，一脉相承。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "业手印传承：公主贡玛德波—革革燃匝—嘎毕多吉与佛密", "participants": [{"entity": "公主贡玛德波", "role": "传法者"}, {"entity": "革革燃匝", "role": "传承者"}, {"entity": "嘎毕多吉", "role": "受法者"}, {"entity": "佛密", "role": "受法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "帝洛巴与那诺巴师徒的法脉全部都是来源于这一传承。再有，业手印传承的起源也是他，公主贡玛德波——革革燃匝——嘎毕多吉与佛密。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "神变", "title": "嘎毕多吉修真实名经时文殊画像面部发光", "participants": [{"entity": "嘎毕多吉", "role": "主体"}, {"entity": "真实名经", "role": "法门"}], "location": "邬金", "time_info": "", "layers": ["神变"], "quote": "一次，他在邬金禅玛德玛的地方修行圣者文殊菩萨的《真实名经》修法，当接近成就之时，文殊菩萨的画像面部发光，照到该洲很远的地方，因此人们尊称他为“同日”。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "神变", "title": "嘎毕多吉化现多种形象避免被害", "participants": [{"entity": "嘎毕多吉", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "在另一个时候，一个有邪见的修行人需要内道班智达五根的修行圣物，前来暗害嘎毕多吉，这时他化现为大象、骏马、童子、童女、水牛、孔雀等各种各样的形象。那人不知大师到底是哪一个，于是返回去了，由此他被人们共称为“种种相”。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "弘法", "title": "嘎毕多吉在那烂陀寺住十年护持密法", "participants": [{"entity": "嘎毕多吉", "role": "主体"}], "location": "那烂陀寺", "time_info": "十年", "layers": ["史传"], "quote": "这位大师，总的来说精通一切续部，特别对《幻化网》通达无碍，并且获得成就。他在那烂陀寺也住了十年，一直护持密法。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "修行成就", "title": "嘎毕多吉次第证得金刚身", "participants": [{"entity": "嘎毕多吉", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "他也著写了《俱生修法》等及《密藏续·巴卡释》、《心滴》、《六次第论》、\n《开显誓言论》、《随眠论》等等有关幻化网方面的数多论典，并且大范围传讲，他是次第证得金刚身的。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "佛智阿阇黎在嘎毕多吉前闻修五内续部获智慧自在", "participants": [{"entity": "佛智", "role": "受法者"}, {"entity": "嘎毕多吉", "role": "主体"}, {"entity": "幻化网", "role": "法门"}, {"entity": "佛陀平等行续", "role": "法门"}, {"entity": "密集续", "role": "法门"}, {"entity": "月密明点续", "role": "法门"}], "location": "邬金", "time_info": "", "layers": ["史传"], "quote": "佛智阿阇黎也在嘎毕多吉前通过听闻、修行《幻化网》、《平等行续》、《密集续》、《月密明点续》十八续部之首五内续部而获得智慧自在，因为他的言教中说：“后往功德源泉邬金境，尽人皆知玖给多吉尊，彼前广闻研学即如是……”嘎毕多吉尊者在邬金护持密法的过程中，有一个屠夫的儿子拜见圣天菩萨，得到加持顿然通晓正法，也能不同程度地讲解圣者龙树师徒的密论。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "《密集续·圣类》开始出现——月称传玛当革巴等", "participants": [{"entity": "月称菩萨", "role": "主体"}, {"entity": "玛当革巴", "role": "受法者"}, {"entity": "贡嘎那热种瓦", "role": "受法者"}, {"entity": "明炬论", "role": "法门"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "佛智阿阇黎也在嘎毕多吉前通过听闻、修行《幻化网》、《平等行续》、《密集续》、《月密明点续》十八续部之首五内续部而获得智慧自在，因为他的言教中说：“后往功德源泉邬金境，尽人皆知玖给多吉尊，彼前广闻研学即如是……”嘎毕多吉尊者在邬金护持密法的过程中，有一个屠夫的儿子拜见圣天菩萨，得到加持顿然通晓正法，也能不同程度地讲解圣者龙树师徒的密论。玛当革巴和贡嘎那热种瓦尊者也在月称菩萨面前直接听受，最先得到了《明炬论》的书函。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "神变", "title": "佛密修行圣文殊时出现成就瑞相", "participants": [{"entity": "佛密", "role": "主体"}], "location": "波罗奈斯", "time_info": "", "layers": ["神变"], "quote": "有一次他在波罗奈斯 53 的一处修行本尊圣文殊。一天，文殊画像笑逐颜开，修行圣物——红牛的酥油汁也是滚滚沸腾，凋零的花朵也全部重新绽放。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "佛密在邬金拜见嘎毕多吉聆听瑜伽续及五内续部", "participants": [{"entity": "佛密", "role": "受法者"}, {"entity": "嘎毕多吉", "role": "主体"}, {"entity": "幻化网", "role": "法门"}], "location": "邬金", "time_info": "", "layers": ["史传"], "quote": "可是当他擦去灰尘，将花供在文殊头上，喝了剩下的酥油汁，就祛除了身体的所有病态，体力充沛，智慧极其敏锐，神通获得自在，那时他来到邬金而得以拜见\n嘎毕多吉尊者，聆听了瑜伽续及无上五内续部，尤其精通《幻化网》。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "朝圣", "title": "佛密与佛寂到普陀山朝拜观世音菩萨", "participants": [{"entity": "佛密", "role": "主体"}, {"entity": "佛寂", "role": "主体"}, {"entity": "观音", "role": "圣众"}, {"entity": "圣度母", "role": "圣众"}, {"entity": "颦眉度母", "role": "圣众"}], "location": "普陀山", "time_info": "", "layers": ["神变"], "quote": "还有一次，他与佛寂一同到普陀山朝拜观世音菩萨，到了山脚之时，看见圣度母正在为群龙传法，到了山腰，见到颦眉度母在给非天及夜叉众讲法，到了山顶，看到圣观音真实安坐在那里，这些也是随同各自不同的境界而见到的。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "授记", "title": "圣度母授记佛密去岗底斯雪山修行", "participants": [{"entity": "圣度母", "role": "授记者"}, {"entity": "佛密", "role": "受者"}], "location": "普陀山", "time_info": "", "layers": ["授记"], "quote": "圣度母对他授记说：“去到岗底斯雪山修行吧。”他返回以后在鹿野苑等地多年期间讲经说法，当文殊菩萨如前度母授记一样再次提醒他时，他就到了岗底斯山修行，结果多次见到金刚法界大坛城，并且达到了与文殊菩萨如同人和人对话一样的境界。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "修行成就", "title": "佛密在岗底斯山多次见金刚法界大坛城", "participants": [{"entity": "佛密", "role": "主体"}], "location": "岗底斯山", "time_info": "", "layers": ["神变"], "quote": "”他返回以后在鹿野苑等地多年期间讲经说法，当文殊菩萨如前度母授记一样再次提醒他时，他就到了岗底斯山修行，结果多次见到金刚法界大坛城，并且达到了与文殊菩萨如同人和人对话一样的境界。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "修行成就", "title": "佛密最终虹身而逝", "participants": [{"entity": "佛密", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "有关他对藏地也有深恩厚德的情节在以下行文中将予以阐述。他最终身体消失不见（即虹身而逝）。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "革革燃匝传如朗得为哦哲与仙人巴克达", "participants": [{"entity": "革革燃匝", "role": "主体"}, {"entity": "如朗得为哦哲", "role": "受法者"}, {"entity": "仙人巴克达", "role": "受法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "再者，国王革革燃匝传给如朗得为哦哲与仙人巴克达二人，如朗得为哦哲又传给班则哈赛，这位阿阇黎也著了解释《密集续》的《撷取诸密意疏》以及《大乐修法》等，之后着重传讲。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "如朗得为哦哲传给班则哈赛", "participants": [{"entity": "如朗得为哦哲", "role": "主体"}, {"entity": "班则哈赛", "role": "受法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "再者，国王革革燃匝传给如朗得为哦哲与仙人巴克达二人，如朗得为哦哲又传给班则哈赛，这位阿阇黎也著了解释《密集续》的《撷取诸密意疏》以及《大乐修法》等，之后着重传讲。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "修行成就", "title": "语自在称获语自在成就及大手印持明", "participants": [{"entity": "语自在称", "role": "主体"}, {"entity": "班则哈赛", "role": "传法者"}], "location": "那烂陀寺", "time_info": "", "layers": ["史传"], "quote": "班则哈赛尊者为那烂陀寺的西门护门语自在称传授《戒轮续》的灌顶，也讲解了续部，并将所有教授与随教也恩赐予他。他依靠窍诀修行获得语自在成就，身体也成为双运身，获得大手印持明。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "班则哈赛与仙人巴克达在萨霍传给国王札巴哈德", "participants": [{"entity": "班则哈赛", "role": "主体"}, {"entity": "仙人巴克达", "role": "主体"}, {"entity": "札巴哈德", "role": "受法者"}], "location": "萨霍", "time_info": "", "layers": ["史传"], "quote": "他依靠窍诀修行获得语自在成就，身体也成为双运身，获得大手印持明。班则哈赛大师和仙人巴克达尊者在萨霍传给国王札巴哈德。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "出家受戒", "title": "札巴哈德在寂光与福称面前出家", "participants": [{"entity": "札巴哈德", "role": "受戒者"}, {"entity": "寂光", "role": "亲教师"}, {"entity": "福称", "role": "亲教师"}], "location": "则达瓦山", "time_info": "", "layers": ["史传"], "quote": "班则哈赛大师和仙人巴克达尊者在萨霍传给国王札巴哈德。\n札巴哈德\n国王札巴哈德降生在西方王族当中，在则达瓦山境内的寂光规范师与玛热地方的持戒大师福称面前出家，被共称为释迦光。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "弘法", "title": "札巴哈德与释迦友师徒到克什米尔利益众生", "participants": [{"entity": "札巴哈德", "role": "主体"}, {"entity": "释迦友", "role": "弟子"}], "location": "克什米尔", "time_info": "", "layers": ["史传"], "quote": "阿阇黎札巴哈德的弟子释迦友著写了《瑜伽续摄真如释·够萨拉庄严》。后来他们师徒二人到了克什米尔，利益众生的事业极其广大。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "佛密与莲师在札巴哈德前听受密法", "participants": [{"entity": "佛密", "role": "受法者"}, {"entity": "莲花生大士", "role": "受法者"}, {"entity": "札巴哈德", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "后来他们师徒二人到了克什米尔，利益众生的事业极其广大。阿阇黎佛密与莲花生大士在札巴哈德上师面前也听受了密法，而且莲花生大士也在国王匝面前恭听过。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "化生", "title": "莲花生大士在邬金海岛莲花中化生", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "阿弥陀佛", "role": "化身源"}], "location": "邬金", "time_info": "", "layers": ["神变"], "quote": "这里唯一根据伏藏品众所共称他是化生的生平来讲，在西方邬金境内，东、南、北三面都有大海，在临近西南方，与罗刹境距离不远的海岛上，有一株由佛陀的加持而形成的五颜六色的莲花茎，从极乐世界怙主阿弥陀佛的心间放射出一个纯金色的金刚“舍”字，从中幻化出一位相好庄严、手持金刚和莲花的八岁童子，安坐在莲花苞中，天界与海岛的诸位空行给他宣讲深法。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "登基", "title": "恩札布德迎请莲花生回宫立为太子", "participants": [{"entity": "恩札布德", "role": "主体"}, {"entity": "莲花生大士", "role": "受者"}, {"entity": "法臣哲那增", "role": "发现者"}], "location": "邬金", "time_info": "", "layers": ["史传"], "quote": "当时，邬金的国王恩札布德因为膝下无子而供养三宝，打开国库发放布施，结果国库财物已经施得精光，于是他从海岛取得如意宝，返回的途中，法臣哲那增首先发现了莲花中的童子，接着国王也看到\n了，他们认为他有当太子的缘分，便迎请回宫，给他取名莲花生、海生金刚。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "出家受戒", "title": "莲师在札巴哈德前出家被称释迦桑给", "participants": [{"entity": "莲花生大士", "role": "受戒者"}, {"entity": "札巴哈德", "role": "亲教师"}], "location": "萨霍", "time_info": "", "layers": ["史传"], "quote": "”人们非但不起信心，而且妄加诽谤。这时他发现有众多必要，便来到萨霍地方，在阿阇黎札巴哈德大师面前出家，被一致共称为“释迦桑给（释迦狮子）”。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "灌顶", "title": "智慧空行桑瓦益西为莲师授外内密灌顶", "participants": [{"entity": "桑瓦益西", "role": "灌顶师"}, {"entity": "莲花生大士", "role": "受者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "他听受完十八遍所有瑜伽续，面见所有本尊，在智慧空行桑瓦益西（秘密智慧）现示比丘尼的形象根嘎姆（庆喜母）面前请求灌顶，结果空行母使莲师变成吽字，吞入口中，在她体内圆满授予外、内、密灌顶以后在莲花处出来，而示现清净三障。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "莲师在八大持明前闻思八大修部、在佛密前闻思幻化网、在西日桑哈前闻思大圆满", "participants": [{"entity": "莲花生大士", "role": "受法者"}, {"entity": "八大持明", "role": "主体"}, {"entity": "佛密", "role": "主体"}, {"entity": "西日桑哈", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在八大持明面前闻思八大修部，在佛密大师面前闻思《幻化网》，于西日桑哈面前闻思大圆满", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "修行成就", "title": "莲师与曼达绕瓦修长寿法证得长寿自在持明悉地", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "曼达绕瓦", "role": "修行伴侣"}, {"entity": "无量寿佛", "role": "灌顶师"}], "location": "玛绕德嘎山洞", "time_info": "三个月", "layers": ["神变"], "quote": "后来，他又摄受萨霍国王则拉增的王女具有空行标帜的曼达绕瓦作为修行所依的手印明妃，带着她到玛绕德嘎山洞修行三个月长寿法，结果怙主无量寿佛亲自降临赐予灌顶，加持他与自身成为无二无别，并恩授百千万《长寿续》，就这样他证得了长寿自在持明的悉地，成就了无生无死金刚身。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "神变", "title": "莲师在萨霍被烧不死显示神变", "participants": [{"entity": "莲花生大士", "role": "主体"}], "location": "萨霍", "time_info": "", "layers": ["神变"], "quote": "为了度化萨霍国家的君民而赴往那里，王臣把他烧在火中。莲花生大士显示神变，安然坐在芝麻油盘旋而成的湖泊中央莲花茎尖端上，使人们虔诚起信，他让那些人修行，最终人们都得到不退转果位。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "神变", "title": "莲师在邬金被焚烧后以佛父佛母身相安坐莲花上", "participants": [{"entity": "莲花生大士", "role": "主体"}], "location": "邬金", "time_info": "", "layers": ["神变"], "quote": "为了度化邬金国家的人们，莲师又前去那里化缘，当地的人们认出他，以前的魔臣等众人把他放在檀香火里焚烧，结果他以佛父佛母的身相安坐在湖泊中央的莲花茎上，为了表示救度所有众生脱离轮回，他现示身佩骷髅串的神变，由此被人们一致称呼为“班玛托创匝（莲花髅鬘妙力）”。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "弘法", "title": "莲师在邬金作国王国师十三年安置人民于佛法", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "教集法海", "role": "法门"}], "location": "邬金", "time_info": "十三年", "layers": ["史传"], "quote": "他在十三年当中作国王的国师，把邬金举国人民安置于佛法中，赐予《教集法海》能成熟的灌顶与能解脱的教言，国王及王后等一切有缘者都成就了殊胜持明，由此他被尊称为“莲花王”。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "调伏", "title": "莲师幻化比丘旺波德调伏阿育王建千万佛塔", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "阿育王", "role": "受调伏者"}], "location": "南赡部洲", "time_info": "", "layers": ["神变"], "quote": "根据《幻化行境经》中授记，为了调伏阿育王，莲师幻化成一位名叫旺波德的比丘，使国王生起不退转的信心而在一夜之间于南赡部洲建起了由佛舍利装藏的千万佛塔。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "调伏", "title": "莲师在金刚座降伏外道五百本师", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "空行敦德玛", "role": "协助者"}], "location": "金刚座", "time_info": "", "layers": ["神变"], "quote": "那些外道本师修行恶咒期间，莲师用空行敦德玛（降魔母）供养的猛咒回遮，使天降霹雳，从而降伏了所有外道本师，用火焚毁他们的城市，使剩下的人全部皈入佛门，将法幢高高树立，这时被人们尊称为“桑给札卓（狮子吼声）”。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "修行成就", "title": "莲师在扬列秀山洞修殊胜成就遭违缘后以金刚橛续平息", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "释迦得瓦", "role": "修行伴侣"}, {"entity": "金刚橛续", "role": "法门"}], "location": "扬列秀山洞", "time_info": "", "layers": ["神变"], "quote": "此后，莲师在印度、尼泊尔交界地带扬列秀山洞里，依尼泊尔国王给增（持善）的公主释迦得瓦作为修行所依而通过真实火力修行殊胜成就时，三个大力鬼神罗刹制造违缘使得当地三年中滴雨不降，饥荒、疾疫不断发生。莲师派人到印度诸位上师那里求得制服违缘的法门，当派去的二人带着《金刚橛续》刚到，各种障碍自行平息。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "调伏", "title": "莲师降伏十六护橛等世间鬼神使其承诺作护法", "participants": [{"entity": "莲花生大士", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "《真实意》大悉地也如同经商一样，面临着重重违缘，而金刚橛就像护送者一样必不可少，发现这一点以后莲师著了许多《真实意修法》、《金刚橛修法》，降伏十六护橛等世间所有男性女性鬼神，使他们承诺，作为护法神。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "弘法", "title": "莲师在卓当巴调伏空行非人并让建造寺庙", "participants": [{"entity": "莲花生大士", "role": "主体"}], "location": "卓当巴", "time_info": "", "layers": ["史传"], "quote": "在干匝境内，佛教各派格外兴盛，德热卡的国王发动军队（准备破坏），当他们在讷拉河上船之时，莲师手作契克印，结果五百只船筏全部沉没水中，从此以后消除了德热卡的危难。莲师到卓当巴地方的固定时间虽然不明显，但逐渐调伏那里的空行等非人及人们，并且让他们建造寺庙。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "神变", "title": "莲师在达那够夏海岛蒙金刚亥母加持降伏龙类与星曜", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "金刚亥母", "role": "加持者"}], "location": "达那够夏海岛", "time_info": "", "layers": ["神变"], "quote": "不久，莲师到了达那够夏海岛，依靠密宗空行表示语修行而怀柔摄受海岛的空行，当在粗恶园行持禁行时蒙受金刚亥母现身加持，降伏了海中的龙类与空中的所有星曜，三处所有勇士空行母恩赐成就，被一致取名为“多吉札波匝（金刚猛力）”。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "弘法", "title": "莲师在祥雄幻化为达布舍匝以大圆满使众多人成就光明身", "participants": [{"entity": "莲花生大士", "role": "主体"}], "location": "祥雄", "time_info": "", "layers": ["神变"], "quote": "此外，在度化蒙古与汉地众生时，莲师化现成有神通的国王以及有威力的瑜伽师。在祥雄地方，幻化成名叫达布舍匝的自生童子，以大圆满耳传教授使为数众多的有缘者成就光明身。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "出家受戒", "title": "吽嘎日在那烂陀寺在佛智与罗睺罗前出家", "participants": [{"entity": "吽嘎日", "role": "受戒者"}, {"entity": "佛智", "role": "亲教师"}, {"entity": "班智达罗睺罗", "role": "亲教师"}], "location": "那烂陀寺", "time_info": "", "layers": ["史传"], "quote": "后来他虔信佛教最为至上，于是到印度中央那烂陀寺，在阿阇黎佛智与班智达罗睺罗尊者前出家，从显宗开始一直到内外密之间广闻博学，以净化相续。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "修行成就", "title": "吽嘎日修行六月获大手印殊胜成就", "participants": [{"entity": "吽嘎日", "role": "主体"}, {"entity": "班则黑日嘎", "role": "本尊"}], "location": "", "time_info": "六个月", "layers": ["神变"], "quote": "就这样，吽嘎日大师把手印女带到山洞，在六个月期间完成了依、近依、修 55 的所有修法，在上旬的初八黎明时分，虚空中传出巨大的“吽”声，他现量见到了班则黑日嘎等一切坛城，依靠大修之道而获得大手印殊胜成就。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "蒋花西宁在如毕多吉前听闻《黑敌续》等法要", "participants": [{"entity": "蒋花西宁", "role": "受法者"}, {"entity": "如毕多吉", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "这位阿阇黎出生在印度西方名叫二次第的城中，父亲萨达萨哲，母亲名为光明灯，他也是一位对所有吠陀学问通达无碍的才子，据说他后来在如朗塔多（起尸灰色，也就是嘎绕多吉）阿阇黎等面前得受了内外密的所有灌顶以及共同不共教言，又于如毕多吉（游舞金刚）上师前恭听了《黑敌续》、《狮面佛母续》、《大威德续》等法要。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "神变", "title": "蒋花西宁以契克印劈裂外道国王与大象", "participants": [{"entity": "蒋花西宁", "role": "主体"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "总之对一切共同成就都有实证，当接近证得双运果位之际，他就去行持禁行，正巧当时有一位持执外道偏见严重到极顶的国王骑象而来，他们在一座桥上相遇，那位国王始终不让路，这时大师手作契克印对着他，结果国王连同大象都被劈成两半从桥的左右坠落下去。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "神变", "title": "蒋花西宁获得与文殊菩萨无二无别的双运果位", "participants": [{"entity": "蒋花西宁", "role": "主体"}, {"entity": "妙吉祥", "role": "等同"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "正如颂云：“不礼世间神，象来不让路，口诵密咒王，足通（即无碍）行岩中。”最终，蒋花西宁获得与文殊菩萨无二无别至高至上的双运果位。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "灌顶", "title": "文殊雅门达嘎为蒋花西宁授予灌顶并宣讲续及窍诀", "participants": [{"entity": "文殊雅门达嘎", "role": "主体"}, {"entity": "蒋花西宁", "role": "受者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "”最终，蒋花西宁获得与文殊菩萨无二无别至高至上的双运果位。文殊雅门达嘎（大威德）亲自显现为他授予灌顶，宣讲所有续及窍诀，幻化的成群阎罗眷属转绕他，并发誓承诺。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "伏藏", "title": "蒋花西宁从玛拉雅山取出琉璃金函并隐藏经函于金刚座北方", "participants": [{"entity": "蒋花西宁", "role": "主体"}], "location": "玛拉雅山、金刚座", "time_info": "", "layers": ["史传"], "quote": "蒋花西宁从玛拉雅山取出具足四业 56 琉璃写成的金函，阅览之时立即就已心领神会，他运用调伏外道的猛咒诛业 57 把外道的国土摧毁无余。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "灌顶", "title": "达玛瓦国王拜蒋花西宁为师并为太子传授圣文殊灌顶", "participants": [{"entity": "达玛瓦", "role": "祈请者"}, {"entity": "蒋花西宁", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "其实这位大师被人们一致称为酿波哲巴（藏成）婆罗门，这样一来，显然就是则达热大师的父亲酿波（精藏）婆罗门。他也是文殊部密宗成就者，\n国王达玛瓦拜其为师，并为自己的太子传授圣文殊灌顶，使其获得成就。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "大不空金刚在蒋花西宁面前得受所有大威德类并传给小不空金刚", "participants": [{"entity": "大不空金刚", "role": "受法者"}, {"entity": "蒋花西宁", "role": "主体"}, {"entity": "小不空金刚", "role": "受法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "这位阿阇黎的弟子就是《时轮后续》中授记的婆罗门益西多吉（智慧金刚）与香切多吉（菩提金刚），许多续部的言传都来源于他们。尤其是，大不空金刚在这位阿阇黎面前得受了所有大威德类，又传给小不空金刚……藏地众所周知玖派的大威德类的源流都起自于他。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "迎请", "title": "龙树菩萨迎请大量续部法门", "participants": [{"entity": "圣龙树", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "龙树菩萨的生平事迹就像普遍共称的那样，他迎请了《玛哈嘎拉八续》、《黑天母续》、《革热革乐证悟续》等等大量的续部法门，得受诸位智慧空行母的口诀，据说单单是不同的修法也迎请回六十部。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "神变", "title": "龙树菩萨在西日巴达与夜叉母安住二百年成就金刚身", "participants": [{"entity": "圣龙树", "role": "主体"}], "location": "西日巴达", "time_info": "安住二百年", "layers": ["神变"], "quote": "龙树菩萨的生平事迹就像普遍共称的那样，他迎请了《玛哈嘎拉八续》、《黑天母续》、《革热革乐证悟续》等等大量的续部法门，得受诸位智慧空行母的口诀，据说单单是不同的修法也迎请回六十部。八大共同成就 58 一一都有多种多样的成就，在西日巴达地方，与所有夜叉母眷属以密宗行为安住了二百年，次第成就金刚身。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "布玛莫札在哦达革雅等上师座下聆听续部并领悟大手印悉地", "participants": [{"entity": "布玛莫札", "role": "受法者"}, {"entity": "哦达革雅", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "布玛莫札阿阇黎布玛莫札继承功德宝生部《甘露八卷》等金刚甘露教，这位大师诞生在印度西方名叫象园的地方，对一切明处学问了如指掌，在诸位持藏大师面前听闻大小乘的一切经藏都通达无碍，又在哦达革雅等众多大金刚持上师座下聆听了所有续部，通过修行而领悟了大手印殊胜悉地。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "著述", "title": "布玛莫札撰著《密藏续释·明灯论》等论典", "participants": [{"entity": "布玛莫札", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "尤其是他特别精通《幻化网》，造有《密藏续释·明灯\n论》、《上师颂释·除暗论》、《列拉现释》、《八十颂略释》、《睁开慧眼》、《三觉性》、《手印禅定》、《护摩》、《烧尸事业》、《明点次第论》、《浅释》等等数量可观的论典。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "神变", "title": "莲师在扬列秀山洞现前大手印持明果位", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "班则革玛日", "role": "本尊"}], "location": "扬列秀山洞", "time_info": "", "layers": ["神变"], "quote": "莲花生大士在扬列秀山洞依靠吉祥黑日嘎坛城现前大手印殊胜悉地持明果位的时候，炯波龙、够玛卡夜叉、虚空界的罗玛珍（一非人名）心里生起了忍无可忍的感受，对莲师进行破坏，为了降伏他们，莲师依靠《布昼达玛十万续》修行，结果面见了班则革玛日，并且消除了一切违缘相，降伏十二鬼母与四地母等，让她们承诺誓言。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "降伏", "title": "莲师降伏炯波龙、够玛卡夜叉、罗玛珍等非人", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "炯波龙", "role": "被降伏者"}, {"entity": "够玛卡夜叉", "role": "被降伏者"}, {"entity": "罗玛珍", "role": "被降伏者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "莲花生大士在扬列秀山洞依靠吉祥黑日嘎坛城现前大手印殊胜悉地持明果位的时候，炯波龙、够玛卡夜叉、虚空界的罗玛珍（一非人名）心里生起了忍无可忍的感受，对莲师进行破坏，为了降伏他们，莲师依靠《布昼达玛十万续》修行，结果面见了班则革玛日，并且消除了一切违缘相，降伏十二鬼母与四地母等，让她们承诺誓言。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "降伏", "title": "莲师降伏十二鬼母与四地母令其承诺誓言", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "十二鬼母", "role": "被降伏者"}, {"entity": "四地母", "role": "被降伏者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "莲花生大士在扬列秀山洞依靠吉祥黑日嘎坛城现前大手印殊胜悉地持明果位的时候，炯波龙、够玛卡夜叉、虚空界的罗玛珍（一非人名）心里生起了忍无可忍的感受，对莲师进行破坏，为了降伏他们，莲师依靠《布昼达玛十万续》修行，结果面见了班则革玛日，并且消除了一切违缘相，降伏十二鬼母与四地母等，让她们承诺誓言。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "莲师在札巴哈德面前听闻十八遍《革拉雅续》", "participants": [{"entity": "莲花生大士", "role": "受法者"}, {"entity": "札巴哈德", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "莲花生大士在扬列秀山洞依靠吉祥黑日嘎坛城现前大手印殊胜悉地持明果位的时候，炯波龙、够玛卡夜叉、虚空界的罗玛珍（一非人名）心里生起了忍无可忍的感受，对莲师进行破坏，为了降伏他们，莲师依靠《布昼达玛十万续》修行，结果面见了班则革玛日，并且消除了一切违缘相，降伏十二鬼母与四地母等，让她们承诺誓言。人们共称，莲师在札巴哈德大师面前也听闻了十八遍《革拉雅续》，并且成为橛事业一切教法的教主。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "伏藏", "title": "金刚法菩萨将总修部与别修部经函交传空行事业自在母并隐藏", "participants": [{"entity": "金刚法菩萨", "role": "主体"}, {"entity": "空行事业自在母", "role": "受者"}], "location": "清凉尸陀林", "time_info": "", "layers": ["史传"], "quote": "第二、伏藏类：金刚法菩萨将总修部与别修部作成经函，当他发现人间暂时没有宣讲的对境以后，就交传给空行事业自在母，这位空行母把八大法行的总五续与特殊十续装在八种珍宝箧里，所有特殊续分别装在不同的宝箧中。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "伏藏", "title": "八大阿阇黎从空行事业自在母处分别接受伏藏宝箧", "participants": [{"entity": "八大阿阇黎", "role": "受者"}, {"entity": "空行事业自在母", "role": "主体"}, {"entity": "布玛莫札", "role": "受者"}, {"entity": "吽嘎日", "role": "受者"}, {"entity": "蒋花西宁", "role": "受者"}, {"entity": "那嘎则那", "role": "受者"}, {"entity": "莲花生大士", "role": "受者"}, {"entity": "达那桑哲达", "role": "受者"}, {"entity": "绕布革雅", "role": "受者"}, {"entity": "寂藏", "role": "受者"}], "location": "清凉尸陀林", "time_info": "", "layers": ["史传"], "quote": "他们对所有世间空行母及妖魔鬼怪，依靠密意禁行用相应谛实语的圣物解印，又依靠念及利他的等持力使事业自在空行母亲自降临，她取出所有宝箧，分别交传，《最胜黑日嘎》的金箧交给布玛莫札、《真实意》的银箧交给吽嘎日，《大威德》的铁箧交给蒋花西宁，《马头明王续》的铜箧交给那嘎则那，《橛事业》的松石箧交给莲花生，《召遣非人》的漆箧交\n给达那桑哲达，《供赞世神》的玛瑙箧交给绕布革雅，《猛咒诅詈》的猫睛石箧交给寂藏。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "灌顶", "title": "密主金刚手为国王匝灌顶", "participants": [{"entity": "密主金刚手菩萨", "role": "主体"}, {"entity": "国王匝", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "八种宝箧中凝聚如来教于一身的所有续部窍诀法源全部授予莲花生大士。二、圆满次第阿努约嘎密主金刚手菩萨为国王匝或者龙丹多吉（金刚授记）灌顶，结果他对一切教义心领神会。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "国王匝依止乐匝布请求灌顶教法并撰著《集密意续释》", "participants": [{"entity": "国王匝", "role": "受法者"}, {"entity": "乐匝布", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "可是在观现世者面前，为了制止随随便便实施密宗行为，他通过依止人持明居士乐匝布无垢称，请求一切灌顶与教法，并且也撰著了《集密意续释》等论典。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "灌顶", "title": "国王匝以幻化坛城为俄巴燃匝和三位太子灌顶", "participants": [{"entity": "国王匝", "role": "主体"}, {"entity": "俄巴燃匝", "role": "受者"}, {"entity": "夏札布哲", "role": "受者"}, {"entity": "那嘎布哲", "role": "受者"}, {"entity": "革雅布哲", "role": "受者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "可是在观现世者面前，为了制止随随便便实施密宗行为，他通过依止人持明居士乐匝布无垢称，请求一切灌顶与教法，并且也撰著了《集密意续释》等论典。他以前在依止乐匝布期间，以幻化坛城为同修道友俄巴燃匝大师与自己的太子夏札布哲、那嘎布哲、革雅布哲灌顶并宣讲教言。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "神变", "title": "罗婆师以生起次第护轮抵御外道空行母石雨", "participants": [{"entity": "大成就者罗婆师", "role": "主体"}], "location": "邬金", "time_info": "", "layers": ["神变"], "quote": "”当时，大师修行禅定安住，到了深更半夜，外道的空行母们降下石雨。他马上修生起次第\n的护轮，对方没有危害到护轮界限以内。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "神变", "title": "罗婆师以圆满次第无相等持令石头停滞空中", "participants": [{"entity": "大成就者罗婆师", "role": "主体"}], "location": "邬金", "time_info": "", "layers": ["神变"], "quote": "他不禁暗想：生起次第的功德竟然如此，那么再显示一下圆满次第的威力。想到这里他安住在无相等持当中，结果所有石头都停滞在空中。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "神变", "title": "罗婆师睡在王宫门前十二年", "participants": [{"entity": "大成就者罗婆师", "role": "主体"}], "location": "邬金", "time_info": "十二年", "layers": ["神变"], "quote": "人们对他恭敬作礼以后才得以行走。他一睡就是十二年，可对大师他自己来说只是光明境界一座。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "降伏", "title": "罗婆师以真言将五百魔女变成五百只母绵羊", "participants": [{"entity": "大成就者罗婆师", "role": "主体"}], "location": "邬金", "time_info": "", "layers": ["神变"], "quote": "”于是她们把那件褐衣分成五百块，各个都吞掉。这时，大师现出原身，念诵真言诅咒她们，使五百魔女变成了五百只母绵羊。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "弘法", "title": "恩札布德与罗婆师、如毕多吉在邬金宣讲教法令众生成持明者", "participants": [{"entity": "恩札布德", "role": "主体"}, {"entity": "大成就者罗婆师", "role": "主体"}, {"entity": "如毕多吉", "role": "主体"}], "location": "邬金", "time_info": "", "layers": ["史传"], "quote": "据说后来，国王与这两位大师在邬金地方，宣讲教授，结果所有众生都成了持明者，邬金的那一地带几乎濒临空无人烟，这与前文中所说的国王匝的太子小恩札布德连同眷属群体成为持明者的内容一致或者相同。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "灌顶", "title": "小恩札布德在海边为桑哈布札和后革革燃匝传授灌顶", "participants": [{"entity": "夏札布哲", "role": "主体"}, {"entity": "桑哈布札", "role": "受者"}, {"entity": "后革革燃匝", "role": "受者"}], "location": "海边", "time_info": "", "layers": ["史传"], "quote": "据说后来，国王与这两位大师在邬金地方，宣讲教授，结果所有众生都成了持明者，邬金的那一地带几乎濒临空无人烟，这与前文中所说的国王匝的太子小恩札布德连同眷属群体成为持明者的内容一致或者相同。就这样，小恩札布德在海边为桑哈布札和后革革燃匝传授灌顶、宣讲续部。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "圆寂", "title": "前期传承祖师及眷属全部依靠有戏行为修行而虹身", "participants": [{"entity": "嘎绕多吉", "role": "所属传承"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在此之前的所有传承祖师连同各自的五万眷属群体到一人之间全部依靠有戏行为众会修行而证得双运身，最后身体消失无踪（即虹身）。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "灌顶", "title": "嘎绕多吉在俄达萨绕园为多吉夏巴灌顶传讲续部", "participants": [{"entity": "嘎绕多吉", "role": "主体"}, {"entity": "多吉夏巴", "role": "受者"}], "location": "俄达萨绕园", "time_info": "", "layers": ["史传"], "quote": "在此之前的所有传承祖师连同各自的五万眷属群体到一人之间全部依靠有戏行为众会修行而证得双运身，最后身体消失无踪（即虹身）。化身嘎绕多吉在俄达萨绕园为多吉夏巴（笑金刚）大师灌顶并传讲续部。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "著述", "title": "多吉夏巴撰著《瑜伽觉日论》", "participants": [{"entity": "多吉夏巴", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "多吉夏巴也是通过大乐道而获得殊胜悉地，也撰著了抉择《经·集密意续》之深道的《瑜伽觉日论》，并在甘匝境内的司徒河畔为札巴哈德大师灌顶、传讲续部。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "灌顶", "title": "多吉夏巴在甘匝为札巴哈德灌顶传讲续部", "participants": [{"entity": "多吉夏巴", "role": "主体"}, {"entity": "札巴哈德", "role": "受者"}], "location": "甘匝", "time_info": "", "layers": ["史传"], "quote": "多吉夏巴也是通过大乐道而获得殊胜悉地，也撰著了抉择《经·集密意续》之深道的《瑜伽觉日论》，并在甘匝境内的司徒河畔为札巴哈德大师灌顶、传讲续部。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "释迦光传法给小释迦光、释迦友和释迦狮子", "participants": [{"entity": "札巴哈德", "role": "主体"}, {"entity": "小释迦光", "role": "受法者"}, {"entity": "释迦友", "role": "受法者"}, {"entity": "莲花生大士", "role": "受法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "札巴哈德就是前面提到的出家法名释迦光。阿阇黎释迦光又传给小释迦光、释迦友和释迦狮子。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "莲花生大士在九层神馐殿为达那绕杰达传讲", "participants": [{"entity": "莲花生大士", "role": "主体"}, {"entity": "达那绕杰达", "role": "受法者"}], "location": "九层神馐殿", "time_info": "", "layers": ["史传"], "quote": "释迦狮子就是莲花生大士的别名。大师在九层神馐殿为达那绕杰达阿阇黎传讲。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "达那绕杰达在邬金金刚洞为吽匝传讲", "participants": [{"entity": "达那绕杰达", "role": "主体"}, {"entity": "吽匝", "role": "受法者"}], "location": "邬金", "time_info": "", "layers": ["史传"], "quote": "大师在九层神馐殿为达那绕杰达阿阇黎传讲。达那绕杰达撰著了解释《经·集密意续》的论典，并在邬金境内的金刚洞里为吽匝大师传讲。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "神变", "title": "吽匝依止嘎嘎悉德修行成就持明身", "participants": [{"entity": "吽匝", "role": "主体"}, {"entity": "嘎嘎悉德", "role": "手印母"}], "location": "阿色日山洞", "time_info": "", "layers": ["神变"], "quote": "吽匝大师著写了有关根本续的《七印释》、《瑜伽地灯》等有关《集密意续》的数多论典，他在印度与达色交界处的阿色日山洞，依止手印母嘎嘎悉德修行而成就持明\n身。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "灌顶", "title": "吽匝在花云丹城为得瓦萨匝灌顶并交付续部", "participants": [{"entity": "吽匝", "role": "主体"}, {"entity": "得瓦萨匝", "role": "受者"}], "location": "花云丹城", "time_info": "", "layers": ["史传"], "quote": "一般来说，隐身术通过摄丹术、降持明点、灯、风轮等世间道也能获得，而依靠见道无分别智慧近因的这些行为使异熟身体转依为光明，要知道这两者有着悬殊的差别。这位大师在花云丹（吉祥功德）城为得瓦萨匝灌顶，并交付续部。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "得瓦萨匝将法要传给四位心子再传达玛哦德", "participants": [{"entity": "得瓦萨匝", "role": "主体"}, {"entity": "达玛哦德", "role": "受法者"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "得瓦萨匝尊者也在吽嘎日大师面前听受法要，依靠成就密咒而变成了持明身，撰著了《经·集密意续十八文》及《大乘瑜伽次第灯》等论典。他将法要传给具有殊胜缘分的四位心子。他们又传给玛嘎达多的堪布达玛哦德。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "灌顶", "title": "达玛哦德在西日那烂陀寺为达玛燃匝巴拉灌顶", "participants": [{"entity": "达玛哦德", "role": "主体"}, {"entity": "达玛燃匝巴拉", "role": "受者"}], "location": "西日那烂陀寺", "time_info": "", "layers": ["史传"], "quote": "他们又传给玛嘎达多的堪布达玛哦德。达玛哦德尊者造了《摄经义》、《般若灯》以及《解经论》，在西日那烂陀寺为堪布达玛燃匝巴拉灌顶并宣讲诸续。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "灌顶", "title": "达玛燃匝巴拉在王舍城为瓦色达燃与则拉花格灌顶", "participants": [{"entity": "达玛燃匝巴拉", "role": "主体"}, {"entity": "瓦色达燃", "role": "受者"}, {"entity": "则拉花格", "role": "受者"}], "location": "王舍城", "time_info": "", "layers": ["史传"], "quote": "达玛哦德尊者造了《摄经义》、《般若灯》以及《解经论》，在西日那烂陀寺为堪布达玛燃匝巴拉灌顶并宣讲诸续。达玛燃匝巴拉堪布在王舍城为尼泊尔国王瓦色达燃与则拉花格恩赐灌顶及续部讲解。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "灌顶", "title": "达玛哦德、瓦色达燃、则拉花格三位为切赞吉灌顶传讲续部", "participants": [{"entity": "达玛哦德", "role": "主体"}, {"entity": "瓦色达燃", "role": "主体"}, {"entity": "则拉花格", "role": "主体"}, {"entity": "切赞吉", "role": "受者"}], "location": "印度中部", "time_info": "", "layers": ["史传"], "quote": "刚刚讲述的这所有传承是汇集一切灌顶教、言传教与窍诀教的传承。再有，达玛哦德、瓦色达燃、则拉花格三位阿阇黎在印度中部为哲夏地方的大师切赞吉灌顶并传讲续部，他通过修行而获得成就。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "译经", "title": "切赞吉将《经·集密意续》翻译成哲夏语", "participants": [{"entity": "切赞吉", "role": "主体"}, {"entity": "达玛哦德", "role": "协助者"}, {"entity": "达那绕杰达", "role": "协助者"}], "location": "哲夏", "time_info": "", "layers": ["史传"], "quote": "后来大师被达那绕杰达阿阇黎迎请到哲夏地方，他准备着手翻译《经·集密意续》等典籍，由于某种因缘所致而没有成功，于是来到尼泊尔境内，将法要传给瓦色达燃与达玛哦德。后来在哲夏地方，于达玛哦德与达那绕杰达面前，切赞吉大师把（《经部·集密意续》）翻译成哲夏语和文字。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "密主金刚手在须弥山为空行持明众宣讲密法", "participants": [{"entity": "密主金刚手菩萨", "role": "主体"}], "location": "须弥山", "time_info": "", "layers": ["史传"], "quote": "后来在哲夏地方，于达玛哦德与达那绕杰达面前，切赞吉大师把（《经部·集密意续》）翻译成哲夏语和文字。三、大圆满阿底约嘎\n嘎绕多吉某时，出有坏密主金刚手在须弥山的北方燃火山尸陀林为空行、空行母、成就者、持明众宣讲密法。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "诞生", "title": "比丘尼色达玛梦中受水晶瓶灌后生下嘎绕多吉", "participants": [{"entity": "色达玛", "role": "主体"}, {"entity": "嘎绕多吉", "role": "诞生者"}, {"entity": "胜心天子", "role": "等同"}], "location": "达那够萨洲", "time_info": "", "layers": ["神变"], "quote": "一天晚上，比丘尼梦到纯洁无瑕的白衣人将由“嗡阿吽索哈”印持的一个水晶瓶放在她头顶三次，结果看到那个水晶瓶大放光芒照亮三界。此后没有多久，这位比丘尼就生下了将大圆满弘扬天境、金刚萨埵的化身胜心天子菩萨。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "弘法", "title": "嘎绕多吉七岁辩胜五百班智达获名", "participants": [{"entity": "嘎绕多吉", "role": "主体"}, {"entity": "五百位大智者", "role": "对方"}], "location": "达那够萨洲", "time_info": "七岁", "layers": ["史传"], "quote": "双方见面时，小童子向众班智达恭敬作礼，相互依次进行了多方面的研讨、辩论，最后所有班智达的辩才被他一一制服，他们毕恭毕敬顶礼其足，并广兴供养，尊称他为札甲巴瓦。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "弘法", "title": "嘎绕多吉在日光岩山住三十二年安住等持", "participants": [{"entity": "嘎绕多吉", "role": "主体"}], "location": "日光岩山", "time_info": "三十二年", "layers": ["史传"], "quote": "此后，嘎绕多吉大师在北方兽群明显出没、极其恐怖的日光岩山上，住了三十二年草棚，安住于等持当中，在此期间，他听到大地震动七次、空中传出“消灭外教”的声音。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "灌顶", "title": "金刚萨埵亲现为嘎绕多吉授予觉性灌顶", "participants": [{"entity": "金刚萨埵", "role": "主体"}, {"entity": "嘎绕多吉", "role": "受者"}], "location": "", "time_info": "", "layers": ["神变"], "quote": "后来，嘎绕多吉将内外乘所有法藏尤其是自性大圆满六百四十万颂都记在心里，这时金刚萨埵亲现尊颜，为他授予觉性灌顶，由此而现前无学智慧，大师显现上是这样证悟的。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "著述", "title": "嘎绕多吉与三位空行母在玛拉雅山编辑大圆满文句目录", "participants": [{"entity": "嘎绕多吉", "role": "主体"}, {"entity": "杰敦德瓦如当丹", "role": "协助者"}, {"entity": "德雪色姆", "role": "协助者"}, {"entity": "云丹塔益", "role": "协助者"}], "location": "玛拉雅山", "time_info": "三年", "layers": ["史传"], "quote": "在玛拉雅山宝积顶峰，阿阇黎嘎绕多吉与金刚法界空行母杰敦德瓦如当丹（具世乐味）、德雪色姆（乐指母）、云丹塔益\n（功德无边）三位空行母在三年之中编辑文句目录。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "嘎绕多吉在清凉大尸林为空行母传讲佛法", "participants": [{"entity": "嘎绕多吉", "role": "主体"}], "location": "清凉尸陀林", "time_info": "", "layers": ["史传"], "quote": "另有一时，大师来到位于金刚座东北方的清凉大尸林，那里中央有一大佛塔，而且也是众多凶猛的空行母和极其野蛮的众生所在地，他为日光等不可估量的空行母传讲佛法。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "传法", "title": "蒋花西宁蒙文殊授记拜见嘎绕多吉七十五年听受佛法", "participants": [{"entity": "蒋花西宁", "role": "受法者"}, {"entity": "嘎绕多吉", "role": "主体"}, {"entity": "妙吉祥", "role": "授记者"}], "location": "清凉尸陀林", "time_info": "七十五年", "layers": ["史传"], "quote": "蒋花西宁在此期间，蒋花西宁阿阇黎蒙文殊菩萨授记说：“奇哉！善男子，如果想要即生成就佛果，前去清凉大尸林。”于是蒋花西宁来到清凉尸林，拜见嘎绕多吉大师，在七十五年间于师面前听受佛法，大师把所有教授及随教通通恩赐予他。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "圆寂", "title": "嘎绕多吉在丹德河入灭并以金箧交付《三句要诀》遗教", "participants": [{"entity": "嘎绕多吉", "role": "主体"}, {"entity": "蒋花西宁", "role": "受遗教者"}], "location": "丹德河", "time_info": "", "layers": ["神变"], "quote": "在丹德河处，大阿阇黎嘎绕多吉入灭于无漏法界中。当时，蒋花西宁悲切万分，说了三遍“呜呼哀哉极悲切……”悲哀语。结果空中闪闪光环中央，嘎绕多吉大师亲自现身，把一指大小的金箧交在他的手里，里面存放着《三句要诀》的遗教。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "著述", "title": "蒋花西宁将六百四十万续分成大圆满三部", "participants": [{"entity": "蒋花西宁", "role": "主体"}], "location": "", "time_info": "", "layers": ["史传"], "quote": "在此之后，蒋花西宁大师将六百四十万续分成大圆满三部，所有住心法立为心部；所有离作法立为界部；关键要点立为窍诀部；更为殊胜的心滴法分成耳传与言传两种。", "chapter": "《藏密佛教史》> 第二品 金刚密乘"}, {"type": "伏藏", "title": "蒋花西宁隐藏言传心滴法本于菩提迦耶东北方磐石下", "partic
