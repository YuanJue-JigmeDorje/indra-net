<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>藏密佛教史 — 阅读视图</title>
<style>
/* ---- reset & base ---- */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f0f1a;
  --fg: #d0c8b0;
  --fg-muted: #8a8478;
  --surface: #1a1a2e;
  --border: #2a2a3e;
  --accent: #d4af37;
  --max-w: 800px;
  --line-h: 2.0;
  --font-size: 18px;
  --para-gap: 1.5em;
}

[data-theme="light"] {
  --bg: #f8f5ee;
  --fg: #2a2a2a;
  --fg-muted: #6a6a6a;
  --surface: #ffffff;
  --border: #d8d0c4;
  --accent: #8b6914;
}

html { font-size: var(--font-size); }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: "PingFang SC", "Noto Serif SC", "Source Han Serif SC",
               "Microsoft YaHei", serif;
  line-height: var(--line-h);
  transition: background .3s, color .3s;
}

/* ---- nav ---- */
nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  flex-wrap: wrap;
  transition: background .3s, border-color .3s;
}
nav a {
  color: var(--accent);
  text-decoration: none;
  white-space: nowrap;
}
nav a:hover { text-decoration: underline; }
nav .spacer { flex: 1; }
#theme-toggle {
  cursor: pointer;
  padding: 4px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 13px;
  color: var(--fg-muted);
  user-select: none;
  transition: border-color .3s, color .3s;
}
#theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

/* ---- article ---- */
article {
  max-width: var(--max-w);
  margin: 40px auto 80px;
  padding: 0 24px;
}
article h1 {
  font-size: 1.8rem;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 1.5em;
  letter-spacing: 3px;
  text-align: center;
}
.paragraph {
  margin-bottom: var(--para-gap);
  text-indent: 2em;
  text-align: justify;
}

/* ---- entity spans ---- */
.entity {
  cursor: pointer;
  padding: 1px 3px;
  border-radius: 3px;
  border-bottom: 2px solid;
  transition: background .15s, color .15s;
}
/* type colours: text + bg tint + underline */
.entity-人物   { color: #9ccbee; background: rgba(126,184,218,0.12); border-bottom-color: rgba(126,184,218,0.4); }
.entity-人物:hover { background: rgba(126,184,218,0.3); }
.entity-圣众   { color: #dfc07a; background: rgba(201,169,110,0.12); border-bottom-color: rgba(201,169,110,0.4); }
.entity-圣众:hover { background: rgba(201,169,110,0.3); }
.entity-非人   { color: #d08080; background: rgba(176,90,90,0.12); border-bottom-color: rgba(176,90,90,0.4); }
.entity-非人:hover { background: rgba(176,90,90,0.3); }
.entity-寺院   { color: #85c4a5; background: rgba(107,163,134,0.12); border-bottom-color: rgba(107,163,134,0.4); }
.entity-寺院:hover { background: rgba(107,163,134,0.3); }
.entity-地名   { color: #a0b0c0; background: rgba(136,149,167,0.10); border-bottom-color: rgba(136,149,167,0.3); }
.entity-地名:hover { background: rgba(136,149,167,0.25); }
.entity-经典   { color: #b8a0c8; background: rgba(154,133,168,0.12); border-bottom-color: rgba(154,133,168,0.4); }
.entity-经典:hover { background: rgba(154,133,168,0.3); }
.entity-教法   { color: #d4a87a; background: rgba(196,149,106,0.12); border-bottom-color: rgba(196,149,106,0.4); }
.entity-教法:hover { background: rgba(196,149,106,0.3); }
.entity-教派   { color: #c0a890; background: rgba(160,144,128,0.12); border-bottom-color: rgba(160,144,128,0.3); }
.entity-教派:hover { background: rgba(160,144,128,0.25); }
.entity-仪轨   { color: #b0a890; background: rgba(154,144,128,0.12); border-bottom-color: rgba(154,144,128,0.3); }
.entity-仪轨:hover { background: rgba(154,144,128,0.25); }
.entity-法器圣物 { color: #a8a888; background: rgba(138,138,120,0.12); border-bottom-color: rgba(138,138,120,0.3); }
.entity-法器圣物:hover { background: rgba(138,138,120,0.25); }
.entity-集合   { color: #c0c098; background: rgba(180,180,138,0.10); border-bottom-color: rgba(180,180,138,0.3); }
.entity-集合:hover { background: rgba(180,180,138,0.25); }
.entity-佛学术语 { color: #b0a898; background: rgba(160,150,130,0.08); border-bottom-color: rgba(160,150,130,0.2); }
.entity-佛学术语:hover { background: rgba(160,150,130,0.2); }
/* Light theme entity overrides */
body.light .entity-人物   { color: #2a6a9a; background: rgba(126,184,218,0.15); }
body.light .entity-圣众   { color: #8a6510; background: rgba(201,169,110,0.15); }
body.light .entity-非人   { color: #903030; background: rgba(176,90,90,0.12); }
body.light .entity-寺院   { color: #306850; background: rgba(107,163,134,0.15); }
body.light .entity-地名   { color: #506070; background: rgba(136,149,167,0.12); }
body.light .entity-经典   { color: #6a4a7a; background: rgba(154,133,168,0.15); }
body.light .entity-教法   { color: #8a5a2a; background: rgba(196,149,106,0.15); }
body.light .entity-教派   { color: #6a5a48; background: rgba(160,144,128,0.12); }
body.light .entity-仪轨   { color: #6a5a48; background: rgba(154,144,128,0.12); }
body.light .entity-法器圣物 { color: #5a5a40; background: rgba(138,138,120,0.12); }
body.light .entity-集合   { color: #5a5a30; background: rgba(180,180,138,0.12); }
body.light .entity-佛学术语 { color: #6a6050; background: rgba(160,150,130,0.10); }

.entity-集合   { border-bottom-color: #90887a; }
.entity-集合:hover { background: rgba(144,136,122,0.15); }

/* ---- entity card ---- */
#entity-card {
  display: none;
  position: fixed;
  right: 20px;
  top: 60px;
  z-index: 200;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  width: 380px;
  max-height: calc(100vh - 100px);
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  transition: background .3s, border-color .3s;
}
.card-close {
  position: absolute; top: 8px; right: 12px;
  cursor: pointer; color: var(--fg-muted); font-size: 1.2rem;
}
.card-close:hover { color: var(--fg); }
#entity-card h3 {
  font-size: 1.1rem;
  color: var(--accent);
  margin-bottom: 4px;
  padding-right: 20px;
}
#entity-card .card-type {
  font-size: 0.85rem;
  color: var(--fg-muted);
  margin-bottom: 12px;
}
#card-relations, #card-events {
  margin-bottom: 12px;
}
.card-section-title {
  font-size: 0.75rem;
  color: var(--fg-muted);
  letter-spacing: 1px;
  margin-bottom: 6px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.card-rel-item {
  font-size: 0.85rem;
  padding: 5px 0;
  border-bottom: 1px solid rgba(128,128,128,0.1);
  line-height: 1.6;
}
.card-rel-type {
  font-size: 0.7rem;
  padding: 1px 5px;
  border-radius: 3px;
  background: rgba(212,175,55,0.12);
  color: var(--accent);
  margin-right: 4px;
}
.card-rel-target {
  color: #7eb8da;
  cursor: pointer;
}
.card-rel-target:hover { text-decoration: underline; }
.card-rel-quote {
  font-size: 0.78rem;
  color: var(--fg-muted);
  margin-top: 3px;
  padding-left: 8px;
  border-left: 2px solid rgba(212,175,55,0.3);
  line-height: 1.5;
}
.card-rel-chapter {
  font-size: 0.65rem;
  color: rgba(128,128,128,0.6);
}
.card-evt-item {
  font-size: 0.85rem;
  padding: 5px 0;
  border-bottom: 1px solid rgba(128,128,128,0.1);
  cursor: pointer;
  line-height: 1.6;
}
.card-evt-item:hover { background: rgba(212,175,55,0.05); }
.card-evt-type {
  font-size: 0.7rem;
  padding: 1px 5px;
  border-radius: 3px;
  background: rgba(106,174,214,0.12);
  color: #6aaed6;
  margin-right: 4px;
}
.card-evt-quote {
  font-size: 0.78rem;
  color: var(--fg-muted);
  margin-top: 3px;
  display: none;
  padding-left: 8px;
  border-left: 2px solid rgba(106,174,214,0.3);
  line-height: 1.5;
}
.card-evt-item.expanded .card-evt-quote { display: block; }
#entity-card .card-btns {
  display: flex; gap: 8px; margin-top: 12px;
}
#entity-card .card-btns a {
  flex: 1;
  text-align: center;
  padding: 6px 0;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--accent);
  text-decoration: none;
  font-size: 0.8rem;
  transition: background .15s;
}
#entity-card .card-btns a:hover {
  background: rgba(212,175,55,0.1);
  border-color: var(--accent);
}

/* ---- legend ---- */
.legend {
  max-width: var(--max-w);
  margin: 0 auto 24px;
  padding: 0 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px 18px;
  font-size: 0.8rem;
  color: var(--fg-muted);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
}
.legend-swatch {
  width: 18px;
  height: 3px;
  border-radius: 1px;
}

/* ---- footer ---- */
footer {
  text-align: center;
  padding: 24px;
  font-size: 0.8rem;
  color: var(--fg-muted);
}

/* ---- stats bar ---- */
.stats {
  max-width: var(--max-w);
  margin: 0 auto 8px;
  padding: 0 24px;
  font-size: 0.75rem;
  color: var(--fg-muted);
  text-align: right;
}


/* ---- index-specific ---- */
.index-header {
  text-align: center;
  padding: 60px 24px 20px;
}
.index-header h1 {
  font-size: 2rem;
  color: var(--accent);
  letter-spacing: 6px;
  margin-bottom: 8px;
}
.index-header .subtitle {
  font-size: 0.9rem;
  color: var(--fg-muted);
  letter-spacing: 2px;
}
.toc {
  max-width: var(--max-w);
  margin: 40px auto 80px;
  padding: 0 24px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.toc-item {
  display: flex;
  align-items: baseline;
  gap: 16px;
  padding: 16px 20px;
  text-decoration: none;
  border-radius: 6px;
  transition: background .15s;
}
.toc-item:hover {
  background: rgba(212,175,55,0.08);
}
.ch-num {
  font-size: 0.9rem;
  color: var(--fg-muted);
  min-width: 60px;
}
.ch-title {
  font-size: 1.15rem;
  color: var(--accent);
  letter-spacing: 1px;
}
.nav-links {
  max-width: var(--max-w);
  margin: 0 auto 60px;
  padding: 0 24px;
  display: flex;
  gap: 20px;
  justify-content: center;
}
.nav-links a {
  color: var(--fg-muted);
  text-decoration: none;
  font-size: 0.9rem;
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: 4px;
  transition: border-color .15s, color .15s;
}
.nav-links a:hover {
  border-color: var(--accent);
  color: var(--accent);
}
</style>
</head>
<body>
  <nav>
    <a href="../prototype/index.html">星图</a>
    <a href="../prototype/lineage.html">传承谱系</a>
    <span class="spacer"></span>
    <span id="theme-toggle">浅色</span>
  </nav>

  <div class="index-header">
    <h1>藏密佛教史</h1>
    <div class="subtitle">敦珠法王 著 &middot; 知识图谱阅读视图</div>
  </div>

  <div class="nav-links">
    <a href="../prototype/index.html">星图可视化</a>
    <a href="../prototype/lineage.html">传承谱系</a>
  </div>

  <div class="toc">
      <a class="toc-item" href="ch01.html"><span class="ch-num">第1品</span><span class="ch-title">佛教总况</span></a>
      <a class="toc-item" href="ch02.html"><span class="ch-num">第2品</span><span class="ch-title">金刚密乘</span></a>
      <a class="toc-item" href="ch03.html"><span class="ch-num">第3品</span><span class="ch-title">藏传佛法</span></a>
      <a class="toc-item" href="ch04.html"><span class="ch-num">第4品</span><span class="ch-title">内密三续</span></a>
      <a class="toc-item" href="ch05.html"><span class="ch-num">第5品</span><span class="ch-title">远传经幻心</span></a>
      <a class="toc-item" href="ch06.html"><span class="ch-num">第6品</span><span class="ch-title">近传伏藏史</span></a>
      <a class="toc-item" href="ch07.html"><span class="ch-num">第7品</span><span class="ch-title">遣除邪见</span></a>
      <a class="toc-item" href="ch08.html"><span class="ch-num">第8品</span><span class="ch-title">佛教年表与自传</span></a>
  </div>

  <footer>藏密佛教史 知识图谱 &middot; 阅读视图</footer>

  <div id="entity-card" style="display:none"></div>
  <script>
  (function(){
    const toggle = document.getElementById('theme-toggle');
    const root = document.documentElement;
    const saved = localStorage.getItem('reader-theme');
    if (saved === 'light') {
      root.setAttribute('data-theme', 'light');
      toggle.textContent = '深色';
    }
    toggle.addEventListener('click', function(){
      if (root.getAttribute('data-theme') === 'light') {
        root.removeAttribute('data-theme');
        toggle.textContent = '浅色';
        localStorage.setItem('reader-theme', 'dark');
      } else {
        root.setAttribute('data-theme', 'light');
        toggle.textContent = '深色';
        localStorage.setItem('reader-theme', 'light');
      }
    });
  })();
  </script>
</body>
