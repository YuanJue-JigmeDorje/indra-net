  E_P01:
    name: 奘·达玛布德
    aliases: [奘大师]
    type: 人物.法师
    specialty: [上师, 瑜伽士, 大成就者]
    origin: ""
    sect_affiliation: [宁玛派]
    manifestation_of: []
    attainments: [拙火(衣测试), 飞身如禽, 入定化光, 梦境修行]
    note: |
      精通《平等一味》《那若六法》《断法》《五次第》等教授；
      一百零二岁时显现生病；后圆寂；荼毗时彩虹遍布出佛塔舍利；
      弟子涌现根桑、觉哲、赞塘巴涅达玛色拉等众多人才；
      住世一百一十七岁。
    appearances: [301, 339, 354]

  E_P02:
    name: 觉哲
    aliases: [奘·觉哲, 觉哲奘穹纽巴]
    type: 人物.法师
    specialty: [上师]
    origin: ""
    sect_affiliation: [宁玛派]
    manifestation_of: []
    attainments: []
    note: |
      诞生在密咒师种姓中；从小学习文字历算；
      在沃喀拉哲巴面前得受《幻化网》等宁玛法要、《喜金刚》、《真实名经》；
      在阿阇黎萨前住了六年未被摄受；后三次请求《金刚桥法》；
      在奘大师前住了十八年；得授所有教言并秉持传承。
    appearances: [360, 361]

