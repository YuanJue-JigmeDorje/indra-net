  # ========== 候选排除说明 ==========
  # 以下 prescan 候选被排除:
  # - 国王 [未分类]: 通称，不建独立entity（赤松德赞已单独提取）
  # - 相续 [未分类]: 通用佛学概念（心相续）
  # - 佛塔 [未分类]: 通称建筑
  # - 宗派 [未分类]: 通用词
  # - 寺院 [未分类]: 通称
  # - 经论 [未分类]: 通称
  # - 大论 [未分类]: 通称
  # - 他宗 [未分类]: 通称
  # - 涅槃 [教法]: 通用佛学概念
  # - 化身 [教法]: 通用佛学概念（具体化身关系用relation表达）
  # - 灌顶 [仪轨]: 通用仪轨类型（不创建独立entity）
  # - 如来 [人物]: 通称（不指具体佛）
  # - 法王 [未分类]: 尊号通称
  # - 最后 [未分类]: 非实体
  # - 伏藏 [教法]: 通用概念
  # - 邬金 [人物]: 莲花生大士的来源地，已在莲花生大士.origin记录
  # - 达瓦 [人物]: 通称义"月"，实际指达瓦波或达瓦哦色，已在具体人物记录
  # - 大佛 [未分类]: 尊号通称
  # - 讲经 [未分类]: 通称动作
  # - 戒律 [教法]: 通用佛学概念（释迦嘉波精通戒律在note中记录）
  # - 三身 [教法]: 通用佛学概念
  # - 四大部洲 [地名]: 通用佛教宇宙论地名
  # - 一切经 [未分类]: 通称
  # - 尸陀林 [未分类]: 通称修行处
  # - 舍利子 [人物]: prescan 误判，此处"舍利子"是舍利（遗骨），非人物
  # - 本师 [人物]: 通称
  # - 五部 [未分类]: "五部佛"已单独提取
  # - 密宗 [未分类]: 通称
  # - 大慈大悲 [未分类]: 通用品质
  # - 菩提 [教法]: 通用概念
  # - 一切有情 [未分类]: 通称
  # - 大圆满法 [未分类]: 已归入大圆满
  # - 轻安觉支 [未分类]: 修行境界（在扬敦attainments中记录）
  # - 五部佛 [未分类]: 已提取E_S10
  # - 因明论 [未分类]: 已归入因明
  # - 明论 [未分类]: 非独立实体
  # - 魔王 [未分类]: 赤修桑给嘉巴狂言中的通称
  # - 商主 [人物]: 比喻用语（引导众生的商主）
  # - 大乘 [未分类]: 通用佛学概念
  # - 大悲观音/大悲观世音 [圣众]: 已归入观世音菩萨
  # - 单巴尊者 [人物]: 仅在奘大师对话中泛泛提及"印度的单巴尊者"，无具体事迹
