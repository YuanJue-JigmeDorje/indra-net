  E_B412:
    name: 《无垢光遗教》
    type: 经典.教言集
    aliases: []
    note: |
      无垢光尊者临终遗嘱。以"轮回自性先已知，
      世间法无实质故，今舍无常此幻身，
      说永益教请谛听……"开端。
    appearances: [1180]

  E_B413:
    name: 《心性休息大车疏》
    type: 经典.论
    aliases: []
    note: |
      窍诀心滴的成熟解脱教授圆满涵盖之论。
      传承链：龙钦绕降→克主恰达棱珠→札巴哦色→桑吉温波→
      达瓦札巴→根桑多吉→嘉村华桑→那凑扬珠→丹增札巴→
      多昂丹增→持明陈列棱珠法王德达朗巴。
      智悲光在青普山洞获无垢光尊者智慧身交付此论窍诀。
    appearances: [1236, 1240]

  E_B414:
    name: 《心性休息颂词及注释》
    type: 经典.论
    aliases: []
    note: 佛教施主仲雄吉巴劝请刻此论
    appearances: [1234]

  E_B415:
    name: 《应成续》
    type: 经典.密续
    aliases: []
    note: 其中有授记认定罗珠秋为无垢光尊者转世
    appearances: [1215]

  E_B416:
    name: 《藏密佛教史——天鼓妙音》
    type: 经典.史籍
    aliases: []
    note: |
      本书书名。第四品结尾出现：
      "藏密佛教史——天鼓妙音中，
      藏地内密三续佛法概况，尤其主要阐述窍诀心滴历史第四品终。"
    appearances: [1246]

  # ========== 教法 ==========

  E_D401:
    name: 大圆满秘密心滴
    type: 教法.教法体系
    aliases: [心滴, 心滴法, 心滴法门, 窍诀心滴]
    vehicle: 阿底瑜伽
    section: 密.前译
    note: |
      本段核心教法。无垢光尊者开启、弘扬的主法。
      尊者为法主（金刚亥母确认）。
      在雪域所有心滴法本被视为第二普贤如来意伏藏。
    appearances: [926, 943, 990, 1013, 1024, 1079, 1236]

  E_D402:
    name: 直断
    type: 教法.教言法门
    aliases: []
    vehicle: 阿底瑜伽
    section: 密.前译
    note: 尊者圆寂前教诫"切要实修直断和顿超"
    appearances: [1196]

  E_D403:
    name: 顿超
    type: 教法.教言法门
    aliases: [光明顿超捷径]
    vehicle: 阿底瑜伽
    section: 密.前译
    note: |
      尊者达到光明顿超捷径中觉性如量的境界。
      圆寂前教诫"切要实修直断和顿超"。
    appearances: [1093, 1196]

  E_D404:
    name: 前译派
    type: 教法.教法体系
    aliases: []
    section: 密.前译
    note: 无垢光尊者振兴前译派与大圆满的事业
    appearances: [1121]

  E_D405:
    name: 大圆满
    type: 教法.教法体系
    aliases: []
    vehicle: 阿底瑜伽
    section: 密.前译
    note: 尊者振兴前译派与大圆满事业
    appearances: [1121]

  # ========== 仪轨 ==========

  E_R401:
    name: 会供
    type: 仪轨.供养
    aliases: []
    note: |
      多次出现：尊者在各处举行会供（开启空行心滴前、
      修波岩、弘法期间广大会供、圆寂前对勇士空行供施）。
    appearances: [1013, 1076, 1081, 1091, 1116, 1146, 1194]

  E_R402:
    name: 禅定灌顶
    type: 仪轨.灌顶
    aliases: []
    note: 尊者对南哲玛举行一次禅定灌顶后告知"请多关照"
    appearances: [1072]

  # ========== 法器 / 圣物 ==========

  E_O401:
    name: 觉沃佛像
    type: 法器圣物.佛像
    aliases: []
    note: |
      拉萨觉沃佛像。尊者朝拜时佛像白毫间放射光芒
      融入自己眉间。后又见佛像放射纯金般光芒，
      头上有七佛、药师佛、喜金刚、虚空王观世音、
      胜海观音及众多护法神。
    appearances: [1123, 1129]

  # ========== 集合 ==========

  E_G401:
    name: 三位智者弟子
    type: 集合.弟子集合
    cardinality: 3
    members: [E_P420, E_P421, E_P422]
    note: |
      友塔朗巴克主德勒嘉措、克主秋戒札巴、克主恰达棱珠。
      闻名遐迩的三位智者。
    appearances: [1222]

  E_G402:
    name: 五位心子
    type: 集合.弟子集合
    cardinality: 5
    members: [E_P423, E_P407, E_P424, E_P425, E_P410]
    note: |
      多康巴丹古秋戒札巴、嘉追作巴、喇嘛华秋巴、
      革热益西绕降、云讷桑吉。
    appearances: [1223]

  E_G403:
    name: 弘扬佛法四善知识
    type: 集合.弟子集合
    cardinality: 4
    members: [E_P426, E_P412, E_P427, E_P428]
    note: |
      化身华玖嘉措、阿阇黎桑吉根嘎、阿阇黎罗珠桑波、
      达够夏札秋吉。
    appearances: [1225]

  E_G404:
    name: 获得成就四瑜伽士
    type: 集合.弟子集合
    cardinality: 4
    members: [E_P429, E_P403, E_P430, E_P431]
    note: |
      帕古多丹嘉波、瑜伽士哦色够恰、持明光明自解脱、
      舍事者索南哦色。
    appearances: [1226]

  E_G405:
    name: 三大护法神
    type: 集合.人物集合
    cardinality: 3
    members: [E_N401, E_N406, E_N402]
    note: |
      密主阿仲玛、曜王绕呵拉与单坚。
      甘愿为仆，对无垢光尊者言听计从。
    appearances: [1137]

  E_G406:
    name: 多吉耶卓玛白母七姐妹
    type: 集合.人物集合
    cardinality: 7
    members_named: [E_N404]
    note: 多吉耶卓玛白母七姐妹降临请尊者到其处所
    appearances: [963]

  E_G407:
    name: 《心性休息大车疏》传承链
    type: 集合.上师集合
    cardinality: 11
    members: [E_P401, E_P422, E_P443, E_P444, E_P445, E_P446,
              E_P447, E_P448, E_P449, E_P450, E_P451]
    note: |
