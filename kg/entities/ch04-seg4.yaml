  # ========== 经典 ==========

  E_B401:
    name: 《空行心滴》
    type: 经典.密续.岩藏
    aliases: [窍诀《空行心滴》]
    note: |
      金刚亥母确认尊者为此法法主。住世五百年。
      须在多吉耶卓玛所在处开取。
      哦色古恰取法本途中见彩虹瑞相。
      尊者开启此法。莲师降临时益西措嘉口述经文。
      益西措嘉六天介绍句义。灌顶引导全部圆满。
      在刚日托嘎最终定稿。秀嘉哲勒巴传句传。
      本段深法核心。
    appearances: [909, 916, 941, 943, 1013, 1017, 1058, 1084, 1123]

  E_B402:
    name: 《布玛心滴》
    type: 经典.密续.远传
    aliases: []
    note: |
      尊者问"《布玛心滴》、《空行心滴》二者中哪个更有利"。
      空行母答"两者同样有利，《布玛心滴》最多住世一百年"。
    appearances: [941, 943]

  E_B403:
    name: 《上师心滴如意宝》
    type: 经典.密续.远传
    aliases: []
    note: |
      布玛莫札传授给无垢光尊者，具三十五法部。
      尊者圆寂前教诫弟子"如果有不懂之处，
      当详细参阅《上师心滴如意宝》，
      它与满足意愿的宝珠一模一样"。
    appearances: [1097, 1197]

  E_B404:
    name: 《龙钦七宝藏》
    type: 经典.论
    aliases: [《七宝藏》]
    note: |
      无垢光尊者将意伏藏造成的论典之一。
      在刚日神山撰著。文中提到莲师等佛菩萨劝请著论
      并开许。
    appearances: [1134, 1138]

  E_B405:
