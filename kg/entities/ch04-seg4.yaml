  # ========== 非人 ==========

  E_N401:
    name: 阿仲玛
    type: 非人.护法(世间)
    aliases: [一髻佛母, 密咒一髻佛母]
    additional_types: [圣众.大乘.护法]
    additional_types_source: text
    note: |
      三大护法神之一（阿仲玛、曜王绕呵拉、单坚）。
      灌顶结束晚上降临跳舞。
      回答无垢光尊者关于宣讲心滴法是否令空行欢喜之问——
      称"只有莲花生大士和益西措嘉能这般宣讲"。
      文中既以"密咒一髻佛母"（出世间护法）描述，
      又以降神附体等世间形式出现。
    appearances: [1049, 1051, 1137]

  E_N402:
    name: 单坚
    type: 非人.护法(世间)
    aliases: []
    note: |
      三大护法神之一。出现告知弟子中能利益众生者有三十位，
      其中广泛利益者十一位，出类拔萃者九位。
      请尊者光临邬金堡。
      修缮殿堂时化现为佩带松石耳环的小孩每天帮助修建。
      甘愿为仆，对尊者言听计从。
    appearances: [1054, 1102, 1137]

  E_N403:
    name: 现巴仲哲玛
    type: 非人.护法(世间)
    aliases: [现巴卓哲玛]
    note: 在开许护法神交付印时现身说"请不要念诵我的修法"
    appearances: [1057]

  E_N404:
    name: 多吉耶卓玛
    type: 非人.护法(世间)
    aliases: [耶卓玛]
    note: |
      尊者特别护法神。金刚亥母回答尊者时指名。
      心滴法须在多吉耶卓玛所在处开启（空行自然集聚地）。
      白母七姐妹降临请尊者到其处所。
      由莲花生大士降伏而承诺保护伏藏。
      告知此处极凶险，少传引导修法为好。
      后又请求尊者"光临我的处所"。
      安放《空行心滴》法本时出现于莲师左侧。
      从桑耶青普来到修波岩时受耶卓玛迎接。
    appearances: [907, 916, 963, 965, 968, 978, 1019, 1068, 1081]

  E_N405:
    name: 南哲热玛德
    type: 非人.护法(世间)
    aliases: [南哲玛]
    note: |
      护法神。亲自到来问为何不给献食子。
      阐述了自己主尊眷属的现证，作伏藏授记，大显神变。
      后降临说"上师不要去"；被问昨天去哪里，
      答"去牧民那里收东西"（时流行畜瘟）。
    appearances: [1036, 1070, 1075]

  E_N406:
    name: 曜王绕呵拉
    type: 非人.护法(世间)
    aliases: [大遍入]
    note: |
      三大护法神之一（阿仲玛、曜王绕呵拉、单坚）。
      尊者侍者亲眼目睹尊者命绕呵拉研墨（在刚日神山撰著论时）。
      文中称"大遍入（即绕呵拉）"。
      甘愿为仆，对尊者言听计从。
    appearances: [1137, 1140]

