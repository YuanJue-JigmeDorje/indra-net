  # ========== 圣众 ==========

  E_S401:
    name: 金刚亥母
    type: 圣众.大乘.空行
    aliases: [空行母]
    note: |
      身色湛蓝佩带宝饰、骨饰。亲自降临与无垢光尊者对话。
      确认尊者为帮刚巴仁钦多吉转世；预言利众路径；
      开示修行要诀（明点、明妃、直指本性）；
      自述"我与你生生世世形影不离""对于具足誓言与证悟
      的诸位瑜伽士来说，我恒常都在"。
      强调世间形象行持事业 vs 出世间形象赐予悉地须区分。
    appearances: [903, 906, 911, 914, 917, 919, 921, 925, 927,
                  932, 938, 943, 980, 984, 988, 992, 995, 998, 1002, 1005]

  E_S402:
    name: 莲花生大士
    type: 圣众.大乘.本尊
    aliases: [莲师]
    note: |
      在本段多次以净相显现：
      从西南方降临融入无垢光尊者（二十八日）；
      以意修装束降临于安放《空行心滴》法本时；
      内供时左右有布玛莫札和金刚亥母；
      面见的佛菩萨之一。
      其伏藏品授记顾巴根仁身份。
    appearances: [920, 950, 956, 968, 1018, 1051, 1132, 1149]

