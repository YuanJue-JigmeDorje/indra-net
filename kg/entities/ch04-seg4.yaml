    appearances: [1179, 1184, 1224]

  E_P408:
    name: 布玛莫札
    type: 人物.法师
    aliases: []
    specialty: [阿阇黎, 班智达]
    note: |
      无垢光尊者问能否拜见。空行母答"已经见过了"。
      又问其伏藏品何时开取，空行母答"再过五年"。
      在尊者达觉性如量境界时亲现尊颜：
      预言心滴法传给革玛燃匝转世云讷桑吉；
      传授《上师心滴如意宝》（三十五法部）；
      用契克印指向哦日夏殿堂授记修缮。
      每百年显现一位化身。
    appearances: [924, 956, 1004, 1094, 1098, 1217]

  E_P409:
    name: 益西措嘉
    type: 人物.法师
    aliases: [益西措嘉空行母]
    specialty: [空行母]
    additional_types: [圣众.大乘.空行]
    additional_types_source: text
    note: |
      莲师右侧现身。安放《空行心滴》法本时口述经文。
      六天中亲自现身于尊者前，对《空行心滴》的句义
      比喻加以介绍并作交付印持。
      密法直指之际手持宝瓶赐予灌顶。
      以世间空行母（人物）和出世间空行（圣众）双重模式出现。
    appearances: [1018, 1020, 1043, 1051]

  E_P410:
    name: 云讷桑吉
    type: 人物.法师
    aliases: []
    specialty: [上师]
    note: |
      革玛燃匝的转世。布玛莫札授记无垢光尊者将心滴法
      汇集成精髓传给此弟子。以后也会涌现名字中有"云讷"
      的七位大德受持弘扬此法。五位心子之一。
    appearances: [1096, 1224]

  E_P411:
