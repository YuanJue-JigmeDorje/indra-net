  # ========== 人物 - 法师 ==========

  E_P401:
    name: 无垢光尊者
    type: 人物.法师
    aliases: [龙钦绕降, 龙钦巴, 桑耶巴, 全知法王]
    specialty: [上师, 金刚持, 大成就者, 伏藏师]
    additional_types: [圣众.大乘.菩萨]
    additional_types_source: text
    manifestation_of: [E_P415]
    note: |
      本段核心人物。被金刚亥母确认为帮刚巴仁钦多吉转世。
      被尊为"第二普贤如来"。众智者认为是文殊菩萨化身。
      弥勒菩萨授记其最后一世在莲积刹土成佛，佛号善逝山王灯幢。
      开启窍诀《空行心滴》。达到光明顿超觉性如量境界。
      面见无量本尊。水兔年五十六岁时圆寂于青普。
      荼毗时出现五种金刚舍利。凡有缘者见闻接触皆播解脱种子。
      additional_types 原因：文中既以凡常法师描述其修行弘法，
      又以"第二普贤如来""佛陀化身"等圣众模式描述。
    appearances: [901, 920, 924, 926, 928, 937, 941, 946, 950,
