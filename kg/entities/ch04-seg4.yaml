    note: |
      土兔年在吉祥密意的青普山洞时，
      全知无垢光尊者三次显示智慧身交给他一本经函，
      令其开显《心性休息大车疏》中隐含的所有窍诀。
      赐予所有教授与随教。自然通达浩如烟海的法理。
      堪称最近传承——"就像圣天菩萨摄受玛德革巴一样"。
    appearances: [1239, 1242]

