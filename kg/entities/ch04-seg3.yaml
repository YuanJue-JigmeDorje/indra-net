  # ========== 教法 ==========

  E_4S3_D01:
    name: 大圆满
    type: 教法.教法体系
    aliases: []
    vehicle: 阿底瑜伽
    section: 密.前译
    note: |
      赤修桑给嘉巴在革日觉白尔面前恭听大圆满而恍然大悟；
      嘉内静处梦中金刚萨埵授予大圆满灌顶；
      嘎丹巴秋吉桑给传大圆满密法。
    appearances: [601, 628, 668]

  E_4S3_D02:
    name: 大手印
    type: 教法.教言法门
    aliases: []
    note: "革玛燃匝在美龙多吉前请求大手印引导，直观认识心的本来面目"
    appearances: [658]

  E_4S3_D03:
    name: 秘密心滴
    type: 教法.教法体系
    aliases: [心滴窍诀]
    vehicle: 阿底瑜伽
    section: 密.前译
    note: |
      美龙多吉十八岁得受心滴窍诀；
      革玛燃匝得受秘密心滴灌顶传承教授；
      噶玛巴·自生金刚布玛莫札融入白毫现前心滴密意；
      后在革玛燃匝座前完整听受。
    appearances: [615, 670, 737, 739]

  E_4S3_D04:
    name: 噶玛心滴
    type: 教法.教法体系
    aliases: []
    vehicle: 阿底瑜伽
    note: |
      噶玛巴·自生金刚对普贤如来意界中自明密意伏藏自在驾驭，
      由此出现"噶玛心滴"教授，也是佛教的一个源头。
    appearances: [748]

