#           + 不共大乘结集
# 来源: source/dudjom/chapter_md/01_佛教总况.md
# 提取日期: 2026-05-09 (段落级 gazetteer 管线)
# 规范: SKILL_03a v0.3 + entity-taxonomy v0.4
# 管线: gazetteer 预扫描确认 + Agent NER 发现
# ============================================================
# gazetteer 候选判定说明 (92 个候选逐一处理):
# 已排除的通用词汇/片段（非实体）:
#   不可思议 — 形容词短语，非专名
#   阿罗汉 — 通称修证果位（但"五百阿罗汉"作集合收入）
#   涅槃 — 通用佛教术语/动词（不独立建entity）
#   本师 — 释迦佛 alias（已收）
#   世尊 — 释迦佛 alias（已收）
#   如来 — 释迦佛 alias（已收）
#   国王 — 通称，无专名意义
#   大乘 — 通用车乘名称（广大行派/甚深见派单独收）
#   最后 — 普通副词
#   灭后 — 普通副词短语
#   八部 — "十八部"的片段
#   三部/四部/五部 — 数量描述片段
#   大佛 — "八大佛塔"片段
#   愿佛 — 句中动宾片段
#   诸天 — 通称天人（不建entity）
#   佛灭度 — 动词短语
#   大乘经 — "大乘经藏"片段
#   千佛 — 数量概念
#   非天 — "众非天"通称（=阿修罗通称）
#   三大阿僧祇劫 / 阿僧祇劫 — 时间概念
#   佛塔 — 通用名词（但"八大佛塔"作法器收入）
#   五百罗汉 — 同"五百阿罗汉"集合
#   杂阿含经 — 同《杂阿含经》重复
#   大天 — 同"大天比丘"
#   宗派 — 通用名词
#   有部 — "说一切有部"的缩写（已收）
#   大毗婆沙论 / 毗婆沙论 / 婆沙论 — 同《大毗婆沙论》重复
#   一切有部 — "说一切有部"的缩写（已收）
#   智燃论 — 同《智燃论》重复
#   一切有为法 / 一切有为 — 教理概念，非专名
#   不可思议经 — "秘密不可思议经"片段
#   迦毗罗卫 — 地名片段（《大毗婆沙论》引文中出现）
#   大慈大悲 — 形容词
#   昙花一现 — 成语
#   阿难结集 — 动词短语
#   大乘经藏 — 通用类目名
#   阿含经 — 同《杂阿含经》重复
#   别解脱经 — 通称戒律经名（非特定文本，此处指诵法不同）
#   拘尸那 — "拘尸那城"片段
#   毗舍离 — "毗舍离城"片段
#   那烂陀 — "那烂陀寺"片段
#   无间地狱 — 通用地名概念（非特定实体）
# ============================================================

