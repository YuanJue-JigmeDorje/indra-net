    origin: 藏地 (康区)
    attainments: 信解行菩萨
    note: |
      出家前名莫色拉巴，见三位高僧生信心请求出家。
      出家法名释迦·格巴绕色。十五年间听受《戒律》，
      又在贡荣桑格札座下听《戒律》，在噶巴哦秋札面前听《般若》，
      在耶札酿波面前听《大圆满心部》。
      《普作王续》传讲由他传下。
      被共称为贡巴绕色大师。
      以一坐垫、三启白、一次性圆满比丘戒传戒，
      后命鲁墨为亲教师。
    appearances: [260-262, 266-274, 279]

