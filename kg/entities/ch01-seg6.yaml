# ==================== gazetteer 候选排除说明 ====================
# 以下候选被排除：
# - 赡部洲/赡部: "南赡部洲"的截断，已归入南赡部洲
# - 阿罗汉: 通用修证称号，非独立实体（具体人物已分别提取）
# - 本师: 释迦牟尼佛的别名，已归入E_001
# - 如来: 释迦牟尼佛的别名，已归入E_001
# - 龙树: 龙树菩萨的别名，已归入E_050
# - 文殊: 文殊菩萨的别名，已归入E_003
# - 国王: 通用称谓，非独立实体
# - 大乘: 教法体系通称，本段不作为独立教法实体（描述为佛法兴盛的类别背景）
# - 密宗: 教法体系通称，本段不作为独立教法实体
# - 灭后: 时间短语，非实体
# - 宗派: 通用概念
# - 邬金(人物标注): 实为地名，已归入E_102
# - 大毗婆沙论/毗婆沙论/婆沙论: 《大毗婆沙论》的截断，已归入E_300
# - 大婆罗门: 通用称谓（萨绕哈的别名中体现）
# - 大菩萨: 通用修证称号
# - 佛经: 通用概念
# - 大佛: "第二大佛陀"的截断
