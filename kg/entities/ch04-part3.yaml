  # ========== 非人 ==========

  E_N401:
    name: 阿仲玛
    type: 非人.护法(世间)
    aliases: [密咒一髻佛母]
    additional_types: [圣众.大乘.护法]
    additional_types_source: text
    note: |
      护法神。降神到瑜伽母体内，手舞足蹈。
      三大护法神之一（阿仲玛、曜王绕呵拉、单坚）。
      文中既以"密咒一髻佛母"（出世间护法）描述，
      又以降神附体等世间形式出现，故 additional_types。
    appearances: [856, 1049, 1051, 1137]

  E_N402:
    name: 单坚
    type: 非人.护法(世间)
    aliases: []
    note: |
      三大护法神之一。显现为白衣之人。
      化现为佩带松石耳环的小孩帮助修建殿堂。
      出现告知弟子中能利益众生者数目。
    appearances: [878, 1054, 1102, 1137]

  E_N403:
    name: 现巴卓哲玛
    type: 非人.护法(世间)
    aliases: [现巴仲哲玛]
    note: |
      尊者梦到此者把经函交给他。
      后在开许护法神交付印时现身说"请不要念诵我的修法"。
    appearances: [853, 1057]

  E_N404:
    name: 多吉耶卓玛
    type: 非人.护法(世间)
    aliases: [耶卓玛]
    note: |
      尊者特别护法神。白母七姐妹降临请尊者到其处所。
      由莲花生大士降伏而承诺保护伏藏。
      后又请求尊者"光临我的处所"。
      安放《空行心滴》法本时出现于莲师左侧。
    appearances: [907, 916, 963, 965, 978, 1019, 1068, 1081]

  E_N405:
    name: 南哲热玛德
    type: 非人.护法(世间)
    aliases: [南哲玛, 南哲热玛德护法神]
    note: |
      护法神。亲自到来问为何不给献食子。
      阐述了自己主尊眷属的现证，作伏藏授记，并大显神变。
      后降临说"上师不要去"，被问昨天去哪里，
      答"去牧民那里收东西"（时流行畜瘟）。
    appearances: [1036, 1070, 1075]

  E_N406:
    name: 哦得贡嘉
