  # ========== 经典 ==========

  E_B401:
    name: 《空行心滴》
    type: 经典.密续.岩藏
    aliases: []
    note: |
      哦色古恰历经艰辛寻找其法本。
      无垢光尊者开启窍诀《空行心滴》法。
      益西措嘉六天中对其句义比喻加以介绍。
      空行母确认住世五百年。
      灌顶引导全部圆满结束。
    appearances: [852, 909, 916, 943, 1013, 1017, 1058, 1084, 1123]

  E_B402:
    name: 《布玛心滴》
    type: 经典.密续.远传
    aliases: []
    note: |
      尊者问"《布玛心滴》、《空行心滴》二者中哪个更有利"。
      空行母答"两者同样有利，《布玛心滴》最多住世一百年"。
    appearances: [941, 943]

  E_B403:
    name: 《上师心滴如意宝》
    type: 经典.密续.远传
    aliases: []
    note: |
      布玛莫札传授给无垢光尊者，具三十五法部。
      尊者圆寂前教诫弟子"如果有不懂之处，
      当详细参阅《上师心滴如意宝》"。
    appearances: [1097, 1197]

  E_B404:
    name: 《龙钦七宝藏》
    type: 经典.论
    aliases: [《七宝藏》]
    note: |
      无垢光尊者将意伏藏造成的论典之一。
      在刚日神山撰著。
    appearances: [1134, 1138]

  E_B405:
    name: 《三休息》
    type: 经典.论
    aliases: []
    note: 无垢光尊者所造论典之一
    appearances: [1134]

  E_B406:
    name: 《三自解脱》
    type: 经典.论
    aliases: []
    note: 无垢光尊者所造论典之一
    appearances: [1135]

  E_B407:
    name: 《密藏续》
    type: 经典.密续.远传
    aliases: []
    note: 无垢光尊者结合心滴为其造《三遣暗论》
    appearances: [1135]

  E_B408:
    name: 《三遣暗论》
    type: 经典.论
    aliases: []
    note: 《密藏续》结合心滴而造
    appearances: [1135]

  E_B409:
    name: 《三心髓》
    type: 经典.论
    aliases: []
    note: 无垢光尊者所造论典之一
    appearances: [1135]

  E_B410:
    name: 《三心滴》
    type: 经典.论
    aliases: []
    note: 无垢光尊者所造论典之一
    appearances: [1136]

  E_B411:
    name: 《目录宝库》
    type: 经典.论
    aliases: []
    note: 记录无垢光尊者所有论著的目录
    appearances: [1136]

  E_B412:
    name: 《无垢光遗教》
    type: 经典.教言集
    aliases: []
    note: |
      无垢光尊者临终遗嘱。以"轮回自性先已知，
      世间法无实质故，今舍无常此幻身，
      说永益教请谛听……"开端。
    appearances: [1180]

  E_B413:
    name: 《心性休息大车疏》
    type: 经典.论
    aliases: []
    note: |
      窍诀心滴的成熟解脱教授圆满涵盖之论。
      传承链：龙钦绕降→克主恰达棱珠→札巴哦色→桑吉温波→
      达瓦札巴→根桑多吉→嘉村华桑→那凑扬珠→丹增札巴→
      多昂丹增→持明陈列棱珠法王德达朗巴。
      智悲光在青普山洞获无垢光尊者智慧身交付此论窍诀。
    appearances: [1236, 1240]

  E_B414:
    name: 《心性休息颂词及注释》
    type: 经典.论
    aliases: []
    note: 佛教施主仲雄吉巴劝请刻此论
    appearances: [1234]

  E_B415:
    name: 《应成续》
    type: 经典.密续
    aliases: []
    note: 其中有授记认定罗珠秋为无垢光尊者转世
    appearances: [1215]

  # ========== 教法 ==========

  E_D401:
    name: 大圆满秘密心滴
    type: 教法.教法体系
    aliases: [心滴, 心滴法, 心滴法门, 窍诀心滴]
    vehicle: 阿底瑜伽
    section: 密.前译
    note: |
      无垢光尊者从革玛燃匝处得受灌顶、引导及教授。
      尊者以此法门使众多有缘者成熟解脱。
      本段核心教法。
    appearances: [847, 851, 890, 926, 990, 1013, 1024, 1079, 1236]

