  # ========== 人物 - 法师 ==========

  E_P401:
    name: 无垢光尊者
    type: 人物.法师
    aliases: [龙钦绕降, 龙钦巴, 桑耶巴]
    specialty: [上师, 金刚持, 大成就者, 伏藏师]
    additional_types: [圣众.大乘.菩萨]
    additional_types_source: text
    manifestation_of: [E_P415]     # 帮刚巴仁钦多吉
    note: |
      本段核心人物。被金刚亥母确认为帮刚巴仁钦多吉转世、
      被空行母称为佛陀化身、众智者认为是文殊菩萨化身。
      被尊为"第二普贤如来"。弥勒菩萨授记其最后一世在
      莲积刹土成佛，佛号善逝山王灯幢。
      面见无量本尊。凡有缘者见闻接触皆播解脱种子。
      水兔年五十六岁时圆寂于青普。
      additional_types 原因：文中既以凡常法师描述其苦修生涯，
      又以"第二普贤如来""佛陀化身"等圣众模式描述。
    appearances: [841, 847, 851, 854, 889, 892, 920, 950, 959,
                  1007, 1025, 1040, 1081, 1094, 1111, 1132,
                  1159, 1178, 1199, 1214, 1229, 1237, 1239]

  E_P402:
    name: 持明革玛燃匝
    type: 人物.法师
    aliases: [革玛燃匝]
    specialty: [上师, 持明]
    note: |
      无垢光尊者之根本上师。为激发弟子厌离心，
      一年春天连续迁居九次。满瓶倾泻恩赐上灌顶
      和大圆满三部续教窍诀及护法神修法，
      授予无垢光尊者为法太子。
      其转世为云讷桑吉（据布玛莫札授记）。
    appearances: [841, 848, 898, 1095, 1216]

  E_P403:
    name: 哦色古恰
    type: 人物.法师
    aliases: [哦色够恰]
    specialty: [瑜伽士]
    note: |
      瑜伽行者。历经艰辛寻找《空行心滴》法本给尊者看。
      后被尊者派去取法本。获得成就的四位瑜伽士之一。
    appearances: [852, 1007, 1084, 1226]

  E_P404:
    name: 阿阇黎仁多
    type: 人物.法师
    aliases: []
    specialty: [阿阇黎]
    note: 在金刚亥母降临时问帮刚巴仁钦多吉住在哪里
    appearances: [928]

  E_P405:
    name: 噶玛巴
    type: 人物.法师
    aliases: []
    specialty: [上师]
    note: 文中称"传教者噶玛巴"，传讲心滴法者之一
    appearances: [991]

  E_P406:
    name: 仁钦朗巴
    type: 人物.法师
    aliases: []
    specialty: [伏藏师]
    note: |
      传讲心滴法者之一。其伏藏品被空行母评价为
      "是倒是，没有准确性"。
    appearances: [991, 994]

  E_P407:
    name: 嘉追作巴
    type: 人物.法师
    aliases: []
    specialty: [瑜伽士]
    note: |
      无垢光尊者五位心子之一。尊者圆寂前对其说
      "拿纸墨来"，由此留下遗嘱《无垢光遗教》。
    appearances: [1179, 1184, 1224]

  E_P408:
    name: 布玛莫札
    type: 人物.法师
    aliases: []
    specialty: [阿阇黎, 班智达]
    note: |
      空行母称其"已到藏地"。亲现尊颜向无垢光尊者
      预言："将此心滴法汇集成精髓传给革玛燃匝的转世
      云讷桑吉"。传授《上师心滴如意宝》。
      用契克印指向哦日夏殿堂授记须修缮。
      每百年显现一位化身。
    appearances: [894, 924, 956, 1004, 1094, 1098, 1217]

  E_P409:
    name: 益西措嘉
    type: 人物.法师
    aliases: [益西措嘉空行母]
    specialty: [空行母]
    additional_types: [圣众.大乘.空行]
    additional_types_source: text
    note: |
      莲师右侧现身。安放《空行心滴》法本时降临，
      口述经文。六天中亲自现身于尊者前，
      对《空行心滴》的句义比喻加以介绍，
      并作交付印持。以世间空行母（人物）和出世间空行（圣众）
      双重模式出现。
    appearances: [1018, 1020, 1043, 1051]

  E_P410:
    name: 云讷桑吉
    type: 人物.法师
    aliases: []
    specialty: [上师]
    note: |
      革玛燃匝的转世。布玛莫札授记无垢光尊者将心滴法
      汇集成精髓传给此弟子。以后也会涌现名字中有"云讷"
      的七位大德受持弘扬此法。
    appearances: [1096, 1224]

  E_P411:
    name: 秀嘉哲勒巴
    type: 人物.法师
    aliases: []
    specialty: [瑜伽士]
    note: |
      伏藏师的亲传弟子。无垢光尊者在其面前聆听
      《空行心滴》的句传。
    appearances: [1122]

  E_P412:
    name: 阿阇黎桑吉根嘎
    type: 人物.法师
    aliases: []
    specialty: [阿阇黎]
    note: |
      被无垢光尊者任命为解脱洲僧团住持。
      弘扬佛法的四位善知识之一。
    appearances: [1120, 1225]

  E_P413:
    name: 顾巴根仁
    type: 人物.大臣
    aliases: [哲贡巴·顾巴根仁]
    origin: 哲贡
    note: |
      哲贡地方权贵。为自己政权骄傲所迷醉，
      企图发动战乱。看到莲师伏藏品授记后发现自身背部
      有宝剑形痣，知授记所指即己。放弃战乱，
      寻找文殊菩萨化身，后将无垢光尊者迎请为至尊上师。
    appearances: [1148, 1157]

  E_P414:
    name: 司徒香切嘉灿
    type: 人物.大臣
    aliases: []
    note: |
      卫藏傲气十足之人。对无垢光尊者作为哲贡巴的上师颇为不满。
    appearances: [1159]

  E_P415:
    name: 帮刚巴仁钦多吉
    type: 人物.法师
    aliases: [阿阇黎仁钦多吉]
    specialty: [伏藏师]
