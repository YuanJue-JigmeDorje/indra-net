  # ========== 圣众 ==========

  E_S401:
    name: 金刚亥母
    type: 圣众.大乘.空行
    aliases: []
    note: |
      身色湛蓝佩带宝饰、骨饰。亲自降临与无垢光尊者对话，
      预言其未来，确认其为帮刚巴仁钦多吉转世，
      称"我与你生生世世形影不离"。
    appearances: [888, 890, 919, 932, 957, 980, 998]

  E_S402:
    name: 莲花生大士
    type: 圣众.大乘.本尊
    aliases: [莲师]
    note: |
      在本段多次以净相显现：从西南方降临融入无垢光尊者；
      以意修装束降临于安放《空行心滴》法本时；
      在内供时左右有布玛莫札和金刚亥母。
      被尊者问能否面见。
    appearances: [920, 950, 956, 1018, 1132, 1149]

  E_S403:
    name: 弥勒菩萨
    type: 圣众.大乘.菩萨
    aliases: []
    note: |
      经堂开光时显现，举起手指授记无垢光尊者
      最后一世在莲积刹土成佛，佛号善逝山王灯幢。
    appearances: [1111, 1112]

