# 以下 gazetteer 候选被排除（通用概念/重复/无名通称）:
# - "菩提" → 通用概念，不单独建实体
# - "化身" → 通用概念（描述关系类型）
# - "国王" → 通用称谓
# - "密宗" → 通用概念（用于描述莲师身份）
# - "法王" → 通用称谓
# - "罗刹" → 通称非人
# - "伏藏" → 通用概念（用于描述教法类别）
# - "本师" → 通用称谓
# - "鬼神/凶神恶煞/妖魔鬼怪" → 通称非人不建实体
# - "莲师" → 已归入莲花生大士 aliases
# - "赡部洲/赡部" → 已归入南赡部洲
# - "巴绕那" → 已归入巴赤则 aliases
# - "观世音" → 已归入观世音菩萨
# - "授记说" → 非实体（动词+说）
# - "不可思议" → 形容词短语
# - "讲经" → 通用概念
# - "邬金" → 地名（莲师来源地），但在本段仅见于太子木赤诗句"前往邬金境"
# - "达瓦" → 不确定指代，排除
# - "二天/五山/大王/密经/有部/道后" → 片段/通用
# - "雪山/灌顶" → 通用概念
