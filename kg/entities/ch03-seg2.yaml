# ==================== 经典 ====================

E_B01:
  name: 《广般若经》
  type: 经典.经
  note: |
    嘎瓦那波切在彭地译校，分成十六部。
  appearances: [235]

E_B02:
  name: 《戒律》
  type: 经典.律
  aliases: [律藏]
  note: |
    贡巴绕色十五年间在亲教师规范师面前听受。
    又在贡荣桑格札座下聆听。
    朗达玛灭佛时被三位高僧驮在骡上带往康区。
  appearances: [258, 266, 267]

E_B03:
  name: 《大圆满心部》
  type: 经典.密续.远传
  note: 贡巴绕色在耶札酿波面前聆听
  appearances: [268]

E_B04:
  name: 《普作王续》
  type: 经典.密续.远传
  note: 后来传讲的出现由贡巴绕色传下
  appearances: [269]

E_B05:
  name: 《般若》
  type: 经典.经
  note: |
    贡巴绕色在噶巴哦秋札面前听闻。此处为概称。
  appearances: [268]

E_B06:
  name: 上分对法
  type: 经典.论
  note: |
    由班智达则那莫札和译师嘎瓦花则翻译传讲。
    文中脚注 77。
  appearances: [293]

E_B07:
  name: 下分对法
  type: 经典.论
  note: |
    与上分对法并列，由班智达则那莫札和译师嘎瓦花则翻译传讲。
    文中脚注 78。
  appearances: [293]

E_B08:
  name: 《般若十万颂》
  type: 经典.经
  note: |
    朗康够恰背诵。经藏中转法轮般若类，
    从印度保留下来的经典翻译弘扬。
  appearances: [297]

# ==================== 教法 ====================

E_D01:
  name: 生起次第
  type: 教法.修法元素
  section: 密
  note: 后弘时期在家咒师在深山家中讲修
  appearances: [252]

E_D02:
  name: 圆满次第
  type: 教法.修法元素
  section: 密
  note: 与生起次第并列，后弘时期在家咒师讲修
  appearances: [252]

E_D03:
  name: 东律传承
  type: 教法.戒律体系
  section: 显
  note: |
    后弘时期由玛尔·释迦牟尼等三位高僧传下的律法传承。
    被誉为"东律传承"。邬金敏珠朗佛学院及其分院属此传承。
    佛教后弘时期大多数持戒大德及新旧噶当派多数善知识
    致力于此传承。
  appearances: [288]

E_D04:
  name: 四大供养
  type: 教法.修法元素
  note: |
    木奈赞普执政期间在桑耶寺兴起的佛事。文中脚注 76。
  appearances: [222]

E_D05:
  name: 八大法行
  type: 教法.教法体系
  section: 密
  note: |
    莲师在铜色吉祥山化现罗刹八洲后以国王形象宣讲八大法行等正法。
  appearances: [214]

E_D06:
  name: 大圆满
  type: 教法.教法体系
  section: 密.前译
  note: 本段出现于"《大圆满心部》"一词中
  appearances: [268]

E_D07:
  name: 三宝
  type: 教法.教法体系
  note: |
    饮光王与花库赞恭敬三宝。
    所有在家人虔诚信奉三宝。
  appearances: [247, 248]

