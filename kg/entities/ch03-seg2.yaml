# ==================== 人物 - 贡巴绕色（核心人物）====================

E_P26:
  name: 贡巴绕色
  type: 人物.法师
  aliases: [莫色拉巴, 释迦·格巴绕色, 贡巴绕色大师]
  specialty: [比丘, 亲教师, 持律师]
  origin: 康区
  attainments: [信解行菩萨]
  note: |
    出家前名莫色拉巴，见三位高僧生信心请求出家。
    出家法名释迦·格巴绕色。十五年间听受《戒律》，
    又在贡荣桑格札座下听《戒律》，噶巴哦秋札面前听《般若》，
    耶札酿波面前听《大圆满心部》。
    《普作王续》传讲由他传下。
    以一坐垫三启白次第传一次性圆满比丘戒。
    后命鲁墨为亲教师。
  appearances: [260, 262, 266, 269, 270, 273, 279]

