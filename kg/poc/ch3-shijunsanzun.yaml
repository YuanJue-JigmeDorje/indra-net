# ============================================================
# 总结
# ============================================================
summary: |
  本 PoC 在师君三尊段（约 2900 字）成功提取：
    - 56 条代表性实体（覆盖 11 个类目中的 9 个）
    - 38 条代表性事实（覆盖 6 个 narrative-layers 中的 4 个）
    - 14 个明确的 spec 缺口

  规则的实际应用结果：
    - R1（多类目共存）：仅 莲花生大士 触发（文本提供凡常+圣众双模式描述）
                        益西措嘉 严格按 R1 不触发
    - R2（form entity）：多吉卓罗 经 R2 升级为独立 entity
    - R3（顶级 vehicle 留空）：大圆满 vehicle 字段留空

  最重要的发现：
    1. 文本忠实度优先（原则 #15）让 PoC 可执行——不需要 Claude 知道
       全部宁玛 sadhana 体系
    2. narrative-layers 的多层组合在真实文本里频繁出现，spec 设计正确
    3. 多叙述层时间（莲师驻藏 6 种说法）在 PoC 中能完整保留
    4. 14 个 GAP 中，5 个 high severity 需要 spec 升级才能完整支撑 SKILL_03a
    5. PoC 暴露：当前 spec 对"通称非人""位次属性"等"非 entity 的事实组件"
       缺乏处理规范，这是下一轮 spec 迭代的重点
