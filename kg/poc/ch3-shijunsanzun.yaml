# ============================================================
# GAPS — 14 个 spec 暴露的缺口
# ============================================================
# 在做 PoC 时遇到的"spec 没说清楚"的问题，按严重程度排序

gaps:

  - id: GAP-01
    severity: high
    spec: entity-taxonomy
    issue: |
      "通称非人"如何处理？
      文本中"凶神恶煞""鬼神""妖魔鬼怪"等没有具名的非人，
      它们参与了具体事件（雷击红山、水冲澎塘宫殿等），
      但不构成 entity（无名）。
      标注时怎么处理？
        - 选项 A: 创建一个"通称 entity"作为占位（损失数据精度）
        - 选项 B: 在 facts 中直接用字符串描述（损失关系图谱可查询性）
        - 选项 C: 创建 type_mention 类型，标记"该类的某成员"
    poc_workaround: 选项 B（facts 中直接用字符串"凶神恶煞"等）

  - id: GAP-02
    severity: high
    spec: entity-taxonomy + narrative-layers
    issue: |
      "六通""神通"等"修证位次属性"如何处理？
      原则 #8 说位次是属性不是 entity，但它在事实中作为对象出现：
      "他通过修持而具足了六通"
      这里"六通"是某种"被获得的状态/能力"，需要标注吗？
        - 选项 A: 视为 fact 的一个属性字段（attainment）
        - 选项 B: 创建 教法.修法元素 entity（"六通"作为修法目标）
        - 选项 C: 视为 generic 词汇，不入 entity
    poc_workaround: 选项 A

  - id: GAP-03
    severity: medium
    spec: entity-taxonomy
    issue: |
      "诸位班智达""所有译师""君臣"等集合性引用怎么处理？
      文本中频繁出现"莲师为君臣中有缘分的人们赐予灌顶"，
      "君臣"是个集合但不在 entity 列表中，也没有 cardinality。
        - 选项 A: 视为 generic context，不入 entity
        - 选项 B: 创建临时集合 entity（每次都创建占位）
    poc_workaround: 选项 A（直接 facts 中字符串引用）

  - id: GAP-04
    severity: medium
    spec: entity-taxonomy
    issue: |
      "三位王妃的三洲""三位王妃" — 王妃集合 + 附属建筑集合。
      这里"三位王妃"不是已命名的集合（不像"祖孙三尊"有文化身份），
      而是"赤松德赞的三位王妃"——一种关系性引用。
      作为 集合.王族 还是 普通描述？
    poc_workaround: 不入 entity

  - id: GAP-05
    severity: medium
    spec: entity-taxonomy
    issue: |
      "莲师"作为别名 vs 莲花生八变之一的"莲花生大士"主名 — 主名规则需要更明确。
      v0.3 spec 说"主名 = 最简洁/最常用"，但在某些上下文里"莲师"
      比"莲花生大士"更常用。是否需要按章节统计选取？
    poc_workaround: 主名固定为"莲花生大士"（更正式），"莲师"作 alias

  - id: GAP-06
    severity: medium
    spec: narrative-layers
    issue: |
      "授记"作为 fact 类型 vs 作为 layer 标签 — 区别？
      F_002 的"松赞干布授记赤松德赞" 是一个授记事件（动作），
      不是一个被授记的命题。
      在 narrative-layers v0.2 中，授记层用于"该断言来自经/续中授记"，
      但这里授记本身就是事件。
        → 提议：授记 既是层（描述命题来源），也是事件类型（描述事件性质）
      需要 spec 明确这两种用法的区别。
    poc_workaround: F_002 用 layers: [授记]，但应该是 type: prophecy_event

  - id: GAP-07
    severity: medium
    spec: entity-taxonomy
    issue: |
      "出家事件"涉及多个角色：candidate / upadhyaya / karma_acharya / raho_anu
      这是关系还是事件？v0.3 spec 没说清楚多角色事件如何记录。
        - 选项 A: 一个事件，多个 role 字段（如 F_017 的写法）
        - 选项 B: 多个 fact，每个表达一个 dyadic 关系
    poc_workaround: 选项 A（更紧凑）

  - id: GAP-08
    severity: medium
    spec: entity-taxonomy
    issue: |
      "札马珍桑殿堂"和"桑耶寺"的关系 — 是同一寺还是前后建筑？
      原文未明，需要 SKILL_03b 处理。
      → 这种"边界寺院身份消歧"应该有规范流程
    poc_workaround: 视为两个独立 entity，加 note 说明关系不明

  - id: GAP-09
    severity: low
    spec: entity-taxonomy
    issue: |
      "下密""无上续"在 v0.3 spec 中说是属性值不是 entity。
      但 F_024 中"下密与无上续相应的灌顶"——它们作为灌顶的范畴出现，
      在 fact 里需要怎么写？属性？还是隐含 entity 引用？
    poc_workaround: 用 section 字段（属性）

  - id: GAP-10
    severity: low
    spec: entity-taxonomy
    issue: |
      事件中的 "连同三位王妃的三洲" 涉及附属建筑。
      "三洲"作为 桑耶寺 的子建筑还是独立 entity？
    poc_workaround: 不单独建 entity（属于 桑耶寺.附属）

  - id: GAP-11
    severity: low
    spec: narrative-layers + entity-taxonomy
    issue: |
      "供养建寺金粉" 涉及非人（无恼龙）作为供养主体。
      非人作为施主是常见的（龙王供养金粉、地神供养食物等）。
      关系类型 supplyDanapati 是否需要？
    poc_workaround: 用 fact predicate 字符串

  - id: GAP-12
    severity: high
    spec: narrative-layers
    issue: |
      多叙述层时间事实（F_025a-d）的 sub_layer 字段用了"短时间观点/中等观点/长时间观点"
      作为 narrative-layers spec 没有明确定义的 sub-tag。
      narrative-layers v0.2 提到"sub-tag"概念但未给出语法。
    poc_workaround: 自由文本 sub_layer 字段

  - id: GAP-13
    severity: medium
    spec: entity-taxonomy
    issue: |
      "祖孙三尊"作为集合 entity (E_G02) 的成员引用要严格 entity ID 还是允许字符串？
      如果未来某成员实体被重命名（主名变化），集合内的引用要不要自动更新？
      → 这是 KG 的引用一致性问题，应该用 entity ID 而非名字
    poc_workaround: PoC 中已用 entity ID

  - id: GAP-14
    severity: high
    spec: entity-taxonomy + narrative-layers
    issue: |
      "佛像开口说话""神馐自动发出音声"（line 102-103）这种"物体作为主体"
      的神变事件如何标？
      佛像不是 person，不能作 subject。但事件要求一个主体。
        - 选项 A: 物体作 subject (允许 法器/圣物 作为事件主体)
        - 选项 B: 隐含主体（神变本身），物体作为 affected
    poc_workaround: 暂无（PoC 中未提取此类事实）

