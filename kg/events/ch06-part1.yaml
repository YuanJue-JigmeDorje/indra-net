  source_quote: "第十三世达赖喇嘛，考虑到人们过多地求得遗体肉，就会趋于完竭……他准备将其遗体安住在布达拉宫，特意派尊贡塘巴前去迎请，桑耶大护法降临说：此法体只能安放在南部地带的这一地点而不能移往他处"
